  {
    "id": "sa540",
    "title": "SA 540",
    "subtitle": "Auditing Accounting Estimates, Including Fair Value Accounting Estimates and Related Disclosures",
    "cards": [
      {
        "id": "b717530d-6359-478a-a5bc-a0fcddf2b62d",
        "title": "Nature of Accounting Estimates",
        "keywords": [
          {
            "icon": "crystal-ball",
            "label": "Cannot be measured precisely"
          },
          {
            "icon": "folder",
            "label": "Information varies widely"
          },
          {
            "icon": "raincloud",
            "label": "Estimation uncertainty affects ROMM"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Some financial statement items <strong>cannot be measured precisely</strong>, and can only be estimated — referred to in this SA as <strong>accounting estimates</strong>.</p>\n<p>Information available to management to make an accounting estimate varies widely, which affects the degree of <strong>estimation uncertainty</strong>. The degree of estimation uncertainty affects the <strong>ROMM</strong> of accounting estimates.</p>"
      },
      {
        "id": "b12ba865-9fb9-42a5-90c9-0d62e11fa9ab",
        "title": "Accounting Estimates with Low Estimation Uncertainty",
        "keywords": [
          {
            "icon": "eye",
            "label": "Data readily available/observable"
          },
          {
            "icon": "ruler",
            "label": "Simple measurement method"
          },
          {
            "icon": "gear",
            "label": "Non-complex business activities"
          },
          {
            "icon": "calendar",
            "label": "Frequently made/routine estimates"
          },
          {
            "icon": "graduation-cap",
            "label": "Well-known model with observable inputs"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Estimates giving rise to <strong>lower ROMM</strong>:</p>\n<ul><li>Derived from data readily available — e.g. published interest rate data or exchange-traded security prices (\"observable\" data).</li><li>Fair value estimates where the FRF's measurement method is simple and easily applied.</li><li>Estimates arising in entities engaged in <strong>non-complex</strong> business activities.</li><li>Estimates frequently made and updated, relating to <strong>routine</strong> transactions.</li><li>Fair value estimates using a well-known/generally accepted model, with observable assumptions/inputs.</li></ul>"
      },
      {
        "id": "1aa9c4e1-1f0e-4825-ab96-479970367efc",
        "title": "Accounting Estimates with High Estimation Uncertainty",
        "keywords": [
          {
            "icon": "eye",
            "label": "Highly specialised/unobservable model"
          },
          {
            "icon": "scale",
            "label": "Outcome of litigation"
          },
          {
            "icon": "ghost",
            "label": "Non-publicly traded derivatives"
          },
          {
            "icon": "compass",
            "label": "Nature/method/subjectivity factors"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Estimates based on <strong>significant assumptions</strong>:</p>\n<ul><li>Fair value estimates using a highly specialised entity-developed model, or unobservable assumptions/inputs.</li><li>Estimates relating to the outcome of <strong>litigation</strong>.</li><li>Fair value estimates for derivative financial instruments <strong>not publicly traded</strong>.<p>The degree of estimation uncertainty varies based on:</p></li><li>The nature of the accounting estimate.</li><li>The extent of a generally accepted method for making the estimate.</li><li>The subjectivity of the assumptions used.</li></ul>"
      },
      {
        "id": "09ead609-6f5c-46b1-96f2-defa59876787",
        "title": "Examples of Situations Requiring Accounting Estimates",
        "keywords": [
          {
            "icon": "warning-triangle",
            "label": "Non-fair-value — doubtful debts/warranty/depreciation"
          },
          {
            "icon": "scale",
            "label": "Non-fair-value — litigation settlements"
          },
          {
            "icon": "trophy",
            "label": "Fair-value — complex instruments/share-based payments"
          },
          {
            "icon": "handshake",
            "label": "Fair-value — business combinations/non-monetary exchange"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Non-fair-value estimates:</strong></p>\n<ul><li>Allowance for doubtful accounts.</li><li>Inventory obsolescence.</li><li>Warranty obligations.</li><li>Depreciation method or asset useful life.</li><li>Provision against carrying amount of an investment, where recoverability is uncertain.</li><li>Outcome of long-term contracts.</li><li>Financial obligations/costs from litigation settlements and judgments.<p><strong>Fair-value estimates:</strong></p></li><li>Complex financial instruments not traded in an active/open market.</li><li>Share-based payments.</li><li>Property/equipment held for disposal.</li><li>Assets/liabilities acquired in a business combination, including goodwill and intangibles.</li><li>Non-monetary exchanges between independent parties — e.g. exchange of plant facilities in different business lines.</li></ul>"
      },
      {
        "id": "281ed3c9-6482-469d-b280-79d9823b13be",
        "title": "Risk Assessment Procedures — Identifying and Assessing ROMM",
        "keywords": [
          {
            "icon": "raincloud",
            "label": "Evaluate degree of estimation uncertainty"
          },
          {
            "icon": "flag",
            "label": "Significant risk determination"
          },
          {
            "icon": "open-book",
            "label": "Understand FRF requirements"
          },
          {
            "icon": "compass",
            "label": "Understand management's estimation process"
          },
          {
            "icon": "gear",
            "label": "Method/controls/expert/assumptions/change/uncertainty assessed"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ol type=\"a\"><li>In identifying/assessing ROMM as per SA 315, evaluate the <strong>degree of estimation uncertainty</strong>.</li><li>Determine whether an estimate with high estimation uncertainty gives rise to a <strong>significant risk</strong>.</li></ol>\n<p><strong>How does the auditor minimise the ROMM?</strong></p>\n<ul><li>Obtain an understanding of: requirements of the applicable FRF; how management identifies transactions/events/conditions needing estimates, by inquiry.</li></ul>\n<p>Understand management's estimation-making process:</p>\n<ol type=\"i\"><li>The <strong>method</strong> used in making the estimate.</li><li>Relevant <strong>controls</strong>.</li><li>Whether management has used an <strong>expert</strong>.</li><li>The <strong>assumptions</strong> underlying the estimate.</li><li>Whether there has been a <strong>change from the prior period</strong> in methods, and if so, why; and</li><li>Whether/how management has assessed the effect of <strong>estimation uncertainty</strong>.</li></ol>"
      },
      {
        "id": "1370275d-1164-429b-8f8c-219ca442d827",
        "title": "Inquiries from Management",
        "keywords": [
          {
            "icon": "tag",
            "label": "New types of transactions"
          },
          {
            "icon": "link-chain",
            "label": "Changed terms of transactions"
          },
          {
            "icon": "calculator",
            "label": "Changed accounting policies"
          },
          {
            "icon": "megaphone",
            "label": "Regulatory/other changes outside control"
          },
          {
            "icon": "flag",
            "label": "New conditions/events"
          },
          {
            "icon": "magnify",
            "label": "Auditor identifies estimates management missed"
          },
          {
            "icon": "clipboard-check",
            "label": "Recognition and measurement criteria — SAAE"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Inquiries about changes in circumstances may include whether:</p>\n<ul><li>The entity has engaged in <strong>new types of transactions</strong> giving rise to estimates.</li><li>The terms of transactions giving rise to estimates have <strong>changed</strong>.</li><li>Accounting policies relating to estimates have <strong>changed</strong>, due to FRF requirements or otherwise.</li><li><strong>Regulatory or other changes</strong> outside management's control have occurred requiring revised/new estimates.</li><li><strong>New conditions or events</strong> have occurred giving rise to the need for new/revised estimates.</li></ul>\n<p>The auditor may identify transactions/events/conditions needing estimates that management failed to identify — SA 315 treats this as a possible <strong>significant deficiency</strong> in the risk assessment process.</p>\n<p><strong>Recognition and measurement criteria:</strong> for estimates giving rise to significant risks, the auditor shall obtain SAAE as to whether the following are as per the applicable FRF:</p>\n<ol type=\"a\"><li>Management's decision to <strong>recognise or not recognise</strong> the estimate; and</li><li>The selected <strong>measurement basis</strong>.</li></ol>"
      },
      {
        "id": "e5cbcfca-7e50-4f1e-8774-4ba0a763e424",
        "title": "Auditor's Response to Assessed ROMM (SA 330)",
        "keywords": [
          {
            "icon": "stamp",
            "label": "FRF requirements appropriately applied"
          },
          {
            "icon": "mirror",
            "label": "Methods appropriate and consistent"
          },
          {
            "icon": "calendar",
            "label": "Events up to report date"
          },
          {
            "icon": "magnify",
            "label": "Test management's process and data"
          },
          {
            "icon": "shield-check",
            "label": "Test operating effectiveness of controls"
          },
          {
            "icon": "crystal-ball",
            "label": "Develop a point estimate/range"
          },
          {
            "icon": "seesaw",
            "label": "Auditor's own assumptions vs management's"
          },
          {
            "icon": "target",
            "label": "Narrow the range"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Based on the assessed ROMM, the auditor shall determine:</p>\n<ol type=\"a\"><li>Whether management appropriately applied the <strong>FRF requirements</strong> to the estimate; and</li><li>Whether the <strong>methods</strong> are appropriate and consistently applied, and whether changes from the prior period are appropriate.</li></ol>\n<p>In responding to assessed ROMM (per SA 330), undertake one or more of:</p>\n<ol type=\"a\"><li>Determine whether <strong>events up to the report date</strong> provide evidence regarding the estimate.</li><li><strong>Test how management made</strong> the estimate and the underlying data — evaluating whether: (i) the measurement method is appropriate; and (ii) assumptions are reasonable in light of FRF objectives.</li><li>Test the <strong>operating effectiveness of controls</strong> over how the estimate was made, with appropriate substantive procedures.</li><li><strong>Develop a point estimate or range</strong> to evaluate management's point estimate.</li></ol>\n<p>For this purpose:</p>\n<ol type=\"i\"><li>When using <strong>different assumptions/methods</strong> from management, understand management's assumptions/methods sufficiently to ensure relevant variables are considered, and evaluate significant differences.</li><li>When it is appropriate to use a range, <strong>narrow the range</strong> based on available evidence, until all outcomes within it are reasonable.</li></ol>"
      },
      {
        "id": "e48d74c7-da89-48f8-9873-beb348560720",
        "title": "Estimation Uncertainty — Estimates with Significant Risk",
        "keywords": [
          {
            "icon": "compass",
            "label": "Alternative assumptions/outcomes considered"
          },
          {
            "icon": "scale",
            "label": "Reasonableness of significant assumptions"
          },
          {
            "icon": "target",
            "label": "Management's intent and ability"
          },
          {
            "icon": "crystal-ball",
            "label": "Develop a range if inadequately addressed"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>For estimates giving rise to significant risks, in addition to other substantive procedures under SA 330, the auditor shall evaluate:</p>\n<ol type=\"i\"><li>How management has considered <strong>alternative assumptions or outcomes</strong>, and why rejected, or how estimation uncertainty was otherwise addressed.</li><li>Whether the <strong>significant assumptions</strong> used by management are reasonable.</li><li>Where relevant, management's <strong>intent</strong> to carry out specific courses of action, and its <strong>ability</strong> to do so.</li><li>If management has not adequately addressed estimation uncertainty, the auditor shall <strong>develop a range</strong> to evaluate the reasonableness of the estimate.</li></ol>"
      },
      {
        "id": "71b8df85-bc9e-478a-8470-0335d9e0ad8d",
        "title": "Understanding of Assumptions",
        "keywords": [
          {
            "icon": "tag",
            "label": "Nature of assumptions/significance"
          },
          {
            "icon": "clipboard-check",
            "label": "Relevance and completeness"
          },
          {
            "icon": "mirror",
            "label": "Internal consistency"
          },
          {
            "icon": "gear",
            "label": "Matters within/outside management's control"
          },
          {
            "icon": "scroll",
            "label": "Documentation supporting assumptions"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Matters the auditor may consider in understanding the assumptions underlying estimates:</p>\n<ul><li>The <strong>nature</strong> of the assumptions, including which are likely to be <strong>significant</strong>.</li><li>How management assesses whether assumptions are <strong>relevant and complete</strong> (all relevant variables considered).</li><li>How management determines assumptions are <strong>internally consistent</strong>.</li><li>Whether assumptions relate to matters <strong>within management's control</strong> (e.g. maintenance programs affecting useful life) and how they conform to business plans/external environment; or matters <strong>outside its control</strong> (e.g. interest rates, mortality rates, judicial/regulatory actions, future cash flows).</li><li>The nature and extent of <strong>documentation</strong>, if any, supporting the assumptions.</li></ul>"
      },
      {
        "id": "c7979e28-5dcb-48f3-9384-e33093f6722c",
        "title": "Factors Influencing the Degree of Estimation Uncertainty",
        "keywords": [
          {
            "icon": "thumb",
            "label": "Extent of dependence on judgment"
          },
          {
            "icon": "seesaw",
            "label": "Sensitivity to assumption changes"
          },
          {
            "icon": "ruler",
            "label": "Recognised measurement techniques"
          },
          {
            "icon": "hourglass",
            "label": "Length of forecast period"
          },
          {
            "icon": "shield-check",
            "label": "Availability of reliable external data"
          },
          {
            "icon": "eye",
            "label": "Observable vs unobservable inputs"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Estimation Uncertainty (EU):</strong> the susceptibility of an accounting estimate and related disclosures to an inherent lack of precision in its measurement.</p>\n<p>The degree of EU may be influenced by:</p>\n<ul><li>The extent to which the estimate depends on <strong>judgment</strong>.</li><li>The <strong>sensitivity</strong> of the estimate to changes in assumptions.</li><li>The existence of recognised <strong>measurement techniques</strong> that may mitigate the uncertainty.</li><li>The <strong>length of the forecast period</strong>, and relevance of past data to forecast future events.</li><li>The availability of <strong>reliable data</strong> from external sources.</li><li>The extent to which the estimate is based on <strong>observable or unobservable</strong> inputs.</li></ul>"
      },
      {
        "id": "f82c0648-5552-4604-b467-f3c629d50e5a",
        "title": "Review of Outcome of Accounting Estimates",
        "keywords": [
          {
            "icon": "open-book",
            "label": "Review prior period estimates/re-estimation"
          },
          {
            "icon": "tag",
            "label": "Nature of the estimate considered"
          },
          {
            "icon": "warning-triangle",
            "label": "Relevance to current period ROMM"
          },
          {
            "icon": "shield",
            "label": "Not to question prior judgments"
          },
          {
            "icon": "shield-check",
            "label": "Effectiveness of estimation process"
          },
          {
            "icon": "spotlight",
            "label": "Professional skepticism on management bias"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall review the outcome of estimates included in the prior period FS, or their subsequent re-estimation, for the current period's purpose.</p>\n<p>The nature and extent of review considers:</p>\n<ul><li>The nature of the accounting estimates; and</li><li>Whether information from the review is relevant to identifying/assessing current period ROMM.<p>The review is <strong>not intended to question</strong> judgments made in prior periods based on information available at that time.</p><p>Differences between the outcome and the prior period estimate may, through risk assessment procedures on the reasons for such differences, provide:</p></li><li>Information on the <strong>effectiveness</strong> of management's prior period estimation process.</li><li>Audit evidence pertinent to the <strong>re-estimation</strong>, in the current period, of prior period estimates.</li><li>Audit evidence of matters, such as estimation uncertainty, requiring disclosure.</li></ul>\n<p>The review may help identify circumstances increasing susceptibility to <strong>management bias</strong>; professional skepticism assists in identifying such circumstances and determining the NTE of further procedures.</p>"
      },
      {
        "id": "d0ddcb62-a98f-4a16-ac8a-bcd3074100d8",
        "title": "Disclosures in the Financial Statements",
        "keywords": [
          {
            "icon": "clipboard-check",
            "label": "SAAE about disclosures per FRF"
          },
          {
            "icon": "warning-triangle",
            "label": "Significant risk estimates — adequacy of uncertainty disclosure"
          },
          {
            "icon": "scroll",
            "label": "Assumptions/method/basis/sources disclosed"
          },
          {
            "icon": "raincloud",
            "label": "Disclosure may be inadequate despite FRF compliance"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall obtain SAAE about whether disclosures in the FS are as per the applicable FRF. For estimates giving rise to significant risks, the auditor shall evaluate the adequacy of disclosure of their <strong>estimation uncertainty</strong>.</p>\n<ol type=\"a\"><li>Adequate disclosure of material matters may include:<ul><li>Assumptions used.</li><li>The method of estimation used, including any applicable model.</li><li>Any changes in the method from the prior period, and their effect.</li><li>The basis for selection of the estimate.</li><li>The sources and implications of estimation uncertainty.</li></ul></li><li>For a significant-risk estimate, even when disclosures are as per the FRF, the auditor may conclude that disclosure of estimation uncertainty is <strong>inadequate</strong> in light of the circumstances.</li></ol>"
      },
      {
        "id": "90092d53-ae50-4878-ba89-cd224188494c",
        "title": "Written Representations (WR)",
        "keywords": [
          {
            "icon": "gear",
            "label": "Appropriateness of measurement processes"
          },
          {
            "icon": "target",
            "label": "Assumptions reflect intent and ability"
          },
          {
            "icon": "clipboard-check",
            "label": "Disclosure complete and appropriate"
          },
          {
            "icon": "calendar",
            "label": "No subsequent event requiring adjustment"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>SA 580 discusses written representations. Depending on the nature, materiality, and extent of estimation uncertainty, WR about accounting estimates may include representations:</p>\n<ul><li>About the <strong>appropriateness of measurement processes</strong>, including assumptions and models, used by management as per the applicable FRF, and consistency of application.</li><li>That assumptions appropriately reflect management's <strong>intent and ability</strong> to carry out specific courses of action, where relevant.</li><li>That disclosure related to accounting estimates is <strong>complete and appropriate</strong>, under the applicable FRF.</li><li>That <strong>no subsequent event</strong> requires adjustment to the estimates and disclosures included in the FS.</li></ul>"
      }
    ]
  },
  {
    "id": "sa550",
    "title": "SA 550",
    "subtitle": "Related Parties",
    "cards": [
      {
        "id": "40aa84cf-2e0d-4805-9fdf-1c07f75c9bdd",
        "title": "Objectives of the Auditor",
        "keywords": [
          {
            "icon": "link-chain",
            "label": "Understand RP relationships/transactions"
          },
          {
            "icon": "mask",
            "label": "Recognise fraud risk factors"
          },
          {
            "icon": "scale",
            "label": "True and fair / not misleading conclusion"
          },
          {
            "icon": "calculator",
            "label": "SAAE on identification/accounting/disclosure"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ol type=\"a\"><li>Obtain an understanding of related party (RP) relationships and transactions, sufficient to:<ul><li>(i) Recognise <strong>fraud risk factors</strong>, arising from RP relationships and transactions; and</li><li>(ii) Conclude whether the financial statements achieve <strong>true and fair presentation</strong> (fair presentation frameworks), or <strong>are not misleading</strong> (compliance frameworks).</li></ul></li><li>Obtain sufficient appropriate audit evidence (SAAE) about whether related party relationships and transactions have been <strong>identified, accounted for, and disclosed</strong> in the financial statements.</li></ol>"
      },
      {
        "id": "5ba04925-3cac-4a7e-a943-57488cb0a489",
        "title": "Meaning of Related Party",
        "keywords": [
          {
            "icon": "open-book",
            "label": "As defined in the applicable FRF"
          },
          {
            "icon": "gear",
            "label": "Control/significant influence over the entity"
          },
          {
            "icon": "handshake",
            "label": "Common control/close family/key management"
          },
          {
            "icon": "warning-triangle",
            "label": "Exception — common control by a state"
          },
          {
            "icon": "scroll",
            "label": "Ind AS 24 disclosure requirement"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>A related party is a party that is either:</p>\n<ol type=\"i\"><li>. A related party as <strong>defined in the applicable FRF</strong>; or</li><li>. Where the FRF establishes minimal or no requirements:<ul><li>(a) A person/entity with <strong>control or significant influence</strong> over the reporting entity;</li><li>(b) Another entity over which the reporting entity has <strong>control or significant influence</strong>; or</li><li>(c) Another entity under <strong>common control</strong> — common controlling ownership, close family owners, or common key management.</li></ul></li></ol>\n<p><strong>Exception:</strong> entities under common control by a <strong>state</strong> are not considered related, unless they engage in significant transactions or share resources significantly.</p>\n<p><strong>But as per Ind AS 24</strong>, an entity is required to disclose:</p>\n<ol><li>The name of the government, and the nature of its relationship (control/joint control/significant influence).</li><li>Sufficient detail to understand the effect of related party transactions:<ul><li>(i) Nature and amount of each individually significant transaction; and</li><li>(ii) For collectively (not individually) significant transactions, a qualitative/quantitative indication of their extent.</li></ul></li></ol>"
      },
      {
        "id": "36af4fce-7654-4e98-b98d-8f642f70e522",
        "title": "Engagement Team Discussion",
        "keywords": [
          {
            "icon": "binoculars",
            "label": "Nature/extent of RP relationships and transactions"
          },
          {
            "icon": "scroll",
            "label": "Records/documents indicating RPs"
          },
          {
            "icon": "spotlight",
            "label": "Professional skepticism throughout the audit"
          },
          {
            "icon": "ghost",
            "label": "Conditions indicating non-disclosure by management"
          },
          {
            "icon": "gear",
            "label": "Importance attached to internal controls"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Matters that may be addressed in the engagement team discussion:</p>\n<ul><li>The <strong>nature and extent</strong> of the entity's relationships and transactions with related parties.</li><li>Records or documents that may indicate the <strong>existence</strong> of RP relationships/transactions.</li><li>Emphasis on maintaining <strong>professional skepticism</strong> throughout the audit for the potential of material misstatements from RP relationships/transactions.</li><li>Circumstances/conditions indicating RP relationships/transactions <strong>not disclosed</strong> by management to the auditor.</li><li>The importance management and TCWG attach to maintaining <strong>internal controls</strong> regarding identification, accounting for, and disclosure of RP relationships/transactions.</li></ul>"
      },
      {
        "id": "20102cbe-1f65-4496-8b94-56ba47e55152",
        "title": "Understanding the Entity's RP Relationships and Transactions",
        "keywords": [
          {
            "icon": "id-card",
            "label": "Identity of related parties/changes"
          },
          {
            "icon": "link-chain",
            "label": "Nature of relationships"
          },
          {
            "icon": "tag",
            "label": "Type and purpose of transactions"
          },
          {
            "icon": "calculator",
            "label": "Controls to identify/account/disclose"
          },
          {
            "icon": "stamp",
            "label": "Controls to authorise significant RP transactions"
          },
          {
            "icon": "warning-triangle",
            "label": "Controls for transactions outside normal course"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall inquire of management regarding:</p>\n<ol type=\"a\"><li>The <strong>identity</strong> of the entity's related parties, including changes from the prior period.</li><li>The <strong>nature of the relationships</strong> between the entity and these related parties; and</li><li>Whether the entity entered into <strong>transactions</strong> with these related parties, and if so, the type and purpose.</li></ol>\n<p>The auditor shall also inquire of management and others, to understand controls established to:</p>\n<ol type=\"a\"><li><strong>Identify, account for, and disclose</strong> RP relationships/transactions as per the applicable FRF.</li><li><strong>Authorise and approve significant transactions</strong> and arrangements with related parties; and</li><li><strong>Authorise and approve significant transactions</strong> outside the normal course of business.</li></ol>"
      },
      {
        "id": "be519649-54ae-483b-b639-334d740d1ada",
        "title": "Maintaining Alertness — Documents to Inspect",
        "keywords": [
          {
            "icon": "spotlight",
            "label": "Alert when inspecting records/documents"
          },
          {
            "icon": "stamp",
            "label": "Bank/legal/third-party confirmations"
          },
          {
            "icon": "megaphone",
            "label": "TCWG and shareholder meeting minutes"
          },
          {
            "icon": "folder",
            "label": "Income tax returns/internal audit reports"
          },
          {
            "icon": "id-card",
            "label": "Regulatory filings/shareholder registers"
          },
          {
            "icon": "warning-triangle",
            "label": "Contracts outside ordinary course of business"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall remain <strong>alert</strong>, when inspecting records or documents, for arrangements or information indicating RP relationships/transactions not previously identified or disclosed by management.</p>\n<p>Documents to be inspected:</p>\n<ol type=\"a\"><li><strong>Bank, legal, and third-party confirmations</strong> obtained as part of audit procedures.</li><li><strong>Minutes of meetings</strong> of shareholders and of TCWG; and</li><li>Such other records/documents as the auditor considers necessary.</li></ol>\n<p>Examples of other records/documents:</p>\n<ul><li>Entity income tax returns.</li><li>Internal auditors' reports.</li><li>Information supplied to regulatory authorities.</li><li>Documents associated with filings with a securities regulator (e.g. prospectuses).</li><li>Shareholder registers, identifying principal shareholders.</li><li>Records of investments and pension plans.</li><li>Statements of conflicts of interest from management and TCWG.</li><li>Contracts/agreements with key management or TCWG.</li><li>Significant contracts re-negotiated during the period.</li><li>Significant contracts/agreements <strong>not in the ordinary course</strong> of business.</li></ul>\n<p>If significant transactions outside the normal course of business are identified, inquire of management about: the <strong>nature</strong> of the transactions; and whether <strong>related parties</strong> could be involved.</p>"
      },
      {
        "id": "f7712764-872b-4c7f-b950-3c1b7643d2d1",
        "title": "Fraud Risk Factor — Related Party with Dominant Influence",
        "keywords": [
          {
            "icon": "mask",
            "label": "Domination by single person/small group"
          },
          {
            "icon": "brick-wall",
            "label": "Without compensating controls"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The domination of management by a <strong>single person, or a small group of persons</strong>, without compensating controls, is a <strong>fraud risk factor</strong>.</p>"
      },
      {
        "id": "835968bf-eaf1-492f-bda5-f6dd73f2f7d1",
        "title": "Identification of Previously Unidentified/Undisclosed Related Parties",
        "keywords": [
          {
            "icon": "megaphone",
            "label": "Communicate promptly to engagement team"
          },
          {
            "icon": "clipboard-check",
            "label": "Request management identify all transactions"
          },
          {
            "icon": "microphone",
            "label": "Inquire why internal control failed"
          },
          {
            "icon": "magnify",
            "label": "Perform substantive procedures"
          },
          {
            "icon": "crystal-ball",
            "label": "Intentional non-disclosure — evaluate implications"
          },
          {
            "icon": "handshake",
            "label": "Examples — unincorporated partnerships/guarantees"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ol type=\"a\"><li><strong>Promptly communicate</strong> the relevant information to other members of the engagement team.</li><li>Where the FRF establishes related party requirements:<ul><li>Request management to identify <strong>all transactions</strong> with the newly identified related party.</li><li>Inquire as to why the entity's <strong>internal control failed</strong> to identify/disclose the RP relationship/transaction.</li></ul></li><li>Perform appropriate <strong>substantive procedures</strong> relating to the newly identified RP relationships/transactions.</li><li>If non-disclosure appears <strong>intentional</strong>, evaluate the implications for the audit.</li></ol>\n<p>Examples of arrangements indicating undisclosed RP relationships/transactions:</p>\n<ul><li>Participation in unincorporated partnerships with other parties.</li><li>Agreements for services to certain parties, on terms outside the entity's normal course of business.</li><li>Guarantees and guarantor relationships.</li></ul>"
      },
      {
        "id": "1d0e0cb3-7da6-40ae-b8a7-2c54cbd99838",
        "title": "Significant RP Transactions Outside the Normal Course of Business",
        "keywords": [
          {
            "icon": "magnify",
            "label": "Inspect underlying contract/agreement"
          },
          {
            "icon": "mask",
            "label": "Business rationale — fraud/concealment risk"
          },
          {
            "icon": "mirror",
            "label": "Terms consistent with management's explanation"
          },
          {
            "icon": "calculator",
            "label": "Accounted for and disclosed per FRF"
          },
          {
            "icon": "stamp",
            "label": "Authorised and approved"
          },
          {
            "icon": "anchor",
            "label": "Examples — corporate restructurings/circular arrangements/offshore entities"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>If significant RP transactions outside the normal course of business are identified:</p>\n<ol type=\"a\"><li><strong>Inspect the underlying contract or agreement</strong>, and evaluate:<ul><li>Whether the business rationale (or lack thereof) suggests the transaction was entered into to engage in <strong>fraudulent financial reporting</strong>, or to conceal misappropriation of assets;</li><li>Whether the terms are consistent with management's explanation; and</li><li>Whether the transaction has been accounted for and disclosed as per the applicable FRF.</li></ul></li><li>Obtain audit evidence that the transaction has been appropriately <strong>authorised and approved</strong>.</li></ol>\n<p><strong>Examples of transactions outside the entity's normal course of business:</strong></p>\n<ul><li>Complex equity transactions, such as corporate restructurings or acquisitions.</li><li>Leasing of premises, or rendering of management services, to another party if no consideration is exchanged.</li><li>Sales transactions with unusually large discounts or returns.</li><li>Transactions with circular arrangements — e.g. sales with a commitment to repurchase.</li><li>Transactions with offshore entities in jurisdictions with weak corporate laws.</li><li>Transactions under contracts whose terms are changed before expiry.</li></ul>"
      },
      {
        "id": "ebd06f40-77d3-4585-aa33-a7f151928ce9",
        "title": "Obtain Written Representation That",
        "keywords": [
          {
            "icon": "signature",
            "label": "All RPs and transactions disclosed to auditor"
          },
          {
            "icon": "calculator",
            "label": "Properly accounted for and disclosed"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ol type=\"a\"><li>All related parties and related party transactions have been <strong>disclosed</strong> to the auditor; and</li><li>All such transactions have been <strong>properly accounted for and disclosed</strong>.</li></ol>"
      },
      {
        "id": "46f300d1-46c4-414b-9288-8e48f03f5734",
        "title": "Communication with TCWG",
        "keywords": [
          {
            "icon": "megaphone",
            "label": "Communicate significant matters on related parties"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall communicate <strong>significant matters</strong> arising during the audit, in connection with the entity's related parties.</p>"
      },
      {
        "id": "c4be9c5a-a19c-45f2-9e90-3164fc065a4b",
        "title": "Documentation",
        "keywords": [
          {
            "icon": "id-card",
            "label": "Names of related parties"
          },
          {
            "icon": "link-chain",
            "label": "Nature of related party transactions"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall document the <strong>names of the related parties</strong>, and the <strong>nature of the related party transactions</strong>.</p>"
      }
    ]
  },
  {
    "id": "sa560",
    "title": "SA 560",
    "subtitle": "Subsequent Events",
    "cards": [
      {
        "id": "5963f98c-7506-4ace-9d0f-b2f423a74ded",
        "title": "Meaning",
        "keywords": [
          {
            "icon": "calendar",
            "label": "Events between FS date and audit report date"
          },
          {
            "icon": "crystal-ball",
            "label": "Facts known after the audit report date"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ul><li>. <strong>Events occurring between</strong> the date of the financial statements and the date of the auditor's report; and</li><li>. <strong>Facts that become known</strong> to the auditor after the date of the auditor's report.</li></ul>"
      },
      {
        "id": "0d1708b6-cc69-4bf0-b109-d563fc306924",
        "title": "Events Between the FS Date and the Audit Report Date",
        "keywords": [
          {
            "icon": "clipboard-check",
            "label": "SAAE that events requiring adjustment/disclosure identified"
          },
          {
            "icon": "compass",
            "label": "Understand management's procedures"
          },
          {
            "icon": "microphone",
            "label": "Inquire of management"
          },
          {
            "icon": "open-book",
            "label": "Read minutes/subsequent interim FS"
          },
          {
            "icon": "signature",
            "label": "Written representation on adjustment/disclosure"
          },
          {
            "icon": "flag",
            "label": "Specific inquiries — commitments/asset sales/estimates"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ol type=\"a\"><li>Obtain SAAE that events requiring <strong>adjustment or disclosure</strong> in the FS have been identified.</li><li>In determining the NTE of procedures, the auditor shall:<ul><li>Obtain an understanding of management's procedures for identifying subsequent events.</li><li>Inquire of management as to the occurrence of subsequent events affecting the FS.</li><li>Read minutes of management meetings held after the FS date.</li><li>Read the latest available subsequent interim financial statements, if any.</li><li>If events requiring adjustment/disclosure are identified, determine if they are appropriately adjusted/disclosed.<p>Obtain a <strong>written representation</strong> from management that all events subsequent to the FS date requiring adjustment/disclosure have been adjusted or disclosed.</p><p><strong>Specific Inquiries to Be Made of Management:</strong></p></li><li>Whether new commitments, borrowings, or guarantees have been entered into.</li><li>Whether sales or acquisitions of assets have occurred or are planned.</li><li>Whether any assets have been appropriated by the government, or destroyed (e.g. fire or flood).</li><li>Whether any events have occurred relevant to the recoverability of assets.</li><li>Whether there have been increases in capital or issuance of debt instruments (new shares/debentures), or an agreement to merge or liquidate.</li><li>Whether there have been developments regarding contingencies.</li><li>Whether any unusual accounting adjustments have been made or contemplated.</li><li>Whether any events question the appropriateness of accounting policies used — e.g. events questioning the going concern assumption.</li><li>Whether any events are relevant to the measurement of estimates or provisions made.</li></ul></li></ol>"
      },
      {
        "id": "7ff6340e-4d36-43c7-8f2f-51bd4bd0741f",
        "title": "Facts Known After the Report Date but Before the FS Are Issued",
        "keywords": [
          {
            "icon": "clipboard-check",
            "label": "No obligation to perform further procedures"
          },
          {
            "icon": "megaphone",
            "label": "Discuss with management/TCWG"
          },
          {
            "icon": "calendar",
            "label": "Amend and extend procedures — dual dating/EOM"
          },
          {
            "icon": "seesaw",
            "label": "Table — AR not yet provided vs already provided"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ol type=\"a\"><li>No obligation to perform any procedure regarding the FS after the auditor's report (AR) is issued.</li><li>However, if a fact becomes known that had not been known before AR issuance, and which may have caused the AR to be amended, the auditor shall:<ul><li>Discuss the matter with management and TCWG;</li><li>Determine if the FS need amendment; and</li><li>Inquire how management intends to address the matter.</li></ul></li><li>If management amends the FS, the auditor shall:<ul><li>Carry out audit procedures on the amendment;</li><li>Extend procedures to the date of the new audit report; and</li><li>Provide a new audit report on the amended FS, dated not earlier than the approval date of the amended FS.</li></ul></li><li>If law/regulation/FRF permits restricting the amendment to the subsequent event, the auditor may restrict procedures to that amendment — using either:<ul><li><strong>Dual Dating</strong> — an additional date conveying procedures are restricted to the amendment; or</li><li>An <strong>Emphasis of Matter (EOM) / Other Matter (OM) paragraph</strong> conveying the same.</li></ul></li><li><strong>If management does not amend the FS</strong> when required:<ul><li>If the AR has <strong>not yet</strong> been provided to the entity: modify the opinion as per SA 705, then provide the report.</li><li>If the AR has <strong>already</strong> been provided: notify management/TCWG not to issue the FS to third parties; if issued anyway, take action to prevent reliance on the report (obtain legal advice).</li></ul></li></ol>"
      },
      {
        "id": "decc10c8-61a2-45df-8362-2a8b2ede3dd5",
        "title": "Facts Known After the FS Are Issued",
        "keywords": [
          {
            "icon": "microphone",
            "label": "No obligation to make further inquiry"
          },
          {
            "icon": "megaphone",
            "label": "Discuss with management/TCWG"
          },
          {
            "icon": "signature",
            "label": "Amend FS and inform prior recipients"
          },
          {
            "icon": "calendar",
            "label": "Dual dating/EOM if restricted amendment"
          },
          {
            "icon": "clipboard-check",
            "label": "Extend procedures if unrestricted amendment"
          },
          {
            "icon": "warning-triangle",
            "label": "Notify and prevent reliance if not amended"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ol type=\"a\"><li>After FS issuance, no obligation to make any inquiry regarding the FS.</li><li>However, if a fact becomes known that, had it been known at the AR date, may have caused amendment, the auditor shall:<ul><li>Discuss with management and TCWG;</li><li>Determine if the FS need amendment; and</li><li>Inquire how management intends to address the matter.</li></ul></li><li>If management amends the FS, the auditor shall:<ul><li>Carry out audit procedures necessary for the amendment;</li><li>Review steps taken by management to inform everyone who received the previously issued FS and report;</li><li>If a restricted amendment is allowed, use <strong>dual dating</strong> or an OM/EOM paragraph (SA 706);</li><li>If not (unrestricted amendment), extend procedures to the date of the new report, dated no earlier than approval of the amended FS;</li><li>Provide a new audit report on the amended FS, including an EOM/OM paragraph referring to a note discussing the reasons for amendment.</li></ul></li><li>If management does not amend the FS and does not inform users, the auditor shall notify management/TCWG that it will seek to prevent future reliance on the report.</li><li>If, despite notification, no steps are taken, the auditor shall take action to prevent reliance on the report (obtain legal advice).</li></ol>"
      }
