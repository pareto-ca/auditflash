        "explanationHtml": "<p><strong>Responding to Assessed Risks (SA 330)</strong> — the user auditor shall:</p>\n<ol type=\"a\"><li>Determine whether sufficient appropriate audit evidence concerning the relevant assertions is available from records held at the <strong>user entity</strong>; and, if not,</li><li>Perform <strong>further audit procedures</strong> to obtain sufficient appropriate evidence, or use another auditor to perform those procedures at the service organisation on the user auditor's behalf.</li></ol>\n<p><strong>Tests of Controls</strong> — when the user auditor's risk assessment includes an expectation that controls at the service organisation are operating effectively, evidence about their operating effectiveness shall be obtained from one or more of:</p>\n<ul><li>Obtaining a <strong>Type 2 report</strong>, if available;</li><li>Performing appropriate <strong>tests of controls</strong> at the service organisation; or</li><li>Using another auditor to perform <strong>tests of controls</strong> at the service organisation on the user auditor's behalf.</li></ul>"
      },
      {
        "id": "0e2d2d23-c556-4760-9c2e-f82e66ec3b83",
        "title": "Using a Type 2 Report as Evidence of Operating Effectiveness",
        "keywords": [
          {
            "icon": "calendar",
            "label": "Date/period appropriate"
          },
          {
            "icon": "puzzle",
            "label": "Complementary user entity controls tested"
          },
          {
            "icon": "hourglass",
            "label": "Adequacy of time period covered"
          },
          {
            "icon": "target",
            "label": "Relevance to assertions"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>If the user auditor plans to use a Type 2 report as audit evidence that controls at the service organisation are operating effectively, the user auditor shall determine whether the report provides sufficient appropriate evidence by:</p>\n<ol type=\"a\"><li>Evaluating whether the description, design, and <strong>operating effectiveness</strong> of controls is at a date or for a period appropriate for the user auditor's purposes;</li><li>Determining whether <strong>complementary user entity controls</strong> identified by the service organisation are relevant, and if so, obtaining an understanding of whether the user entity has designed, implemented, and — if so — <strong>tested their operating effectiveness</strong>;</li><li>Evaluating the <strong>adequacy of the time period</strong> covered by the tests of controls and the time elapsed since their performance; and</li><li>Evaluating whether the tests of controls performed by the service auditor, and their results as described in the report, are <strong>relevant to the assertions</strong> in the user entity's financial statements and provide sufficient appropriate evidence to support the user auditor's risk assessment.</li></ol>"
      },
      {
        "id": "70aea043-b240-4760-8e57-4b5083bdf333",
        "title": "Fraud/Non-Compliance at the Service Organisation & Reporting by the User Auditor",
        "keywords": [
          {
            "icon": "megaphone",
            "label": "Inquire of management"
          },
          {
            "icon": "hourglass",
            "label": "Evaluate effect on NTE"
          },
          {
            "icon": "warning-triangle",
            "label": "Modify opinion if evidence insufficient"
          },
          {
            "icon": "broken-chain",
            "label": "Not refer to service auditor unless required"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Fraud, non-compliance, and uncorrected misstatements</strong> — the user auditor shall inquire of management of the user entity whether the service organisation has reported, or whether the user entity is otherwise aware of, any fraud, non-compliance with laws and regulations, or uncorrected misstatements affecting the user entity's financial statements. The user auditor shall evaluate how such matters affect the <strong>nature, timing, and extent (NTE)</strong> of further audit procedures, including the effect on conclusions and the user auditor's report.</p>\n<p><strong>Reporting by the User Auditor</strong>:</p>\n<ul><li>The user auditor shall <strong>modify the opinion</strong> in the user auditor's report as per SA 705 if unable to obtain sufficient appropriate audit evidence regarding the services provided by the service organisation relevant to the audit.</li><li>The user auditor shall <strong>not refer to the work of a service auditor</strong> in a report containing an unmodified opinion, unless required to do so by law or regulation — and if so required, the report shall indicate that the reference does not diminish the user auditor's responsibility for the opinion.</li><li>If reference to the service auditor's work is relevant to understanding a <strong>modification</strong> to the user auditor's opinion, the report shall similarly indicate that the reference does not diminish the user auditor's responsibility for that opinion.</li></ul>"
      }
    ]
  },
  {
    "id": "sa450",
    "title": "SA 450 – Evaluation of Misstatements Identified During the Audit",
    "subtitle": "Accumulating, communicating, and evaluating the materiality of uncorrected misstatements.",
    "cards": [
      {
        "id": "67aede32-bc45-4230-9afb-f8ee5df19716",
        "title": "Objective",
        "keywords": [
          {
            "icon": "target",
            "label": "Effect on the audit"
          },
          {
            "icon": "warning-triangle",
            "label": "Effect of uncorrected misstatements"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The objective of the auditor is to evaluate:</p>\n<ol type=\"a\"><li>The <strong>effect of identified misstatements</strong> on the audit; and</li><li>The <strong>effect of uncorrected misstatements</strong>, if any, on the financial statements.</li></ol>"
      },
      {
        "id": "2859700d-5c08-421d-9eeb-9cf4eda1e879",
        "title": "Accumulation of Identified Misstatements",
        "keywords": [
          {
            "icon": "ruler",
            "label": "Clearly trivial threshold"
          },
          {
            "icon": "scale",
            "label": "Trivial vs not material"
          },
          {
            "icon": "clipboard-check",
            "label": "Factual misstatements"
          },
          {
            "icon": "crystal-ball",
            "label": "Judgmental misstatements"
          },
          {
            "icon": "magnify",
            "label": "Projected misstatements"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall accumulate misstatements identified during the audit, other than those that are <strong>clearly trivial</strong>.</p>\n<ul><li>The auditor may designate an amount below which misstatements would be <strong>clearly trivial</strong> and need not be accumulated.</li><li>\"<strong>Clearly trivial</strong>\" is not the same as \"not material\" — trivial matters are of a wholly different (smaller) order of magnitude or nature, and clearly inconsequential by any criteria of size, nature, or circumstances.</li><li>Where there is <strong>uncertainty</strong> about whether an item is clearly trivial, it is considered <strong>not to be clearly trivial</strong>.<p>Types of misstatements distinguished when evaluating and communicating:</p></li><li><strong>Factual misstatements</strong> — misstatements about which there is no doubt.</li><li><strong>Judgmental misstatements</strong> — differences in management's judgments on accounting estimates the auditor finds unreasonable, or accounting policy selection/application the auditor finds inappropriate.</li><li><strong>Projected misstatements</strong> — the auditor's best estimate of misstatements in populations, projecting sample misstatements to the entire population.</li></ul>"
      },
      {
        "id": "d7bc93db-4532-4fa1-a7a0-4ba9c62236db",
        "title": "Consideration of Identified Misstatements as the Audit Progresses",
        "keywords": [
          {
            "icon": "ghost",
            "label": "Other misstatements may exist"
          },
          {
            "icon": "warning-triangle",
            "label": "Aggregate approaching materiality"
          },
          {
            "icon": "gear",
            "label": "Additional procedures after correction"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall determine whether the overall audit strategy and plan need to be revised if:</p>\n<ol type=\"a\"><li>The nature and circumstances of identified misstatements indicate <strong>other misstatements may exist</strong> that, aggregated, could be material; or</li><li>The <strong>aggregate of misstatements accumulated approaches materiality</strong> as determined under SA 320.</li></ol>\n<p>If, at the auditor's request, management has examined and corrected detected misstatements, the auditor shall perform <strong>additional audit procedures</strong> to determine whether misstatements remain.</p>"
      },
      {
        "id": "cabc1680-7a31-48e4-b9fc-a41920a9561b",
        "title": "Communication and Correction of Misstatements",
        "keywords": [
          {
            "icon": "megaphone",
            "label": "Communicate to management on timely basis"
          },
          {
            "icon": "broken-chain",
            "label": "Management refuses to correct"
          },
          {
            "icon": "mask",
            "label": "Possible indicator of bias"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall <strong>communicate all accumulated misstatements</strong> with the appropriate level of management on a timely basis, requesting correction.</p>\n<p>If management refuses, the auditor shall obtain an <strong>understanding of management's reasons</strong> for not correcting, and take this into account when evaluating whether the FS as a whole are free from material misstatement — this may be an <strong>indicator of management bias</strong>.</p>"
      },
      {
        "id": "5dce6592-d9e6-499d-84df-bc938bf3018d",
        "title": "Uncorrected Misstatements",
        "keywords": [
          {
            "icon": "folder",
            "label": "Accumulated and not corrected"
          },
          {
            "icon": "handshake",
            "label": "Discuss impact with management"
          },
          {
            "icon": "scale",
            "label": "Reassess materiality per SA 320"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Uncorrected misstatements</strong> are misstatements the auditor has accumulated during the audit that have not been corrected.</p>\n<p>The auditor discusses the impact of uncorrected misstatements, and the auditor's response to them, with the appropriate level of management.</p>\n<p>Prior to evaluating the effect of uncorrected misstatements, the auditor shall <strong>reassess materiality</strong> as determined under SA 320, to confirm it remains appropriate given the entity's actual financial results.</p>"
      },
      {
        "id": "ba1f3e39-246a-49df-a288-8d4871ec6430",
        "title": "Determining Whether Uncorrected Misstatements Are Material",
        "keywords": [
          {
            "icon": "ruler",
            "label": "Size and nature of misstatements"
          },
          {
            "icon": "calendar",
            "label": "Effect of prior period items"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall determine whether uncorrected misstatements are material, individually or in aggregate, considering:</p>\n<ol type=\"i\"><li>The <strong>size and nature</strong> of the misstatements — both for particular ABCD and the FS as a whole — and the particular circumstances of their occurrence; and</li><li>The <strong>effect of uncorrected misstatements related to prior periods</strong> on the relevant ABCD and the FS as a whole.</li></ol>"
      },
      {
        "id": "37f1a947-e737-4e72-b7be-01bcaeecac4d",
        "title": "Communication with TCWG",
        "keywords": [
          {
            "icon": "stamp",
            "label": "Effect on the auditor's opinion"
          },
          {
            "icon": "flag",
            "label": "Identify material items individually"
          },
          {
            "icon": "megaphone",
            "label": "Request correction"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall communicate with TCWG <strong>uncorrected misstatements</strong>, and the effect they, individually or in aggregate, may have on the <strong>opinion in the auditor's report</strong>, unless prohibited by law or regulation.</p>\n<p>The communication shall <strong>identify material uncorrected misstatements individually</strong>.</p>\n<p>The auditor shall request that uncorrected misstatements be <strong>corrected</strong>.</p>"
      },
      {
        "id": "06254f6f-8a26-45b6-97a6-787f3869ca7c",
        "title": "Written Representation",
        "keywords": [
          {
            "icon": "thumb",
            "label": "Effects are immaterial individually and in aggregate"
          },
          {
            "icon": "signature",
            "label": "Summary attached to representation"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall request a <strong>written representation</strong> from management and, where appropriate, TCWG, as to whether they believe the <strong>effects of uncorrected misstatements are immaterial</strong>, individually and in the aggregate, to the FS as a whole.</p>\n<p>A <strong>summary</strong> of such items shall be included in or attached to the written representation.</p>"
      },
      {
        "id": "cd9f3dd8-5e08-44a8-90a8-3d119f97b6d6",
        "title": "Conclusion & Documentation",
        "keywords": [
          {
            "icon": "broken-chain",
            "label": "Management refuses to adjust"
          },
          {
            "icon": "magnify",
            "label": "Extended procedures inconclusive"
          },
          {
            "icon": "ruler",
            "label": "Trivial threshold documented"
          },
          {
            "icon": "scroll",
            "label": "Conclusion and basis documented"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Conclusion</strong> — if management refuses to adjust the financial information, and extended audit procedures do not enable the auditor to conclude the aggregate of uncorrected misstatements is not material, the auditor should <strong>report accordingly</strong>.</p>\n<p><strong>Documentation</strong> shall include:</p>\n<ol type=\"a\"><li>The amount below which misstatements would be regarded as <strong>clearly trivial</strong>.</li><li><strong>All misstatements</strong> accumulated during the audit, and whether they have been corrected; and</li><li>The auditor's <strong>conclusion</strong> as to whether uncorrected misstatements are material, individually or in aggregate, and the <strong>basis</strong> for that conclusion.</li></ol>"
      }
    ]
  },
  {
    "id": "sa500",
    "title": "SA 500",
    "subtitle": "Audit Evidence",
    "cards": [
      {
        "id": "360ad79b-f256-48bf-8299-a5c99d53bc46",
        "title": "Objective",
        "keywords": [
          {
            "icon": "clipboard-check",
            "label": "Design and perform audit procedures"
          },
          {
            "icon": "shield-check",
            "label": "Sufficient appropriate audit evidence (SAAE)"
          },
          {
            "icon": "trophy",
            "label": "Reasonable conclusions"
          },
          {
            "icon": "signature",
            "label": "Auditor's opinion"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The objective of the auditor is to <strong>design and perform audit procedures</strong> to enable the auditor to obtain <strong>sufficient appropriate audit evidence (SAAE)</strong>, to draw <strong>reasonable conclusions</strong> on which to base the auditor's opinion.</p>"
      },
      {
        "id": "67559fac-128e-424f-b275-9ec60c1b5ea6",
        "title": "Information to Be Used as Audit Evidence",
        "keywords": [
          {
            "icon": "shield-check",
            "label": "Relevance and reliability"
          },
          {
            "icon": "graduation-cap",
            "label": "Management's expert"
          },
          {
            "icon": "calculator",
            "label": "Field other than accounting/auditing"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall consider the <strong>relevance and reliability</strong> of information to be used as audit evidence.</p>\n<p><strong>Management's expert:</strong> an individual or organisation possessing expertise in a <strong>field other than accounting or auditing</strong>, whose work is used by the entity in preparing the financial statements.</p>"
      },
      {
        "id": "8a11a82d-a52a-4f8c-892f-dff3b79aa6a6",
        "title": "Auditor's Responsibility When Relying on a Management Expert's Work",
        "keywords": [
          {
            "icon": "scale",
            "label": "Competence, capabilities, objectivity (CCO)"
          },
          {
            "icon": "warning-triangle",
            "label": "SSAFI threats"
          },
          {
            "icon": "shield",
            "label": "Safeguards"
          },
          {
            "icon": "open-book",
            "label": "Understanding of the expert's work"
          },
          {
            "icon": "thumb",
            "label": "Appropriateness of the expert's work"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>(a) Evaluate the competence, capabilities, and objectivity (CCO)</strong> of the expert. Sources of information include:</p>\n<ol type=\"i\"><li>Personal experience with previous work of the expert.</li><li>Discussions with the expert, or with others familiar with the expert's work.</li><li>Knowledge of the expert's qualifications, membership of a professional body, license to practice, or other external recognition.</li><li>Published papers or books written by that expert.</li><li>An auditor's expert, if any, assisting the auditor with information produced by the management's expert.</li></ol>\n<p><strong>Evaluating objectivity — threats:</strong> self-interest, advocacy, familiarity, self-review, and intimidation threats (<strong>SSAFI</strong>).</p>\n<ul><li>. Safeguards may reduce such threats, created by external structures (profession/legislation/regulation) or the expert's work environment (quality control policies).</li><li>. Safeguards cannot eliminate all threats; the threat from being an employee of the entity is always present, so an employed expert cannot ordinarily be regarded as more objective than other employees.</li><li>. Interests/relationships creating threats may include: financial interests, business and personal relationships, provision of other services.<p><strong>(b) Obtain an understanding of the work of the expert</strong> — assumptions and methods used, and whether generally accepted in that field and appropriate for financial reporting.</p><p><strong>(c) Evaluate the appropriateness of the expert's work</strong> as audit evidence for the relevant assertion, considering:</p></li><li>Relevance and reasonableness of findings/conclusions, and consistency with other audit evidence.</li><li>Relevance and reasonableness of significant assumptions and methods used.</li><li>Relevance, completeness, and accuracy of significant source data used.</li></ul>"
      },
      {
        "id": "abec181c-7bd4-4362-8017-951ac47d46d9",
        "title": "Matters Affecting NTE of Audit Procedures (Management's Expert)",
        "keywords": [
          {
            "icon": "puzzle",
            "label": "Nature and complexity of the matter"
          },
          {
            "icon": "raincloud",
            "label": "ROMM in the matter"
          },
          {
            "icon": "compass",
            "label": "Availability of alternative evidence sources"
          },
          {
            "icon": "seesaw",
            "label": "Employed vs engaged expert"
          },
          {
            "icon": "gear",
            "label": "Control/influence over the expert's work"
          },
          {
            "icon": "graduation-cap",
            "label": "Auditor's knowledge of expert's field"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Matters affecting the <strong>nature, timing, and extent (NTE)</strong> of audit procedures where a management's expert's work is used:</p>\n<ol type=\"a\"><li>The nature and complexity of the matter to which the expert relates.</li><li>The risk of material misstatement (ROMM) in the matter.</li><li>The availability of alternative sources of audit evidence.</li><li>The nature, scope, and objectives of the expert's work.</li><li>Whether the expert is <strong>employed</strong> by the entity, or <strong>engaged</strong> by it.</li><li>The extent to which management can exercise control or influence over the expert's work.</li><li>Whether the expert is subject to technical performance standards or other professional/industry requirements.</li><li>The nature and extent of controls within the entity over the expert's work.</li><li>The auditor's knowledge and experience of the expert's field of expertise.</li><li>The auditor's previous experience of the work of that expert.</li></ol>"
      },
      {
        "id": "5fa9df06-7b1f-44b6-af70-bc3c953ec22f",
        "title": "Methods of Obtaining Audit Evidence",
        "keywords": [
          {
            "icon": "eye",
            "label": "Observation"
          },
          {
            "icon": "magnify",
            "label": "Inspection"
          },
          {
            "icon": "stamp",
            "label": "External confirmation"
          },
          {
            "icon": "calculator",
            "label": "Recalculation"
          },
          {
            "icon": "gear",
            "label": "Reperformance"
          },
          {
            "icon": "compass",
            "label": "Analytical procedures"
          },
          {
            "icon": "microphone",
            "label": "Inquiry"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Observation:</strong> looking at a process or procedure being performed by others — e.g. inventory counting, or performance of control activities.</p>\n<p><strong>Inspection:</strong> examining records or documents (internal/external, paper/electronic), or physical examination of an asset.</p>\n<p><strong>External Confirmation:</strong> audit evidence obtained as a direct written response from a third party (the confirming party).</p>\n<p><strong>Recalculation:</strong> checking the mathematical accuracy of documents/records, manually or electronically.</p>\n<p><strong>Reperformance:</strong> the auditor's independent execution of procedures or controls originally performed as part of internal control.</p>\n<p><strong>Analytical Procedures:</strong> evaluations of financial information through study of plausible relationships among financial and non-financial data.</p>\n<p><strong>Inquiry:</strong></p>\n<ul><li>Seeking information from knowledgeable persons, financial and non-financial, within or outside the entity; ranges from formal written to informal oral inquiries.</li><li>Used extensively throughout the audit, in addition to other procedures; evaluating responses is an integral part of the process.</li><li>Responses may provide new information or corroborative evidence, or may differ significantly from other information obtained (e.g. possibility of management override of controls).</li><li>Responses may lead the auditor to modify or perform additional audit procedures.</li><li>For inquiries about management's intent, corroboration may be limited — understanding management's past history, reasons for a course of action, and ability to pursue it, may help corroborate the evidence.</li><li>Written representations from management/TCWG may be obtained to confirm responses to oral inquiries.</li></ul>"
      },
      {
        "id": "9adb0473-731a-4523-af91-3b094c5330df",
        "title": "Factors Indicating Reliability of Audit Evidence",
        "keywords": [
          {
            "icon": "shield",
            "label": "Independent sources"
          },
          {
            "icon": "shield-check",
            "label": "Effective related controls"
          },
          {
            "icon": "link-chain",
            "label": "Directly obtained evidence"
          },
          {
            "icon": "scroll",
            "label": "Documentary form"
          },
          {
            "icon": "id-card",
            "label": "Original documents"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Reliability of audit evidence is increased when obtained from <strong>independent sources</strong> outside the entity.</p>\n<p>Reliability of internally generated audit evidence is increased when the <strong>related controls are effective</strong>.</p>\n<p>Evidence obtained <strong>directly</strong> by the auditor (e.g. observation of a control) is more reliable than evidence obtained indirectly or by inference (e.g. inquiry about a control).</p>\n<p>Evidence in <strong>documentary form</strong> is more reliable than evidence obtained orally.</p>\n<p>Evidence from <strong>original documents</strong> is more reliable than from photocopies, facsimiles, or filmed/digitised/electronic reproductions.</p>"
      },
      {
        "id": "3a440c95-a794-4eeb-89a7-dabe967f69a2",
        "title": "Inconsistency or Doubts Over Reliability of Audit Evidence",
        "keywords": [
          {
            "icon": "warning-triangle",
            "label": "Evidence inconsistent between sources"
          },
          {
            "icon": "gear",
            "label": "Modifications/additions to audit procedures"
          },
          {
            "icon": "binoculars",
            "label": "Effect on other aspects of the audit"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>If audit evidence obtained from one source is <strong>inconsistent</strong> with that from another, or the auditor has doubts over the reliability of information to be used as audit evidence, the auditor shall:</p>\n<ul><li>Determine the <strong>modifications or additions</strong> to audit procedures necessary to resolve the matter; and</li><li>Consider the <strong>effect of the matter</strong>, if any, on other aspects of the audit.</li></ul>"
      }
    ]
  },
  {
    "id": "sa501",
    "title": "SA 501",
    "subtitle": "Audit Evidence — Specific Considerations for Selected Items",
    "cards": [
      {
        "id": "b4448f24-8fee-4709-93f0-e650f5c5df85",
        "title": "Objective",
        "keywords": [
          {
            "icon": "eye",
            "label": "Existence and condition of inventory"
          },
          {
            "icon": "scale",
            "label": "Completeness of litigation and claims"
          },
          {
            "icon": "puzzle",
            "label": "Presentation/disclosure of segment information"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The objective of the auditor is to obtain sufficient appropriate audit evidence regarding:</p>\n<ol type=\"a\"><li>The <strong>existence and condition</strong> of inventory;</li><li>The <strong>completeness of litigation and claims</strong> involving the entity; and</li><li>The <strong>presentation and disclosure</strong> of segment information, as per the applicable FRF.</li></ol>"
      },
      {
        "id": "fab26cc1-a877-47cf-8ecf-af78e692c7b7",
        "title": "Inventory — Audit Evidence Regarding Existence & Condition",
        "keywords": [
          {
            "icon": "clipboard-check",
            "label": "Attendance at physical inventory counting"
          },
          {
            "icon": "ruler",
            "label": "Evaluate counting instructions/procedures"
          },
          {
            "icon": "eye",
            "label": "Observe count procedures"
          },
          {
            "icon": "calculator",
            "label": "Test counts"
          },
          {
            "icon": "folder",
            "label": "Final inventory records"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>When inventory is material, the auditor shall obtain sufficient appropriate audit evidence regarding existence and condition by:</p>\n<ol type=\"a\"><li><strong>Attendance at physical inventory counting</strong>, unless impracticable, to:<ul><li>(i) Evaluate management's instructions/procedures for recording and controlling the count results;</li><li>(ii) Observe the performance of management's count procedures;</li><li>(iii) Inspect the inventory; and</li><li>(iv) Perform test counts; and</li></ul></li><li>Performing audit procedures over the entity's <strong>final inventory records</strong>, to determine whether they accurately reflect the actual count results.</li></ol>\n<p>The auditor also obtains evidence about whether changes in inventory between the count date and the financial statement date are properly recorded, considering:</p>\n<ul><li>Whether perpetual inventory records are properly adjusted;</li><li>The reliability of the entity's perpetual inventory records; and</li><li>The reasons for significant differences between the physical count and the perpetual records.</li></ul>"
      },
      {
        "id": "2050445f-1104-44d8-8945-d82b46ced85b",
        "title": "2.1 Auditor Unable to Attend the Inventory Count",
        "keywords": [
          {
            "icon": "eye",
            "label": "Observe alternative date count"
          },
          {
            "icon": "calculator",
            "label": "Assess changes between count and period-end"
          },
          {
            "icon": "magnify",
            "label": "Verify treatment of discrepancies"
          },
          {
            "icon": "clipboard-check",
            "label": "Cut-off procedures"
          },
          {
            "icon": "signature",
            "label": "Written representation on completeness"
          }
        ],
        "explanationHtml": "<p>If unable to attend due to unforeseen circumstances, the auditor shall <strong>observe some physical counts on an alternative date</strong>.</p>\n<ul><li>Perform procedures to assess whether changes in inventory between the count date and period-end are correctly recorded.</li><li>Verify the treatment given for discrepancies noticed during the physical count.</li><li>Ensure appropriate cut-off procedures were followed by management.</li><li>Obtain management's written representation on: (a) completeness of information provided regarding inventory; and (b) adherence to laid-down procedures for the physical count.</li></ul>"
      },
      {
        "id": "44431d90-0645-419e-82df-7b8bda6ecf05",
        "title": "2.2 If Attendance Is Impracticable",
        "keywords": [
          {
            "icon": "flag",
            "label": "Location/safety reasons"
          },
          {
            "icon": "brick-wall",
            "label": "Difficulty/time/cost not a valid basis"
          },
          {
            "icon": "clipboard-check",
            "label": "Alternative audit procedures"
          },
          {
            "icon": "scroll",
            "label": "Subsequent sale documentation"
          },
          {
            "icon": "gear",
            "label": "Modify opinion (SA 705)"
          }
        ],
        "explanationHtml": "<p>May arise due to the location and nature of inventory — e.g. where the location poses a threat to the auditor's safety.</p>\n<p>As per SA 200, matters of <strong>difficulty, time, or cost</strong> are not a valid basis to omit a procedure or accept less persuasive evidence.</p>\n<p>The auditor should perform <strong>alternative audit procedures</strong> — e.g. inspecting documentation of the subsequent sale of specific items purchased prior to the count.</p>\n<p>If this is not possible, the auditor should <strong>modify the opinion</strong> as per SA 705.</p>"
      },
      {
        "id": "8784384e-97cb-4c0c-9c1e-3c2546752225",
        "title": "2.3 Inventory in the Custody of a Third Party",
        "keywords": [
          {
            "icon": "stamp",
            "label": "Confirmation from third party"
          },
          {
            "icon": "magnify",
            "label": "Inspection/other procedures"
          },
          {
            "icon": "clipboard-check",
            "label": "Attend third party's count"
          },
          {
            "icon": "scroll",
            "label": "Other auditor's/service auditor's report"
          },
          {
            "icon": "folder",
            "label": "Inspect warehouse receipts"
          },
          {
            "icon": "key",
            "label": "Confirm pledged collateral"
          }
        ],
        "explanationHtml": "<p>When material, obtain sufficient appropriate audit evidence regarding existence and condition by performing one or both of:</p>\n<ol type=\"a\"><li>Requesting <strong>confirmation</strong> from the third party as to quantities and condition held on the entity's behalf.</li><li>Performing <strong>inspection or other</strong> audit procedures appropriate in the circumstances.</li></ol>\n<p><strong>If there is doubt over the integrity/objectivity of the third party</strong>, consider:</p>\n<ul><li>Attending, or arranging another auditor to attend, the third party's physical count, if practicable;</li><li>Obtaining another auditor's report, or a service auditor's report, on the adequacy of the third party's internal control;</li><li>Inspecting documentation regarding inventory held by third parties — e.g. warehouse receipts;</li><li>Requesting confirmation from other parties when inventory has been pledged as collateral.</li></ul>\n<p><strong>Note:</strong> also inspect the record of goods sent, tracing it to challans, e-way bills, etc.</p>"
      },
      {
        "id": "56dddd03-77d9-4bd0-8314-aa861cb6bc9f",
        "title": "2.4 Matters Relevant in Planning Attendance",
        "keywords": [
          {
            "icon": "flag",
            "label": "Materiality and ROMM at locations"
          },
          {
            "icon": "gear",
            "label": "Nature of inventory/internal control"
          },
          {
            "icon": "clipboard-check",
            "label": "Adequate instructions issued"
          },
          {
            "icon": "folder",
            "label": "Perpetual inventory system"
          },
          {
            "icon": "hourglass",
            "label": "Stage of completion of WIP"
          },
          {
            "icon": "calculator",
            "label": "Timing of counting"
          },
          {
            "icon": "graduation-cap",
            "label": "Auditor's expert assistance"
          }
        ],
        "explanationHtml": "<p>Matters relevant when planning attendance at physical inventory counting:</p>\n<ul><li>Locations at which inventory is held, including materiality and ROMM at different locations.</li><li>The nature of the inventory.</li><li>The nature of internal control related to inventory.</li><li>Whether adequate procedures are established, and proper instructions issued, for counting.</li><li>Whether the entity maintains a perpetual inventory system.</li><li>The ROMM related to inventory.</li><li>The stages of completion of work in progress.</li><li>The timing of physical inventory counting.</li><li>Whether the assistance of an auditor's expert is needed.</li></ul>"
      },
      {
        "id": "1c8a2c96-ea2f-4521-8f2e-eaed9d8e69dd",
        "title": "Litigation and Claims",
        "keywords": [
          {
            "icon": "microphone",
            "label": "Inquiry of management/in-house counsel"
          },
          {
            "icon": "megaphone",
            "label": "Review TCWG minutes and correspondence"
          },
          {
            "icon": "scale",
            "label": "Review legal expense accounts"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall identify litigation and claims through:</p>\n<ol type=\"a\"><li>Inquiry of management and others within the entity, including <strong>in-house legal counsel</strong>.</li><li>Reviewing minutes of meetings of TCWG, and correspondence between the entity and <strong>external legal counsel</strong>.</li><li>Reviewing <strong>legal expense accounts</strong>.</li></ol>\n<p><strong>Direct Communication with External Legal Counsel (ELC):</strong></p>\n<ul><li>Where a ROMM is assessed regarding identified litigation/claims, or procedures indicate other material litigation/claims may exist, the auditor should seek direct communication with the entity's ELC.</li><li>Done through a <strong>letter of inquiry</strong>, prepared by management and sent by the auditor, requesting the ELC to communicate directly with the auditor.</li><li>If law/regulation/professional body prohibits direct communication, the auditor shall perform alternative audit procedures.</li><li>If management refuses to permit, or ELC refuses to respond, and alternative procedures do not provide SAAE, the auditor should <strong>modify the opinion</strong> as per SA 705.<p><strong>Written Representation:</strong> obtain a representation from management and TCWG that all litigation/claims whose effects should be considered:</p></li><li>Have been disclosed to the auditor; and</li><li>Have been appropriately accounted for and disclosed as per the applicable FRF.</li></ul>"
      },
      {
        "id": "37db0ceb-3dec-4bc3-8f68-1ee33a6e9dc5",
        "title": "Segment Information",
        "keywords": [
          {
            "icon": "compass",
            "label": "Understanding methods used by management"
          },
          {
            "icon": "clipboard-check",
            "label": "Evaluate/test methods applied"
          },
          {
            "icon": "calculator",
            "label": "Analytical/other procedures"
          },
          {
            "icon": "puzzle",
            "label": "Inter-segment eliminations"
          },
          {
            "icon": "target",
            "label": "Comparison with budgets"
          },
          {
            "icon": "flag",
            "label": "Allocation of assets/costs"
          },
          {
            "icon": "mirror",
            "label": "Consistency with prior periods"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall obtain sufficient appropriate audit evidence about presentation/disclosure of segment information as per the applicable FRF, by:</p>\n<ol type=\"a\"><li>Obtaining an understanding of the <strong>methods used by management</strong> in determining segment information, and:<ul><li>(i) Evaluating whether such methods are likely to result in disclosure as per the applicable FRF; and</li><li>(ii) Where appropriate, testing the application of such methods; and</li></ul></li><li>Performing <strong>analytical or other</strong> audit procedures appropriate in the circumstances.</li></ol>\n<p>Matters relevant in understanding the methods used:</p>\n<ol type=\"i\"><li>Sales, transfers, and charges between segments, and elimination of inter-segment amounts.</li><li>Comparisons with budgets and other expected results — e.g. operating profits as a percentage of sales.</li><li>The allocation of assets and costs among segments.</li><li>Consistency with prior periods, and adequacy of disclosures regarding inconsistencies.</li></ol>"
      }
    ]
  },
  {
    "id": "sa505",
    "title": "SA 505",
    "subtitle": "External Confirmations",
    "cards": [
      {
        "id": "83138af6-6faa-46b7-a0bb-12abf0ded00d",
        "title": "Meaning",
        "keywords": [
          {
            "icon": "link-chain",
            "label": "Direct written response from third party"
          },
          {
            "icon": "stamp",
            "label": "Confirming party"
          },
          {
            "icon": "warning-triangle",
            "label": "Exception — response indicates difference"
          },
          {
            "icon": "detective-hat",
            "label": "Investigate exceptions"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>External confirmation:</strong> audit evidence obtained as a <strong>direct written response</strong> to the auditor from a third party (the <strong>confirming party</strong>), in paper form, or by electronic or other medium.</p>\n<p><strong>Exception:</strong> a response indicating a difference between information requested to be confirmed (or contained in the entity's records) and information provided by the confirming party. The auditor shall <strong>investigate exceptions</strong> to determine whether they are indicative of misstatement.</p>"
      },
      {
        "id": "c461be3e-99b1-4eb5-b7a8-845cff0f3a6a",
        "title": "External Confirmation Procedures",
        "keywords": [
          {
            "icon": "stamp",
            "label": "Determine information to be confirmed"
          },
          {
            "icon": "target",
            "label": "Select confirming party"
          },
          {
            "icon": "ruler",
            "label": "Design confirmation requests"
          },
          {
            "icon": "megaphone",
            "label": "Send requests/follow-ups"
          },
          {
            "icon": "spotlight",
            "label": "Layout/presentation"
          },
          {
            "icon": "flag",
            "label": "Assertions being addressed"
          },
          {
            "icon": "signature",
            "label": "Management authorisation"
          },
          {
            "icon": "link-chain",
            "label": "Method of communication"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>When using external confirmation procedures, the auditor shall maintain control over the requests, including:</p>\n<ol type=\"a\"><li>Determining the information to be confirmed or requested.</li><li>Selecting the appropriate confirming party.</li><li>Designing requests, including proper addressing and return information for responses to be sent directly to the auditor.</li><li>Sending requests, including follow-up requests, to the confirming party.</li></ol>\n<p>Factors to consider when designing confirmation requests:</p>\n<ul><li>The layout and presentation of the confirmation request.</li><li>The assertions being addressed.</li><li>Prior experience on the audit or similar engagements.</li><li>The specific identified ROMM, including fraud risks.</li><li>Management's authorisation/encouragement to confirming parties to respond.</li><li>The method of communication (paper, electronic, or other medium).</li><li>The ability of the confirming party to confirm or provide the requested information (e.g. individual invoice vs total balance).</li></ul>"
      },
      {
        "id": "af0e2726-43a6-4a0e-a7df-51b68904ae7e",
        "title": "Management's Refusal to Allow the Auditor to Send a Confirmation Request",
        "keywords": [

            "label": "Inquire reasons for refusal"
          },
          {

            "label": "Evaluate implications on ROMM/fraud risk"
          },
          {
