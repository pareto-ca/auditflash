            "label": "Alternative audit procedures"
          },
          {
            "icon": "megaphone",
            "label": "Communicate with TCWG (SA 260)"
          },
          {
            "icon": "warning-triangle",
            "label": "Determine implications per SA 705"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>If management refuses to allow a confirmation request, the auditor shall:</p>\n<ol type=\"a\"><li>Inquire as to management's reasons for the refusal, and seek evidence as to their validity/reasonableness.</li><li>Evaluate the implications on the ROMM assessment, including fraud risk, and on the NTE of other procedures; and</li><li>Perform <strong>alternative audit procedures</strong> to obtain relevant and reliable evidence.</li></ol>\n<p>If the auditor concludes the refusal is unreasonable, or cannot obtain relevant/reliable evidence from alternative procedures, the auditor shall <strong>communicate with TCWG</strong> as per SA 260, and determine implications for the audit and opinion as per SA 705.</p>"
      },
      {
        "id": "d5884483-263b-4765-b151-0058214188a2",
        "title": "Positive Confirmation Requests (PCR)",
        "keywords": [
          {
            "icon": "stamp",
            "label": "Reply required in all cases"
          },
          {
            "icon": "shield-check",
            "label": "Reliable audit evidence"
          },
          {
            "icon": "mirror",
            "label": "Risk of replying without verifying"
          },
          {
            "icon": "mask",
            "label": "Blank confirmation request"
          },
          {
            "icon": "raincloud",
            "label": "Lower response rates"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>A positive confirmation request asks the confirming party to <strong>reply in all cases</strong>, either indicating agreement or providing the requested information.</p>\n<p>A response is expected to provide <strong>reliable</strong> audit evidence.</p>\n<p>There is a risk that the confirming party may reply <strong>without verifying</strong> that the information is correct.</p>\n<p>The auditor may reduce this risk by using a <strong>\"blank\" confirmation request</strong> — not stating the amount, asking the confirming party to fill it in.</p>\n<p>However, blank requests may result in <strong>lower response rates</strong>, as additional effort is required.</p>"
      },
      {
        "id": "d789a240-7d36-4794-9738-39c8fff18f35",
        "title": "Negative Confirmation Request (NCR)",
        "keywords": [
          {
            "icon": "flag",
            "label": "Respond only if disagree"
          },
          {
            "icon": "thumb",
            "label": "Less persuasive evidence"
          },
          {
            "icon": "shield-check",
            "label": "ROMM assessed as low + controls tested"
          },
          {
            "icon": "puzzle",
            "label": "Large population of homogeneous items"
          },
          {
            "icon": "warning-triangle",
            "label": "Low exception rate expected"
          },
          {
            "icon": "ghost",
            "label": "No response ≠ receipt or accuracy"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>A negative confirmation request asks the confirming party to respond <strong>only if they disagree</strong> with the information provided. NCRs provide <strong>less persuasive</strong> audit evidence than positive confirmations.</p>\n<p>The auditor shall <strong>not use NCRs as the sole substantive procedure</strong> to address an assessed ROMM at the assertion level, unless all of the following are present:</p>\n<ol type=\"a\"><li>The ROMM has been assessed as low, and SAAE obtained regarding operating effectiveness of controls.</li><li>The population comprises a large number of small, homogeneous account balances/transactions/conditions.</li><li>A very low exception rate is expected; and</li><li>The auditor is not aware of circumstances causing recipients to disregard such requests.</li></ol>\n<p><strong>No response (negative confirmation):</strong></p>\n<ul><li>A failure to respond does not indicate receipt by the confirming party, or verification of accuracy.</li><li>A failure to respond provides significantly less persuasive evidence than a positive confirmation.</li><li>Confirming parties may be more likely to respond disagreeing when the information is not in their favour, and less likely to respond otherwise.</li></ul>"
      },
      {
        "id": "ad1b38f1-0f89-471c-94ad-620fdc00f0a3",
        "title": "Alternate Audit Procedures — Non-Responses",
        "keywords": [
          {
            "icon": "calculator",
            "label": "Accounts receivable — subsequent cash receipts/shipping/sales"
          },
          {
            "icon": "folder",
            "label": "Accounts payable — subsequent disbursements/correspondence/GRNs"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Examples of alternative audit procedures the auditor may perform when there is no response:</p>\n<ol type=\"a\"><li><strong>Accounts receivable balances:</strong> examining specific subsequent cash receipts, shipping documentation, and sales near period-end.</li><li><strong>Accounts payable balances:</strong> examining subsequent cash disbursements, or correspondence from third parties, and other records such as goods received notes.</li></ol>"
      },
      {
        "id": "b04652f4-0a88-4d1f-ba80-ce77b827e69f",
        "title": "Reliability of Response",
        "keywords": [
          {
            "icon": "crystal-ball",
            "label": "Evaluate implications on ROMM/fraud"
          },
          {
            "icon": "clipboard-check",
            "label": "NTE of other procedures"
          },
          {
            "icon": "shield-check",
            "label": "Even external evidence may lack reliability"
          },
          {
            "icon": "mask",
            "label": "Risk of interception/alteration/fraud"
          },
          {
            "icon": "ghost",
            "label": "Received indirectly"
          },
          {
            "icon": "stamp",
            "label": "Not appearing to come from confirming party"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>If a response to a confirmation request is <strong>not reliable</strong>, the auditor should evaluate the implications on the ROMM, including fraud risk, and on the NTE of other audit procedures.</p>\n<p>As per SA 500, even evidence from external sources may have circumstances affecting its reliability; all responses carry a risk of <strong>interception, alteration, or fraud</strong> — regardless of paper or electronic medium.</p>\n<p>Factors indicating doubts about the reliability of a response, that it:</p>\n<ul><li>Was received by the auditor <strong>indirectly</strong>; or</li><li>Appeared <strong>not to come originally</strong> from the intended confirming party.</li></ul>\n<p>Unreliable responses may indicate a <strong>fraud risk factor</strong> requiring evaluation.</p>"
      },
      {
        "id": "340fb497-5bca-4cb6-99b2-939dbbbdc954",
        "title": "Areas Where External Confirmation Procedures May Be Used",
        "keywords": [
          {
            "icon": "key",
            "label": "Bank balances/banking relationships"
          },
          {
            "icon": "calculator",
            "label": "Accounts receivable balances/terms"
          },
          {
            "icon": "anchor",
            "label": "Inventories with third parties"
          },
          {
            "icon": "scroll",
            "label": "Property title deeds held by lawyers/financiers"
          },
          {
            "icon": "trophy",
            "label": "Investments held by third parties"
          },
          {
            "icon": "handshake",
            "label": "Amounts due to lenders"
          },
          {
            "icon": "folder",
            "label": "Accounts payable balances/terms"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>As discussed in SA 330, external confirmation procedures may be used for:</p>\n<ul><li>Bank balances and other information relevant to banking relationships.</li><li>Accounts receivable balances and terms.</li><li>Inventories held by third parties at bonded warehouses for processing or on consignment.</li><li>Property title deeds held by lawyers or financiers for safe custody, or as security.</li><li>Investments held by third parties, or purchased from stockbrokers but not delivered at the balance sheet date.</li><li>Amounts due to lenders, including terms of repayment and restrictive covenants.</li><li>Accounts payable balances and terms.</li></ul>"
      },
      {
        "id": "acbeda10-fe07-48a5-8a88-e55c864eaedf",
        "title": "How to Know If We Can Use External Confirmations",
        "keywords": [
          {
            "icon": "stamp",
            "label": "Confirming party's knowledge of subject matter"
          },
          {
            "icon": "handshake",
            "label": "Ability/willingness to respond"
          },
          {
            "icon": "scale",
            "label": "Objectivity of the confirming party"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Factors assisting the auditor in determining whether external confirmations should be performed as substantive procedures:</p>\n<ol type=\"a\"><li>The confirming party's <strong>knowledge</strong> of the subject matter.</li><li>The <strong>ability or willingness</strong> of the confirming party to respond — e.g. the confirming party:<ul><li>May not accept responsibility for responding;</li><li>May consider responding too costly or time-consuming;</li><li>May have concerns about potential legal liability from responding;</li><li>May account for transactions in different currencies; or</li><li>May operate where responding to confirmation requests is not a significant part of day-to-day operations.</li></ul></li><li>The <strong>objectivity</strong> of the confirming party — if a related party of the entity, responses may be less reliable.</li></ol>"
      }
    ]
  },
  {
    "id": "sa510",
    "title": "SA 510",
    "subtitle": "Initial Audit Engagements — Opening Balances",
    "cards": [
      {
        "id": "aad041c8-b90d-4ce9-8c31-92274078e535",
        "title": "Meaning of Initial Audit Engagement",
        "keywords": [
          {
            "icon": "door",
            "label": "Prior period financial statements not audited"
          },
          {
            "icon": "footprint",
            "label": "Prior period audited by predecessor auditor"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>An engagement in which either:</p>\n<ol type=\"i\"><li>The financial statements for the prior period <strong>were not audited</strong>; or</li><li>The financial statements for the prior period <strong>were audited by a predecessor auditor</strong>.</li></ol>"
      },
      {
        "id": "8a3dfcb5-2983-484e-9495-7b3f4512e81b",
        "title": "Objective",
        "keywords": [
          {
            "icon": "door",
            "label": "Opening balances contain material misstatements"
          },
          {
            "icon": "calculator",
            "label": "Consistent application of accounting policies"
          },
          {
            "icon": "scroll",
            "label": "Changes properly accounted/presented/disclosed"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>To obtain sufficient appropriate audit evidence about whether:</p>\n<ol type=\"a\"><li><strong>Opening balances</strong> contain misstatements that materially affect the current period's financial statements; and</li><li>Appropriate accounting policies reflected in the opening balances have been <strong>consistently applied</strong> in the current period, or changes thereto are properly accounted for, presented, and disclosed as per the applicable FRF.</li></ol>"
      },
      {
        "id": "3b8278fc-4bdc-48d7-a7d9-9c5fbc2a4316",
        "title": "Meaning of Opening Balances",
        "keywords": [
          {
            "icon": "calculator",
            "label": "Account balances at beginning of period"
          },
          {
            "icon": "link-chain",
            "label": "Based on prior period's closing balances"
          },
          {
            "icon": "scroll",
            "label": "Includes disclosures — contingencies/commitments"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Account balances that exist at the beginning of the period. Opening balances are based upon the <strong>closing balances of the prior period</strong>, and reflect the effects of prior period transactions/events and accounting policies applied.</p>\n<p>Opening balances also include <strong>disclosures</strong> that existed at the beginning of the period, such as contingencies and commitments.</p>"
      },
      {
        "id": "9a3a541f-bbf8-421e-aa9e-707d32a0510f",
        "title": "Audit Procedures: Opening Balances",
        "keywords": [
          {
            "icon": "open-book",
            "label": "Read most recent FS/predecessor's report"
          },
          {
            "icon": "link-chain",
            "label": "Closing balances correctly brought forward"
          },
          {
            "icon": "calculator",
            "label": "Application of appropriate accounting policies"
          },
          {
            "icon": "folder",
            "label": "Perusing prior year audited FS"
          },
          {
            "icon": "magnify",
            "label": "Evaluating current period evidence"
          },
          {
            "icon": "clipboard-check",
            "label": "Specific procedures on opening balances"
          },
          {
            "icon": "compass",
            "label": "Additional procedures if misstatement found"
          },
          {
            "icon": "megaphone",
            "label": "Communicate per SA 450"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall read the <strong>most recent financial statements (MRFS)</strong>, if any, and the predecessor auditor's report, if any, for information relevant to opening balances, including disclosures.</p>\n<p>The auditor shall obtain SAAE about whether opening balances contain material misstatements, by:</p>\n<ol type=\"a\"><li>Determining whether the prior period's <strong>closing balances</strong> have been correctly brought forward or, where appropriate, adjustments disclosed as prior period items in the current year's P&L.</li><li>Determining whether opening balances reflect the application of <strong>appropriate accounting policies</strong>; and</li><li>Performing one or more of:<ul><li>(i) Where prior year FS were audited, perusing copies of the audited FS;</li><li>(ii) Evaluating whether current period audit procedures provide evidence relevant to opening balances; or</li><li>(iii) Performing specific audit procedures to obtain evidence regarding opening balances.</li></ul></li></ol>\n<p>If evidence shows opening balances contain material misstatements, perform <strong>additional audit procedures</strong> to determine the effect on the current period's FS.</p>\n<p>If misstatements exist in the current period's FS, the auditor shall <strong>communicate</strong> them with management and TCWG, as per <strong>SA 450</strong>.</p>"
      },
      {
        "id": "871f7ead-6d84-46e9-9ffc-921ba7ddb245",
        "title": "Opening Current Assets and Liabilities — Evidence from Current Audit Procedures",
        "keywords": [
          {
            "icon": "folder",
            "label": "Debtors/creditors — collection/payment during current period"
          },
          {
            "icon": "clipboard-check",
            "label": "Inventories — additional procedures needed"
          },
          {
            "icon": "stamp",
            "label": "Non-current assets/liabilities — records and confirmation"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>1. Debtors/Creditors:</strong> collection (payment) of opening accounts receivable (payable) during the current period provides some evidence of their <strong>existence, rights and obligations, completeness, and valuation (ERCV)</strong> at the beginning of the period.</p>\n<p><strong>2. Inventories:</strong> current period audit procedures on the closing inventory balance provide little evidence regarding inventory at the beginning of the period. Additional procedures — one or more of:</p>\n<ul><li>Observing a current physical inventory count, and reconciling it to the opening inventory quantities;</li><li>Performing procedures on the valuation of opening inventory items;</li><li>Performing procedures on gross profit and cut-off.</li></ul>\n<p><strong>3. Non-Current Assets and Liabilities:</strong></p>\n<ol type=\"i\"><li>For PPE, investments, and long-term debt, the auditor examines the accounting records and other information underlying the opening balances.</li><li>In certain cases, evidence regarding opening balances may be obtained through <strong>confirmation with third parties</strong> — e.g. for long-term debt and investments.</li></ol>"
      },
      {
        "id": "03808bb2-b072-4fdd-b935-b78c6ca980c7",
        "title": "Consistency of Accounting Policies",
        "keywords": [
          {
            "icon": "mirror",
            "label": "Consistently applied in current FS"
          },
          {
            "icon": "calculator",
            "label": "Changes properly accounted/disclosed"
          },
          {
            "icon": "warning-triangle",
            "label": "Qualified or adverse opinion (SA 705)"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall obtain SAAE that:</p>\n<ul><li>Accounting policies have been <strong>consistently applied</strong> in the current period's financial statements; and</li><li>Any changes have been properly accounted for, and adequately presented and disclosed, as per the applicable FRF.</li></ul>\n<p>If not, the auditor shall express a <strong>qualified or adverse opinion</strong>, as per SA 705.</p>"
      },
      {
        "id": "88b5e84f-dbb7-4d7d-a745-7e61ebf02124",
        "title": "Conclusion and Reporting",
        "keywords": [
          {
            "icon": "ghost",
            "label": "Unable to obtain SAAE — qualify/disclaim"
          },
          {
            "icon": "warning-triangle",
            "label": "Material misstatement not properly disclosed — qualified/adverse"
          },
          {
            "icon": "gear",
            "label": "Modification in predecessor's report"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ul><li>. <strong>Unable to obtain SAAE:</strong> qualify or disclaim the opinion, as per SA 705.</li><li>. <strong>Opening balance misstatement materially affects current period FS, and is not properly accounted for/disclosed:</strong> express a qualified or adverse opinion, as per SA 705.</li><li>. <strong>Modification in the predecessor auditor's report:</strong> if relevant and material to the current period's FS, modify the current period's audit report.</li></ul>\n<p><strong>Note:</strong> SA 510 connects forward to <strong>SA 710</strong> (Comparative Information).</p>"
      }
    ]
  },
  {
    "id": "sa520",
    "title": "SA 520",
    "subtitle": "Analytical Procedures",
    "cards": [
      {
        "id": "21f21b7c-c286-4473-8921-a1169bade665",
        "title": "Meaning of Analytical Procedures",
        "keywords": [
          {
            "icon": "compass",
            "label": "Evaluations of financial information"
          },
          {
            "icon": "puzzle",
            "label": "Plausible relationships"
          },
          {
            "icon": "folder",
            "label": "Financial and non-financial data"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Analytical procedures:</strong> evaluations of financial information, through analysis of <strong>plausible relationships</strong>, among both <strong>financial and non-financial data</strong>.</p>"
      },
      {
        "id": "541d01a5-15c4-4c8b-99ce-16e790896b63",
        "title": "Objectives of the Auditor",
        "keywords": [
          {
            "icon": "compass",
            "label": "Relevant/reliable evidence via substantive analytical procedures"
          },
          {
            "icon": "trophy",
            "label": "Overall conclusion near end of audit"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ol type=\"a\"><li>Obtaining relevant and reliable audit evidence when using <strong>substantive analytical procedures</strong>; and</li><li>To design and perform analytical procedures <strong>near the end of the audit</strong>, assisting in forming an overall conclusion as to whether the financial statements are consistent with the auditor's understanding of the entity.</li></ol>"
      },
      {
        "id": "614eaff6-1a5c-4fc9-a2b7-e65d31d0bd86",
        "title": "Substantive Analytical Procedures (SAP)",
        "keywords": [
          {
            "icon": "target",
            "label": "Suitability for given assertions"
          },
          {
            "icon": "shield-check",
            "label": "Reliability of underlying data"
          },
          {
            "icon": "crystal-ball",
            "label": "Develop an expectation"
          },
          {
            "icon": "warning-triangle",
            "label": "Acceptable difference/investigation threshold"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>When designing and performing SAP, alone or combined with tests of details, the auditor shall:</p>\n<ol type=\"a\"><li>Determine the <strong>suitability</strong> of particular SAP for given assertions, taking account of the assessed ROMM and tests of details, if any.</li><li>Evaluate the <strong>reliability of data</strong> from which the expectation of recorded amounts/ratios is developed — source, comparability, nature and relevance, and controls over its preparation.</li><li><strong>Develop an expectation</strong> of recorded amounts/ratios, and evaluate whether it is sufficiently precise to identify a material misstatement; and</li><li>Determine the amount of <strong>difference from expected values</strong> that is acceptable without further investigation.</li></ol>"
      },
      {
        "id": "6b1c66ae-d8a0-4020-81ea-bbcb8ccc98b6",
        "title": "Analytical Procedures That Assist in Forming an Overall Conclusion",
        "keywords": [
          {
            "icon": "shield-check",
            "label": "Verify conclusions on individual components"
          },
          {
            "icon": "trophy",
            "label": "Draw reasonable conclusions"
          },
          {
            "icon": "warning-triangle",
            "label": "Identify previously unrecognised ROMM"
          },
          {
            "icon": "gear",
            "label": "Revise ROMM and FAP (SA 315)"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Designed and performed <strong>near the end of the audit</strong>, to assist in forming an overall conclusion as to whether the FS are consistent with the auditor's understanding of the entity.</p>\n<ul><li>The intention is to verify conclusions formed during the audit of individual components or elements of the FS.</li><li>This assists the auditor to draw reasonable conclusions on which to base the opinion.</li><li>Results may identify a previously unrecognised ROMM — SA 315 then requires the auditor to <strong>revise the ROMM</strong>, and modify the further audit procedures (FAP), accordingly.</li><li>Such procedures may be similar to risk assessment procedures.</li></ul>"
      },
      {
        "id": "f3d86f57-a762-4d7a-9944-8d7d7c3507af",
        "title": "Investigating Results of Analytical Procedures",
        "keywords": [
          {
            "icon": "warning-triangle",
            "label": "Fluctuations inconsistent with other information"
          },
          {
            "icon": "microphone",
            "label": "Inquiry of management"
          },
          {
            "icon": "clipboard-check",
            "label": "Other necessary audit procedures"
          },
          {
            "icon": "raincloud",
            "label": "Management unable to explain/explanation inadequate"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>If fluctuations or relationships are inconsistent with other relevant information, or differ significantly from expected values, the auditor shall investigate by:</p>\n<ol type=\"a\"><li><strong>Inquiring of management</strong>, and obtaining appropriate audit evidence relevant to management's responses — evaluated in light of the auditor's understanding of the entity and other evidence obtained.</li><li>Performing <strong>other audit procedures</strong> necessary in the circumstances.</li></ol>\n<p>The need for other procedures may arise when, for example:</p>\n<ul><li>Management is unable to provide an explanation; or</li><li>The explanation, together with the audit evidence obtained, is not considered adequate.</li></ul>"
      }
    ]
  },
  {
    "id": "sa530",
    "title": "SA 530",
    "subtitle": "Audit Sampling",
    "cards": [
      {
        "id": "7bc2473b-96ee-45c1-9158-1bc9d3859616",
        "title": "Objective",
        "keywords": [
          {
            "icon": "trophy",
            "label": "Reasonable basis to draw conclusions about population"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>To provide a <strong>reasonable basis</strong> for the auditor to draw conclusions about the population from which the sample is selected.</p>"
      },
      {
        "id": "e7ee6ca7-f815-4f00-87be-3a946b4b6771",
        "title": "Audit Sampling (Sampling)",
        "keywords": [
          {
            "icon": "target",
            "label": "Application to less than 100% of items"
          },
          {
            "icon": "magnet",
            "label": "All sampling units have a chance of selection"
          },
          {
            "icon": "trophy",
            "label": "Reasonable basis for conclusions on entire population"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The application of audit procedures to <strong>less than 100%</strong> of items within a population, such that all sampling units have a <strong>chance of selection</strong>, to provide the auditor with a reasonable basis on which to draw conclusions about the <strong>entire population</strong>.</p>"
      },
      {
        "id": "845ffd12-a912-416a-8fde-3364c15b3f52",
        "title": "Sampling Risk",
        "keywords": [
          {
            "icon": "seesaw",
            "label": "Conclusion from sample differs from conclusion on entire population"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The risk that the auditor's conclusion based on a sample may be <strong>different</strong> from the conclusion if the entire population were subjected to the same audit procedure.</p>"
      },
      {
        "id": "ada7f390-10d2-4c02-bd3b-0307f73f54e6",
        "title": "Types of Sampling Risks",
        "keywords": [
          {
            "icon": "shield-check",
            "label": "Type I — affects audit effectiveness"
          },
          {
            "icon": "gear",
            "label": "Type II — affects audit efficiency"
          },
          {
            "icon": "warning-triangle",
            "label": "Controls more effective / misstatement doesn't exist"
          },
          {
            "icon": "mask",
            "label": "Controls less effective / misstatement exists"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Sampling risk can lead to two types of erroneous conclusions:</p>\n<ol type=\"i\"><li>. <strong>Effectiveness risk</strong> — in tests of controls (TOCs), that controls are <strong>more effective</strong> than they actually are; or in tests of details (TODs), that a material misstatement <strong>does not exist</strong> when it does. The auditor is primarily concerned with this type, as it affects <strong>audit effectiveness</strong> and is more likely to lead to an inappropriate opinion.</li><li>. <strong>Efficiency risk</strong> — in TOCs, that controls are <strong>less effective</strong> than they actually are; or in TODs, that a material misstatement <strong>exists</strong> when it does not. This affects <strong>audit efficiency</strong>, as it usually leads to additional work to establish the initial conclusion was incorrect.</li></ol>"
      },
      {
        "id": "1ea469cd-4e3f-42bd-b91e-30b299424528",
        "title": "Statistical Sampling",
        "keywords": [
          {
            "icon": "magnet",
            "label": "Random selection of items"
          },
          {
            "icon": "calculator",
            "label": "Probability theory to evaluate results"
          },
          {
            "icon": "compass",
            "label": "Non-statistical sampling"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>An approach to sampling having the following characteristics:</p>\n<ol type=\"i\"><li><strong>Random selection</strong> of sample items; and</li><li>Use of <strong>probability theory</strong> to evaluate sample results, including the measurement of sampling risk.</li></ol>\n<p>A sampling approach without these characteristics is considered <strong>non-statistical sampling</strong>.</p>"
      },
      {
        "id": "2bb6b3e8-1e9f-4717-8fa1-21ca99ffdde6",
        "title": "Tolerable Misstatement (TM)",
        "keywords": [
          {
            "icon": "ruler",
            "label": "Monetary amount set by the auditor"
          },
          {
            "icon": "warning-triangle",
            "label": "Aggregate of immaterial misstatements"
          },
          {
            "icon": "scale",
            "label": "Application of performance materiality"
          },
          {
            "icon": "calculator",
            "label": "Worked example — TM ≤ PM"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The monetary amount set by the auditor, for which the auditor seeks an appropriate level of assurance that this amount is <strong>not exceeded</strong> by the actual misstatement in the population.</p>\n<p>While designing a sample, TM addresses the risk that the aggregate of <strong>individually immaterial misstatements</strong> may cause the FS to be materially misstated, and provides a margin for possible undetected misstatements.</p>\n<p>It is an application of <strong>performance materiality</strong> to a sampling procedure — may be the same amount, or lower than performance materiality.</p>\n<p><strong>Example:</strong> materiality = 5% of net profit (₹100 Cr) → materiality = ₹5 Cr; performance materiality (PM) = ₹1 Cr (lower than overall materiality); tolerable misstatement can be equal to or lower than PM — say TM = ₹50 lakh; the auditor uses ₹50 lakh for the sampling purpose.</p>"
      },
      {
        "id": "6c174c4f-59d7-4d89-afd4-81a84c703e7c",
        "title": "Sample Design, Size, and Selection of Items",
        "keywords": [
          {
            "icon": "target",
            "label": "Purpose of the audit procedure"
          },
          {
            "icon": "folder",
            "label": "Characteristics of the population"
          },
          {
            "icon": "raincloud",
            "label": "Sample size to reduce sampling risk"
          },
          {
            "icon": "magnet",
            "label": "Every sampling unit has a chance of selection"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ol type=\"i\"><li>When designing a sample, consider the <strong>purpose of the audit procedure</strong>, and the <strong>characteristics of the population</strong> from which the sample is drawn.</li><li>Determine a <strong>sample size</strong> sufficient to reduce sampling risk to an acceptably low level.</li><li>Select items such that <strong>each sampling unit</strong> in the population has a chance of selection.</li></ol>"
      },
      {
        "id": "78b3f3da-6c86-4689-91be-f40aaf61d0fd",
        "title": "Stratification and Value-Weighted Selection (For Understanding Only)",
        "keywords": [
          {
            "icon": "puzzle",
            "label": "Stratification — sub-populations by characteristic"
          },
          {
            "icon": "seesaw",
            "label": "Reduce variability within stratum"
          },
          {
            "icon": "ruler",
            "label": "Stratify by monetary value"
          },
          {
            "icon": "crystal-ball",
            "label": "Projection of stratum results"
          },
          {
            "icon": "target",
            "label": "Value-weighted selection — monetary unit as sampling unit"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Stratification:</strong> audit efficiency may improve by dividing a population into discrete sub-populations (strata) having identifying characteristics.</p>\n<ul><li>Objective: reduce the <strong>variability of items</strong> within each stratum, allowing the sample size to be reduced without increasing sampling risk.</li><li><strong>How?</strong> In tests of details, population is often stratified by <strong>monetary value</strong>, directing greater effort to large-value items (more likely overstated). May also be stratified by a characteristic indicating higher ROMM — e.g. age of debtor balances when testing provision for doubtful accounts.<p><strong>Projection:</strong> results of samples from each sub-population are projected to that respective stratum; projected misstatements of each stratum are combined to consider the possible effect on account balances/classes of transactions.</p><p><strong>Value-Weighted Selection:</strong> in tests of details, it may be efficient to identify the sampling unit as the <strong>individual monetary units</strong> making up the population.</p></li><li>By selecting specific monetary units, the auditor may examine the individual balances containing those units.</li><li>Benefit: audit effort is directed to larger-value items (greater chance of selection), resulting in smaller sample sizes.</li><li>May be used with the systematic method of selection, and is most efficient with random selection.</li></ul>"
      },
      {
        "id": "f31f0a83-747c-4930-b931-7f7a1e327fa1",
        "title": "Performing Audit Procedures",
        "keywords": [
          {
            "icon": "clipboard-check",
            "label": "Appropriate procedures on each selected item"
          },
          {
            "icon": "link-chain",
            "label": "Replacement item if not applicable"
          },
          {
            "icon": "warning-triangle",
            "label": "Unable to apply — treat as deviation/misstatement"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall perform audit procedures, appropriate to the purpose, on each item selected.</p>\n<p>If a procedure is not applicable to the selected item, apply the procedure on a <strong>replacement item</strong>.</p>\n<p>If unable to apply the designed procedures, or suitable alternative procedures, to a selected item, the auditor shall treat that item as a <strong>deviation</strong> (tests of controls) or a <strong>misstatement</strong> (tests of details).</p>"
      },
      {
        "id": "075b798a-ffd5-4f82-b61e-d0e3d7b044f3",
        "title": "Nature and Cause of Deviations and Misstatements",
        "keywords": [
          {
            "icon": "detective-hat",
            "label": "Investigate nature and cause"
          },
          {
            "icon": "compass",
            "label": "Effect on purpose and other audit areas"
          },
          {
            "icon": "ghost",
            "label": "Anomaly — high degree of certainty"
          },
          {
            "icon": "clipboard-check",
            "label": "Additional procedures for remainder of population"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall investigate the <strong>nature and cause</strong> of any deviations or misstatements identified, and evaluate their possible effect on the purpose of the procedure and other areas of the audit.</p>\n<p>In extremely rare circumstances, when a misstatement/deviation is considered an <strong>anomaly</strong>, the auditor shall obtain a <strong>high degree of certainty</strong> that it is not representative of the population.</p>\n<p>The auditor shall perform <strong>additional audit procedures</strong> to obtain SAAE that the misstatement/deviation does not affect the remainder of the population.</p>"
      },
      {
        "id": "c3d48f1a-e916-4fbe-ade0-3e4720be491f",
        "title": "Projecting Misstatements",
        "keywords": [
          {
            "icon": "binoculars",
            "label": "Broad view of scale of misstatement"
          },
          {
            "icon": "ghost",
            "label": "Anomaly excluded from projection"
          },
          {
            "icon": "warning-triangle",
            "label": "Effect of uncorrected anomaly still considered"
          },
          {
            "icon": "crystal-ball",
            "label": "TODs — project to population"
          },
          {
            "icon": "gear",
            "label": "TOCs — no explicit projection needed"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor is required to <strong>project misstatements</strong> for the population, to obtain a broad view of the scale of misstatement — but this projection may not be sufficient to determine the amount to be recorded.</p>\n<p>When a misstatement is considered an anomaly, it is <strong>excluded</strong> when projecting misstatements to the population.</p>\n<p>However, the effect of such a misstatement, <strong>if uncorrected</strong>, needs to be considered in addition to the projected misstatement.</p>\n<p>For <strong>tests of details</strong>, the auditor shall project misstatements to the population; for <strong>tests of controls</strong>, no explicit projection of deviations is necessary, since the sample deviation rate is also the projected deviation rate for the population.</p>"
      },
      {
        "id": "d17375f5-c210-45d3-9053-b11ce3901f1c",
        "title": "Evaluating Results of Audit Sampling",
        "keywords": [
          {
            "icon": "trophy",
            "label": "Evaluate results of the sample"
          },
          {
            "icon": "thumb",
            "label": "Reasonable basis for conclusions"
          },
          {
            "icon": "megaphone",
            "label": "Request management to investigate"
          },
          {
            "icon": "clipboard-check",
            "label": "Tailor NTE of further procedures"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall evaluate:</p>\n<ol type=\"a\"><li>The <strong>results of the sample</strong>; and</li><li>Whether audit sampling has provided a <strong>reasonable basis for conclusions</strong> about the population tested.</li></ol>\n<p>If the auditor concludes that sampling has not provided a reasonable basis, the auditor may:</p>\n<ol type=\"i\"><li>Request management to <strong>investigate</strong> identified misstatements and the potential for further misstatements, and make necessary adjustments; or</li><li><strong>Tailor the NTE</strong> of further audit procedures to best achieve the required assurance — e.g. for tests of controls, extend the sample size, test an alternative control, or modify related substantive procedures.</li></ol>"
      },
      {
        "id": "9ac76210-cf56-461c-bd45-cd332111a725",
        "title": "Sample Selection Methods (For Understanding Only)",
        "keywords": [
          {
            "icon": "magnet",
            "label": "Random selection — simple/stratified"
          },
          {
            "icon": "ruler",
            "label": "Systematic selection"
          },
          {
            "icon": "calculator",
            "label": "Monetary unit sampling"
          },
          {
            "icon": "footprint",
            "label": "Haphazard selection"
          },
          {
            "icon": "brick-wall",
            "label": "Block selection"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>(a) Random Selection</strong> (applied through random number generators/tables):</p>\n<ul><li><strong>Simple Random Sampling:</strong> the whole population has an equal chance of selection.</li><li><strong>Stratified Sampling:</strong> dividing the population into separate groups (strata), taking proportionate samples from each; number of strata determined by the auditor's judgment.</li><li><strong>Example:</strong> trade receivables divided into groups — balances above ₹10,00,000: 100% testing; ₹7,75,001–₹10,00,000: 50%; ₹5,50,001–₹7,75,000: 25%; ₹2,25,001–₹5,50,000: 10%; ₹2,25,000 and below: 2%. A random sample is chosen from each stratum using random number tables — an extension of simple random sampling, weighting for a highly diversified population.<p><strong>(b) Systematic Selection:</strong> the number of sampling units divided by the sample size gives a sampling interval; a starting point within the first interval is chosen, then every nth unit thereafter is selected.</p></li><li><strong>Example:</strong> 5,000 items, 100 samples needed → interval = 5000/100 = 50; select a starting point within the first 50, then each 50th unit thereafter.</li><li>The starting point may be haphazard, but the sample is more likely to be truly random if determined via a computerised random number generator or tables.</li></ul>\n<p><strong>(c) Monetary Unit Sampling:</strong> a type of value-weighted selection, where sample size, selection, and evaluation result in a conclusion in monetary amounts.</p>\n<p><strong>(d) Haphazard Selection:</strong> the auditor selects the sample without a structured technique, avoiding bias/predictability while ensuring every item has a chance of selection. Not appropriate for statistical sampling.</p>\n<p><strong>(e) Block Selection:</strong> selection of block(s) of contiguous items. Cannot ordinarily be used in audit sampling, because items in a sequence tend to have similar characteristics to each other but differ from items elsewhere in the population.</p>"
      },
      {
        "id": "fbec6ea4-ecfa-4d4b-8a06-320be372d7fa",
        "title": "Factors Affecting Sample Size",
        "keywords": [
          {
            "icon": "shield-check",
            "label": "TOCs — reliance on controls/tolerable rate/expected rate"
          },
          {
            "icon": "target",
            "label": "TOCs — desired assurance/population size"
          },
          {
            "icon": "clipboard-check",
            "label": "TODs — ROMM/other substantive procedures"
          },
          {
            "icon": "warning-triangle",
            "label": "TODs — desired assurance/tolerable misstatement"
          },
          {
            "icon": "puzzle",
            "label": "TODs — expected misstatement/stratification"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Tests of Controls (TOCs) — relevant controls:</strong></p>\n<ol><li>Increase in the extent to which risk assessment relies on controls → <strong>Increase</strong>.</li><li>Increase in the tolerable rate of deviation → <strong>Decrease</strong>.</li><li>Increase in the expected rate of deviation of the population → <strong>Increase</strong>.</li><li>Increase in the desired level of assurance that the tolerable rate is not exceeded → <strong>Increase</strong>.</li><li>Increase in the number of sampling units in the population → <strong>Negligible effect</strong>.</li></ol>\n<p><strong>Tests of Details (TODs):</strong></p>\n<ol><li>Increase in the assessed ROMM → <strong>Increase</strong>.</li><li>Increase in the use of other substantive procedures on the same assertion → <strong>Decrease</strong>.</li><li>Increase in the desired level of assurance that tolerable misstatement is not exceeded → <strong>Increase</strong>.</li><li>Increase in tolerable misstatement → <strong>Decrease</strong>.</li><li>Increase in the amount of misstatement expected in the population → <strong>Increase</strong>.</li><li>Stratification of the population, when appropriate → <strong>Decrease</strong>.</li></ol>"
      },
      {
        "id": "c94454b0-dfa9-41ca-aaca-d2a12f4c21b0",
        "title": "Factors Determining the Extent of Checking on a Sampling Plan",

      }
    ]
