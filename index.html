          },
          {
            "cardId": "2443c788-1658-483c-b250-635a3f636977",
            "deckId": "sa220"
          }
        ],
        "title": "What are Preconditions of an Audit?",
        "keywords": [
          {
            "icon": "thumb",
            "label": "FRF-Acceptable"
          },
          {
            "icon": "signature",
            "label": "M acknowledges - PPFS-AFRF, IC"
          },
          {
            "icon": "folder",
            "label": "Provide - All info, add info, unrestricted access"
          }
        ],
        "isSubPart": false,
        "storyline": "Before he accepts the audit, ye uski kuch sharat hai",
        "adminImportance": "important",
        "explanationHtml": "<p>The auditor shall:</p><p></p><ol type=\"a\"><li><span style=\"font-size: 1rem;\">Determine whether the financial reporting framework (FRF) to be applied is acceptable (</span><strong style=\"font-size: 1rem;\"><font color=\"#c62828\">FRF-Acceptable</font></strong><span style=\"font-size: 1rem;\">).</span></li><li>Obtain the agreement of management that it acknowledges and understands its responsibility:</li><ol type=\"i\"><li>For the preparation of the financial statements as per the applicable FRF <b>(AFRF)</b>;</li><li>For such internal control (IC) as management determines necessary to enable the preparation of financial statements that are free from material misstatement, whether due to fraud or error; and (<strong><font color=\"#c62828\">M acknowledges - PPFS-AFRF, IC</font></strong>)</li><li><span style=\"font-size: 1rem;\">To provide the auditor with:</span></li><ul><li><span style=\"font-size: 1rem;\">Access to all information of which management is aware that is relevant to the preparation of the financial statements;</span></li><li><span style=\"font-size: 1rem;\">Additional information that the auditor may request for the purpose of the audit; and</span></li></ul><ul><li><span style=\"font-size: 1rem;\">Unrestricted access to persons within the entity from whom the auditor determines it necessary to obtain audit evidence.</span><br style=\"font-size: 1rem;\"><span style=\"font-size: 1rem;\">(</span><strong style=\"font-size: 1rem;\"><font color=\"#c62828\">Provide - All info, add info, unrestricted access</font></strong><span style=\"font-size: 1rem;\">)</span></li></ul></ol></ol><p></p>\n<p></p><ul><li>If the preconditions are not present, the auditor shall discuss the matter with management, and <b>shall not accept</b> the proposed audit engagement.&nbsp;</li></ul><p></p>"
      },
      {
        "id": "aff424d4-e19a-4c12-a957-a437318fd30a",
        "title": "What to do when management places limitation on Scope Prior to Audit Engagement Acceptance?",
        "keywords": [
          {
            "icon": "warning-triangle",
            "label": "Auditor shall not accept"
          }
        ],
        "isSubPart": true,
        "adminImportance": "low",
        "explanationHtml": "<p><ul><li>If management or TCWG impose a limitation on the scope of the auditor's work such that the auditor believes it would result in the auditor <b>disclaiming an opinion</b> on the financial statements, the <font color=\"#c62828\"><strong>auditor shall not accept</strong> </font>such an audit engagement, unless required to do so by law or regulation.</li></ul></p>"
      },
      {
        "id": "0c738943-c2a3-4ef5-9322-bef0457f699f",
        "title": "What are contents of the Agreement on Terms of Audit Engagement?",
        "keywords": [
          {
            "icon": "target",
            "label": "Objective and scope"
          },
          {
            "icon": "backpack",
            "label": "R-Auditor"
          },
          {
            "icon": "id-card",
            "label": "R-Management"
          },
          {
            "icon": "compass",
            "label": "AFRF"
          },
          {
            "icon": "scroll",
            "label": "Form and content"
          }
        ],
        "isSubPart": false,
        "storyline": "He has accepted the engagement, let's now write the agreement letter",
        "adminImportance": "important",
        "explanationHtml": "<p>The agreed terms of the audit engagement shall be recorded in an audit engagement letter or other written agreement, and shall include:</p>\n<p></p><ol type=\"a\"><li>The <font color=\"#c62828\"><strong>objective and scope</strong> </font>of the audit of the financial statements.</li><li>The responsibilities of the auditor. (<strong><font color=\"#c62828\">R-Auditor</font></strong>)</li><li>The responsibilities of management. (<strong><font color=\"#c62828\">R-Management</font></strong>)</li><li>Identification of the applicable FRF (<strong><font color=\"#c62828\">AFRF</font></strong>) for the preparation of the financial statements; and</li><li>Reference to the expected<font color=\"#c62828\"> <strong>form and content</strong></font> of any reports to be issued by the auditor, and a statement that there may be <b>circumstances </b>in which a report may differ from its expected form and content.</li></ol><div><br></div><div>📝<b>Please note -</b> If law or regulation prescribes in sufficient detail the terms of audit engagement referred above,<b> the auditor need not record </b>them in a written agreement, except for the fact that such law or regulation applies and that management acknowledges and understands its responsibilities.</div><div><br></div><div><i>Quick read - EL may include following references:</i></div><div><i><br></i></div><div><ol type=\"i\"><li><i>Scope of audit, legislation, ethical requirements</i></li><li><i>ILA reference and fact that there is unavoidable risk in audit</i></li><li><i>Audit plan, team composition</i></li><li><i>Management will provide written representations</i></li><li><i>Management will provide draft FS / info in time</i></li><li><i>Fees basis</i></li></ol></div><p></p>\n\n\n\n"
      },
      {
        "id": "e88f212b-7e06-4dc8-9762-45c9f02c13b1",
        "title": "Is which cases new Engagement Letter needed in case of recurring audits?",
        "keywords": [
          {
            "icon": "ghost",
            "label": "Misunderstands"
          },
          {
            "icon": "tag",
            "label": "Terms"
          },
          {
            "icon": "id-card",
            "label": "Management"
          },
          {
            "icon": "trophy",
            "label": "Ownership"
          },
          {
            "icon": "ruler",
            "label": "Size"
          },
          {
            "icon": "scale",
            "label": "Legal"
          },
          {
            "icon": "compass",
            "label": "FRF"
          },
          {
            "icon": "puzzle",
            "label": "Other"
          }
        ],
        "isSubPart": false,
        "storyline": "New year, new EL?",
        "adminImportance": "important",
        "explanationHtml": "<p>The auditor may decide <b>not to send </b>a new audit engagement letter or other written agreement for each period. The following factors make it appropriate to <b>revise </b>the terms of the audit engagement, or <b>to remind </b>the entity of existing terms:</p>\n<p></p><ol type=\"a\"><li>Any indication that the entity <strong><font color=\"#c62828\">misunderstands</font></strong> the objective and scope of the audit.</li><li>Any revised or special <font color=\"#c62828\"><strong>terms</strong> </font>of the audit engagement.</li><li>A recent change of senior <strong><font color=\"#c62828\">management</font></strong>.</li><li>A significant change in <strong><font color=\"#c62828\">ownership</font></strong>.</li><li>A significant change in the nature or <font color=\"#c62828\"><strong>size</strong> </font>of the entity's business.</li><li>A change in <font color=\"#c62828\"><strong>legal</strong> </font>or regulatory requirements.</li><li>A change in the <font color=\"#c62828\"><strong>FRF</strong> </font>adopted in the preparation of the financial statements.</li><li>A change in <font color=\"#c62828\"><strong>other</strong> </font>reporting requirements.</li></ol><p></p>\n\n\n\n\n\n\n"
      },
      {
        "id": "e74df536-8550-4a09-aec7-a735ebe2c3a1",
        "title": "Should Auditor accept Change in Terms of the Audit Engagement?",
        "keywords": [
          {
            "icon": "broken-chain",
            "label": "Not agree!"
          },
          {
            "icon": "lightbulb",
            "label": "Reasonable justification"
          },
          {
            "icon": "envelope",
            "label": "Engagement letter"
          },
          {
            "icon": "door",
            "label": "Withdraw & Report"
          }
        ],
        "isSubPart": false,
        "storyline": "They agreed with him for X, now asking him to give Y",
        "adminImportance": "mid",
        "explanationHtml": "<p></p><ul><li>The auditor shall <font color=\"#c62828\"><strong>not agree</strong> </font>to a change in the terms of the audit engagement where there is no reasonable justification for doing so.&nbsp;</li><li>If, prior to completing the audit engagement, the auditor is requested to change it to an engagement that conveys a lower level of assurance, the auditor shall determine <b>whether there is <font color=\"#c62828\">reasonable justification </font></b>for doing so.</li><li>If the terms are changed, the auditor and management shall agree on and record the new terms of the engagement in an <font color=\"#c62828\"><strong>engagement letter</strong> </font>or other suitable form of written agreement.</li><li>If the auditor is unable to agree to a change in terms, and is not permitted by management to continue the original audit engagement, the auditor shall:</li></ul><p></p>\n<blockquote style=\"margin: 0 0 0 40px; border: none; padding: 0px;\"><p></p><ol type=\"a\"><li><font color=\"#c62828\"><strong>Withdraw</strong> </font>from the audit engagement, where withdrawal is possible under applicable law or regulation; and</li><li>Determine whether there is any obligation, either contractual or otherwise, to <font color=\"#c62828\"><strong>report</strong> </font>the circumstances to other parties, such as <b>TCWG, owners, or regulators</b>.</li></ol><p></p></blockquote>\n"
      },
      {
        "id": "8b7c379a-6602-4d42-b7ca-e97ef0f0b3b2",
        "title": "Should auditor accept an engagement where FRF is Prescribed by Law or Regulation?",
        "keywords": [
          {
            "icon": "megaphone",
            "label": "Additional disclosures - FS"
          },
          {
            "icon": "flag",
            "label": "EOM - Audit Report"
          },
          {
            "icon": "mask",
            "label": "No T&F phrases"
          }
        ],
        "isSubPart": false,
        "adminImportance": "low",
        "explanationHtml": "<p></p><ul><li>If the auditor has determined that the FRF prescribed by law or regulation would be <b>unacceptable</b> but for the fact that it is prescribed by law or regulation, the auditor shall accept the audit engagement only if the following conditions are present:</li><ol type=\"a\"><li><span style=\"font-size: 1rem;\">Management agrees to provide </span><strong style=\"font-size: 1rem;\"><font color=\"#c62828\">additional disclosures</font></strong><span style=\"font-size: 1rem;\"><font color=\"#c62828\"> </font>in the financial statements; and</span></li><li><span style=\"font-size: 1rem;\">It is recognised in the terms of the audit engagement that:</span></li></ol><ul><ul><li>The auditor's report will include an Emphasis of Matter <strong><font color=\"#c62828\">(EOM) paragraph</font></strong>, drawing users attention to the additional disclosures, as per SA 706; and</li><li>Unless the auditor is required by law or regulation to express the auditor's opinion on the financial statements by using the phrases \"present fairly, in all material respects\" or \"give a true and fair view\" as per the applicable FRF, the auditor's opinion on the financial statements will not include such phrases. (<strong><font color=\"#c62828\">No T&amp;F phrases</font></strong>)</li></ul></ul><li>If the above conditions are not present, and the auditor is required by law or regulation to undertake the audit engagement, the auditor shall:</li><ol type=\"a\"><li><b>Evaluate the effect </b>of the misleading nature of the financial statements on the auditor's report; and</li><li><b>Include appropriate reference </b>to this matter in the terms of the audit engagement.</li></ol></ul><p></p>\n\n\n\n\n\n\n"
      },

        "explanationHtml": "<p></p><ul><li>Factors relevant to the auditor's determination of the acceptability of the financial reporting framework (FRF) to be applied in the preparation of the financial statements include:</li></ul><p></p>\n<blockquote style=\"margin: 0 0 0 40px; border: none; padding: 0px;\"><p></p><ol type=\"a\"><li>The <font color=\"#c62828\"><strong>nature of the entity</strong> </font>(for example, whether it is a business enterprise, or a not-for-profit organization).</li><li>The <font color=\"#c62828\"><strong>nature of the financial statements</strong> </font>(for example, whether the financial statements are a complete set of financial statements, or a single financial statement).</li><li>The <font color=\"#c62828\"><strong>purpose</strong> </font>of the financial statements (for example, whether they are prepared to meet the common financial information needs of a wide range of users, or the financial information needs of specific users).</li><li>Whether <font color=\"#c62828\"><strong>law or regulation</strong> </font>prescribes the applicable FRF.</li></ol><p></p></blockquote>\n\n"
      }
    ]
  },

        "explanationHtml": "<p><ul><li>Firms must establish <strong><font color=\"#c62828\">policies and procedures</font></strong> that promote an <strong>internal culture</strong> recognizing that quality is essential in performing engagements.</li><li>The firm's CEO or managing partners must assume <strong><font color=\"#c62828\">ultimate responsibility</font></strong> for the firm's system of quality control.</li><li>The <font color=\"#c62828\"><strong>example</strong> </font>set by the firm's leadership should encourage an <b>inner culture </b>that recognizes high-quality audit work.</li><li>Persons assigned operational responsibility for the quality control system should have sufficient <strong><font color=\"#c62828\">experience</font></strong>, <strong>ability, and authority</strong>.</li></ul></p>\n\n\n"

      {

        "isSubPart": true,
        "adminImportance": "mid",
        "explanationHtml": "<p></p><ul><li>The <strong>Engagement Partner</strong> (EP) takes responsibility for the overall quality on each audit engagement assigned to them.</li><li>Through their actions and appropriate messages to other engagement team members, the EP emphasizes:</li></ul><p></p>\n\n<blockquote style=\"margin: 0 0 0 40px; border: none; padding: 0px;\"><p></p><ol type=\"a\"><li>The importance to <strong>audit quality</strong> of:</li><ol type=\"i\"><li>Performing work that complies with professional, regulatory, and legal requirements (<strong><font color=\"#c62828\">PRL</font></strong>);</li><li>Complying with the<font color=\"#c62828\"> <strong>firm's quality</strong></font> control policies and procedures;</li><li>Issuing audit reports that are appropriate in the circumstances; and (<strong><font color=\"#c62828\">appropriate - report</font></strong>)</li><li>The engagement team's ability to raise concerns<font color=\"#c62828\"> <strong>without fear</strong></font> of reprisals.</li></ol></ol><p></p></blockquote>\n\n\n\n\n<blockquote style=\"margin: 0 0 0 40px; border: none; padding: 0px;\"><p>b. The fact that quality is essential in performing audit engagements. (<strong><font color=\"#c62828\">quality-essential</font></strong>)</p></blockquote>"

      {
        "id": "c91abb85-fa2f-4fe6-99c6-3278331b8ac1",
        "title": "How should Independence Policy exist for firms?",
        "keywords": [
          {
            "icon": "megaphone",
            "label": "Communicate"
          },
          {
            "icon": "link-chain",
            "label": "Circumstances and relationships"
          },
          {
            "icon": "broken-chain",
            "label": "Eliminate"
          }
        ],
        "isSubPart": true,
        "adminImportance": "low",
        "explanationHtml": "<p><ul><li>Policies and procedures should enable the firm to:</li><ul><li><font color=\"#c62828\"><strong>Communicate</strong> </font>independence requirements to its personnel and others.</li><li>Identify and evaluate <strong><font color=\"#c62828\">circumstances and relationships</font></strong> that create a threat to independence.</li><li>Take appropriate action to <font color=\"#c62828\"><strong>eliminate</strong> </font>such threats or reduce them to an acceptable level, or to withdraw from the engagement.</li></ul></ul></p>\n\n\n\n<p><strong>📝Imp Pointers, please read:</strong></p>\n<p><ul><li>There should be a mechanism within the firm by which en<b>gagement partners</b> provide the firm with relevant information about client engagements, and firm personnel <b>promptly notify the firm </b>of circumstances and relationships that create threats to independence.</li><li>All <b>breaches </b>of independence should be promptly notified to the firm so that appropriate action can be taken.</li><li>At least annually, the firm should obtain <b>written confirmation </b>of compliance with policies and procedures on independence from all firm personnel required to be independent.</li><li>The<b> </b>familiarity threat<b> </b>is particularly relevant in the audits of financial statements of <b>listed entities</b>. For these audits,<b> the Engagement partner is rotated after a pre-defined period, not more than 7 years.</b></li></ul></p>\n\n\n"
      },
      {

        "title": "What should be kept in mind during Acceptance and Continuance of Client Relationships and Engagements?",
        "keywords": [
          {
            "icon": "shield",
            "label": "Integrity"
          },
          {

          },
          {
            "icon": "flag",

          }
        ],
        "isSubPart": false,
        "adminImportance": "mid",
        "explanationHtml": "<p></p><ul><li>Information such as the following assists the engagement partner in determining whether decisions regarding acceptance and continuance of an audit engagement are appropriate:</li></ul><p></p>\n<blockquote style=\"margin: 0 0 0 40px; border: none; padding: 0px;\"><p></p><ol type=\"a\"><li><font color=\"#c62828\"><strong>Integrity</strong> </font>of the principal owners, key management, and those charged with governance (TCWG) of the entity</li><li><font color=\"#c62828\"><strong>Competence</strong> </font>(including capability, time, and resources) to perform the engagement</li><li><font color=\"#c62828\"><strong>Compliance</strong> </font>with <b><font color=\"#c62828\">ethical </font></b>requirements</li><li><strong><font color=\"#c62828\">Significant matters</font></strong> that have arisen during the current or previous audit engagement, and their implications for continuing the relationship.</li></ol><p></p></blockquote>\n\n\n\n<p></p><ul><li>Where issues are identified and the firm decides to accept or continue the client relationship or specific engagement, the <b>firm should document how those issues were resolved.</b></li></ul><p></p>"
      },
      {
        "id": "084d829b-3eae-4aed-b520-b9728cd3f93f",
        "title": "What should poicies and procedures on Withdrawal from an Engagement include?",
        "keywords": [
          {
            "icon": "handshake",
            "label": "Discuss - action"
          },
          {
            "icon": "door",
            "label": "Discuss - withdrawal"
          },
          {
            "icon": "megaphone",
            "label": "PRL-Report"
          },
          {
            "icon": "scroll",
            "label": "Documenting"
          }
        ],
        "isSubPart": true,
        "adminImportance": "mid",
        "explanationHtml": "<p>Policies and procedures on withdrawal from an engagement include:</p>\n<p><ul><li><strong><font color=\"#c62828\">Discuss</font></strong>ing with the client's management and TCWG the <b>appropriate <font color=\"#c62828\">action </font></b>the firm might take, based on the relevant facts and circumstances.</li><li>If the firm determines it is appropriate to withdraw, discussing the <font color=\"#c62828\"><strong>withdrawal</strong> </font>and the reasons for it with management and TCWG.</li><li>Considering whether there is a professional, regulatory, or legal (PRL) requirement <strong><font color=\"#c62828\">to report</font></strong> the withdrawal, along with reasons, to regulatory authorities.</li><li><font color=\"#c62828\"><strong>Documenting</strong> </font>significant issues, consultations, conclusions, and the basis for those conclusions.</li></ul></p>\n\n\n"
      },
      {

        ],
        "isSubPart": true,
        "adminImportance": "mid",
        "explanationHtml": "<p><ul><li>Matters the firm considers when evaluating client integrity include, for example:</li><ol type=\"a\"><li>Identity any<font color=\"#c62828\"> <strong style=\"font-size: 1rem;\">business reputation</strong></font><span style=\"font-size: 1rem;\"> of the client's principal owners, key management, related parties, and TCWG.</span></li><li><strong style=\"font-size: 1rem;\"><font color=\"#c62828\">Reasons</font></strong><span style=\"font-size: 1rem;\"><font color=\"#c62828\"> </font>for the proposed appointment of the firm and for the non-reappointment of the previous firm.</span></li><li>Nature of the client's <strong style=\"font-size: 1rem;\"><font color=\"#c62828\">operations</font></strong><span style=\"font-size: 1rem;\">, including its business practices.</span></li><li>Information concerning the <strong style=\"font-size: 1rem;\"><font color=\"#c62828\">attitude</font></strong><span style=\"font-size: 1rem;\"><font color=\"#c62828\"> </font>of the client's owners, key management, and TCWG towards matters such as aggressive interpretation of accounting standards and the internal control environment.</span></li><li>Whether the client is aggressively concerned with keeping the <strong><font color=\"#c62828\">firm's fees</font></strong> as low as possible.</li><li>Indications of inappropriate <strong>limitation</strong> in the scope of work.</li><li>Indications that the client might be involved in <strong>money laundering</strong> or other criminal activities.</li></ol></ul></p>\n\n\n"

          }
        ],
        "isSubPart": true,
        "adminImportance": "mid",
        "explanationHtml": "<p>When determining whether the firm has the capabilities, competence, time, and resources to undertake a new engagement, the firm considers whether:</p>\n<p><ul><li>Firm personnel have <font color=\"#c62828\"><strong>knowledge</strong> </font>of the relevant industries or subject matters.</li><li>Firm personnel have <font color=\"#c62828\"><strong>experience</strong> </font>with relevant regulatory or reporting requirements, or have the ability to gain the necessary skills and knowledge effectively.</li><li>The firm has <strong><font color=\"#c62828\">sufficient personnel</font></strong> with the necessary competence and capabilities.</li><li><font color=\"#c62828\"><strong>Experts</strong> </font>are available, if needed.</li><li>Individuals meeting the criteria and eligibility requirements to perform an engagement quality control review (<strong><font color=\"#c62828\">EQCR</font></strong>) are available.</li><li>The firm is able to <font color=\"#c62828\"><strong>complete</strong> </font>the engagement within the reporting deadline.</li></ul></p>\n\n\n\n\n"
      },

            "label": "Engagement partner"

        ],
        "isSubPart": false,
        "adminImportance": "low",
        "explanationHtml": "<p>The firm establishes policies and procedures designed to provide reasonable assurance that:</p>\n<p><ul><li>The firm has <font color=\"#c62828\"><strong>sufficient personnel</strong> </font>with the capabilities, competence, and commitment to ethical principles (CCC) necessary; and</li><li>The <strong><font color=\"#c62828\">engagement partner</font></strong> is able to issue an appropriate report.</li></ul></p>\n"
      },
      {
        "id": "e773f2ad-f16d-4c8b-a838-a5c734f27961",
        "title": "What should policies & procedures on Assignment of Engagement partner include?",

            "label": "Responsibilities"
          }
        ],
        "isSubPart": true,
        "explanationHtml": "<p>The firm should establish policies and procedures requiring that:</p>\n<p><ol type=\"a\"><li>The <font color=\"#c62828\"><strong>identity and role</strong> </font>of the engagement partner are communicated to key members of the client's management and TCWG.</li><li>b. The engagement partner has the appropriate capabilities, competence, authority, and time to perform the role. (<strong><font color=\"#c62828\">CCA</font></strong>)</li><li>c. The <font color=\"#c62828\"><strong>responsibilities</strong> </font>of the engagement partner are clearly defined and communicated to that partner.</li></ol></p>\n\n"
      },
      {

        "title": "How is consistency in quality of Engagement Performance achieved?",

          {
            "icon": "megaphone",
            "label": "Briefing"

          {
            "icon": "open-book",
            "label": "Engagement standards"
          },
          {

            "icon": "magnify",
            "label": "Reviewing"
          },
          {
            "icon": "scroll",

          }
        ],
        "isSubPart": false,
        "adminImportance": "mid",
        "explanationHtml": "<p>Consistency in the quality of engagement performance is achieved through:</p>\n<p>• <font color=\"#c62828\"><strong>Briefing</strong> </font>engagement teams on their objectives.</p>\n<p>• Processes for complying with <strong><font color=\"#c62828\">engagement standards</font></strong>.</p>\n<p>• Processes for engagement <strong><font color=\"#c62828\">supervision and training</font></strong>.</p>\n<p>• Methods of <font color=\"#c62828\"><strong>reviewing</strong> </font>the performance of work. <i>(Refer EQCR)</i></p>\n<p>• Appropriate <font color=\"#c62828\"><strong>documentation</strong> </font>of the work performed.</p>\n<p>📝Pointers - EP's responsibility:</p>\n<p>• The engagement partner has responsibility for the <b>direction, supervision, and performance</b> of the audit engagement.</p>\n<p>• The engagement partner is responsible for the auditor's <b>report </b>being <b>appropriate </b>in the circumstances.</p>\n<p>• <b>Reviewing </b>the audit documentation before the issue of the audit report is also the engagement partner's responsibility.</p>\n<p>• The engagement partner must ensure that sufficient appropriate audit evidence (<b>SAAE</b>) has been obtained to support the conclusions reached and for the issuance of the auditor's report.</p>"

        "isSubPart": true,
        "adminImportance": "mid",
        "explanationHtml": "<p>While reviewing work performed by less experienced members of the engagement team, more experienced reviewers should consider whether:</p>\n<p><ol type=\"i\"><li>Work has been performed as per <font color=\"#c62828\"><strong>PRL</strong> </font>requirements.</li><li><font color=\"#c62828\"><strong>Significant matters</strong> </font>have been raised for further consideration.</li><li>Appropriate <font color=\"#c62828\"><strong>consultations</strong> </font>have taken place, and the resulting conclusions have been documented and implemented.</li><li>There is a need to revise the nature, timing, and extent (<strong><font color=\"#c62828\">NTE</font></strong>) of work performed.</li><li>The work performed supports the <font color=\"#c62828\"><strong>conclusions</strong> </font>reached and is appropriately documented.</li><li>Evidence obtained is sufficient and appropriate to support the report. (<strong><font color=\"#c62828\">SAAE</font></strong>)</li><li>The <font color=\"#c62828\"><strong>objectives</strong> </font>of the engagement procedures have been achieved.</li></ol></p>\n\n\n\n\n\n"
      },
      {
        "id": "86a66027-3c39-44d4-84e2-39b09aae61a6",
        "title": "Engagement Quality Control Review (EQCR) - Who is he?",
        "keywords": [
          {
            "icon": "graduation-cap",
            "label": "Sufficient experience and authority"
          },
          {
            "icon": "crystal-ball",
            "label": "Significant judgments"
          }
        ],
        "isSubPart": false,
        "adminImportance": "important",
        "explanationHtml": "<p><strong>Who is the Engagement Quality Control Reviewer?</strong></p>\n<p></p><ul><li>A partner or other person within the firm (member of ICAI), a qualified external person, or a team of individuals, who has <strong><font color=\"#c62828\">sufficient experience and authority</font></strong>, to objectively evaluate the <b><font color=\"#c62828\">significant judgments </font></b>the engagement team made and the <b>conclusions reached </b>in formulating the report, before the report is issued.</li></ul><p></p>\n<p><strong>Scope:</strong></p>\n<p><strong>Q: What does EQCR review?</strong></p>\n<p></p><ul><li>The <strong>Significant judgments</strong> made in the engagement should be reviewed by the EQCR.</li><li>The extent of the review depends on the <strong>complexity</strong> of the engagement and the risk that the report might be inappropriate.</li></ul><p></p>\n\n<p><strong>Q: Is it mandatory for all engagements?</strong></p>\n<p></p><ul><li>It is mandatory for audits of financial statements of listed entities. For others, the firm could have its own policy.</li></ul><p></p>\n<p><strong>Q: What is the Role of EP in this regard?</strong></p>\n<p></p><ul><li>The engagement partner takes responsibility for <b>reviews </b>being performed as per the firm's review policies.</li><li>For audits of financial statements of listed entities, the engagement partner shall:</li><ul><li>Determine that an <strong>EQCR has been appointed</strong>;</li><li>Discuss <strong>significant matters</strong> arising during the audit engagement with the reviewer; and</li><li>Not date the auditor's report <b>until completion of the EQCR</b> — i.e., the EQCR should be completed before the audit report is issued.</li></ul></ul><p></p>\n\n\n\n\n<p><strong>Q: How to maintain objectivity of EQCR?</strong></p>\n<p>The engagement quality control reviewer:</p>\n<p></p><ul><li>Is not selected by the engagement partner.</li><li>Does not participate in the engagement during the period of review.</li><li>Does not make decisions for the engagement team.</li><li>Is not subject to other considerations that would threaten the reviewer's objectivity.</li></ul><p></p>\n\n\n\n<p><strong>Q: What if EP &amp; EQCR have differences of Opinion?</strong></p>\n<p></p><ul><li>Differences of opinion may arise within the engagement team, with those consulted, or between the engagement partner and the EQCR. The engagement team <b>shall follow the firm's policies and procedures </b>for dealing with and resolving differences of opinion — for example, by consulting another practitioner or firm, or a professional or regulatory body.</li></ul><p></p>"
      },
      {
        "id": "8ba3479a-919c-4e7d-b1ae-61fa53d4ec5a",
        "title": "How does EQCR evaluate significant judgements made by the auditor?",
        "keywords": [],
        "isSubPart": true,
        "adminImportance": "low",
        "explanationHtml": "<p style=\"font-family: Inter, sans-serif; font-size: 16px; color: rgb(237, 240, 250);\">The engagement quality control reviewer shall perform an objective evaluation of the significant judgments the engagement team made and the conclusions reached in formulating the auditor's report.</p><p style=\"font-family: Inter, sans-serif; font-size: 16px; color: rgb(237, 240, 250);\">This evaluation shall involve:</p><p style=\"font-family: Inter, sans-serif; font-size: 16px;\"><ol type=\"a\"><li>Discussion of <strong style=\"color: rgb(237, 240, 250);\">significant matters</strong> with the engagement partner.&nbsp; <font color=\"#c62828\"><b>(</b></font><b style=\"\"><font color=\"#c62828\">Discuss - EP)</font></b></li><li>Review of the <strong style=\"color: rgb(237, 240, 250);\">financial statements</strong> and the <strong style=\"color: rgb(237, 240, 250);\">proposed auditor's report.&nbsp;</strong><font color=\"#c62828\" style=\"\"><b>(Review - FS, AR)</b></font></li><li>Review of selected audit documentation relating to the <strong style=\"color: rgb(237, 240, 250);\">significant judgments</strong> the engagement team made and the conclusions reached. (<b style=\"\"><font color=\"#c62828\">Reiview - Documentation</font></b>)</li><li>Evaluation of the <font color=\"#c62828\"><strong style=\"\">conclusions</strong> </font>reached in formulating the auditor's report and consideration of whether the proposed auditor's report is appropriate.</li></ol></p>"
      },
      {
        "id": "1d664977-fc25-4c80-bd4d-5e23ba6848cc",
        "title": "What is the scope of Engagement Quality Control Review (EQCR) for audit of FS of listed entities?",
        "keywords": [
          {
            "icon": "shield",
            "label": "Independence"
          },
          {
            "icon": "warning-triangle",
            "label": "Significant risks"
          },
          {
            "icon": "crystal-ball",
            "label": "Judgments"
          },
          {
            "icon": "handshake",
            "label": "Consultation"
          },
          {
            "icon": "scale",
            "label": "Misstatements"
          },
          {
            "icon": "megaphone",
            "label": "Matters to be communicated"
          },
          {
            "icon": "folder",
            "label": "Working papers"
          },
          {
            "icon": "scroll",
            "label": "Report"
          }
        ],
        "isSubPart": true,
        "adminImportance": "important",
        "explanationHtml": "<p><strong>Scope of EQCR for Audits of FS of Listed Entities</strong> — includes consideration of the following:</p>\n<p><ul><li>The engagement team's evaluation of the firm's <font color=\"#c62828\"><strong>independence</strong> </font>in relation to the specific engagement.</li><li><font color=\"#c62828\"><strong>Significant risks</strong> </font>identified during the engagement and the responses to those risks.</li><li><font color=\"#c62828\"><strong>Judgments</strong> </font>made, with respect to materiality and significant risks.</li><li>Whether appropriate <font color=\"#c62828\"><strong>consultation</strong> </font>has taken place on differences of opinion or difficult/contentious matters, and the conclusions arising from them.</li><li>The significance and disposition of <strong>corrected and uncorrected</strong> <font color=\"#c62828\"><strong>misstatements</strong> </font>identified during the engagement.</li><li><font color=\"#c62828\"><strong>Matters to be communicated</strong> </font>to management, TCWG, and regulatory bodies.</li><li>Whether <font color=\"#c62828\"><strong>working papers</strong> </font>selected for review reflect the work performed in relation to the significant judgments and support the conclusions reached.</li><li>The appropriateness of the <font color=\"#c62828\"><strong>report</strong> </font>to be issued.</li></ul></p>\n\n\n\n\n\n\n"
      },
      {
        "id": "280138cf-4307-4036-aa21-2b8b78d16150",
        "title": "What should EQCR document?",
        "keywords": [
          {
            "icon": "gear",
            "label": "Procedures"
          },
          {
            "icon": "alarm-clock",
            "label": "Completed before the report"
          },
          {
            "icon": "ghost",
            "label": "Unresolved matters"
          }
        ],
        "isSubPart": true,
        "adminImportance": "low",
        "explanationHtml": "<p>The reviewer should document, for the engagement reviewed, that:</p>\n<p>1. The <strong>procedures</strong> required by the firm's policies on EQCR have been performed.</p>\n<p>2. The EQCR has been <strong>completed before the report</strong> is issued.</p>\n<p>3. The reviewer is not aware of any <strong>unresolved matters</strong> that would cause the reviewer to believe that the <strong>significant judgments</strong> the engagement team made and the conclusions they reached were not appropriate.</p>"
      },
      {
        "id": "41d80fd3-2e7c-4c4c-830b-d21dc1cc21dd",
        "title": "What are general points to be kept in mind on Engagement Documentation (ED)?",
        "keywords": [
          {
            "icon": "alarm-clock",
            "label": "60 days"

          {
            "icon": "calendar",

          {
            "icon": "shield",
            "label": "Safe custody"
          },
          {
            "icon": "fingerprint",
            "label": "Electronically scanned"
          }
        ],
        "isSubPart": false,
        "adminImportance": "mid",
        "explanationHtml": "<p><ul><li>Assembly of final engagement files should be done on a timely basis. In the case of an audit, the time limit is not more than<font color=\"#c62828\"> <strong>60 days</strong></font> after the date of the auditor's report.</li><li>The retention period ordinarily is no shorter than <strong><font color=\"#c62828\">7 years</font></strong> from the date of the auditor's report, or, if later, the date of the group auditor's report.</li></ul></p>\n\n<p><strong>Q: Who owns Engagement Documentation:</strong></p>\n<p><ul><li>Engagement documentation is the <font color=\"#c62828\"><strong>ownership</strong> </font>of the firm. The firm may, at its discretion, make portions of, or extracts from, the engagement documentation available to clients, provided such disclosure does not undermine the validity of the work performed, or, in the case of assurance engagements, the independence of the firm or its personnel.</li></ul></p>\n<p><strong>Q: Engagement Documentation pointers:</strong></p>\n<p><ul><li>The firm should establish policies and procedures to maintain the <strong><font color=\"#c62828\">safe custody</font></strong>, integrity, accessibility, and retrievability of engagement documentation.</li><li>Where engagement documentation is in paper or electronic form, the integrity, accessibility, or retrievability of underlying data may be compromised if the documentation can be <strong>altered, added to, or deleted</strong>.</li><li>For practical reasons, original paper documentation may be <font color=\"#c62828\"><strong>electronically scanned</strong> </font>for inclusion in the engagement files.</li></ul></p>\n\n\n<p><strong>Q: What points to consider when paper documentation is electronically scanned?</strong></p>\n<p>Where this is done, the firm implements appropriate procedures requiring engagement teams to:</p>\n<blockquote style=\"margin: 0 0 0 40px; border: none; padding: 0px;\"><p><ul><li>Generate scanned copies that reflect the entire content of the <strong>original paper documentation</strong>, including manual signatures, cross references, and annotations.</li><li>Integrate scanned copies into the <strong>engagement files</strong>, including indexing and signing off on scanned copies as necessary.</li><li>Enable scanned copies to be <strong>retrieved and printed</strong> as necessary.</li></ul></p></blockquote>\n\n"
      },

        "explanationHtml": "<p><ol type=\"a\"><li>The firm should establish <font color=\"#c62828\"><strong>policies and procedures</strong> </font>to provide it with <b>reasonable assurance </b>that it deals appropriately with:</li><ol type=\"i\"><li><b>Complaints </b>that work performed by the firm fails to comply with PRL requirements; and</li><li><b>Allegations </b>of non-compliance with the firm's system of quality control.</li></ol><li><span style=\"font-size: 1rem;\">Complaints may originate from<font color=\"#c62828\"> </font></span><strong style=\"font-size: 1rem;\"><font color=\"#c62828\">within or outside</font></strong><span style=\"font-size: 1rem;\"> the firm. They may be made by firm personnel, clients, or other third parties, and may be received by engagement team members or other firm personnel.</span></li><li>The firm establishes <strong style=\"font-size: 1rem;\"><font color=\"#c62828\">clearly defined channels</font></strong><span style=\"font-size: 1rem;\"> for firm personnel to raise any concerns without fear of reprisals.</span></li><li>The firm&nbsp;<investigates such=\"\" complaints=\"\" and=\"\" allegations=\"\" as=\"\" per=\"\" its=\"\" policies=\"\" procedures.=\"\" the=\"\" investigation=\"\" is=\"\" supervised=\"\" by=\"\" a=\"\" partner=\"\" with=\"\" sufficient=\"\" appropriate=\"\" experience=\"\" authority=\"\" within=\"\" firm=\"\" but=\"\" who=\"\" not=\"\" involved=\"\" in=\"\" engagement,=\"\" may=\"\" include=\"\" involving=\"\" legal=\"\" counsel.=\"\" small=\"\" firms=\"\" sole=\"\" practitioners=\"\" use=\"\" services=\"\" of=\"\" suitably=\"\" qualified=\"\" external=\"\" person=\"\" or=\"\" another=\"\" to=\"\" carry=\"\" out=\"\" investigation.=\"\" complaints,=\"\" allegations,=\"\" responses=\"\" them=\"\" are=\"\" documented.=\"\" (<strong=\"\" style=\"font-size: 1rem;\"><font color=\"#c62828\"><b>Investigate </b></font>- Partner, Legal counsel, external</investigates></li><li>Where the results of the investigations indicate deficiencies in the firm's quality control policies and procedures, or non-compliance with the firm's system of quality control by individual(s), the firm takes <strong style=\"font-size: 1rem;\"><font color=\"#c62828\">appropriate action</font></strong><span style=\"font-size: 1rem;\">.</span></li></ol></p>"
      }

    "id": "sa230",

    "cards": [

          },

            "label": "external inspections"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ol><li>Assisting the engagement team to <strong>plan and perform</strong> the audit.</li><li>Assisting members of the engagement team responsible for supervision to direct and supervise the audit, and to discharge their <strong>review</strong> responsibilities.</li><li>Enabling the engagement team to be <strong>accountable</strong> for its work.</li><li>Retaining a record of <strong>matters of continuing significance</strong> to future audits.</li><li>Enabling the conduct of <strong>quality control</strong> reviews and inspections.</li><li>Enabling the conduct of <strong>external inspections</strong>.</li></ol>"
      },
      {
        "id": "febf5447-a656-40f0-ace9-9e3017448233",
        "title": "Form, Content, and Extent of Audit Documentation",
        "keywords": [
          {
            "icon": "hourglass",
            "label": "NTE"
          },
          {
            "icon": "target",
            "label": "results"
          },
          {
            "icon": "flag",
            "label": "Significant matters"
          },
          {
            "icon": "fingerprint",
            "label": "identifying characteristics"
          },
          {
            "icon": "id-card",
            "label": "Who performed"
          },
          {
            "icon": "magnify",
            "label": "Who reviewed"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall prepare audit documentation that is sufficient to enable an experienced auditor to understand:</p>\n<ol type=\"a\"><li>The nature, timing, and extent (<strong>NTE</strong>) of the audit procedures performed;</li><li>The <strong>results</strong> of the audit procedures performed, and the audit evidence obtained; and</li><li><strong>Significant matters</strong> arising during the audit, the conclusions reached thereon, and significant professional judgments made in reaching those conclusions.</li></ol>\n<p>In documenting the nature, timing, and extent of audit procedures performed, the auditor shall record:</p>\n<ol type=\"i\"><li>The <strong>identifying characteristics</strong> of the specific items or matters tested;</li><li><strong>Who performed</strong> the audit work and the date such work was completed; and</li><li><strong>Who reviewed</strong> the audit work performed, and the date and extent of such review.</li></ol>"
      },
      {

        "title": "Factors Affecting the Form, Content, and Extent of Audit Documentation",

          },

            "label": "conclusion"

        "isSubPart": false,
        "explanationHtml": "<ol><li>The <strong>size</strong> and complexity of the entity.</li><li>The nature of the <strong>audit procedures</strong> to be performed.</li><li>The identified risks of material misstatement. (<strong>RoMM</strong>)</li><li>The <strong>significance</strong> of the audit evidence obtained.</li><li>The nature and extent of <strong>exceptions</strong> identified.</li><li>The need to document a <strong>conclusion</strong> or the basis for a conclusion not readily determinable from the documentation of the work performed or audit evidence obtained.</li><li>The audit <strong>methodology</strong> and tools used.</li><li>The <strong>timely preparation</strong> of the audit documentation.</li></ol>"
      },
      {
        "id": "bc5a7d92-a4d4-4641-949a-414816d2894e",
        "title": "Documentation of Matters Arising After the Date of the Auditor's Report",
        "keywords": [
          {
            "icon": "ghost",
            "label": "circumstances"

          },

        "isSubPart": false,
        "explanationHtml": "<p>If, in exceptional circumstances, the auditor performs new or additional audit procedures, or draws new conclusions, after the date of the auditor's report, the auditor shall document:</p>\n<ol><li>The <strong>circumstances</strong>s encountered;</li><li>The new or <strong>additional audit procedures</strong> performed, the audit evidence obtained, and the conclusions reached, and their effect on the auditor's report; and</li><li><strong>When and by whom</strong> the resulting changes to the audit documentation were made and reviewed.</li></ol>"
      },
      {

        "isSubPart": false,
        "explanationHtml": "<p>Where the auditor finds it necessary to modify existing audit documentation, or add new audit documentation, after the assembly of the final audit file has been completed, the auditor shall document:</p>\n<ol type=\"a\"><li>The <strong>specific reasons</strong> for making them; and</li><li><strong>When and by whom</strong> they were made and reviewed.</li></ol>"

  {
    "id": "sa240",
    "title": "SA 240 – Auditor's Responsibilities Relating to Fraud",
    "subtitle": "Fraud triangle, risk factors, and the auditor's response, from planning to reporting.",
    "cards": [
      {
        "id": "62d88803-869d-481e-8778-2f7f26c52a70",
        "title": "Meaning of Fraud & Types of Misstatements",
        "keywords": [
          {
            "icon": "mask",
            "label": "Fraud"
          },
          {
            "icon": "stamp",
            "label": "Intentional act"
          },
          {
            "icon": "scale",
            "label": "Error vs Fraud"
          },
          {
            "icon": "scroll",
            "label": "Fraudulent financial reporting"
          },
          {
            "icon": "broken-chain",
            "label": "Misappropriation of assets"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Fraud</strong> is an intentional act by one or more individuals among management, TCWG, employees, or third parties, involving the use of deception to obtain an unjust or illegal advantage.</p>\n<p>The distinguishing factor between fraud and error is whether the underlying action is <strong>intentional</strong> or unintentional.</p>\n<p>Two types of intentional misstatements are relevant to the auditor:</p>\n<ul><li><strong>Fraudulent financial reporting</strong> — misstatements resulting from fraudulent financial reporting.</li><li><strong>Misappropriation of assets</strong> — misstatements resulting from misappropriation of assets.<p>Both types involve three elements:</p></li><li>An <strong>incentive or pressure</strong> to commit fraud.</li><li>A <strong>perceived opportunity</strong> to do so.</li><li>Some <strong>rationalization</strong> of the act.</li></ul>"
      },
      {
        "id": "529276c4-71b7-4ff6-92e0-e128d7047e8a",
        "title": "Objectives of the Auditor under SA 240",
        "keywords": [
          {
            "icon": "magnify",
            "label": "Identify and assess"
          },
          {
            "icon": "clipboard-check",
            "label": "Sufficient appropriate evidence"
          },
          {
            "icon": "shield-check",
            "label": "Respond appropriately"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The objectives of the auditor under SA 240 are:</p>\n<ol type=\"a\"><li>To <strong>identify and assess</strong> the risks of material misstatement in the financial statements due to fraud;</li><li>To obtain <strong>sufficient appropriate audit evidence</strong> about the assessed risks of material misstatement due to fraud, through designing and implementing appropriate responses; and</li><li>To <strong>respond appropriately</strong> to identified or suspected fraud.</li></ol>"
      },
      {
        "id": "049aea89-922b-4e31-8b29-f0bc6d328e1d",
        "title": "The Fraud Triangle — Incentive, Opportunity, Rationalization",
        "keywords": [
          {
            "icon": "raincloud",
            "label": "Incentive or pressure"
          },
          {
            "icon": "door",
            "label": "Perceived opportunity"
          },
          {
            "icon": "crystal-ball",
            "label": "Rationalization"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Fraud — whether fraudulent financial reporting or misappropriation of assets — involves three conditions:</p>\n<ol><li><strong>Incentive or pressure</strong> to commit fraud — e.g. management under pressure to achieve unrealistic earnings targets, or individuals living beyond their means.</li><li>A <strong>perceived opportunity</strong> — e.g. an individual believes internal control can be overridden, because of a position of trust or knowledge of control deficiencies.</li><li>A <strong>rationalization</strong> of the dishonest act — some individuals possess an attitude, character, or set of ethical values that allow them to knowingly commit a dishonest act; even otherwise honest individuals can commit fraud in an environment that imposes sufficient pressure.</li></ol>"
      },
      {

        "keywords": [

          },
          {
            "icon": "mask",
            "label": "Manipulation, falsification, alteration"
          },
          {
            "icon": "ghost",
            "label": "Misrepresentation or omission"
          },
          {
            "icon": "warning-triangle",
            "label": "Misapplication of accounting principles"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Fraudulent financial reporting involves intentional misstatements, including omissions, to deceive financial statement users. It can be caused by management's efforts to manage earnings.</p>\n<p>Such <strong>earnings management</strong> may start with small actions or inappropriate adjustment of assumptions, and escalate under pressure to meet market expectations, maximize performance-based compensation, minimize tax, or inflate earnings to secure financing.</p>\n<p>Fraudulent financial reporting may be accomplished by:</p>\n<ul><li><strong>Manipulation, falsification</strong> (including forgery), or alteration of accounting records or supporting documentation.</li><li><strong>Misrepresentation in or intentional omission</strong> from the financial statements of events, transactions, or other significant information.</li><li>Intentional <strong>misapplication of accounting principles</strong> relating to amounts, classification, manner of presentation, or disclosure.</li></ul>"
      },
      {
        "id": "3f2a3a3a-f294-4c59-951f-f84f3e98c0d7",
        "title": "Management Override of Controls — Techniques",
        "keywords": [
          {
            "icon": "scroll",
            "label": "Fictitious journal entries"
          },
          {
            "icon": "gear",
            "label": "Adjusting assumptions"
          },
          {
            "icon": "hourglass",
            "label": "Omitting or delaying recognition"
          },
          {
            "icon": "mirror",
            "label": "Concealing facts"
          },
          {
            "icon": "puzzle",
            "label": "Complex transactions"
          },
          {
            "icon": "broken-chain",
            "label": "Altering records"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Fraudulent financial reporting often involves management override of controls that otherwise appear to operate effectively. Fraud can be committed by management overriding controls using techniques such as:</p>\n<ul><li>Recording <strong>fictitious journal entries</strong>, particularly close to period-end, to manipulate results.</li><li>Inappropriately <strong>adjusting assumptions</strong> and changing judgments used to estimate account balances.</li><li><strong>Omitting, advancing, or delaying recognition</strong> of events and transactions that have occurred during the reporting period.</li><li><strong>Concealing, or not disclosing</strong>, facts that could affect recorded amounts.</li><li>Engaging in <strong>complex transactions</strong> structured to misrepresent the financial position or performance.</li><li><strong>Altering records and terms</strong> related to significant and unusual transactions.</li></ul>"
      },
      {
        "id": "27cc008e-6b10-4ebb-a512-aa1db4ca5c9f",
        "title": "How Misappropriation of Assets May Be Accomplished",
        "keywords": [
          {
            "icon": "magnet",
            "label": "Embezzling receipts"
          },
          {
            "icon": "footprint",
            "label": "Stealing physical assets"
          },
          {
            "icon": "ghost",
            "label": "Paying for goods not received"
          },
          {
            "icon": "trophy",
            "label": "Using assets for personal use"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Misappropriation of assets</strong> involves theft of an entity's assets — often by employees in small, immaterial amounts, but management can also disguise or conceal misappropriations that are harder to detect.</p>\n<p>It can be accomplished in a variety of ways, including:</p>\n<ul><li><strong>Embezzling receipts</strong> — e.g. misappropriating collections on receivables, or diverting written-off account receipts to personal accounts.</li><li><strong>Stealing physical assets or IP</strong> — e.g. stealing inventory for personal use or sale, or colluding with a competitor by disclosing technological data for payment.</li><li><strong>Causing the entity to pay for goods/services not received</strong> — e.g. payments to fictitious vendors, kickbacks, payments to fictitious employees.</li><li><strong>Using an entity's assets for personal use</strong> — e.g. using assets as collateral for a personal loan.</li></ul>\n<p>Misappropriation is often accompanied by false or misleading records to conceal that assets are missing.</p>"
      },
      {
        "id": "ac76a09a-1bc7-4e3f-8d8f-cc97d93a6da1",
        "title": "Whose Primary Responsibility is to Prevent and Detect Fraud?",
        "keywords": [
          {
            "icon": "id-card",
            "label": "TCWG and management"
          },
          {
            "icon": "shield",
            "label": "Fraud prevention"
          },
          {
            "icon": "warning-triangle",
            "label": "Fraud deterrence"
          },
          {
            "icon": "handshake",
            "label": "Culture of honesty"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The <strong>primary responsibility</strong> for the prevention and detection of fraud rests with both <strong>those charged with governance (TCWG) and management</strong> of the entity.</p>\n<p>Management, with the oversight of TCWG, should place strong emphasis on:</p>\n<ul><li><strong>Fraud prevention</strong> — which may reduce opportunities for fraud to take place; and</li><li><strong>Fraud deterrence</strong> — which could persuade individuals not to commit fraud because of the likelihood of detection and punishment.</li></ul>\n<p>This involves a commitment to creating a <strong>culture of honesty and ethical behaviour</strong>, reinforced by active oversight by TCWG.</p>"
      },
      {
        "id": "8e11ea40-e0ab-4922-b092-7377a7fb9400",
        "title": "Responsibilities of the Auditor in Detecting Fraud",
        "keywords": [
          {
            "icon": "umbrella",
            "label": "Reasonable assurance"
          },
          {
            "icon": "scale",
            "label": "Persuasive not conclusive"
          },
          {
            "icon": "warning-triangle",
            "label": "Fraud risk higher than error"
          },
          {
            "icon": "flag",
            "label": "Management fraud risk highest"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor is responsible for obtaining <strong>reasonable assurance</strong> that the financial statements as a whole are free from material misstatement — whether caused by fraud or error.</p>\n<p>Owing to inherent limitations of an audit, there is an unavoidable risk that some material misstatements may not be detected, even when the audit is properly planned and performed.</p>\n<p>Key points on detecting fraud:</p>\n<ul><li>Audit evidence is <strong>persuasive rather than conclusive</strong>, and this effect is particularly significant for misstatements resulting from fraud.</li><li>The risk of not detecting a material misstatement resulting from <strong>fraud is higher</strong> than the risk of not detecting one resulting from error — because fraud may involve sophisticated, carefully organized schemes, including forgery and collusion.</li><li>The risk of not detecting fraud resulting from <strong>management fraud is greater</strong> than for employee fraud — management is frequently in a position to directly or indirectly manipulate records or override controls.</li><li>The auditor must maintain <strong>professional skepticism</strong> throughout the audit, recognising that audit procedures effective for detecting error may not be effective for detecting fraud.</li></ul>"
      },
      {
        "id": "eeff8a52-5af6-4a00-893b-f58ebff13a16",
        "title": "Meaning and Evaluation of Fraud Risk Factors",
        "keywords": [
          {
            "icon": "calendar",
            "label": "Events or conditions"
          },
          {
            "icon": "seesaw",
            "label": "Cannot be ranked"
          },
          {
            "icon": "crystal-ball",
            "label": "Professional judgment"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Fraud risk factors</strong> are events or conditions that indicate an incentive or pressure to commit fraud, or that provide an opportunity to commit fraud.</p>\n<p>Examples:</p>\n<ul><li>The need to meet expectations of third parties for additional equity financing may create pressure to commit fraud.</li><li>Significant bonuses tied to unrealistic profit targets may create an incentive to commit fraud.</li><li>An ineffective control environment may create an opportunity to commit fraud.<p>Key points on evaluation:</p></li><li>Fraud risk factors <strong>may not necessarily indicate fraud</strong>, but have often been present where frauds have occurred.</li><li>They <strong>cannot easily be ranked</strong> in order of importance, and their significance varies widely.</li><li>Whether a factor is present, and how it should be weighed, requires the exercise of <strong>professional judgment</strong>.</li></ul>"
      },
      {
        "id": "ba93732b-42b5-4b83-a578-7c4e2f6afc90",
        "title": "Fraud Risk Factors — Fraudulent Financial Reporting",
        "keywords": [
          {
            "icon": "raincloud",
            "label": "Incentives/Pressures"
          },
          {
            "icon": "door",
            "label": "Opportunities"
          },
          {
            "icon": "mirror",
            "label": "Attitudes/Rationalizations"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Risk factors relating to misstatements arising from <strong>fraudulent financial reporting</strong> fall into three categories:</p>\n<p><strong>(A) Incentives/Pressures</strong>, for example:</p>\n<ul><li>Financial stability or profitability threatened by economic, industry, or entity conditions (competition, rapid growth, operating losses, negative cash flows).</li><li>Excessive pressure to meet third-party expectations (analysts, creditors) or to obtain additional financing.</li><li>Personal financial situation of management/TCWG threatened by the entity's performance (bonuses, stock options, personal guarantees).<p><strong>(B) Opportunities</strong>, for example:</p></li><li>Significant related-party transactions not in the ordinary course of business.</li><li>Assets, liabilities, or estimates involving significant subjective judgment that is difficult to corroborate.</li><li>Complex or unstable organizational structure; ineffective monitoring by management or TCWG; deficient internal controls.<p><strong>(C) Attitudes/Rationalizations</strong>, for example:</p></li><li>Ineffective communication or enforcement of the entity's ethical values.</li><li>Known history of violations of securities laws; strained relationship between management and the auditor.</li><li>Excessive interest by management in maintaining or increasing stock price or earnings trend.</li></ul>"
      },
      {
        "id": "7395ec90-9a58-480e-a7f1-7a515885d246",
        "title": "Fraud Risk Factors — Misappropriation of Assets",
        "keywords": [
          {
            "icon": "raincloud",
            "label": "Incentives/Pressures"
          },
          {
            "icon": "door",
            "label": "Opportunities"
          },
          {
            "icon": "mirror",
            "label": "Attitudes/Rationalizations"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Risk factors relating to misstatements arising from <strong>misappropriation of assets</strong> also fall into three categories:</p>\n<p><strong>(A) Incentives/Pressures</strong>, for example:</p>\n<ul><li>Personal financial obligations creating pressure on employees with access to cash or other susceptible assets.</li><li>Adverse relationships between the entity and employees with access to assets (e.g. known or anticipated layoffs).<p><strong>(B) Opportunities</strong>, for example:</p></li><li>Large amounts of cash on hand; inventory that is small, high-value, or in high demand; easily convertible assets.</li><li>Inadequate segregation of duties, oversight, record-keeping, authorization controls, or physical safeguards over assets.</li><li>Lack of complete/timely reconciliations, mandatory vacations, or adequate IT access controls.<p><strong>(C) Attitudes/Rationalizations</strong>, for example:</p></li><li>Disregard for the need to monitor or reduce risks of misappropriation.</li><li>Displeasure or dissatisfaction with the entity, or changes in behaviour/lifestyle suggesting assets have been misappropriated.</li><li>Tolerance of petty theft.</li></ul>"
      },
      {
        "id": "7fb85082-01fb-4f13-b739-213fe0090d51",
        "title": "Maintaining Professional Skepticism",
        "keywords": [
          {
            "icon": "alarm-clock",
            "label": "Throughout the audit"
          },
          {
            "icon": "clipboard-check",
            "label": "Records accepted as genuine"
          },
          {
            "icon": "detective-hat",
            "label": "Investigate inconsistencies"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall maintain <strong>professional skepticism throughout the audit</strong>, recognizing the possibility of material misstatement due to fraud, notwithstanding past experience of the honesty and integrity of management and TCWG.</p>\n<p>Unless the auditor has reason to believe the contrary, records and documents <strong>may be accepted as genuine</strong>.</p>\n<p>If conditions identified during the audit cause the auditor to believe a document may not be authentic, or that terms have been modified but not disclosed, the auditor shall <strong>investigate further</strong>.</p>\n<p>Where responses to inquiries of management or TCWG are inconsistent, the auditor shall <strong>investigate the inconsistencies</strong>.</p>"
      },
      {
        "id": "d0b38a74-3a55-4210-94ce-9560aeeeab1a",
        "title": "Discussion Among the Engagement Team & Risk Assessment Procedures",
        "keywords": [
          {
            "icon": "eye",
            "label": "How and where susceptible"
          },
          {
            "icon": "megaphone",
            "label": "Inquiries of management"
          },
          {
            "icon": "binoculars",
            "label": "Understanding TCWG oversight"
          },
          {
            "icon": "magnify",
            "label": "Analytical procedures"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Discussion among the engagement team</strong> shall place particular emphasis on how and where the entity's financial statements may be susceptible to material misstatement due to fraud, including how fraud might occur — notwithstanding any belief that management and TCWG are honest.</p>\n<p>As part of <strong>risk assessment procedures</strong> and related activities, the auditor shall obtain information for use in identifying risks of material misstatement due to fraud, through:</p>\n<ul><li><strong>Inquiries of management</strong> and others within the entity.</li><li>Obtaining an <strong>understanding of how TCWG exercise oversight</strong> of management's processes for identifying and responding to fraud risk, and of the related internal control.</li><li>Evaluating unexpected relationships identified through <strong>analytical procedures</strong>, which may indicate risk of material misstatement due to fraud.</li></ul>\n<p>The auditor shall also evaluate whether the information gathered indicates that one or more fraud risk factors are present.</p>"
      },
      {
        "id": "e508f94c-c457-4b47-bbe8-836d1d6eae7f",
        "title": "Responses to Assessed Risks — FS Level, Assertion Level & Management Override",
        "keywords": [
          {
            "icon": "id-card",
            "label": "Assign and supervise personnel"
          },
          {
            "icon": "open-book",
            "label": "Evaluate accounting policies"
          },
          {
            "icon": "ghost",
            "label": "Element of unpredictability"
          },
          {
            "icon": "hourglass",
            "label": "Nature/timing/extent responsive"
          },
          {
            "icon": "clipboard-check",
            "label": "Journal entries testing"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>(a) Overall responses at the Financial Statement level</strong> — the auditor shall:</p>\n<ul><li><strong>Assign and supervise personnel</strong> taking account of the knowledge, skill, and ability required, and the assessed fraud risk.</li><li><strong>Evaluate whether accounting policies</strong> selected and applied, particularly for subjective measurements, may indicate fraudulent financial reporting.</li><li>Incorporate an <strong>element of unpredictability</strong> in the nature, timing, and extent of audit procedures selected.<p><strong>(b) At the Assertion level</strong> — the auditor shall design and perform further audit procedures whose <strong>nature, timing and extent are responsive</strong> to the assessed risks of material misstatement due to fraud (e.g. more reliable/relevant evidence, additional corroboration).</p><p><strong>(c) Responsive to Management Override of Controls</strong> — irrespective of the assessed risk, the auditor shall:</p></li><li>Test the appropriateness of <strong>journal entries</strong> recorded in the general ledger and other adjustments.</li><li>Review <strong>accounting estimates</strong> for biases.</li><li>For significant transactions outside the normal course of business, evaluate whether the <strong>business rationale</strong> suggests they were entered into for fraudulent reporting or to conceal misappropriation.</li></ul>"
      },
      {
        "id": "f1b5fa12-daca-40da-a48a-c15d3ae014ee",
        "title": "Evaluation of Audit Evidence",
        "keywords": [
          {
            "icon": "warning-triangle",
            "label": "Unrecognized risk"
          },
          {
            "icon": "link-chain",
            "label": "Not an isolated occurrence"
          },
          {
            "icon": "magnify",
            "label": "Re-evaluate risk assessment"
          },
          {
            "icon": "handshake",
            "label": "Possible collusion"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall evaluate whether analytical procedures performed near the end of the audit indicate a previously <strong>unrecognized risk</strong> of material misstatement due to fraud.</p>\n<p>When a misstatement is identified, the auditor shall evaluate whether it is indicative of fraud, recognizing that an instance of fraud is <strong>unlikely to be an isolated occurrence</strong>.</p>\n<p>If the auditor believes senior management may be involved, the auditor shall <strong>re-evaluate the assessment</strong> of fraud risk and its impact on the nature, timing, and extent of procedures, and consider whether circumstances indicate <strong>possible collusion</strong>.</p>\n<p>When the auditor confirms — or is unable to conclude whether — the financial statements are materially misstated as a result of fraud, the auditor shall evaluate the implications for the audit.</p>"
      },
      {
        "id": "3697c6f6-3ed6-48cc-b8b6-6df81f8f4855",
        "title": "Auditor is Unable to Continue the Engagement",
        "keywords": [
          {
            "icon": "scale",
            "label": "Professional and legal responsibilities"
          },
          {
            "icon": "door",
            "label": "Withdraw where possible"
          },
          {
            "icon": "megaphone",
            "label": "Discuss withdrawal"
          },
          {
            "icon": "scroll",
            "label": "Report to appointing authority"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>If, as a result of a misstatement resulting from fraud or suspected fraud, the auditor encounters exceptional circumstances bringing into question the auditor's ability to continue the audit, the auditor shall:</p>\n<ol type=\"a\"><li>Determine the <strong>professional and legal responsibilities</strong> applicable, including whether there is a requirement to report to the person(s) who made the audit appointment or, in some cases, to regulatory authorities;</li><li>Consider whether it is appropriate to <strong>withdraw from the engagement</strong>, where withdrawal is legally permitted; and</li><li>If the auditor withdraws:<ul><li><strong>Discuss</strong> with the appropriate level of management/TCWG the withdrawal and the reasons for it; and</li><li>Determine whether there is a professional or legal requirement to <strong>report</strong> the withdrawal and reasons to the appointing authority or regulators.</li></ul></li></ol>"
      },
      {
        "id": "feb953c6-fc30-491d-ad8b-34665a4edfe7",
        "title": "Management Representations Regarding Fraud",
        "keywords": [
          {
            "icon": "signature",
            "label": "Acknowledge responsibility for IC"
          },
          {
            "icon": "clipboard-check",
            "label": "Disclosed risk assessment results"
          },
          {
            "icon": "mask",
            "label": "Disclosed knowledge of fraud"
          },
          {
            "icon": "flag",
            "label": "Disclosed allegations"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall obtain written representations from management and, where applicable, TCWG, that:</p>\n<ol type=\"a\"><li>They <strong>acknowledge their responsibility</strong> for the design, implementation, and maintenance of internal control to prevent and detect fraud;</li><li>They have <strong>disclosed the results of management's assessment</strong> of the risk that the financial statements may be materially misstated as a result of fraud;</li><li>They have <strong>disclosed their knowledge of fraud</strong> or suspected fraud affecting the entity involving management, employees with significant roles in internal control, or others; and</li><li>They have <strong>disclosed their knowledge of any allegations of fraud</strong>, or suspected fraud, communicated by employees, former employees, analysts, regulators, or others.</li></ol>"
      },
      {
        "id": "bd2675a8-466e-45d6-9c6a-8a00b5aeaa9e",
        "title": "Communications & Documentation",
        "keywords": [
          {
            "icon": "megaphone",
            "label": "Communicate to management"
          },
          {
            "icon": "alarm-clock",
            "label": "Communicate to TCWG on timely basis"
          },
          {
            "icon": "shield-check",
            "label": "Report to regulatory authorities"
          },
          {
            "icon": "scroll",
            "label": "Document discussions and responses"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Communications to management</strong> — if the auditor has identified a fraud or information indicating fraud may exist, the auditor shall communicate these matters on a timely basis to the appropriate level of management.</p>\n<p><strong>Communications to TCWG</strong> — the auditor shall communicate to TCWG on a timely basis, matters related to fraud that are, in the auditor's judgment, relevant to their responsibilities; if fraud involving management is suspected, the auditor shall discuss the nature, timing, and extent of audit procedures necessary to complete the audit.</p>\n<p><strong>Communications to regulatory and enforcement authorities</strong> — the auditor shall determine whether there is a responsibility to report the occurrence or suspicion to a party outside the entity (e.g. statutory duty to report bank fraud to the RBI), even though this may override the duty of confidentiality.</p>\n<p><strong>Documentation</strong> requirements include:</p>\n<ul><li>Significant decisions reached during the engagement team discussion, and the identified and assessed risks of material misstatement due to fraud (FS level and assertion level).</li><li>The overall responses to assessed risks, and the linkage of procedures to those risks, plus results of procedures addressing management override of controls.</li><li>Communications about fraud made to management, TCWG, regulators, and others.</li><li>Reasons supporting a conclusion that the presumed risk of fraud in revenue recognition is not applicable in the circumstances of the engagement.</li></ul>"
      }
    ]
  },
  {
    "id": "sa250",
    "title": "SA 250 – Consideration of Laws and Regulations",
    "subtitle": "Two categories of laws, the auditor's differing responsibilities, and reporting non-compliance.",
    "cards": [
      {
        "id": "b8564c2e-d305-4b19-a9a7-edecec0735f2",
        "title": "Effect of Laws and Regulations on Financial Statements",
        "keywords": [
          {
            "icon": "target",
            "label": "Direct effect"
          },
          {
            "icon": "puzzle",
            "label": "No direct effect"
          },
          {
            "icon": "brick-wall",
            "label": "Heavily regulated industries"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The effect of laws and regulations on financial statements varies considerably. Laws to which an entity is subject constitute its <strong>legal and regulatory framework</strong>.</p>\n<p>Two broad categories:</p>\n<ul><li>Laws/regulations with a <strong>direct effect</strong> on the financial statements — they determine the reported amounts and disclosures (e.g. tax and labour laws).</li><li>Laws/regulations with <strong>no direct effect</strong> — to be complied with by management, or setting the provisions under which the entity conducts business, but not directly affecting the financial statements.</li></ul>\n<p>Some entities operate in <strong>heavily regulated industries</strong> (banks, chemical companies); others are subject mainly to general operating laws (e.g. occupational safety and health).</p>\n<p>Non-compliance with laws and regulations may result in <strong>fines, litigation, or other consequences</strong> that have a material effect on the financial statements.</p>"
      },
      {
        "id": "f0bfd0d9-96cf-4dbd-996b-a236e7334ec7",
        "title": "Objectives of the Auditor under SA 250",
        "keywords": [
          {
            "icon": "clipboard-check",
            "label": "Sufficient appropriate evidence — direct effect laws"
          },
          {
            "icon": "gear",
            "label": "Specified procedures — other laws"
          },
          {
            "icon": "shield-check",
            "label": "Respond appropriately"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The objectives of the auditor under SA 250 are:</p>\n<ol type=\"a\"><li>To obtain <strong>sufficient appropriate audit evidence</strong> regarding compliance with the provisions of those laws and regulations generally recognized to have a <strong>direct effect</strong> on material amounts and disclosures;</li><li>To perform <strong>specified audit procedures</strong> to help identify instances of non-compliance with <strong>other laws and regulations</strong> that may have a material effect on the financial statements; and</li><li>To <strong>respond appropriately</strong> to non-compliance or suspected non-compliance identified during the audit.</li></ol>"
      },
      {
        "id": "3b2b562a-a31d-445a-978d-52ab9447b9d4",
        "title": "Responsibility of Management for Compliance with Laws & Regulations",
        "keywords": [
          {
            "icon": "binoculars",
            "label": "Oversight of TCWG"
          },
          {
            "icon": "shield",
            "label": "Prevention and detection policies"
          },
          {
            "icon": "id-card",
