            "label": "Internal audit / compliance function"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>It is the responsibility of <strong>management, with the oversight of TCWG</strong>, to ensure that the entity's operations are conducted in accordance with laws and regulations, including those that determine reported amounts and disclosures.</p>\n<p>Examples of policies and procedures an entity may implement to assist in the <strong>prevention and detection of non-compliance</strong>:</p>\n<ul><li>Monitoring legal requirements and ensuring operating procedures meet them.</li><li>Instituting and operating appropriate systems of internal control.</li><li>Developing, publicising, and following a <strong>code of conduct</strong>.</li><li>Ensuring employees are properly trained and understand the code of conduct.</li><li>Engaging legal advisors; maintaining a register of significant laws and regulations and a record of complaints.</li></ul>\n<p>In larger entities, these may be supplemented by an <strong>internal audit function, an audit committee, or a compliance function</strong>.</p>"
      },
      {
        "id": "a028b074-805b-4d0b-bd81-0ee2aeefba65",
        "title": "Responsibility of the Auditor — Two Categories of Laws",
        "keywords": [
          {
            "icon": "warning-triangle",
            "label": "Not responsible for preventing non-compliance"
          },
          {
            "icon": "target",
            "label": "Direct effect laws"
          },
          {
            "icon": "gear",
            "label": "Fundamental to operating aspects"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor is <strong>not responsible for preventing non-compliance</strong> and cannot be expected to detect non-compliance with all laws and regulations.</p>\n<p>SA 250 distinguishes the auditor's responsibilities across two categories:</p>\n<ul><li><strong>(a)</strong> Laws/regulations generally recognized to have a <strong>direct effect</strong> on material amounts and disclosures (e.g. tax and labour laws) — the auditor's responsibility is to obtain sufficient appropriate audit evidence about compliance.</li><li><strong>(b)</strong> Other laws/regulations with <strong>no direct effect</strong> on amounts/disclosures, but compliance with which may be fundamental to the operating aspects of the business, its ability to continue, or to avoid material penalties (e.g. operating licenses, solvency requirements, environmental regulations) — the auditor's responsibility is <strong>limited to specified audit procedures</strong> to help identify non-compliance.<p>Potential effects of inherent limitations are greater here because:</p></li><li>Many laws relate to operating aspects not captured by the entity's financial reporting information systems.</li><li>Non-compliance may involve conduct designed to conceal it — collusion, forgery, deliberate failure to record transactions, management override, or intentional misrepresentation.</li><li>Whether an act constitutes non-compliance is ultimately a matter for <strong>legal determination by a court of law</strong>.</li></ul>"
      },
      {
        "id": "ccbb12f1-c3ce-4d24-962b-6ed2faa1a67c",
        "title": "Auditor's Consideration of Compliance with Laws and Regulations",
        "keywords": [
          {
            "icon": "open-book",
            "label": "General understanding of framework"
          },
          {
            "icon": "megaphone",
            "label": "Inquiring of management"
          },
          {
            "icon": "envelope",
            "label": "Inspecting correspondence with regulators"
          },
          {
            "icon": "signature",
            "label": "Written representations"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>As part of obtaining an understanding of the entity and its environment, the auditor shall obtain a <strong>general understanding</strong> of:</p>\n<ul><li>The legal and regulatory framework applicable to the entity and its industry/sector; and</li><li>How the entity is complying with that framework.</li></ul>\n<p>For laws with a direct effect on amounts/disclosures, the auditor obtains sufficient appropriate audit evidence about compliance (e.g. relating to form/content of FS or industry-specific reporting).</p>\n<p>To help identify non-compliance with <strong>other laws</strong>, the auditor shall:</p>\n<ol type=\"a\"><li><strong>Inquire of management</strong> and, where appropriate, TCWG, as to whether the entity is in compliance; and</li><li><strong>Inspect correspondence</strong>, if any, with the relevant licensing or regulatory authorities.</li></ol>\n<p>The auditor shall remain alert throughout the audit, and request <strong>written representations</strong> that all known/suspected instances of non-compliance whose effects should be considered when preparing the FS have been disclosed.</p>"
      },
      {
        "id": "ba110a51-61f7-4280-8be2-072108461f5f",
        "title": "Audit Procedures When Non-Compliance is Identified or Suspected",
        "keywords": [
          {
            "icon": "magnify",
            "label": "Understanding nature and circumstances"
          },
          {
            "icon": "folder",
            "label": "Further information"
          },
          {
            "icon": "handshake",
            "label": "Discuss with management"
          },
          {
            "icon": "scale",
            "label": "Consider legal advice"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>If the auditor becomes aware of information concerning an instance of non-compliance or suspected non-compliance, the auditor shall obtain:</p>\n<ol type=\"a\"><li>An <strong>understanding of the nature</strong> of the act and the circumstances in which it has occurred; and</li><li><strong>Further information</strong> to evaluate the possible effect on the financial statements.</li></ol>\n<p>If the auditor suspects non-compliance, the auditor shall <strong>discuss the matter with management</strong> and, where appropriate, TCWG.</p>\n<p>If management/TCWG do not provide sufficient supporting information, and the effect may be material, the auditor shall consider the need to obtain <strong>legal advice</strong>.</p>\n<p>If sufficient information about suspected non-compliance cannot be obtained, the auditor shall evaluate the effect of the lack of sufficient appropriate audit evidence on the auditor's opinion.</p>"
      },
      {
        "id": "7e410aa7-0873-4a04-91a2-87531f175526",
        "title": "Reporting of Non-Compliance & Documentation",
        "keywords": [
          {
            "icon": "megaphone",
            "label": "Report to TCWG"
          },
          {
            "icon": "warning-triangle",
            "label": "Qualified or adverse opinion"
          },
          {
            "icon": "shield-check",
            "label": "Report to regulatory authorities"
          },
          {
            "icon": "scroll",
            "label": "Documentation"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>(A) Reporting to TCWG</strong> — unless clearly inconsequential, the auditor shall communicate matters involving identified/suspected non-compliance to TCWG. If intentional and material, communicate as soon as practicable; if management/TCWG are suspected of involvement, communicate to the next higher authority (e.g. audit committee), and consider legal advice.</p>\n<p><strong>(B) Reporting in the Auditor's Report</strong>:</p>\n<ul><li>If non-compliance has a <strong>material effect</strong> not adequately reflected in the FS, express a <strong>qualified or adverse opinion</strong> as per SA 705.</li><li>If precluded by management/TCWG from obtaining sufficient appropriate evidence, express a <strong>qualified opinion or disclaim</strong> an opinion due to scope limitation.</li><li>If unable to determine whether non-compliance occurred due to circumstance-based limitations, evaluate the effect on the opinion as per SA 705.</li></ul>\n<p><strong>(C) Reporting to Regulatory and Enforcement Authorities</strong> — the auditor shall determine whether there is a responsibility to report identified/suspected non-compliance to parties outside the entity.</p>\n<p><strong>Documentation</strong> — the auditor shall document identified/suspected non-compliance and the results of discussions with management and, where applicable, TCWG and other parties outside the entity.</p>"
      }
    ]
  },
  {
    "id": "sa260",
    "title": "SA 260 – Communication with Those Charged with Governance",
    "subtitle": "What to communicate, when, and how — plus independence disclosures for listed entities.",
    "cards": [
      {
        "id": "4593021a-8d29-4b7a-a577-a5b8c6db0d3b",
        "title": "Who are \"Those Charged with Governance\"? & Significance of Communication",
        "keywords": [
          {
            "icon": "compass",
            "label": "Overseeing strategic direction"
          },
          {
            "icon": "puzzle",
            "label": "Governance structures vary"
          },
          {
            "icon": "megaphone",
            "label": "Two-way communication"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>\"<strong>Those charged with governance</strong>\" (TCWG) denote the person(s)/organization(s) responsible for <strong>overseeing the strategic direction</strong> of the entity and obligations related to its accountability, including overseeing the financial reporting process.</p>\n<p><strong>Governance structures vary</strong> by entity — some have a supervisory board separate from an executive board; in others, both functions rest with a single board, or with the owner-manager; in some cases, governance is the collective responsibility of a board of directors, partners, trustees, or a committee of management.</p>\n<p><strong>Significance of communication</strong> — an effective two-way communication assists:</p>\n<ul><li>The auditor and TCWG in understanding matters related to the audit in context, and developing a constructive working relationship, while maintaining independence and objectivity.</li><li>The auditor in obtaining information relevant to the audit from TCWG (e.g. understanding the entity, sources of evidence, specific transactions).</li><li>TCWG in fulfilling their responsibility to oversee the financial reporting process, reducing the risks of material misstatement.</li></ul>"
      },
      {
        "id": "f6143d2b-8963-4d3e-8676-01ebeb3188c7",
        "title": "Objectives of the Auditor under SA 260",
        "keywords": [
          {
            "icon": "scroll",
            "label": "Communicate responsibilities and scope/timing"
          },
          {
            "icon": "folder",
            "label": "Obtain information relevant to audit"
          },
          {
            "icon": "alarm-clock",
            "label": "Provide timely observations"
          },
          {
            "icon": "megaphone",
            "label": "Promote two-way communication"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The objectives of the auditor under SA 260 are:</p>\n<ol type=\"a\"><li>To <strong>communicate clearly</strong> with TCWG the responsibilities of the auditor in relation to the financial statement audit, and an overview of the <strong>planned scope and timing</strong> of the audit;</li><li>To <strong>obtain from TCWG information</strong> relevant to the audit;</li><li>To provide TCWG with <strong>timely observations</strong> arising from the audit that are significant and relevant to their responsibility to oversee the financial reporting process; and</li><li>To promote effective <strong>two-way communication</strong> between the auditor and TCWG.</li></ol>\n<p>The auditor shall determine the appropriate person(s) within the entity's governance structure with whom to communicate.</p>"
      },
      {
        "id": "a9220f93-0748-49f2-bdf3-5f7dcc68e09b",
        "title": "Matters to be Communicated — Auditor's Responsibilities & Planned Scope/Timing",
        "keywords": [
          {
            "icon": "stamp",
            "label": "Forming and expressing an opinion"
          },
          {
            "icon": "id-card",
            "label": "Does not relieve management"
          },
          {
            "icon": "warning-triangle",
            "label": "Overview of significant risks"
          },
          {
            "icon": "eye",
            "label": "Care re: predictability"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>[a] Auditor's responsibilities in relation to the financial statement audit</strong> — the auditor shall communicate that:</p>\n<ul><li>The auditor is responsible for <strong>forming and expressing an opinion</strong> on the FS prepared by management with the oversight of TCWG; and</li><li>The audit <strong>does not relieve management or TCWG</strong> of their responsibilities.<p>This is often included in the engagement letter; where TCWG did not agree the terms, providing a copy of the letter may be an appropriate way to communicate.</p><p><strong>[b] Planned scope and timing of the audit</strong> — communication:</p></li><li>Gives TCWG an <strong>overview of planned scope and timing</strong>, including <strong>significant risks</strong> identified by the auditor.</li><li>Assists TCWG to understand the consequences of the auditor's work and discuss risk/materiality; assists the auditor to understand the entity better.</li><li><strong>Care is necessary</strong> not to compromise audit effectiveness — e.g. communicating detailed procedure timing may make them too predictable, particularly where TCWG are involved in managing the entity.</li></ul>"
      },
      {
        "id": "2c716e4e-6c41-41b3-ae0e-c9d13cc3cd20",
        "title": "Matters to be Communicated — Significant Findings from the Audit",
        "keywords": [
          {
            "icon": "open-book",
            "label": "Views on accounting practices"
          },
          {
            "icon": "warning-triangle",
            "label": "Significant difficulties"
          },
          {
            "icon": "handshake",
            "label": "Significant matters discussed with management"
          },
          {
            "icon": "scroll",
            "label": "Circumstances affecting the report"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>[c] Significant findings from the audit</strong> — the auditor shall communicate:</p>\n<ol type=\"i\"><li>The auditor's <strong>views about significant qualitative aspects</strong> of the entity's accounting practices, including policies, estimates, and disclosures — explaining why an acceptable practice is not considered most appropriate, when applicable.</li><li><strong>Significant difficulties</strong>, if any, encountered during the audit (e.g. delays by management, unreasonably brief time, restrictions imposed, unwillingness to extend going-concern assessment).</li><li>Unless all TCWG are involved in managing the entity: (1) <strong>Significant matters</strong> arising during the audit that were discussed with, or subject to correspondence with, management; and (2) <strong>Written representations</strong> the auditor is requesting.</li><li><strong>Circumstances that affect the form and content</strong> of the auditor's report, if any.</li><li>Any other significant matters relevant, in the auditor's professional judgment, to the oversight of the financial reporting process.</li></ol>\n<p>Circumstances requiring communication include: expected modification of opinion (SA 705), a material uncertainty on going concern (SA 570), key audit matters (SA 701), an Emphasis of/Other Matter paragraph (SA 706), or uncorrected material misstatement of other information (SA 720).</p>"
      },
      {
        "id": "8e8c0359-a752-4412-8e8f-56c51e4a4d03",
        "title": "Communication of Auditor's Independence (Listed Entities)",
        "keywords": [
          {
            "icon": "signature",
            "label": "Statement of compliance with ethical requirements"
          },
          {
            "icon": "link-chain",
            "label": "All relationships bearing on independence"
          },
          {
            "icon": "calculator",
            "label": "Fees for audit and non-audit services"
          },
          {
            "icon": "shield",
            "label": "Safeguards applied"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>In the case of <strong>listed entities</strong>, the auditor shall communicate with TCWG:</p>\n<ol type=\"a\"><li>A <strong>statement that the engagement team</strong> and others in the firm, the firm, and network firms, have complied with relevant <strong>ethical requirements regarding independence</strong>; and</li><li>(i) All <strong>relationships and other matters</strong> between the firm, network firms, and the entity that may reasonably be thought to bear on independence — including <strong>total fees</strong> charged for audit and non-audit services, allocated to categories appropriate to assess the effect on independence; and (ii) The related <strong>safeguards applied</strong> to eliminate identified threats or reduce them to an acceptable level.</li></ol>"
      },
      {
        "id": "cd7966fa-8049-4bc3-9054-3e6f18bc8620",
        "title": "The Communication Process, Adequacy & Documentation",
        "keywords": [
          {
            "icon": "gear",
            "label": "Form, timing and content"
          },
          {
            "icon": "envelope",
            "label": "Written for significant findings"
          },
          {
            "icon": "alarm-clock",
            "label": "On a timely basis"
          },
          {
            "icon": "magnify",
            "label": "Adequacy of two-way communication"
          },
          {
            "icon": "scroll",
            "label": "Documentation"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>The Communication Process</strong> — the auditor shall communicate with TCWG the form, timing, and expected general content of communications.</p>\n<ul><li>The auditor shall communicate <strong>in writing</strong> regarding significant findings from the audit if oral communication would not be adequate — written communications need not include all matters that arose during the audit.</li><li>The auditor shall communicate <strong>in writing</strong> regarding auditor independence when required, in case of listed entities.</li><li>The auditor shall communicate with TCWG <strong>on a timely basis</strong>.</li></ul>\n<p><strong>Adequacy of the Communication Process</strong> — the auditor shall evaluate whether the two-way communication between the auditor and TCWG has been adequate for the purpose of the audit. If not, the auditor shall evaluate the effect, if any, on the assessment of risks of material misstatement and ability to obtain sufficient appropriate audit evidence, and take appropriate action.</p>\n<p><strong>Documentation</strong> — where matters were communicated orally, the auditor shall include them in the audit documentation, along with when and to whom they were communicated. Where communicated in writing, the auditor shall retain a copy as part of the audit documentation.</p>"
      }
    ]
  },
  {
    "id": "sa265",
    "title": "SA 265 – Communicating Deficiencies in Internal Control",
    "subtitle": "Identifying, evaluating, and communicating significant deficiencies to TCWG and management.",
    "cards": [
      {
        "id": "3f266c4f-e30e-4dbc-a723-f12a9e56073d",
        "title": "Auditor's Objective",
        "keywords": [
          {
            "icon": "gear",
            "label": "Deficiencies in IC"
          },
          {
            "icon": "flag",
            "label": "Sufficient importance"
          },
          {
            "icon": "id-card",
            "label": "TCWG and management"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>To communicate to <strong>TCWG and management</strong>, deficiencies in internal control that the auditor has identified, and which, in the auditor's professional judgment, are of <strong>sufficient importance</strong> to merit their respective attention.</p>"
      },
      {
        "id": "efcf55bb-6b80-4f74-97ef-e1eb8a776d3f",
        "title": "Requirements",
        "keywords": [
          {
            "icon": "magnify",
            "label": "Determine deficiencies"
          },
          {
            "icon": "warning-triangle",
            "label": "Significant deficiencies"
          },
          {
            "icon": "scroll",
            "label": "Communicate in writing to TCWG"
          },
          {
            "icon": "megaphone",
            "label": "Communicate to management"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ul><li><strong>Determine</strong> whether, based on audit work performed, one or more deficiencies in internal control (IC) have been identified.</li><li>If identified, determine whether, individually or in combination, they constitute <strong>significant deficiencies</strong>.</li><li><strong>Communicate in writing</strong>, significant deficiencies to <strong>TCWG</strong> on a timely basis.</li><li><strong>Communicate to management</strong> at an appropriate level, on a timely basis:<ol type=\"a\"><li>In writing, significant deficiencies already communicated (or intended to be communicated) to TCWG, unless inappropriate to do so directly; and</li><li>Other deficiencies not communicated by other parties that, in the auditor's judgment, merit management's attention.</li></ol></li></ul>"
      },
      {
        "id": "fa3f3e9d-bfb9-4496-b501-09c1bf992835",
        "title": "Written Communication to TCWG",
        "keywords": [
          {
            "icon": "scroll",
            "label": "Description and potential effects"
          },
          {
            "icon": "folder",
            "label": "Sufficient context"
          },
          {
            "icon": "target",
            "label": "Purpose of the audit"
          },
          {
            "icon": "puzzle",
            "label": "Scope limited to IC relevant to FS"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The written communication of significant deficiencies shall include:</p>\n<ol type=\"a\"><li>A <strong>description of the deficiencies</strong> and an explanation of their potential effects; and</li><li><strong>Sufficient information</strong> to enable TCWG and management to understand the context of the communication.</li></ol>\n<p>In particular, the auditor shall explain that:</p>\n<ul><li>The <strong>purpose of the audit</strong> was to express an opinion on the financial statements.</li><li>The audit included consideration of internal controls relevant to designing audit procedures, but <strong>not for the purpose of expressing an opinion on the effectiveness of IC</strong>.</li><li>The matters reported are <strong>limited to deficiencies identified during the audit</strong> and concluded to be of sufficient importance to report.</li></ul>"
      },
      {
        "id": "1a86b11a-e6c3-4dad-b775-424fc62cdb71",
        "title": "How to Determine if There Are Significant Deficiencies in IC",
        "keywords": [
          {
            "icon": "warning-triangle",
            "label": "Ineffective risk assessment process"
          },
          {
            "icon": "broken-chain",
            "label": "Misstatements not prevented or detected"
          },
          {
            "icon": "calendar",
            "label": "Prior period item disclosure"
          },
          {
            "icon": "eye",
            "label": "Inability to oversee FS preparation"
          },
          {
            "icon": "shield",
            "label": "Ineffective response to significant risks"
          },
          {
            "icon": "brick-wall",
            "label": "Ineffective control environment"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Indicators of significant deficiencies in internal control include:</p>\n<ul><li>Evidence of an <strong>ineffective risk assessment process (RAP)</strong> — e.g. management's failure to identify a ROMM the auditor would expect the RAP to have identified.</li><li><strong>Misstatements detected</strong> by the auditor's procedures that were <strong>not prevented, or detected and corrected</strong>, by the entity's internal control.</li><li>Disclosure of a material misstatement due to error or fraud as a <strong>prior period item</strong> in the current year's P&L.</li><li>Evidence of management's <strong>inability to oversee the preparation</strong> of the financial statements.</li><li>Evidence of an <strong>ineffective response to identified significant risks</strong> (e.g. absence of controls over such a risk).</li><li>Evidence of <strong>ineffective aspects of the control environment</strong>, such as: (a) management fraud not prevented by IC; (b) failure to remedy previously communicated deficiencies; (c) absence of a RAP where one would ordinarily be expected.</li></ul>"
      },
      {
        "id": "12b59e37-638c-4c73-a05e-996d64a033d1",
        "title": "How to Decide if an Identified Deficiency Is Significant or Not",
        "keywords": [
          {
            "icon": "crystal-ball",
            "label": "Likelihood of future misstatement"
          },
          {
            "icon": "link-chain",
            "label": "Interaction with other deficiencies"
          },
          {
            "icon": "ruler",
            "label": "Volume of activity exposed"
          },
          {
            "icon": "target",
            "label": "FS amounts exposed"
          },
          {
            "icon": "mask",
            "label": "Susceptibility to loss or fraud"
          },
          {
            "icon": "shield-check",
            "label": "Importance of the controls"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Matters the auditor may consider in determining whether a deficiency (or combination) is significant:</p>\n<ul><li>The <strong>likelihood</strong> of the deficiencies leading to material misstatements in the future.</li><li>The <strong>interaction</strong> of the deficiency with other deficiencies in internal control.</li><li>The <strong>volume of activity</strong> exposed to the deficiency, in the account balance or class of transactions.</li><li>The <strong>financial statement amounts</strong> exposed to the deficiencies.</li><li>The <strong>susceptibility to loss or fraud</strong> of the related asset or liability.</li><li>The <strong>importance of the controls</strong> to financial reporting — e.g. general monitoring controls, controls over fraud prevention/detection, over significant accounting policies, related-party transactions, unusual transactions, or the period-end financial reporting process.</li></ul>"
      },
      {
        "id": "5ded27ac-a377-4a65-a461-989938124229",
        "title": "When to Communicate?",
        "keywords": [
          {
            "icon": "calendar",
            "label": "Listed entities — before approval of FS"
          },
          {
            "icon": "folder",
            "label": "Other entities — before assembly of audit file"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ul><li><strong>Listed entities:</strong> Before the date of approval of the financial statements.</li><li><strong>Other entities:</strong> Before the assembly of the audit file (i.e. the actual date of assembly).</li></ul>"
      },
      {
        "id": "94fcb127-df00-4ed5-aad3-8a056b09dcd7",
        "title": "Notes",
        "keywords": [
          {
            "icon": "scroll",
            "label": "Repeat or reference prior communication"
          },
          {
            "icon": "megaphone",
            "label": "Oral communication before written"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ul><li>If a previously communicated significant deficiency remains, the current year's communication may <strong>repeat the description</strong> from the previous communication, or simply <strong>reference</strong> it.</li><li>The auditor may communicate the matter <strong>orally before communicating it in writing</strong>.</li></ul>"
      }
    ]
  },
  {
    "id": "sa299",
    "title": "SA 299 – Joint Audit of Financial Statements",
    "subtitle": "Planning, dividing work, joint & several responsibility, and reporting among joint auditors.",
    "cards": [
      {
        "id": "c8d74f67-510d-4f4e-b60e-af30796aafd3",
        "title": "Meaning of Joint Audit & Objectives under SA 299",
        "keywords": [
          {
            "icon": "id-card",
            "label": "Two or more auditors"
          },
          {
            "icon": "scale",
            "label": "Section 139(3)"
          },
          {
            "icon": "compass",
            "label": "Uniform approach"
          },
          {
            "icon": "handshake",
            "label": "Individual and joint responsibility"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>A <strong>joint audit</strong> is an audit of financial statements of an entity by <strong>two or more auditors</strong> appointed with the objective of issuing the audit report — such auditors are called <strong>joint auditors</strong>.</p>\n<p>Section <strong>139(3)</strong> of the Companies Act, 2013 provides that members of a company may resolve that the audit shall be conducted by more than one auditor.</p>\n<p>SA 299 lays down principles for the effective conduct of a joint audit, to achieve the overall objectives of the auditor under SA 200. It does not deal with the relationship between a principal auditor and a component auditor.</p>\n<p>Objectives of SA 299:</p>\n<ol type=\"a\"><li>To lay down <strong>broad principles</strong> for the joint auditors in conducting the joint audit.</li><li>To provide a <strong>uniform approach</strong> to the process of joint audit.</li><li>To identify the <strong>distinct areas of work</strong> and coverage thereof by each joint auditor.</li><li>To identify <strong>individual responsibility and joint responsibility</strong> of the joint auditors in relation to the audit.</li></ol>"
      },
      {
        "id": "5febee16-3171-4375-9c58-c2416811b689",
        "title": "Audit Planning, Risk Assessment and Allocation of Work",
        "keywords": [
          {
            "icon": "compass",
            "label": "Joint audit plan"
          },
          {
            "icon": "puzzle",
            "label": "Division of audit areas"
          },
          {
            "icon": "warning-triangle",
            "label": "Risks of material misstatement"
          },
          {
            "icon": "envelope",
            "label": "Common engagement letter"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The engagement partner and key team members from each joint auditor shall be involved in <strong>planning the audit</strong>; the overall audit strategy shall be established jointly.</p>\n<p>Prior to commencement, the joint auditors shall discuss and develop a <strong>joint audit plan</strong>, which shall:</p>\n<ol type=\"a\"><li><strong>Identify division of audit areas</strong> and common audit areas amongst the joint auditors — usually by identifiable units/specified areas, or by reference to assets/liabilities/income/expenditure where a functional division is not possible; certain important areas may not be divided and remain covered by all joint auditors.</li><li>Ascertain the <strong>reporting objectives</strong> to plan timing and nature of communications required.</li><li>Consider and communicate among all joint auditors the factors significant in directing the engagement team's efforts.</li><li>Consider results of preliminary engagement activities and relevant knowledge from prior/similar engagements.</li><li>Ascertain the nature, timing, and extent of resources necessary to perform the engagement.</li></ol>\n<p><strong>Risks of material misstatement</strong> shall be assessed by each joint auditor and communicated to the others, and documented.</p>\n<p>The joint auditors shall obtain a <strong>common engagement letter</strong> and common management representation letter. The work allocation document shall be signed by all joint auditors and communicated to TCWG.</p>"
      },
      {
        "id": "02264978-0676-4219-a53e-cf354141056c",
        "title": "Responsibility and Co-ordination among Joint Auditors",
        "keywords": [
          {
            "icon": "folder",
            "label": "Shared responsibility for info/explanations"
          },
          {
            "icon": "puzzle",
            "label": "Separate responsibility for divided work"
          },
          {
            "icon": "scroll",
            "label": "Communicate matters in writing"
          },
          {
            "icon": "hourglass",
            "label": "Individual NTE determination"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Obtaining and evaluating information and explanations from management is a <strong>shared responsibility</strong> of all joint auditors, unless they agree on a specific pattern of distribution.</p>\n<p>For work <strong>divided among the joint auditors</strong>, each joint auditor is responsible <strong>only for the work allocated</strong> to them, including proper execution of the audit procedures — whether or not they have prepared a separate report on the work performed.</p>\n<p>Where a joint auditor comes across matters relevant to another joint auditor's area, which deserve attention or require disclosure/discussion/judgment by others, that joint auditor shall <strong>communicate the same to all other joint auditors in writing</strong> prior to completion of the audit.</p>\n<p>Each joint auditor is individually responsible to determine the <strong>nature, timing, and extent (NTE)</strong> of audit procedures for the areas of work allocated to them, and to study and evaluate the prevailing system of internal control relating to that work.</p>"
      },
      {
        "id": "51956c8f-8266-487a-b9c7-ac5abf2ca0c6",
        "title": "Joint & Several Responsibility — What's Covered",
        "keywords": [
          {
            "icon": "gear",
            "label": "Undivided audit work"
          },
          {
            "icon": "stamp",
            "label": "Common area decisions"
          },
          {
            "icon": "handshake",
            "label": "Matters with agreement"
          },
          {
            "icon": "scale",
            "label": "Compliance with statutes and FRF"
          },
          {
            "icon": "clipboard-check",
            "label": "Audit report compliance"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>All the joint auditors shall be <strong>jointly and severally responsible</strong> for:</p>\n<ul><li>The audit work which is <strong>not divided</strong> among the joint auditors and is carried out by all joint auditors.</li><li><strong>Decisions</strong> taken by all joint auditors under audit planning in respect of <strong>common audit areas</strong> concerning the nature, timing, and extent of procedures to be performed by each.</li><li>Matters which are <strong>brought to the notice</strong> of the joint auditors by any one of them, and on which there is <strong>agreement</strong> among the joint auditors.</li><li>Examining that the financial statements <strong>comply with the relevant statutes</strong>.</li><li><strong>Presentation and disclosure</strong> of the financial statements as required by the applicable financial reporting framework.</li><li>Ensuring that the <strong>audit report complies</strong> with the requirements of the relevant statutes, applicable SAs, and other pronouncements of ICAI.</li></ul>\n<p>For decisions on common areas concerning nature/timing/extent, joint auditors are responsible only for the <strong>appropriateness</strong> of the decisions agreed among them — <strong>proper execution</strong> remains the individual responsibility of the joint auditor concerned.</p>"
      },
      {
        "id": "f6f2b816-87e5-495d-90e1-ea9fc9b66b03",
        "title": "Audit Conclusion, Reporting & Communication with TCWG",
        "keywords": [
          {
            "icon": "scroll",
            "label": "Common audit report"
          },
          {
            "icon": "broken-chain",
            "label": "Separate report on disagreement"
          },
          {
            "icon": "flag",
            "label": "Other Matter paragraph reference"
          },
          {
            "icon": "thumb",
            "label": "Entitled to assume"
          },
          {
            "icon": "megaphone",
            "label": "Communicate before finalizing"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The joint auditors are required to issue a <strong>common audit report</strong>; however, where they are in disagreement on the opinion or any matters to be covered, they shall express their opinion in a <strong>separate audit report</strong>.</p>\n<p>A joint auditor is <strong>not bound by the majority view</strong> of the other joint auditors, and shall express the opinion formed by them in a separate report in case of disagreement. Such separate reports shall cross-reference each other under the heading <strong>\"Other Matter Paragraph\"</strong> as per SA 706.</p>\n<p><strong>Each joint auditor is entitled to assume</strong> that:</p>\n<ul><li>The other joint auditors have carried out their part of the audit work in accordance with the SAs — it is not necessary to review the work performed by other joint auditors or perform tests to ascertain this.</li><li>The other joint auditors have brought to their notice any departure from the applicable financial reporting framework or significant observations relevant to their responsibilities.</li></ul>\n<p>Where a division/branch's FS are audited by one joint auditor, the others may proceed on the basis that such FS comply with legal/regulatory requirements and present a true and fair view.</p>\n<p><strong>Before finalizing</strong> the audit report, the joint auditors shall discuss and communicate with each other their respective conclusions that would form the report's content.</p>\n<p><strong>Communication with TCWG</strong> — when joint auditors expect to modify the opinion, or include an Emphasis of Matter/Other Matter paragraph, they shall communicate with TCWG the circumstances/expectation and the proposed wording, to ensure compliance with SA 705/SA 706.</p>"
      }
    ]
  },
  {
    "id": "sa315",
    "title": "SA 315 – Identifying and Assessing ROMM",
    "subtitle": "Assertions, internal control, risk assessment procedures, and significant/IT risks.",
    "cards": [
      {
        "id": "e6adeb0f-e2f9-4f80-9c8a-c87b2ab739c2",
        "title": "Objective of the Auditor",
        "keywords": [
          {
            "icon": "warning-triangle",
            "label": "ROMM at FS and assertion level"
          },
          {
            "icon": "compass",
            "label": "Understanding entity and environment"
          },
          {
            "icon": "gear",
            "label": "Basis for responses"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>To identify and assess the <strong>risk of material misstatement (ROMM)</strong>, whether due to fraud or error, at the <strong>financial statement and assertion levels</strong>, through understanding the entity and its environment, including its internal control — thereby providing a <strong>basis for designing and implementing responses</strong> to the assessed ROMM.</p>"
      },
      {
        "id": "524ba6b4-0a25-42f0-9d36-6bce332ff101",
        "title": "Assertions",
        "keywords": [
          {
            "icon": "clipboard-check",
            "label": "OCACC — transactions and events"
          },
          {
            "icon": "scale",
            "label": "ERCV — account balances"
          },
          {
            "icon": "scroll",
            "label": "OCCA — presentation and disclosure"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Assertions are representations by management, embodied in the financial statements, used by the auditor to consider the different types of potential misstatements that may occur.</p>\n<p><strong>Assertions about Classes of Transactions and Events (OCACC):</strong></p>\n<ul><li><strong>Occurrence</strong> — transactions and events recorded have occurred and pertain to the entity.</li><li><strong>Completeness</strong> — all transactions/events that should have been recorded have been recorded.</li><li><strong>Accuracy</strong> — amounts and data have been recorded appropriately.</li><li><strong>Cut-off</strong> — transactions/events recorded in the correct accounting period.</li><li><strong>Classification</strong> — transactions/events recorded in the proper accounts.<p><strong>Assertions about Account Balances at the Period End (ERCV):</strong></p></li><li><strong>Existence</strong> — assets, liabilities, and equity interests exist.</li><li><strong>Rights and obligations</strong> — the entity holds/controls rights to assets; liabilities are its obligations.</li><li><strong>Completeness</strong> — all balances that should have been recorded have been recorded.</li><li><strong>Valuation and allocation</strong> — included at appropriate amounts, with any adjustments appropriately recorded.<p><strong>Assertions about Presentation and Disclosure (OCCA):</strong></p></li><li><strong>Occurrence and rights and obligations</strong> — disclosed events/transactions have occurred and pertain to the entity.</li><li><strong>Completeness</strong> — all disclosures that should have been included have been included.</li><li><strong>Classification and understandability</strong> — information appropriately presented and clearly expressed.</li><li><strong>Accuracy and valuation</strong> — disclosed fairly and at appropriate amounts.</li></ul>"
      },
      {
        "id": "c61ede24-c1b8-4000-97a8-a75d73966255",
        "title": "Internal Control (IC)",
        "keywords": [
          {
            "icon": "gear",
            "label": "Designed, implemented, maintained"
          },
          {
            "icon": "shield-check",
            "label": "Reliability of financial reporting"
          },
          {
            "icon": "target",
            "label": "Effectiveness/efficiency of operations"
          },
          {
            "icon": "shield",
            "label": "Safeguarding of assets"
          },
          {
            "icon": "scale",
            "label": "Compliance with laws"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>A process <strong>designed, implemented, and maintained (DIM)</strong> by TCWG, management, and other personnel, to provide reasonable assurance about achievement of the entity's objectives regarding:</p>\n<ul><li><strong>Reliability of financial reporting</strong>,</li><li><strong>Effectiveness and efficiency of operations</strong>,</li><li><strong>Safeguarding of assets</strong>, and</li><li><strong>Compliance</strong> with applicable laws and regulations.</li></ul>"
      },
      {
        "id": "f19f694c-5325-48be-aa59-a5d85b5ef9a9",
        "title": "Risk Assessment Procedures (RAP)",
        "keywords": [
          {
            "icon": "megaphone",
            "label": "Inquiries of management"
          },
          {
            "icon": "magnify",
            "label": "Analytical procedures"
          },
          {
            "icon": "eye",
            "label": "Observation and inspection"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Risk assessment procedures</strong> are audit procedures performed to obtain an understanding of the entity and its environment, including internal control, to identify and assess the ROMM at the financial statement and assertion levels.</p>\n<p>Risk assessment procedures shall include:</p>\n<ol type=\"a\"><li><strong>Inquiries of management</strong> and others within the entity likely to have information assisting in identifying ROMM due to fraud or error.</li><li><strong>Analytical procedures</strong>.</li><li><strong>Observation and inspection</strong>.</li></ol>"
      },
      {
        "id": "861512b1-0ab3-4b04-8e28-fab8fdfcacf3",
        "title": "Understanding to Be Obtained (Knowledge of Business)",
        "keywords": [
          {
            "icon": "compass",
            "label": "Industry, regulatory, external factors"
          },
          {
            "icon": "id-card",
            "label": "Nature of the entity"
          },
          {
            "icon": "open-book",
            "label": "Accounting policies selected"
          },
          {
            "icon": "target",
            "label": "Objectives, strategies and business risks"
          },
          {
            "icon": "ruler",
            "label": "Measurement and review of performance"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall obtain an understanding of:</p>\n<ol type=\"a\"><li>The relevant <strong>industry, regulatory, and other external factors</strong>, including the applicable FRF.</li><li>The <strong>nature of the entity</strong> — its operations; ownership and governance structures; types of investments made/planned, including special-purpose entities; and how it is structured and financed.</li><li>The entity's <strong>selection and application of accounting policies</strong>, including reasons for changes.</li><li>The entity's <strong>objectives and strategies</strong>, and related business risks that may result in ROMM.</li><li>The <strong>measurement and review</strong> of the entity's financial performance.</li></ol>"
      },
      {
        "id": "043cd333-455f-4769-893a-5623351ca1da",
        "title": "Auditor's Process of Assessing the ROMM",
        "keywords": [
          {
            "icon": "magnify",
            "label": "Identify risks"
          },
          {
            "icon": "scale",
            "label": "Assess — pervasive or specific"
          },
          {
            "icon": "puzzle",
            "label": "Relate to WCGW and controls"
          },
          {
            "icon": "crystal-ball",
            "label": "Likelihood and magnitude"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ol type=\"a\"><li><strong>Identify</strong> risks throughout the process of understanding the entity and its environment, including relevant controls, considering classes of transactions, account balances, and disclosures (ABCD).</li><li><strong>Assess</strong> identified risks, evaluating whether they relate more pervasively to the financial statements as a whole, potentially affecting many assertions.</li><li><strong>Relate</strong> identified risks to <strong>what can go wrong (WCGW)</strong> at the assertion level, considering relevant controls the auditor intends to test.</li><li>Consider the <strong>likelihood</strong> of misstatement, including multiple misstatements, and whether the potential misstatement is of a <strong>magnitude</strong> that could be material.</li></ol>"
      },
      {
        "id": "04289e7e-147b-472d-90db-1a29ed63c087",
        "title": "IT Risks",
        "keywords": [
          {
            "icon": "gear",
            "label": "Inaccurate data processing"
          },
          {
            "icon": "door",
            "label": "Unauthorised access to data"
          },
          {
            "icon": "broken-chain",
            "label": "Breakdown of segregation of duties"
          },
          {
            "icon": "warning-triangle",
            "label": "Unauthorised changes to data/systems"
          },
          {
            "icon": "hourglass",
            "label": "Failure to make necessary changes"
          },
          {
            "icon": "ghost",
            "label": "Loss of or inability to access data"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Specific IT-related risks affecting an entity's internal control include:</p>\n<ul><li>Reliance on systems/programs <strong>inaccurately processing data</strong>, or processing inaccurate data, or both.</li><li><strong>Unauthorised access</strong> to data that may result in destruction of data or improper changes.</li><li>IT personnel gaining access privileges beyond assigned duties, <strong>breaking down segregation of duties</strong>.</li><li><strong>Unauthorised changes</strong> to data in master files, or to systems/programs.</li><li><strong>Failure to make necessary changes</strong> to systems or programs.</li><li>Inappropriate manual intervention.</li><li>Potential <strong>loss of data</strong>, or inability to access data as required.</li></ul>"
      },
      {
        "id": "28d7c753-f81b-4cdc-9c09-63951ac9230b",
        "title": "Significant Risks",
        "keywords": [
          {
            "icon": "spotlight",
            "label": "Special audit consideration"
          },
          {
            "icon": "mask",
            "label": "Risk of fraud"
          },
          {
            "icon": "flag",
            "label": "Recent significant developments"
          },
          {
            "icon": "puzzle",
            "label": "Complexity of transactions"
          },
          {
            "icon": "handshake",
            "label": "Related party transactions"
          },
          {
            "icon": "crystal-ball",
            "label": "Subjectivity in measurement"
          },
          {
            "icon": "warning-triangle",
            "label": "Unusual transactions"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>A <strong>significant risk</strong> is an identified and assessed ROMM that, in the auditor's judgment, requires <strong>special audit consideration</strong>.</p>\n<p>Factors the auditor considers in determining whether a risk is significant:</p>\n<ol type=\"a\"><li>Whether the risk is a <strong>risk of fraud</strong>.</li><li>Whether related to <strong>recent significant economic, accounting, or other developments</strong> (e.g. regulatory changes) requiring specific attention.</li><li>The <strong>complexity of transactions</strong>.</li><li>Whether it involves significant <strong>related-party transactions</strong>.</li><li>The degree of <strong>subjectivity</strong> in measurement, especially with a wide range of measurement uncertainty.</li><li>Whether it involves significant transactions <strong>outside the normal course of business</strong>, or that otherwise appear unusual.</li></ol>"
      }
    ]
  },
  {
    "id": "sa320",
    "title": "SA 320 – Materiality in Planning and Performing an Audit",
    "subtitle": "Performance materiality, revision during the audit, and choosing a benchmark.",
    "cards": [
      {
        "id": "aa88cecc-e505-42ca-a406-4f422d96df65",
        "title": "Performance Materiality (PM)",
        "keywords": [
          {
            "icon": "ruler",
            "label": "Less than FS materiality"
          },
          {
            "icon": "shield",
            "label": "Reduce probability of aggregate misstatement"
          },
          {
            "icon": "puzzle",
            "label": "Applicable to particular ABCD"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Performance materiality</strong> is the amount(s) set by the auditor, at <strong>less than the materiality for the FS as a whole</strong>, to reduce to an appropriately low level the probability that the aggregate of uncorrected and undetected misstatements exceeds materiality for the FS as a whole.</p>\n<p>If applicable, performance materiality also refers to the amount(s) set by the auditor at less than the materiality level(s) for a <strong>particular class of transaction, account balance, or disclosure (ABCD)</strong>.</p>"
      },
      {
        "id": "071b9f32-e714-40a6-9d56-5148e2032c13",
        "title": "Determining Materiality and PM When Planning the Audit",
        "keywords": [
          {
            "icon": "target",
            "label": "Materiality for FS as a whole"
          },
          {
            "icon": "puzzle",
            "label": "Materiality for particular ABCD"
          },
          {
            "icon": "hourglass",
            "label": "PM for ROMM assessment and NTE"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>When establishing the overall audit strategy, the auditor shall determine <strong>materiality for the FS as a whole</strong>.</p>\n<ul><li>If there are particular ABCD where lesser misstatements could reasonably be expected to influence users' economic decisions, the auditor shall also determine the <strong>materiality level(s) for those particular ABCD</strong>.</li><li>The auditor shall determine <strong>performance materiality</strong> for purposes of assessing the ROMM, and determining the <strong>nature, timing, and extent (NTE)</strong> of further audit procedures (FAP).</li></ul>"
      },
      {
        "id": "39c847c6-c64c-41af-81c8-2e0329086f2d",
        "title": "Revision of Materiality",
        "keywords": [
          {
            "icon": "ghost",
            "label": "Change in circumstances"
          },
          {
            "icon": "folder",
            "label": "New information"
          },
          {
            "icon": "compass",
            "label": "Change in understanding of the entity"
          },
          {
            "icon": "gear",
            "label": "Revise performance materiality"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall <strong>revise materiality</strong> for the FS as a whole (and, if applicable, particular ABCD levels) on becoming aware of information during the audit that would have led to a different amount being determined initially. This may result from:</p>\n<ol type=\"a\"><li>A <strong>change in circumstances</strong> during the audit (e.g. a decision to dispose of a major part of the business);</li><li><strong>New information</strong>; or</li><li>A <strong>change in the auditor's understanding</strong> of the entity and its operations, from performing further procedures.</li></ol>\n<p>If a lower materiality is concluded to be appropriate, the auditor shall determine whether it is necessary to <strong>revise performance materiality</strong>, and whether the NTE of further audit procedures remain appropriate.</p>"
      },
      {
        "id": "1e38a8e0-bbd8-42a2-914d-9548ee274200",
        "title": "Benchmark",
        "keywords": [
          {
            "icon": "scroll",
            "label": "Elements of the financial statements"
          },
          {
            "icon": "eye",
            "label": "Focus of users"
          },
          {
            "icon": "id-card",
            "label": "Nature, ownership, life cycle"
          },
          {
            "icon": "raincloud",
            "label": "Volatility of the benchmark"
          },
          {
            "icon": "calculator",
            "label": "PBT vs Gross Profit/Revenue"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Determining materiality involves professional judgment; a percentage is often applied to a chosen <strong>benchmark</strong> as a starting point.</p>\n<p>Factors affecting identification of an appropriate benchmark:</p>\n<ul><li>The <strong>elements of the financial statements</strong> (assets, liabilities, equity, revenue, expenses).</li><li>Whether there are items on which <strong>users' attention tends to focus</strong> (e.g. profit, revenue, or net assets).</li><li>The <strong>nature of the entity</strong>, where it is in its life cycle, and its industry/economic environment.</li><li>The entity's <strong>ownership structure and financing</strong> (e.g. debt-financed entities — users may emphasize assets over earnings).</li><li>The relative <strong>volatility</strong> of the benchmark.<p>A percentage applied to <strong>profit before tax (PBT)</strong> from continuing operations will normally be higher than the percentage applied to total revenue.</p><p>Examples of benchmarks: profit before tax, total revenue, gross profit, total expenses, total equity, or net asset value.</p><p><strong>Type of Entity → Benchmark:</strong></p></li><li>Profit-oriented entities → PBT from continuing operations</li><li>If PBT volatile → Gross Profit or Total Revenues</li><li>Public utility programs/projects → Total cost or net cost (expenses less receipts)</li><li>Custody of assets → Assets</li></ul>"
      }
    ]
  },
  {
    "id": "sa330",
    "title": "SA 330 – The Auditor's Responses to Assessed Risks",
    "subtitle": "Tests of controls vs substantive procedures, and how much testing is enough.",
    "cards": [
      {
        "id": "bc636cf0-f8ea-451f-ba9e-54607b5d96d4",
        "title": "Further Audit Procedures — Response to Assessed ROMM at Assertion Level",
        "keywords": [
          {
            "icon": "magnify",
            "label": "Reasons for the risk assessment"
          },
          {
            "icon": "raincloud",
            "label": "Inherent risk"
          },
          {
            "icon": "shield",
            "label": "Control risk — reliance on controls"
          },
          {
            "icon": "clipboard-check",
            "label": "More persuasive evidence"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>In designing further audit procedures, the auditor shall:</p>\n<ol type=\"a\"><li>Consider the <strong>reasons for the assessment</strong> given to ROMM at the assertion level for each class of transaction, account balance, and disclosure (ABCD), including: (i) the likelihood of misstatement due to characteristics of the ABCD (<strong>inherent risk</strong>); and (ii) whether the assessment takes account of relevant controls (<strong>control risk</strong>), requiring evidence on whether the controls are operating effectively; and</li><li>Obtain <strong>more persuasive audit evidence</strong> the higher the auditor's assessment of risk.</li></ol>"
      },
      {
        "id": "27cab0ef-60a5-4ee4-94d3-0ae7cec267f8",
        "title": "Further Audit Procedures Comprise Of",
        "keywords": [
          {
            "icon": "shield-check",
            "label": "Tests of controls"
          },
          {
            "icon": "clipboard-check",
            "label": "Substantive procedures"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ol type=\"i\"><li><strong>Tests of controls</strong>, when required by the SAs or when the auditor has chosen to do so; and</li><li><strong>Substantive procedures</strong>, including tests of details and substantive analytical procedures.</li></ol>"
      },
      {
        "id": "30f0eeb8-aefa-4f20-a069-0976dafbf958",
        "title": "Test of Controls",
        "keywords": [
          {
            "icon": "gear",
            "label": "Operating effectiveness of controls"
          },
          {
            "icon": "shield-check",
            "label": "Expectation that controls operate effectively"
          },
          {
            "icon": "warning-triangle",
            "label": "Substantive procedures alone insufficient"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>A <strong>test of controls</strong> is an audit procedure designed to evaluate the <strong>operating effectiveness</strong> of controls in preventing, or detecting and correcting (P/D/C), material misstatements at the assertion level.</p>\n<p>The auditor shall design and perform tests of controls (TOCs) to obtain sufficient appropriate audit evidence (SAAE) as to operating effectiveness when:</p>\n<ol type=\"a\"><li>The auditor's ROMM assessment includes an <strong>expectation that controls are operating effectively</strong> (i.e. the auditor intends to rely on them); or</li><li><strong>Substantive procedures alone cannot provide</strong> sufficient appropriate audit evidence at the assertion level.</li></ol>"
      },
      {
        "id": "3e980170-d07a-45dd-8274-da29b18ec133",
        "title": "Should We Test Controls Every Time We Do an Audit?",
        "keywords": [
          {
            "icon": "brick-wall",
            "label": "Deficient control environment"
          },
          {
            "icon": "binoculars",
            "label": "Deficient monitoring of controls"
          },
          {
            "icon": "gear",
            "label": "Deficient general IT controls"
          },
          {
            "icon": "backpack",
            "label": "Significant manual element"
          },
          {
            "icon": "id-card",
            "label": "Personnel changes"
          },
          {
            "icon": "ghost",
            "label": "Changing circumstances"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Factors that warrant a re-test of controls:</p>\n<ul><li>A <strong>deficient control environment</strong>.</li><li><strong>Deficient monitoring</strong> of controls.</li><li><strong>Deficient general IT controls</strong>.</li><li>A <strong>significant manual element</strong> to the relevant controls.</li><li><strong>Personnel changes</strong> that significantly affect the application of the control.</li><li><strong>Changing circumstances</strong> that indicate the need for changes in the control.</li></ul>"
      },
      {
        "id": "ed2842fa-5587-4d8b-8eaa-135e8f3b7706",
        "title": "Using Evidence from Previous Audits for Tests of Controls",
        "keywords": [
          {
            "icon": "shield",
            "label": "Effectiveness of other IC elements"
          },
          {
            "icon": "gear",
            "label": "Manual vs automated risk"
          },
          {
            "icon": "compass",
            "label": "Effectiveness of general IT controls"
          },
          {
            "icon": "warning-triangle",
            "label": "Deviations noted previously"
          },
          {
            "icon": "ghost",
            "label": "Changing circumstances"
          },
          {
            "icon": "calendar",
            "label": "Test once in every third audit"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Matters the auditor considers in determining whether evidence from previous audits can be used:</p>\n<ol type=\"a\"><li>The effectiveness of other elements of internal control, including the <strong>control environment</strong>, monitoring of controls, and the RAP.</li><li>Risks arising from characteristics of the control, including whether it is <strong>manual or automated</strong>.</li><li>The effectiveness of <strong>general IT controls</strong>.</li><li>The effectiveness of the control and its application, including <strong>deviations noted in previous audits</strong> and personnel changes affecting the control.</li><li>Whether the lack of change in a control poses a risk due to <strong>changing circumstances</strong>; and</li><li>The ROMM and extent of reliance on the control.</li></ol>\n<p>If there have been changes affecting continuing relevance, the auditor shall <strong>test the controls in the current audit</strong>. If not, the auditor shall <strong>test the controls at least once in every third audit</strong>.</p>"
      },
      {
        "id": "a6cabd42-9f6a-4df7-8d29-297838c6e75d",
        "title": "Controls Over Significant Risks — How Much Testing Should Be Done?",
        "keywords": [
          {
            "icon": "alarm-clock",
            "label": "Frequency of performance"
          },
          {
            "icon": "hourglass",
            "label": "Length of reliance period"
          },
          {
            "icon": "warning-triangle",
            "label": "Expected rate of deviation"
          },
          {
            "icon": "clipboard-check",
            "label": "Relevance and reliability of evidence"
          },
          {
            "icon": "link-chain",
            "label": "Evidence from other related controls"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Matters the auditor considers in determining the extent of tests of controls:</p>\n<ul><li>The <strong>frequency of performance</strong> of the control by the entity during the period.</li><li>The <strong>length of time</strong> during the audit period the auditor is relying on the control's operating effectiveness.</li><li>The <strong>expected rate of deviation</strong> from a control.</li><li>The <strong>relevance and reliability</strong> of the audit evidence to be obtained regarding operating effectiveness.</li><li>The extent to which evidence is obtained from <strong>tests of other related controls</strong>.</li></ul>"
      },
      {
        "id": "8ab384c5-811e-42bf-99fe-96a7ef5b6cd4",
        "title": "Using Audit Evidence Obtained During an Interim Period",
        "keywords": [
          {
            "icon": "calendar",
            "label": "Evidence of changes since interim period"
          },
          {
            "icon": "hourglass",
            "label": "Additional evidence for remaining period"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>When the auditor obtains evidence about operating effectiveness of controls during an <strong>interim period</strong>, the auditor shall:</p>\n<ol type=\"a\"><li>Obtain evidence about <strong>significant changes</strong> to those controls subsequent to the interim period; and</li><li>Determine the <strong>additional audit evidence</strong> to be obtained for the remaining period.</li></ol>"
      },
      {
        "id": "b14773b3-6e9e-44db-8a1a-5ee7cf3f7124",
        "title": "Substantive Procedures",
        "keywords": [
          {
            "icon": "magnify",
            "label": "Tests of details"
          },
          {
            "icon": "scale",
            "label": "Substantive analytical procedures"
          },
          {
            "icon": "stamp",
            "label": "Compulsory for each material ABCD"
          },
          {
            "icon": "crystal-ball",
            "label": "Judgmental risk assessment"
          },
          {
            "icon": "warning-triangle",
            "label": "Inherent limitations of IC"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>A <strong>substantive procedure</strong> is an audit procedure designed to detect material misstatement at the assertion level, comprising:</p>\n<ol type=\"i\"><li><strong>Tests of details</strong> (of classes of transactions, account balances, and disclosures); and</li><li><strong>Substantive analytical procedures</strong>.</li></ol>\n<p><strong>Is a substantive procedure compulsory?</strong> Irrespective of the assessed ROMM, the auditor shall design and perform substantive procedures for each <strong>material</strong> class of transaction, account balance, and disclosure (ABCD).</p>\n<p>This reflects the facts that:</p>\n<ol type=\"i\"><li>The auditor's risk assessment is <strong>judgmental</strong>, and so may not identify all ROMM; and</li><li>There are <strong>inherent limitations to internal control</strong>, including management override.</li></ol>"
      }
    ]
  },
  {
    "id": "sa402",
    "title": "SA 402 – Audit Considerations for an Entity Using a Service Organisation",
    "subtitle": "Type 1 vs Type 2 reports, and how the user auditor obtains and uses evidence about outsourced services.",
    "cards": [
      {
        "id": "5903dc09-1a34-452f-b085-9805aa43fca8",
        "title": "What is a Service Organisation & Service Auditor?",
        "keywords": [
          {
            "icon": "gear",
            "label": "Service organisation"
          },
          {
            "icon": "id-card",
            "label": "User entity"
          },
          {
            "icon": "shield-check",
            "label": "Service auditor"
          },
          {
            "icon": "backpack",
            "label": "User auditor"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>A <strong>service organisation</strong> is a third-party organisation (or segment of one) that provides services to user entities that are part of those entities' information systems relevant to financial reporting.</p>\n<p>A <strong>user entity</strong> is an entity that uses a service organisation and whose financial statements are being audited.</p>\n<p>A <strong>service auditor</strong> is an auditor who, at the request of the service organisation, provides an assurance report on the controls of a service organisation.</p>\n<p>A <strong>user auditor</strong> is an auditor who audits and reports on the financial statements of a user entity.</p>\n<p>Many entities outsource aspects of their business — from a specific task to replacing an entire business function (e.g. tax compliance) — to service organisations.</p>"
      },
      {
        "id": "dd1d8bbf-7b31-4585-9db4-c267c61e1dfe",
        "title": "When are Services of a Service Organisation Relevant to the Audit?",
        "keywords": [
          {
            "icon": "puzzle",
            "label": "Part of user entity's information system"
          },
          {
            "icon": "flag",
            "label": "Significant classes of transactions"
          },
          {
            "icon": "gear",
            "label": "Procedures initiating/recording/processing"
          },
          {
            "icon": "scroll",
            "label": "Accounting records"
          },
          {
            "icon": "clipboard-check",
            "label": "Journal entries controls"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Services provided by a service organisation are relevant to the audit when those services, and the controls over them, are <strong>part of the user entity's information system</strong>, including related business processes, relevant to financial reporting.</p>\n<p>A service organisation's services are part of the user entity's information system if they affect any of the following:</p>\n<ol type=\"a\"><li>The <strong>classes of transactions</strong> in the user entity's operations that are significant to its financial statements.</li><li>The <strong>procedures</strong>, within both IT and manual systems, by which transactions are initiated, recorded, processed, corrected, transferred to the general ledger, and reported.</li><li>The related <strong>accounting records</strong>, electronic or manual, supporting information, and specific accounts used to initiate, record, process, and report transactions.</li><li>How the user entity's information system captures <strong>events and conditions</strong>, other than transactions, that are significant to the financial statements.</li><li>The <strong>financial reporting process</strong> used to prepare the financial statements, including significant accounting estimates and disclosures.</li><li>Controls surrounding <strong>journal entries</strong>, including non-standard entries for non-recurring or unusual transactions.</li></ol>"
      },
      {
        "id": "e7c17a29-0b5f-4eb4-913b-27120ab067fd",
        "title": "Objectives of the User Auditor under SA 402",
        "keywords": [
          {
            "icon": "magnify",
            "label": "Understand nature and significance of services"
          },
          {
            "icon": "gear",
            "label": "Design and perform responsive procedures"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The objectives of the user auditor, when the user entity uses the services of a service organisation, are:</p>\n<ol type=\"a\"><li>To obtain an <strong>understanding of the nature and significance</strong> of the services provided by the service organisation and their effect on the user entity's internal control relevant to the audit, sufficient to identify and assess the risks of material misstatement; and</li><li>To <strong>design and perform audit procedures responsive</strong> to those risks.</li></ol>"
      },
      {
        "id": "98c70283-7879-41c5-bd9b-0d76cc014d4f",
        "title": "Type 1 Report vs Type 2 Report",
        "keywords": [
          {
            "icon": "calendar",
            "label": "Type 1 — design at a date"
          },
          {
            "icon": "shield-check",
            "label": "Type 2 — design & operating effectiveness"
          },
          {
            "icon": "scroll",
            "label": "Description by management"
          },
          {
            "icon": "stamp",
            "label": "Opinion by service auditor"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Type 1 report</strong> comprises:</p>\n<ul><li>(i) A <strong>description</strong>, prepared by management of the service organisation, of its system, control objectives, and related controls <strong>designed and implemented as at a specified date</strong>; and</li><li>(ii) A report by the <strong>service auditor</strong> conveying reasonable assurance, including their opinion on the description and the <strong>suitability of the design</strong> of the controls to achieve the specified control objectives.<p><strong>Type 2 report</strong> comprises:</p></li><li>(i) A <strong>description</strong>, prepared by management of the service organisation, of its system, control objectives, and related controls, their design and implementation as at a specified date or throughout a specified period, and in some cases their <strong>operating effectiveness</strong> throughout a specified period; and</li><li>(ii) A report by the service auditor conveying reasonable assurance, including: (a) the service auditor's opinion on the description, design suitability, and <strong>operating effectiveness</strong> of the controls; and (b) a description of the <strong>service auditor's tests of controls and results</strong>.</li></ul>"
      },
      {
        "id": "b66ca59b-bf3f-41fd-98f4-3b3fb2e5a05c",
        "title": "Obtaining an Understanding of the Services",
        "keywords": [
          {
            "icon": "magnify",
            "label": "Nature and significance of services"
          },
          {
            "icon": "ruler",
            "label": "Nature and materiality of transactions"
          },
          {
            "icon": "handshake",
            "label": "Degree of interaction"
          },
          {
            "icon": "link-chain",
            "label": "Nature of the relationship"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>When obtaining an understanding of the user entity in accordance with SA 315, the user auditor shall obtain an understanding of how the user entity uses the services of a service organisation, including:</p>\n<ol type=\"a\"><li>The <strong>nature of the services</strong> provided and their <strong>significance</strong> to the user entity, including the effect on internal control (information may be available from user manuals, the contract, or service auditor reports).</li><li>The <strong>nature and materiality of the transactions</strong> or accounts affected — even where not material in amount, the nature of the transactions processed may be significant.</li><li>The <strong>degree of interaction</strong> between the activities of the service organisation and the user entity — e.g. high interaction exists when the user entity authorises transactions and the service organisation processes and accounts for them.</li><li>The <strong>nature of the relationship</strong> between the user entity and the service organisation, including relevant contractual terms.</li></ol>\n<p>The user auditor shall also evaluate the design and implementation of relevant controls at the user entity, and determine whether a sufficient understanding has been obtained to assess risks of material misstatement.</p>"
      },
      {
        "id": "5c92b941-c279-4b26-a35a-15d8d1270520",
        "title": "Using a Type 1 or Type 2 Report",
        "keywords": [
          {
            "icon": "graduation-cap",
            "label": "Professional competence and independence"
          },
          {
            "icon": "open-book",
            "label": "Adequacy of standards used"
          },
          {
            "icon": "calendar",
            "label": "Date/period appropriate"
          },
          {
            "icon": "puzzle",
            "label": "Complementary user entity controls"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>If the user auditor is unable to obtain a sufficient understanding from the user entity, further understanding may be obtained from: obtaining a Type 1/Type 2 report, if available; contacting the service organisation through the user entity; visiting the service organisation; or using another auditor to perform procedures on the user auditor's behalf.</p>\n<p>In determining the sufficiency and appropriateness of evidence provided by a Type 1 or Type 2 report, the user auditor shall be satisfied as to:</p>\n<ol type=\"a\"><li>The service auditor's <strong>professional competence</strong> (except where a member of ICAI) and <strong>independence</strong> from the service organisation; and</li><li>The <strong>adequacy of the standards</strong> under which the report was issued.</li></ol>\n<p>If planning to use the report as evidence of design and implementation of controls, the user auditor shall:</p>\n<ul><li>Evaluate whether the description/design is at a <strong>date or period appropriate</strong> for the user auditor's purposes.</li><li>Evaluate the <strong>sufficiency and appropriateness</strong> of the evidence provided.</li><li>Determine whether <strong>complementary user entity controls</strong> identified by the service organisation are relevant, and if so obtain an understanding of whether the user entity has designed and implemented them.</li></ul>"
      },
      {
        "id": "fabc2480-3eae-46ff-8645-90bfec157a59",
        "title": "Responding to Assessed Risks & Tests of Controls",
        "keywords": [
          {
            "icon": "clipboard-check",
            "label": "Evidence from user entity records"
          },
          {
            "icon": "magnify",
            "label": "Further procedures or use another auditor"
          },
          {
            "icon": "shield-check",
            "label": "Type 2 report if available"
          },
          {
            "icon": "gear",
            "label": "Perform tests of controls"
          }
        ],
        "isSubPart": false,
