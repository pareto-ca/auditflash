  {
    "id": "sa570",
    "title": "SA 570",
    "subtitle": "Going Concern",
    "cards": [
      {
        "id": "65286fd2-5a72-4868-b5d3-ef5a31ba8630",
        "title": "Scope",
        "keywords": [
          {
            "icon": "anchor",
            "label": "Auditor's responsibilities re: going concern"
          },
          {
            "icon": "crystal-ball",
            "label": "Implications for the auditor's report"
          },
          {
            "icon": "spotlight",
            "label": "SA 701 — material uncertainty is a KAM"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>This SA deals with:</p>\n<ol type=\"I\"><li>. The auditor's responsibilities in the audit of financial statements relating to going concern; and</li><li>. The implications for the auditor's report.</li></ol>\n<p><strong>SA 701</strong> explains that a material uncertainty related to events/conditions that may cast significant doubt on an entity's ability to continue as a going concern is, by its nature, a <strong>Key Audit Matter (KAM)</strong>.</p>"
      },
      {
        "id": "9f19f8e7-b55f-458c-9ce4-a51d5eb28758",
        "title": "Going Concern Basis of Accounting",
        "keywords": [
          {
            "icon": "anchor",
            "label": "FS prepared assuming continued operations"
          },
          {
            "icon": "door",
            "label": "Unless intends to liquidate/cease operations"
          },
          {
            "icon": "folder",
            "label": "Special purpose FS may not use GC basis"
          },
          {
            "icon": "scale",
            "label": "Assets/liabilities realized in normal course"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ul><li>Financial statements are prepared on the assumption that the entity will <strong>continue its operations</strong> for the foreseeable future.</li><li>General purpose FS are prepared using the going concern basis, <strong>unless</strong> management intends to liquidate the entity or cease operations, or has no realistic alternative but to do so.</li><li>Special purpose FS may or may not be prepared on the going concern basis.</li><li>When appropriate, assets and liabilities are recorded on the basis that the entity will be able to <strong>realize its assets and discharge its liabilities</strong> in the normal course of business.</li></ul>"
      },
      {
        "id": "aa118bff-7541-426c-bc22-50878b7ea1b4",
        "title": "Responsibility for Assessment of Going Concern",
        "keywords": [
          {
            "icon": "target",
            "label": "Management's responsibility to assess"
          },
          {
            "icon": "crystal-ball",
            "label": "Judgment about uncertain future outcomes"
          },
          {
            "icon": "ruler",
            "label": "Size/complexity/external factors"
          },
          {
            "icon": "raincloud",
            "label": "Degree of uncertainty in outcome"
          },
          {
            "icon": "hourglass",
            "label": "Judgment based on information at the time"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ol type=\"a\"><li>It is <strong>management's responsibility</strong> to assess the entity's ability to continue as a going concern.</li><li>This involves a <strong>judgment</strong>, at a particular point in time, about inherently uncertain future outcomes of events/conditions.</li><li>Relevant factors to that judgment:<ul><li>The size and complexity of the entity, nature and condition of the business, and degree affected by external factors.</li><li>The degree of uncertainty associated with the outcome of an event or condition.</li><li>Any judgment about the future is based on information available at the time; subsequent events may produce outcomes inconsistent with judgments that were reasonable when made.</li></ul></li></ol>"
      },
      {
        "id": "ecedb549-fb85-488d-805a-bf375d75fa1c",
        "title": "Auditor's Responsibilities",
        "keywords": [
          {
            "icon": "clipboard-check",
            "label": "Obtain SAAE and conclude on GC basis appropriateness"
          },
          {
            "icon": "raincloud",
            "label": "Conclude whether material uncertainty exists"
          },
          {
            "icon": "binoculars",
            "label": "Inherent limitations greater for future events"
          },
          {
            "icon": "ghost",
            "label": "Absence of reference is not a guarantee"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ul><li>The auditor's responsibilities are to obtain SAAE, and conclude on the <strong>appropriateness of management's use of the going concern basis</strong>.</li><li>To conclude whether a <strong>material uncertainty exists</strong> about the entity's ability to continue as a going concern.</li><li>As per SA 200, the potential effects of inherent limitations on detecting material misstatements are <strong>greater for future events/conditions</strong> that may cause cessation of going concern — the auditor cannot predict such events.</li><li>The absence of any reference to a material uncertainty in the auditor's report <strong>cannot be viewed as a guarantee</strong> as to the entity's ability to continue as a going concern.</li></ul>"
      },
      {
        "id": "d7d561d2-0ad0-4d9c-8896-369be8689304",
        "title": "Risk Assessment Procedures and Related Activities",
        "keywords": [
          {
            "icon": "warning-triangle",
            "label": "Consider events/conditions casting doubt (SA 315)"
          },
          {
            "icon": "magnify",
            "label": "Determine if management performed preliminary assessment"
          },
          {
            "icon": "handshake",
            "label": "If performed — discuss and identify plans"
          },
          {
            "icon": "microphone",
            "label": "If not performed — discuss basis and inquire"
          },
          {
            "icon": "spotlight",
            "label": "Remain alert throughout the audit"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>When performing risk assessment procedures (RAP) as per SA 315, the auditor shall consider whether events/conditions exist that may cast significant doubt on going concern.</p>\n<p>The auditor shall determine whether management has already performed a <strong>preliminary assessment</strong>:</p>\n<ol type=\"a\"><li><strong>If performed</strong>, discuss the assessment with management, and determine whether management has identified events/conditions casting significant doubt and, if so, management's <strong>plans to address them</strong>; or</li><li><strong>If not performed</strong>, discuss with management the basis for the intended use of the GC basis, and inquire whether events/conditions exist that may cast significant doubt.</li></ol>\n<p><strong>Note:</strong> the auditor shall remain <strong>alert throughout the audit</strong> for evidence of events/conditions casting significant doubt on going concern.</p>"
      },
      {
        "id": "d3d8677c-cb45-4e68-baf4-fcc674d0d28d",
        "title": "Evaluating Management's Assessment of Going Concern",
        "keywords": [
          {
            "icon": "magnify",
            "label": "Evaluate management's assessment"
          },
          {
            "icon": "calendar",
            "label": "Cover same period as management/FRF/law"
          },
          {
            "icon": "hourglass",
            "label": "Extend to at least 12 months if shorter"
          },
          {
            "icon": "folder",
            "label": "Include all relevant information known to auditor"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ul><li>The auditor shall <strong>evaluate management's assessment</strong> of the entity's ability to continue as a going concern.</li><li>The auditor shall cover the <strong>same period</strong> used by management, as required by the applicable FRF, or law/regulation if it specifies a longer period.</li><li>If management's assessment covers <strong>less than 12 months</strong> from the FS date, the auditor shall request management to <strong>extend the period to at least 12 months</strong>.</li><li>In evaluating management's assessment, consider whether it includes <strong>all relevant information</strong> of which the auditor is aware as a result of the audit.</li></ul>"
      },
      {
        "id": "cf25b614-e9a7-4f2d-87be-4ed8426d931f",
        "title": "Additional Audit Procedures When Events/Conditions Are Identified",
        "keywords": [
          {
            "icon": "megaphone",
            "label": "Request management's assessment if not made"
          },
          {
            "icon": "target",
            "label": "Evaluate feasibility of management's plans"
          },
          {
            "icon": "shield-check",
            "label": "Evaluate cash flow forecast reliability/support"
          },
          {
            "icon": "folder",
            "label": "Consider additional facts/information"
          },
          {
            "icon": "signature",
            "label": "Written representations on plans and feasibility"
          },
          {
            "icon": "compass",
            "label": "Additional procedures — analyse forecasts/read minutes/legal counsel inquiry"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ol type=\"a\"><li>Where management has not performed its assessment, <strong>request management to make its assessment</strong>.</li><li><strong>Evaluate management's plans</strong> for future actions — whether the outcome is likely to improve the situation, and whether the plans are feasible.</li><li>Where a cash flow forecast is a significant factor:<ul><li>(i) Evaluate the reliability of the underlying data used to prepare the forecast; and</li><li>(ii) Determine whether there is adequate support for the assumptions underlying the forecast.</li></ul></li><li>Consider whether any <strong>additional facts or information</strong> are available since management's assessment.</li><li>Request <strong>written representations</strong> from management and TCWG regarding their plans for future action and their feasibility.</li></ol>\n<p><strong>Additional procedures</strong> may include:</p>\n<ul><li>Analysing and discussing cash flow, profit, and other relevant forecasts with management.</li><li>Analysing and discussing the entity's latest interim financial statements.</li><li>Reading debenture/loan agreement terms and determining whether any have been breached.</li><li>Reading minutes of shareholder/TCWG/committee meetings, for reference to financing difficulties.</li><li>Inquiring of the entity's legal counsel regarding litigation/claims and the reasonableness of management's assessment of outcomes/financial implications.</li><li>Confirming existence, legality, and enforceability of financial support arrangements with related/third parties, and assessing their financial ability to provide additional funds.</li><li>Evaluating the entity's plans to deal with unfilled customer orders.</li><li>Performing subsequent events procedures to identify those mitigating or affecting going concern.</li><li>Confirming the existence, terms, and adequacy of borrowing facilities.</li><li>Obtaining and reviewing reports of regulatory actions.</li><li>Determining the adequacy of support for planned disposals of assets.</li></ul>"
      },
      {
        "id": "17f16a48-540a-477c-9c0a-11ae7dbfa0f2",
        "title": "Auditor's Conclusion",
        "keywords": [
          {
            "icon": "clipboard-check",
            "label": "Evaluate SAAE and conclude on GC basis appropriateness"
          },
          {
            "icon": "raincloud",
            "label": "Conclude whether material uncertainty exists"
          },
          {
            "icon": "scale",
            "label": "Magnitude of impact + likelihood of occurrence"
          },
          {
            "icon": "ruler",
            "label": "Fair presentation vs compliance framework"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ul><li>The auditor shall evaluate whether SAAE has been obtained, and conclude on the <strong>appropriateness of management's use</strong> of the going concern basis in preparing the FS.</li><li>Based on the evidence obtained, conclude whether a <strong>material uncertainty exists</strong>, related to events/conditions that may cast significant doubt on going concern.</li></ul>\n<p>A <strong>material uncertainty</strong> exists when the <strong>magnitude of the impact</strong>, and the <strong>likelihood of occurrence</strong>, is such that appropriate disclosure is necessary for:</p>\n<ol type=\"a\"><li>In a fair presentation FRF, the <strong>fair presentation</strong> of the FS; or</li><li>In a compliance framework, the FS <strong>not to be misleading</strong>.</li></ol>"
      },
      {
        "id": "d8c2e3aa-6511-4c54-a21d-73159df54b31",
        "title": "Adequacy of Disclosures",
        "keywords": [
          {
            "icon": "scroll",
            "label": "Material uncertainty exists — disclose events and plans"
          },
          {
            "icon": "megaphone",
            "label": "Disclose clearly that material uncertainty exists"
          },
          {
            "icon": "magnify",
            "label": "No material uncertainty — still evaluate disclosure adequacy"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>When events/conditions are identified and a material uncertainty exists</strong>, the auditor shall determine whether the FS:</p>\n<ol type=\"a\"><li><strong>Adequately disclose</strong> the principal events/conditions casting significant doubt, and management's plans to deal with them; and</li><li>Disclose <strong>clearly</strong> that there is a material uncertainty, and that the entity may be unable to realize its assets and discharge its liabilities in the normal course of business.</li></ol>\n<p><strong>When events/conditions are identified but no material uncertainty exists</strong>, the auditor shall evaluate whether the FS provide <strong>adequate disclosures</strong> about these events/conditions.</p>"
      },
      {
        "id": "a8f375b3-1327-4e25-a6bc-e56ec3ffa584",
        "title": "Implications for Reporting",
        "keywords": [
          {
            "icon": "warning-triangle",
            "label": "GC basis inappropriate — adverse opinion"
          },
          {
            "icon": "clipboard-check",
            "label": "Material uncertainty adequately disclosed — unmodified with separate section"
          },
          {
            "icon": "brick-wall",
            "label": "Material uncertainty not adequately disclosed — qualified/adverse (SA 705)"
          },
          {
            "icon": "handshake",
            "label": "Management unwilling to assess/extend — consider implications"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Use of the GC basis is inappropriate</strong> → Express an <strong>adverse opinion</strong>.</p>\n<p><strong>GC basis is appropriate, but a material uncertainty exists:</strong></p>\n<ol type=\"a\"><li>. <strong>Adequate disclosure is made</strong> in the FS: express an <strong>unmodified opinion</strong>, with a separate section headed \"Material Uncertainty Related to Going Concern\" to:<ul><li>(a) Draw attention to the note disclosing the matters; and</li><li>(b) State that these events/conditions indicate a material uncertainty may cast significant doubt on going concern, and that the opinion is not modified in respect of the matter.</li></ul></li><li>. <strong>Adequate disclosure is not made:</strong><ul><li>Express a <strong>qualified or adverse opinion</strong>, as per SA 705; and</li><li>In the \"Basis for Qualified (Adverse) Opinion\" section, state that a material uncertainty exists that may cast significant doubt on going concern, and that the FS do not adequately disclose this.</li></ul></li></ol>\n<p><strong>Management unwilling to make or extend its assessment:</strong> consider the implications for the auditor's report.</p>"
      },
      {
        "id": "4234e971-6f0f-491b-b5b6-5133da31a26b",
        "title": "Communication with TCWG",
        "keywords": [
          {
            "icon": "raincloud",
            "label": "Whether events constitute material uncertainty"
          },
          {
            "icon": "stamp",
            "label": "Appropriateness of GC basis"
          },
          {
            "icon": "clipboard-check",
            "label": "Adequacy of related disclosures"
          },
          {
            "icon": "crystal-ball",
            "label": "Implications for the auditor's report"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor should communicate with TCWG:</p>\n<ol type=\"a\"><li>Whether events/conditions constitute a <strong>material uncertainty</strong>.</li><li>Whether management's use of the going concern basis is <strong>appropriate</strong>.</li><li>The <strong>adequacy</strong> of related disclosures in the FS; and</li><li>Where applicable, the <strong>implications for the auditor's report</strong>.</li></ol>"
      },
      {
        "id": "5d6c90c4-117b-49f3-acfc-09da79e06f2a",
        "title": "Significant Delay in Approval of Financial Statements",
        "keywords": [
          {
            "icon": "microphone",
            "label": "Inquire reasons for delay"
          },
          {
            "icon": "clipboard-check",
            "label": "Perform additional procedures if GC-related"
          },
          {
            "icon": "raincloud",
            "label": "Consider effect on material uncertainty conclusion"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Inquire as to the reasons for the delay. If related to events/conditions relating to the going concern assessment, perform <strong>additional audit procedures</strong>, and consider the effect on the auditor's conclusion regarding the existence of a <strong>material uncertainty</strong>.</p>"
      },
      {
        "id": "d8d97d77-5546-44fa-8327-26867c8a35fc",
        "title": "Events/Conditions That May Cast Significant Doubt on Going Concern",
        "keywords": [
          {
            "icon": "raincloud",
            "label": "Financial indicators — net liability/borrowings/losses"
          },
          {
            "icon": "flag",
            "label": "Operating indicators — key management/market/competitor"
          },
          {
            "icon": "warning-triangle",
            "label": "Other indicators — non-compliance/legal proceedings/law changes"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Financial:</strong></p>\n<ul><li>Net liability or net current liability position.</li><li>Fixed-term borrowings approaching maturity without realistic renewal/repayment prospects, or excessive reliance on short-term borrowings for long-term assets.</li><li>Inability to pay creditors on due dates.</li><li>Indications of withdrawal of financial support by creditors.</li><li>Substantial operating losses, or significant deterioration in asset values.</li><li>Arrears or discontinuance of dividends.</li><li>Negative operating cash flows, per historical or prospective financial statements.</li><li>Adverse key financial ratios.</li><li>Change from credit to cash-on-delivery transactions with suppliers.<p><strong>Operating:</strong></p></li><li>Management intentions to liquidate the entity, or cease operations.</li><li>Loss of key management without replacement.</li><li>Loss of a major market, key customer(s), franchise, license, or principal supplier(s).</li><li>Labor difficulties.</li><li>Shortages of important supplies.</li><li>Emergence of a highly successful competitor.<p><strong>Other:</strong></p></li><li>Non-compliance with capital, statutory, or regulatory requirements.</li><li>Pending legal/regulatory proceedings that may result in claims the entity is unlikely to satisfy.</li><li>Changes in law/regulation/government policy expected to adversely affect the entity.</li><li>Uninsured or underinsured catastrophes, when they occur.</li></ul>"
      }
    ]
  },
  {
    "id": "sa580",
    "title": "SA 580",
    "subtitle": "Written Representations",
    "cards": [
      {
        "id": "da6d08bc-3831-4c8c-8beb-7230e9bd35c7",
        "title": "Meaning",
        "keywords": [
          {
            "icon": "stamp",
            "label": "Written statement to confirm/support evidence"
          },
          {
            "icon": "folder",
            "label": "Excludes financial statements/books and records"
          },
          {
            "icon": "puzzle",
            "label": "Necessary but not sufficient evidence alone"
          },
          {
            "icon": "gear",
            "label": "Doesn't affect nature/extent of other evidence"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>A <strong>written statement</strong> by management to the auditor, to confirm certain matters, or to support other audit evidence.</p>\n<p>Written representations do <strong>not include</strong> the financial statements, the assertions therein, or supporting books and records.</p>\n<ul><li>Written representations provide <strong>necessary</strong> audit evidence; they do not, on their own, provide <strong>sufficient appropriate</strong> audit evidence (SAAE) about any matter.</li><li>Reliable written representations do <strong>not affect the nature or extent</strong> of other audit evidence the auditor obtains about fulfilment of management's responsibilities or specific assertions.</li></ul>"
      },
      {
        "id": "83ed5300-4fa8-4642-84fd-556f19eb5260",
        "title": "Objectives of the Auditor",
        "keywords": [
          {
            "icon": "signature",
            "label": "Obtain WR that management fulfilled responsibilities"
          },
          {
            "icon": "scroll",
            "label": "Support other evidence via written representations"
          },
          {
            "icon": "ruler",
            "label": "Respond appropriately to representations provided"
          },
          {
            "icon": "raincloud",
            "label": "Respond appropriately if not provided"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ol type=\"a\"><li>To obtain written representations from management that they believe they have <strong>fulfilled their responsibility</strong> for preparing the FS, and for the <strong>completeness of information</strong> provided to the auditor.</li><li>To <strong>support other audit evidence</strong> relevant to the FS, or to specific assertions, by means of written representations, if determined necessary by the auditor or required by other SAs; and</li><li>To respond appropriately to:<ul><li>Written representations provided by management; or</li><li>If management does not provide the written representations requested.</li></ul></li></ol>"
      },
      {
        "id": "d741ee23-8f86-4f14-bba2-2028f22e526d",
        "title": "Date and Period Covered by the Written Representation",
        "keywords": [
          {
            "icon": "calendar",
            "label": "Date — as near as practicable to report date"
          },
          {
            "icon": "signature",
            "label": "Opinion/report cannot precede WR date"
          },
          {
            "icon": "target",
            "label": "May need updated WR for specific assertion"
          },
          {
            "icon": "hourglass",
            "label": "Period — all periods in the audit report"
          },
          {
            "icon": "handshake",
            "label": "New management still bound to cover all periods"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Date:</strong></p>\n<ul><li>Written representations are necessary audit evidence; the auditor's opinion cannot be expressed, and the report cannot be dated, <strong>before</strong> the date of the written representations.</li><li>Since the auditor is concerned with events up to the audit report date that may require adjustment/disclosure, WR are dated as near as practicable to, but <strong>not after</strong>, the audit report date.</li><li>Sometimes it may be appropriate to obtain a WR about a specific assertion during the audit — in such cases it may be necessary to request an <strong>updated</strong> WR.<p><strong>Period:</strong></p></li><li>WR are obtained for <strong>all periods</strong> referred to in the audit report, because management needs to reaffirm that prior period representations remain appropriate.</li><li>The auditor and management may agree a form of WR that updates prior period representations, addressing any changes.</li><li>Current management not present during all periods may assert they cannot provide some/all representations — this does <strong>not diminish</strong> their responsibility for the FS as a whole; the requirement to request WR covering all relevant periods still applies.</li></ul>"
      },
      {
        "id": "207c5890-b1fc-4f45-99e1-6b4f5481d715",
        "title": "Doubt as to the Reliability of Written Representations",
        "keywords": [
          {
            "icon": "warning-triangle",
            "label": "DICE — competence/integrity/ethics/diligence concerns"
          },
          {
            "icon": "compass",
            "label": "Perform procedures if inconsistent with other evidence"
          },
          {
            "icon": "magnify",
            "label": "Reassess if matter remains unresolved"
          },
          {
            "icon": "ghost",
            "label": "Consider disclaimer of opinion (SA 705)"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ul><li>If the auditor has concerns about the <strong>competence, integrity, ethical values, or diligence (DICE)</strong> of management, the auditor determines the effect on the reliability of representations (oral/written) and audit evidence generally.</li><li>If written representations are <strong>inconsistent</strong> with other audit evidence, the auditor shall perform audit procedures to resolve the matter.</li><li>If the matter remains <strong>unresolved</strong>, the auditor shall <strong>reassess</strong> the DICE of management, and determine the effect on reliability of representations and evidence generally.</li><li>If the auditor concludes the WR are <strong>not reliable</strong>, take appropriate action, including determining the possible effect on the opinion — as per SA 705, i.e. consider a <strong>disclaimer of opinion</strong>.</li></ul>"
      },
      {
        "id": "96b4e93a-7800-4ad9-bdd5-473d150fbc9e",
        "title": "Requested Written Representations Not Provided",
        "keywords": [
          {
            "icon": "megaphone",
            "label": "Discuss the matter with management"
          },
          {
            "icon": "magnify",
            "label": "Re-evaluate integrity of management"
          },
          {
            "icon": "warning-triangle",
            "label": "Consider disclaimer of opinion (SA 705)"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>If management does not provide one or more requested written representations, the auditor shall:</p>\n<ol type=\"a\"><li><strong>Discuss the matter</strong> with management.</li><li><strong>Re-evaluate the integrity</strong> of management, and evaluate the effect on the reliability of representations (oral/written) and audit evidence generally; and</li><li>Take <strong>appropriate actions</strong>, including determining the possible effect on the opinion, as per SA 705 — i.e. consider a <strong>disclaimer of opinion</strong>.</li></ol>"
      }
    ]
  },
  {
    "id": "sa600",
    "title": "SA 600",
    "subtitle": "Using the Work of Other Auditors",
    "cards": [
      {
        "id": "6b2e7024-5252-4d80-8037-6e9aa11effe5",
        "title": "Key Definitions",
        "keywords": [
          {
            "icon": "handshake",
            "label": "Principal Auditor (PA)"
          },
          {
            "icon": "id-card",
            "label": "Other Auditor"
          },
          {
            "icon": "puzzle",
            "label": "Component"
          },
          {
            "icon": "footprint",
            "label": "Note — excludes joint audit/predecessor auditor"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Principal Auditor (PA):</strong> the auditor who uses work performed by other auditors, with responsibility for reporting on the financial information of an entity when that information includes financial information of one or more components audited by another auditor.</p>\n<p><strong>Other Auditor:</strong> an auditor, other than the PA, with responsibility for reporting on the financial information of a component included in the financial information audited by the PA.</p>\n<p><strong>Component:</strong> a division, branch, subsidiary, joint venture, associate, or other entity whose financial information is included in the financial information audited by the PA.</p>\n<p><strong>Note:</strong> SA 600 does not apply to a <strong>joint audit</strong>, nor does it apply to the auditor's relationship with a <strong>predecessor auditor</strong>.</p>"
      },
      {
        "id": "0de7bad1-7cec-4857-b441-208009e3b941",
        "title": "Acceptance as Principal Auditor",
        "keywords": [
          {
            "icon": "ruler",
            "label": "Materiality of own portion audited"
          },
          {
            "icon": "puzzle",
            "label": "Knowledge of components' business"
          },
          {
            "icon": "raincloud",
            "label": "ROMM in components' financial information"
          },
          {
            "icon": "compass",
            "label": "Significant participation via additional procedures"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor should consider the following before accepting the position as principal auditor:</p>\n<ol type=\"a\"><li>The <strong>materiality</strong> of the portion of the financial information which the principal auditor audits.</li><li>The principal auditor's <strong>degree of knowledge</strong> regarding the business of the components.</li><li>The <strong>ROMM</strong> in the financial information of the components audited by the other auditor.</li><li>The performance of <strong>additional procedures</strong> regarding the components audited by the other auditor, resulting in the principal auditor having significant participation in such audit.</li></ol>"
      },
      {
        "id": "ce322bb1-43e1-4ec1-a979-24f00d674033",
        "title": "Principal Auditor's Procedures",
        "keywords": [
          {
            "icon": "puzzle",
            "label": "Right to visit component/examine records"
          },
          {
            "icon": "graduation-cap",
            "label": "Evaluate competence if not ICAI member"
          },
          {
            "icon": "handshake",
            "label": "SAAE that other auditor's work is adequate"
          },
          {
            "icon": "calendar",
            "label": "Advise and coordinate at planning stage"
          },
          {
            "icon": "scroll",
            "label": "Discuss procedures/review written summary"
          },
          {
            "icon": "binoculars",
            "label": "NTE depends on knowledge of other auditor's competence"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ol><li>The right to <strong>visit the component</strong>, and examine the books of accounts and records, if necessary, in special circumstances.</li><li>If planning to use the work of another auditor, <strong>evaluate their competence</strong> if they are not a member of ICAI.</li><li>Perform procedures to obtain SAAE that the other auditor's work is <strong>adequate</strong> for the principal auditor's purpose:<ul><li>Advise the other auditor of the use to be made of their work, and coordinate at the <strong>planning stage</strong>.</li><li>Inform the other auditor about: procedures for identifying inter-component transactions and the timetable for audit completion; areas requiring special consideration; significant accounting, auditing, and reporting requirements — and obtain a representation as to compliance.</li></ul></li><li>The principal auditor might <strong>discuss</strong> the procedures applied, or review a <strong>written summary</strong> of the other auditor's procedures (questionnaire/checklist), and may also plan to <strong>visit</strong> the other auditor.</li><li>The <strong>NTE</strong> of procedures performed by the principal auditor depends on their knowledge of the other auditor's <strong>professional competence</strong>, which can be enhanced from a review of the other auditor's previous audit work.</li></ol>"
      },
      {
        "id": "e1282b2c-0a52-4561-a16a-49d7bf435159",
        "title": "Principal Auditor Should Consider Significant Findings of the Other Auditor",
        "keywords": [
          {
            "icon": "handshake",
            "label": "Discuss audit findings with other auditor/management"
          },
          {
            "icon": "clipboard-check",
            "label": "Supplementary tests may be necessary"
          },
          {
            "icon": "seesaw",
            "label": "Tests performed by either auditor"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ul><li>The principal auditor may <strong>discuss audit findings</strong>, or other matters affecting the financial information of the components, with the other auditor and the management of the component.</li><li>The principal auditor may decide that <strong>supplementary tests</strong> of the records or financial statements of the component are necessary.</li><li>Such tests, depending on the circumstances, may be performed by the <strong>principal auditor or the other auditor</strong>.</li></ul>"
      },
      {
        "id": "b965fabc-0bea-491a-b142-f2eb42f791ae",
        "title": "When the Other Auditor Is Not a Professionally Qualified Auditor",
        "keywords": [
          {
            "icon": "puzzle",
            "label": "Component situated in a foreign country"
          },
          {
            "icon": "scale",
            "label": "Local laws permit non-qualified auditor"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>This applies where the component is situated in a <strong>foreign country</strong>, and applicable laws permit a person other than a professionally qualified auditor to audit the financial statements of such a component.</p>"
      },
      {
        "id": "4893f8a5-79c2-4e82-b8f1-f18e2fc199be",
        "title": "Documentation",
        "keywords": [
          {
            "icon": "handshake",
            "label": "Document components audited by other auditors"
          },
          {
            "icon": "scroll",
            "label": "Document procedures performed/conclusions reached"
          },
          {
            "icon": "brick-wall",
            "label": "No need to document reasons for limiting procedures"
          },
          {
            "icon": "warning-triangle",
            "label": "Document handling of other auditor's modified report"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ul><li>Document, in working papers, the <strong>components</strong> whose financial information was audited by other auditors.</li><li>Document the <strong>procedures performed</strong> and the <strong>conclusions reached</strong> — e.g. results of discussions with the other auditor, and review of a written summary of their procedures.</li><li><strong>Need not document</strong> the reasons for limiting procedures, where SAAE has been previously obtained that acceptable quality control policies/procedures are complied with in the other auditor's practice.</li><li>Where the other auditor's report is <strong>other than unmodified</strong>, document how the principal auditor dealt with the qualifications/adverse remarks while framing their own report.</li></ul>"
      },
      {
        "id": "0396a2dc-7f20-4258-a092-439c62030a16",
        "title": "Role of Principal and Other Auditor (Coordination)",
        "keywords": [
          {
            "icon": "link-chain",
            "label": "Sufficient liaison between auditors"
          },
          {
            "icon": "signature",
            "label": "PA — written communication/advise/questionnaire"
          },
          {
            "icon": "handshake",
            "label": "Other auditor — coordinate/comply/respond timely"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>There should be <strong>sufficient liaison</strong> between the principal auditor and the other auditor.</p>\n<p><strong>Role of the Principal Auditor:</strong></p>\n<ol type=\"i\"><li>Issue <strong>written communication(s)</strong> to the other auditor.</li><li>Advise the other auditor of any matters coming to their attention that may have an important bearing on the other auditor's work.</li><li>May require the other auditor to answer a <strong>detailed questionnaire</strong> regarding matters on which information is required.</li></ol>\n<p><strong>Role of the Other Auditor:</strong></p>\n<ol type=\"i\"><li>Should <strong>co-ordinate</strong> with the principal auditor — e.g. bringing significant findings requiring entity-level action to immediate attention, and adhering to the audit timetable.</li><li>Should ensure compliance with relevant <strong>statutory requirements</strong>.</li><li>Should respond to the questionnaire sent by the principal auditor on a <strong>timely basis</strong>.</li></ol>"
      },
      {
        "id": "8ea83e8e-f86d-446d-a27b-88872bca73a6",
        "title": "Reporting Considerations",
        "keywords": [
          {
            "icon": "warning-triangle",
            "label": "Qualified/disclaimer — scope limitation"
          },
          {
            "icon": "handshake",
            "label": "Cannot use other auditor's work + no additional procedures"
          },
          {
            "icon": "compass",
            "label": "Consider modification if other auditor's report modified"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Qualified or Disclaimer of Opinion — Limitation on Scope:</strong></p>\n<p>When the principal auditor concludes that: the work of the other auditor <strong>cannot be used</strong>; and the principal auditor is <strong>unable to perform sufficient additional procedures</strong> regarding the component's financial information — the principal auditor should express a <strong>qualified opinion or a disclaimer of opinion</strong>, as there is a limitation on the scope of the audit.</p>\n<p><strong>If the Other Auditor Issues a Modified Report:</strong></p>\n<p>The principal auditor should consider whether the subject of the modification is of such <strong>nature and significance</strong>, in relation to the entity's financial information, that it requires a modification of the principal auditor's own report.</p>"
      },
      {
        "id": "15df6978-abff-43ec-84f7-fe42e4f76798",
        "title": "Division of Responsibility",
        "keywords": [
          {
            "icon": "detective-hat",
            "label": "PA not responsible except suspicious circumstances"
          },
          {
            "icon": "scale",
            "label": "Report must state division of responsibility"
          },
          {
            "icon": "handshake",
            "label": "Inform other auditor of material discrepancies"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ul><li>The principal auditor is <strong>not responsible</strong> for the work of the other auditors, except in <strong>suspicious circumstances</strong> about the reliability of their work.</li><li>When reporting on the entity's financial statements as a whole, relying on other auditors' reports, the report should clearly state the <strong>division of responsibility</strong>, indicating the extent to which components were audited by other auditors.</li><li>If the principal auditor notices any <strong>material discrepancies</strong>, they should inform the other auditor — this should be included in the audit report.</li></ul>"
      }
    ]
  },

        "explanationHtml": "<ul><li>Whether management has used a <strong>management's expert</strong> in preparing the financial statements.</li><li>The <strong>nature and significance</strong> of the matter, including its complexity.</li><li>The <strong>ROMM</strong> in the matter.</li><li>The expected nature of procedures to respond to identified risks, including the auditor's <strong>knowledge and experience</strong> with expert work on such matters; and</li><li>The <strong>availability of alternative sources</strong> of audit evidence.</li></ul>"

          }

        "isSubPart": false,
        "explanationHtml": "<p>Where management has used a management's expert, the auditor's decision on whether to use an auditor's expert may also be influenced by similar factors (same as SA 500):</p>\n<ul><li>The <strong>nature, scope, and objectives (NSO)</strong> of the management's expert's work.</li><li>Whether the management's expert is <strong>employed</strong> by the entity, or <strong>engaged</strong> by it.</li><li>The extent to which management can exercise <strong>control or influence</strong> over the expert's work.</li><li>The management's expert's <strong>competence and capabilities</strong>.</li><li>Whether the expert is subject to <strong>technical performance standards</strong>.</li><li>Any <strong>controls</strong> within the entity over the management's expert's work.</li></ul>"
      },
      {
        "id": "0688c693-e839-4d52-ae95-e2442f488e9f",
        "title": "NTE of Audit Procedures When Using an Auditor's Expert",
        "keywords": [
          {
            "icon": "puzzle",
            "label": "Nature of the matter"
          },
          {
            "icon": "raincloud",
            "label": "ROMM in the matter"
          },
          {
            "icon": "spotlight",

          },
          {
            "icon": "graduation-cap",
            "label": "Knowledge/experience with the expert"
          },
          {
            "icon": "shield",
            "label": "Subject to firm's quality control policies"
          },
          {
            "icon": "binoculars",
            "label": "Factors suggesting more extensive procedures"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall consider matters including:</p>\n<ol type=\"a\"><li>The <strong>nature</strong> of the matter to which the expert's work relates.</li><li>The <strong>ROMM</strong> in the matter.</li><li>The <strong>significance</strong> of the expert's work in the context of the audit.</li><li>The auditor's <strong>knowledge and experience</strong> with previous work performed by that expert; and</li><li>Whether the expert is subject to the auditor's firm's <strong>quality control policies</strong>.</li></ol>\n<p>Factors suggesting the need for <strong>more extensive procedures</strong>:</p>\n<ul><li>The expert's work relates to a significant matter involving subjective and complex judgments.</li><li>The auditor has not previously used the expert's work, and has no prior knowledge of their competence, capabilities, and objectivity.</li><li>The expert is performing procedures integral to the audit, rather than being consulted on an individual matter.</li><li>The expert is the auditor's <strong>external</strong> expert, not subject to the firm's quality control policies.</li><li>The matter is <strong>highly complex</strong>.</li><li>The greater the extent of the expert's work and its significance in the audit.</li></ul>"
      },
      {
        "id": "65d9f5dc-99cb-452d-a7c1-565ba9d2f790",
        "title": "6-7. Competence, Capability, and Objectivity of an Auditor's Expert",
        "keywords": [
          {
            "icon": "link-chain",
            "label": "Similar to SA 500 (CCO)"
          },
          {
            "icon": "microphone",
            "label": "Inquire about interests/relationships"
          },
          {
            "icon": "shield",
            "label": "Discuss safeguards with the expert"
          },
          {
            "icon": "handshake",
            "label": "Financial interests/business relationships/other services"
          },
          {
            "icon": "signature",
            "label": "Written representation from external expert"
          }
        ],
        "explanationHtml": "<p>Competence, capability, and objectivity of an auditor's expert are evaluated <strong>similarly to SA 500</strong> (for a management's expert).</p>\n<p><strong>Evaluating Objectivity of an Auditor's External Expert</strong> — it may be relevant to:</p>\n<ol type=\"a\"><li><strong>Inquire</strong> of the entity about any known interests or relationships it has with the auditor's external expert.</li><li><strong>Discuss</strong> with the expert any applicable safeguards, including professional requirements, and evaluate the adequacy of the safeguards to reduce threats to an acceptable level.</li></ol>\n<p>Interests/relationships relevant to discuss with the expert:</p>\n<ul><li>Financial interests.</li><li>Business and personal relationships.</li><li>Provision of other services by the expert.</li><li>In some cases, obtain a <strong>written representation</strong> from the auditor's external expert about interests/relationships with the entity, of which the expert is aware.</li></ul>"
      },
      {
        "id": "da679c08-1687-4baf-8929-fcf190c5ea3d",
        "title": "Agreement with the Auditor's Expert",
        "keywords": [
          {
            "icon": "target",
            "label": "Nature/scope/objectives of the expert's work"
          },
          {
            "icon": "id-card",
            "label": "Respective roles and responsibilities"
          },
          {
            "icon": "gear",
            "label": "NTE of communication/form of report"
          },
          {
            "icon": "mask",
            "label": "Confidentiality requirements"
          },
          {
            "icon": "scroll",
            "label": "Factors suggesting need for written agreement"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall agree, in writing when appropriate, on the following with the auditor's expert:</p>\n<ol type=\"a\"><li>The <strong>nature, scope, and objectives</strong> of that expert's work.</li><li>The respective <strong>roles and responsibilities</strong> of the auditor and the expert.</li><li>The <strong>NTE of communication</strong> between the auditor and expert, including the form of the expert's report; and<p>(When the expert's work relates to a <strong>significant risk</strong>, both a formal written report at the conclusion of the work and oral reports as work progresses may be appropriate; identifying specific coordinating partners/staff assists timely, effective communication on larger engagements.)</p></li><li>The need for the expert to observe <strong>confidentiality</strong> requirements.</li></ol>\n<p>Factors suggesting the need for a <strong>more detailed or written agreement</strong>:</p>\n<ul><li>The auditor has not previously used work performed by that expert.</li><li>The auditor's expert will have access to <strong>sensitive or confidential</strong> entity information.</li></ul>"
      },
      {
        "id": "540916dd-b48d-4930-b16a-1ae6999907c8",
        "title": "Evaluating the Adequacy of the Auditor's Expert's Work",
        "keywords": [

          },
          {

        "isSubPart": false,
        "explanationHtml": "<p>Specific procedures to evaluate the adequacy of the expert's work:</p>\n<ul><li><strong>Inquiries</strong> of the auditor's expert.</li><li>Reviewing the expert's <strong>working papers and reports</strong>.</li><li><strong>Corroborative procedures</strong>, such as: observing the expert's work; examining published data from reputable, authoritative sources; confirming relevant matters with third parties; performing detailed analytical procedures; and re-performing calculations.</li><li>Discussion with <strong>another expert</strong> with relevant expertise, when findings/conclusions are inconsistent with other audit evidence.</li><li>Discussing the expert's report with <strong>management</strong>.</li></ul>"
      },
      {
        "id": "b5dd070c-8105-4cdc-937f-0e4c59ef28fd",
        "title": "Use of Significant Assumptions and Methods",

            "icon": "link-chain",

  {
    "id": "sa700",

    "subtitle": "Forming an Opinion and Reporting on Financial Statements",
    "cards": [
      {
        "id": "1d0f707e-38af-4215-8dd1-e76f0771a7c5",

          },
          {
            "icon": "scroll",
            "label": "Communicate the opinion via written report"
          }

        "isSubPart": false,
        "explanationHtml": "<p>The auditor's objective has two parts:</p>\n<ul><li>To arrive at an <strong>opinion</strong> on the financial statements, based on an evaluation of the conclusions drawn from the audit evidence gathered; and</li><li>To communicate that opinion clearly through a <strong>written report</strong>.</li></ul>"

            "icon": "open-book",

          },
          {

            "label": "Appropriate terminology throughout"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Before forming the opinion, the auditor specifically evaluates whether:</p>\n<ol type=\"a\"><li>The significant <strong>accounting policies</strong> selected and applied have been adequately disclosed.</li><li>The accounting policies chosen and applied are <strong>consistent with the FRF</strong> and appropriate in the circumstances.</li><li>The <strong>accounting estimates</strong> made by management are reasonable.</li><li>The FS give adequate disclosures so users can understand the effect of <strong>material transactions and events</strong>.</li><li>The information presented is <strong>relevant, reliable, comparable, and understandable</strong>.</li><li>The <strong>terminology</strong> used throughout the FS — including the title of each statement — is appropriate.</li></ol>"
      },
      {
        "id": "07342f5f-179c-451f-a664-18d8c4bdbca0",
        "title": "Forming the Opinion",
        "keywords": [
          {
            "icon": "stamp",
            "label": "Prepared in all material respects per FRF"
          },
          {
            "icon": "shield-check",
            "label": "Reasonable assurance free of material misstatement"
          },
          {
            "icon": "ruler",
            "label": "Fair presentation — OPSC and underlying transactions"
          },
          {
            "icon": "trophy",
            "label": "Unmodified opinion definition"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor forms an opinion on whether the FS are prepared, in all material respects, in accordance with the applicable FRF — obtaining <strong>reasonable assurance</strong> that the FS as a whole are free of material misstatement, whether due to fraud or error.</p>\n<p>Where the framework is a <strong>fair presentation framework</strong>, the auditor additionally evaluates whether the FS achieve fair presentation, by considering:</p>\n<ol><li>The <strong>overall presentation, structure, and content</strong> of the FS (OPSC); and</li><li>Whether the FS, including related notes, represent the underlying transactions and events in a manner achieving <strong>fair presentation</strong>.</li></ol>\n<p>An <strong>unmodified opinion</strong> is expressed when the auditor concludes that the FS are prepared, in all material respects, as per the applicable framework.</p>"
      },
      {
        "id": "d493aa1f-8882-4753-82bf-4dab0419d05b",
        "title": "4(1)-(2). Basic Elements — Title and Addressee",

          {

        "explanationHtml": "<p><strong>(1) Title:</strong> the report is titled <strong>\"Independent Auditor's Report.\"</strong></p>\n<p><strong>(2) Addressee:</strong> addressed as required by the circumstances of the engagement.</p>\n<ul><li>For general-purpose (statutory) financial statements, typically addressed to the <strong>members</strong>.</li><li>For special-purpose financial statements, may be addressed to the <strong>Board of Directors</strong>.</li></ul>"

      {

          {
            "icon": "calendar",
            "label": "Specify period/date covered"
          }
        ],
        "explanationHtml": "<p>The <strong>Opinion</strong> section is the first section of the auditor's report. It must:</p>\n<ol type=\"a\"><li>Identify the <strong>entity</strong> whose financial statements have been audited.</li><li>State that the financial statements <strong>have been audited</strong>.</li><li>Identify the <strong>title</strong> of each statement comprising the FS.</li><li>Refer to the <strong>notes</strong>, including the summary of significant accounting policies.</li><li>Specify the <strong>date or period</strong> covered by each statement.</li></ol>"
      },
      {
        "id": "29bbf891-eb65-4dbc-9fd6-1fc1b04b9602",
        "title": "4(4). Basic Elements — Basis for Opinion",
        "keywords": [
          {
            "icon": "stamp",

            "label": "Independence and ethical responsibilities (ICAI Code)"
          },
          {
            "icon": "shield-check",
            "label": "Statement on sufficiency/appropriateness of evidence"
          }
        ],
        "explanationHtml": "<p>Immediately after the Opinion section, the report includes a <strong>\"Basis for Opinion\"</strong> section, which must:</p>\n<ol type=\"a\"><li>State that the audit was conducted as per the <strong>Standards on Auditing</strong>.</li><li>Refer to the section describing the auditor's <strong>responsibilities</strong> under the SAs.</li><li>Include a statement of <strong>independence</strong> and fulfilment of ethical responsibilities, referencing the <strong>Code of Ethics</strong> issued by ICAI.</li><li>State whether the audit evidence obtained is <strong>sufficient and appropriate</strong> to provide a basis for the opinion.</li></ol>"
      },
      {

        "title": "4(5)-(7). Going Concern, Key Audit Matters, and Other Information",

        "explanationHtml": "<p><strong>(5) Going Concern:</strong> this aspect is already dealt with separately under <strong>SA 570</strong>.</p>\n<p><strong>(6) Key Audit Matters (KAM):</strong> for audits of financial statements of <strong>listed entities</strong>, KAM must be communicated in the auditor's report as required by <strong>SA 701</strong>.</p>\n<p><strong>(7) Other Information:</strong> where applicable, the auditor reports on \"Other Information\" as required by <strong>SA 720</strong> (Revised).</p>"
      },
      {
        "id": "b39c98dd-ee6f-45d3-9489-b756d7412c11",
        "title": "4(8). Basic Elements — Responsibilities of Management for the FS",

            "icon": "scroll",
            "label": "Fair presentation framework wording"

        "explanationHtml": "<p>This section is headed <strong>\"Responsibilities of Management for the Financial Statements\"</strong> (or TCWG, in some entities). It must describe management's responsibility for:</p>\n<ol type=\"a\"><li>Preparing the FS as per the applicable FRF, and for the <strong>internal control</strong> necessary to enable FS free from material misstatement (fraud or error); and</li><li>Assessing the entity's ability to continue as a <strong>going concern</strong>, including appropriateness of the going-concern basis, and disclosing related matters.</li></ol>\n<p>The report should identify those responsible for <strong>oversight</strong> of the financial reporting process — where this differs from those preparing the FS, the heading should also refer to \"those charged with governance.\"</p>\n<p>Where FS are prepared under a <strong>fair presentation framework</strong>, refer to \"preparation and fair presentation of the financial statements\" or \"...that give a true and fair view,\" as appropriate.</p>"
      },
      {
        "id": "69f56cc5-8484-4ee0-b189-d0600455f521",
        "title": "4(9) Part I. Auditor's Responsibilities — Objectives and Materiality",
        "keywords": [
          {
            "icon": "trophy",
            "label": "Reasonable assurance and issue an auditor's report"

            "label": "Definition/description of materiality"

        "explanationHtml": "<p><strong>Part I</strong> of the Auditor's Responsibilities section must:</p>\n<ol type=\"a\"><li>State the auditor's objectives are to: (i) obtain <strong>reasonable assurance</strong> that the FS as a whole are free from material misstatement (fraud or error); and (ii) issue an auditor's report including the opinion.</li><li>State that reasonable assurance is a <strong>high level of assurance</strong>, but not a guarantee that an SA audit will always detect a material misstatement when one exists.</li><li>State that misstatements can arise from fraud or error, and either: (i) describe that misstatements are <strong>material</strong> if they could reasonably influence users' economic decisions; or (ii) provide a definition of materiality per the applicable framework.</li></ol>"
      },
      {
        "id": "1e86e123-a9a7-4493-950f-eefe69ad05b4",
        "title": "4(9) Part II. Auditor's Responsibilities — Professional Judgment and Key Duties",
        "keywords": [

          {
            "icon": "link-chain",
            "label": "Group audit responsibilities (SA 600)"
          }
        ],
        "explanationHtml": "<p><strong>Part II</strong> must further describe that the auditor exercises <strong>professional judgment</strong> and maintains <strong>professional skepticism</strong> throughout the audit, and that responsibilities include:</p>\n<ul><li>Identifying and assessing the <strong>ROMM</strong> of the financial statements.</li><li>Obtaining an understanding of <strong>internal control</strong> relevant to the audit, to design appropriate procedures.</li><li>Evaluating the appropriateness of: accounting policies used; reasonableness of accounting estimates; and related disclosures.</li><li>Concluding on the appropriateness of management's use of the <strong>going-concern basis</strong>.</li><li>Evaluating the overall <strong>presentation, structure, and content</strong> of the FS.</li><li>Describing the auditor's responsibilities in a <strong>group audit engagement</strong>, where applicable, as per SA 600.</li></ul>"
      },
      {
        "id": "bb19ced3-563d-4ebf-9961-7ab4d642da07",
        "title": "4(9) Part III. Auditor's Responsibilities — Communication with TCWG and KAM",

        "explanationHtml": "<p><strong>Part III</strong> must also:</p>\n<ol type=\"a\"><li>State that the auditor communicates with TCWG on the planned <strong>scope and timing</strong> of the audit, and significant <strong>audit findings</strong>, including significant deficiencies in internal control.</li><li>State that the auditor provides TCWG with a statement of compliance with <strong>relevant ethical requirements</strong> regarding independence, and communicates relationships/safeguards.</li><li>For audits with KAM (SA 701), state that from matters communicated to TCWG, the auditor determines those of <strong>most significance</strong> — the Key Audit Matters.</li></ol>\n<p><strong>Presentation of KAM in the report:</strong> per SA 701, the auditor describes these matters unless:</p>\n<ul><li>Law or regulation precludes public disclosure; or</li><li>In extremely rare circumstances, the adverse consequences of communication could reasonably outweigh the public-interest benefits.</li></ul>"
      },
      {

        "explanationHtml": "<p><strong>(11) Other Reporting Responsibilities:</strong> presented under the heading <strong>\"Report on Other Legal and Regulatory Requirements.\"</strong></p>\n<p><strong>(12) Signature of the Auditor:</strong> signed by the auditor in their <strong>personal name</strong> as well as in the name of the <strong>audit firm</strong>. Where a partner signs, the signature must also state the partner's <strong>membership number</strong>, the firm's <strong>registration number</strong>, and the <strong>UDIN</strong>.</p>\n<p><strong>(13) Place of Signature:</strong> the location — i.e., the <strong>city</strong> — where the report is signed.</p>\n<p><strong>(14) Date of the Audit Report:</strong> cannot be dated earlier than the date on which the auditor has obtained <strong>SAAE</strong>.</p>"
      },
      {
        "id": "6e4031c5-29e3-4591-a981-03e04e6aac35",
        "title": "Audit Reports Referring to Both SAs and International/Other Jurisdictional Standards",
        "keywords": [

            "icon": "clipboard-check",
            "label": "Minimum elements required by SAs included"

            "icon": "tag",
            "label": "Both sets of standards clearly identified"
          }

        "isSubPart": false,
        "explanationHtml": "<p>An auditor may be required to conduct an audit as per both the SAs (ICAI) and ISAs (or another jurisdiction's standards). The report may refer to the SAs in addition to the ISAs <strong>only if both</strong> conditions are met:</p>\n<ol type=\"a\"><li>No <strong>conflict</strong> between requirements that would lead the auditor to: (i) form a different opinion; or (ii) not include an Emphasis of Matter/Other Matter paragraph required by the SAs; and</li><li>The report includes, at minimum, each element <strong>required by the SAs</strong> when also referring to the other jurisdiction's standards — identifying the SAs accordingly.</li></ol>\n<p>When referring to both, the report must clearly identify <strong>both sets of standards</strong>, including the jurisdiction of origin of the other auditing standards.</p>"

            "label": "Not integral — evaluate differentiation"

            "icon": "warning-triangle",
            "label": "Identify unaudited information if refused"
          },
          {
            "icon": "scroll",
            "label": "Illustrative examples — reconciliation vs separate schedule"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>If supplementary information not required by the FRF is presented with the audited FS, the auditor evaluates whether it should be considered an <strong>integral part</strong> of the audited FS:</p>\n<ul><li>If it <strong>is</strong> integral, it must be covered by the auditor's opinion.</li><li>If <strong>not</strong> integral, the auditor evaluates whether it is <strong>sufficiently differentiated</strong> from the audited FS.</li><li>If not adequately differentiated, ask management to <strong>change how it is presented</strong>.</li><li>If management refuses, the auditor must: <strong>identify</strong> the unaudited supplementary information in the report, and <strong>explain</strong> that it has not been audited.</li></ul>\n<p><strong>Illustrative examples:</strong></p>\n<ol><li>A note reconciling the FS to another FRF is treated as supplementary information that <strong>cannot</strong> be differentiated — the opinion covers it.</li><li>An additional P&L schedule disclosing specific expenditure items, as an appendix, is treated as supplementary information that <strong>can</strong> be differentiated — it falls <strong>outside</strong> the scope of the opinion.</li></ol>"

        "id": "19d402cb-df38-4b8f-9bbf-432e608897b3",
        "title": "Can Matters Not Disclosed in the FS Be KAM?",
        "keywords": [
          {
            "icon": "megaphone",
            "label": "Other TCWG matters requiring significant attention"
          },
          {
            "icon": "ghost",
            "label": "Not required to be disclosed in FS"
          },
          {
            "icon": "gear",
            "label": "Example — new/changed IT system affecting strategy/risk"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ul><li>There may be other matters communicated with TCWG requiring significant auditor attention, which may be determined to be <strong>KAM</strong>.</li><li>Such matters may include those relevant to the audit but <strong>not required to be disclosed</strong> in the financial statements.</li><li><strong>Example:</strong> implementation of a new IT system (or significant changes to one) may be an area of significant attention if it had a significant effect on the overall audit strategy, or relates to a <strong>significant risk</strong> (e.g. changes affecting revenue recognition).</li></ul>"
      },
      {
        "id": "df0b7c7e-c134-496a-8ebc-59f7b5db8e41",
        "title": "Communicating Key Audit Matters",
        "keywords": [
          {
            "icon": "trophy",
            "label": "Matters of most significance in current period audit"
          },
          {
            "icon": "puzzle",
            "label": "Addressed in context of FS as a whole"
          },
          {
            "icon": "brick-wall",
            "label": "No separate opinion on these matters"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The introductory language in this section shall state that:</p>\n<ol type=\"a\"><li>KAM are those matters that, in the auditor's professional judgment, were of <strong>most significance</strong> in the audit of the financial statements [of the current period]; and</li><li>These matters were addressed in the context of the audit <strong>as a whole</strong>, and in forming the opinion thereon, and the auditor does <strong>not provide a separate opinion</strong> on these matters.</li></ol>"
      },
      {
        "id": "d4cc6efa-7c23-4963-b05a-89e3b6e04c3e",
        "title": "Placement of the KAM Section in the Auditor's Report",
        "keywords": [
          {
            "icon": "link-chain",
            "label": "After Basis for Opinion, before Management Responsibility"
          },
          {
            "icon": "anchor",
            "label": "After MURG section if going-concern uncertainty exists"
          },
          {
            "icon": "seesaw",
            "label": "EOM paragraph placed before or after KAM (SA 706)"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ul><li>Generally: after the <strong>\"Basis for Opinion\"</strong> paragraph, and <strong>before</strong> management's responsibility paragraph.</li><li>If a <strong>\"Material Uncertainty Related to Going Concern\" (MURG)</strong> section is required per SA 570 (Revised), the KAM section is placed <strong>after</strong> that.</li><li>As per SA 706: an <strong>Emphasis of Matter (EOM)</strong> paragraph may be placed either directly before or after the KAM section, per the auditor's judgment on relative significance. The heading may add context, e.g. \"Emphasis of Matter — Subsequent Event,\" to differentiate it from individual KAM.</li></ul>"
      },
      {
        "id": "3575f6ef-1491-4d8e-9749-1dbe12519026",
        "title": "KAM When the Opinion Is Modified (Qualified/Adverse)",
        "keywords": [
          {
            "icon": "brick-wall",
            "label": "KAM is not a substitute for required FS disclosures"
          },
          {
            "icon": "flag",
            "label": "Basis for Qualified/Adverse Opinion — separate section"
          },
          {
            "icon": "trophy",
            "label": "Other KAM remains relevant to communicate"
          },
          {
            "icon": "ghost",
            "label": "Adverse opinion — possibly no other KAM"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Communicating KAM is not a substitute for disclosures the applicable FRF requires management to make, or that are otherwise necessary for fair presentation.</p>\n<p>SA 705 addresses circumstances of material misstatement relating to disclosures.</p>\n<ul><li>When expressing a qualified or adverse opinion, presenting the matter in the <strong>\"Basis for Qualified/Adverse Opinion\"</strong> section promotes understanding and identifies these circumstances.</li><li>Separating this from other KAM gives it appropriate <strong>prominence</strong>.</li><li>Other KAM would still be relevant to communicate to enhance users' understanding — the KAM requirements still apply.</li><li>Since an <strong>adverse opinion</strong> means misstatements are material and pervasive, depending on significance, the auditor may determine <strong>no other matters are KAM</strong>.</li></ul>\n<p>In such a case: <em>\"Key Audit Matters: Except for the matter described in the Basis for Adverse Opinion section, we have determined that there are no other key audit matters to communicate in our report.\"</em></p>"
      }
    ]
