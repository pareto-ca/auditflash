      <button class="btn-primary" id="mc-add-card-btn">+ Add new card</button>
    </div>
  `;
  document.getElementById('home-btn').addEventListener('click', goHome);

  async function persistAndRerender(){
    await saveAndTrack(deck.id);
    render();
  }
  function flashSaved(ci, ok){
    const el = app.querySelector(`.mc-saved-note[data-saved-for="${ci}"]`);
    if (!el) return;
    // On failure, rely on the persistent top save-bar (already updated by
    // saveAndTrack) rather than this small inline pulse, which is only
    // meaningful as a quick "yes, that field saved" confirmation.
    if (!ok) return;
    el.style.display = 'inline';
    setTimeout(()=>{ el.style.display = 'none'; }, 1400);
  }

  document.getElementById('mc-save-all-btn').addEventListener('click', async (e)=>{
    const btn = e.currentTarget;
    btn.disabled = true;
    const originalLabel = btn.textContent;
    btn.textContent = 'Saving…';
    const statusEl = document.getElementById('mc-save-status');
    if (statusEl){ statusEl.textContent = 'Saving…'; statusEl.className = 'mc-save-status'; }
    await saveAndTrack(deck.id);
    btn.disabled = false;
    btn.textContent = originalLabel;
  });

  document.getElementById('mc-deck-title-input').addEventListener('change', async (e)=>{
    renameDeck(deck.id, e.target.value);
    e.target.value = deck.title; // reflect the fallback if an empty name was rejected
    await saveAndTrack(deck.id);
    const note = document.getElementById('mc-deck-title-saved');
    if (note){ note.style.display = 'inline'; setTimeout(()=>{ note.style.display = 'none'; }, 1400); }
  });
  document.getElementById('mc-open-index-btn').addEventListener('click', ()=>{
    state.manageIndexOpen = true;
    render();
  });

  document.getElementById('mc-add-card-btn').addEventListener('click', async ()=>{
    deck.cards.push({ id: generateId(), title:'New card', keywords:[], explanationHtml:'<p>Write the explanation for this card…</p>' });
    await persistAndRerender();
  });

  // Card links — bidirectional, can point at a card in any deck. Editing the
  // panel toggle re-renders the whole screen (same pattern as the description
  // editor above), and add/remove both re-save every deck touched by the change.
  app.querySelectorAll('[data-act="links-toggle"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const ci = parseInt(btn.dataset.ci,10);
      manageOpenLinksCi = (manageOpenLinksCi === ci) ? null : ci;
      render();
    });
  });
  app.querySelectorAll('[data-act="link-add"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const ci = parseInt(btn.dataset.ci,10);
      openLinkPicker(deck, ci);
    });
  });
  app.querySelectorAll('[data-act="link-remove"]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const ci = parseInt(btn.dataset.ci,10);
      const sourceCard = deck.cards[ci];
      const targetRef = findCardRef(btn.dataset.targetDeck, btn.dataset.targetCard);
      if (targetRef){
        unlinkCards(sourceCard, targetRef.card);
      } else {
        // Target already gone — just drop the dangling reference on our side.
        sourceCard.links = (sourceCard.links || []).filter(l=>!(l.deckId===btn.dataset.targetDeck && l.cardId===btn.dataset.targetCard));
      }
      await saveAndTrack(deck.id);
      if (targetRef && targetRef.deck.id !== deck.id) await saveAndTrack(targetRef.deck.id);
      render();
    });
  });

  app.querySelectorAll('[data-act="card-up"]').forEach(btn=>btn.addEventListener('click', async ()=>{
    const ci = parseInt(btn.dataset.ci,10);
    [deck.cards[ci-1], deck.cards[ci]] = [deck.cards[ci], deck.cards[ci-1]];
    await persistAndRerender();
  }));
  app.querySelectorAll('[data-act="card-down"]').forEach(btn=>btn.addEventListener('click', async ()=>{
    const ci = parseInt(btn.dataset.ci,10);
    [deck.cards[ci+1], deck.cards[ci]] = [deck.cards[ci], deck.cards[ci+1]];
    await persistAndRerender();
  }));
  app.querySelectorAll('[data-act="card-delete"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if (btn.dataset.armed === '1'){
        const ci = parseInt(btn.dataset.ci,10);
        deck.cards.splice(ci,1);
        persistAndRerender();
      } else {
        btn.dataset.armed = '1';
        btn.textContent = 'Click again to confirm';
      }
    });
  });
  app.querySelectorAll('[data-act="card-move"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const ci = parseInt(btn.dataset.ci,10);
      openDeckMovePicker(deck, ci);
    });
  });
  app.querySelectorAll('[data-act="card-title"]').forEach(inp=>{
    inp.addEventListener('change', async ()=>{
      const ci = parseInt(inp.dataset.ci,10);
      deck.cards[ci].title = inp.value.trim() || 'Untitled card';
      const result = await saveAndTrack(deck.id);
      flashSaved(ci, result.ok);
    });
  });
  // Optional — left blank, the card renders exactly as it did before this
  // field existed (storylineHtml() returns '' when empty/whitespace-only).
  app.querySelectorAll('[data-act="card-storyline"]').forEach(inp=>{
    inp.addEventListener('change', async ()=>{
      const ci = parseInt(inp.dataset.ci,10);
      const val = inp.value.trim();
      if (val) deck.cards[ci].storyline = val;
      else delete deck.cards[ci].storyline;
      const result = await saveAndTrack(deck.id);
      flashSaved(ci, result.ok);
    });
  });
  app.querySelectorAll('[data-act="toggle-sub-part"]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const ci = parseInt(btn.dataset.ci,10);
      if (ci === 0) return;
      deck.cards[ci].isSubPart = !deck.cards[ci].isSubPart;
      await persistAndRerender();
    });
  });

  // Admin default importance — stored on the card itself (card.adminImportance)
  // so it ships with the same deck_content sync every other card edit uses.
  // getCardMeta() only falls back to this when a given student hasn't tagged
  // the card themselves, so this never overrides a student's own choice.
  app.querySelectorAll('[data-act="admin-imp"]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const ci = parseInt(btn.dataset.ci,10);
      deck.cards[ci].adminImportance = btn.dataset.imp;
      await persistAndRerender();
    });
  });
  app.querySelectorAll('[data-act="admin-imp-clear"]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const ci = parseInt(btn.dataset.ci,10);
      delete deck.cards[ci].adminImportance;
      await persistAndRerender();
    });
  });

  app.querySelectorAll('[data-act="kw-add"]').forEach(btn=>btn.addEventListener('click', async ()=>{
    const ci = parseInt(btn.dataset.ci,10);
    deck.cards[ci].keywords.push({ label:'New term', icon:'' });
    await persistAndRerender();
  }));
  app.querySelectorAll('[data-act="kw-up"]').forEach(btn=>btn.addEventListener('click', async ()=>{
    const ci = parseInt(btn.dataset.ci,10), ki = parseInt(btn.dataset.ki,10);
    const kws = deck.cards[ci].keywords;
    [kws[ki-1], kws[ki]] = [kws[ki], kws[ki-1]];
    await persistAndRerender();
  }));
  app.querySelectorAll('[data-act="kw-down"]').forEach(btn=>btn.addEventListener('click', async ()=>{
    const ci = parseInt(btn.dataset.ci,10), ki = parseInt(btn.dataset.ki,10);
    const kws = deck.cards[ci].keywords;
    [kws[ki+1], kws[ki]] = [kws[ki], kws[ki+1]];
    await persistAndRerender();
  }));
  app.querySelectorAll('[data-act="kw-delete"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if (btn.dataset.armed === '1'){
        const ci = parseInt(btn.dataset.ci,10), ki = parseInt(btn.dataset.ki,10);
        deck.cards[ci].keywords.splice(ki,1);
        persistAndRerender();
      } else {
        btn.dataset.armed = '1';
        btn.textContent = '✕?';
        btn.title = 'Click again to confirm removal';
      }
    });
  });
  app.querySelectorAll('[data-act="kw-label"]').forEach(inp=>{
    inp.addEventListener('change', async ()=>{
      const ci = parseInt(inp.dataset.ci,10), ki = parseInt(inp.dataset.ki,10);
      deck.cards[ci].keywords[ki].label = inp.value.trim() || 'Term';
      const result = await saveAndTrack(deck.id);
      flashSaved(ci, result.ok);
    });
  });
  app.querySelectorAll('[data-act="kw-icon"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const ci = parseInt(btn.dataset.ci,10), ki = parseInt(btn.dataset.ki,10);
      openIconPicker((value)=>{
        deck.cards[ci].keywords[ki].icon = value;
        persistAndRerender();
      }, deck.cards[ci].keywords[ki].icon);
    });
  });

  // Description editor (toggle / toolbar / save / cancel) — only one card's
  // editor is open at a time (manageOpenDescCi), so re-rendering the whole
  // screen on toggle is cheap and keeps state simple.
  app.querySelectorAll('[data-act="desc-toggle"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const ci = parseInt(btn.dataset.ci,10);
      manageOpenDescCi = (manageOpenDescCi === ci) ? null : ci;
      savedEditRange = null;
      render();
    });
  });
  app.querySelectorAll('[data-act="desc-cancel"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      manageOpenDescCi = null;
      savedEditRange = null;
      render();
    });
  });
  app.querySelectorAll('[data-act="desc-save"]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const ci = parseInt(btn.dataset.ci,10);
      const canvas = document.getElementById('mc-desc-canvas');
      if (!canvas) return;
      btn.textContent = 'Saving…';
      btn.disabled = true;
      deck.cards[ci].explanationHtml = canvas.innerHTML;
      await saveAndTrack(deck.id);
      manageOpenDescCi = null;
      savedEditRange = null;
      render();
    });
  });

  const descCanvas = document.getElementById('mc-desc-canvas');
  if (descCanvas){
    descCanvas.addEventListener('keyup', ()=>trackEditSelection(descCanvas));
    descCanvas.addEventListener('mouseup', ()=>trackEditSelection(descCanvas));
    descCanvas.addEventListener('focus', ()=>trackEditSelection(descCanvas));

    app.querySelectorAll('.edit-tool-btn[data-cmd]').forEach(btn=>{
      // Prevent the button from stealing focus away from the canvas, so the
      // user's text selection survives long enough for execCommand to apply.
      btn.addEventListener('mousedown', e=>e.preventDefault());
      btn.addEventListener('click', ()=>{
        descCanvas.focus();
        restoreEditSelection();
        document.execCommand(btn.dataset.cmd, false, null);
        trackEditSelection(descCanvas);
      });
    });

    // Lettered (a, b, c…) and Roman-numeral (i, ii, iii…) list buttons. There is
    // no execCommand for list "type", so this turns the selection into an
    // ordered list first (if it isn't one already), then sets the native HTML
    // `type` attribute on that <ol> — which every browser renders correctly.
    app.querySelectorAll('.edit-tool-btn[data-list-type]').forEach(btn=>{
      btn.addEventListener('mousedown', e=>e.preventDefault());
      btn.addEventListener('click', ()=>{
        descCanvas.focus();
        restoreEditSelection();
        applyOrderedListType(descCanvas, btn.dataset.listType);
        trackEditSelection(descCanvas);
      });
    });

    app.querySelectorAll('.edit-color-swatch').forEach(btn=>{
      btn.addEventListener('mousedown', e=>e.preventDefault());
      btn.addEventListener('click', ()=>{
        descCanvas.focus();
        restoreEditSelection();
        document.execCommand('foreColor', false, btn.dataset.color);
        trackEditSelection(descCanvas);
      });
    });

    // "No color" — strips any color formatting off the selection so the
    // text goes back to the normal default color instead of being locked to
    // a fixed one. This does NOT use execCommand('foreColor', 'inherit') —
    // browsers (this one included) treat CSS keywords like inherit/initial/
    // unset/currentcolor as an unparseable color and silently fall back to
    // fully TRANSPARENT text, which would make the selection invisible
    // instead of restoring it. It also can't be done by manually walking the
    // selected Range and stripping color from whatever's fully inside it —
    // when the selection boundary sits exactly at a colored element's text
    // edges (the common case: select-then-color, then select the same text
    // again), the Range's own container is the text node itself, not its
    // colored parent, so extraction never captures the wrapper that needs
    // cleaning. Instead: apply a one-off marker color via execCommand (the
    // same reliable native mechanism the color swatches use — it correctly
    // splits partially-overlapping formatted elements at the boundary, which
    // manual DOM surgery does not), then immediately clean every element
    // carrying that exact marker out of the whole canvas.
    // Browsers normalize the color they're given differently depending on
    // where it lands — a <font color> attribute serializes back out as hex,
    // while an inline style="color:..." serializes back out as rgb(...) —
    // so the marker has to be recognized in either form.
    const NO_COLOR_MARKER_RGB = 'rgb(1, 2, 3)';
    const NO_COLOR_MARKER_HEX = '#010203';
    function stripNoColorMarkers(root){
      root.querySelectorAll('font[color]').forEach(el=>{
        const c = el.getAttribute('color').replace(/\s+/g,'').toLowerCase();
        if (c !== NO_COLOR_MARKER_HEX && c !== NO_COLOR_MARKER_RGB.replace(/\s+/g,'')) return;
        const parent = el.parentNode;
        while (el.firstChild) parent.insertBefore(el.firstChild, el);
        parent.removeChild(el);
      });
      root.querySelectorAll('[style*="color"]').forEach(el=>{
        const c = el.style.color.replace(/\s+/g,'').toLowerCase();
        if (c !== NO_COLOR_MARKER_HEX && c !== NO_COLOR_MARKER_RGB.replace(/\s+/g,'')) return;
        el.style.removeProperty('color');
        if (!el.getAttribute('style')) el.removeAttribute('style');
      });
    }
    const noColorBtn = document.getElementById('mc-desc-no-color-btn');
    if (noColorBtn){
      noColorBtn.addEventListener('mousedown', e=>e.preventDefault());
      noColorBtn.addEventListener('click', ()=>{
        descCanvas.focus();
        restoreEditSelection();
        const sel = window.getSelection();
        if (!sel || !sel.rangeCount || sel.getRangeAt(0).collapsed) return;
        document.execCommand('foreColor', false, NO_COLOR_MARKER_RGB);
        stripNoColorMarkers(descCanvas);
        trackEditSelection(descCanvas);
      });
    }

    const colorPicker = document.getElementById('mc-desc-color-picker');
    if (colorPicker){
      colorPicker.addEventListener('input', ()=>{
        descCanvas.focus();
        restoreEditSelection();
        document.execCommand('foreColor', false, colorPicker.value);
        trackEditSelection(descCanvas);
      });
    }
  }
}

// Admin-only "Index · reorder cards" screen. Lists every group (a lone card,
// or a sub-part chain like 2a/2b/2c treated as one block) with a slider that
// repositions the whole group in one drag — no repeated up/down clicking.
// Numbers are never stored; they're recomputed from the new card order the
// instant a slider commits, exactly like every other numbering display.
function renderManageIndex(deck){
  const groups = getCardGroups(deck);
  const numbers = getCardNumbers(deck);
  const totalGroups = groups.length;

  app.innerHTML = `
    <button class="back-link" id="mgi-back-btn">&larr; Manage cards</button>
    <div class="deck-list-head">
      <p class="eyebrow">Index &middot; reorder cards &middot; admin only</p>
      <h1>${esc(deck.title)}</h1>
      <p>Drag a slider to move a card (or its whole a/b/c sub-part set) to a new position. Numbers renumber automatically and save instantly for every student.</p>
    </div>
    <div class="mc-save-bar">
      <span class="mc-save-status ${manageLastSaveError ? 'error' : 'ok'}" id="mc-save-status">${manageLastSaveError ? `⚠ Not saved — ${esc(manageLastSaveError)}. Go back to Manage cards and click "Save all changes" to retry.` : '✓ All changes saved'}</span>
    </div>
    ${groups.map((g, gi)=>{
      const label = g.size === 1
        ? numbers[g.startIndex]
        : `${numbers[g.startIndex]}–${numbers[g.startIndex + g.size - 1]}`;
      const cardsHtml = deck.cards.slice(g.startIndex, g.startIndex + g.size).map((c, k)=>`
        <div class="mgi-group-card">
          <span class="mgi-group-card-num">${numbers[g.startIndex + k]}</span>
          <span class="mgi-group-card-title">${esc(c.title)}</span>
        </div>`).join('');
      return `
      <div class="mgi-group-row" data-group-start="${g.startIndex}">
        <div class="mgi-group-head">
          <span class="mgi-group-label">${label}</span>
          ${g.size > 1 ? `<span class="mgi-group-badge">${g.size} cards move together</span>` : ''}
        </div>
        <div class="mgi-group-cards">${cardsHtml}</div>
        <div class="mgi-slider-row">
          <input type="range" class="mgi-slider" min="1" max="${totalGroups}" value="${gi+1}"
            data-group-start="${g.startIndex}" ${totalGroups<=1?'disabled':''}>
          <span class="mgi-slider-val" data-group-start="${g.startIndex}">Position ${gi+1} of ${totalGroups}</span>
        </div>
      </div>`;
    }).join('')}
  `;

  document.getElementById('mgi-back-btn').addEventListener('click', ()=>{
    state.manageIndexOpen = false;
    render();
  });

  app.querySelectorAll('.mgi-slider').forEach(slider=>{
    const startIndex = parseInt(slider.dataset.groupStart, 10);
    const valEl = app.querySelector(`.mgi-slider-val[data-group-start="${startIndex}"]`);
    // Update the live label while dragging, but don't touch the card array
    // (and don't re-render) until the drag actually settles — reordering on
    // every intermediate tick would be both wasteful and visually jittery.
    slider.addEventListener('input', ()=>{
      if (valEl) valEl.textContent = `Position ${slider.value} of ${totalGroups}`;
    });
    slider.addEventListener('change', async ()=>{
      const targetPos = parseInt(slider.value, 10) - 1; // 0-based
      moveGroupToPosition(deck, startIndex, targetPos);
      await saveAndTrack(deck.id);
      render();
    });
  });
}

// Search-as-you-type icon picker modal. Offers both the original small inline-SVG
// library (for backward compatibility) and the large Material Symbols library.
function openIconPicker(onPick, rawCurrentValue){
  // Resolve a legacy bare name (e.g. "umbrella", saved before the Material
  // Symbols picker existed) to its "ms:"-prefixed equivalent first, so it
  // matches a real entry below instead of showing as "not in library".
  const currentValue = resolveIconValue(rawCurrentValue);
  const legacyEntries = Object.keys(ICONS).map(name => ({ value:name, label:name.replace(/_/g,' '), kind:'svg' }));
  const materialEntries = MATERIAL_ICON_NAMES.map(name => ({ value:'ms:'+name, label:name.replace(/_/g,' '), kind:'material' }));
  const allEntries = legacyEntries.concat(materialEntries);
  // The keyword's current icon may not be in the library at all (a value that
  // was set some other way, or a library entry later removed) — in that case
  // synthesize a one-off entry so it can still render as "selected" up top.
  const currentEntry = currentValue ? allEntries.find(e=>e.value===currentValue) : null;
  const unknownCurrentEntry = (currentValue && !currentEntry)
    ? { value: currentValue, label: currentValue.replace(/^ms:/,'').replace(/_/g,' ') + ' (not in library)', kind: currentValue.startsWith('ms:') ? 'material' : 'svg', unknown:true }
    : null;

  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.setAttribute('role','dialog'); ov.setAttribute('aria-modal','true');
  ov.innerHTML = `
    <div class="modal icon-picker-modal">
      <h3>Choose an icon</h3>
      <p class="sub">Search by name — ${allEntries.length}+ icons available.</p>
      <input type="text" class="auth-input icon-picker-search" id="icon-picker-search" placeholder="Search icons… e.g. calculator, receipt, shield">
      <p class="icon-picker-count" id="icon-picker-count"></p>
      <div class="icon-picker-grid" id="icon-picker-grid"></div>
      <div class="btn-row" style="margin-top:1rem;">
        <button class="btn-secondary" id="icon-picker-close">Close</button>
      </div>
    </div>`;
  document.body.appendChild(ov);

  const grid = ov.querySelector('#icon-picker-grid');
  const countEl = ov.querySelector('#icon-picker-count');
  const searchInput = ov.querySelector('#icon-picker-search');

  function itemHtml(e){
    const preview = e.kind === 'svg' && ICONS[e.value]
      ? `<svg width="26" height="26" viewBox="0 0 24 24" fill="#2C46B0">${ICONS[e.value]}</svg>`
      : e.kind === 'material'
      ? `<span class="material-symbols-outlined" translate="no">${esc(e.value.slice(3))}</span>`
      : `<span class="material-symbols-outlined" translate="no">help</span>`;
    const selected = currentValue && e.value === currentValue;
    return `<button type="button" class="icon-picker-item${selected?' selected':''}" data-value="${esc(e.value)}" title="${esc(e.label)}">
      ${preview}
      <span class="icon-picker-label">${esc(e.label)}</span>
      ${selected ? '<span class="icon-picker-selected-mark">✓</span>' : ''}
    </button>`;
  }

  function renderGrid(filter){
    const q = filter.trim().toLowerCase();
    const matches = q ? allEntries.filter(e=>e.label.includes(q)) : allEntries;
    const shown = matches.slice(0, 150);
    countEl.textContent = q
      ? `${matches.length} match${matches.length===1?'':'es'}`
      : `Showing first ${shown.length} of ${allEntries.length} — type to search`;
    // The currently-selected icon is always pinned to the front of the grid
    // (even an "unknown"/out-of-library one) so the admin can see at a glance
    // what's already chosen, whether or not it matches the current search.
    const alreadyShown = new Set(shown.map(e=>e.value));
    const pinned = [];
    if (unknownCurrentEntry && !alreadyShown.has(unknownCurrentEntry.value)) pinned.push(unknownCurrentEntry);
    if (currentEntry && !alreadyShown.has(currentEntry.value) && !q) pinned.push(currentEntry);
    const finalList = pinned.concat(shown);
    if (!finalList.length){
      grid.innerHTML = `<p class="icon-picker-empty">No icons match "${esc(filter)}". Try a different word.</p>`;
      return;
    }
    grid.innerHTML = finalList.map(itemHtml).join('');
    grid.querySelectorAll('.icon-picker-item').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        onPick(btn.dataset.value);
        document.body.removeChild(ov);
      });
    });
  }
  renderGrid('');
  searchInput.addEventListener('input', ()=> renderGrid(searchInput.value));
  ov.querySelector('#icon-picker-close').addEventListener('click', ()=> document.body.removeChild(ov));
}

// Search-as-you-type picker for linking one card to another, anywhere in the
// system. Clicking a result links immediately (no separate "confirm" step) —
// links are additive and cheap to undo from the "Manage links" panel, so an
// extra click here would just be friction.
function openLinkPicker(sourceDeck, sourceCi){
  const sourceCard = sourceDeck.cards[sourceCi];
  const existingIds = new Set((sourceCard.links || []).map(l=>l.cardId));
  const allCards = [];
  DECKS.forEach(d=>{
    d.cards.forEach((c, idx)=>{
      if (c.id === sourceCard.id) return; // can't link a card to itself
      allCards.push({ deck: d, card: c, cardIndex: idx });
    });
  });

  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.setAttribute('role','dialog'); ov.setAttribute('aria-modal','true');
  ov.innerHTML = `
    <div class="modal icon-picker-modal">
      <h3>Link "${esc(numberedTitle(sourceDeck, sourceCi))}" to…</h3>
      <p class="sub">Search across every deck — a card can link to any other card in the system, not just its own deck.</p>
      <input type="text" class="auth-input icon-picker-search" id="link-picker-search" placeholder="Search by card title or deck…">
      <p class="icon-picker-count" id="link-picker-count"></p>
      <div class="link-picker-grid" id="link-picker-grid"></div>
      <div class="btn-row" style="margin-top:1rem;">
        <button class="btn-secondary" id="link-picker-close">Close</button>
      </div>
    </div>`;
  document.body.appendChild(ov);

  const grid = ov.querySelector('#link-picker-grid');
  const countEl = ov.querySelector('#link-picker-count');
  const searchInput = ov.querySelector('#link-picker-search');

  function renderResults(query){
    const q = query.trim().toLowerCase();
    const matches = q
      ? allCards.filter(({deck,card})=> card.title.toLowerCase().includes(q) || deck.title.toLowerCase().includes(q))
      : allCards;
    // Show every match — this used to cap at the first 60, which (since
    // allCards is built deck-by-deck) meant only cards from the first
    // handful of decks ever appeared unless the admin typed a search term.
    // With dozens of decks that looked like "most cards are missing" even
    // though search always worked; browsing without typing anything should
    // surface every deck too.
    const shown = matches;
    countEl.textContent = q
      ? `${matches.length} match${matches.length===1?'':'es'}`
      : `${allCards.length} cards across every deck — type to search, or scroll to browse`;
    if (!shown.length){
      grid.innerHTML = `<p class="icon-picker-empty">No cards match "${esc(query)}". Try a different word.</p>`;
      return;
    }
    grid.innerHTML = shown.map(({deck,card,cardIndex})=>{
      const linked = existingIds.has(card.id);
      return `<button type="button" class="link-picker-item${linked?' linked':''}" data-deck-id="${esc(deck.id)}" data-card-id="${esc(card.id)}" ${linked?'disabled':''}>
        <span>
          <span class="link-picker-item-title">${esc(numberedTitle(deck, cardIndex))}</span>
          <span class="link-picker-item-deck">${esc(deck.title)}</span>
        </span>
        ${linked?'<span class="link-picker-item-badge">Already linked</span>':''}
      </button>`;
    }).join('');
    grid.querySelectorAll('.link-picker-item:not([disabled])').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const targetRef = findCardRef(btn.dataset.deckId, btn.dataset.cardId);
        if (!targetRef) return;
        linkCards(sourceCard, sourceDeck.id, targetRef.card, targetRef.deck.id);
        document.body.removeChild(ov);
        await saveAndTrack(sourceDeck.id);
        if (targetRef.deck.id !== sourceDeck.id) await saveAndTrack(targetRef.deck.id);
        render();
      });
    });
  }
  renderResults('');
  searchInput.addEventListener('input', ()=> renderResults(searchInput.value));
  ov.querySelector('#link-picker-close').addEventListener('click', ()=> document.body.removeChild(ov));
}

// Deck-picker for "Move to deck" — lists every OTHER deck as a move target.
// Unlike linking (additive, cheap to undo), moving a card resets any existing
// students' progress/tags/spaced-repetition schedule for that specific card
// (see moveCardToDeck's comment for why), so this warns plainly before the
// admin picks a target rather than burying that in a tooltip only.
function openDeckMovePicker(sourceDeck, sourceCi){
  const sourceCard = sourceDeck.cards[sourceCi];
  const otherDecks = DECKS.filter(d=>d.id !== sourceDeck.id);

  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.setAttribute('role','dialog'); ov.setAttribute('aria-modal','true');
  ov.innerHTML = `
    <div class="modal icon-picker-modal">
      <h3>Move "${esc(numberedTitle(sourceDeck, sourceCi))}" to…</h3>
      <p class="sub">⚠ This moves the card out of "${esc(sourceDeck.title)}" entirely. Any existing student's confidence tag, importance, and spaced-repetition schedule for this specific card will reset, since that progress is tracked by deck position, not by the card itself. Linked cards stay linked.</p>
      <input type="text" class="auth-input icon-picker-search" id="move-picker-search" placeholder="Search decks…">
      <p class="icon-picker-count" id="move-picker-count"></p>
      <div class="link-picker-grid" id="move-picker-grid"></div>
      <div class="btn-row" style="margin-top:1rem;">
        <button class="btn-secondary" id="move-picker-close">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(ov);

  const grid = ov.querySelector('#move-picker-grid');
  const countEl = ov.querySelector('#move-picker-count');
  const searchInput = ov.querySelector('#move-picker-search');

  function renderResults(query){
    const q = query.trim().toLowerCase();
    const matches = q ? otherDecks.filter(d=>d.title.toLowerCase().includes(q)) : otherDecks;
    countEl.textContent = q
      ? `${matches.length} match${matches.length===1?'':'es'}`
      : `${otherDecks.length} other decks — type to search, or scroll to browse`;
    if (!matches.length){
      grid.innerHTML = `<p class="icon-picker-empty">No decks match "${esc(query)}". Try a different word.</p>`;
      return;
    }
    grid.innerHTML = matches.map(d=>`
      <button type="button" class="link-picker-item" data-deck-id="${esc(d.id)}">
        <span>
          <span class="link-picker-item-title">${esc(d.title)}</span>
          <span class="link-picker-item-deck">${d.cards.length} card${d.cards.length===1?'':'s'}</span>
        </span>
      </button>`).join('');
    grid.querySelectorAll('.link-picker-item').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const targetDeck = DECKS.find(d=>d.id===btn.dataset.deckId);
        if (!targetDeck) return;
        btn.disabled = true;
        await moveCardToDeck(sourceDeck, sourceCi, targetDeck);
        document.body.removeChild(ov);
        render();
      });
    });
  }
  renderResults('');
  searchInput.addEventListener('input', ()=> renderResults(searchInput.value));
  ov.querySelector('#move-picker-close').addEventListener('click', ()=> document.body.removeChild(ov));
}

function stageStepsHtml(stage, mode, showIndex){
  // The "Index" tab only exists in the main Quick review flow (not the
  // filtered/matrix review flow, which reuses this same helper) — it's a
  // standing navigation destination (jump to any card), not a sequential
  // step, so it's always clickable regardless of where the user currently is.
  const steps = mode === 'quick'
    ? (showIndex ? [['answer','Review'],['explain','Explain'],['index','Index']] : [['answer','Review'],['explain','Explain']])
    : [['question','Guess'],['answer','Reveal'],['explain','Explain']];
  const order = {};
  steps.forEach(([key],i)=>order[key]=i);
  return `<div class="stage-steps">${steps.map(([key,label])=>{
    let cls = '';
    let clickable = false;
    if (key === stage) cls = 'current';
    else if (key === 'index') { cls = 'done'; clickable = true; }
    else if (order[key] < order[stage]) { cls = 'done'; clickable = true; }
    const tag = clickable ? 'button' : 'span';
    return `<${tag} class="stage-step ${cls}" ${clickable ? `data-stage="${key}"` : ''}>${label}</${tag}>`;
  }).join('')}</div>`;
}

function renderIndexView(deck){
  const mode = state.mode;
  const reviewedCount = state.perCard.filter(Boolean).length;
  const progressRight = reviewedCount > 0 ? `<span>${reviewedCount} of ${deck.cards.length} rated</span>` : '';
  const cardNums = getCardNumbers(deck);
  const rows = deck.cards.map((c,i)=>{
    const p = state.perCard[i];
    const conf = p ? p.confidence : null;
    const label = conf ? `<b style="color:${conf==='strong'?'#2E7D32':conf==='mid'?'#E65100':'#C62828'}">${CONF_LABELS[conf]}</b>` : `<span style="color:#B7BEE0">—</span>`;
    const current = i === state.cardIndex ? ' current' : '';
    return `<button class="index-row${current}" data-idx="${i}"><span>${cardNums[i]} ${esc(c.title)}</span>${label}</button>`;
  }).join('');

  app.innerHTML = `
    <button class="back-link" id="home-btn">&larr; All decks</button>
    <div class="deck-progress">
      <span>Card ${state.cardIndex+1} of ${deck.cards.length}</span>
      ${progressRight}
    </div>
    ${stageStepsHtml('index', mode, true)}
    <div class="end-panel">
      <h2 class="end-score" style="font-size:2rem;">Index</h2>
      <p class="end-label">Tap any card to jump straight to it.</p>
      <div class="end-breakdown" style="margin-top:.5rem; max-height:420px;">${rows}</div>
    </div>
  `;

  document.getElementById('home-btn').addEventListener('click', goHome);
  document.querySelectorAll('.stage-step[data-stage]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ stopEditing(); state.stage = btn.dataset.stage; render(); });
  });
  document.querySelectorAll('.index-row').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      stopEditing();
      state.cardIndex = parseInt(btn.dataset.idx, 10);
      // Land on the keyword/reveal slide first (consistent with the
      // Previous-card behavior), not straight on the explanation.
      state.stage = 'answer';
      render();
    });
  });
}

function renderCard(deck){
  const mode = effectiveStudyMode(state.deckIndex, state.cardIndex);
  if (mode === 'quick' && state.stage === 'index'){
    renderIndexView(deck);
    return;
  }
  const card = deck.cards[state.cardIndex];
  // A ⭐ card forced into Quick review (see effectiveStudyMode) never uses the
  // 'question' (guess-first) stage — if state.stage still says 'question'
  // (e.g. left over from navigating in from a non-⭐ card), correct it here
  // so this card always lands straight on the answer/keyword slide.
  const stage = (mode === 'quick' && state.stage === 'question') ? 'answer' : state.stage;
  const cols = gridCols(card.keywords.length);

  const kwGridFlip = `<div class="kw-grid" style="grid-template-columns:repeat(${cols},1fr)">${card.keywords.map((kw,i)=>`
    <div class="kw-box" data-idx="${i}">
      <div class="kw-box-inner">
        <div class="kw-face front">
          ${iconHtml(kw.icon)}
          <span class="kw-placeholder">?</span>
        </div>
        <div class="kw-face back">
          ${iconHtml(kw.icon)}
          <span class="kw-text">${esc(kw.label)}</span>
        </div>
      </div>
    </div>`).join('')}</div>`;

  const kwGridStatic = `<div class="kw-grid" style="grid-template-columns:repeat(${cols},1fr)">${card.keywords.map(kw=>`
    <div class="kw-box">
      <div class="kw-box-inner">
        <div class="kw-face front">
          ${iconHtml(kw.icon)}
          <span class="kw-text">${esc(kw.label)}</span>
        </div>
      </div>
    </div>`).join('')}</div>`;

  let body = '';
  let footer = '';

  if (stage === 'question'){
    body = kwGridFlip;
    footer = `<button class="btn-primary" id="reveal-btn">Reveal answers</button>`;
  } else if (stage === 'answer'){
    body = mode === 'quick' ? kwGridStatic : kwGridFlip;
    const label = mode === 'quick' ? 'Continue to explanation' : 'Continue';
    footer = `<button class="btn-primary" id="continue-btn">${label}</button>`;
  } else {
    body = explainBlockHtml(deck, state.cardIndex);
    const isLast = state.cardIndex === deck.cards.length - 1;
    const isFirst = state.cardIndex === 0;
    footer = `
      ${!isFirst ? '<button class="btn-secondary" id="prev-card-btn">&larr; Previous card</button>' : ''}
      <button class="btn-primary" id="next-btn">${isLast ? 'See results' : 'Next card'}</button>
      <button class="btn-secondary" id="submit-session-btn">Submit session</button>
    `;
  }

  const reviewedCount = state.perCard.filter(Boolean).length;
  const progressRight = reviewedCount > 0 ? `<span>${reviewedCount} of ${deck.cards.length} rated</span>` : '';

  app.innerHTML = `
    <button class="back-link" id="home-btn">&larr; All decks</button>
    <div class="deck-progress">
      <span>Card ${state.cardIndex+1} of ${deck.cards.length}</span>
      ${progressRight}
    </div>
    ${stageStepsHtml(stage, mode, true)}
    <div class="card">
      <div class="card-title">${storylineHtml(deck, state.cardIndex)}${esc(numberedTitle(deck, state.cardIndex))}</div>
      ${linkButtonHtml(state.deckIndex, state.cardIndex)}
      ${importanceRowHtml(state.deckIndex, state.cardIndex)}
      ${mode === 'quick' ? confTagRowHtml(state.deckIndex, state.cardIndex) : ''}
      <div class="card-body">${body}
        <div class="btn-row">${footer}</div>
      </div>
    </div>
  `;

  document.getElementById('home-btn').addEventListener('click', goHome);
  wireLinkButton(app);
  wireImportanceRow(state.deckIndex, state.cardIndex);
  if (mode === 'quick') wireConfTagRow(state.deckIndex, state.cardIndex);
  if (stage === 'explain') wireExplainBlock(deck, state.cardIndex, ()=>renderCard(deck));
  document.querySelectorAll('.stage-step[data-stage]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ stopEditing(); state.stage = btn.dataset.stage; render(); });
  });

  const alreadyScored = mode !== 'quick' && state.perCard[state.cardIndex] !== undefined;

  function askConfidenceThenExplain(){
    openConfidenceModal(state.deckIndex, state.cardIndex, (conf)=>{
      state.perCard[state.cardIndex] = {confidence: conf};
      state.stage = 'explain';
      render();
    });
  }

  if (stage === 'question'){
    document.getElementById('reveal-btn').addEventListener('click', ()=>{
      state.stage = 'answer';
      document.querySelector('.stage-steps').outerHTML = stageStepsHtml(state.stage, mode, true);
      document.querySelectorAll('.stage-step[data-stage]').forEach(btn=>{
        btn.addEventListener('click', ()=>{ state.stage = btn.dataset.stage; render(); });
      });
      const boxes = document.querySelectorAll('.kw-box');
      boxes.forEach((box,i)=> setTimeout(()=> box.classList.add('flipped'), i*90));
      const footerEl = document.querySelector('.btn-row');
      setTimeout(()=>{
        footerEl.innerHTML = `<button class="btn-primary" id="continue-btn">Continue</button>`;
        document.getElementById('continue-btn').addEventListener('click', ()=>{
          if (alreadyScored){ state.stage = 'explain'; render(); }
          else { askConfidenceThenExplain(); }
        });
      }, boxes.length*90 + 150);
    });
  } else if (stage === 'answer'){
    if (mode === 'quick'){
      document.getElementById('continue-btn').addEventListener('click', ()=>{ state.stage='explain'; render(); });
    } else {
      document.querySelectorAll('.kw-box').forEach(b=>b.classList.add('flipped'));
      document.getElementById('continue-btn').addEventListener('click', ()=>{
        if (alreadyScored){ state.stage = 'explain'; render(); }
        else { askConfidenceThenExplain(); }
      });
    }
  } else {
    document.getElementById('next-btn').addEventListener('click', ()=>{
      stopEditing();
      // In quick mode, capture whatever confidence was set inline (no popup)
      if (mode === 'quick'){
        const conf = getCardMeta(state.deckIndex, state.cardIndex).confidence;
        state.perCard[state.cardIndex] = conf ? {confidence: conf} : undefined;
      }
      state.cardIndex += 1;
      // Use the session's overall mode here, not this card's (possibly ⭐-forced)
      // effective mode — the next card gets its own effective-mode check (and
      // 'question'→'answer' self-correction) the moment it renders.
      state.stage = state.mode === 'quick' ? 'answer' : 'question';
      render();
    });

    const prevBtn = document.getElementById('prev-card-btn');
    if (prevBtn){
      prevBtn.addEventListener('click', ()=>{
        stopEditing();
        state.cardIndex -= 1;
        // Show the keyword/reveal slide first (not the explanation) — matches
        // the forward flow. Since this card was already visited, its
        // confidence rating (if any) is already stored, so the "Continue"
        // button on this stage will skip straight to the explanation instead
        // of re-asking the confidence question (see `alreadyScored` below).
        state.stage = 'answer';
        render();
      });
    }

    document.getElementById('submit-session-btn').addEventListener('click', ()=>{
      stopEditing();
      // Capture whatever's set for the current card before showing the report,
      // same as the "Next card" handler does, so this card counts too.
      if (mode === 'quick'){
        const conf = getCardMeta(state.deckIndex, state.cardIndex).confidence;
        state.perCard[state.cardIndex] = conf ? {confidence: conf} : undefined;
      }
      state.sessionSubmitted = true;
      render();
    });
  }
}

function renderEnd(deck){
  const mode = state.mode;
  const isEarlySubmit = state.sessionSubmitted && state.cardIndex < deck.cards.length;
  const reviewedCount = state.perCard.filter(Boolean).length;
  const headline = isEarlySubmit ? 'Session submitted' : (mode==='quick'?'All reviewed!':'Deck done!');
  const subLabel = isEarlySubmit
    ? `You reviewed ${reviewedCount} of ${deck.cards.length} cards in this session:`
    : 'Confidence ratings for this session:';

  const summaryCards = deck.cards.map((c,i)=>({
    deckIndex: state.deckIndex, cardIndex: i, title: c.title,
    confidence: state.perCard[i] ? state.perCard[i].confidence : null,
  }));
  const { confPills, rows } = sessionBreakdownHtml(summaryCards);

  const panelInner = `
    <h2 class="end-score" style="font-size:2rem;">${headline}</h2>
    <p class="end-label">${subLabel}</p>
    <div class="conf-breakdown">${confPills}</div>
    <div class="end-breakdown" style="margin-top:1.2rem;">${rows}</div>
    <div class="btn-row">
      ${isEarlySubmit ? '<button class="btn-primary" id="continue-review-btn">Continue reviewing</button>' : ''}
      <button class="${isEarlySubmit ? 'btn-secondary' : 'btn-primary'}" id="restart-btn">${mode==='quick'?'Review again':'Restart this deck'}</button>
      <button class="btn-secondary" id="other-deck-btn">Choose another deck</button>
    </div>`;

  app.innerHTML = `
    <button class="back-link" id="home-btn">&larr; All decks</button>
    <p class="eyebrow" style="text-align:center;">${isEarlySubmit ? 'Session summary' : 'Deck complete'}</p>
    <div class="end-panel">${panelInner}</div>
  `;
  document.getElementById('home-btn').addEventListener('click', goHome);
  document.getElementById('restart-btn').addEventListener('click', ()=>{ resetDeckProgress(); render(); });
  document.getElementById('other-deck-btn').addEventListener('click', goHome);
  wireSessionBreakdownRows(app);
  const continueBtn = document.getElementById('continue-review-btn');
  if (continueBtn){
    continueBtn.addEventListener('click', ()=>{
      state.sessionSubmitted = false;
      render();
    });
  }
}

(async function init(){
  // id/numbering backfill + persist now happens inside onAuthSuccess()
  // itself (see its definition) — it's called from three places (signup,
  // login, and the returning-session path below), and needs to run using
  // whatever deck data THAT specific call just fetched, not data fetched
  // here beforehand. This initial pass just gets something sane on screen
  // for the pre-login auth screen (no session yet). Deliberately NOT calling
  // ensureCardIds()/ensureCardNumberingMigrated() here too: doing the
  // backfill both here AND inside onAuthSuccess meant that on a brand new
  // Supabase project (no deck_content rows at all yet), this pass would
  // assign ids in memory first; then onAuthSuccess's loadDeckContent()
  // finds no row to overwrite those decks with (nothing to fetch yet) and
  // leaves them untouched, so its own ensureCardIds() call sees they
  // "already have ids" and never realizes they were never actually saved.
  // Backfilling in exactly one place (onAuthSuccess, after ITS OWN fetch)
  // is what guarantees every code path — signup, login, or a returning
  // session — reliably persists ids the first time, including on a
  // completely empty database.
  await loadDeckContent();
  const { data } = await sb.auth.getSession();
  if (data && data.session){
    await onAuthSuccess(data.session);
  } else {
    render();
  }
})();
</script>
</body>
</html>
