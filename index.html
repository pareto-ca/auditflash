<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flashcard decks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..500,0..1,0&display=block" rel="stylesheet">
<style>
  :root{
    --blue:#4165E7;
    --blue-dark:#2C46B0;
    --navy:#161B3D;
    --navy-muted:#5C6390;
    --bg:#EAEFFB;
    --surface:#FFFFFF;
    --border:#D9E0F6;
    --gold:#E0992F;
    --font-display:'Fraunces', serif;
    --font-body:'Inter', sans-serif;
    --cta-btn-w:8rem; /* shared width for "Start deck" style CTAs, so they line up across sections */
  }
  /* Dark mode — toggled from Account settings (see renderAccountSettings /
     applyDarkModePreference). Almost everything in this app is themed off the
     --blue/--navy/--bg/--surface/--border variables above, so overriding
     them here recolors the whole app; the handful of pastel gradient boxes
     below (panel-box, guide notes, streak note, sr-panel) are hardcoded hex
     rather than variable-driven, so they get explicit dark equivalents too. */
  body.dark-mode{
    --blue:#5B82FF;
    --blue-dark:#8FB0FF;
    --navy:#EDF0FA;
    --navy-muted:#A2AAD4;
    --bg:#11142B;
    --surface:#1B1F3D;
    --border:#2E335A;
    --gold:#E8B563;
  }
  body.dark-mode{
    background-image: radial-gradient(circle at 14% 8%, rgba(91,130,255,0.10), transparent 38%),
                       radial-gradient(circle at 88% 92%, rgba(91,130,255,0.08), transparent 42%);
  }
  body.dark-mode .panel-box,
  body.dark-mode .sr-panel,
  body.dark-mode .guide-phase-note,
  body.dark-mode .guide-efficiency-note{
    background:linear-gradient(135deg,#232852,#1E2347); border-color:#343A66;
  }
  body.dark-mode .guide-card-icon,
  body.dark-mode .guide-phase-icon,
  body.dark-mode .guide-next-icon{
    background:linear-gradient(135deg,#232852,#2A3060);
  }
  body.dark-mode .guide-streak-note{
    background:linear-gradient(135deg,#3A2E1C,#33270F); border-color:#5C471F;
  }
  /* Streak card — same warm amber gradient family as guide-streak-note, but
     its own text colors, since --navy/--navy-muted flip to pale colors in
     dark mode and read as washed-out/invisible against a light cream card. */
  body.dark-mode .streak-card{
    background:linear-gradient(135deg,#3A2E1C,#2B2340); border-color:#5C471F;
    box-shadow:0 16px 34px -26px rgba(0,0,0,.6);
  }
  body.dark-mode .streak-headline{ color:#FFD98A; }
  body.dark-mode .streak-caption{ color:#D8C79E; }
  body.dark-mode .streak-count-badge{ border-color:#3A2E1C; }
  body.dark-mode .streak-progress-track{ background:rgba(0,0,0,.35); }
  body.dark-mode .streak-day-dot{ background:#2B2645; border-color:#4A3F6B; }
  body.dark-mode .streak-day-label{ color:#B9AEDD; }
  body.dark-mode .streak-day.future-day .streak-day-label{ opacity:.7; }
  body.dark-mode .streak-tier-hot{ background:linear-gradient(135deg,#40311B,#2E2542); border-color:#6B531F; }
  body.dark-mode .streak-tier-blazing{ background:linear-gradient(135deg,#47341A,#302645); border-color:#8A661F; }
  body.dark-mode .streak-tier-epic{ background:linear-gradient(135deg,#4E3819,#332748); border-color:#A67A22; box-shadow:0 20px 40px -24px rgba(0,0,0,.65); }
  body.dark-mode .streak-tier-epic .streak-headline{ color:#FFCB6B; }
  body.dark-mode .modal-overlay{ background:rgba(0,0,0,.65); }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:var(--bg);
    background-image: radial-gradient(circle at 14% 8%, rgba(65,101,231,0.07), transparent 38%),
                       radial-gradient(circle at 88% 92%, rgba(65,101,231,0.06), transparent 42%);
    color:var(--navy);
    font-family:var(--font-body);
    display:flex;
    justify-content:center;
    padding:6vh 1.25rem 8vh;
    line-height:1.5;
  }
  #app{width:100%; max-width:660px;}
  .eyebrow{
    font-family:var(--font-body); font-weight:600; font-size:.72rem;
    letter-spacing:.14em; text-transform:uppercase; color:var(--blue-dark);
    margin:0 0 .6rem;
  }
  h1,h2,h3{font-family:var(--font-display); margin:0; color:var(--navy);}
  button{font-family:var(--font-body); border:none; cursor:pointer; background:none;}
  button:focus-visible, .score-chip:focus-visible{outline:3px solid var(--gold); outline-offset:2px;}

  .screen{display:none;}
  .screen.active{display:block; animation:rise .4s ease both;}
  @keyframes rise{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

  /* ---------- back link ---------- */
  .back-link{
    display:inline-flex; align-items:center; gap:.35rem; color:var(--navy-muted);
    font-size:.85rem; font-weight:600; margin-bottom:1rem; cursor:pointer; background:none;
  }
  .back-link:hover{color:var(--blue-dark);}

  /* ---------- deck list ---------- */
  .deck-list-head{text-align:left; margin-bottom:1.6rem;}
  .deck-list-head h1{font-size:1.7rem; font-weight:600; margin-bottom:.4rem;}
  .deck-list-head p{color:var(--navy-muted); margin:0; font-size:.98rem;}
  .deck-row{
    background:var(--surface); border-radius:20px; padding:1.5rem 1.6rem;
    box-shadow:0 16px 36px -28px rgba(22,27,61,.3); margin-bottom:1rem;
    display:flex; align-items:center; justify-content:space-between; gap:1.2rem;
  }
  .deck-row-text{flex:1 1 auto; min-width:0;}
  .deck-row-text h3{font-size:1.15rem; font-weight:600; margin-bottom:.3rem;}
  .deck-row-text p{margin:0 0 .5rem; color:var(--navy-muted); font-size:.92rem;}
  .deck-row-meta{font-size:.78rem; color:var(--blue-dark); font-weight:600; letter-spacing:.03em;}
  .deck-row .btn-primary{flex:none; width:var(--cta-btn-w); text-align:center; padding-left:0; padding-right:0;}
  .deck-row-actions{display:flex; gap:.5rem; flex-wrap:wrap; flex:none;}

  .account-bar{
    display:flex; align-items:center; justify-content:space-between;
    font-size:.82rem; color:var(--navy-muted); margin-bottom:1.2rem;
  }
  .account-bar .back-link{margin:0;}

  .greeting-wrap{margin:0 0 1.2rem;}
  .greeting-text{
    font-family:var(--font-display); font-size:1.55rem; font-weight:600; color:var(--navy);
    margin:0; min-height:1.9rem; letter-spacing:.01em;
  }
  .greeting-text.typing::after{
    content:''; display:inline-block; width:2px; height:1.1em; margin-left:2px;
    background:var(--blue); vertical-align:-.15em; animation:greeting-blink .85s steps(1) infinite;
  }
  @keyframes greeting-blink{ 50%{ opacity:0; } }

  .auth-input{
    width:100%; padding:.78rem 1rem; border-radius:12px; border:1.5px solid var(--border);
    font-family:var(--font-body); font-size:.95rem; color:var(--navy); background:var(--surface);
    transition:border-color .15s;
  }
  .auth-input:focus{outline:none; border-color:var(--blue);}
  .auth-error{
    background:#FBEAEA; color:#B3261E; font-size:.85rem; padding:.65rem .9rem;
    border-radius:10px; margin:0;
  }
  .auth-toggle{
    text-align:center; font-size:.88rem; color:var(--navy-muted); margin:1.4rem 0 0;
  }
  .auth-toggle button{
    color:var(--blue-dark); font-weight:600; text-decoration:underline; padding:0 0 0 .3rem;
  }

  /* Importance row on cards */
  .imp-row-wrap{border-bottom:1px solid var(--border);}
  .imp-row{display:flex; align-items:center; gap:.45rem; padding:.55rem 1.6rem; flex-wrap:wrap;}
  .imp-label{font-size:.68rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--navy-muted); flex:none; margin-right:.15rem;}
  .imp-btn{font-size:.74rem; font-weight:600; padding:.26rem .68rem; border-radius:999px; border:1.5px solid var(--border); color:var(--navy-muted); cursor:pointer; background:var(--surface); transition:.15s; font-family:var(--font-body);}
  .imp-btn:hover{border-color:var(--blue); color:var(--blue-dark);}
  .imp-btn.active[data-imp="important"]{background:#1B3FAB; border-color:#1B3FAB; color:#fff;}
  .imp-btn.active[data-imp="mid"]{background:var(--blue); border-color:var(--blue); color:#fff;}

  /* "Linked cards" bar on cards that an admin has linked to another card */
  .link-bar{padding:.6rem 1.6rem; border-bottom:1px solid var(--border);}
  .link-btn-wrap{position:relative; display:inline-block;}
  .link-btn{
    display:inline-flex; align-items:center; gap:.35rem; font-size:.8rem; font-weight:600; color:var(--blue-dark);
    background:#EFF3FF; border:1.5px solid #DCE3FA; border-radius:999px; padding:.4rem .85rem .4rem .7rem;
    cursor:pointer; font-family:var(--font-body); transition:background .15s, border-color .15s;
  }
  .link-btn:hover, .link-btn-wrap:focus-within .link-btn{background:#E4EAFC; border-color:#c5d0f5;}
  .link-btn .material-symbols-outlined{font-size:1.05rem;}
  .link-flyout{
    position:absolute; top:calc(100% + .5rem); left:0; z-index:30; min-width:15rem; max-width:20rem;
    background:var(--surface); border:1.5px solid var(--border); border-radius:14px;
    box-shadow:0 20px 40px -20px rgba(22,27,61,.4); padding:.5rem;
    opacity:0; pointer-events:none; transform:translateY(-4px); transition:opacity .15s, transform .15s;
  }
  .link-btn-wrap:hover .link-flyout, .link-btn-wrap:focus-within .link-flyout{opacity:1; pointer-events:auto; transform:translateY(0);}
  .link-flyout-title{font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--navy-muted); padding:.3rem .55rem .45rem;}
  .link-flyout-item{
    display:flex; flex-direction:column; align-items:flex-start; gap:.1rem; width:100%; text-align:left;
    background:none; border:none; border-radius:10px; padding:.5rem .55rem; cursor:pointer; font:inherit;
  }
  .link-flyout-item:hover, .link-flyout-item:focus-visible{background:var(--bg);}
  .link-flyout-item-title{font-size:.86rem; font-weight:600; color:var(--navy);}
  .link-flyout-item-deck{font-size:.74rem; color:var(--navy-muted);}
  @media (max-width:480px){
    .link-flyout{left:auto; right:0; max-width:calc(100vw - 3rem);}
  }
  .imp-btn.active[data-imp="low"]{background:#8FA5F5; border-color:#8FA5F5; color:#fff;}

  /* Confidence modal */
  .conf-row{display:flex; gap:.65rem; justify-content:center; flex-direction:column; margin-top:1rem;}
  .conf-btn{width:100%; padding:.8rem 1.1rem; border-radius:12px; border:2px solid var(--border); font-family:var(--font-body); font-size:.95rem; font-weight:600; cursor:pointer; background:var(--surface); text-align:left; display:flex; align-items:center; gap:.75rem; transition:.15s; color:var(--navy);}
  .conf-btn:hover{border-color:var(--blue);}
  .conf-dot{width:11px; height:11px; border-radius:50%; flex:none;}
  .conf-dot-weak{background:#E57373;}
  .conf-dot-mid{background:#FFB74D;}
  .conf-dot-strong{background:#66BB6A;}
  .conf-sub{font-size:.78rem; font-weight:400; color:var(--navy-muted); margin-left:auto;}

  /* Study matrix */
  /* ---------- shared "study mode" panel box ---------- */
  /* The same blue box + title style is reused across all three study modes
     (Smart spaced repetition, Study matrix, Systematic study) so the home
     screen reads as one consistent set of options rather than three
     differently-styled sections. */
  .panel-box{
    background:linear-gradient(135deg,#EFF3FF,#F7F4FF); border:1.5px solid #DCE3FA; border-radius:18px;
    padding:1.2rem 1.35rem; margin:0 0 1.3rem;
  }
  .panel-title{font-family:var(--font-display); font-size:1.08rem; font-weight:600; color:var(--navy);}
  .panel-sub{font-size:.85rem; color:var(--navy-muted); margin-top:.2rem;}

  .matrix-wrap{margin-bottom:.8rem;}
  .matrix-table{width:auto; table-layout:fixed; border-collapse:separate; border-spacing:4px;}
  .matrix-table .matrix-label-col{width:3.6rem;}
  .matrix-table .matrix-data-col{width:var(--cta-btn-w);}
  .matrix-th{font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--navy-muted); padding:.3rem .4rem; text-align:center;}
  .matrix-row-label{font-size:.78rem; font-weight:600; color:var(--navy); padding:.4rem .5rem .4rem 0; white-space:nowrap; vertical-align:middle;}
  .matrix-cell-wrap{padding:2px;}
  .matrix-cell{display:flex; align-items:center; justify-content:center; height:52px; border-radius:10px; font-weight:700; font-size:1.1rem; border:1.5px solid var(--border); background:var(--surface); transition:.15s;}
  .matrix-cell.empty{color:#C8D0E8; font-size:.8rem; font-weight:400;}
  .matrix-cell.has-cards{color:var(--blue-dark); cursor:pointer; border-color:#c5d0f5;}
  .matrix-cell.has-cards:hover{background:var(--bg); border-color:var(--blue); transform:scale(1.03);}
  .matrix-note{font-size:.78rem; color:var(--navy-muted); margin:.7rem 0 0; line-height:1.55;}
  .matrix-note-link{display:block; width:100%; text-align:left; background:none; border:none; font-family:var(--font-body); font-size:.78rem; color:var(--navy-muted); line-height:1.55; cursor:pointer; padding:0; margin:.7rem 0 0;}
  .matrix-note-link:hover{color:var(--blue-dark);}
  .matrix-note-link u{text-decoration:underline;}

  /* Confidence tag row (quick review inline) */
  .conf-tag-row{display:flex; align-items:center; gap:.45rem; padding:.55rem 1.6rem; border-bottom:1px solid var(--border); flex-wrap:wrap;}
  .conf-tag-btn{font-size:.74rem; font-weight:700; padding:.26rem .75rem; border-radius:999px; border:1.5px solid var(--border); cursor:pointer; background:var(--surface); transition:.15s; font-family:var(--font-body); color:var(--navy);}
  .conf-tag-btn:hover{border-color:var(--blue);}
  .conf-tag-btn.active{background:var(--blue); border-color:var(--blue); color:#fff;}

  /* Deck selector overlay */
  .deck-sel-overlay{position:fixed; inset:0; background:rgba(22,27,61,.55); display:flex; align-items:center; justify-content:center; padding:1.25rem; z-index:50;}
  .deck-sel-modal{background:var(--surface); border-radius:22px; padding:2rem 1.8rem; max-width:430px; width:100%; animation:rise .25s ease both; max-height:90vh; overflow-y:auto;}
  .deck-sel-modal h3{font-family:var(--font-display); font-size:1.15rem; font-weight:600; margin:0 0 .3rem;}
  .deck-sel-modal .sub{color:var(--navy-muted); font-size:.88rem; margin:0 0 1.2rem;}
  .deck-chk-list{display:flex; flex-direction:column; gap:.55rem; margin-bottom:1.4rem;}
  .deck-chk-item{display:flex; align-items:center; gap:.75rem; padding:.7rem 1rem; border:1.5px solid var(--border); border-radius:12px; cursor:pointer; transition:.15s; font-size:.9rem; font-weight:500; color:var(--navy);}
  .deck-chk-item:hover{border-color:var(--blue);}
  .deck-chk-item input[type=checkbox]{width:16px; height:16px; accent-color:var(--blue); cursor:pointer; flex:none;}
  .deck-chk-item.select-all{border-style:dashed; color:var(--navy-muted); font-style:italic;}
  .deck-chk-meta{font-size:.78rem; color:var(--navy-muted); font-weight:400; margin-left:auto;}

  /* Filtered review */
  .filter-tag{display:inline-flex; align-items:center; gap:.35rem; background:var(--blue); color:#fff; font-size:.72rem; font-weight:700; padding:.3rem .75rem; border-radius:999px; margin-bottom:.8rem; letter-spacing:.03em;}

  /* End screen confidence breakdown */
  .conf-breakdown{display:flex; gap:.75rem; justify-content:center; margin:.5rem 0 .3rem;}
  .conf-pill{display:flex; align-items:center; gap:.4rem; padding:.4rem .9rem; border-radius:999px; font-size:.9rem; font-weight:600; border:1.5px solid var(--border);}
  .conf-pill-weak{color:#C62828; border-color:#FFCDD2; background:#FFF3F3;}
  .conf-pill-mid{color:#E65100; border-color:#FFE0B2; background:#FFF8F0;}
  .conf-pill-strong{color:#2E7D32; border-color:#C8E6C9; background:#F1FDF2;}

  /* ---------- buttons ---------- */
  .btn-primary{
    background:var(--blue); color:#fff; font-weight:600; font-size:.98rem;
    padding:.85rem 1.6rem; border-radius:999px;
    transition:transform .15s, background .15s;
  }
  .btn-primary:hover{background:var(--blue-dark);}
  .btn-primary:active{transform:scale(.97);}
  .btn-secondary{
    background:transparent; color:var(--blue-dark); font-weight:600; font-size:.94rem;
    padding:.85rem 1.4rem; border-radius:999px; border:1.5px solid var(--border);
    transition:.15s;
  }
  .btn-secondary:hover{border-color:var(--blue);}
  .btn-row{display:flex; justify-content:center; gap:.75rem; margin-top:1.85rem; flex-wrap:wrap;}

  /* ---------- top stepper ---------- */
  .deck-progress{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom:1rem; font-size:.85rem; color:var(--navy-muted); font-weight:500; gap:1rem;
  }
  .stage-steps{display:flex; gap:1.1rem; margin-bottom:.9rem;}
  .stage-step{font-size:.78rem; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:#B7BEE0; position:relative; padding-bottom:.4rem; background:none; border:none; font-family:inherit;}
  .stage-step.current{color:var(--blue);}
  .stage-step.done{color:var(--navy-muted); cursor:pointer;}
  .stage-step.done:hover{color:var(--blue-dark);}
  .stage-step.current::after{content:""; position:absolute; left:0; right:0; bottom:0; height:2px; background:var(--blue); border-radius:2px;}

  /* ---------- guide ---------- */
  .guide-tabs{margin-bottom:1.4rem;}
  .guide-tabs .stage-step{cursor:pointer;}
  .guide-tabs .stage-step:hover{color:var(--blue-dark);}
  .guide-grid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:1rem;
  }
  .guide-card{
    background:var(--surface); border:1.5px solid var(--border); border-radius:18px;
    padding:1.4rem 1.2rem; cursor:default; text-align:center;
    box-shadow:0 16px 36px -28px rgba(22,27,61,.3);
    transition:border-color .2s, box-shadow .2s, transform .2s;
  }
  .guide-card-face{display:flex; flex-direction:column; align-items:center; gap:.6rem;}
  .guide-card-icon{
    font-size:1.9rem; width:3.1rem; height:3.1rem; display:flex; align-items:center; justify-content:center;
    border-radius:50%; background:linear-gradient(135deg,#EFF3FF,#E4EAFC); color:var(--blue-dark);
  }
  .guide-card-title{font-family:var(--font-display); font-size:1.05rem; font-weight:600; color:var(--navy);}
  .guide-card-desc{
    font-size:.86rem; line-height:1.55; color:var(--navy-muted); text-align:left;
    max-height:0; opacity:0; overflow:hidden;
    transition:max-height .35s ease, opacity .25s ease, margin-top .35s ease;
  }
  .guide-card:hover, .guide-card:focus-visible, .guide-card:focus-within{
    border-color:#c5d0f5; box-shadow:0 20px 40px -24px rgba(65,101,231,.35); transform:translateY(-2px);
  }
  .guide-card:hover .guide-card-desc, .guide-card:focus-visible .guide-card-desc, .guide-card:focus-within .guide-card-desc{
    max-height:16rem; opacity:1; margin-top:.9rem;
  }
  .guide-approach-intro{color:var(--navy-muted); font-size:1rem; margin:0 0 1.6rem;}
  .guide-phase-box{
    background:var(--surface); border:1.5px solid var(--border); border-radius:20px;
    padding:1.6rem 1.6rem .4rem; margin-bottom:1.2rem;
    box-shadow:0 16px 36px -28px rgba(22,27,61,.3);
  }
  .guide-phase-box .guide-phase:last-of-type .guide-phase-body{padding-bottom:1.2rem;}
  .guide-phase{display:flex; gap:1.1rem;}
  .guide-phase-marker{display:flex; flex-direction:column; align-items:center; flex:none;}
  .guide-phase-num{
    width:2.1rem; height:2.1rem; border-radius:50%; background:var(--blue); color:#fff;
    font-family:var(--font-display); font-weight:600; font-size:1rem;
    display:flex; align-items:center; justify-content:center; flex:none;
  }
  .guide-phase-line{width:2px; flex:1; background:var(--border); margin:.3rem 0; min-height:1.5rem;}
  .guide-phase-body{padding-bottom:2rem; flex:1; min-width:0;}
  .guide-phase-head{display:flex; align-items:center; gap:.8rem; margin-bottom:.3rem;}
  .guide-phase-icon{
    font-size:1.4rem; width:2.5rem; height:2.5rem; flex:none; display:flex; align-items:center; justify-content:center;
    border-radius:12px; background:linear-gradient(135deg,#EFF3FF,#E4EAFC); color:var(--blue-dark);
  }
  .guide-phase-tab{font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--blue-dark);}
  .guide-phase-title{font-family:var(--font-display); font-size:1.2rem; font-weight:600; color:var(--navy);}
  .guide-phase-tagline{color:var(--navy-muted); font-weight:600; font-size:.9rem; margin:.3rem 0 .8rem;}
  .guide-phase-text{color:var(--navy-muted); font-size:.92rem; line-height:1.65; margin:0 0 .8rem;}
  .guide-phase-text:last-child{margin-bottom:0;}
  .guide-phase-text strong{color:var(--navy); font-weight:600;}
  .guide-phase-note{
    display:block; font-size:.84rem; font-weight:600; color:var(--blue-dark); line-height:1.55;
    background:linear-gradient(135deg,#EFF3FF,#F7F4FF); border:1.5px solid #DCE3FA; border-radius:12px;
    padding:.7rem .9rem; margin:.9rem 0 0;
  }
  .guide-efficiency-note{
    display:block; font-size:.84rem; font-weight:600; color:var(--blue-dark); line-height:1.55;
    background:linear-gradient(135deg,#EFF3FF,#F7F4FF); border:1.5px solid #DCE3FA; border-radius:12px;
    padding:.7rem .9rem; margin:1.4rem 0 0;
  }
  .guide-streak-note{
    display:flex; align-items:flex-start; gap:.9rem; margin-top:.4rem;
    background:linear-gradient(135deg,#FFF6E8,#FFEFE0); border:1.5px solid #F5D9A8; border-radius:16px;
    padding:1.1rem 1.3rem;
  }
  .guide-streak-note-emoji{font-size:1.7rem; flex:none; line-height:1;}
  .guide-streak-note-title{font-family:var(--font-display); font-size:1.05rem; font-weight:600; color:var(--navy); margin-bottom:.25rem;}
  .guide-streak-note-text{color:var(--navy-muted); font-size:.9rem; line-height:1.55;}
  .guide-next-list{display:flex; flex-direction:column; gap:.9rem;}
  .guide-next-item{
    display:flex; align-items:center; gap:1rem; background:var(--surface); border:1.5px solid var(--border);
    border-radius:16px; padding:1.1rem 1.3rem; box-shadow:0 16px 36px -28px rgba(22,27,61,.3);
  }
  .guide-next-icon{
    font-size:1.5rem; width:2.8rem; height:2.8rem; flex:none; display:flex; align-items:center; justify-content:center;
    border-radius:50%; background:linear-gradient(135deg,#EFF3FF,#E4EAFC); color:var(--blue-dark);
  }
  .guide-next-item > div{flex:1; min-width:0;}
  .guide-next-title{font-family:var(--font-display); font-size:1.05rem; font-weight:600; color:var(--navy); margin-bottom:.2rem;}
  .guide-next-desc{color:var(--navy-muted); font-size:.88rem; line-height:1.55;}
  .guide-next-badge{
    flex:none; font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em;
    color:var(--blue-dark); background:#EFF3FF; border:1px solid #DCE3FA; border-radius:999px; padding:.35rem .7rem;
  }
  @media (max-width:720px){
    .guide-grid{grid-template-columns:repeat(2,1fr);}
  }
  @media (max-width:480px){
    .guide-grid{grid-template-columns:1fr;}
    .guide-next-item{flex-wrap:wrap;}
  }

  /* ---------- card ---------- */
  .card{
    background:var(--surface); border-radius:24px; overflow:hidden;
    box-shadow:0 24px 48px -32px rgba(22,27,61,.35);
  }
  .card-title{
    background:var(--blue); color:#fff; font-weight:600; font-size:1.18rem;
    padding:1.3rem 1.6rem; line-height:1.35;
  }
  .card-storyline{
    display:block; font-size:.82rem; font-weight:400; font-style:italic;
    opacity:.68; line-height:1.4; margin-bottom:.35rem;
  }
  .card-body{padding:2rem 1.6rem 1.75rem;}

  /* keyword grid */
  .kw-grid{display:grid; gap:1rem;}
  .kw-box{height:92px; perspective:900px;}
  .kw-box-inner{position:relative; width:100%; height:100%; transition:transform .55s cubic-bezier(.4,.2,.2,1); transform-style:preserve-3d;}
  .kw-box.flipped .kw-box-inner{transform:rotateY(180deg);}
  @media (prefers-reduced-motion:reduce){.kw-box-inner{transition:none;}}
  .kw-face{
    position:absolute; inset:0; backface-visibility:hidden; border-radius:14px;
    background:var(--blue); color:#fff; display:flex; align-items:center; gap:.85rem;
    padding:0 1.1rem;
  }
  .kw-face.back{transform:rotateY(180deg);}
  .kw-icon{width:34px; height:34px; flex:none; opacity:.95; object-fit:contain;}
  .kw-icon.kw-icon-ms{
    font-family:'Material Symbols Outlined'; font-weight:normal; font-style:normal;
    font-size:30px; display:inline-flex; align-items:center; justify-content:center;
    width:34px; height:34px; line-height:1; color:#fff; opacity:.95;
    font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;
  }
  .kw-text{font-weight:600; font-size:.95rem; line-height:1.25;}
  .kw-placeholder{font-family:var(--font-display); font-size:1.3rem; font-weight:600; opacity:.85;}

  /* explanation — every element below explicitly matches the same font-family/
     font-size/color as the paragraphs, so numbered/lettered/roman list markers
     never fall back to a browser default (serif) marker font. */
  .explain, .explain p, .explain ol, .explain ul, .explain li{
    font-family:var(--font-body); font-size:1rem; color:var(--navy);
  }
  .explain p{margin:0 0 1rem;}
  .explain ol{margin:0; padding-left:1.4rem; display:flex; flex-direction:column; gap:.7rem;}
  .explain ol ol{margin-top:.7rem;}
  .explain ul{margin:0; padding-left:1.3rem; display:flex; flex-direction:column; gap:.7rem; list-style:disc;}
  .explain li{padding-left:.15rem;}
  .explain li::marker{font-family:var(--font-body); font-size:1rem; color:var(--navy);}
  .explain .sub{margin:.5rem 0 0; color:var(--navy-muted); font-size:.95rem;}
  .explain .kw-highlight{color:#C62828; font-weight:700;}

  /* ---------- modal ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(22,27,61,.55);
    display:flex; align-items:center; justify-content:center; padding:1.25rem; z-index:50;
  }
  .modal{
    background:var(--surface); border-radius:22px; padding:2.1rem 1.9rem; max-width:400px; width:100%;
    text-align:center; animation:rise .25s ease both;
  }
  .modal h3{font-size:1.25rem; font-weight:600; margin-bottom:.5rem;}
  .modal .sub{color:var(--navy-muted); font-size:.92rem; margin:0 0 1.6rem;}
  .score-row{display:flex; gap:.6rem; justify-content:center; flex-wrap:wrap;}
  .score-chip{
    width:50px; height:50px; border-radius:50%; border:2px solid var(--border);
    background:var(--surface); font-family:var(--font-display); font-size:1.15rem; font-weight:600;
    color:var(--navy); transition:.15s;
  }
  .score-chip:hover{border-color:var(--blue); color:var(--blue-dark);}

  /* ---------- end screen ---------- */
  .end-panel{
    background:var(--surface); border-radius:24px; padding:3rem 2.25rem; text-align:center;
    box-shadow:0 24px 48px -32px rgba(22,27,61,.35);
  }
  .end-score{font-size:3.4rem; font-weight:600; line-height:1; margin:.3rem 0 0;}
  .end-pct{font-size:1.2rem; font-weight:600; color:var(--blue-dark); margin:.3rem 0 .2rem;}
  .end-label{color:var(--navy-muted); margin-bottom:2rem;}
  .end-breakdown{
    text-align:left; border-top:1px solid var(--border); margin-top:.5rem; padding-top:1.4rem;
    display:flex; flex-direction:column; gap:.6rem; font-size:.92rem; max-height:340px; overflow-y:auto;
  }
  .end-breakdown-row{display:flex; justify-content:space-between; gap:1rem; color:var(--navy-muted); border-radius:10px; padding:.4rem .6rem; margin:0 -.6rem;}
  .end-breakdown-row span:first-child{flex:1;}
  .end-breakdown-row b{color:var(--navy); font-weight:600; flex:none;}
  .end-breakdown-row-right{display:flex; align-items:center; gap:.35rem; flex:none;}
  .end-breakdown-row.clickable{
    cursor:pointer; background:#F7F8FC; border:1.5px solid transparent; transition:background .15s, border-color .15s, transform .1s;
  }
  .end-breakdown-row.clickable:hover{background:#EFF2FC; border-color:#c5d0f5; transform:translateX(1px);}
  .end-breakdown-row.clickable:focus-visible{outline:2px solid var(--blue); outline-offset:1px;}
  .end-breakdown-chevron{color:#8891C4; font-size:1.15rem; line-height:1; font-weight:700;}

  .index-row{
    display:flex; justify-content:space-between; align-items:center; gap:1rem; color:var(--navy-muted);
    width:100%; text-align:left; background:none; border:1.5px solid transparent; font:inherit;
    padding:.55rem .6rem; border-radius:10px; cursor:pointer;
  }
  .index-row:hover{background:var(--bg); border-color:var(--border);}
  .index-row span:first-child{flex:1;}
  .index-row b{color:var(--navy); font-weight:600; flex:none;}
  .index-row.current{background:var(--bg); border-color:var(--blue);}

  /* ---------- admin panel ---------- */
  .admin-panel{
    background:var(--surface); border-radius:20px; padding:1.4rem 1.6rem 1.6rem;
    box-shadow:0 16px 36px -28px rgba(22,27,61,.3); margin-bottom:1.6rem;
    border:1.5px solid var(--gold);
  }
  .admin-panel-head{font-size:.95rem; font-weight:700; color:var(--navy); margin-bottom:.9rem; letter-spacing:.02em;}
  .admin-panel-head::before{content:"⚙ "; }
  .admin-user-list{display:flex; flex-direction:column; gap:.6rem;}
  .admin-user-row{display:flex; align-items:center; gap:.75rem; padding:.6rem .8rem; border:1.5px solid var(--border); border-radius:12px; flex-wrap:wrap;}
  .admin-user-email{flex:1; font-size:.9rem; font-weight:600; color:var(--navy); min-width:160px; word-break:break-all;}
  .admin-user-badge{font-size:.72rem; font-weight:700; padding:.22rem .6rem; border-radius:999px; letter-spacing:.03em;}
  .admin-user-badge.paid{background:#E6F6EA; color:#2E7D32;}
  .admin-user-badge.free{background:#F1F2F8; color:var(--navy-muted);}
  .admin-toggle-btn{font-size:.8rem; padding:.5rem .95rem;}

  /* ---------- locked decks ---------- */
  .deck-row.locked{opacity:.72;}
  .lock-badge{display:inline-block; font-size:.68rem; font-weight:700; color:var(--gold); background:#FBF1DD; padding:.15rem .55rem; border-radius:999px; margin-left:.5rem; vertical-align:middle; letter-spacing:.02em;}
  .deck-row .btn-secondary[disabled]{cursor:not-allowed; opacity:.7;}

  /* ---------- home hero (Layer 1) ---------- */
  .home-hero{margin:0 0 1.5rem;}
  .hero-stats{display:flex; flex-wrap:wrap; gap:.5rem .9rem; margin:.7rem 0 0;}
  .hero-stat{
    display:inline-flex; align-items:center; gap:.4rem;
    background:var(--surface); border:1.5px solid var(--border); border-radius:999px;
    padding:.4rem .85rem; font-size:.82rem; font-weight:600; color:var(--navy-muted);
    box-shadow:0 8px 20px -18px rgba(22,27,61,.4);
  }
  .hero-motivation{
    font-family:var(--font-display); font-style:italic; font-size:1rem; color:var(--blue-dark);
    margin:.9rem 0 0; line-height:1.5;
  }
  .layer-section{margin-top:1.6rem;}

  /* ---------- streak card ---------- */
  @keyframes flame-flicker{
    0%,100%{ transform:scale(1) rotate(-2deg); }
    50%{ transform:scale(1.08) rotate(2deg); }
  }
  @keyframes streak-day-pulse{
    0%,100%{ box-shadow:0 0 0 0 rgba(224,153,47,.55); }
    50%{ box-shadow:0 0 0 6px rgba(224,153,47,0); }
  }
  .streak-card{
    border-radius:20px; padding:1.1rem 1.3rem; margin:1.1rem 0 0;
    background:linear-gradient(135deg,#FFF7EA,#FFFFFF);
    border:1.5px solid #F3DFB0;
    box-shadow:0 16px 34px -26px rgba(224,153,47,.55);
  }
  /* Title flush-left (matching panel-title's position in the other two study
     panels above it) with the flame as a right-hand accent — not a leading
     icon column that would push the headline out of alignment. */
  .streak-card-head{display:flex; align-items:flex-start; justify-content:space-between; gap:1rem;}
  .streak-flame-wrap{position:relative; flex:none; width:44px; height:44px; display:flex; align-items:center; justify-content:center;}
  .streak-flame{font-size:2rem; line-height:1; display:inline-block; animation:flame-flicker 1.8s ease-in-out infinite;}
  .streak-count-badge{
    position:absolute; bottom:-4px; right:-6px; background:var(--navy); color:#fff;
    font-size:.68rem; font-weight:700; min-width:1.3rem; height:1.3rem; border-radius:999px;
    display:flex; align-items:center; justify-content:center; padding:0 .25rem;
    border:2px solid #FFF7EA;
  }
  .streak-headline{font-family:var(--font-display); font-size:1.15rem; font-weight:700; color:var(--navy);}
  .streak-caption{font-size:.83rem; color:var(--navy-muted); line-height:1.4; margin-top:.25rem; max-width:34ch;}
  .streak-progress-track{
    height:.5rem; border-radius:999px; background:#F1E4C8; overflow:hidden; margin:.85rem 0 .3rem;
  }
  .streak-progress-fill{
    height:100%; border-radius:999px; background:linear-gradient(90deg,#FFD98A,#E0992F);
    transition:width .35s ease;
  }
  .streak-days-strip{display:flex; gap:.45rem; margin:.75rem 0 0;}
  .streak-day{display:flex; flex-direction:column; align-items:center; gap:.3rem; flex:1;}
  .streak-day-dot{
    width:1.9rem; height:1.9rem; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:#F1F2F8; border:1.5px solid var(--border); font-size:1rem;
  }
  .streak-day.filled .streak-day-dot{background:linear-gradient(135deg,#FFD98A,#E0992F); border-color:#E0992F;}
  .streak-day.today-pending .streak-day-dot{border-color:var(--gold); animation:streak-day-pulse 1.6s ease-in-out infinite;}
  .streak-day.future-day{opacity:.45;}
  .streak-day-label{font-size:.66rem; font-weight:700; color:var(--navy-muted); letter-spacing:.02em;}

  /* Streak tiers — the flame (and its glow) grows with the streak length. */
  .streak-tier-warm .streak-flame{font-size:2.6rem; filter:drop-shadow(0 0 6px rgba(224,153,47,.5));}
  .streak-tier-hot{background:linear-gradient(135deg,#FFF0DD,#FFF8EE); border-color:#EFC776;}
  .streak-tier-hot .streak-flame{font-size:2.8rem; filter:drop-shadow(0 0 10px rgba(224,153,47,.65));}
  .streak-tier-blazing{background:linear-gradient(135deg,#FFE7C2,#FFF6E6); border-color:#E0992F;}
  .streak-tier-blazing .streak-flame{font-size:3.1rem; filter:drop-shadow(0 0 14px rgba(224,153,47,.8));}
  .streak-tier-epic{background:linear-gradient(135deg,#FFDFA0,#FFF3DC); border-color:#C6771A; box-shadow:0 20px 40px -24px rgba(198,119,26,.7);}
  .streak-tier-epic .streak-flame{font-size:3.4rem; filter:drop-shadow(0 0 18px rgba(198,119,26,.9));}
  .streak-tier-epic .streak-headline{color:#C6771A;}

  /* "Streak secured" celebration modal — shown once the full daily target is met */
  @keyframes confetti-bounce{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-6px); }
  }
  .streak-celebrate-modal{
    background:linear-gradient(160deg,#FFF7EA,#FFFFFF); border:1.5px solid #F3DFB0;
    box-shadow:0 30px 60px -24px rgba(198,119,26,.55);
  }
  .streak-celebrate-modal h3{
    font-family:var(--font-display); font-size:1.4rem; font-weight:700; color:#C6771A;
  }
  .streak-celebrate-confetti{
    font-size:1.6rem; letter-spacing:.3rem; margin-bottom:.6rem;
    animation:confetti-bounce 1.1s ease-in-out infinite;
  }

  /* ---------- account settings / signup selects ---------- */
  .auth-select-label{display:block; font-size:.78rem; font-weight:700; color:var(--navy-muted); letter-spacing:.03em; margin:0 0 .35rem;}
  .auth-select-note{font-size:.78rem; color:var(--navy-muted); line-height:1.5; margin:.4rem 0 0;}
  select.auth-input{appearance:auto;}
  textarea.auth-input{resize:vertical; min-height:3rem;}

  /* ---------- settings toggle (dark mode) ---------- */
  .settings-toggle-row{display:flex; align-items:center; justify-content:space-between; gap:1rem;}
  .dark-toggle{
    position:relative; width:46px; height:26px; border-radius:999px; flex:none;
    background:var(--border); border:none; cursor:pointer; padding:0; transition:background .15s;
  }
  .dark-toggle.on{background:var(--blue-dark);}
  .dark-toggle-knob{
    position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%;
    background:#fff; transition:left .15s; box-shadow:0 1px 3px rgba(0,0,0,.25);
  }
  .dark-toggle.on .dark-toggle-knob{left:23px;}

  /* ---------- admin: exam attempt config ---------- */
  .exam-cfg-list{display:flex; flex-direction:column; gap:1rem; margin-bottom:1.2rem;}
  .exam-cfg-row{display:flex; flex-direction:column; gap:.4rem;}
  .exam-cfg-row-label{font-size:.85rem; font-weight:700; color:var(--navy);}

  /* ---------- spaced repetition ---------- */
  .sr-panel{
    background:linear-gradient(135deg,#EFF3FF,#F7F4FF); border:1.5px solid #DCE3FA; border-radius:18px;
    padding:1.2rem 1.35rem; margin:0 0 1.3rem;
  }
  .sr-panel-head{display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap;}
  .sr-panel-head .btn-primary{flex:none; width:var(--cta-btn-w); text-align:center; padding-left:0; padding-right:0;}
  .sr-panel-star{color:var(--gold); font-weight:600;}
  .sr-edit-table{width:100%; border-collapse:separate; border-spacing:4px; font-size:.82rem;}
  .sr-edit-table th{font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.03em; color:var(--navy-muted); padding:.3rem .2rem; text-align:center; line-height:1.3;}
  .sr-edit-row-label{font-weight:700; color:var(--navy); white-space:nowrap; padding-right:.5rem;}
  .sr-edit-input{
    width:100%; min-width:52px; padding:.4rem .3rem; border-radius:8px; border:1.5px solid var(--border);
    text-align:center; font-family:var(--font-body); font-size:.88rem; color:var(--navy);
  }
  .sr-edit-input:focus{border-color:var(--blue); outline:none;}
  .sr-edit-error{color:#C62828; font-size:.85rem; margin:.9rem 0 0;}

  /* ---------- description editing (admin only) ---------- */
  .admin-edit-btn{margin-top:1.2rem; font-size:.85rem;}
  .edit-toolbar{
    display:flex; align-items:center; gap:.4rem; flex-wrap:wrap;
    background:var(--bg); border:1.5px solid var(--border); border-radius:14px;
    padding:.55rem .65rem; margin-bottom:.7rem;
  }
  .edit-tool-btn{
    font-family:var(--font-body); font-size:.88rem; font-weight:700; color:var(--navy);
    background:var(--surface); border:1.5px solid var(--border); border-radius:9px;
    padding:.4rem .7rem; cursor:pointer; transition:.15s; line-height:1;
  }
  .edit-tool-btn:hover{border-color:var(--blue); color:var(--blue-dark);}
  .edit-tool-sep{width:1.5px; align-self:stretch; background:var(--border); margin:0 .15rem;}
  .edit-color-label{font-size:.8rem; font-weight:600; color:var(--navy-muted); margin-right:.1rem;}
  .edit-color-swatch{
    width:26px; height:26px; border-radius:50%; border:1.5px solid var(--border);
    cursor:pointer; padding:0; transition:.15s;
  }
  .edit-color-swatch:hover{transform:scale(1.12); border-color:var(--navy);}
  .edit-color-picker-input{
    width:28px; height:28px; border-radius:50%; border:1.5px solid var(--border);
    padding:0; cursor:pointer; background:none;
  }
  .edit-canvas.explain{
    border:1.5px solid var(--border); border-radius:14px; padding:1rem 1.1rem;
    min-height:220px; background:var(--surface); outline:none;
  }
  .edit-canvas.explain:focus{border-color:var(--blue);}
  .edit-hint{font-size:.78rem; color:var(--navy-muted); margin:.5rem 0 0;}

  /* ---------- manage cards (admin only) ---------- */
  .manage-toolbar{display:flex; justify-content:flex-end; margin-bottom:.6rem;}
  .manage-btn{font-size:.8rem; padding:.5rem .9rem;}
  .mc-deck-title-row{display:flex; align-items:center; gap:.6rem; margin:.4rem 0;}
  .mc-deck-title-input{font-family:var(--font-display); font-size:1.3rem; font-weight:600; max-width:420px;}

  /* ---------- Index · reorder cards (admin only) ---------- */
  .mgi-group-row{
    background:var(--surface); border-radius:16px; padding:1rem 1.2rem;
    box-shadow:0 12px 28px -24px rgba(22,27,61,.3); margin-bottom:.85rem;
  }
  .mgi-group-head{display:flex; align-items:center; gap:.6rem; margin-bottom:.5rem;}
  .mgi-group-label{font-family:var(--font-display); font-weight:700; font-size:1.05rem; color:var(--blue-dark);}
  .mgi-group-badge{font-size:.72rem; font-weight:600; color:var(--navy-muted); background:var(--bg); border-radius:999px; padding:.2rem .6rem;}
  .mgi-group-cards{display:flex; flex-direction:column; gap:.25rem; margin-bottom:.8rem;}
  .mgi-group-card{display:flex; align-items:baseline; gap:.5rem; font-size:.9rem;}
  .mgi-group-card-num{font-weight:700; color:var(--blue-dark); min-width:2.2rem;}
  .mgi-group-card-title{color:var(--navy);}
  .mgi-slider-row{display:flex; align-items:center; gap:.8rem; padding-top:.7rem; border-top:1px solid var(--border);}
  .mgi-slider{flex:1; accent-color:var(--blue-dark); cursor:pointer;}
  .mgi-slider-val{font-size:.8rem; font-weight:600; color:var(--navy-muted); white-space:nowrap; min-width:7.5rem; text-align:right;}
  .mc-card-row{
    background:var(--surface); border-radius:16px; padding:1rem 1.2rem;
    box-shadow:0 12px 28px -24px rgba(22,27,61,.3); margin-bottom:.85rem;
  }
  .mc-card-row-head{display:flex; align-items:center; gap:.6rem; flex-wrap:wrap;}
  .mc-card-title-row{margin-top:.6rem;}
  .mc-card-title-input{
    width:100%; font-size:1.15rem; font-weight:600; padding:.95rem 1.1rem;
    font-family:var(--font-display);
  }
  .mc-card-storyline-input{
    width:100%; font-size:.85rem; font-weight:400; font-style:italic;
    padding:.6rem 1.1rem; margin-bottom:.5rem; color:var(--navy-muted);
  }
  .mc-save-bar{
    display:flex; align-items:center; gap:.9rem; flex-wrap:wrap;
    background:var(--surface); border-radius:14px; padding:.85rem 1.1rem; margin:0 0 1.1rem;

        "title": "What are the overall Objectives of the Auditor?",
        "keywords": [
          {

        "storyline": "Hey Auditor, What is your ultimate objective?",
        "adminImportance": "mid",
        "explanationHtml": "<p><span style=\"font-size: 1rem;\">In conducting an audit of financial statements, the overall objectives of the auditor are:</span></p><p>\n\n<!-- notionvc: de02cae5-10f9-40f3-a8b0-1f9ae100f1b4 --></p><ol type=\"a\">\n<li>To obtain&nbsp;<strong><font color=\"#c62828\">reasonable assurance</font></strong>&nbsp;about whether the financial statements as a whole are free from material misstatement, whether due to fraud or error <b><i>(MMS-FE free?)</i></b>, thereby enabling the auditor&nbsp;<strong>to express an <font color=\"#c62828\">opinion</font></strong><b>&nbsp;</b>on whether the financial statements are prepared, in all material respects, as per the applicable financial reporting framework <i>(<strong>FS -AFRF?</strong>)</i>; and</li>\n<li>To&nbsp;<strong><font color=\"#c62828\">report</font></strong>&nbsp;on the financial statements, and&nbsp;<strong>communicate</strong>&nbsp;as required by the SAs.</li></ol>"
      },
      {
        "id": "ef69cc06-6be3-4fda-8788-54595814b32b",
        "links": [],
        "title": "Define Applicable Financial Reporting Framework (AFRF).",
        "keywords": [
          {
            "icon": "handshake",
            "label": "Adopted"
          },
          {
            "icon": "thumb",
            "label": "Acceptable"
          }
        ],
        "isSubPart": false,
        "adminImportance": "low",
        "explanationHtml": "<p><ul><li>The FRF <font color=\"#c62828\"><strong>adopted</strong> </font>by management and TCWG in the preparation and presentation of the financial statements that is <font color=\"#c62828\"><strong>acceptable</strong> </font>in view of the nature of the entity and the objective of the financial statements, or that is required by law or regulation.</li></ul></p>"
      },
      {
        "id": "fb6db96b-fb5c-4ed3-9363-6bc170014362",
        "title": "What is fair presentation framework?",
        "keywords": [
          {
            "icon": "ms:account_balance",
            "label": "Beyond specifically required"
          },
          {
            "icon": "broken-chain",
            "label": "Necessary to depart"
          }
        ],
        "isSubPart": true,
        "adminImportance": "low",
        "explanationHtml": "<p><ul><li>Fair presentation framework refers to an FRF that requires compliance with the framework and:</li></ul><ol type=\"i\"><ol type=\"i\"><li><span style=\"font-size: 1rem;\">Acknowledges, explicitly or implicitly, that to achieve fair presentation it may be necessary to provide disclosures</span><font color=\"#c62828\" style=\"font-size: 1rem;\"> <strong>beyond specifically required</strong> </font><span style=\"font-size: 1rem;\">by the framework; or</span></li><li>Acknowledges explicitly that it may be <font color=\"#c62828\" style=\"font-size: 1rem;\"><strong>necessary to depart</strong> </font><span style=\"font-size: 1rem;\">from a requirement of the framework to achieve fair presentation of the financial statements. Such departures are expected to be necessary only in </span><strong style=\"font-size: 1rem;\">extremely rare circumstances</strong><span style=\"font-size: 1rem;\">.</span></li></ol></ol></p>\n<p><ul><li>A <strong>\"compliance framework\"</strong> is an FRF that requires compliance with the requirements of the framework, but <strong>does not contain the acknowledgements</strong>&nbsp;in (i) or (ii) above.</li></ul></p>"
      },
      {
        "id": "96442ac4-7ede-4c93-8082-1f4f1b91b0ad",
        "title": "What is misstatement?",
        "keywords": [
          {
            "icon": "scale",
            "label": "A/c/p/d: Reported vs Required"
          }
        ],
        "isSubPart": true,
        "storyline": "He hates this, it is his job to clean this the most if he has to achieve ultimate objective",
        "adminImportance": "low",
        "explanationHtml": "<p><ul><li>A difference between the amount, classification, presentation, or disclosure (a/c/p/d) of a reported financial statement item, and the amount, classification, presentation, or disclosure that is required for that item as per the applicable FRF. <font color=\"#c62828\">(<strong>a/c/p/d: Reported vs Required</strong>)</font></li><li>Misstatements can arise from error or fraud.</li></ul></p>"
      },
      {
        "id": "903b95ec-1577-4d4c-bb5f-bef7a5543af2",
        "title": "Who is Those Charged with Governance (TCWG)?",
        "keywords": [
          {
            "icon": "compass",
            "label": "Strategic direction"
          },
          {
            "icon": "anchor",
            "label": "Accountability"
          }
        ],
        "isSubPart": true,
        "adminImportance": "low",
        "explanationHtml": "<p><ul><li>Person(s) or organisation(s) with responsibility for overseeing the <font color=\"#c62828\"><strong>strategic direction</strong> </font>of the entity and obligations related to the <strong><font color=\"#c62828\">accountability</font></strong> of the entity.&nbsp;</li><li>This includes overseeing the <strong>financial reporting process</strong>.</li></ul></p>"
      },
      {
        "id": "7721e7d9-40e7-4536-9404-92b4ffd8839f",
        "title": "What are two type of financial statements?",
        "keywords": [
          {
            "icon": "megaphone",
            "label": "General"
          },
          {
            "icon": "key",
            "label": "Special"
          }
        ],
        "isSubPart": true,
        "adminImportance": "low",
        "explanationHtml": "<p><ul><li>Financial statements may be prepared as per an FRF designed to meet:</li><ul><li>The <strong style=\"font-size: 1rem;\">common</strong><span style=\"font-size: 1rem;\"> financial information needs of a wide range of users (i.e., \" </span><strong style=\"font-size: 1rem;\"><font color=\"#c62828\">general</font></strong><span style=\"font-size: 1rem;\"><font color=\"#c62828\"> </font>purpose financial statements\"); or</span></li><li>The financial information needs of <b>specific</b>&nbsp;<span style=\"font-size: 1rem;\">users (i.e., \" </span><strong style=\"font-size: 1rem;\"><font color=\"#c62828\">special</font></strong><span style=\"font-size: 1rem;\"><font color=\"#c62828\"> </font>purpose financial statements\").</span></li></ul></ul></p>"
      },
      {
        "id": "0d3fd15f-afad-480a-85c9-92ab25ed51b4",
        "title": "What is Audit Risk and define its components.",
        "keywords": [
          {
            "icon": "ms:gpp_bad",
            "label": "Inappropriate audit opinion"
          },
          {
            "icon": "warning-triangle",
            "label": "Risk of material misstatement"
          },
          {
            "icon": "magnify",
            "label": "Detection risk"
          }
        ],
        "isSubPart": false,
        "storyline": "Risk hai to ishq hai, his job also has some risk",
        "adminImportance": "mid",
        "explanationHtml": "<p></p><ul><li>Audit risk is the risk that the auditor <strong>expresses an inappropriate audit opinion</strong> when the financial statements are materially misstated. Audit risk is a function of the <strong>risk of material misstatement</strong> (RoMM) and <strong>detection risk</strong>.</li><li><strong style=\"font-size: 1rem;\"><font color=\"#c62828\">Detection Risk</font>:</strong><span style=\"font-size: 1rem;\"> The risk that the </span><span style=\"font-size: 1rem;\">procedures</span><span style=\"font-size: 1rem;\"> performed by the auditor to reduce audit risk to an acceptably low level </span><strong style=\"font-size: 1rem;\">will not detect</strong><span style=\"font-size: 1rem;\"> a misstatement that exists and could be material, either individually or when aggregated with other misstatements.<br><b><i>(AR = ROMM X DR)</i></b></span></li></ul>"
      },
      {
        "id": "6ccf065c-f8aa-4c26-8bb8-ead543f82372",
        "title": "What is Risk of Material Misstatement (RoMM) and define its components & levels.",
        "keywords": [
          {
            "icon": "ms:upload_file",
            "label": "Prior to the audit"
          },
          {
            "icon": "ms:military_tech",
            "label": "Inherent Risk"
          },
          {
            "icon": "ms:lock_clock",
            "label": "Control Risk"
          },
          {
            "icon": "ms:domain",
            "label": "Level - FS vs FSLI"
          }
        ],
        "isSubPart": true,
        "storyline": "The key risk he is worried about",
        "adminImportance": "important",
        "explanationHtml": "<p style=\"font-family: Inter, sans-serif; font-size: 16px; color: rgb(22, 27, 61);\"></p><ul><li><strong>Risk of Material Misstatement (ROMM):</strong> The risk that the financial statements contain material misstatement<font color=\"#c62828\"> <strong>prior to the audit</strong></font>. This consists of two components:&nbsp;</li></ul><p></p><p style=\"font-family: Inter, sans-serif; font-size: 16px;\"></p><ol type=\"a\" style=\"\"><ol type=\"a\" style=\"\"><li style=\"\"><strong style=\"\"><font color=\"#c62828\">Inherent Risk </font>-&nbsp;</strong>The susceptibility of an assertion about a class of transactions, account balance, or disclosure (<strong style=\"color: rgb(22, 27, 61); font-size: 1rem;\">abcd</strong><span style=\"color: rgb(22, 27, 61); font-size: 1rem;\">) to a misstatement that could be material, either individually or when aggregated with other misstatements,</span><span style=\"color: rgb(22, 27, 61); font-size: 1rem;\"> </span><strong style=\"color: rgb(22, 27, 61); font-size: 1rem;\">before consideration of any related controls</strong><span style=\"color: rgb(22, 27, 61); font-size: 1rem;\">.</span></li><li style=\"\"><strong style=\"\"><font color=\"#c62828\">Control Risk </font>-&nbsp;</strong>The risk that a misstatement that could occur in an assertion about a class of transactions, account balance, or disclosure (<b>abcd</b>), and that could be material, either individually or when aggregated with other misstatements, will not be prevented, or detected and corrected,<span style=\"color: rgb(22, 27, 61); font-size: 1rem;\"> </span><strong style=\"color: rgb(22, 27, 61); font-size: 1rem;\">on a timely basis by the entity's internal control</strong><span style=\"color: rgb(22, 27, 61); font-size: 1rem;\">.<br><b><i>(ROMM = IR X CR)</i></b></span></li></ol></ol><p></p><p style=\"font-family: Inter, sans-serif; font-size: 16px; color: rgb(22, 27, 61);\"></p><ul><li><strong>ROMM may exist at two levels:</strong></li></ul><ol type=\"a\"><ol type=\"a\"><li><strong style=\"font-size: 1rem;\">Overall <font color=\"#c62828\">financial statement level</font></strong><span style=\"font-size: 1rem;\"><font color=\"#c62828\"> </font>— i.e., relates to the financial statements as a whole, potentially affecting <b>many assertions</b>.</span></li><li><strong>Assertion level</strong>&nbsp;<i><font color=\"#c62828\"><b>(FSLI)</b></font></i> — for classes of transactions, account balances, and disclosures (abcd).</li></ol></ol><p></p>"
      },
      {
        "id": "4319e7b1-31cb-47c8-9fc2-2ffb5c216e6b",
        "links": [
          {
            "cardId": "187d58ca-b95c-4751-8ed0-a6627b2920b0",
            "deckId": "sa200"
          }
        ],
        "title": "What is Sufficient and Appropriate Audit Evidence (SAAE)?",
        "keywords": [
          {
            "icon": "ruler",
            "label": "Quantity - ROMM & Quality"
          },
          {
            "icon": "magnify",
            "label": "Quality - Relevance, Reliability"
          }
        ],
        "storyline": "He has to obtain sufficient & appropriate audit evidence to achieve his ultiamate objective",
        "adminImportance": "mid",
        "explanationHtml": "<p></p><ul><li>To obtain reasonable assurance, the auditor shall obtain sufficient appropriate audit evidence <b>(SAAE)</b> to reduce <b>audit risk to an acceptably low level</b> and thereby draw reasonable conclusions on which to base the auditor's opinion.</li><li><strong style=\"font-size: 1rem;\">Reasonable assurance:</strong><span style=\"font-size: 1rem;\"> A high, but not absolute level of assurance.</span></li><li><strong style=\"font-size: 1rem;\">Audit evidence:</strong><span style=\"font-size: 1rem;\"> Information used by the auditor in arriving at the conclusions on which the auditor's opinion is based. AE should be sufficient and appropriate:</span></li></ul><ol type=\"a\"><ol type=\"a\"><li><strong style=\"font-size: 1rem;\">Sufficiency</strong><span style=\"font-size: 1rem;\"> is the measure of the quantity of audit evidence. The quantity is affected by:</span></li><ol type=\"i\"><li>The auditor's assessment of the risks of material misstatement (ROMM); and</li><li>The quality of such audit evidence. <strong style=\"font-size: 1rem;\"><font color=\"#c62828\">Quantity - ROMM &amp; Quality</font></strong></li></ol><li><strong>Appropriateness</strong> is the measure of the quality of audit evidence — i.e., its relevance and its reliability — in providing support for the conclusions on which the auditor's opinion is based. <strong><font color=\"#c62828\">Quality - Relevance, Reliability</font></strong></li></ol></ol><p></p>\n"
      },
      {
        "id": "7ba9fceb-780a-4fc3-8410-02c43834edbe",
        "title": "What are Responsibilities of Management and TCWG? (Premise)",
        "keywords": [
          {
            "icon": "compass",
            "label": "PPFS-AFRF"
          },
          {
            "icon": "gear",
            "label": "DIM-IC"
          },
          {
            "icon": "folder",
            "label": "All information"
          },
          {
            "icon": "envelope",
            "label": "Additional information"
          },
          {
            "icon": "door",
            "label": "Unrestricted access"
          }
        ],
        "isSubPart": false,
        "storyline": "All the financial statements from start till end is not his responsibility",
        "adminImportance": "mid",
        "explanationHtml": "<p></p><div>An audit in accordance with SAs is conducted on the premise that management and TCWG have responsibility:</div><div><br></div><ol type=\"a\"><li>For the preparation and presentation of the financial statements (<strong><font color=\"#c62828\">PPFS-AFRF</font></strong>) as per the applicable FRF — this includes the design, implementation, and maintenance (DIM) of internal control (IC) (<strong><font color=\"#c62828\">DIM-IC</font></strong>) relevant to the preparation and presentation of financial statements that are free from material misstatement, whether due to fraud or error; and</li><li>To provide the auditor with:</li><ol type=\"i\"><li><strong style=\"font-size: 1rem;\"><font color=\"#c62828\">All information</font></strong><span style=\"font-size: 1rem;\">, such as records and documentation, and other matters relevant to the preparation and presentation of the financial statements;</span></li><li>Any <strong style=\"font-size: 1rem;\"><font color=\"#c62828\">additional information</font></strong><span style=\"font-size: 1rem;\"><font color=\"#c62828\"> </font>that the auditor may request from management and, where appropriate, TCWG; and</span></li><li><strong style=\"font-size: 1rem;\"><font color=\"#c62828\">Unrestricted access</font></strong><span style=\"font-size: 1rem;\"> to those within the entity from whom the auditor determines it necessary to obtain audit evidence.</span></li></ol><li><span style=\"font-size: 1rem;\">As part of their responsibility for the preparation and presentation of the financial statements, management and TCWG are responsible for:</span></li><ol type=\"i\"><li><strong>Identification of the applicable FRF</strong>, in the context of relevant laws or regulations.</li><li><strong style=\"font-size: 1rem;\">Preparation and presentation</strong><span style=\"font-size: 1rem;\"> of the financial statements as per that framework.</span></li><li><strong style=\"font-size: 1rem;\">Adequate description</strong><span style=\"font-size: 1rem;\"> of that framework in the financial statements.</span></li></ol></ol><p></p>"
      },

        "storyline": "FS audited means all numbers perfect for sure? Come out of delulu.",
        "adminImportance": "important",
        "explanationHtml": "<p></p><ul><li>The auditor is not expected to, and cannot, reduce audit risk to zero, and therefore <strong>cannot obtain absolute assurance</strong> that the financial statements are free from material misstatement due to fraud or error.&nbsp;</li><li>This is because there are inherent limitations of an audit, which result in most of the audit evidence being <strong>persuasive rather than conclusive</strong>. Following are the inherent imiations of an audit.</li></ul><p></p>\n<p></p><ol><li><strong><strong><font color=\"#c62828\">Nature of financial reporting</font></strong>:</strong> The preparation of financial statements involves judgment by management in applying the requirements of the applicable FRF to the facts and circumstances of the entity — for example, accounting estimates.</li><li><strong style=\"font-size: 1rem;\"><strong><font color=\"#c62828\">Nature of audit procedures</font></strong>:</strong></li><ul><li><span style=\"font-size: 1rem;\">There is the possibility that management and others may <b>not provide complete information</b> relevant to the preparation and presentation of the financial statements (PPFS).</span></li><li><b>Fraud </b>may involve sophisticated and carefully organised schemes designed to conceal it.</li><li>An audit is <strong style=\"font-size: 1rem;\">not an official investigation</strong><span style=\"font-size: 1rem;\"> into alleged wrongdoing. The auditor does not have special legal powers, such as the power of search.</span></li></ul><li><strong style=\"font-size: 1rem;\"><strong><font color=\"#c62828\">Timeliness</font></strong> of financial reporting and the balance between benefit and cost</strong><span style=\"font-size: 1rem;\">: The relevance of information, and thereby its value, tends to diminish over time, and there is a balance to be struck between the <b>reliability </b>of information and its <b>cost</b>.</span></li><li><strong style=\"font-size: 1rem;\"><font color=\"#c62828\">Future events</font>:&nbsp;</strong><span style=\"font-size: 1rem;\">The business may cease to exist in future due to change in market conditions, emergence of new business models or due to some adverse events</span></li><li>In the case of certain assertions or subject matters, the <strong style=\"font-size: 1rem;\">potential effects of inherent limitations</strong><span style=\"font-size: 1rem;\"> on the auditor's ability to detect material misstatements are particularly significant. Such assertions or subject matters include:</span></li><ol type=\"a\"><li>Fraud, particularly fraud involving senior management or collusion.</li><li>The existence and completeness of related party relationships and transactions.</li><li>The occurrence of non-compliance with laws and regulations.</li><li>Future events or conditions that may cause an entity to cease to continue as a going concern.&nbsp;<br><strong style=\"font-size: 1rem;\"><font color=\"#c62828\"><i>Significant - Fraud, RPT, L/R, GC</i></font></strong></li></ol></ol><p></p>\n<p><strong>Please understand that:</strong></p>\n<p></p><ul><li>Because of the inherent limitations of an audit, there is an <strong>unavoidable risk</strong> that some material misstatements of the financial statements may not be detected, even though the audit is properly planned and performed as per the SAs.</li><li>The subsequent discovery of material misstatements resulting from fraud or error <strong>does not by itself indicate a failure to conduct the audit</strong> as per the SAs.</li><li>However, the inherent limitations of an audit are <strong>not a justification</strong> for the auditor to be satisfied with <strong>less-than-persuasive audit evidence</strong>.</li></ul><p></p>\n\n"
      },
      {
        "id": "14cf47e8-ad7a-4581-9327-b7c7f18e7a64",
        "title": "What is Professional Skepticism?",
        "keywords": [
          {
            "icon": "eye",
            "label": "Questioning mind"
          },
          {
            "icon": "binoculars",
            "label": "Being alert"
          },
          {
            "icon": "detective-hat",
            "label": "Critical assessment"
          },
          {
            "icon": "broken-chain",
            "label": "Contradicts AE"
          },
          {
            "icon": "clipboard-check",
            "label": "Reliability of documents"
          },
          {
            "icon": "mask",
            "label": "Fraud"
          },
          {
            "icon": "puzzle",
            "label": "Audit procedures add"
          }
        ],
        "isSubPart": false,
        "storyline": "His attention is not ordinary, he has to stay alert all the times",
        "adminImportance": "mid",
        "explanationHtml": "<p></p><ul><li>The auditor shall plan and perform an audit with professional skepticism.</li><li>Professional skeptisicism is an attitude that includes:</li><ol type=\"a\"><li><span style=\"font-size: 1rem;\">A </span><strong style=\"font-size: 1rem;\"><font color=\"#c62828\">questioning mind</font></strong><span style=\"font-size: 1rem;\">;</span></li><li><strong style=\"font-size: 1rem;\"><font color=\"#c62828\">Being alert</font></strong><span style=\"font-size: 1rem;\"> to conditions which may indicate possible misstatement due to error or fraud; and</span></li><li><span style=\"font-size: 1rem;\">A </span><strong style=\"font-size: 1rem;\"><font color=\"#c62828\">critical assessment</font></strong><span style=\"font-size: 1rem;\"><font color=\"#c62828\"> </font>of audit evidence.</span></li></ol><li>Professional skepticism includes being alert to, for example:</li><ol type=\"a\"><li><span style=\"font-size: 1rem;\">Audit evidence that </span><strong style=\"font-size: 1rem;\"><font color=\"#c62828\">contradicts</font></strong><span style=\"font-size: 1rem;\"> other audit evidence obtained.</span></li><li><span style=\"font-size: 1rem;\">Information that brings into question the </span><strong style=\"font-size: 1rem;\"><font color=\"#c62828\">reliability of documents</font></strong><span style=\"font-size: 1rem;\"> to be used as audit evidence.</span></li><li><span style=\"font-size: 1rem;\">Conditions that may indicate possible </span><strong style=\"font-size: 1rem;\"><font color=\"#c62828\">fraud</font></strong></li><li><span style=\"font-size: 1rem;\">Circumstances that suggest a need for </span><strong style=\"font-size: 1rem;\"><font color=\"#c62828\">audit procedures in addition</font></strong><span style=\"font-size: 1rem;\"> to those required by the SAs.</span></li></ol><li>Maintaining professional skepticism throughout the audit is necessary to reduce the risks of:</li><ol type=\"a\"><li><strong style=\"font-size: 1rem;\">Overlooking unusual</strong><span style=\"font-size: 1rem;\"> circumstances.</span></li><li><strong style=\"font-size: 1rem;\">Over-generalising</strong><span style=\"font-size: 1rem;\"> when drawing conclusions from audit observations.</span></li><li><strong style=\"font-size: 1rem;\">Using inappropriate assumptions</strong><span style=\"font-size: 1rem;\"> in determining the nature, timing, and extent (<b>NTE</b>) of audit procedures, and evaluating the results thereof.</span></li></ol></ul><p></p>"
      },
      {
        "id": "25d7e03d-4e0a-4cf5-ac01-296e9947fc98",

        "keywords": [

            "icon": "target",

          {

            "label": "Audit Risk"

          {
            "icon": "ms:task_alt",
            "label": "NTE-AP"
          },
          {
            "icon": "clipboard-check",
            "label": "SAAE"
          },
          {
            "icon": "crystal-ball",
            "label": "management's judgments"
          },
          {
            "icon": "stamp",
            "label": "Drawing of conclusions"
          }
        ],
        "isSubPart": true,
        "storyline": "He cannot guess randomly, he has to judge professionally",
        "adminImportance": "mid",
        "explanationHtml": "<p></p><ul><li><b>Professional Judgement =</b> The application of relevant training, knowledge, and experience (<strong><font color=\"#c62828\">TKE</font></strong>), within the context provided by auditing, accounting, and ethical standards, in making informed decisions about the courses of action that are appropriate in the circumstances of the audit engagement.</li><li>Professional judgment is necessary in particular regarding decisions about:</li><ul><li><strong style=\"font-size: 1rem;\"><font color=\"#c62828\">Materiality</font></strong><span style=\"font-size: 1rem;\"><font color=\"#c62828\"> </font>and </span><strong style=\"font-size: 1rem;\"><font color=\"#c62828\">audit risk</font></strong><span style=\"font-size: 1rem;\">.</span></li><li>The nature, timing, and extent (NTE) of audit procedures used to meet the requirements of the SAs and to gather audit evidence. (<strong style=\"font-size: 1rem;\"><font color=\"#c62828\">NTE-AP</font></strong><span style=\"font-size: 1rem;\">)</span></li><li>Evaluating whether sufficient appropriate audit evidence has been obtained, and whether more needs to be done to achieve the objectives of the SAs and thereby the overall objectives of the auditor. (<strong style=\"font-size: 1rem;\"><font color=\"#c62828\">SAAE</font></strong><span style=\"font-size: 1rem;\">)</span></li><li>The evaluation of <strong style=\"font-size: 1rem;\"><font color=\"#c62828\">management's judgments</font></strong><span style=\"font-size: 1rem;\"><font color=\"#c62828\"> </font>in applying the entity's applicable FRF (AFRF).</span></li><li><strong style=\"font-size: 1rem;\"><font color=\"#c62828\">Drawing of conclusions</font></strong><span style=\"font-size: 1rem;\"><font color=\"#c62828\"> </font>based on the audit evidence obtained — for example, assessing the reasonableness of the estimates made by management in preparing the financial statements.</span></li></ul><li>Auditor has to exercise professional judgement throughout the audit and document it appropriately.</li></ul><p></p>"
      },

        "storyline": "This is his marg darshan material",
        "adminImportance": "low",
        "explanationHtml": "<ul class=\"[li_&amp;]:mb-0 [li_&amp;]:mt-1 [li_&amp;]:gap-1 [&amp;:not(:last-child)_ul]:pb-1 [&amp;:not(:last-child)_ol]:pb-1 list-disc flex flex-col gap-1 pl-8 mb-3\"><li><span style=\"font-size: 1rem;\">Auditor shall <b><font color=\"#c62828\">comply with all </font></b>the Standards on Auditing (SAs) relevant to audit.</span></li><li><span style=\"font-size: 1rem;\">SA is relevant to audit when it is in effect and <b><font color=\"#c62828\">circumstances addressed </font></b>by the SA exist.</span></li><li><span style=\"font-size: 1rem;\">Auditor shall have an understanding of entire text of an SA including application.</span></li><li><span style=\"font-size: 1rem;\">Auditor shall not represent compliance with SAs in auditor's report<b> unless auditor has complied </b>with requirements of this SA and all other SAs relevant to the audit.</span></li><li>Auditor shall comply with <b>each requirement </b>of SA unless, in circumstances of audit:</li><ul><li><span style=\"font-size: 1rem;\">An SA is <b>not relevant </b>or</span></li><li>There's <b>conditional requirement </b>&amp; condition doesn't exist.</li></ul><li><span style=\"font-size: 1rem;\">In <b>exceptional </b>circumstances, auditor may depart from relevant requirement in SA. In such cases, auditor shall perform <b>alternative audit procedures (<font color=\"#c62828\">AAP</font>)&nbsp;</b>&amp; it shall be <b><font color=\"#c62828\">documented</font></b>.</span></li></ul>"

  {
    "id": "sa210",
    "title": "SA 210 – Agreeing the Terms of Audit Engagement",
    "subtitle": "Preconditions, engagement letters, and when an auditor can walk away.",
    "cards": [
      {
        "id": "9b1a0856-eb21-409a-b104-adc9e45db93a",
        "title": "What is the Objective of SA 210?",
        "keywords": [
          {
            "icon": "key",
            "label": "Preconditions"
          },
          {
            "icon": "handshake",
            "label": "Common understanding"
          }
        ],
        "isSubPart": false,
        "storyline": "He has got a project. Should he take the engagement or not?",
        "adminImportance": "low",
        "explanationHtml": "<p></p><ul><li>The objective of the auditor is to accept or continue an audit engagement only when the basis upon which it is to be performed has been agreed, through:</li><ol type=\"a\"><li><span style=\"font-size: 1rem;\">Establishing whether the </span><strong style=\"font-size: 1rem;\"><font color=\"#c62828\">preconditions</font></strong><span style=\"font-size: 1rem;\"><font color=\"#c62828\"> </font>for an audit are present; and</span></li><li>Confirming that there is a <strong style=\"font-size: 1rem;\"><font color=\"#c62828\">common understanding</font></strong><span style=\"font-size: 1rem;\"><font color=\"#c62828\"> </font>between the auditor and management/TCWG of the terms of the audit engagement.</span></li></ol></ul><p></p>"
      },
      {
        "id": "d25ace75-85a2-4d97-9400-8023d84fe023",
