}
// Called once per Active-recall confidence rating. Updates the in-memory
// daily count synchronously (so the very next render reflects it), then
// persists it to Supabase in the background. The streak itself — and its
// celebration — only advances once the FULL daily target is reached for the
// day, not on the first card, so "streak" really means "hit today's goal".
function recordStudyProgress(){
  if (!currentUserId) return;
  const today = todayISO();
  if (dailyProgress.date !== today) dailyProgress = { date: today, count: 0 };
  dailyProgress.count += 1;
  const dailyCountAtCall = dailyProgress.count;
  const dpIssueId = `daily_progress:${currentUserId}:${today}`;
  const writeDailyProgress = () => sb.from('daily_progress').upsert({ user_id: currentUserId, activity_date: today, cards_done: dailyCountAtCall });
  (async function attemptDaily(){
    const result = await withRetry(writeDailyProgress);
    const changed = result.ok
      ? clearSyncIssue(dpIssueId)
      : reportSyncIssue(dpIssueId, "Today's progress count couldn't sync.", attemptDaily);
    if (!result.ok) console.error('recordStudyProgress (daily_progress) failed:', result.error.message);
    if (changed) render();
  })();

  const target = (myProfile && myProfile.daily_target) || 20;
  if (dailyProgress.count >= target) recentActivityDates.add(today);
  if (myProfile && dailyProgress.count >= target && myProfile.last_active_date !== today){
    const prevDate = myProfile.last_active_date;
    const yesterday = addDaysISO(today, -1);
    const prevStreak = myProfile.streak_count || 0;
    // A streak "broke" if it was actually running (prevStreak > 0) and the
    // gap since the last completed day is more than one day — i.e. the
    // student missed at least one full day in between.
    const wasBroken = prevStreak > 0 && !!prevDate && prevDate !== yesterday;
    myProfile.streak_count = (prevDate === yesterday) ? (prevStreak + 1) : 1;
    myProfile.last_active_date = today;
    showStreakCelebration(myProfile.streak_count, target, { brokenStreakLen: wasBroken ? prevStreak : 0 });
    const streakCountAtCall = myProfile.streak_count;
    const streakIssueId = `streak:${currentUserId}`;
    const writeStreak = () => sb.from('profiles').update({ streak_count: streakCountAtCall, last_active_date: today }).eq('id', currentUserId);
    (async function attemptStreak(){
      const result = await withRetry(writeStreak);
      const changed = result.ok
        ? clearSyncIssue(streakIssueId)
        : reportSyncIssue(streakIssueId, "Your streak update couldn't sync.", attemptStreak);
      if (!result.ok) console.error('recordStudyProgress (streak) failed:', result.error.message);
      if (changed) render();
    })();
  }
}

// After completing a spaced-repetition revision with response `conf`, advance
// that card's schedule: bump its revision count and set its next due date
// using the admin-configured table (capped at the table's last column if the
// card has gone through more revisions than the table defines).
function advanceSrSchedule(di, ci, conf){
  const meta = getCardMeta(di, ci);
  const newCount = (meta.srRevisionCount || 0) + 1;
  const table = srConfig[conf] || srConfig.weak;
  const days = table[Math.min(newCount, table.length) - 1];
  setCardMeta(di, ci, { srRevisionCount: newCount, srDueDate: addDaysISO(todayISO(), days) });
}

// All cards at a given importance level that are due for spaced-repetition
// review right now. A card only enters this queue once it has actually been
// reviewed at least once (any confidence rating) — that first rating seeds
// its initial due date (see setCardMeta), 1/2/3 days out by default for
// weak/mid/strong. Cards with no rating yet are NOT "due immediately"; they
// simply aren't part of spaced repetition until the student has studied them
// once. From then on, due-today and overdue (skipped a day or more — those
// stay in the queue rather than being lost) cards both show up here.
function getSrDueCards(impKey){
  const today = todayISO();
  const cards = [];
  let dueTodayCount = 0, overdueCount = 0;
  DECKS.forEach((deck, di) => {
    if (!canAccessDeck(deck)) return;
    deck.cards.forEach((_, ci) => {
      const m = getCardMeta(di, ci);
      if (m.importance !== impKey) return;
      if (!m.srDueDate) return; // never reviewed yet — not eligible until a rating seeds its first due date
      if (m.srDueDate <= today){
        cards.push({ deckIndex: di, cardIndex: ci, srDueDate: m.srDueDate });
        if (m.srDueDate < today) overdueCount++; else dueTodayCount++;
      }
    });
  });
  // Most-overdue first.
  cards.sort((a,b) => a.srDueDate.localeCompare(b.srDueDate));
  return { cards, dueTodayCount, overdueCount };
}

// Starts (or continues into) a spaced-repetition review queue for one star
// level. 3-star (important) always goes first; once that queue is cleared,
// the "congratulations" screen offers to continue into 2-star (mid). 1-star
// (low) is intentionally never included.
function beginSrStar(impKey){
  const { cards } = getSrDueCards(impKey);
  if (!cards.length){
    if (impKey === 'important'){
      const mid = getSrDueCards('mid');
      if (mid.cards.length){ beginSrStar('mid'); return; }
    }
    showSrNothingDueModal();
    return;
  }
  state.filterActive = true;
  state.filterCards = cards.map(c => ({ deckIndex: c.deckIndex, cardIndex: c.cardIndex }));
  state.filterCursor = 0;
  // Spaced-repetition sessions always run in Active recall — guess first,
  // then reveal, then rate confidence — never the Quick review skim mode.
  state.filterMode = 'recall';
  state.filterStage = 'question';
  state.filterCell = null;
  state.srSession = { star: impKey };
  render();
}

      errEl.style.display = 'block';
      return;
    }
    document.body.removeChild(ov);
    render();
  });
}

// Shown instead of the generic renderFilterComplete() when the filtered
// session just finished was a spaced-repetition queue.

  const isThreeStar = star === 'important';
  const count = state.filterCards.length;
  const midDue = isThreeStar ? getSrDueCards('mid') : null;

  let message;
  if (isThreeStar && midDue.cards.length){
    message = `You've finished today's ⭐⭐⭐ revision — ${count} card${count===1?'':'s'} done. Ready to keep going with ⭐⭐ topics?`;
  } else if (isThreeStar){
    message = `You've finished today's ⭐⭐⭐ revision — ${count} card${count===1?'':'s'} done. No ⭐⭐ topics are due right now.`;
  } else {
    message = `You've finished today's ⭐⭐ revision — ${count} card${count===1?'':'s'} done. That's everything due right now.`;
  }
  const showContinue = isThreeStar && midDue.cards.length > 0;

  const summaryCards = state.filterCards.map(c => ({
    deckIndex: c.deckIndex, cardIndex: c.cardIndex,
    title: DECKS[c.deckIndex].cards[c.cardIndex].title,
    confidence: getCardMeta(c.deckIndex, c.cardIndex).confidence,
  }));
  const { confPills, rows } = sessionBreakdownHtml(summaryCards);

  app.innerHTML = `
    <button class="back-link" id="f-home-btn">&larr; All decks</button>
    <p class="eyebrow" style="text-align:center;">Spaced repetition</p>
    <div class="end-panel">
      <h2 class="end-score" style="font-size:2rem;">🎉 Congratulations!</h2>
      <p class="end-label">${message}</p>
      <div class="conf-breakdown">${confPills}</div>
      <div class="end-breakdown" style="margin-top:1.2rem;">${rows}</div>
      <div class="btn-row">
        ${showContinue ? `<button class="btn-primary" id="sr-continue-btn">Continue to ⭐⭐ revision (${midDue.cards.length})</button>` : ''}
        <button class="${showContinue ? 'btn-secondary' : 'btn-primary'}" id="f-home-btn2">Back to dashboard</button>
      </div>
    </div>`;
  const goBack = ()=>{ state.filterActive=false; state.filterCards=[]; state.filterCursor=0; state.srSession=null; render(); };
  document.getElementById('f-home-btn').addEventListener('click', goBack);
  document.getElementById('f-home-btn2').addEventListener('click', goBack);
  wireSessionBreakdownRows(app);
  const contBtn = document.getElementById('sr-continue-btn');
  if (contBtn) contBtn.addEventListener('click', ()=> beginSrStar('mid'));
}

  ov.className = 'modal-overlay';
  ov.setAttribute('role','dialog'); ov.setAttribute('aria-modal','true');
  ov.innerHTML = `
    <div class="modal">
      <h3>How confident do you feel?</h3>
      <p class="sub">Saved to your study matrix.</p>
      <div class="conf-row">
        <button class="conf-btn" data-conf="weak"><span class="conf-dot conf-dot-weak"></span>Weak <span class="conf-sub">Barely recalled it</span></button>
        <button class="conf-btn" data-conf="mid"><span class="conf-dot conf-dot-mid"></span>Mid <span class="conf-sub">Got most of it</span></button>
        <button class="conf-btn" data-conf="strong"><span class="conf-dot conf-dot-strong"></span>Strong <span class="conf-sub">Nailed it</span></button>
      </div>
    </div>`;
  document.body.appendChild(ov);

// All cards missing importance or confidence
function getUnreviewedCards(){
  const cards = [];
  DECKS.forEach((deck, di) => {
    if (!canAccessDeck(deck)) return;
    deck.cards.forEach((_, ci) => {
      const m = getCardMeta(di, ci);
      if (!m.importance || !m.confidence) cards.push({deckIndex:di, cardIndex:ci});
    });
  });
  return cards;
}

// ── Study matrix ─────────────────────────────────────────────────────────────
const IMP_KEYS = ['important','mid','low'];
const IMP_LABELS = {important:'⭐⭐⭐', mid:'⭐⭐', low:'⭐'};
const CONF_KEYS = ['weak','mid','strong'];
const CONF_LABELS = {weak:'Weak', mid:'Mid', strong:'Strong'};

function buildMatrix(){
  const matrix = {};
  IMP_KEYS.forEach(i => CONF_KEYS.forEach(c => matrix[`${i}_${c}`] = []));
  let total = 0, excluded = 0;
  DECKS.forEach((deck, di) => {
    if (!canAccessDeck(deck)) return;
    deck.cards.forEach((_, ci) => {
      total++;
      const m = getCardMeta(di, ci);
      if (m.importance && m.confidence) matrix[`${m.importance}_${m.confidence}`].push({deckIndex:di, cardIndex:ci});
      else excluded++;
    });
  });
  return {matrix, total, excluded};
}

function matrixHtml(){
  const {matrix, excluded, total} = buildMatrix();
  const rows = IMP_KEYS.map(ik => `
    <tr>
      <td class="matrix-row-label">${IMP_LABELS[ik]}</td>
      ${CONF_KEYS.map(ck => {
        const n = matrix[`${ik}_${ck}`].length;
        return `<td class="matrix-cell-wrap"><div class="matrix-cell ${n>0?'has-cards':'empty'}"
          ${n>0?`data-imp="${ik}" data-conf="${ck}" role="button" tabindex="0"`:''}
          title="${n>0?n+' card'+(n===1?'':'s')+' — click to review':'No cards yet'}">${n>0?n:'—'}</div></td>`;
      }).join('')}
    </tr>`).join('');
  return `
    <div class="matrix-wrap panel-box">
      <div class="panel-title">Study matrix</div>
      <table class="matrix-table" style="margin-top:.8rem;">
        <colgroup>
          <col class="matrix-label-col">
          ${CONF_KEYS.map(()=>'<col class="matrix-data-col">').join('')}
        </colgroup>
        <tr>
          <td></td>${CONF_KEYS.map(k=>`<th class="matrix-th">${CONF_LABELS[k]}</th>`).join('')}
        </tr>
        ${rows}
      </table>
      ${excluded > 0 ? `<button class="matrix-note-link" id="open-unreviewed-btn">📌 Summary excludes <strong>${excluded}</strong> card${excluded===1?'':'s'} not yet reviewed or not tagged — <u>review them now</u></button>` : ''}
    </div>`;
}

// ── Cell drilldown ────────────────────────────────────────────────────────────
function openCellDrilldown(impKey, confKey){
  const {matrix} = buildMatrix();
  const cards = matrix[`${impKey}_${confKey}`];
  if (!cards.length) return;
  const deckSet = [...new Set(cards.map(c=>c.deckIndex))];

  const ov = document.createElement('div');
  ov.className = 'deck-sel-overlay';
  ov.innerHTML = `
    <div class="deck-sel-modal">
      <h3>${IMP_LABELS[impKey]} × ${CONF_LABELS[confKey]}</h3>
      <p class="sub">${cards.length} card${cards.length===1?'':'s'} across ${deckSet.length} deck${deckSet.length===1?'':'s'}. Choose which to review:</p>
      <div class="deck-chk-list">
        <label class="deck-chk-item select-all">
          <input type="checkbox" id="chk-all" checked>
          <span>Select all</span>
        </label>
        ${deckSet.map(di=>{
          const n = cards.filter(c=>c.deckIndex===di).length;
          return `<label class="deck-chk-item">
            <input type="checkbox" class="deck-chk" data-di="${di}" checked>
            <span>${esc(DECKS[di].title)}</span>
            <span class="deck-chk-meta">${n} card${n===1?'':'s'}</span>
          </label>`;
        }).join('')}
      </div>
      <div class="btn-row">
        <button class="btn-primary" id="cell-go-btn">Review cards</button>
        <button class="btn-secondary" id="cell-cancel-btn">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(ov);

  const chkAll = ov.querySelector('#chk-all');
  const chks = ov.querySelectorAll('.deck-chk');
  chkAll.addEventListener('change', ()=> chks.forEach(c=>c.checked=chkAll.checked));
  chks.forEach(c => c.addEventListener('change', ()=>{
    const allOn = [...chks].every(x=>x.checked);
    const anyOn = [...chks].some(x=>x.checked);
    chkAll.checked = allOn;
    chkAll.indeterminate = !allOn && anyOn;
  }));

  ov.querySelector('#cell-cancel-btn').addEventListener('click', ()=>document.body.removeChild(ov));
  ov.querySelector('#cell-go-btn').addEventListener('click', ()=>{
    const selected = new Set([...chks].filter(c=>c.checked).map(c=>parseInt(c.dataset.di)));
    if (!selected.size) return;
    document.body.removeChild(ov);
    const filtered = cards.filter(c=>selected.has(c.deckIndex));
    if (impKey === 'low'){
      // 1-star topics always review in Quick review mode — for efficiency,
      // Active recall is reserved for higher-priority (⭐⭐/⭐⭐⭐) topics, so
      // skip the mode-choice prompt entirely and go straight to Quick review.
      state.filterActive = true;
      state.filterCards = filtered;
      state.filterCursor = 0;
      state.filterMode = 'quick';
      state.filterStage = 'answer';
      state.filterCell = {impKey, confKey};
      render();
    } else {
      openFilterModeChoice(filtered, impKey, confKey);
    }
  });
}

function openFilterModeChoice(filteredCards, impKey, confKey){

        <div class="deck-chk-item" id="fm-quick" style="cursor:pointer;flex-direction:column;align-items:flex-start;gap:.2rem;">

// ── Filtered review ───────────────────────────────────────────────────────────
function renderFilteredCard(){
  if (state.filterCursor >= state.filterCards.length){ renderFilterComplete(); return; }
  const {deckIndex:di, cardIndex:ci} = state.filterCards[state.filterCursor];
  const deck = DECKS[di];
  const card = deck.cards[ci];
  const stage = state.filterStage;
  const mode = state.filterMode;
  const cols = gridCols(card.keywords.length);

  const kwFlip = `<div class="kw-grid" style="grid-template-columns:repeat(${cols},1fr)">${card.keywords.map((kw,i)=>`
    <div class="kw-box" data-idx="${i}"><div class="kw-box-inner">
      <div class="kw-face front">${iconHtml(kw.icon)}<span class="kw-placeholder">?</span></div>
      <div class="kw-face back">${iconHtml(kw.icon)}<span class="kw-text">${esc(kw.label)}</span></div>
    </div></div>`).join('')}</div>`;
  const kwStatic = `<div class="kw-grid" style="grid-template-columns:repeat(${cols},1fr)">${card.keywords.map(kw=>`
    <div class="kw-box"><div class="kw-box-inner"><div class="kw-face front">${iconHtml(kw.icon)}<span class="kw-text">${esc(kw.label)}</span></div></div></div>`).join('')}</div>`;

  let body='', footer='';
  if (stage==='question'){
    body = kwFlip;
    footer = `<button class="btn-primary" id="f-reveal-btn">Reveal answers</button>`;
  } else if (stage==='answer'){
    body = mode==='quick' ? kwStatic : kwFlip;
    footer = `<button class="btn-primary" id="f-continue-btn">Continue to explanation</button>`;
  } else {
    body = explainBlockHtml(deck, ci);
    const isLast = state.filterCursor === state.filterCards.length-1;
    footer = `<button class="btn-primary" id="f-next-btn">${isLast?'Finish review':'Next card'}</button>`;
  }

  const fc = state.filterCell;
  const bannerText = state.srSession
    ? `⏱ Spaced repetition &middot; ${IMP_LABELS[state.srSession.star]} — Card ${state.filterCursor+1} of ${state.filterCards.length}`
    : fc
    ? `${IMP_LABELS[fc.impKey]} × ${CONF_LABELS[fc.confKey]} — Card ${state.filterCursor+1} of ${state.filterCards.length}`
    : `📌 Unreviewed — Card ${state.filterCursor+1} of ${state.filterCards.length}`;
  app.innerHTML = `
    <button class="back-link" id="f-home-btn">&larr; All decks</button>
    <span class="filter-tag">${bannerText}</span>
    ${stageStepsHtml(stage, mode)}
    <div class="card">
      <div class="card-title">${storylineHtml(deck, ci)}${esc(numberedTitle(deck, ci))}<span style="display:block;font-size:.78rem;font-weight:400;opacity:.75;margin-top:.15rem;">${esc(deck.title)}</span></div>
      ${linkButtonHtml(di, ci)}
      ${importanceRowHtml(di, ci)}
      ${mode === 'quick' ? confTagRowHtml(di, ci) : ''}
      <div class="card-body">${body}<div class="btn-row">${footer}</div></div>
    </div>`;

  document.getElementById('f-home-btn').addEventListener('click', ()=>{
    state.filterActive=false; state.filterCards=[]; state.filterCursor=0; state.srSession=null; render();
  });
  wireLinkButton(app);
  wireImportanceRow(di, ci);
  if (mode === 'quick') wireConfTagRow(di, ci);
  if (stage === 'explain') wireExplainBlock(deck, ci, renderFilteredCard);
  document.querySelectorAll('.stage-step[data-stage]').forEach(btn=>btn.addEventListener('click',()=>{
    stopEditing(); state.filterStage=btn.dataset.stage; renderFilteredCard();
  }));

  function advanceFilter(){
    stopEditing();
    openConfidenceModal(di, ci, (conf)=>{
      if (state.srSession) advanceSrSchedule(di, ci, conf);
      state.filterCursor++;
      state.filterStage = 'question';
      renderFilteredCard();
    });
  }
  function advanceFilterQuick(){
    stopEditing();
    if (state.srSession){
      const conf = getCardMeta(di, ci).confidence || 'weak';
      advanceSrSchedule(di, ci, conf);
    }
    state.filterCursor++;
    state.filterStage = 'answer';
    renderFilteredCard();
  }

  if (stage==='question'){
    document.getElementById('f-reveal-btn').addEventListener('click', ()=>{
      state.filterStage='answer';
      document.querySelector('.stage-steps').outerHTML = stageStepsHtml('answer', mode);
      document.querySelectorAll('.stage-step[data-stage]').forEach(btn=>btn.addEventListener('click',()=>{
        state.filterStage=btn.dataset.stage; renderFilteredCard();
      }));
      const boxes=document.querySelectorAll('.kw-box');
      boxes.forEach((b,i)=>setTimeout(()=>b.classList.add('flipped'),i*90));
      const fe=document.querySelector('.btn-row');
      setTimeout(()=>{
        fe.innerHTML=`<button class="btn-primary" id="f-continue-btn">Continue to explanation</button>`;
        document.getElementById('f-continue-btn').addEventListener('click',()=>{state.filterStage='explain';renderFilteredCard();});
      }, boxes.length*90+150);
    });
  } else if (stage==='answer'){
    if (mode!=='quick') document.querySelectorAll('.kw-box').forEach(b=>b.classList.add('flipped'));
    document.getElementById('f-continue-btn').addEventListener('click',()=>{state.filterStage='explain';renderFilteredCard();});
  } else {
    document.getElementById('f-next-btn').addEventListener('click', ()=>{
      if (mode === 'recall') advanceFilter();
      else advanceFilterQuick(); // confidence already set inline, no popup
    });
  }
}

      <h2 class="end-score" style="font-size:2rem;">All done!</h2>

      <div class="btn-row">

      </div>
    </div>`;
  const goBack = ()=>{ state.filterActive=false; state.filterCards=[]; state.filterCursor=0; render(); };

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
// Back-compat alias for the original inline-SVG icon library. Existing
// keyword data — anything already saved to a user's Supabase project before
// the Material Symbols icon picker existed — stores bare legacy names like
// "umbrella" or "scroll" with no prefix at all. That data lives in each
// admin's own Supabase project (loadDeckContent overwrites the shipped
// DECKS with whatever is saved there), so it can't be migrated by editing a
// local file — the rendering code has to keep understanding the old names
// forever. This maps every legacy name to its closest Material Symbols
// equivalent so old keyword icons keep rendering (and keep showing as
// "selected" in the icon picker) exactly like a "ms:"-prefixed value.
const LEGACY_ICON_ALIAS = {
  'alarm-clock':'alarm','anchor':'anchor','backpack':'backpack','binoculars':'travel_explore',
  'brick-wall':'construction','broken-chain':'link_off','calculator':'calculate','calendar':'calendar_month',
  'clipboard-check':'assignment_turned_in','compass':'explore','crystal-ball':'auto_awesome',
  'detective-hat':'person_search','door':'meeting_room','envelope':'mail','eye':'visibility',
  'fingerprint':'fingerprint','flag':'flag','folder':'folder','footprint':'directions_walk',
  'gear':'settings','ghost':'mood_bad','graduation-cap':'school','handshake':'handshake',
  'hourglass':'hourglass_empty','id-card':'badge','key':'key','lightbulb':'lightbulb',
  'link-chain':'link','magnet':'control_camera','magnify':'search','mask':'theater_comedy',
  'megaphone':'campaign','microphone':'mic','mirror':'flip','open-book':'menu_book',
  'puzzle':'extension','raincloud':'rainy','ruler':'straighten','scale':'balance',
  'scroll':'history_edu','seesaw':'swap_vert','shield':'shield','shield-check':'verified_user',
  'signature':'draw','spotlight':'highlight','stamp':'approval','tag':'sell','target':'ads_click',
  'thermometer':'thermostat','thumb':'thumb_up','trophy':'emoji_events','umbrella':'umbrella',
  'warning-triangle':'warning',
};
// Resolve any icon value to its effective "ms:<name>" form when it's a
// recognized legacy bare name, so every call site (rendering, the icon
// picker's "currently selected" check) only has to deal with one shape.
function resolveIconValue(icon){
  if (icon && !icon.startsWith('data:') && !icon.startsWith('ms:') && LEGACY_ICON_ALIAS[icon]){
    return 'ms:' + LEGACY_ICON_ALIAS[icon];
  }
  return icon;
}
function iconHtml(rawIcon){
  const icon = resolveIconValue(rawIcon);
  if (icon && icon.startsWith('data:')){
    return `<img class="kw-icon" src="${icon}" alt="">`;
  }
  if (icon && icon.startsWith('ms:')){
    const name = icon.slice(3);
    return `<span class="kw-icon kw-icon-ms material-symbols-outlined" translate="no">${esc(name)}</span>`;
  }
  const inner = ICONS[icon];
  if (inner){
    return `<svg class="kw-icon" viewBox="0 0 24 24" fill="#fff">${inner}</svg>`;
  }
  return `<span class="kw-icon"></span>`;
}
function deckTotal(deck){ return deck.cards.reduce((n,c)=>n+c.keywords.length,0); }
function gridCols(n){ if(n<=3) return n; if(n===4) return 2; return 3; }

function startDeck(i){
  const deck = DECKS[i];
  if (!deck || !canAccessDeck(deck)) return; // safety net — locked decks can't be opened
  stopEditing();
  state.deckIndex = i; state.mode = null; state.cardIndex = 0; state.stage = 'question';
  state.perCard = []; state.sessionSubmitted = false;
  render();
}

function chooseMode(mode){
  stopEditing();
  state.mode = mode;
  state.cardIndex = 0;
  state.stage = mode === 'quick' ? 'answer' : 'question';
  state.perCard = []; state.sessionSubmitted = false;
  render();
}

// A ⭐ (1-star / "low" importance) card is never studied in Active recall —
// for efficiency it always opens in Quick review, even mid-session while the
// rest of the deck is being studied in Active recall. Every other card uses
// whatever mode the student picked. This only affects the main "Systematic
// study" flow (state.mode) — spaced repetition never queues 1-star cards at
// all, and the study-matrix skips the mode prompt entirely for 1-star cells.
function effectiveStudyMode(di, ci){
  if (state.mode === 'recall' && getCardMeta(di, ci).importance === 'low') return 'quick';
  return state.mode;
}

function resetDeckProgress(){
  state.cardIndex = 0;
  state.stage = state.mode === 'quick' ? 'answer' : 'question';
  state.perCard = [];
  state.sessionSubmitted = false;
}

function homeHeroHtml(){
  const rawName = myProfile && myProfile.name ? myProfile.name.trim() : '';
  const firstName = rawName ? rawName.split(/\s+/)[0] : '';
  const greetingFullText = firstName ? `Hi ${firstName}, welcome to AuditZ` : '';
  const today = todayISO();

  const attemptKey = myProfile && myProfile.exam_attempt;
  const attemptCfg = attemptKey ? examAttemptsConfig[attemptKey] : null;
  let countdownText = 'Set your exam attempt in Settings to see your countdown';
  let motivation = '';
  if (attemptKey){
    if (attemptCfg && attemptCfg.examDate){
      const days = Math.round((new Date(attemptCfg.examDate + 'T00:00:00Z') - new Date(today + 'T00:00:00Z')) / 86400000);
      countdownText = days > 0 ? `${days} day${days===1?'':'s'} to your ${examAttemptLabel(attemptKey)} exam`
        : days === 0 ? `Your ${examAttemptLabel(attemptKey)} exam is today — go get it!`
        : `Your ${examAttemptLabel(attemptKey)} exam has passed`;

      countdownText = `${examAttemptLabel(attemptKey)} attempt — exam date coming soon`;
    }
    motivation = (attemptCfg && attemptCfg.motivationalMessage) || 'Every card you revise today is a step closer to clearing this attempt.';
  }

  const target = (myProfile && myProfile.daily_target) || 20;
  const done = dailyProgress.date === today ? dailyProgress.count : 0;
  const targetText = `${done} / ${target} today`;

  return `<div class="home-hero">
    ${greetingFullText ? `<h2 class="greeting-text" id="greeting-text"></h2>` : ''}
    <div class="hero-stats">
      <span class="hero-stat">🗓️ ${formatDisplayDate(today)}</span>

      <span class="hero-stat">🎯 ${targetText}</span>

    ${motivation ? `<p class="hero-motivation">“${esc(motivation)}”</p>` : ''}
    ${streakCardHtml()}
  </div>`;
}

// The streak is the app's key habit-loop, so it gets its own vivid, graphical
// card rather than a plain text stat: a flame that grows/glows with the
// streak's length, a 7-day strip showing the week at a glance (with today
// pulsing if not yet done), and a countdown to the next milestone.
function streakCardHtml(){
  const { streak, isBroken, rawStreak } = effectiveStreakInfo();
  const today = todayISO();
  const target = (myProfile && myProfile.daily_target) || 20;
  const todayCount = dailyProgress.date === today ? dailyProgress.count : 0;
  // Today only "completes" the streak once the full daily target is met —
  // matching recordStudyProgress, which is the single source of truth here.
  const doneToday = todayCount >= target;
  const remaining = Math.max(0, target - todayCount);
  const tier = streakTier(streak);
  const nextMilestone = nextStreakMilestone(streak);
  const daysToGo = nextMilestone ? nextMilestone - streak : null;

  // Fixed Monday-first calendar week — the column for a given weekday never
  // shifts day to day (unlike a rolling "last 7 days" window). Days after
  // today are shown dimmed as upcoming, not counted as active/missed.
  const DOW_LABELS = ['M','T','W','T','F','S','S'];
  const todayDow = new Date(today + 'T00:00:00Z').getUTCDay(); // 0=Sun..6=Sat
  const mondayOffset = (todayDow + 6) % 7; // days since this week's Monday
  const monday = addDaysISO(today, -mondayOffset);
  const days = [];
  for (let i = 0; i < 7; i++){
    const iso = addDaysISO(monday, i);
    const isToday = iso === today;
    const isFuture = iso > today;
    const active = isToday ? doneToday : (isFuture ? false : recentActivityDates.has(iso));
    days.push({ iso, dow: DOW_LABELS[i], active, isToday, isFuture });
  }

  // A punchier, more rewarding caption every time — this is the line that
  // does the most work in making the streak feel worth protecting.
  // A streak that has already died (missed a day) gets its own honest
  // message the moment the student looks at the dashboard — not just after
  // they finish today's target — so it never quietly shows a dead streak
  // as if it were still alive.
  const caption = isBroken && !doneToday
    ? `💔 Your ${rawStreak}-day streak ended — but today's a fresh start. Finish today's target to begin a new one!`
    : streak === 0 && todayCount === 0
    ? '🔥 Finish today\'s target and light your very first streak!'
    : doneToday
      ? (daysToGo
          ? `You're unstoppable today 💪 ${daysToGo} more day${daysToGo===1?'':'s'} to a ${nextMilestone}-day streak!`
          : "You've conquered every milestone — absolutely legendary! 🏆")
      : `⚡ ${remaining} more card${remaining===1?'':'s'} today keeps the fire alive — don't let it burn out!`;

  const progressPct = target > 0 ? Math.min(100, Math.round((todayCount / target) * 100)) : 0;

  return `<div class="streak-card streak-tier-${tier}">
    <div class="streak-card-head">
      <div>
        <div class="streak-headline">${streak > 0 ? `${streak} day streak` : (isBroken && !doneToday ? 'Streak broken' : 'No streak yet')}</div>
        <div class="streak-caption">${esc(caption)}</div>
      </div>
      <div class="streak-flame-wrap">
        <span class="streak-flame">🔥</span>
        <span class="streak-count-badge">${streak}</span>
      </div>
    </div>
    ${!doneToday ? `<div class="streak-progress-track" title="${todayCount} / ${target} today">
      <div class="streak-progress-fill" style="width:${progressPct}%"></div>
    </div>` : ''}
    <div class="streak-days-strip">
      ${days.map(d=>`<div class="streak-day${d.active?' filled':''}${d.isToday && !d.active?' today-pending':''}${d.isFuture?' future-day':''}" title="${d.iso}">
        <span class="streak-day-dot">${d.active?'🔥':''}</span>
        <span class="streak-day-label">${d.dow}</span>
      </div>`).join('')}
    </div>
  </div>`;
}

// ── Admin: export a full data backup ────────────────────────────────────────
// Pulls every table this app writes to and bundles it into one JSON file the
// admin downloads straight to their own device — a manual safety net on top
// of (not a replacement for) proper Supabase backups/point-in-time recovery,
// for exactly the situation that already happened once: something goes
// wrong in the live database and there's nothing to restore from. Reading
// other students' `card_meta` / `daily_progress` rows requires the RLS
// migration below to have been run — without it, those two tables will come
// back empty (or error) for every user except the admin's own rows, since
// they're normally locked to "your own rows only". Everything else
// (deck_content, profiles, spaced_repetition_config, exam_attempts_config)
// already allows the admin to read every row today, no migration needed.
const BACKUP_TABLES = ['deck_content', 'profiles', 'card_meta', 'daily_progress', 'spaced_repetition_config', 'exam_attempts_config'];
async function exportFullBackup(){
  const result = { exported_at: new Date().toISOString(), tables: {}, errors: {} };
  for (const table of BACKUP_TABLES){
    const { data, error } = await sb.from(table).select('*');
    if (error){
      result.errors[table] = error.message;
      result.tables[table] = [];
    } else {
      result.tables[table] = data || [];
    }
  }
  return result;
}
function wireExportBackup(){
  const btn = document.getElementById('export-backup-btn');
  if (!btn) return;
  btn.addEventListener('click', async ()=>{
    const statusEl = document.getElementById('export-backup-status');
    btn.disabled = true;
    btn.textContent = 'Exporting…';
    if (statusEl){ statusEl.style.display = 'none'; }
    const backup = await exportFullBackup();
    const failedTables = Object.keys(backup.errors);
    const counts = BACKUP_TABLES.map(t => `${t}: ${backup.tables[t].length}`).join(', ');
    const json = JSON.stringify(backup, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const dateStamp = backup.exported_at.slice(0,10);
    a.href = url;
    a.download = `auditz-backup-${dateStamp}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    btn.disabled = false;
    btn.textContent = '💾 Export all data (backup)';
    if (statusEl){
      statusEl.style.display = 'inline';
      if (failedTables.length){
        statusEl.className = 'mc-save-status error';
        statusEl.textContent = `⚠ Downloaded, but couldn't read: ${failedTables.join(', ')} — see note below.`;
      } else {
        statusEl.className = 'mc-save-status ok';
        statusEl.textContent = `✓ Downloaded (${counts})`;
      }
    }
  });
}

    const examAttempt = document.getElementById('settings-exam-attempt').value;
    const dailyTarget = parseInt(document.getElementById('settings-daily-target').value, 10);
    const saveBtn = document.getElementById('settings-save-btn');

    const { error } = await sb.from('profiles').update({ exam_attempt: examAttempt, daily_target: dailyTarget }).eq('id', currentUserId);

      errEl.textContent = error.message;

      saveBtn.disabled = false; saveBtn.textContent = 'Save changes';
      return;
    }
    if (myProfile){ myProfile.exam_attempt = examAttempt; myProfile.daily_target = dailyTarget; }
    state.accountSettingsOpen = false;
    render();
  });

// A small, non-alarming banner telling the student (or admin) that one or
// more of their own background saves — card progress, today's count, their
// streak — hasn't reached the server yet, with a one-tap way to retry. Shown
// on the dashboard, which is where everyone lands after any study session,
// so it's never buried somewhere they might not see it.
function syncIssueBannerHtml(){
  if (!studentSyncIssues.length) return '';
  const label = studentSyncIssues.length === 1
    ? studentSyncIssues[0].message
    : `${studentSyncIssues.length} things couldn't sync yet.`;
  return `
    <div class="mc-save-bar" style="margin:0 0 1rem;">
      <span class="mc-save-status error">⚠ ${esc(label)} Check your connection.</span>
      <button type="button" class="btn-secondary" id="sync-retry-btn">Retry now</button>
    </div>`;
}
function renderDeckList(){
  const planLabel = isAdmin() ? 'Admin' : (isPaidUser(currentUser) ? 'Paid' : 'Free');
  const rawName = myProfile && myProfile.name ? myProfile.name.trim() : '';
  const firstName = rawName ? rawName.split(/\s+/)[0] : '';
  const greetingFullText = firstName ? `Hi ${firstName}, welcome to AuditZ` : '';
  app.innerHTML = `
    <div class="account-bar">
      <span>Signed in as ${esc(currentUser)} &middot; ${planLabel}</span>
      <span style="display:flex; gap:1rem; align-items:center;">
        <button class="back-link" id="leaderboard-btn" style="margin:0;">🏆 Leaderboard</button>
        <button class="back-link" id="guide-btn" style="margin:0;">🧭 Guide</button>
        <button class="back-link" id="settings-btn" style="margin:0;">⚙ Settings</button>
        <button class="back-link" id="logout-btn" style="margin:0;">Log out</button>
      </span>
    </div>
    ${syncIssueBannerHtml()}
    ${homeHeroHtml()}
    ${adminPanelHtml()}
    <div class="layer-section">
      ${srSectionHtml()}
    </div>
    <div class="layer-section">
      ${matrixHtml()}
    </div>
    <div class="layer-section panel-box">
      <div class="deck-list-head" style="margin-bottom:1rem;">
        <div class="panel-title">Systematic study</div>
        <div class="panel-sub">Pick a deck to study — guess the keyword, check the answer, then lock in the detail.</div>
      </div>
      ${DECKS.map((d,i)=>{
        const total = deckTotal(d);
        const locked = !canAccessDeck(d);
        return `<div class="deck-row${locked?' locked':''}">
          <div class="deck-row-text">
            <h3>${esc(d.title)}${locked?'<span class="lock-badge">🔒 Paid</span>':''}</h3>
            <p>${esc(d.subtitle)}</p>
            <div class="deck-row-meta">${d.cards.length} card${d.cards.length===1?'':'s'} &middot; ${total} keywords</div>
          </div>
          <div class="deck-row-actions">
            ${isAdmin() ? `<button class="btn-secondary manage-btn" data-manage-i="${i}">✎ Manage cards</button>` : ''}
            ${locked
              ? `<button class="btn-secondary" disabled title="Upgrade to a paid account to unlock this deck">Locked</button>`
              : `<button class="btn-primary" data-i="${i}">Start deck</button>`}
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
  const syncRetryBtn = app.querySelector('#sync-retry-btn');
  if (syncRetryBtn){
    syncRetryBtn.addEventListener('click', async ()=>{
      syncRetryBtn.disabled = true;
      syncRetryBtn.textContent = 'Retrying…';
      // Snapshot the list first — each retry() may itself re-add its own
      // issue back onto studentSyncIssues if it fails again, and iterating
      // the live (mutating) array directly would skip or double-handle
      // entries.
      await Promise.all(studentSyncIssues.slice().map(issue => issue.retry()));
    });
  }
  app.querySelectorAll('.deck-row .btn-primary').forEach(btn=>{
    btn.addEventListener('click', ()=> startDeck(parseInt(btn.dataset.i,10)));
  });
  app.querySelectorAll('.manage-btn[data-manage-i]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      manageOpenDescCi = null;
      manageLastSaveError = null;
      state.manageDeckIndex = parseInt(btn.dataset.manageI, 10);
      state.manageIndexOpen = false;
      render();
    });
  });
  document.getElementById('logout-btn').addEventListener('click', logout);
  document.getElementById('settings-btn').addEventListener('click', ()=>{
    state.accountSettingsOpen = true;
    render();
  });
  document.getElementById('leaderboard-btn').addEventListener('click', showLeaderboardComingSoon);
  document.getElementById('guide-btn').addEventListener('click', ()=>{
    state.guideOpen = true;
    render();
  });
  wireSrSection();
  wireExamConfigEditor();
  wireExportBackup();
  const greetingEl = document.getElementById('greeting-text');
  if (greetingEl){
    if (greetingAnimated){
      greetingEl.textContent = greetingFullText;
    } else {
      greetingAnimated = true;
      typeGreeting(greetingEl, greetingFullText);
    }
  }
  // Wire admin user-rights toggles
  app.querySelectorAll('.admin-toggle-btn').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.dataset.id;
      const nextPaid = btn.dataset.next === '1';
      btn.disabled = true;
      btn.textContent = 'Saving…';
      const { error } = await sb.from('profiles').update({ is_paid: nextPaid }).eq('id', id);
      if (error){ console.error('toggle paid failed:', error.message); }
      await loadAdminProfiles();
      renderDeckList();
    });
  });
  // Wire matrix cell clicks
  app.querySelectorAll('.matrix-cell.has-cards').forEach(cell=>{
    cell.addEventListener('click', ()=> openCellDrilldown(cell.dataset.imp, cell.dataset.conf));
    cell.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' ') openCellDrilldown(cell.dataset.imp, cell.dataset.conf); });
  });
  // Wire unreviewed-cards note
  const unreviewedBtn = app.querySelector('#open-unreviewed-btn');
  if (unreviewedBtn){
    unreviewedBtn.addEventListener('click', ()=>{
      const cards = getUnreviewedCards();
      if (!cards.length) return;
      state.filterActive = true;
      state.filterCards = cards;
      state.filterCursor = 0;
      state.filterMode = 'quick';
      state.filterStage = 'answer';
      state.filterCell = null;
      render();
    });
  }
}

// ── Admin: manage cards & keywords for a deck (add/remove/reorder) ─────────
// Opened via the "Manage cards" button admin sees on every deck row. Every

          <input type="text" class="auth-input mc-card-title-input" data-act="card-title" data-ci="${ci}" value="${esc(card.title)}" placeholder="Card title">
        </div>
        <div class="mc-imp-row">
          <span class="imp-label">Default importance for all students:</span>
          ${[['important','⭐⭐⭐'],['mid','⭐⭐'],['low','⭐']].map(([k,l])=>
            `<button type="button" class="imp-btn${card.adminImportance===k?' active':''}" data-act="admin-imp" data-ci="${ci}" data-imp="${k}">${l}</button>`

          ${card.adminImportance ? `<button type="button" class="mc-order-btn mc-danger-btn" data-act="admin-imp-clear" data-ci="${ci}" title="Remove default — students will tag their own">✕ Clear</button>` : ''}

            <div class="mc-desc-editor">
              <div class="edit-toolbar">
                <button type="button" class="edit-tool-btn" data-cmd="bold" title="Bold"><b>B</b></button>
                <button type="button" class="edit-tool-btn" data-cmd="italic" title="Italic"><i>I</i></button>

                <button type="button" class="edit-tool-btn" data-list-type="a" title="Lettered list (a, b, c…)">a. List</button>

                <button type="button" class="edit-tool-btn" data-cmd="indent" title="Shift this point right (in one level, e.g. 1 → a → i)">Indent &rarr;</button>
                <span class="edit-tool-sep"></span>
                <span class="edit-color-label">Color:</span>
                <button type="button" class="edit-tool-btn" id="mc-desc-no-color-btn" title="Remove color formatting from the selected text — it goes back to inheriting the normal text color instead of being locked to a fixed one">No color</button>

              <p class="edit-hint">Select some text, then use the buttons above to format it. To make sub-points (like a, b, c under 1, 2, 3), select the line and click Indent, then pick a list style. Color is manual only now — nothing is auto-highlighted, so use the color buttons (or "No color" to undo) on exactly the words you want to stand out for students.</p>

          </button>
          ${manageOpenLinksCi === ci ? `
            <div class="mc-links-editor">
              ${(()=>{ const refs = getLinkedCardRefs(card); return refs.length ? `

                  ${refs.map(ref=>`
                    <div class="mc-link-chip">

                      <span class="mc-link-chip-deck">${esc(ref.deck.title)}</span>
                      <button type="button" class="mc-order-btn mc-danger-btn" data-act="link-remove" data-ci="${ci}" data-target-deck="${esc(ref.deck.id)}" data-target-card="${esc(ref.card.id)}" title="Remove link">✕</button>
                    </div>`).join('')}
                </div>` : '<p class="matrix-note" style="margin:0 0 .6rem;">No linked cards yet.</p>'; })()}
              <button type="button" class="btn-secondary" data-act="link-add" data-ci="${ci}">+ Link to another card</button>

        </div>
      </div>`).join('')}
