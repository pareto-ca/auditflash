  {
    "id": "sa705",
    "title": "SA 705",
    "subtitle": "Modifications to the Opinion in the Independent Auditor's Report",
    "cards": [
      {
        "id": "667f6498-9d4c-4cac-b238-a47b4e20abc9",
        "title": "Objective",
        "keywords": [
          {
            "icon": "warning-triangle",
            "label": "FS as a whole not free from material misstatement"
          },
          {
            "icon": "shield-check",
            "label": "Unable to obtain SAAE that FS are free from misstatement"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>To express clearly an appropriately <strong>modified opinion</strong> on the financial statements, necessary when:</p>\n<ol type=\"a\"><li>The auditor concludes, based on audit evidence obtained, that the FS as a whole are <strong>not free from material misstatement</strong>; or</li><li>The auditor is <strong>unable to obtain SAAE</strong> to conclude that the FS as a whole are free from material misstatement.</li></ol>"
      },
      {
        "id": "203c97a4-c0c6-4c04-810f-e0ca949aae4b",
        "title": "Definition of 'Pervasive'",
        "keywords": [
          {
            "icon": "binoculars",
            "label": "Not confined to specific elements"
          },
          {
            "icon": "scale",
            "label": "Substantial proportion if confined"
          },
          {
            "icon": "spotlight",
            "label": "Fundamental to understanding disclosures"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Used to describe effects, or possible effects, on the FS of misstatements undetected due to inability to obtain SAAE. Pervasive effects, in the auditor's judgment:</p>\n<ol type=\"i\"><li>Are <strong>not confined</strong> to specific elements, accounts, or items of the FS.</li><li>If so confined, represent or could represent a <strong>substantial proportion</strong> of the FS; or</li><li>In relation to disclosures, are <strong>fundamental</strong> to users' understanding of the FS.</li></ol>"
      },
      {
        "id": "dfcf672c-c437-4c14-a948-78f58013393b",
        "title": "Qualified (Q) Opinion",
        "keywords": [
          {
            "icon": "warning-triangle",
            "label": "Material but not pervasive misstatements"
          },
          {
            "icon": "shield-check",
            "label": "Unable to obtain SAAE — possible effects material not pervasive"
          },
          {
            "icon": "signature",
            "label": "'Except for the effects of' wording"
          },
          {
            "icon": "ghost",
            "label": "'Except for the possible effects of' — inability to obtain evidence"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Express a <strong>qualified opinion</strong> when:</p>\n<ol type=\"a\"><li>Having obtained SAAE, the auditor concludes misstatements are <strong>material but not pervasive</strong>; or</li><li>Unable to obtain SAAE, but concludes possible effects of undetected misstatements could be <strong>material but not pervasive</strong>.</li></ol>\n<p><strong>Special Considerations:</strong> when qualifying due to a material misstatement, state that except for the effects of the matter(s) described in the \"Basis for Qualified Opinion\" section:</p>\n<ol><li>Fair presentation framework — the FS present fairly (true and fair view), in accordance with [FRF]; or</li><li>Compliance framework — the FS have been prepared, in all material respects, in accordance with [FRF].</li></ol>\n<p>When the modification arises from an <strong>inability to obtain SAAE</strong>, use the phrase <strong>\"except for the possible effects of the matter(s) ...\"</strong></p>"
      },
      {
        "id": "533b5286-5202-4878-9733-649297b9da12",
        "title": "Adverse (A) Opinion",
        "keywords": [
          {
            "icon": "mask",
            "label": "Material and pervasive misstatements"
          },
          {
            "icon": "brick-wall",
            "label": "'Do not present fairly' wording (fair presentation)"
          },
          {
            "icon": "seesaw",
            "label": "'Have not been prepared' wording (compliance)"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Express an <strong>adverse opinion</strong> when, having obtained SAAE, the auditor concludes misstatements are both <strong>material and pervasive</strong>.</p>\n<p><strong>Special Considerations:</strong> state that, because of the significance of the matter(s) described in the \"Basis for Adverse Opinion\" section:</p>\n<ol><li>Fair presentation framework — the FS <strong>do not present fairly</strong> (or give a true and fair view), in accordance with [FRF]; or</li><li>Compliance framework — the FS <strong>have not been prepared</strong>, in all material respects, in accordance with [FRF].</li></ol>"
      },
      {
        "id": "e06e6c9c-7a27-4c32-a644-cdfc8109c475",
        "title": "Disclaimer of Opinion",
        "keywords": [
          {
            "icon": "shield-check",
            "label": "Unable to obtain SAAE — possible effects material and pervasive"
          },
          {
            "icon": "brick-wall",
            "label": "No KAM section unless required by law"
          },
          {
            "icon": "mask",
            "label": "Does not express an opinion statement"
          },
          {
            "icon": "signature",
            "label": "Amend statement — engaged to audit, not 'has audited'"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor is unable to obtain SAAE, and concludes that the possible effects of undetected misstatements could be both <strong>material and pervasive</strong>.</p>\n<p><strong>Note:</strong> unless required by law/regulation, when disclaiming an opinion, the report shall <strong>not include a KAM section</strong> (SA 701).</p>\n<p><strong>Special Considerations:</strong></p>\n<ol><li>State that the auditor <strong>does not express an opinion</strong> on the FS.</li><li>State that, because of the significance of the matter(s) in the \"Basis for Disclaimer of Opinion\" section, the auditor was <strong>unable to obtain SAAE</strong> to provide a basis for an opinion; and</li><li>Amend the SA 700 statement that FS have been audited, to state the auditor <strong>was engaged to audit</strong> the FS.</li></ol>"
      },
      {
        "id": "f4e7fb81-dd16-4dca-951d-4fda5c381e2c",
        "title": "Basis for Modification of Opinion",
        "keywords": [
          {
            "icon": "warning-triangle",
            "label": "Amend heading to Basis for Qualified/Adverse/Disclaimer"
          },
          {
            "icon": "scroll",
            "label": "Description of the matter in the section"
          },
          {
            "icon": "seesaw",
            "label": "Table — specific amounts/narrative/non-disclosure/inability"
          },
          {
            "icon": "shield-check",
            "label": "Disclaimer omits responsibilities reference and SAAE statement"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>When modifying the opinion, the auditor shall:</p>\n<ol type=\"a\"><li>Amend the heading <strong>\"Basis for Opinion\"</strong> to <strong>\"Basis for Qualified/Adverse/Disclaimer of Opinion\"</strong>, as appropriate; and</li><li>Include, within this section, a <strong>description of the matter</strong> giving rise to the modification.</li></ol>\n<p><strong>What to include, depending on what the material misstatement relates to:</strong></p>\n<ol><li><strong>Specific amounts</strong> (incl. quantitative disclosures) — description and quantification of the financial effects, unless impracticable (if not practicable, so state).</li><li><strong>Narrative disclosures</strong> — explanation of how the disclosures are misstated.</li><li><strong>Non-disclosure of information</strong> — discuss with TCWG; describe the nature of the omitted information; and, unless prohibited, include the omitted disclosures where practicable and SAAE has been obtained about it.</li><li><strong>Inability to obtain SAAE</strong> — reasons for that inability.</li></ol>\n<p>When <strong>disclaiming</strong> an opinion, the report shall not include: reference to the section describing the auditor's responsibilities; and a statement on sufficiency/appropriateness of evidence.</p>\n<p><strong>Note:</strong> even with an adverse/disclaimer opinion, the auditor shall describe in the \"Basis for Opinion\" section the reasons for any <strong>other matters</strong> that would have required modification, and their effects.</p>"
      },
      {
        "id": "9dc48db2-645a-449d-a494-d3c53a1cc8f9",
        "title": "Auditor's Responsibilities — When Disclaiming an Opinion",
        "keywords": [
          {
            "icon": "signature",
            "label": "Responsibility to conduct audit and issue report"
          },
          {
            "icon": "shield-check",
            "label": "Unable to obtain SAAE — basis for disclaimer"
          },
          {
            "icon": "shield",
            "label": "Independence and ethical responsibilities statement"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>When disclaiming an opinion due to inability to obtain SAAE, the auditor shall amend the SA 700 description to include only:</p>\n<ol type=\"a\"><li>A statement that the auditor's responsibility is to conduct an audit as per the SAs, and issue a report.</li><li>A statement that, because of the matter(s) in the \"Basis for Disclaimer of Opinion\" section, the auditor was <strong>unable to obtain SAAE</strong> to provide a basis for an opinion; and</li><li>A statement about auditor <strong>independence</strong> and other ethical responsibilities, required by SA 700.</li></ol>"
      },
      {
        "id": "abfcab97-470b-41f6-ac30-7981d161e3dd",
        "title": "Communication with TCWG",
        "keywords": [
          {
            "icon": "megaphone",
            "label": "Circumstances leading to expected modification"
          },
          {
            "icon": "scroll",
            "label": "Wording of the modification"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>When expecting to modify the opinion, the auditor shall communicate with TCWG:</p>\n<ul><li>The <strong>circumstances</strong> that led to the expected modification; and</li><li>The <strong>wording</strong> of the modification.</li></ul>"
      },
      {
        "id": "0882af1c-f85b-49f2-bd51-468a9908b298",
        "title": "Management-Imposed Limitation After Acceptance",
        "keywords": [
          {
            "icon": "megaphone",
            "label": "Request management to remove limitation"
          },
          {
            "icon": "brick-wall",
            "label": "Communicate with TCWG if refused"
          },
          {
            "icon": "shield-check",
            "label": "Alternative procedures to obtain SAAE"
          },
          {
            "icon": "warning-triangle",
            "label": "Material not pervasive — qualified opinion"
          },
          {
            "icon": "door",
            "label": "Material and pervasive — withdraw or disclaim"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ul><li>If likely to result in a qualified or disclaimer opinion, <strong>request management to remove</strong> the limitation.</li><li>If management refuses, <strong>communicate with TCWG</strong>, and determine whether alternative procedures can obtain SAAE.</li><li>If still unable to obtain SAAE, and possible effects would be <strong>material but not pervasive</strong> → express a <strong>qualified opinion</strong>.</li><li>If possible effects would be <strong>material and pervasive</strong>: <strong>withdraw</strong> from the engagement, where practicable/possible under law; or, where withdrawal is not practicable, <strong>disclaim</strong> an opinion.</li><li>Before withdrawal, communicate to TCWG any matters giving rise to the intended modification.</li></ul>\n<p><strong>Note:</strong> if expressing an adverse or disclaimer opinion, the report shall not contain an unmodified opinion for any element of the FS.</p>"
      },
      {
        "id": "36ba8dd9-a408-4c87-b1b6-5b77baa894fb",
        "title": "SEBI Provisions on Auditor Resignation (Listed Entities)",
        "keywords": [
          {
            "icon": "calendar",
            "label": "Resign within 45 days — LR report for the quarter"
          },
          {
            "icon": "hourglass",
            "label": "Resign after 45 days — report for quarter and next"
          },
          {
            "icon": "clipboard-check",
            "label": "LR issued for first 3 quarters — full year report"
          },
          {
            "icon": "calculator",
            "label": "Example — resignation after 45 days of Q1"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>If resigning within 45 days from quarter-end:</strong> issue a <strong>Limited Review (LR) Report</strong> for such quarter, before resigning.</p>\n<p><strong>If more than 45 days from quarter-end:</strong> issue an Audit/LR Report for such quarter, <strong>and the next one</strong>, before resigning.</p>\n<p><strong>If an LR Report was issued for the first 3 quarters:</strong> issue an <strong>Audit Report for the full year</strong>, before resigning.</p>\n<p><strong>Example:</strong> auditor resigns on 18.08.24 (more than 45 days from Q1 end) → issue an LR Report for <strong>Q1 and Q2</strong>.</p>\n<p>ICAI: an auditor of an unlisted company shall not mention \"professional pre-occupation\" as a resignation reason; reasons must be clearly stated in the resignation letter.</p>"
      },
      {
        "id": "572b703c-a467-4763-a219-77a8a7ec4eb2",
        "title": "Auditor's Inability to Obtain SAAE (Scope Limitation) May Arise From",
        "keywords": [
          {
            "icon": "brick-wall",

            "label": "Nature/timing of auditor's work — equity method/appointment timing"

          {
            "icon": "mask",
            "label": "Limitations imposed by management — inventory/confirmations"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>(a) Circumstances beyond the control of the entity:</strong></p>\n<ul><li>The entity's accounting records have been <strong>destroyed</strong>.</li><li>Records of a significant component <strong>seized indefinitely</strong> by government authorities.<p><strong>(b) Circumstances relating to the nature or timing of the auditor's work:</strong></p></li><li>The entity uses the equity method for an associate, and the auditor cannot obtain SAAE about the latter's financial information.</li><li>Timing of appointment prevents observing the <strong>physical inventory count</strong>.</li><li>Substantive procedures alone are insufficient, but the entity's controls are not effective.<p><strong>(c) Limitations imposed by management:</strong></p></li><li>Management prevents observing the physical inventory count.</li><li>Management prevents requesting external confirmation of specific balances.</li></ul>"
      },
      {

        "title": "Special Points",

        "isSubPart": false,
        "explanationHtml": "<ol type=\"i\"><li>As per SA 570, if a material uncertainty exists and adequate disclosure is not made: <strong>no disclosure at all</strong> → Adverse Opinion; <strong>incomplete disclosure</strong> → Qualified Opinion.</li><li><strong>Non-consolidation of a subsidiary</strong> (material and pervasive) → Adverse Opinion.</li><li>Unable to obtain evidence about a <strong>joint venture investment</strong> (90% of net assets) → Disclaimer of Opinion.</li><li><strong>No agreement</strong> on a loan or advance (material) → Qualified Opinion.</li></ol>"
      }

      {

        "title": "Emphasis of Matter Paragraph",
        "keywords": [
          {
            "icon": "scroll",

          },
          {
            "icon": "spotlight",
            "label": "Fundamental to users' understanding"
          },
          {
            "icon": "flag",
            "label": "SA 210 unacceptable FRF prescribed by law"
          },
          {
            "icon": "megaphone",
            "label": "Special purpose framework alert"
          },
          {
            "icon": "calendar",
            "label": "Subsequent events new/amended report (SA 560)"
          },
          {
            "icon": "binoculars",
            "label": "Examples — litigation/subsequent event/new standard/catastrophe"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>A paragraph included in the auditor's report, referring to a matter <strong>appropriately presented or disclosed</strong> in the FS, that is of such importance that it is <strong>fundamental to users' understanding</strong>.</p>\n<p>SAs with specific requirements to include an EOM paragraph in certain circumstances include:</p>\n<ul><li>When a FRF prescribed by law/regulation would be <strong>unacceptable but for being prescribed</strong> by law/regulation (SA 210).</li><li>To alert users the FS are prepared under a <strong>special purpose framework</strong>.</li><li>When facts become known after the report date and the auditor provides a new/amended report (<strong>subsequent events</strong>, SA 560).<p>Examples where an EOM paragraph may be considered necessary:</p></li><li>An uncertainty relating to the future outcome of exceptional <strong>litigation</strong> or regulatory action.</li><li>A significant <strong>subsequent event</strong> between the FS date and the report date.</li><li>Early application of a new <strong>accounting standard</strong> with a material effect.</li><li>A major <strong>catastrophe</strong> with a significant continuing effect on financial position.</li></ul>"
      },
      {
        "id": "0e1592f2-4908-4c46-9627-8948a5a0e261",
        "title": "When the Auditor Includes an Emphasis of Matter Paragraph",
        "keywords": [
          {
            "icon": "flag",
            "label": "Separate section headed Emphasis of Matter"
          },
          {
            "icon": "compass",
            "label": "Clear reference to matter and disclosure location"
          },
          {
            "icon": "thumb",
            "label": "Indicate opinion is not modified"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall:</p>\n<ol type=\"a\"><li>Include the paragraph within a <strong>separate section</strong> with an appropriate heading including the term \"Emphasis of Matter.\"</li><li>Include a <strong>clear reference</strong> to the matter being emphasized, and where relevant disclosures can be found — referring only to information presented/disclosed in the FS; and</li><li>Indicate that the auditor's opinion is <strong>not modified</strong> in respect of the matter emphasized.</li></ol>\n<p><strong>Note:</strong> an EOM paragraph is <strong>not a substitute for a KAM</strong>; if a matter is determined to be a KAM, it shall be represented as a KAM.</p>"

      {

        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall include an EOM or Other Matter paragraph, provided:</p>\n<ol type=\"a\"><li>It is <strong>not prohibited</strong> by law or regulation; and</li><li>When SA 701 applies, the matter has <strong>not been determined to be a KAM</strong>.</li></ol>"
      },
      {
        "id": "302bb757-e8c0-4fc8-a05f-6fa27f9a8caf",
        "title": "An Emphasis of Matter Paragraph Is Not a Substitute For",
        "keywords": [
          {
            "icon": "warning-triangle",
            "label": "Modified opinion required by circumstances (SA 705)"
          },
          {
            "icon": "scroll",
            "label": "Disclosures required by the FRF for fair presentation"
          },
          {
            "icon": "anchor",
            "label": "Reporting per SA 570 when material uncertainty exists"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ol type=\"a\"><li>A <strong>modified opinion</strong> as per SA 705, when required by the circumstances of the engagement.</li><li><strong>Disclosures</strong> in the FS that the FRF requires management to make, or that are otherwise necessary for fair presentation; or</li><li>Reporting as per <strong>SA 570</strong> (Revised), when a material uncertainty exists.</li></ol>"
      },
      {
        "id": "dda0cfd7-a494-45cd-b34f-5890a802626a",
        "title": "Communication with TCWG",
        "keywords": [
          {
            "icon": "megaphone",
            "label": "Communicate expectation and wording of EOM/Other Matter"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall communicate with TCWG the <strong>expectation and wording</strong> of the Emphasis of Matter or Other Matter paragraph.</p>"
      }
    ]
  },
  {
    "id": "sa710",
    "title": "SA 710",
    "subtitle": "Comparative Information — Corresponding Figures and Comparative Financial Statements",
    "cards": [
      {
        "id": "1830b40c-423f-4a8a-9611-a3ee5fb066ca",
        "title": "Meaning of Comparative Information",
        "keywords": [
          {
            "icon": "folder",
            "label": "Amounts/disclosures for prior periods"
          },
          {
            "icon": "clipboard-check",
            "label": "As per the applicable FRF"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Comparative information:</strong> amounts and disclosures included in the financial statements in respect of one or more prior periods, as per the applicable financial reporting framework (FRF).</p>"
      },
      {
        "id": "0a7fd211-5172-4f53-a050-574638722da8",
        "title": "Audit Procedures for Comparative Information — Basic Procedures",
        "keywords": [
          {
            "icon": "mirror",
            "label": "Agrees with prior period amounts/disclosures"
          },
          {
            "icon": "clipboard-check",
            "label": "Accounting policies consistent with current period"
          },
          {
            "icon": "scroll",
            "label": "Changes properly accounted/presented/disclosed"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall evaluate whether:</p>\n<ol type=\"a\"><li>Comparative information <strong>agrees</strong> with the amounts and other disclosures presented in the prior period; and</li><li>The accounting policies reflected in the comparative information are <strong>consistent</strong> with those applied in the current period, or, if changed, whether the changes have been <strong>properly accounted for, presented, and disclosed</strong>.</li></ol>"
      },
      {
        "id": "3a0d7aef-c9e0-4bf5-947c-0a9988cb316e",
        "title": "Material Misstatement",
        "keywords": [
          {
            "icon": "compass",
            "label": "Additional procedures to determine if misstatement exists"
          },
          {
            "icon": "link-chain",
            "label": "Follow relevant requirements of SA 560 if prior period audited"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ul><li>If the auditor becomes aware of a possible <strong>material misstatement</strong> in the comparative information while performing the current period audit, perform <strong>additional audit procedures</strong> necessary to obtain SAAE to determine whether it exists.</li><li>If the auditor had audited the prior period's FS, also follow the relevant requirements of <strong>SA 560</strong>.</li></ul>"
      },
      {
        "id": "f3b6b9de-6e20-4d35-96ab-f920eada6b5c",
        "title": "Written Representations",
        "keywords": [
          {
            "icon": "signature",
            "label": "WR for all periods referred to in the opinion (SA 580)"
          },
          {
            "icon": "scroll",
            "label": "Specific WR for prior period items in current P&L"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ul><li>As per SA 580, request a <strong>written representation</strong> for all periods referred to in the auditor's opinion.</li><li>Also obtain a <strong>specific written representation</strong> regarding any prior period item separately disclosed in the current year's Profit & Loss account.</li></ul>"
      },
      {
        "id": "d183c096-70f0-4ec4-a08f-15a4f69c1df1",
        "title": "Corresponding Figures — Meaning and Reporting",
        "keywords": [
          {
            "icon": "link-chain",
            "label": "Integral part of current period FS"
          },
          {
            "icon": "ruler",
            "label": "Level of detail dictated by relevance to current figures"
          },
          {
            "icon": "brick-wall",
            "label": "Opinion normally does not refer to corresponding figures"
          },
          {
            "icon": "warning-triangle",
            "label": "Modify opinion if prior modification unresolved"
          },
          {
            "icon": "flag",
            "label": "Modify opinion if prior misstatement unresolved"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Corresponding Figures:</strong> comparative information where prior period amounts/disclosures are included as an <strong>integral part</strong> of the current period's FS, intended to be read only in relation to the current period figures.</p>\n<p>The level of detail presented is dictated primarily by its <strong>relevance to the current period figures</strong>.</p>\n<p><strong>Reporting for Corresponding Figures:</strong> the opinion shall <strong>not refer</strong> to corresponding figures except:</p>\n<ol><li>If the prior period report included a <strong>modified opinion</strong> and the matter is <strong>unresolved</strong>, modify the current period's opinion.</li><li>If evidence shows a <strong>material misstatement</strong> exists in the prior period's FS (unmodified opinion previously issued), verify whether resolved and, if not, express a <strong>qualified or adverse opinion</strong> on the current period.</li></ol>"
      },
      {
        "id": "c5b523f7-d9ba-4900-9032-1f0cf22a8d3e",
        "title": "Basis for Modification Paragraph — Corresponding Figures",
        "keywords": [
          {
            "icon": "link-chain",
            "label": "Refer to both current and corresponding figures"
          },
          {
            "icon": "seesaw",
            "label": "Or explain effect on comparability of the figures"
          }
        ],
        "isSubPart": true,
        "explanationHtml": "<p>In the Basis for Modification paragraph, the auditor shall either:</p>\n<ol type=\"a\"><li>Refer to <strong>both</strong> the current period's figures and the corresponding figures in describing the matter, when the effects on the current period's figures are <strong>material</strong>; or</li><li>In other cases, explain that the opinion is modified because of the effects on the <strong>comparability</strong> of the current period and corresponding figures.</li></ol>"
      },
      {
        "id": "f222e189-1097-44a8-ac6f-99a12469c27b",
        "title": "Reporting for Comparative Financial Statements",
        "keywords": [
          {
            "icon": "calendar",
            "label": "Opinion refers to each period presented"
          },
          {
            "icon": "megaphone",
            "label": "Disclose reason for differing opinion in Other Matter"
          },
          {
            "icon": "footprint",
            "label": "Report material misstatement to management/predecessor"
          },
          {
            "icon": "door",
            "label": "Report only current period if prior FS later amended"
          }
        ],
        "isSubPart": true,
        "explanationHtml": "<ul><li>The opinion shall refer to <strong>each period</strong> for which the financial statements are presented.</li><li>If the auditor's opinion on the prior period differs from the opinion previously issued, disclose the <strong>substantive reason</strong> for the different opinion in an <strong>Other Matter paragraph</strong>.</li><li>If a material misstatement is present in previously audited figures, <strong>report it to management</strong>, and request that the predecessor auditor be informed.</li><li>If, thereafter, prior years' FS are <strong>amended</strong> with a new report by the predecessor auditor, the auditor shall report <strong>only on the current period</strong>.</li></ul>"
      },
      {
        "id": "084552ad-2440-4f3e-9e68-de114e6b863b",
        "title": "Reporting Treatment Common to Both",
        "keywords": [
          {
            "icon": "footprint",
            "label": "Other Matter — predecessor auditor's opinion type/date"
          },
          {
            "icon": "warning-triangle",
            "label": "Other Matter — prior period unaudited"
          },
          {
            "icon": "shield-check",
            "label": "Still responsible for opening balance SAAE"
          }
        ],
        "isSubPart": true,
        "explanationHtml": "<ol type=\"i\"><li>If the prior period FS were audited by a <strong>predecessor auditor</strong>, state in an Other Matter paragraph: that they were audited by a predecessor auditor; the <strong>type of opinion</strong> expressed; and the <strong>date</strong> of that audit report.</li><li>If the prior period FS were <strong>not audited</strong>, report the same in an Other Matter paragraph, stating that the corresponding/comparative figures are unaudited.</li></ol>\n<p><strong>However</strong>, this disclosure does not relieve the auditor of responsibility for obtaining SAAE that <strong>opening balances</strong> do not contain misstatements that materially affect the current period's financial statements.</p>"
      }
    ]
  },
  {
    "id": "sa720",
    "title": "SA 720",
    "subtitle": "The Auditor's Responsibility in Relation to Other Information",
    "cards": [
      {
        "id": "56301c5f-9e49-4cb1-abf5-6f527631041f",
        "title": "Scope",
        "keywords": [
          {
            "icon": "open-book",
            "label": "Other information in the Annual Report"
          },
          {
            "icon": "brick-wall",
            "label": "Opinion does not cover other information"
          },
          {
            "icon": "magnify",
            "label": "Read and consider for material inconsistencies"
          },
          {
            "icon": "hourglass",
            "label": "Applies whether received before or after the report"
          },
          {
            "icon": "door",
            "label": "Does not apply to preliminary announcements/prospectuses"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<ul><li>SA 720 deals with the auditor's responsibilities relating to <strong>other information</strong>, financial or non-financial, contained in the <strong>Annual Report</strong>.</li><li>The auditor's opinion on the FS <strong>does not cover</strong> other information (Annual Report).</li><li>The auditor is required to <strong>read and consider</strong> the other information, for materially inconsistent information that may indicate a material misstatement (MM) in either the FS or the Annual Report.</li><li>This responsibility applies whether the other information is received <strong>prior to, or after</strong>, the auditor's report.</li></ul>\n<p><strong>Note:</strong> this SA does not apply to <strong>preliminary announcements</strong> of financial information, or <strong>prospectuses</strong>.</p>"
      },
      {
        "id": "e666c2c2-b57a-47dd-a2b8-be6e45564507",
        "title": "Obtaining the Other Information",
        "keywords": [
          {
            "icon": "megaphone",
            "label": "Discuss with management which documents comprise the report"
          },
          {
            "icon": "alarm-clock",
            "label": "Arrange timely access to the final version"
          },
          {
            "icon": "signature",
            "label": "Request written representation if unavailable until after"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall:</p>\n<ol type=\"a\"><li>Determine, through discussion with management, which document(s) comprise the annual report, and the entity's planned <strong>manner and timing of issuance</strong>.</li><li>Make arrangements to obtain, in a <strong>timely manner</strong>, if possible prior to the report date, the <strong>final version</strong> of the document(s).</li><li>When the annual report is not available until after the report date, request a <strong>written representation</strong> that the final version will be provided when available, and prior to issuance, so the auditor can complete required procedures.</li></ol>"
      },
      {
        "id": "eaabf4ab-1a27-4e5d-9862-d8f3643ffa8b",
        "title": "Reading and Considering the Other Information",
        "keywords": [
          {
            "icon": "warning-triangle",
            "label": "Consider inconsistency between other info and FS"
          },
          {
            "icon": "graduation-cap",
            "label": "Consider inconsistency with auditor's knowledge from the audit"
          },
          {
            "icon": "spotlight",
            "label": "Remain alert for material misstatement of other information"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall read the other information, considering whether there is a <strong>material inconsistency</strong> between:</p>\n<ul><li>The other information and the <strong>financial statements</strong>; and</li><li>The other information and the auditor's <strong>knowledge obtained in the audit</strong>, in context of evidence obtained and conclusions reached.</li></ul>\n<p>While reading, the auditor shall <strong>remain alert</strong> for indications that the other information may be materially misstated.</p>"
      },
      {
        "id": "66cfc9db-e2e2-4058-b7f4-a77eff4ab117",
        "title": "Responding When a Material Inconsistency Appears to Exist",
        "keywords": [
          {
            "icon": "megaphone",
            "label": "Discuss the matter with management"
          },
          {
            "icon": "magnify",
            "label": "Conclude whether other info/FS is misstated"
          },
          {
            "icon": "compass",
            "label": "Or update the auditor's understanding of the entity"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor shall discuss the matter with management and, if necessary, perform other procedures to conclude whether:</p>\n<ol type=\"a\"><li>A <strong>material misstatement of the other information</strong> exists.</li><li>A <strong>material misstatement of the financial statements</strong> exists; or</li><li>The auditor's <strong>understanding of the entity and its environment</strong> needs to be updated.</li></ol>"
      },
      {
        "id": "8409f519-0930-464f-9678-d5f3574e4af2",
        "title": "When the Other Information Is Materially Misstated",
        "keywords": [
          {
            "icon": "megaphone",
            "label": "Request management to correct the information"
          },
          {
            "icon": "thumb",
            "label": "Agrees — determine correction has been made"
          },
          {
            "icon": "brick-wall",
            "label": "Refuses — communicate with TCWG"
          },
          {
            "icon": "door",
            "label": "Not corrected before report date — implications/withdrawal"
          },
          {
            "icon": "spotlight",
            "label": "Not corrected after report date — bring to users' attention"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>If a material misstatement of the other information exists, request management to <strong>correct</strong> it.</p>\n<p><strong>If management:</strong></p>\n<ol type=\"a\"><li><strong>Agrees</strong> to correct — determine that the correction has been made; or</li><li><strong>Refuses</strong> — communicate the matter with TCWG, and request the correction be made.</li></ol>\n<p><strong>If a misstatement exists in other information obtained prior to the report date</strong>, and is not corrected after communicating with TCWG, take appropriate action, including:</p>\n<ol type=\"a\"><li>Considering the implications for the auditor's report, and communicating with TCWG about how it will be addressed; or</li><li><strong>Withdrawing</strong> from the engagement, where possible under applicable law.</li></ol>\n<p><strong>If a misstatement exists in other information obtained after the report date:</strong></p>\n<ol type=\"a\"><li>If corrected, perform necessary procedures; or</li><li>If not corrected after communicating with TCWG, take appropriate action to seek to have the uncorrected misstatement <strong>brought to the attention of users</strong>, considering legal rights/obligations.</li></ol>"
      },
      {
        "id": "c7a49741-ac21-4063-932c-1a02cc17aea0",
        "title": "When the FS Are Materially Misstated, or Understanding Needs Updating",
        "keywords": [
          {
            "icon": "compass",
            "label": "Respond per other relevant SAs"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>Respond as per the <strong>other relevant SAs</strong>.</p>"
      },
      {
        "id": "89d5397b-3aae-48a3-b813-7f8520253381",
        "title": "Reporting",
        "keywords": [
          {
            "icon": "flag",
            "label": "Separate Other Information section required"
          },
          {
            "icon": "signature",
            "label": "Statement management is responsible for other information"
          },
          {
            "icon": "calendar",
            "label": "Identify information obtained before/expected after report date"
          },
          {
            "icon": "brick-wall",
            "label": "Statement opinion does not cover other information"
          },
          {
            "icon": "scroll",
            "label": "Nothing to report, or describe uncorrected misstatement"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>The auditor's report shall include a separate section headed <strong>\"Other Information,\"</strong> when, at the report date:</p>\n<ol type=\"a\"><li>For a <strong>listed entity</strong>, the auditor has obtained or expects to obtain other information; or</li><li>For an <strong>unlisted corporate entity</strong>, the auditor has obtained some or all of the other information.</li></ol>\n<p>The Other Information section shall include:</p>\n<ol type=\"a\"><li>A statement that <strong>management is responsible</strong> for the other information.</li><li>Identification of: (i) other information obtained <strong>prior to</strong> the report date; and (ii) for listed entities, other information, if any, expected to be obtained <strong>after</strong> the report date.</li><li>A statement that the opinion <strong>does not cover</strong> the other information, and no assurance conclusion is expressed thereon.</li><li>A description of the auditor's <strong>responsibilities</strong> relating to reading, considering, and reporting on other information.</li><li>Where information was obtained prior to the report date, either: (i) a statement of <strong>nothing to report</strong>; or (ii) if an uncorrected material misstatement is concluded, a statement <strong>describing</strong> it.</li></ol>"
      },
      {
        "id": "9a6828dd-b900-4d76-973f-d5e0ef11b46f",
        "title": "Reporting Prescribed by Law or Regulation",
        "keywords": [
          {
            "icon": "id-card",
            "label": "Identification of other information obtained before report date"
          },
          {
            "icon": "scroll",
            "label": "Description of auditor's responsibilities"
          },
          {
            "icon": "megaphone",
            "label": "Explicit statement of the outcome of the auditor's work"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p>If required by law/regulation to refer to other information using a <strong>specific layout or wording</strong>, the report shall refer to this SA only if it includes, at minimum:</p>\n<ol type=\"a\"><li>Identification of the other information obtained <strong>prior to</strong> the report date.</li><li>A description of the auditor's <strong>responsibilities</strong> regarding other information; and</li><li>An <strong>explicit statement</strong> addressing the outcome of the auditor's work for this purpose.</li></ol>"
      },
      {
        "id": "50536f33-9cd0-47ab-9d6d-52ae7264f5e4",
        "title": "Examples of Amounts or Other Items Included in Other Information",
        "keywords": [
          {
            "icon": "calculator",
            "label": "Key financial results — net income/EPS/dividends/sales"
          },
          {
            "icon": "puzzle",
            "label": "Selected operating data/segment information"
          },
          {
            "icon": "scale",
            "label": "Special items — dispositions/litigation/impairments"
          },
          {
            "icon": "anchor",
            "label": "Liquidity and capital resource information"
          },
          {
            "icon": "thermometer",
            "label": "Financial measures/ratios"
          },
          {
            "icon": "crystal-ball",
            "label": "Critical accounting estimates and related parties"
          },
          {
            "icon": "umbrella",
            "label": "Off-balance sheet arrangements/guarantees/contingencies"
          },
          {
            "icon": "compass",
            "label": "Regulatory changes/business environment/strategy"
          }
        ],
        "isSubPart": false,
        "explanationHtml": "<p><strong>Amounts:</strong></p>\n<ul><li>Items in a summary of key financial results — net income, EPS, dividends, sales/operating revenues, purchases/operating expenses.</li><li>Selected operating data — income by major operating area, or sales by geographic segment/product line.</li><li>Special items — asset dispositions, litigation provisions, asset impairments, tax adjustments, environmental remediation, restructuring/reorganization expenses.</li><li>Liquidity and capital resource information — cash/equivalents, marketable securities, dividends, debt, capital lease, minority interest.</li><li>Capital expenditures by segment/division.</li><li>Off-balance sheet arrangements and related financial effects.</li><li>Guarantees, contractual obligations, legal/environmental claims, other contingencies.</li><li>Financial measures/ratios — gross margin, return on capital/equity, current ratio, interest coverage, debt ratio.<p><strong>Other items:</strong></p></li><li>Explanations of critical accounting estimates and related assumptions.</li><li>Identification of related parties and descriptions of transactions with them.</li><li>Descriptions of off-balance sheet arrangement nature.</li><li>Descriptions of guarantees, indemnifications, contractual obligations, litigation/environmental liability, and management's qualitative assessments of related exposures.</li><li>Descriptions of changes in legal/regulatory requirements — e.g. new tax or environmental regulations.</li><li>General descriptions of the business environment and outlook.</li><li>Overview of strategy.</li></ul>"
      }
    ]
  }
]</script>

// Retries a Supabase write a few times (short backoff) before giving up —
// covers ordinary transient blips (a dropped connection, a slow response)
// without needing any user action. Pass a function that performs the write
// and resolves to Supabase's usual `{ error }` shape; returns `{ ok, error }`.
async function withRetry(fn, attempts = 3){
  let lastError = null;
  for (let i = 0; i < attempts; i++){
    const { error } = await fn();
    if (!error) return { ok:true };
    lastError = error;
    if (i < attempts - 1) await new Promise(r => setTimeout(r, 600 * (i + 1)));
  }
  return { ok:false, error: lastError };
}
// A student's own progress (per-card confidence/importance/spaced-repetition

// reached Supabase. Since that's exactly the class of bug that silently
// broke admin saves earlier (see saveDeckContent's history), the same
// protection belongs here: each of those writes now goes through
// withRetry, and if a write still fails after retrying, it's recorded here
// (with a callback to retry it again) and surfaced as a small dismissible
// banner on the dashboard — better than a student's streak quietly not
// being there tomorrow with no explanation.
let studentSyncIssues = []; // [{ id, message, retry: async () => void }]
// Both return whether the visible set of issues actually changed, so callers
// only re-render when something the student would see has changed — not on
// every single successful background save, which would otherwise re-render
// the whole app (losing scroll position, interrupting a study session mid-
// transition) on every ordinary confidence tap.
function reportSyncIssue(id, message, retry){
  const before = studentSyncIssues.length;
  studentSyncIssues = studentSyncIssues.filter(i => i.id !== id);
  studentSyncIssues.push({ id, message, retry });

}
function clearSyncIssue(id){
  const before = studentSyncIssues.length;
  studentSyncIssues = studentSyncIssues.filter(i => i.id !== id);

}

// Types `text` into `el` one character at a time, with a brief pause right
// before the very last character (which is the "Z" in "AuditZ").
function typeGreeting(el, text, speed, pauseBeforeLast){
  speed = speed || 45;
  pauseBeforeLast = pauseBeforeLast === undefined ? 550 : pauseBeforeLast;
  el.textContent = '';
  el.classList.add('typing');
  let i = 0;
  function step(){
    if (i < text.length - 1){
      el.textContent += text[i];
      i++;
      setTimeout(step, speed);
    } else if (i === text.length - 1){
      setTimeout(()=>{
        el.textContent += text[i];
        i++;
        el.classList.remove('typing');
      }, pauseBeforeLast);
    }
  }
  if (text.length) step();
}

function isValidEmail(email){

function isValidPhone(phone){
  // Requires exactly 10 digits. Strips a leading "+91"/"91" country code (and
  // any spaces/dashes) first, so "9876543210", "+91 98765 43210", and
  // "91-9876543210" all validate the same underlying 10-digit number.
  let digits = phone.replace(/\D/g, '');
  if (digits.length === 12 && digits.startsWith('91')) digits = digits.slice(2);
  return /^[\d\s\-()+]+$/.test(phone) && digits.length === 10;
}

// ── Cross-deck card linking ─────────────────────────────────────────────────
// Cards don't otherwise have a stable identity (they're addressed everywhere
// else by deckIndex/cardIndex, which shift whenever an admin reorders or
// deletes a card in "Manage cards"). Links need to survive that, so every
// card gets a stable `id` the first time it's seen, and links are stored —
// and always looked up — by {deckId, cardId} pairs, never by position.
function generateId(){
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'c_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,10);
}
// Backfills a stable id onto any card that doesn't have one yet (older decks,
// or decks that have never round-tripped through Supabase). Returns the ids
// of every deck that received at least one new id, so the caller can decide
// whether those decks need saving back (only admins can write deck_content).
function ensureCardIds(){
  const touchedDeckIds = [];
  DECKS.forEach(deck=>{
    let changed = false;
    deck.cards.forEach(card=>{
      if (!card.id){ card.id = generateId(); changed = true; }
    });
    if (changed) touchedDeckIds.push(deck.id);
  });
  return touchedDeckIds;
}
// Resolves a {deckId, cardId} link reference back to a live deckIndex/cardIndex,
// or null if the target deck/card no longer exists (e.g. deleted after linking).
function findCardRef(deckId, cardId){
  const deckIndex = DECKS.findIndex(d=>d.id===deckId);
  if (deckIndex === -1) return null;
  const deck = DECKS[deckIndex];
  const cardIndex = deck.cards.findIndex(c=>c.id===cardId);
  if (cardIndex === -1) return null;
  return { deckIndex, cardIndex, deck, card: deck.cards[cardIndex] };
}
// Every linked card for the given card, resolved to live refs. Broken links
// (the target was deleted since linking) are silently dropped rather than
// shown or allowed to crash the "Linked cards" flyout.
function getLinkedCardRefs(card){
  if (!card || !card.links || !card.links.length) return [];
  return card.links.map(l=>findCardRef(l.deckId, l.cardId)).filter(Boolean);
}
// Links are always bidirectional — if A links to B, B also links back to A —
// since a conceptual connection between two topics is symmetric either way
// a student encounters it.
function linkCards(cardA, deckAId, cardB, deckBId){
  cardA.links = cardA.links || [];
  cardB.links = cardB.links || [];
  if (!cardA.links.some(l=>l.deckId===deckBId && l.cardId===cardB.id)) cardA.links.push({deckId:deckBId, cardId:cardB.id});
  if (!cardB.links.some(l=>l.deckId===deckAId && l.cardId===cardA.id)) cardB.links.push({deckId:deckAId, cardId:cardA.id});
}
function unlinkCards(cardA, cardB){
  if (cardA.links) cardA.links = cardA.links.filter(l=>l.cardId!==cardB.id);
  if (cardB.links) cardB.links = cardB.links.filter(l=>l.cardId!==cardA.id);
}
// Moves a card out of one deck and into another. The card's own id never
// changes, but every OTHER card that links back to it stores the reciprocal
// link as {deckId, cardId} — and that deckId is now stale (still the OLD
// deck), which would make findCardRef() silently fail to resolve the link
// and quietly break it. So every reciprocal link is repointed at the new
// deck id before saving. isSubPart is reset since "continues the card above"
// only meant something relative to its old neighbors in the old deck.
//
// Important, deliberate tradeoff: per-student progress (card_meta —
// confidence tag, admin-importance-override lookup fallback, spaced-
// repetition due date/revision count) is keyed by
// (user_id, deck_id, card_index), NOT by this card's stable id. Moving a
// card changes both of those, so every existing student's saved progress
// for this specific card is orphaned by the move — there's no safe way to
// carry it over, because the RLS policy deliberately does not grant admin
// write access to other students' card_meta rows (only a read-only bypass).
// Accepted as an unavoidable side effect of the move feature, not a bug.
async function moveCardToDeck(sourceDeck, sourceCi, targetDeck){
  const card = sourceDeck.cards[sourceCi];
  const touchedDeckIds = new Set([sourceDeck.id, targetDeck.id]);

  getLinkedCardRefs(card).forEach(ref=>{
    (ref.card.links || []).forEach(l=>{
      if (l.cardId === card.id) l.deckId = targetDeck.id;
    });
    touchedDeckIds.add(ref.deck.id);
  });

  card.isSubPart = false;
  sourceDeck.cards.splice(sourceCi, 1);
  targetDeck.cards.push(card);

  const results = [];
  for (const id of touchedDeckIds){
    results.push(await saveAndTrack(id));
  }
  const failed = results.find(r=>!r.ok);
  return failed || { ok:true };
}

// ── Automatic card numbering (1, 2, 2a, 2b, 3, …) ───────────────────────────
// Card numbers are never typed by the admin — they're computed live from each
// card's position plus a single `isSubPart` flag ("this card continues the
// previous card's number as a lettered sub-part"). Reordering, adding, or
// deleting cards renumbers everything automatically; the admin only ever
// toggles whether a given card is a fresh number or a sub-part of the one
// before it.
// A "group" is one main card plus every consecutive card after it marked
// isSubPart — the unit that both numbering and index-reordering treat as a
// single movable block (see renderManageIndex / moveGroupToPosition).
function getCardGroups(deck){
  const cards = deck.cards;
  const groups = [];
  let i = 0;
  while (i < cards.length){
    let j = i + 1;
    while (j < cards.length && cards[j].isSubPart) j++;
    groups.push({ startIndex: i, size: j - i });
    i = j;
  }
  return groups;
}
// If a group has no sub-parts, its one card gets a plain number ("2."). If a
// group DOES have sub-parts, the whole group — including the leading card
// that would otherwise be the bare-numbered anchor — is lettered from "a"
// (e.g. "2a.", "2b.", "2c…") so the plain number never appears standalone
// once any card is marked as a sub-part of it.
function getCardNumbers(deck){
  const numbers = new Array(deck.cards.length);
  let mainNum = 0;
  getCardGroups(deck).forEach(g=>{
    mainNum++;
    if (g.size === 1){
      numbers[g.startIndex] = `${mainNum}.`;
    } else {
      for (let k = 0; k < g.size; k++){
        numbers[g.startIndex + k] = `${mainNum}${String.fromCharCode(97 + k)}.`;
      }
    }
  });
  return numbers;
}
// Moves an entire group (identified by its current startIndex) so it becomes
// the group at 0-based position `targetGroupPos` among all groups. Sub-part
// chains always move together — this is the only reordering primitive the
// Index screen's sliders use, so a group can never be split apart by a drag.
function moveGroupToPosition(deck, groupStartIndex, targetGroupPos){
  const groups = getCardGroups(deck);
  const gi = groups.findIndex(g => g.startIndex === groupStartIndex);
  if (gi === -1) return;
  const slice = deck.cards.splice(groups[gi].startIndex, groups[gi].size);
  const remainingGroups = getCardGroups(deck);
  const clampedTarget = Math.max(0, Math.min(targetGroupPos, remainingGroups.length));
  const insertAt = clampedTarget >= remainingGroups.length
    ? deck.cards.length
    : remainingGroups[clampedTarget].startIndex;
  deck.cards.splice(insertAt, 0, ...slice);
}
function cardNumber(deck, ci){ return getCardNumbers(deck)[ci] || ''; }
// Combines the computed number with the card's own (number-free) title —
// the standard way to show a card's full heading anywhere in the app.
function numberedTitle(deck, ci){
  const card = deck.cards[ci];
  return `${cardNumber(deck, ci)} ${card.title}`;
}
// Optional small, faded "lead-in" line shown above a card's main heading —
// e.g. a plain-language teaser before the formal question. Purely optional:
// renders nothing when the card has no storyline text set.
function storylineHtml(deck, ci){
  const card = deck.cards[ci];
  if (!card.storyline || !card.storyline.trim()) return '';
  return `<span class="card-storyline">${esc(card.storyline)}</span>`;
}
// One-time cleanup for decks whose card titles still carry the OLD, manually
// typed "1. " / "2a. " style prefixes (every deck shipped before this
// feature). Strips the prefix into the new isSubPart flag so the exact same
// numbers reappear — just computed instead of typed — and is naturally a
// no-op on any deck that's already been migrated, since migrated titles no
// longer match the prefix pattern. Returns the ids of decks that changed, so
// the caller can decide whether to persist (only the admin's session does).
const LEGACY_NUMBER_PREFIX = /^(\d+)([a-zA-Z]?)\.\s+(.*)$/s;
function ensureCardNumberingMigrated(){
  const touchedDeckIds = [];
  DECKS.forEach(deck=>{
    let changed = false;
    deck.cards.forEach(card=>{
      const m = typeof card.title === 'string' && card.title.match(LEGACY_NUMBER_PREFIX);
      if (m){
        card.title = m[3];
        card.isSubPart = !!m[2];
        changed = true;
      }
    });
    if (changed) touchedDeckIds.push(deck.id);
  });
  return touchedDeckIds;
}

// ── Deck content overrides (admin edits — descriptions, cards, keywords), ──
// ── shared across all users via a single JSON blob per deck ────────────────
// Whenever admin adds/removes/reorders a card, edits its title or description,
// or adds/removes/edits/reorders a keyword, the ENTIRE current cards array for
// that deck is written back to Supabase. Every visitor loads these overrides on
// login/page-load, so changes are visible to everyone immediately.
async function loadDeckContent(){
  const { data, error } = await sb.from('deck_content').select('*');
  if (error || !data) return;
  data.forEach(row=>{
    const deck = DECKS.find(d=>d.id===row.deck_id);
    if (!deck) return;
    if (Array.isArray(row.cards)) deck.cards = row.cards;
    // `title` is an optional column — older deck_content rows (or a Supabase
    // project that hasn't run the migration yet) simply won't have it, in
    // which case the deck keeps its statically-shipped title.
    if (typeof row.title === 'string' && row.title.trim()) deck.title = row.title;
  });
}
// Every save writes both `cards` and `title` together, regardless of which
// one actually changed — that way renaming a deck (renameDeck) and editing
// its cards both go through this single choke point and neither ever
// clobbers the other on the next upsert.
//
// IMPORTANT: this always resolves to a { ok, error? } result instead of
// throwing or silently swallowing failures — every caller in Manage cards
// checks it and surfaces a visible banner on failure (see reportSaveResult).
// A Supabase project that hasn't added the optional `deck_content.title`
// column yet would otherwise reject the WHOLE upsert (unknown column), which
// used to silently break saving for every field, not just the title — that
// was a real bug. Now it retries once without `title` so card/keyword/link/
// importance edits keep saving even if that one column is missing.
async function saveDeckContent(deckId){
  const deck = DECKS.find(d=>d.id===deckId);
  if (!deck) return { ok:false, error:'Deck not found' };
  let { error } = await sb.from('deck_content').upsert({ deck_id: deckId, cards: deck.cards, title: deck.title });
  if (error){
    console.error('saveDeckContent failed (with title):', error.message);
    const retry = await sb.from('deck_content').upsert({ deck_id: deckId, cards: deck.cards });
    error = retry.error;
    if (error) console.error('saveDeckContent failed (without title):', error.message);
    else console.warn('Deck rename will not sync to other users until the deck_content.title column is added — cards/keywords/links/importance saved fine.');
  }
  if (error) return { ok:false, error: error.message };
  return { ok:true };
}
// Renames a deck in place. The new name is visible to every student the
// moment this admin's session saves it — same deck_content sync as every
// other admin edit, no separate table or SQL migration needed beyond the
// deck_content.title column (see loadDeckContent's graceful fallback above).
function renameDeck(deckId, newTitle){
  const deck = DECKS.find(d=>d.id===deckId);
  if (!deck) return;
  const trimmed = newTitle.trim();
  deck.title = trimmed || deck.title;
}
// Retained as a general "close any open admin editor" reset used across
// navigation transitions (goHome, startDeck, logout, stage-step clicks, etc.)
// so an open editor never leaks into a different screen.
function stopEditing(){ savedEditRange = null; manageOpenDescCi = null; manageOpenLinksCi = null; }
// Saves a deck's content and keeps the shared save-status banner (both the
// module-level flag and, if present, the live DOM element) in sync — used by
// every save call site in Manage cards / Index so a failure is never silent.
async function saveAndTrack(deckId){
  const result = await saveDeckContent(deckId);
  manageLastSaveError = result.ok ? null : result.error;
  const statusEl = document.getElementById('mc-save-status');
  if (statusEl){
    if (result.ok){
      statusEl.textContent = '✓ All changes saved';
      statusEl.className = 'mc-save-status ok';
    } else {
      statusEl.textContent = `⚠ Not saved — ${result.error}. Click "Save all changes" to retry.`;
      statusEl.className = 'mc-save-status error';
    }
  }
  return result;
}

function sessionBreakdownHtml(cards){
  const counts = {weak:0, mid:0, strong:0};
  cards.forEach(c => { if (c.confidence) counts[c.confidence]++; });
  const confDots = {weak:'conf-dot-weak', mid:'conf-dot-mid', strong:'conf-dot-strong'};

// Bolds and reddens (a) anything the admin wrote inside <angle brackets> and
// (b) any occurrence of the card's own keyword terms, inside the rendered
// (non-edit) description. Runs on live DOM text nodes only, so it never
// touches real markup the admin already applied (bold/italic/color/lists).
function highlightExplainKeywords(deck, ci){
  const container = document.querySelector('.explain');
  if (!container) return;
  const labels = (deck.cards[ci].keywords || []).map(k=>k.label).filter(Boolean)
    .slice().sort((a,b)=>b.length-a.length)
    .map(l=>l.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
  const alternatives = ['<([^<>]{1,80})>'];
  if (labels.length) alternatives.push(`(?<![\\w])(?:${labels.join('|')})(?![\\w])`);
  const re = new RegExp(alternatives.join('|'), 'gi');

  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null);
  const textNodes = [];
  let node;
  while ((node = walker.nextNode())) textNodes.push(node);

  textNodes.forEach(textNode=>{
    const text = textNode.nodeValue;
    re.lastIndex = 0;
    if (!re.test(text)) return;
    re.lastIndex = 0;
    const frag = document.createDocumentFragment();
    let lastIndex = 0, m;
    while ((m = re.exec(text))){
      if (m.index > lastIndex) frag.appendChild(document.createTextNode(text.slice(lastIndex, m.index)));
      const inner = m[1] !== undefined ? m[1] : m[0];
      const b = document.createElement('b');
      b.className = 'kw-highlight';
      b.textContent = inner;
      frag.appendChild(b);
      lastIndex = m.index + m[0].length;
      if (m[0].length === 0) re.lastIndex++;
    }
    if (lastIndex < text.length) frag.appendChild(document.createTextNode(text.slice(lastIndex)));
    textNode.parentNode.replaceChild(frag, textNode);
  });
}

// Tracks the current text selection inside the edit canvas, since clicking a
// toolbar button (especially the native color-picker input) can otherwise steal
// focus and lose the user's selection before the format command runs.
let savedEditRange = null;
function trackEditSelection(canvas){
  const sel = window.getSelection();
  if (sel && sel.rangeCount > 0){
    const range = sel.getRangeAt(0);
    if (canvas.contains(range.commonAncestorContainer)) savedEditRange = range.cloneRange();
  }
}
function restoreEditSelection(){
  if (!savedEditRange) return;
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(savedEditRange);
}

// Turns the current selection into an ordered list styled with the given HTML
// `type` ("a" for a/b/c…, "i" for i/ii/iii…). If the selection is already
// inside an <ol>, that list is simply re-typed rather than toggled off, so
// clicking between "1. List" / "a. List" / "i. List" switches styles in place.
function applyOrderedListType(canvas, type){
  function closestOl(node){
    while (node && node !== canvas){
      if (node.nodeName === 'OL') return node;
      node = node.parentNode;
    }
    return null;
  }
  const sel = window.getSelection();
  let ol = sel.anchorNode ? closestOl(sel.anchorNode) : null;
  if (!ol){
    document.execCommand('insertOrderedList', false, null);
    const sel2 = window.getSelection();
    ol = sel2.anchorNode ? closestOl(sel2.anchorNode) : null;
  }
  if (ol) ol.setAttribute('type', type);
}

// Called once we have a live Supabase session (after signup, login, or on
// page load when a session is already stored). Populates the in-memory
// caches every render function reads from, then draws the app.
async function onAuthSuccess(session){
  currentUser = session.user.email;
  currentUserId = session.user.id;
  authError = '';
  authDraft = { name: '', phone: '', examAttempt: '', dailyTarget: '20', email: '', password: '' };
  greetingAnimated = false;
  await fetchMyProfile();
  await loadAdminProfiles();
  await loadDeckContent();
  // Backfill ids/numbering right here, immediately after THIS function's own
  // loadDeckContent() — not before calling onAuthSuccess — and persist from
  // this exact state. This function is the last thing to touch deck.cards
  // before render(), and it's called from three places (signup, login, and
  // the returning-session path in init()); backfilling anywhere else meant
  // this function's own fetch would silently overwrite the in-memory ids
  // before they were ever saved, so legacy cards that were never
  // individually edited could never get a permanent id — which in turn
  // broke cross-deck card linking (two cards with the same missing id look
  // like "the same card" to the linker and both get hidden from the
  // picker).
  const decksNeedingIdBackfill = ensureCardIds();
  const decksNeedingNumberMigration = ensureCardNumberingMigrated();
  const decksToPersist = [...new Set([...decksNeedingIdBackfill, ...decksNeedingNumberMigration])];
  // Only the admin's session persists freshly-backfilled card ids / migrated
  // numbering — everyone else just gets them in-memory for this session,
  // which is enough to render correctly but avoids letting a regular
  // student's browser write to deck_content.
  if (isAdmin() && decksToPersist.length){
    for (const deckId of decksToPersist) await saveDeckContent(deckId);
  }
  await fetchCardMeta();
  await loadSrConfig();
  await loadExamAttemptsConfig();
  await fetchDailyProgress();
  await fetchRecentActivity();
  render();
}

  authDraft = { name: '', phone: '', examAttempt: '', dailyTarget: '20', email: '', password: '' };
  greetingAnimated = false;

  dailyProgress = { date: null, count: 0 };

  examAttemptsConfig = {};
  state.deckIndex = -1; state.mode = null; state.cardIndex = 0; state.stage = 'question';
  state.perCard = [];
  state.filterActive = false; state.filterCards = []; state.filterCursor = 0;
  state.manageDeckIndex = -1; state.manageIndexOpen = false; state.sessionSubmitted = false; state.srSession = null;
  state.accountSettingsOpen = false; state.summaryReview = null;
  state.guideOpen = false; state.guideTab = 'why';
  renderAuth();
}

// ── Card metadata (importance + confidence) ───────────────────────────────────
let cardMeta = {};
function getMetaKey(di, ci){ return `${DECKS[di].id}_${ci}`; }
// Merges the user's own tags with the admin's default importance for this card
// (card.adminImportance, set from "Manage cards"). The user's own choice always
// wins once they've made one; until then, the admin's default is what shows
// and counts everywhere (study screens, the matrix, "unreviewed" filtering).
// `importanceIsDefault` tells the UI whether what's showing is the admin's
// default (so it can hint "tap to change") or the user's own pick.
function getCardMeta(di, ci){
  const own = cardMeta[getMetaKey(di,ci)] || {};
  const card = DECKS[di] && DECKS[di].cards[ci];
  const adminDefault = card ? card.adminImportance : undefined;
  const importance = own.importance || adminDefault || undefined;
  return {
    importance,
    confidence: own.confidence,
    importanceIsDefault: !own.importance && !!adminDefault,
    srDueDate: own.srDueDate || undefined,       // ISO 'YYYY-MM-DD' — next spaced-repetition due date, or undefined if never reviewed yet (not yet eligible for spaced repetition)
    srRevisionCount: own.srRevisionCount || 0,     // how many spaced-repetition revisions completed so far
  };
}
function setCardMeta(di, ci, updates){
  const k = getMetaKey(di,ci);
  const prev = cardMeta[k] || {};
  cardMeta[k] = {...prev, ...updates};
  // The very first confidence rating a card ever receives (outside of an
  // active spaced-repetition session, which advances its own schedule via
  // advanceSrSchedule once the card is already in rotation) seeds that card's
  // first spaced-repetition due date straight from the rating just given —
  // 1/2/3 days out by default for weak/mid/strong — instead of leaving the
  // card "due immediately" the moment it's tagged.
  if (updates.confidence && updates.srDueDate === undefined && !prev.srDueDate && !state.srSession){
    const table = srConfig[updates.confidence] || srConfig.weak;
    cardMeta[k].srRevisionCount = 1;
    cardMeta[k].srDueDate = addDaysISO(todayISO(), table[0]);
  }
  persistCardMeta(di, ci, cardMeta[k]); // fire-and-forget background sync
}
async function persistCardMeta(di, ci, meta){
  if (!currentUserId) return;
  const deckId = DECKS[di].id;
  const write = () => sb.from('card_meta').upsert({
    user_id: currentUserId,
    deck_id: deckId,
    card_index: ci,
    importance: meta.importance || null,
    confidence: meta.confidence || null,
    sr_due_date: meta.srDueDate || null,
    sr_revision_count: meta.srRevisionCount || 0,
  });
  const issueId = `card_meta:${deckId}:${ci}`;
  async function attempt(){
    const result = await withRetry(write);
    const changed = result.ok
      ? clearSyncIssue(issueId)
      : reportSyncIssue(issueId, "Some of your card progress couldn't sync.", attempt);
    if (!result.ok) console.error('persistCardMeta failed:', result.error.message);
    if (changed) render();
  }
  await attempt();
}
async function fetchCardMeta(){
  cardMeta = {};
  if (!currentUserId) return;
  const { data, error } = await sb.from('card_meta').select('*').eq('user_id', currentUserId);
  if (error || !data) return;
  data.forEach(row=>{
    const deck = DECKS.find(d=>d.id===row.deck_id);
    if (!deck) return;
    const di = DECKS.indexOf(deck);
    cardMeta[getMetaKey(di, row.card_index)] = {
      importance: row.importance || undefined,
      confidence: row.confidence || undefined,
      srDueDate: row.sr_due_date || undefined,
      srRevisionCount: row.sr_revision_count || 0,
    };
  });
}

// ── Spaced repetition ────────────────────────────────────────────────────────
// Revision schedule: for a response given in the revision just completed, how
// many days until the *next* revision is due. Index 0 = after the 1st
// revision, index 1 = after the 2nd, etc. Admin-editable; shared by everyone
// via a single row in `spaced_repetition_config`. Falls back to this default
// (matching the numbers the admin was given) until that row loads, and if it
// never loads (e.g. the table doesn't exist yet in Supabase).
let srConfig = {
  weak:   [1, 2, 4, 7, 14, 30, 45],
  mid:    [2, 4, 7, 14, 30, 60, 90],
  strong: [3, 7, 14, 30, 60, 100, 150],
};
async function loadSrConfig(){
  const { data, error } = await sb.from('spaced_repetition_config').select('*').eq('id','default').maybeSingle();
  if (!error && data && data.schedule && data.schedule.weak && data.schedule.mid && data.schedule.strong){
    srConfig = data.schedule;
  }
}
async function saveSrConfig(){
  const { error } = await sb.from('spaced_repetition_config').upsert({ id: 'default', schedule: srConfig });
  if (error){
    console.error('saveSrConfig failed:', error.message);
    return { ok:false, error: error.message };
  }
  return { ok:true };
}

function todayISO(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addDaysISO(iso, days){
  const d = new Date(iso + 'T00:00:00Z');
  d.setUTCDate(d.getUTCDate() + days);
  return d.toISOString().slice(0,10);
}
function formatDisplayDate(iso){
  const d = new Date(iso + 'T00:00:00Z');
  return d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric', timeZone:'UTC' });
}

// ── Exam attempt configuration (admin-set exact date + motivational message ──
// per attempt), shared by everyone via one row per attempt in
// `exam_attempts_config`. Keyed by attempt key (see EXAM_ATTEMPTS above).
let examAttemptsConfig = {}; // key -> {examDate, motivationalMessage}
async function loadExamAttemptsConfig(){
  const { data, error } = await sb.from('exam_attempts_config').select('*');
  if (error || !data) return;
  const next = {};
  data.forEach(row=>{
    next[row.id] = { examDate: row.exam_date || null, motivationalMessage: row.motivational_message || '' };
  });
  examAttemptsConfig = next;
}
async function saveExamAttemptsConfig(draft){
  const rows = EXAM_ATTEMPTS.map(a => ({
    id: a.key,
    exam_date: (draft[a.key] && draft[a.key].examDate) || null,
    motivational_message: (draft[a.key] && draft[a.key].motivationalMessage) || '',
  }));
  const { error } = await sb.from('exam_attempts_config').upsert(rows);
  if (error){
    console.error('saveExamAttemptsConfig failed:', error.message);
    // Deliberately NOT updating examAttemptsConfig here — doing so used to
    // make the admin's own screen show the new values as if they'd saved,
    // even though Supabase rejected the write. That's exactly the "changes
    // are gone after logout/login" bug: the in-memory value looked right
    // until the next fresh load, which re-fetches the untouched old row.
    return { ok:false, error: error.message };
  }
  examAttemptsConfig = draft;
  return { ok:true };
}

// ── Daily target progress & streak ──────────────────────────────────────────
// Only cards reviewed via Active recall (including spaced-repetition sessions,
// which now always run in Active recall) count towards the day's target and
// the streak — Quick review is intentionally excluded (see confTagRowHtml /
// wireConfTagRow, which never call recordStudyProgress).
let dailyProgress = { date: null, count: 0 }; // today's cards-done count, cached in memory
async function fetchDailyProgress(){
  dailyProgress = { date: todayISO(), count: 0 };
  if (!currentUserId) return;
  const { data, error } = await sb.from('daily_progress').select('*').eq('user_id', currentUserId).eq('activity_date', todayISO()).maybeSingle();
  if (!error && data) dailyProgress.count = data.cards_done || 0;
}
// The last 7 calendar days (ISO strings) on which this student's *full* daily
// target was met — powers the 7-day streak strip on the home screen. A day
// only lights up once the target is hit, matching the rule that the streak
// itself only extends on a completed day (see recordStudyProgress). Rebuilt
// on login; recordStudyProgress adds today's date into it in-memory the
// moment the target is reached, so the strip lights up immediately without
// waiting for a reload.
let recentActivityDates = new Set();
async function fetchRecentActivity(){
  recentActivityDates = new Set();
  if (!currentUserId) return;
  const target = (myProfile && myProfile.daily_target) || 20;
  const since = addDaysISO(todayISO(), -6);
  const { data, error } = await sb.from('daily_progress').select('*').eq('user_id', currentUserId);
  if (error || !data) return;
  data.forEach(row => { if (row.activity_date >= since && (row.cards_done || 0) >= target) recentActivityDates.add(row.activity_date); });
}

// Milestones the streak card counts down to, and a big celebratory popup
// fires whenever one is actually reached (see recordStudyProgress).
const STREAK_MILESTONES = [3, 7, 14, 30, 50, 100, 150, 200, 365];
function nextStreakMilestone(streak){ return STREAK_MILESTONES.find(m => m > streak) || null; }
// myProfile.streak_count only actually gets updated (bumped or reset) the
// moment a day's full target is completed — see recordStudyProgress. That
// means on any day where the student HASN'T yet finished today's target,
// the stored number can be stale: if they missed a day entirely, the last
// real streak already died, but the DB still holds its old count until the
// student next finishes a day. This computes the true, "as of right now"
// streak so the dashboard never shows a dead streak as if it were alive —
// it returns 0 the instant more than one day has passed since last_active_date,
// even before the student has done anything today.
function effectiveStreakInfo(){
  const rawStreak = (myProfile && myProfile.streak_count) || 0;
  const lastActive = myProfile && myProfile.last_active_date;
  const today = todayISO();
  const yesterday = addDaysISO(today, -1);
  const isBroken = rawStreak > 0 && !!lastActive && lastActive !== today && lastActive !== yesterday;
  return { streak: isBroken ? 0 : rawStreak, isBroken, rawStreak };
}
function streakTier(streak){
  if (streak >= 30) return 'epic';
  if (streak >= 14) return 'blazing';
  if (streak >= 7) return 'hot';
  if (streak >= 3) return 'warm';
  return 'spark';
}
// The big reward moment: shown once, the instant the student finishes their
// FULL daily target for the day (not just their first card) — this is what
// actually secures today's streak, so it earns a proper celebratory overlay
// rather than a passing toast. Milestone days (3/7/14/30/... in a row) get
// an extra-special headline.
function showStreakCelebration(newStreak, target, opts){
  opts = opts || {};
  const brokenStreakLen = opts.brokenStreakLen || 0;
  const isMilestone = STREAK_MILESTONES.includes(newStreak);
  const ov = document.createElement('div');
  ov.className = 'modal-overlay streak-celebrate-overlay';
  ov.setAttribute('role','dialog'); ov.setAttribute('aria-modal','true');
  // A streak that broke and is only now restarting (day 1 again) gets its
  // own honest, motivational message instead of being framed as a plain
  // "streak secured" win — the student should clearly understand what
  // happened before being cheered on to start over.
  let headline, sub;
  if (brokenStreakLen > 0){
    headline = `💔 Your ${brokenStreakLen}-day streak ended — day 1 starts now`;
    sub = `You missed a day, so the streak had to reset — there's no restore button for that. But you showed up today and finished all ${target} cards. That's what matters. Keep going and build it back, one day at a time.`;
  } else if (isMilestone){
    headline = `🎉 ${newStreak}-day streak — legendary!`;
    sub = `You've shown up ${newStreak} days running. That kind of consistency is exactly what clears this exam. There's no restore button for a missed day — so don't miss one.`;
  } else {
    headline = `🔥 Streak secured!`;
    sub = `All ${target} cards done — today is officially in the books. There's no restore button for a missed day — so don't miss one.`;
  }
  ov.innerHTML = `
    <div class="modal streak-celebrate-modal">
      <div class="streak-celebrate-confetti">🎉 ✨ 🔥 ✨ 🎉</div>
      <h3>${headline}</h3>
      <p class="sub">${esc(sub)}</p>
      <div class="btn-row"><button class="btn-primary" id="streak-celebrate-ok-btn">Nice!</button></div>
    </div>`;
  document.body.appendChild(ov);
  ov.querySelector('#streak-celebrate-ok-btn').addEventListener('click', ()=> ov.remove());
}
// Placeholder for the not-yet-built leaderboard feature — a lightweight
// heads-up so the button doesn't feel broken while it's in development.
function showLeaderboardComingSoon(){

    </div>`;
  document.body.appendChild(ov);
