<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flashcard decks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..500,0..1,0&display=block" rel="stylesheet">
<style>
  :root{
    --blue:#4165E7;
    --blue-dark:#2C46B0;
    --navy:#161B3D;
    --navy-muted:#5C6390;
    --bg:#EAEFFB;
    --surface:#FFFFFF;
    --border:#D9E0F6;
    --gold:#E0992F;
    --font-display:'Fraunces', serif;
    --font-body:'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:var(--bg);
    background-image: radial-gradient(circle at 14% 8%, rgba(65,101,231,0.07), transparent 38%),
                       radial-gradient(circle at 88% 92%, rgba(65,101,231,0.06), transparent 42%);
    color:var(--navy);
    font-family:var(--font-body);
    display:flex;
    justify-content:center;
    padding:6vh 1.25rem 8vh;
    line-height:1.5;
  }
  #app{width:100%; max-width:660px;}
  .eyebrow{
    font-family:var(--font-body); font-weight:600; font-size:.72rem;
    letter-spacing:.14em; text-transform:uppercase; color:var(--blue-dark);
    margin:0 0 .6rem;
  }
  h1,h2,h3{font-family:var(--font-display); margin:0; color:var(--navy);}
  button{font-family:var(--font-body); border:none; cursor:pointer; background:none;}
  button:focus-visible, .score-chip:focus-visible{outline:3px solid var(--gold); outline-offset:2px;}

  .screen{display:none;}
  .screen.active{display:block; animation:rise .4s ease both;}
  @keyframes rise{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

  /* ---------- back link ---------- */
  .back-link{
    display:inline-flex; align-items:center; gap:.35rem; color:var(--navy-muted);
    font-size:.85rem; font-weight:600; margin-bottom:1rem; cursor:pointer; background:none;
  }
  .back-link:hover{color:var(--blue-dark);}

  /* ---------- deck list ---------- */
  .deck-list-head{text-align:left; margin-bottom:1.6rem;}
  .deck-list-head h1{font-size:1.7rem; font-weight:600; margin-bottom:.4rem;}
  .deck-list-head p{color:var(--navy-muted); margin:0; font-size:.98rem;}
  .deck-row{
    background:var(--surface); border-radius:20px; padding:1.5rem 1.6rem;
    box-shadow:0 16px 36px -28px rgba(22,27,61,.3); margin-bottom:1rem;
    display:flex; align-items:center; justify-content:space-between; gap:1.2rem;
  }
  .deck-row-text h3{font-size:1.15rem; font-weight:600; margin-bottom:.3rem;}
  .deck-row-text p{margin:0 0 .5rem; color:var(--navy-muted); font-size:.92rem;}
  .deck-row-meta{font-size:.78rem; color:var(--blue-dark); font-weight:600; letter-spacing:.03em;}
  .deck-row .btn-primary{flex:none;}

  .account-bar{
    display:flex; align-items:center; justify-content:space-between;
    font-size:.82rem; color:var(--navy-muted); margin-bottom:1.2rem;
  }
  .account-bar .back-link{margin:0;}

  .greeting-wrap{margin:0 0 1.2rem;}
  .greeting-text{
    font-family:var(--font-display); font-size:1.55rem; font-weight:600; color:var(--navy);
    margin:0; min-height:1.9rem; letter-spacing:.01em;
  }
  .greeting-text.typing::after{
    content:''; display:inline-block; width:2px; height:1.1em; margin-left:2px;
    background:var(--blue); vertical-align:-.15em; animation:greeting-blink .85s steps(1) infinite;
  }
  @keyframes greeting-blink{ 50%{ opacity:0; } }

  .auth-input{
    width:100%; padding:.78rem 1rem; border-radius:12px; border:1.5px solid var(--border);
    font-family:var(--font-body); font-size:.95rem; color:var(--navy); background:#fff;
    transition:border-color .15s;
  }
  .auth-input:focus{outline:none; border-color:var(--blue);}
  .auth-error{
    background:#FBEAEA; color:#B3261E; font-size:.85rem; padding:.65rem .9rem;
    border-radius:10px; margin:0;
  }
  .auth-toggle{
    text-align:center; font-size:.88rem; color:var(--navy-muted); margin:1.4rem 0 0;
  }
  .auth-toggle button{
    color:var(--blue-dark); font-weight:600; text-decoration:underline; padding:0 0 0 .3rem;
  }

  /* Importance row on cards */
  .imp-row-wrap{border-bottom:1px solid var(--border);}
  .imp-row{display:flex; align-items:center; gap:.45rem; padding:.55rem 1.6rem; flex-wrap:wrap;}
  .imp-label{font-size:.68rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--navy-muted); flex:none; margin-right:.15rem;}
  .imp-btn{font-size:.74rem; font-weight:600; padding:.26rem .68rem; border-radius:999px; border:1.5px solid var(--border); color:var(--navy-muted); cursor:pointer; background:#fff; transition:.15s; font-family:var(--font-body);}
  .imp-btn:hover{border-color:var(--blue); color:var(--blue-dark);}
  .imp-btn.active[data-imp="important"]{background:#1B3FAB; border-color:#1B3FAB; color:#fff;}
  .imp-btn.active[data-imp="mid"]{background:var(--blue); border-color:var(--blue); color:#fff;}
  .imp-btn.active[data-imp="low"]{background:#8FA5F5; border-color:#8FA5F5; color:#fff;}

  /* Confidence modal */
  .conf-row{display:flex; gap:.65rem; justify-content:center; flex-direction:column; margin-top:1rem;}
  .conf-btn{width:100%; padding:.8rem 1.1rem; border-radius:12px; border:2px solid var(--border); font-family:var(--font-body); font-size:.95rem; font-weight:600; cursor:pointer; background:#fff; text-align:left; display:flex; align-items:center; gap:.75rem; transition:.15s; color:var(--navy);}
  .conf-btn:hover{border-color:var(--blue);}
  .conf-dot{width:11px; height:11px; border-radius:50%; flex:none;}
  .conf-dot-weak{background:#E57373;}
  .conf-dot-mid{background:#FFB74D;}
  .conf-dot-strong{background:#66BB6A;}
  .conf-sub{font-size:.78rem; font-weight:400; color:var(--navy-muted); margin-left:auto;}

  /* Study matrix */
  .matrix-wrap{margin:1.6rem 0 .4rem;}
  .matrix-head{font-size:.78rem; font-weight:700; color:var(--navy); margin-bottom:.8rem; letter-spacing:.02em;}
  .matrix-table{width:100%; border-collapse:separate; border-spacing:4px;}
  .matrix-th{font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--navy-muted); padding:.3rem .4rem; text-align:center;}
  .matrix-row-label{font-size:.78rem; font-weight:600; color:var(--navy); padding:.4rem .5rem .4rem 0; white-space:nowrap; vertical-align:middle;}
  .matrix-cell-wrap{padding:2px;}
  .matrix-cell{display:flex; align-items:center; justify-content:center; height:52px; border-radius:10px; font-weight:700; font-size:1.1rem; border:1.5px solid var(--border); background:#fff; transition:.15s;}
  .matrix-cell.empty{color:#C8D0E8; font-size:.8rem; font-weight:400;}
  .matrix-cell.has-cards{color:var(--blue-dark); cursor:pointer; border-color:#c5d0f5;}
  .matrix-cell.has-cards:hover{background:var(--bg); border-color:var(--blue); transform:scale(1.03);}
  .matrix-note{font-size:.78rem; color:var(--navy-muted); margin:.7rem 0 0; line-height:1.55;}
  .matrix-note-link{display:block; width:100%; text-align:left; background:none; border:none; font-family:var(--font-body); font-size:.78rem; color:var(--navy-muted); line-height:1.55; cursor:pointer; padding:0; margin:.7rem 0 0;}
  .matrix-note-link:hover{color:var(--blue-dark);}
  .matrix-note-link u{text-decoration:underline;}

  /* Confidence tag row (quick review inline) */
  .conf-tag-row{display:flex; align-items:center; gap:.45rem; padding:.55rem 1.6rem; border-bottom:1px solid var(--border); flex-wrap:wrap;}
  .conf-tag-btn{font-size:.74rem; font-weight:700; padding:.26rem .75rem; border-radius:999px; border:1.5px solid var(--border); cursor:pointer; background:#fff; transition:.15s; font-family:var(--font-body); color:var(--navy);}
  .conf-tag-btn:hover{border-color:var(--blue);}
  .conf-tag-btn.active{background:var(--blue); border-color:var(--blue); color:#fff;}

  /* Deck selector overlay */
  .deck-sel-overlay{position:fixed; inset:0; background:rgba(22,27,61,.55); display:flex; align-items:center; justify-content:center; padding:1.25rem; z-index:50;}
  .deck-sel-modal{background:#fff; border-radius:22px; padding:2rem 1.8rem; max-width:430px; width:100%; animation:rise .25s ease both; max-height:90vh; overflow-y:auto;}
  .deck-sel-modal h3{font-family:var(--font-display); font-size:1.15rem; font-weight:600; margin:0 0 .3rem;}
  .deck-sel-modal .sub{color:var(--navy-muted); font-size:.88rem; margin:0 0 1.2rem;}
  .deck-chk-list{display:flex; flex-direction:column; gap:.55rem; margin-bottom:1.4rem;}
  .deck-chk-item{display:flex; align-items:center; gap:.75rem; padding:.7rem 1rem; border:1.5px solid var(--border); border-radius:12px; cursor:pointer; transition:.15s; font-size:.9rem; font-weight:500; color:var(--navy);}
  .deck-chk-item:hover{border-color:var(--blue);}
  .deck-chk-item input[type=checkbox]{width:16px; height:16px; accent-color:var(--blue); cursor:pointer; flex:none;}
  .deck-chk-item.select-all{border-style:dashed; color:var(--navy-muted); font-style:italic;}
  .deck-chk-meta{font-size:.78rem; color:var(--navy-muted); font-weight:400; margin-left:auto;}

  /* Filtered review */
  .filter-tag{display:inline-flex; align-items:center; gap:.35rem; background:var(--blue); color:#fff; font-size:.72rem; font-weight:700; padding:.3rem .75rem; border-radius:999px; margin-bottom:.8rem; letter-spacing:.03em;}

  /* End screen confidence breakdown */
  .conf-breakdown{display:flex; gap:.75rem; justify-content:center; margin:.5rem 0 .3rem;}
  .conf-pill{display:flex; align-items:center; gap:.4rem; padding:.4rem .9rem; border-radius:999px; font-size:.9rem; font-weight:600; border:1.5px solid var(--border);}
  .conf-pill-weak{color:#C62828; border-color:#FFCDD2; background:#FFF3F3;}
  .conf-pill-mid{color:#E65100; border-color:#FFE0B2; background:#FFF8F0;}
  .conf-pill-strong{color:#2E7D32; border-color:#C8E6C9; background:#F1FDF2;}

  /* ---------- buttons ---------- */
  .btn-primary{
    background:var(--blue); color:#fff; font-weight:600; font-size:.98rem;
    padding:.85rem 1.6rem; border-radius:999px;
    transition:transform .15s, background .15s;
  }
  .btn-primary:hover{background:var(--blue-dark);}
  .btn-primary:active{transform:scale(.97);}
  .btn-secondary{
    background:transparent; color:var(--blue-dark); font-weight:600; font-size:.94rem;
    padding:.85rem 1.4rem; border-radius:999px; border:1.5px solid var(--border);
    transition:.15s;
  }
  .btn-secondary:hover{border-color:var(--blue);}
  .btn-row{display:flex; justify-content:center; gap:.75rem; margin-top:1.85rem; flex-wrap:wrap;}

  /* ---------- top stepper ---------- */
  .deck-progress{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom:1rem; font-size:.85rem; color:var(--navy-muted); font-weight:500; gap:1rem;
  }
  .stage-steps{display:flex; gap:1.1rem; margin-bottom:.9rem;}
  .stage-step{font-size:.78rem; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:#B7BEE0; position:relative; padding-bottom:.4rem; background:none; border:none; font-family:inherit;}
  .stage-step.current{color:var(--blue);}
  .stage-step.done{color:var(--navy-muted); cursor:pointer;}
  .stage-step.done:hover{color:var(--blue-dark);}
  .stage-step.current::after{content:""; position:absolute; left:0; right:0; bottom:0; height:2px; background:var(--blue); border-radius:2px;}

  /* ---------- card ---------- */
  .card{
    background:var(--surface); border-radius:24px; overflow:hidden;
    box-shadow:0 24px 48px -32px rgba(22,27,61,.35);
  }
  .card-title{
    background:var(--blue); color:#fff; font-weight:600; font-size:1.18rem;
    padding:1.3rem 1.6rem; line-height:1.35;
  }
  .card-body{padding:2rem 1.6rem 1.75rem;}

  /* keyword grid */
  .kw-grid{display:grid; gap:1rem;}
  .kw-box{height:92px; perspective:900px;}
  .kw-box-inner{position:relative; width:100%; height:100%; transition:transform .55s cubic-bezier(.4,.2,.2,1); transform-style:preserve-3d;}
  .kw-box.flipped .kw-box-inner{transform:rotateY(180deg);}
  @media (prefers-reduced-motion:reduce){.kw-box-inner{transition:none;}}
  .kw-face{
    position:absolute; inset:0; backface-visibility:hidden; border-radius:14px;
    background:var(--blue); color:#fff; display:flex; align-items:center; gap:.85rem;
    padding:0 1.1rem;
  }
  .kw-face.back{transform:rotateY(180deg);}
  .kw-icon{width:34px; height:34px; flex:none; opacity:.95; object-fit:contain;}
  .kw-icon.kw-icon-ms{
    font-family:'Material Symbols Outlined'; font-weight:normal; font-style:normal;
    font-size:30px; display:inline-flex; align-items:center; justify-content:center;
    width:34px; height:34px; line-height:1; color:#fff; opacity:.95;
    font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;
  }
  .kw-text{font-weight:600; font-size:.95rem; line-height:1.25;}
  .kw-placeholder{font-family:var(--font-display); font-size:1.3rem; font-weight:600; opacity:.85;}

  /* explanation — every element below explicitly matches the same font-family/
     font-size/color as the paragraphs, so numbered/lettered/roman list markers
     never fall back to a browser default (serif) marker font. */
  .explain, .explain p, .explain ol, .explain ul, .explain li{
    font-family:var(--font-body); font-size:1rem; color:var(--navy);
  }
  .explain p{margin:0 0 1rem;}
  .explain ol{margin:0; padding-left:1.4rem; display:flex; flex-direction:column; gap:.7rem;}
  .explain ol ol{margin-top:.7rem;}
  .explain ul{margin:0; padding-left:1.3rem; display:flex; flex-direction:column; gap:.7rem; list-style:disc;}
  .explain li{padding-left:.15rem;}
  .explain li::marker{font-family:var(--font-body); font-size:1rem; color:var(--navy);}
  .explain .sub{margin:.5rem 0 0; color:var(--navy-muted); font-size:.95rem;}
  .explain .kw-highlight{color:#C62828; font-weight:700;}

  /* ---------- modal ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(22,27,61,.55);
    display:flex; align-items:center; justify-content:center; padding:1.25rem; z-index:50;
  }
  .modal{
    background:#fff; border-radius:22px; padding:2.1rem 1.9rem; max-width:400px; width:100%;
    text-align:center; animation:rise .25s ease both;
  }
  .modal h3{font-size:1.25rem; font-weight:600; margin-bottom:.5rem;}
  .modal .sub{color:var(--navy-muted); font-size:.92rem; margin:0 0 1.6rem;}
  .score-row{display:flex; gap:.6rem; justify-content:center; flex-wrap:wrap;}
  .score-chip{
    width:50px; height:50px; border-radius:50%; border:2px solid var(--border);
    background:#fff; font-family:var(--font-display); font-size:1.15rem; font-weight:600;
    color:var(--navy); transition:.15s;
  }
  .score-chip:hover{border-color:var(--blue); color:var(--blue-dark);}

  /* ---------- end screen ---------- */
  .end-panel{
    background:var(--surface); border-radius:24px; padding:3rem 2.25rem; text-align:center;
    box-shadow:0 24px 48px -32px rgba(22,27,61,.35);
  }
  .end-score{font-size:3.4rem; font-weight:600; line-height:1; margin:.3rem 0 0;}
  .end-pct{font-size:1.2rem; font-weight:600; color:var(--blue-dark); margin:.3rem 0 .2rem;}
  .end-label{color:var(--navy-muted); margin-bottom:2rem;}
  .end-breakdown{
    text-align:left; border-top:1px solid var(--border); margin-top:.5rem; padding-top:1.4rem;
    display:flex; flex-direction:column; gap:.6rem; font-size:.92rem; max-height:340px; overflow-y:auto;
  }
  .end-breakdown-row{display:flex; justify-content:space-between; gap:1rem; color:var(--navy-muted);}
  .end-breakdown-row span:first-child{flex:1;}
  .end-breakdown-row b{color:var(--navy); font-weight:600; flex:none;}

  .index-row{
    display:flex; justify-content:space-between; align-items:center; gap:1rem; color:var(--navy-muted);
    width:100%; text-align:left; background:none; border:1.5px solid transparent; font:inherit;
    padding:.55rem .6rem; border-radius:10px; cursor:pointer;
  }
  .index-row:hover{background:var(--bg); border-color:var(--border);}
  .index-row span:first-child{flex:1;}
  .index-row b{color:var(--navy); font-weight:600; flex:none;}
  .index-row.current{background:var(--bg); border-color:var(--blue);}

  /* ---------- admin panel ---------- */
  .admin-panel{
    background:var(--surface); border-radius:20px; padding:1.4rem 1.6rem 1.6rem;
    box-shadow:0 16px 36px -28px rgba(22,27,61,.3); margin-bottom:1.6rem;
    border:1.5px solid var(--gold);
  }
  .admin-panel-head{font-size:.95rem; font-weight:700; color:var(--navy); margin-bottom:.9rem; letter-spacing:.02em;}
  .admin-panel-head::before{content:"⚙ "; }
  .admin-user-list{display:flex; flex-direction:column; gap:.6rem;}
  .admin-user-row{display:flex; align-items:center; gap:.75rem; padding:.6rem .8rem; border:1.5px solid var(--border); border-radius:12px; flex-wrap:wrap;}
  .admin-user-email{flex:1; font-size:.9rem; font-weight:600; color:var(--navy); min-width:160px; word-break:break-all;}
  .admin-user-badge{font-size:.72rem; font-weight:700; padding:.22rem .6rem; border-radius:999px; letter-spacing:.03em;}
  .admin-user-badge.paid{background:#E6F6EA; color:#2E7D32;}
  .admin-user-badge.free{background:#F1F2F8; color:var(--navy-muted);}
  .admin-toggle-btn{font-size:.8rem; padding:.5rem .95rem;}

  /* ---------- locked decks ---------- */
  .deck-row.locked{opacity:.72;}
  .lock-badge{display:inline-block; font-size:.68rem; font-weight:700; color:var(--gold); background:#FBF1DD; padding:.15rem .55rem; border-radius:999px; margin-left:.5rem; vertical-align:middle; letter-spacing:.02em;}
  .deck-row .btn-secondary[disabled]{cursor:not-allowed; opacity:.7;}
  .upgrade-note{
    background:#FBF1DD; color:#8A6412; font-size:.88rem; padding:.9rem 1.1rem; border-radius:14px;
    margin:0 0 1.3rem; line-height:1.5;
  }
  .device-note{
    display:flex; align-items:center; gap:.5rem;
    background:var(--bg); color:var(--navy-muted); font-size:.82rem; padding:.6rem .9rem; border-radius:12px;
    margin:0 0 1.1rem; line-height:1.4;
  }

  /* ---------- spaced repetition ---------- */
  .sr-panel{
    background:linear-gradient(135deg,#EFF3FF,#F7F4FF); border:1.5px solid #DCE3FA; border-radius:18px;
    padding:1.2rem 1.35rem; margin:0 0 1.3rem;
  }
  .sr-panel-head{display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap;}
  .sr-panel-title{font-family:var(--font-display); font-size:1.08rem; font-weight:600; color:var(--navy);}
  .sr-panel-sub{font-size:.85rem; color:var(--navy-muted); margin-top:.2rem;}
  .sr-panel-star{color:var(--gold); font-weight:600;}
  .sr-edit-table{width:100%; border-collapse:separate; border-spacing:4px; font-size:.82rem;}
  .sr-edit-table th{font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.03em; color:var(--navy-muted); padding:.3rem .2rem; text-align:center; line-height:1.3;}
  .sr-edit-row-label{font-weight:700; color:var(--navy); white-space:nowrap; padding-right:.5rem;}
  .sr-edit-input{
    width:100%; min-width:52px; padding:.4rem .3rem; border-radius:8px; border:1.5px solid var(--border);
    text-align:center; font-family:var(--font-body); font-size:.88rem; color:var(--navy);
  }
  .sr-edit-input:focus{border-color:var(--blue); outline:none;}
  .sr-edit-error{color:#C62828; font-size:.85rem; margin:.9rem 0 0;}

  /* ---------- description editing (admin only) ---------- */
  .admin-edit-btn{margin-top:1.2rem; font-size:.85rem;}
  .edit-toolbar{
    display:flex; align-items:center; gap:.4rem; flex-wrap:wrap;
    background:var(--bg); border:1.5px solid var(--border); border-radius:14px;
    padding:.55rem .65rem; margin-bottom:.7rem;
  }
  .edit-tool-btn{
    font-family:var(--font-body); font-size:.88rem; font-weight:700; color:var(--navy);
    background:#fff; border:1.5px solid var(--border); border-radius:9px;
    padding:.4rem .7rem; cursor:pointer; transition:.15s; line-height:1;
  }
  .edit-tool-btn:hover{border-color:var(--blue); color:var(--blue-dark);}
  .edit-tool-sep{width:1.5px; align-self:stretch; background:var(--border); margin:0 .15rem;}
  .edit-color-label{font-size:.8rem; font-weight:600; color:var(--navy-muted); margin-right:.1rem;}
  .edit-color-swatch{
    width:26px; height:26px; border-radius:50%; border:1.5px solid var(--border);
    cursor:pointer; padding:0; transition:.15s;
  }
  .edit-color-swatch:hover{transform:scale(1.12); border-color:var(--navy);}
  .edit-color-picker-input{
    width:28px; height:28px; border-radius:50%; border:1.5px solid var(--border);
    padding:0; cursor:pointer; background:none;
  }
  .edit-canvas.explain{
    border:1.5px solid var(--border); border-radius:14px; padding:1rem 1.1rem;
    min-height:220px; background:#fff; outline:none;
  }
  .edit-canvas.explain:focus{border-color:var(--blue);}
  .edit-hint{font-size:.78rem; color:var(--navy-muted); margin:.5rem 0 0;}

  /* ---------- manage cards (admin only) ---------- */
  .manage-toolbar{display:flex; justify-content:flex-end; margin-bottom:.6rem;}
  .manage-btn{font-size:.8rem; padding:.5rem .9rem;}
  .mc-card-row{
    background:var(--surface); border-radius:16px; padding:1rem 1.2rem;
    box-shadow:0 12px 28px -24px rgba(22,27,61,.3); margin-bottom:.85rem;
  }
  .mc-card-row-head{display:flex; align-items:center; gap:.6rem; flex-wrap:wrap;}
  .mc-card-title-input{flex:1; min-width:160px;}
  .mc-imp-row{display:flex; align-items:center; gap:.4rem; flex-wrap:wrap; margin-top:.7rem; padding-top:.7rem; border-top:1px solid var(--border);}
  .mc-imp-hint{font-size:.76rem; color:var(--navy-muted); flex-basis:100%; margin-top:.15rem;}
  .mc-icon-btn{
    width:34px; height:34px; border-radius:9px; border:1.5px solid var(--border);
    background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;
    padding:0; flex:none; transition:.15s;
  }
  .mc-icon-btn:hover{border-color:var(--blue);}
  .mc-order-btn{width:30px; height:30px; border-radius:8px; border:1.5px solid var(--border); background:#fff; cursor:pointer; font-size:.8rem; flex:none;}
  .mc-order-btn:disabled{opacity:.35; cursor:not-allowed;}
  .mc-danger-btn{color:#B3261E; border-color:#F3C9C6;}
  .mc-danger-btn:hover{background:#FBEAEA;}
  .mc-kw-list{display:flex; flex-direction:column; gap:.5rem; margin:.9rem 0 .5rem; padding-top:.9rem; border-top:1px solid var(--border);}
  .mc-kw-row{display:flex; align-items:center; gap:.5rem; flex-wrap:wrap;}
  .mc-kw-label-input{flex:1; min-width:120px; padding:.5rem .7rem; font-size:.88rem;}
  .mc-add-kw-btn{font-size:.8rem; align-self:flex-start;}
  .mc-card-foot{display:flex; justify-content:flex-end; gap:.5rem; margin-top:.7rem;}
  .mc-add-card-row{text-align:center; margin-top:1rem;}
  .mc-saved-note{font-size:.78rem; color:#2E7D32; font-weight:600; margin-left:.4rem;}
  .mc-desc-section{margin-top:.9rem; padding-top:.9rem; border-top:1px solid var(--border);}
  .mc-desc-editor{margin-top:.8rem;}

  /* Icon picker modal */
  .icon-picker-modal{max-width:560px; text-align:left;}
  .icon-picker-search{width:100%; margin-bottom:1rem;}
  .icon-picker-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(64px,1fr)); gap:.5rem;
    max-height:340px; overflow-y:auto; padding:.2rem;
  }
  .icon-picker-item{
    display:flex; flex-direction:column; align-items:center; gap:.25rem;
    background:var(--bg); border:1.5px solid transparent; border-radius:12px;
    padding:.6rem .3rem; cursor:pointer; transition:.15s;
  }
  .icon-picker-item:hover{border-color:var(--blue);}
  .icon-picker-item .material-symbols-outlined{
    font-size:26px; color:var(--blue-dark);
    font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
  }
  .icon-picker-item span.icon-picker-label{font-size:.62rem; color:var(--navy-muted); text-align:center; line-height:1.15; word-break:break-word;}
  .icon-picker-empty{color:var(--navy-muted); font-size:.88rem; text-align:center; padding:1.5rem 0;}
  .icon-picker-count{font-size:.78rem; color:var(--navy-muted); margin:0 0 .6rem;}

  @media (max-width:480px){
    body{padding:4vh 1rem 6vh;}
    .card-body,.end-panel{padding:1.6rem 1.3rem;}
    .deck-row{flex-direction:column; align-items:flex-start;}
    .kw-grid{grid-template-columns:1fr !important;}
    .end-score{font-size:2.7rem;}
  }
</style>

<script id="decks-data" type="application/json">[{"id": "sa200", "title": "SA 200 \u2013 Overall Objectives of the Auditor", "subtitle": "Thirteen building blocks of an audit, from objectives to professional judgment.", "cards": [{"title": "1. Overall Objectives of the Auditor", "keywords": [{"label": "reasonable assurance", "icon": "umbrella"}, {"label": "report", "icon": "scroll"}, {"label": "communicate", "icon": "megaphone"}], "explanationHtml": "<p>In conducting an audit of financial statements, the overall objectives of the auditor are:</p>\n<p>a. To obtain <strong>reasonable assurance</strong> about whether the financial statements as a whole are free from material misstatement, whether due to fraud or error, thereby enabling the auditor <strong>to express an opinion</strong> on whether the financial statements are prepared, in all material respects, as per the applicable financial reporting framework (<strong>AFRF</strong>); and</p>\n<p>b. To <strong>report</strong> on the financial statements, and <strong>communicate</strong> as required by the SAs.</p>"}, {"title": "2a. Definition - Applicable Financial Reporting Framework (AFRF)", "keywords": [{"label": "adopted", "icon": "handshake"}, {"label": "acceptable", "icon": "thumb"}], "explanationHtml": "<p>The FRF <strong>adopted</strong> by management and TCWG in the preparation and presentation of the financial statements that is <strong>acceptable</strong> in view of the nature of the entity and the objective of the financial statements, or that is required by law or regulation.</p>"}, {"title": "2b. \"fair presentation framework\" vs \"Compliance framework\"", "keywords": [{"label": "beyond specifically required", "icon": "puzzle"}, {"label": "necessary to depart", "icon": "broken-chain"}], "explanationHtml": "<p>Fair presentation framework refers to an FRF that requires compliance with the framework and:</p>\n<p>i. Acknowledges, explicitly or implicitly, that to achieve fair presentation it may be necessary to provide disclosures <strong>beyond specifically required</strong> by the framework; or</p>\n<p>ii. Acknowledges explicitly that it may be <strong>necessary to depart</strong> from a requirement of the framework to achieve fair presentation of the financial statements. Such departures are expected to be necessary only in <strong>extremely rare circumstances</strong>.</p>\n<p>A <strong>\"compliance framework\"</strong> is an FRF that requires compliance with the requirements of the framework, but <strong>does not contain the acknowledgements</strong> in (i) or (ii) above.</p>"}, {"title": "2c. Misstatement", "keywords": [{"label": "a/c/p/d: Reported vs Required", "icon": "scale"}], "explanationHtml": "<p>A difference between the amount, classification, presentation, or disclosure (a/c/p/d) of a reported financial statement item, and the amount, classification, presentation, or disclosure that is required for that item as per the applicable FRF. (<strong>a/c/p/d: Reported vs Required</strong>) Misstatements can arise from error or fraud.</p>"}, {"title": "2d. Audit vs Review", "keywords": [{"label": "reasonable assurance", "icon": "umbrella"}, {"label": "limited assurance", "icon": "thermometer"}], "explanationHtml": "<p>Audit is a <strong>reasonable assurance</strong> engagement. It provides reasonable assurance. However, review is a <strong>limited assurance</strong> engagement. It provides lower level of assurance than audit. Further, review involves fewer procedures and gathers sufficient appropriate evidence on the basis of which limited conclusions can be drawn up. However, both \"audit\" and \"review\" are related to the financial statements prepared on the basis of historical financial information.</p>"}, {"title": "2e. Those Charged with Governance (TCWG)", "keywords": [{"label": "strategic direction", "icon": "compass"}, {"label": "accountability", "icon": "anchor"}], "explanationHtml": "<p>Person(s) or organisation(s) with responsibility for overseeing the <strong>strategic direction</strong> of the entity and obligations related to the <strong>accountability</strong> of the entity. This includes overseeing the <strong>financial reporting process</strong>.</p>"}, {"title": "3. Sufficient and Appropriate Audit Evidence (SAAE)", "keywords": [{"label": "Quantity - ROMM & Quality", "icon": "ruler"}, {"label": "Quality - Relevance, Reliability", "icon": "magnify"}], "explanationHtml": "<p>To obtain reasonable assurance, the auditor shall obtain sufficient appropriate audit evidence to reduce audit risk to an acceptably low level and thereby draw reasonable conclusions on which to base the auditor's opinion.</p>\n<p>&bull; <strong>Reasonable assurance:</strong> A high, but not absolute, level of assurance.</p>\n<p>&bull; <strong>Audit evidence:</strong> Information used by the auditor in arriving at the conclusions on which the auditor's opinion is based.</p>\n<p>(i) <strong>Sufficiency</strong> is the measure of the quantity of audit evidence. The quantity is affected by:</p>\n<p>&bull; The auditor's assessment of the risks of material misstatement (ROMM); and</p>\n<p>&bull; The quality of such audit evidence. <strong>Quantity - ROMM &amp; Quality</strong></p>\n<p>(ii) <strong>Appropriateness</strong> is the measure of the quality of audit evidence \u2014 i.e., its relevance and its reliability \u2014 in providing support for the conclusions on which the auditor's opinion is based. <strong>Quality - Relevance, Reliability</strong></p>"}, {"title": "4. Audit Risk and its components", "keywords": [{"label": "risk of material misstatement", "icon": "warning-triangle"}, {"label": "detection risk", "icon": "magnify"}, {"label": "Inherent Risk", "icon": "raincloud"}, {"label": "Control Risk", "icon": "shield"}], "explanationHtml": "<p>Audit risk is the risk that the auditor <strong>expresses an inappropriate audit opinion</strong> when the financial statements are materially misstated. Audit risk is a function of the <strong>risk of material misstatement</strong> (RoMM) and <strong>detection risk</strong>.</p>\n<p><strong>Risk of Material Misstatement (ROMM):</strong> The risk that the financial statements are materially misstated <strong>prior to the audit</strong>. This consists of two components at the assertion level:</p>\n<p><strong>Inherent Risk</strong><br>The susceptibility of an assertion about a class of transactions, account balance, or disclosure (<strong>abcd</strong>) to a misstatement that could be material, either individually or when aggregated with other misstatements, <strong>before consideration of any related controls</strong>.</p>\n<p><strong>Control Risk</strong><br>The risk that a misstatement that could occur in an assertion about a class of transactions, account balance, or disclosure (abcd), and that could be material, either individually or when aggregated with other misstatements, will not be prevented, or detected and corrected, <strong>on a timely basis by the entity's internal control</strong>.</p>\n<p><strong>ROMM may exist at two levels:</strong></p>\n<p>&bull; <strong>Overall financial statement level</strong> \u2014 i.e., relates to the financial statements as a whole, potentially affecting many assertions.</p>\n<p>&bull; <strong>Assertion level</strong> \u2014 for classes of transactions, account balances, and disclosures (abcd).</p>\n<p><strong>Detection Risk:</strong> The risk that the <strong>procedures</strong> performed by the auditor to reduce audit risk to an acceptably low level <strong>will not detect</strong> a misstatement that exists and could be material, either individually or when aggregated with other misstatements.</p>"}, {"title": "5. Inherent Limitations of an Audit (ILA)", "keywords": [{"label": "Nature of financial reporting", "icon": "open-book"}, {"label": "Nature of audit procedures", "icon": "gear"}, {"label": "Timeliness", "icon": "alarm-clock"}, {"label": "Future events", "icon": "ghost"}, {"label": "Signficant - Fraud, RPT, L/R, GC", "icon": "flag"}], "explanationHtml": "<p>The auditor is not expected to, and cannot, reduce audit risk to zero, and therefore <strong>cannot obtain absolute assurance</strong> that the financial statements are free from material misstatement due to fraud or error. This is because there are inherent limitations of an audit, which result in most of the audit evidence being <strong>persuasive rather than conclusive</strong>.</p>\n<p>1. <strong><strong>Nature of financial reporting</strong>:</strong> The preparation of financial statements involves judgment by management in applying the requirements of the applicable FRF to the facts and circumstances of the entity \u2014 for example, accounting estimates.</p>\n<p>2. <strong><strong>Nature of audit procedures</strong>:</strong></p>\n<p>&bull; There is the possibility that management and others may not provide complete information relevant to the preparation and presentation of the financial statements.</p>\n<p>&bull; Fraud may involve sophisticated and carefully organised schemes designed to conceal it.</p>\n<p>&bull; An audit is <strong>not an official investigation</strong> into alleged wrongdoing. The auditor does not have special legal powers, such as the power of search.</p>\n<p>3. <strong><strong>Timeliness</strong> of financial reporting and the balance between benefit and cost</strong>: The relevance of information, and thereby its value, tends to diminish over time, and there is a balance to be struck between the reliability of information and its cost.</p>\n<p>4. <strong>Future events</strong></p>\n<p>The business may cease to exist in future due to change in market conditions, emergence of new business models or due to some adverse events</p>\n<p>5. In the case of certain assertions or subject matters, the <strong>potential effects of inherent limitations</strong> on the auditor's ability to detect material misstatements are particularly significant. Such assertions or subject matters include:</p>\n<p>&bull; Fraud, particularly fraud involving senior management or collusion.</p>\n<p>&bull; The existence and completeness of related party relationships and transactions.</p>\n<p>&bull; The occurrence of non-compliance with laws and regulations.</p>\n<p>&bull; Future events or conditions that may cause an entity to cease to continue as a going concern. <strong>Signficant - Fraud, RPT, L/R, GC</strong></p>\n<p><strong>Note:</strong></p>\n<p>&bull; Because of the inherent limitations of an audit, there is an <strong>unavoidable risk</strong> that some material misstatements of the financial statements may not be detected, even though the audit is properly planned and performed as per the SAs.</p>\n<p>&bull; The subsequent discovery of material misstatements resulting from fraud or error <strong>does not by itself indicate a failure to conduct the audit</strong> as per the SAs.</p>\n<p>&bull; However, the inherent limitations of an audit are <strong>not a justification</strong> for the auditor to be satisfied with <strong>less-than-persuasive audit evidence</strong>.</p>"}, {"title": "6. Professional Skepticism", "keywords": [{"label": "questioning mind", "icon": "eye"}, {"label": "Being alert", "icon": "binoculars"}, {"label": "critical assessment", "icon": "detective-hat"}, {"label": "contradicts", "icon": "broken-chain"}, {"label": "reliability of documents", "icon": "clipboard-check"}, {"label": "fraud", "icon": "mask"}, {"label": "audit procedures in addition", "icon": "puzzle"}], "explanationHtml": "<p>An attitude that includes:</p>\n<p>&bull; A <strong>questioning mind</strong>;</p>\n<p>&bull; <strong>Being alert</strong> to conditions which may indicate possible misstatement due to error or fraud; and</p>\n<p>&bull; A <strong>critical assessment</strong> of audit evidence.</p>\n<p>Professional skepticism includes being alert to, for example:</p>\n<p>&bull; Audit evidence that <strong>contradicts</strong> other audit evidence obtained.</p>\n<p>&bull; Information that brings into question the <strong>reliability of documents</strong> to be used as audit evidence.</p>\n<p>&bull; Conditions that may indicate possible <strong>fraud</strong>.</p>\n<p>&bull; Circumstances that suggest a need for <strong>audit procedures in addition</strong> to those required by the SAs.</p>\n<p>Maintaining professional skepticism throughout the audit is necessary to reduce the risks of:</p>\n<p>&bull; <strong>Overlooking unusual</strong> circumstances.</p>\n<p>&bull; <strong>Over-generalising</strong> when drawing conclusions from audit observations.</p>\n<p>&bull; <strong>Using inappropriate assumptions</strong> in determining the nature, timing, and extent (NTE) of audit procedures, and evaluating the results thereof.</p>"}, {"title": "7. Professional Judgment", "keywords": [{"label": "TKE", "icon": "graduation-cap"}, {"label": "Materiality", "icon": "target"}, {"label": "audit risk", "icon": "warning-triangle"}, {"label": "NTE-AP", "icon": "hourglass"}, {"label": "SAAE", "icon": "clipboard-check"}, {"label": "management's judgments", "icon": "crystal-ball"}, {"label": "Drawing of conclusions", "icon": "stamp"}], "explanationHtml": "<p>The application of relevant training, knowledge, and experience (<strong>TKE</strong>), within the context provided by auditing, accounting, and ethical standards, in making informed decisions about the courses of action that are appropriate in the circumstances of the audit engagement.</p>\n<p>Professional judgment is necessary in particular regarding decisions about:</p>\n<p>&bull; <strong>Materiality</strong> and <strong>audit risk</strong>.</p>\n<p>&bull; The nature, timing, and extent (NTE) of audit procedures used to meet the requirements of the SAs and to gather audit evidence. (<strong>NTE-AP</strong>)</p>\n<p>&bull; Evaluating whether sufficient appropriate audit evidence has been obtained, and whether more needs to be done to achieve the objectives of the SAs and thereby the overall objectives of the auditor. (<strong>SAAE</strong>)</p>\n<p>&bull; The evaluation of <strong>management's judgments</strong> in applying the entity's applicable FRF (AFRF).</p>\n<p>&bull; <strong>Drawing of conclusions</strong> based on the audit evidence obtained \u2014 for example, assessing the reasonableness of the estimates made by management in preparing the financial statements.</p>"}, {"title": "8. Two types of FS", "keywords": [{"label": "general", "icon": "megaphone"}, {"label": "special", "icon": "key"}], "explanationHtml": "<p>Financial statements may be prepared as per an FRF designed to meet:</p>\n<p>&bull; The <strong>common</strong> financial information needs of a wide range of users (i.e., \" <strong>general</strong> purpose financial statements\"); or</p>\n<p>&bull; The financial information needs of <strong>specific</strong> users (i.e., \" <strong>special</strong> purpose financial statements\").</p>"}, {"title": "9. Responsibilities of Management and TCWG", "keywords": [{"label": "PPFS-AFRF", "icon": "compass"}, {"label": "DIM-IC", "icon": "gear"}, {"label": "All information", "icon": "folder"}, {"label": "additional information", "icon": "envelope"}, {"label": "Unrestricted access", "icon": "door"}], "explanationHtml": "<p>i. For the preparation and presentation of the financial statements (<strong>PPFS-AFRF</strong>) as per the applicable FRF \u2014 this includes the design, implementation, and maintenance (DIM) of internal control (IC) (<strong>DIM-IC</strong>) relevant to the preparation and presentation of financial statements that are free from material misstatement, whether due to fraud or error; and</p>\n<p>ii. To provide the auditor with:</p>\n<p>a. <strong>All information</strong>, such as records and documentation, and other matters relevant to the preparation and presentation of the financial statements;</p>\n<p>b. Any <strong>additional information</strong> that the auditor may request from management and, where appropriate, TCWG; and</p>\n<p>c. <strong>Unrestricted access</strong> to those within the entity from whom the auditor determines it necessary to obtain audit evidence.</p>\n<p>As part of their responsibility for the preparation and presentation of the financial statements, management and TCWG are responsible for:</p>\n<p>&bull; <strong>Identification of the applicable FRF</strong>, in the context of relevant laws or regulations.</p>\n<p>&bull; <strong>Preparation and presentation</strong> of the financial statements as per that framework.</p>\n<p>&bull; <strong>Adequate description</strong> of that framework in the financial statements.</p>"}]}, {"id": "sa210", "title": "SA 210 \u2013 Agreeing the Terms of Audit Engagement", "subtitle": "Preconditions, engagement letters, and when an auditor can walk away.", "cards": [{"title": "1. Objective of SA 210", "keywords": [{"label": "preconditions", "icon": "key"}, {"label": "common understanding", "icon": "handshake"}], "explanationHtml": "<p>The objective of the auditor is to accept or continue an audit engagement only when the basis upon which it is to be performed has been agreed, through:</p>\n<p>a. Establishing whether the <strong>preconditions</strong> for an audit are present; and</p>\n<p>b. Confirming that there is a <strong>common understanding</strong> between the auditor and management/TCWG of the terms of the audit engagement.</p>"}, {"title": "2. Preconditions of an Audit", "keywords": [{"label": "FRF-Acceptable", "icon": "thumb"}, {"label": "M acknowledges - PPFS-AFRF, IC", "icon": "signature"}, {"label": "Provide - All info, add info, unrestricted access", "icon": "folder"}], "explanationHtml": "<p>The auditor shall:</p>\n<p>a. Determine whether the financial reporting framework (FRF) to be applied is acceptable (<strong>FRF-Acceptable</strong>).</p>\n<p>b. Obtain the agreement of management that it acknowledges and understands its responsibility:</p>\n<p>i. For the preparation of the financial statements as per the applicable FRF;</p>\n<p>ii. For such internal control (IC) as management determines necessary to enable the preparation of financial statements that are free from material misstatement, whether due to fraud or error; and (<strong>M acknowledges - PPFS-AFRF, IC</strong>)</p>\n<p>iii. To provide the auditor with:</p>\n<p>a. Access to all information of which management is aware that is relevant to the preparation of the financial statements;</p>\n<p>b. Additional information that the auditor may request for the purpose of the audit; and</p>\n<p>c. Unrestricted access to persons within the entity from whom the auditor determines it necessary to obtain audit evidence.</p>\n<p>If the preconditions are not present, the auditor shall discuss the matter with management, and shall not accept the proposed audit engagement. (<strong>Provide - All info, add info, unrestricted access</strong>)</p>"}, {"title": "3. Limitation on Scope Prior to Audit Engagement Acceptance", "keywords": [{"label": "auditor shall not accept", "icon": "warning-triangle"}], "explanationHtml": "<p>If management or TCWG impose a limitation on the scope of the auditor's work such that the auditor believes it would result in the auditor disclaiming an opinion on the financial statements, the <strong>auditor shall not accept</strong> such an audit engagement, unless required to do so by law or regulation.</p>"}, {"title": "4. Contents of the Agreement on Terms of Audit Engagement", "keywords": [{"label": "objective and scope", "icon": "target"}, {"label": "R-Auditor", "icon": "backpack"}, {"label": "R-Management", "icon": "id-card"}, {"label": "AFRF", "icon": "compass"}, {"label": "form and content", "icon": "scroll"}], "explanationHtml": "<p>The agreed terms of the audit engagement shall be recorded in an audit engagement letter or other written agreement, and shall include:</p>\n<p>a. The <strong>objective and scope</strong> of the audit of the financial statements.</p>\n<p>b. The responsibilities of the auditor. (<strong>R-Auditor</strong>)</p>\n<p>c. The responsibilities of management. (<strong>R-Management</strong>)</p>\n<p>d. Identification of the applicable FRF (<strong>AFRF</strong>) for the preparation of the financial statements; and</p>\n<p>e. Reference to the expected <strong>form and content</strong> of any reports to be issued by the auditor, and a statement that there may be circumstances in which a report may differ from its expected form and content.</p>"}, {"title": "5. Recurring Audits \u2014 New Engagement Letter Needed?", "keywords": [{"label": "misunderstands", "icon": "ghost"}, {"label": "terms", "icon": "tag"}, {"label": "management", "icon": "id-card"}, {"label": "ownership", "icon": "trophy"}, {"label": "size", "icon": "ruler"}, {"label": "legal", "icon": "scale"}, {"label": "FRF", "icon": "compass"}, {"label": "other", "icon": "puzzle"}], "explanationHtml": "<p>The auditor may decide not to send a new audit engagement letter or other written agreement for each period. The following factors make it appropriate to revise the terms of the audit engagement, or to remind the entity of existing terms:</p>\n<p>&bull; Any indication that the entity <strong>misunderstands</strong> the objective and scope of the audit.</p>\n<p>&bull; Any revised or special <strong>terms</strong> of the audit engagement.</p>\n<p>&bull; A recent change of senior <strong>management</strong>.</p>\n<p>&bull; A significant change in <strong>ownership</strong>.</p>\n<p>&bull; A significant change in the nature or <strong>size</strong> of the entity's business.</p>\n<p>&bull; A change in <strong>legal</strong> or regulatory requirements.</p>\n<p>&bull; A change in the <strong>FRF</strong> adopted in the preparation of the financial statements.</p>\n<p>&bull; A change in <strong>other</strong> reporting requirements.</p>"}, {"title": "6. Acceptance of a Change in Terms of the Audit Engagement", "keywords": [{"label": "not agree", "icon": "broken-chain"}, {"label": "reasonable justification", "icon": "lightbulb"}, {"label": "engagement letter", "icon": "envelope"}, {"label": "Withdraw", "icon": "door"}, {"label": "report", "icon": "scroll"}], "explanationHtml": "<p>The auditor shall <strong>not agree</strong> to a change in the terms of the audit engagement where there is no reasonable justification for doing so. If, prior to completing the audit engagement, the auditor is requested to change it to an engagement that conveys a lower level of assurance, the auditor shall determine whether there is <strong>reasonable justification</strong> for doing so.</p>\n<p>If the terms are changed, the auditor and management shall agree on and record the new terms of the engagement in an <strong>engagement letter</strong> or other suitable form of written agreement.</p>\n<p>If the auditor is unable to agree to a change in terms, and is not permitted by management to continue the original audit engagement, the auditor shall:</p>\n<p>a. <strong>Withdraw</strong> from the audit engagement, where withdrawal is possible under applicable law or regulation; and</p>\n<p>b. Determine whether there is any obligation, either contractual or otherwise, to <strong>report</strong> the circumstances to other parties, such as TCWG, owners, or regulators.</p>"}, {"title": "7. FRF Prescribed by Law or Regulation \u2014 Should auditor accept?", "keywords": [{"label": "additional disclosures", "icon": "megaphone"}, {"label": "(EOM) paragraph", "icon": "flag"}, {"label": "No T&F phrases", "icon": "mask"}], "explanationHtml": "<p>If the auditor has determined that the FRF prescribed by law or regulation would be unacceptable but for the fact that it is prescribed by law or regulation, the auditor shall accept the audit engagement only if the following conditions are present:</p>\n<p>a. Management agrees to provide <strong>additional disclosures</strong> in the financial statements; and</p>\n<p>b. It is recognised in the terms of the audit engagement that:</p>\n<p>i. The auditor's report will include an Emphasis of Matter <strong>(EOM) paragraph</strong>, drawing users' attention to the additional disclosures, as per SA 706; and</p>\n<p>ii. Unless the auditor is required by law or regulation to express the auditor's opinion on the financial statements by using the phrases \"present fairly, in all material respects\" or \"give a true and fair view\" as per the applicable FRF, the auditor's opinion on the financial statements will not include such phrases. (<strong>No T&amp;F phrases</strong>)</p>\n<p>If the above conditions are not present, and the auditor is required by law or regulation to undertake the audit engagement, the auditor shall:</p>\n<p>a. Evaluate the effect of the misleading nature of the financial statements on the auditor's report; and</p>\n<p>b. Include appropriate reference to this matter in the terms of the audit engagement.</p>"}, {"title": "8. Factors Relevant to the Acceptability of the Applicable FRF", "keywords": [{"label": "nature of the entity", "icon": "id-card"}, {"label": "purpose", "icon": "target"}, {"label": "nature of the financial statements", "icon": "scroll"}, {"label": "law or regulation", "icon": "scale"}], "explanationHtml": "<p>Factors relevant to the auditor's determination of the acceptability of the financial reporting framework (FRF) to be applied in the preparation of the financial statements include:</p>\n<p>The <strong>nature of the entity</strong> (for example, whether it is a business enterprise, or a not-for-profit organization).</p>\n<p>The <strong>purpose</strong> of the financial statements (for example, whether they are prepared to meet the common financial information needs of a wide range of users, or the financial information needs of specific users).</p>\n<p>The <strong>nature of the financial statements</strong> (for example, whether the financial statements are a complete set of financial statements, or a single financial statement).</p>\n<p>Whether <strong>law or regulation</strong> prescribes the applicable FRF.</p>"}]}, {"id": "sa220", "title": "SA 220 & SQC 1 \u2013 Quality Control", "subtitle": "Firm-level and engagement-level quality control, from leadership to documentation.", "cards": [{"title": "1. Objective", "keywords": [{"label": "PRL", "icon": "scale"}, {"label": "Report-appropriate", "icon": "scroll"}], "explanationHtml": "<p>Firms are required to have a system of quality control that provides reasonable assurance that:</p>\n<p>a. The firm and its personnel comply with professional standards and applicable regulatory and legal requirements (<strong>PRL</strong>); and</p>\n<p>b. Reports issued by the firm or engagement partners are appropriate in the circumstances. (<strong>Report-appropriate</strong>)</p>"}, {"title": "2. Elements of a System of Quality Control", "keywords": [{"label": "Leadership", "icon": "compass"}, {"label": "Ethical", "icon": "scale"}, {"label": "client", "icon": "id-card"}, {"label": "Human", "icon": "footprint"}, {"label": "performance", "icon": "gear"}, {"label": "Monitoring", "icon": "binoculars"}], "explanationHtml": "<p>a. <strong>Leadership</strong> responsibilities for quality within the firm</p>\n<p>b. <strong>Ethical</strong> requirements</p>\n<p>c. Acceptance and continuance of <strong>client</strong> relationships and engagements</p>\n<p>d. <strong>Human</strong> resources</p>\n<p>e. Engagement <strong>performance</strong></p>\n<p>f. <strong>Monitoring</strong></p>"}, {"title": "3a. Leadership Responsibilities for Quality - SQC1 (Firm)", "keywords": [{"label": "policies and procedures", "icon": "scroll"}, {"label": "ultimate responsibility", "icon": "backpack"}, {"label": "example", "icon": "spotlight"}, {"label": "experience", "icon": "graduation-cap"}], "explanationHtml": "<p>&bull; Firms must establish <strong>policies and procedures</strong> that promote an <strong>internal culture</strong> recognizing that quality is essential in performing engagements.</p>\n<p>&bull; The firm's CEO or managing partners must assume <strong>ultimate responsibility</strong> for the firm's system of quality control.</p>\n<p>&bull; The <strong>example</strong> set by the firm's leadership should encourage an inner culture that recognizes high-quality audit work.</p>\n<p>&bull; Persons assigned operational responsibility for the quality control system should have sufficient <strong>experience</strong>, <strong>ability, and authority</strong>.</p>"}, {"title": "3b. Leadership Responsibilities for Quality - SA220 (Engagement)", "keywords": [{"label": "audit quality", "icon": "target"}, {"label": "PRL", "icon": "scale"}, {"label": "firm's quality", "icon": "shield-check"}, {"label": "appropriate - report", "icon": "scroll"}, {"label": "without fear", "icon": "shield"}, {"label": "quality-essential", "icon": "flag"}], "explanationHtml": "<p>&bull; The <strong>Engagement Partner</strong> (EP) takes responsibility for the overall quality on each audit engagement assigned to them.</p>\n<p>&bull; Through their actions and appropriate messages to other engagement team members, the EP emphasizes:</p>\n<p>a. The importance to <strong>audit quality</strong> of:</p>\n<p>i. Performing work that complies with professional, regulatory, and legal requirements (<strong>PRL</strong>);</p>\n<p>ii. Complying with the <strong>firm's quality</strong> control policies and procedures;</p>\n<p>iii. Issuing audit reports that are appropriate in the circumstances; and (<strong>appropriate - report</strong>)</p>\n<p>iv. The engagement team's ability to raise concerns <strong>without fear</strong> of reprisals.</p>\n<p>b. The fact that quality is essential in performing audit engagements. (<strong>quality-essential</strong>)</p>"}, {"title": "4. Considerations for Upholding the Quality of the Firm", "keywords": [{"label": "firm's commitment", "icon": "handshake"}, {"label": "resources", "icon": "backpack"}, {"label": "management responsibilities", "icon": "id-card"}, {"label": "vital info-client", "icon": "folder"}], "explanationHtml": "<p>i. The firm's personnel policies and procedures should be designed to demonstrate the <strong>firm's commitment</strong> to quality.</p>\n<p>ii. The firm should devote sufficient <strong>resources</strong> to the development and documentation of its quality control policies and procedures.</p>\n<p>iii. The firm must assign <strong>management responsibilities</strong> such that commercial considerations do not override the quality of work performed.</p>\n<p>iv. Before accepting an engagement, the firm should acquire vital information about the client \u2014 deciding on the integrity of the client, its promoters and key managerial personnel, and the firm's competence (including capability, time, and resources) to perform the engagement and comply with ethical requirements. (<strong>vital info-client</strong>)</p>"}, {"title": "5. Ethical Requirements", "keywords": [{"label": "Confidentiality", "icon": "door"}, {"label": "Objectivity", "icon": "eye"}, {"label": "Integrity", "icon": "shield"}, {"label": "Professional Competence", "icon": "graduation-cap"}, {"label": "Professional Behaviour", "icon": "mirror"}], "explanationHtml": "<p>The five fundamental ethical principles are:</p>\n<p>1. <strong>Confidentiality</strong></p>\n<p>2. <strong>Objectivity</strong></p>\n<p>3. <strong>Integrity</strong></p>\n<p>4. <strong>Professional Competence</strong> and Due Care</p>\n<p>5. <strong>Professional Behaviour</strong></p>"}, {"title": "6. Independence Policy", "keywords": [{"label": "Communicate", "icon": "megaphone"}, {"label": "circumstances and relationships", "icon": "link-chain"}, {"label": "eliminate", "icon": "broken-chain"}], "explanationHtml": "<p>Policies and procedures should enable the firm to:</p>\n<p>&bull; <strong>Communicate</strong> independence requirements to its personnel and others.</p>\n<p>&bull; Identify and evaluate <strong>circumstances and relationships</strong> that create a threat to independence.</p>\n<p>&bull; Take appropriate action to <strong>eliminate</strong> such threats or reduce them to an acceptable level, or to withdraw from the engagement.</p>\n<p><strong>Imp Pointers:</strong></p>\n<p>&bull; There should be a mechanism within the firm by which engagement partners provide the firm with relevant information about client engagements, and firm personnel promptly notify the firm of circumstances and relationships that create threats to independence.</p>\n<p>&bull; All breaches of independence should be promptly notified to the firm so that appropriate action can be taken.</p>\n<p>&bull; At least annually, the firm should obtain written confirmation of compliance with policies and procedures on independence from all firm personnel required to be independent.</p>\n<p>The familiarity threat is particularly relevant in the audits of financial statements of listed entities. For these audits, the Engagement partner is rotated after a pre-defined period, not more than 7 years.</p>"}, {"title": "7. Acceptance and Continuance of Client Relationships and Engagements", "keywords": [{"label": "Integrity", "icon": "shield"}, {"label": "Competence", "icon": "graduation-cap"}, {"label": "Compliance", "icon": "brick-wall"}, {"label": "Significant matters", "icon": "flag"}], "explanationHtml": "<p>Information such as the following assists the engagement partner in determining whether decisions regarding acceptance and continuance of an audit engagement are appropriate:</p>\n<p>&bull; <strong>Integrity</strong> of the principal owners, key management, and those charged with governance (TCWG) of the entity.</p>\n<p>&bull; <strong>Competence</strong> (including capability, time, and resources) to perform the engagement.</p>\n<p>&bull; <strong>Compliance</strong> with ethical requirements.</p>\n<p>&bull; <strong>Significant matters</strong> that have arisen during the current or previous audit engagement, and their implications for continuing the relationship.</p>\n<p>Where issues are identified and the firm decides to accept or continue the client relationship or specific engagement, the firm should document how those issues were resolved.</p>"}, {"title": "8. Evaluating the Integrity of the Client", "keywords": [{"label": "business reputation", "icon": "trophy"}, {"label": "Reasons", "icon": "lightbulb"}, {"label": "operations", "icon": "gear"}, {"label": "attitude", "icon": "mirror"}, {"label": "firm's fees", "icon": "calculator"}, {"label": "limitation", "icon": "warning-triangle"}, {"label": "money laundering", "icon": "mask"}], "explanationHtml": "<p>Matters the firm considers when evaluating client integrity include, for example:</p>\n<p>&bull; Identity any <strong>business reputation</strong> of the client's principal owners, key management, related parties, and TCWG.</p>\n<p>&bull; <strong>Reasons</strong> for the proposed appointment of the firm and for the non-reappointment of the previous firm.</p>\n<p>&bull; Nature of the client's <strong>operations</strong>, including its business practices.</p>\n<p>&bull; Information concerning the <strong>attitude</strong> of the client's owners, key management, and TCWG towards matters such as aggressive interpretation of accounting standards and the internal control environment.</p>\n<p>&bull; Whether the client is aggressively concerned with keeping the <strong>firm's fees</strong> as low as possible.</p>\n<p>&bull; Indications of inappropriate <strong>limitation</strong> in the scope of work.</p>\n<p>&bull; Indications that the client might be involved in <strong>money laundering</strong> or other criminal activities.</p>"}, {"title": "9. Matters to Consider Regarding Capabilities, Competence, Time, and Resources", "keywords": [{"label": "knowledge", "icon": "open-book"}, {"label": "experience", "icon": "graduation-cap"}, {"label": "sufficient personnel", "icon": "id-card"}, {"label": "Experts", "icon": "detective-hat"}, {"label": "EQCR", "icon": "shield-check"}, {"label": "complete", "icon": "stamp"}], "explanationHtml": "<p>When determining whether the firm has the capabilities, competence, time, and resources to undertake a new engagement, the firm considers whether:</p>\n<p>&bull; Firm personnel have <strong>knowledge</strong> of the relevant industries or subject matters.</p>\n<p>&bull; Firm personnel have <strong>experience</strong> with relevant regulatory or reporting requirements, or have the ability to gain the necessary skills and knowledge effectively.</p>\n<p>&bull; The firm has <strong>sufficient personnel</strong> with the necessary competence and capabilities.</p>\n<p>&bull; <strong>Experts</strong> are available, if needed.</p>\n<p>&bull; Individuals meeting the criteria and eligibility requirements to perform an engagement quality control review (<strong>EQCR</strong>) are available.</p>\n<p>&bull; The firm is able to <strong>complete</strong> the engagement within the reporting deadline.</p>"}, {"title": "10. Withdrawal from an Engagement", "keywords": [{"label": "Discuss", "icon": "handshake"}, {"label": "withdrawal", "icon": "door"}, {"label": "to report", "icon": "megaphone"}, {"label": "Documenting", "icon": "scroll"}], "explanationHtml": "<p>Policies and procedures on withdrawal from an engagement include:</p>\n<p>&bull; <strong>Discuss</strong>ing with the client's management and TCWG the appropriate action the firm might take, based on the relevant facts and circumstances.</p>\n<p>&bull; If the firm determines it is appropriate to withdraw, discussing the <strong>withdrawal</strong> and the reasons for it with management and TCWG.</p>\n<p>&bull; Considering whether there is a professional, regulatory, or legal requirement <strong>to report</strong> the withdrawal, along with reasons, to regulatory authorities.</p>\n<p>&bull; <strong>Documenting</strong> significant issues, consultations, conclusions, and the basis for those conclusions.</p>"}, {"title": "11. Human Resources", "keywords": [{"label": "sufficient personnel", "icon": "id-card"}, {"label": "engagement partner", "icon": "backpack"}], "explanationHtml": "<p>The firm establishes policies and procedures designed to provide reasonable assurance that:</p>\n<p>&bull; The firm has <strong>sufficient personnel</strong> with the capabilities, competence, and commitment to ethical principles (CCC) necessary; and</p>\n<p>&bull; The <strong>engagement partner</strong> is able to issue an appropriate report.</p>"}, {"title": "12. Assignment of Engagement Teams (EP)", "keywords": [{"label": "identity and role", "icon": "id-card"}, {"label": "CCA", "icon": "graduation-cap"}, {"label": "responsibilities", "icon": "backpack"}], "explanationHtml": "<p>The firm should establish policies and procedures requiring that:</p>\n<p>a. The <strong>identity and role</strong> of the engagement partner are communicated to key members of the client's management and TCWG.</p>\n<p>b. The engagement partner has the appropriate capabilities, competence, authority, and time to perform the role. (<strong>CCA</strong>)</p>\n<p>c. The <strong>responsibilities</strong> of the engagement partner are clearly defined and communicated to that partner.</p>"}, {"title": "13. Engagement Performance", "keywords": [{"label": "Briefing", "icon": "megaphone"}, {"label": "engagement standards", "icon": "open-book"}, {"label": "supervision and training", "icon": "graduation-cap"}, {"label": "reviewing", "icon": "magnify"}, {"label": "documentation", "icon": "scroll"}], "explanationHtml": "<p>Consistency in the quality of engagement performance is achieved through:</p>\n<p>&bull; <strong>Briefing</strong> engagement teams on their objectives.</p>\n<p>&bull; Processes for complying with <strong>engagement standards</strong>.</p>\n<p>&bull; Processes for engagement <strong>supervision and training</strong>.</p>\n<p>&bull; Methods of <strong>reviewing</strong> the performance of work.</p>\n<p>&bull; Appropriate <strong>documentation</strong> of the work performed.</p>\n<p>Pointers:</p>\n<p>&bull; The engagement partner has responsibility for the direction, supervision, and performance of the audit engagement.</p>\n<p>&bull; The engagement partner is responsible for the auditor's report being appropriate in the circumstances.</p>\n<p>&bull; Reviewing the audit documentation before the issue of the audit report is also the engagement partner's responsibility.</p>\n<p>&bull; The engagement partner must ensure that sufficient appropriate audit evidence (SAAE) has been obtained to support the conclusions reached and for the issuance of the auditor's report.</p>"}, {"title": "14. Reviewing Work of Less Experienced Team Members", "keywords": [{"label": "PRL", "icon": "scale"}, {"label": "Significant matters", "icon": "flag"}, {"label": "consultations", "icon": "handshake"}, {"label": "NTE", "icon": "hourglass"}, {"label": "conclusions", "icon": "stamp"}, {"label": "SAAE", "icon": "clipboard-check"}, {"label": "objectives", "icon": "target"}], "explanationHtml": "<p>While reviewing work performed by less experienced members of the engagement team, more experienced reviewers should consider whether:</p>\n<p>i. Work has been performed as per <strong>PRL</strong> requirements.</p>\n<p>ii. <strong>Significant matters</strong> have been raised for further consideration.</p>\n<p>iii. Appropriate <strong>consultations</strong> have taken place, and the resulting conclusions have been documented and implemented.</p>\n<p>iv. There is a need to revise the nature, timing, and extent (<strong>NTE</strong>) of work performed.</p>\n<p>v. The work performed supports the <strong>conclusions</strong> reached and is appropriately documented.</p>\n<p>vi. Evidence obtained is sufficient and appropriate to support the report. (<strong>SAAE</strong>)</p>\n<p>vii. The <strong>objectives</strong> of the engagement procedures have been achieved.</p>"}, {"title": "16a. Engagement Quality Control Review (EQCR)- Who is he?", "keywords": [{"label": "sufficient experience and authority", "icon": "graduation-cap"}, {"label": "Significant judgments", "icon": "crystal-ball"}], "explanationHtml": "<p><strong>Who is the Engagement Quality Control Reviewer?</strong></p>\n<p>&bull; A partner or other person within the firm (member of ICAI), a qualified external person, or a team of individuals, who has <strong>sufficient experience and authority</strong>, to objectively evaluate the significant judgments the engagement team made and the conclusions reached in formulating the report, before the report is issued.</p>\n<p><strong>Scope:</strong></p>\n<p><strong>Q: What does EQCR review?</strong></p>\n<p>&bull; The <strong>Significant judgments</strong> made in the engagement should be reviewed by the EQCR.</p>\n<p>&bull; The extent of the review depends on the <strong>complexity</strong> of the engagement and the risk that the report might be inappropriate.</p>\n<p><strong>Q: Is it mandatory for all engagements?</strong></p>\n<p>&bull; It is mandatory for audits of financial statements of listed entities. For others, the firm should have its own criteria.</p>\n<p><strong>Q: Role of EP in this regard?</strong></p>\n<p>&bull; The engagement partner takes responsibility for reviews being performed as per the firm's review policies.</p>\n<p>&bull; For audits of financial statements of listed entities, the engagement partner shall:</p>\n<p>&bull; Determine that an <strong>EQCR has been appointed</strong>;</p>\n<p>&bull; Discuss <strong>significant matters</strong> arising during the audit engagement with the reviewer; and</p>\n<p>&bull; Not date the auditor's report until completion of the EQCR \u2014 i.e., the EQCR should be completed before the audit report is issued.</p>\n<p><strong>Q: How to maintain objectivity of EQCR?</strong></p>\n<p>The engagement quality control reviewer:</p>\n<p>&bull; Is not selected by the engagement partner.</p>\n<p>&bull; Does not participate in the engagement during the period of review.</p>\n<p>&bull; Does not make decisions for the engagement team.</p>\n<p>&bull; Is not subject to other considerations that would threaten the reviewer's objectivity.</p>\n<p><strong>Q: What if EP &amp; EQCR have differences of Opinion?</strong></p>\n<p>&bull; Differences of opinion may arise within the engagement team, with those consulted, or between the engagement partner and the EQCR. The engagement team shall follow the firm's policies and procedures for dealing with and resolving differences of opinion \u2014 for example, by consulting another practitioner or firm, or a professional or regulatory body.</p>"}, {"title": "16b. Engagement Quality Control Review (EQCR)- Scope in listed entities?", "keywords": [{"label": "independence", "icon": "shield"}, {"label": "Significant risks", "icon": "warning-triangle"}, {"label": "Judgments", "icon": "crystal-ball"}, {"label": "consultation", "icon": "handshake"}, {"label": "misstatements", "icon": "scale"}, {"label": "Matters to be communicated", "icon": "megaphone"}, {"label": "working papers", "icon": "folder"}, {"label": "report", "icon": "scroll"}], "explanationHtml": "<p><strong>Scope of EQCR for Audits of FS of Listed Entities</strong> \u2014 includes consideration of the following:</p>\n<p>&bull; The engagement team's evaluation of the firm's <strong>independence</strong> in relation to the specific engagement.</p>\n<p>&bull; <strong>Significant risks</strong> identified during the engagement and the responses to those risks.</p>\n<p>&bull; <strong>Judgments</strong> made, with respect to materiality and significant risks.</p>\n<p>&bull; Whether appropriate <strong>consultation</strong> has taken place on differences of opinion or difficult/contentious matters, and the conclusions arising from them.</p>\n<p>&bull; The significance and disposition of <strong>corrected and uncorrected</strong> <strong>misstatements</strong> identified during the engagement.</p>\n<p>&bull; <strong>Matters to be communicated</strong> to management, TCWG, and regulatory bodies.</p>\n<p>&bull; Whether <strong>working papers</strong> selected for review reflect the work performed in relation to the significant judgments and support the conclusions reached.</p>\n<p>&bull; The appropriateness of the <strong>report</strong> to be issued.</p>"}, {"title": "17. Engagement Quality Control Reviewer's Documentation", "keywords": [{"label": "procedures", "icon": "gear"}, {"label": "completed before the report", "icon": "alarm-clock"}, {"label": "unresolved matters", "icon": "ghost"}], "explanationHtml": "<p>The reviewer should document, for the engagement reviewed, that:</p>\n<p>1. The <strong>procedures</strong> required by the firm's policies on EQCR have been performed.</p>\n<p>2. The EQCR has been <strong>completed before the report</strong> is issued.</p>\n<p>3. The reviewer is not aware of any <strong>unresolved matters</strong> that would cause the reviewer to believe that the <strong>significant judgments</strong> the engagement team made and the conclusions they reached were not appropriate.</p>\n<p>The engagement quality control reviewer shall perform an objective evaluation of the significant judgments the engagement team made and the conclusions reached in formulating the auditor's report.</p>\n<p>This evaluation shall involve:</p>\n<p>a. Discussion of <strong>significant matters</strong> with the engagement partner.</p>\n<p>b. Review of the <strong>financial statements</strong> and the <strong>proposed auditor's report</strong>.</p>\n<p>c. Review of selected audit documentation relating to the <strong>significant judgments</strong> the engagement team made and the conclusions reached.</p>\n<p>d. Evaluation of the <strong>conclusions</strong> reached in formulating the auditor's report and consideration of whether the proposed auditor's report is appropriate.</p>"}, {"title": "18. Engagement Documentation (ED)", "keywords": [{"label": "60 days", "icon": "alarm-clock"}, {"label": "7 years", "icon": "calendar"}, {"label": "ownership", "icon": "trophy"}, {"label": "safe custody", "icon": "shield"}, {"label": "electronically scanned", "icon": "fingerprint"}], "explanationHtml": "<p>&bull; Assembly of final engagement files should be done on a timely basis. In the case of an audit, the time limit is not more than <strong>60 days</strong> after the date of the auditor's report.</p>\n<p>&bull; The retention period ordinarily is no shorter than <strong>7 years</strong> from the date of the auditor's report, or, if later, the date of the group auditor's report.</p>\n<p><strong>Q: Who owns Engagement Documentation:</strong></p>\n<p>Engagement documentation is the <strong>ownership</strong> of the firm. The firm may, at its discretion, make portions of, or extracts from, the engagement documentation available to clients, provided such disclosure does not undermine the validity of the work performed, or, in the case of assurance engagements, the independence of the firm or its personnel.</p>\n<p><strong>Q: Engagement Documentation pointers:</strong></p>\n<p>&bull; The firm should establish policies and procedures to maintain the <strong>safe custody</strong>, integrity, accessibility, and retrievability of engagement documentation.</p>\n<p>&bull; Where engagement documentation is in paper or electronic form, the integrity, accessibility, or retrievability of underlying data may be compromised if the documentation can be <strong>altered, added to, or deleted</strong>.</p>\n<p>&bull; For practical reasons, original paper documentation may be <strong>electronically scanned</strong> for inclusion in the engagement files.</p>\n<p><strong>Q: What points to consider when paper documentation is electronically scanned?</strong></p>\n<p>Where this is done, the firm implements appropriate procedures requiring engagement teams to:</p>\n<p>a. Generate scanned copies that reflect the entire content of the <strong>original paper documentation</strong>, including manual signatures, cross references, and annotations.</p>\n<p>b. Integrate scanned copies into the <strong>engagement files</strong>, including indexing and signing off on scanned copies as necessary.</p>\n<p>c. Enable scanned copies to be <strong>retrieved and printed</strong> as necessary.</p>"}, {"title": "20. Complaints and Allegations", "keywords": [{"label": "policies and procedures", "icon": "scroll"}, {"label": "within or outside", "icon": "door"}, {"label": "clearly defined channels", "icon": "link-chain"}, {"label": "Investigate - Partner, Legal counsel, external", "icon": "detective-hat"}, {"label": "appropriate action", "icon": "thumb"}], "explanationHtml": "<p>i. The firm should establish <strong>policies and procedures</strong> to provide it with reasonable assurance that it deals appropriately with:</p>\n<p>a. Complaints that work performed by the firm fails to comply with PRL requirements; and</p>\n<p>b. Allegations of non-compliance with the firm's system of quality control.</p>\n<p>ii. Complaints may originate from <strong>within or outside</strong> the firm. They may be made by firm personnel, clients, or other third parties, and may be received by engagement team members or other firm personnel.</p>\n<p>iii. The firm establishes <strong>clearly defined channels</strong> for firm personnel to raise any concerns without fear of reprisals.</p>\n<p>iv. The firm<investigates such complaints and allegations as per its policies and procedures. The investigation is supervised by a partner with sufficient and appropriate experience and authority within the firm but who is not involved in the engagement, and may include involving legal counsel. Small firms and sole practitioners may use the services of a suitably qualified external person or another firm to carry out the investigation. Complaints, allegations, and responses to them are documented. (<strong>Investigate - Partner, Legal counsel, external</strong>)</p>\n<p>v. Where the results of the investigations indicate deficiencies in the firm's quality control policies and procedures, or non-compliance with the firm's system of quality control by individual(s), the firm takes <strong>appropriate action</strong>.</p>"}]}, {"id": "sa230", "title": "SA 230 \u2013 Audit Documentation", "subtitle": "Working papers: meaning, purpose, form and content, and assembly of the final file.", "cards": [{"title": "1. Meaning of Audit Documentation", "keywords": [{"label": "audit procedures", "icon": "gear"}, {"label": "audit evidence", "icon": "clipboard-check"}, {"label": "conclusions", "icon": "stamp"}], "explanationHtml": "<p>A record of:</p>\n<p>&bull; The <strong>audit procedures</strong> performed,</p>\n<p>&bull; The relevant <strong>audit evidence</strong> obtained, and</p>\n<p>&bull; The <strong>conclusions</strong> the auditor reached</p>\n<p>(commonly known as working papers).</p>"}, {"title": "2. Purposes of Audit Documentation", "keywords": [{"label": "plan and perform", "icon": "compass"}, {"label": "review", "icon": "magnify"}, {"label": "accountable", "icon": "anchor"}, {"label": "matters of continuing significance", "icon": "flag"}, {"label": "quality control", "icon": "shield-check"}, {"label": "external inspections", "icon": "binoculars"}], "explanationHtml": "<p>1. Assisting the engagement team to <strong>plan and perform</strong> the audit.</p>\n<p>2. Assisting members of the engagement team responsible for supervision to direct and supervise the audit, and to discharge their <strong>review</strong> responsibilities.</p>\n<p>3. Enabling the engagement team to be <strong>accountable</strong> for its work.</p>\n<p>4. Retaining a record of <strong>matters of continuing significance</strong> to future audits.</p>\n<p>5. Enabling the conduct of <strong>quality control</strong> reviews and inspections.</p>\n<p>6. Enabling the conduct of <strong>external inspections</strong>.</p>"}, {"title": "3. Form, Content, and Extent of Audit Documentation", "keywords": [{"label": "NTE", "icon": "hourglass"}, {"label": "results", "icon": "target"}, {
