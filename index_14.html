 "icon": "shield-check"}], "explanationHtml": "<p>&bull; Obtaining an understanding of the entity and its environment, including internal control (<strong>SA 315</strong>).</p>\n<p>&bull; Identifying and assessing the <strong>ROMM</strong> (SA 315).</p>\n<p>&bull; Determining and implementing overall responses to assessed risks at the financial statement level (<strong>SA 330</strong>).</p>\n<p>&bull; Designing and performing further audit procedures \u2014 tests of controls or substantive procedures (SA 330).</p>\n<p>&bull; Evaluating the sufficiency and appropriateness of audit evidence in forming an opinion (<strong>SA 500</strong>).</p>"}, {"title": "3. Considerations When Deciding to Use an Auditor's Expert", "keywords": [{"label": "Whether management used a management's expert", "icon": "graduation-cap"}, {"label": "Nature/significance/complexity of the matter", "icon": "puzzle"}, {"label": "ROMM in the matter", "icon": "raincloud"}, {"label": "Auditor's knowledge/experience with expert work", "icon": "binoculars"}, {"label": "Availability of alternative evidence sources", "icon": "compass"}], "explanationHtml": "<p>&bull; Whether management has used a <strong>management's expert</strong> in preparing the financial statements.</p>\n<p>&bull; The <strong>nature and significance</strong> of the matter, including its complexity.</p>\n<p>&bull; The <strong>ROMM</strong> in the matter.</p>\n<p>&bull; The expected nature of procedures to respond to identified risks, including the auditor's <strong>knowledge and experience</strong> with expert work on such matters; and</p>\n<p>&bull; The <strong>availability of alternative sources</strong> of audit evidence.</p>"}, {"title": "4. When Management Has Used a Management's Expert", "keywords": [{"label": "Nature/scope/objectives of the expert's work", "icon": "target"}, {"label": "Employed vs engaged expert", "icon": "seesaw"}, {"label": "Management's control/influence over the expert", "icon": "gear"}, {"label": "Expert's competence and capabilities", "icon": "graduation-cap"}, {"label": "Subject to technical performance standards", "icon": "ruler"}, {"label": "Entity's controls over expert's work", "icon": "shield"}], "explanationHtml": "<p>Where management has used a management's expert, the auditor's decision on whether to use an auditor's expert may also be influenced by similar factors (same as SA 500):</p>\n<p>&bull; The <strong>nature, scope, and objectives (NSO)</strong> of the management's expert's work.</p>\n<p>&bull; Whether the management's expert is <strong>employed</strong> by the entity, or <strong>engaged</strong> by it.</p>\n<p>&bull; The extent to which management can exercise <strong>control or influence</strong> over the expert's work.</p>\n<p>&bull; The management's expert's <strong>competence and capabilities</strong>.</p>\n<p>&bull; Whether the expert is subject to <strong>technical performance standards</strong>.</p>\n<p>&bull; Any <strong>controls</strong> within the entity over the management's expert's work.</p>"}, {"title": "5. NTE of Audit Procedures When Using an Auditor's Expert", "keywords": [{"label": "Nature of the matter", "icon": "puzzle"}, {"label": "ROMM in the matter", "icon": "raincloud"}, {"label": "Significance of the expert's work", "icon": "spotlight"}, {"label": "Knowledge/experience with the expert", "icon": "graduation-cap"}, {"label": "Subject to firm's quality control policies", "icon": "shield"}, {"label": "Factors suggesting more extensive procedures", "icon": "binoculars"}], "explanationHtml": "<p>The auditor shall consider matters including:</p>\n<p>a. The <strong>nature</strong> of the matter to which the expert's work relates.</p>\n<p>b. The <strong>ROMM</strong> in the matter.</p>\n<p>c. The <strong>significance</strong> of the expert's work in the context of the audit.</p>\n<p>d. The auditor's <strong>knowledge and experience</strong> with previous work performed by that expert; and</p>\n<p>e. Whether the expert is subject to the auditor's firm's <strong>quality control policies</strong>.</p>\n<p>Factors suggesting the need for <strong>more extensive procedures</strong>:</p>\n<p>&bull; The expert's work relates to a significant matter involving subjective and complex judgments.</p>\n<p>&bull; The auditor has not previously used the expert's work, and has no prior knowledge of their competence, capabilities, and objectivity.</p>\n<p>&bull; The expert is performing procedures integral to the audit, rather than being consulted on an individual matter.</p>\n<p>&bull; The expert is the auditor's <strong>external</strong> expert, not subject to the firm's quality control policies.</p>\n<p>&bull; The matter is <strong>highly complex</strong>.</p>\n<p>&bull; The greater the extent of the expert's work and its significance in the audit.</p>"}, {"title": "6-7. Competence, Capability, and Objectivity of an Auditor's Expert", "keywords": [{"label": "Similar to SA 500 (CCO)", "icon": "link-chain"}, {"label": "Inquire about interests/relationships", "icon": "microphone"}, {"label": "Discuss safeguards with the expert", "icon": "shield"}, {"label": "Financial interests/business relationships/other services", "icon": "handshake"}, {"label": "Written representation from external expert", "icon": "signature"}], "explanationHtml": "<p>Competence, capability, and objectivity of an auditor's expert are evaluated <strong>similarly to SA 500</strong> (for a management's expert).</p>\n<p><strong>Evaluating Objectivity of an Auditor's External Expert</strong> \u2014 it may be relevant to:</p>\n<p>a. <strong>Inquire</strong> of the entity about any known interests or relationships it has with the auditor's external expert.</p>\n<p>b. <strong>Discuss</strong> with the expert any applicable safeguards, including professional requirements, and evaluate the adequacy of the safeguards to reduce threats to an acceptable level.</p>\n<p>Interests/relationships relevant to discuss with the expert:</p>\n<p>&bull; Financial interests.</p>\n<p>&bull; Business and personal relationships.</p>\n<p>&bull; Provision of other services by the expert.</p>\n<p>&bull; In some cases, obtain a <strong>written representation</strong> from the auditor's external expert about interests/relationships with the entity, of which the expert is aware.</p>"}, {"title": "8. Agreement with the Auditor's Expert", "keywords": [{"label": "Nature/scope/objectives of the expert's work", "icon": "target"}, {"label": "Respective roles and responsibilities", "icon": "id-card"}, {"label": "NTE of communication/form of report", "icon": "gear"}, {"label": "Confidentiality requirements", "icon": "mask"}, {"label": "Factors suggesting need for written agreement", "icon": "scroll"}], "explanationHtml": "<p>The auditor shall agree, in writing when appropriate, on the following with the auditor's expert:</p>\n<p>a. The <strong>nature, scope, and objectives</strong> of that expert's work.</p>\n<p>b. The respective <strong>roles and responsibilities</strong> of the auditor and the expert.</p>\n<p>c. The <strong>NTE of communication</strong> between the auditor and expert, including the form of the expert's report; and</p>\n<p>(When the expert's work relates to a <strong>significant risk</strong>, both a formal written report at the conclusion of the work and oral reports as work progresses may be appropriate; identifying specific coordinating partners/staff assists timely, effective communication on larger engagements.)</p>\n<p>d. The need for the expert to observe <strong>confidentiality</strong> requirements.</p>\n<p>Factors suggesting the need for a <strong>more detailed or written agreement</strong>:</p>\n<p>&bull; The auditor has not previously used work performed by that expert.</p>\n<p>&bull; The auditor's expert will have access to <strong>sensitive or confidential</strong> entity information.</p>"}, {"title": "9. Evaluating the Adequacy of the Auditor's Expert's Work", "keywords": [{"label": "Inquiries of the expert", "icon": "microphone"}, {"label": "Reviewing working papers/reports", "icon": "folder"}, {"label": "Corroborative procedures \u2014 observe/examine/confirm/analyse/reperform", "icon": "magnify"}, {"label": "Discussion with another expert", "icon": "handshake"}, {"label": "Discussing the report with management", "icon": "megaphone"}], "explanationHtml": "<p>Specific procedures to evaluate the adequacy of the expert's work:</p>\n<p>&bull; <strong>Inquiries</strong> of the auditor's expert.</p>\n<p>&bull; Reviewing the expert's <strong>working papers and reports</strong>.</p>\n<p>&bull; <strong>Corroborative procedures</strong>, such as: observing the expert's work; examining published data from reputable, authoritative sources; confirming relevant matters with third parties; performing detailed analytical procedures; and re-performing calculations.</p>\n<p>&bull; Discussion with <strong>another expert</strong> with relevant expertise, when findings/conclusions are inconsistent with other audit evidence.</p>\n<p>&bull; Discussing the expert's report with <strong>management</strong>.</p>"}, {"title": "10. Use of Significant Assumptions and Methods", "keywords": [{"label": "Generally accepted within the expert's field", "icon": "graduation-cap"}, {"label": "Consistent with the applicable FRF", "icon": "clipboard-check"}, {"label": "Consistent with management's assumptions", "icon": "mirror"}, {"label": "Dependent on specialised models", "icon": "gear"}], "explanationHtml": "<p>Factors relevant to evaluating assumptions and methods, whether they are:</p>\n<p>&bull; <strong>Generally accepted</strong> within the auditor's expert's field.</p>\n<p>&bull; Consistent with the requirements of the applicable <strong>FRF</strong>.</p>\n<p>&bull; Consistent with <strong>management's</strong> assumptions/methods, and if not, the reason for and effects of the differences.</p>\n<p>&bull; Dependent on the use of <strong>specialised models</strong>.</p>"}, {"title": "11. Source Data", "keywords": [{"label": "Verifying origin of data/internal controls", "icon": "detective-hat"}, {"label": "Reviewing data for completeness and consistency", "icon": "clipboard-check"}], "explanationHtml": "<p>&bull; Verifying the <strong>origin of the data</strong>, including obtaining an understanding, and where applicable testing, of internal controls over the data and its transmission to the expert.</p>\n<p>&bull; Reviewing the data for <strong>completeness and internal consistency</strong>.</p>"}, {"title": "12. Inadequate Work", "keywords": [{"label": "Agree on further work with the expert", "icon": "handshake"}, {"label": "Perform further audit procedures/employ another expert", "icon": "compass"}, {"label": "Modified opinion if unresolved (SA 705)", "icon": "warning-triangle"}], "explanationHtml": "<p>If the work of the auditor's expert is not adequate, the auditor shall:</p>\n<p>a. <strong>Agree</strong> with the expert on the nature and extent of further work to be performed; or</p>\n<p>b. Perform <strong>further audit procedures</strong> appropriate to the circumstances (more work by the expert/auditor, or employing another expert).</p>\n<p><strong>Reporting:</strong> if not adequate and the matter cannot be resolved through additional procedures, the auditor shall express a <strong>modified opinion</strong> as per SA 705, because SAAE has not been obtained.</p>"}, {"title": "13. Reference to the Auditor's Expert in the Auditor's Report", "keywords": [{"label": "No reference in unmodified opinion, unless required by law", "icon": "brick-wall"}, {"label": "Reference must state responsibility not reduced", "icon": "signature"}, {"label": "Public sector transparency requirement", "icon": "megaphone"}, {"label": "Reference permitted if relevant to modification", "icon": "link-chain"}], "explanationHtml": "<p>&bull; The auditor shall <strong>not refer</strong> to the auditor's expert's work in a report containing an <strong>unmodified opinion</strong>, unless required by law or regulation.</p>\n<p>&bull; If such reference is required, the report shall state that the reference does <strong>not reduce</strong> the auditor's responsibility for the opinion.</p>\n<p>&bull; Law or regulation may require reference for purposes of <strong>transparency in the public sector</strong>.</p>\n<p>&bull; If the auditor references the expert's work because it is relevant to understanding a <strong>modification of opinion</strong>, the auditor shall indicate that this does not reduce the auditor's responsibility.</p>"}]}, {"id": "sa700", "title": "SA 700", "subtitle": "Forming an Opinion and Reporting on Financial Statements", "cards": [{"title": "1. Objective of the Auditor", "keywords": [{"label": "Arrive at an opinion based on audit evidence", "icon": "trophy"}, {"label": "Communicate the opinion via written report", "icon": "scroll"}], "explanationHtml": "<p>The auditor's objective has two parts:</p>\n<p>&bull; To arrive at an <strong>opinion</strong> on the financial statements, based on an evaluation of the conclusions drawn from the audit evidence gathered; and</p>\n<p>&bull; To communicate that opinion clearly through a <strong>written report</strong>.</p>"}, {"title": "2. Specific Matters the Auditor Must Evaluate", "keywords": [{"label": "Accounting policies adequately disclosed", "icon": "scroll"}, {"label": "Policies consistent with FRF/appropriate", "icon": "clipboard-check"}, {"label": "Reasonableness of accounting estimates", "icon": "crystal-ball"}, {"label": "Adequate disclosures on material transactions", "icon": "open-book"}, {"label": "Relevant/reliable/comparable/understandable information", "icon": "shield-check"}, {"label": "Appropriate terminology throughout", "icon": "tag"}], "explanationHtml": "<p>Before forming the opinion, the auditor specifically evaluates whether:</p>\n<p>a. The significant <strong>accounting policies</strong> selected and applied have been adequately disclosed.</p>\n<p>b. The accounting policies chosen and applied are <strong>consistent with the FRF</strong> and appropriate in the circumstances.</p>\n<p>c. The <strong>accounting estimates</strong> made by management are reasonable.</p>\n<p>d. The FS give adequate disclosures so users can understand the effect of <strong>material transactions and events</strong>.</p>\n<p>e. The information presented is <strong>relevant, reliable, comparable, and understandable</strong>.</p>\n<p>f. The <strong>terminology</strong> used throughout the FS \u2014 including the title of each statement \u2014 is appropriate.</p>"}, {"title": "3. Forming the Opinion", "keywords": [{"label": "Prepared in all material respects per FRF", "icon": "stamp"}, {"label": "Reasonable assurance free of material misstatement", "icon": "shield-check"}, {"label": "Fair presentation \u2014 OPSC and underlying transactions", "icon": "ruler"}, {"label": "Unmodified opinion definition", "icon": "trophy"}], "explanationHtml": "<p>The auditor forms an opinion on whether the FS are prepared, in all material respects, in accordance with the applicable FRF \u2014 obtaining <strong>reasonable assurance</strong> that the FS as a whole are free of material misstatement, whether due to fraud or error.</p>\n<p>Where the framework is a <strong>fair presentation framework</strong>, the auditor additionally evaluates whether the FS achieve fair presentation, by considering:</p>\n<p>1. The <strong>overall presentation, structure, and content</strong> of the FS (OPSC); and</p>\n<p>2. Whether the FS, including related notes, represent the underlying transactions and events in a manner achieving <strong>fair presentation</strong>.</p>\n<p>An <strong>unmodified opinion</strong> is expressed when the auditor concludes that the FS are prepared, in all material respects, as per the applicable framework.</p>"}, {"title": "4(1)-(2). Basic Elements \u2014 Title and Addressee", "keywords": [{"label": "Title \u2014 'Independent Auditor's Report'", "icon": "id-card"}, {"label": "Addressee \u2014 as per engagement circumstances", "icon": "envelope"}, {"label": "General purpose FS addressed to members", "icon": "handshake"}, {"label": "Special purpose FS may address the Board", "icon": "flag"}], "explanationHtml": "<p><strong>(1) Title:</strong> the report is titled <strong>\"Independent Auditor's Report.\"</strong></p>\n<p><strong>(2) Addressee:</strong> addressed as required by the circumstances of the engagement.</p>\n<p>&bull; For general-purpose (statutory) financial statements, typically addressed to the <strong>members</strong>.</p>\n<p>&bull; For special-purpose financial statements, may be addressed to the <strong>Board of Directors</strong>.</p>"}, {"title": "4(3). Basic Elements \u2014 Auditor's Opinion", "keywords": [{"label": "Identify the entity audited", "icon": "id-card"}, {"label": "State FS have been audited", "icon": "stamp"}, {"label": "Identify title of each statement", "icon": "tag"}, {"label": "Refer to notes/accounting policies summary", "icon": "scroll"}, {"label": "Specify period/date covered", "icon": "calendar"}], "explanationHtml": "<p>The <strong>Opinion</strong> section is the first section of the auditor's report. It must:</p>\n<p>a. Identify the <strong>entity</strong> whose financial statements have been audited.</p>\n<p>b. State that the financial statements <strong>have been audited</strong>.</p>\n<p>c. Identify the <strong>title</strong> of each statement comprising the FS.</p>\n<p>d. Refer to the <strong>notes</strong>, including the summary of significant accounting policies.</p>\n<p>e. Specify the <strong>date or period</strong> covered by each statement.</p>"}, {"title": "4(4). Basic Elements \u2014 Basis for Opinion", "keywords": [{"label": "Audit conducted per Standards on Auditing", "icon": "stamp"}, {"label": "Reference to auditor's responsibilities section", "icon": "link-chain"}, {"label": "Independence and ethical responsibilities (ICAI Code)", "icon": "shield"}, {"label": "Statement on sufficiency/appropriateness of evidence", "icon": "shield-check"}], "explanationHtml": "<p>Immediately after the Opinion section, the report includes a <strong>\"Basis for Opinion\"</strong> section, which must:</p>\n<p>a. State that the audit was conducted as per the <strong>Standards on Auditing</strong>.</p>\n<p>b. Refer to the section describing the auditor's <strong>responsibilities</strong> under the SAs.</p>\n<p>c. Include a statement of <strong>independence</strong> and fulfilment of ethical responsibilities, referencing the <strong>Code of Ethics</strong> issued by ICAI.</p>\n<p>d. State whether the audit evidence obtained is <strong>sufficient and appropriate</strong> to provide a basis for the opinion.</p>"}, {"title": "4(5)-(7). Going Concern, Key Audit Matters, and Other Information", "keywords": [{"label": "Going concern dealt with under SA 570", "icon": "anchor"}, {"label": "KAM required for listed entities (SA 701)", "icon": "spotlight"}, {"label": "Other Information reported per SA 720", "icon": "open-book"}], "explanationHtml": "<p><strong>(5) Going Concern:</strong> this aspect is already dealt with separately under <strong>SA 570</strong>.</p>\n<p><strong>(6) Key Audit Matters (KAM):</strong> for audits of financial statements of <strong>listed entities</strong>, KAM must be communicated in the auditor's report as required by <strong>SA 701</strong>.</p>\n<p><strong>(7) Other Information:</strong> where applicable, the auditor reports on \"Other Information\" as required by <strong>SA 720</strong> (Revised).</p>"}, {"title": "4(8). Basic Elements \u2014 Responsibilities of Management for the FS", "keywords": [{"label": "Heading \u2014 Responsibilities of Management (or TCWG)", "icon": "megaphone"}, {"label": "Preparing FS/internal control responsibility", "icon": "gear"}, {"label": "Going concern assessment responsibility", "icon": "anchor"}, {"label": "Identify those responsible for oversight", "icon": "id-card"}, {"label": "Fair presentation framework wording", "icon": "scroll"}], "explanationHtml": "<p>This section is headed <strong>\"Responsibilities of Management for the Financial Statements\"</strong> (or TCWG, in some entities). It must describe management's responsibility for:</p>\n<p>a. Preparing the FS as per the applicable FRF, and for the <strong>internal control</strong> necessary to enable FS free from material misstatement (fraud or error); and</p>\n<p>b. Assessing the entity's ability to continue as a <strong>going concern</strong>, including appropriateness of the going-concern basis, and disclosing related matters.</p>\n<p>The report should identify those responsible for <strong>oversight</strong> of the financial reporting process \u2014 where this differs from those preparing the FS, the heading should also refer to \"those charged with governance.\"</p>\n<p>Where FS are prepared under a <strong>fair presentation framework</strong>, refer to \"preparation and fair presentation of the financial statements\" or \"...that give a true and fair view,\" as appropriate.</p>"}, {"title": "4(9) Part I. Auditor's Responsibilities \u2014 Objectives and Materiality", "keywords": [{"label": "Reasonable assurance and issue an auditor's report", "icon": "trophy"}, {"label": "Reasonable assurance is high but not a guarantee", "icon": "shield"}, {"label": "Misstatements can arise from fraud or error", "icon": "mask"}, {"label": "Definition/description of materiality", "icon": "ruler"}], "explanationHtml": "<p><strong>Part I</strong> of the Auditor's Responsibilities section must:</p>\n<p>a. State the auditor's objectives are to: (i) obtain <strong>reasonable assurance</strong> that the FS as a whole are free from material misstatement (fraud or error); and (ii) issue an auditor's report including the opinion.</p>\n<p>b. State that reasonable assurance is a <strong>high level of assurance</strong>, but not a guarantee that an SA audit will always detect a material misstatement when one exists.</p>\n<p>c. State that misstatements can arise from fraud or error, and either: (i) describe that misstatements are <strong>material</strong> if they could reasonably influence users' economic decisions; or (ii) provide a definition of materiality per the applicable framework.</p>"}, {"title": "4(9) Part II. Auditor's Responsibilities \u2014 Professional Judgment and Key Duties", "keywords": [{"label": "Professional judgment and skepticism throughout", "icon": "spotlight"}, {"label": "Identify/assess ROMM", "icon": "raincloud"}, {"label": "Understand internal control relevant to audit", "icon": "gear"}, {"label": "Evaluate accounting policies/estimates/disclosures", "icon": "clipboard-check"}, {"label": "Conclude on going-concern basis appropriateness", "icon": "anchor"}, {"label": "Evaluate overall presentation/structure/content", "icon": "ruler"}, {"label": "Group audit responsibilities (SA 600)", "icon": "link-chain"}], "explanationHtml": "<p><strong>Part II</strong> must further describe that the auditor exercises <strong>professional judgment</strong> and maintains <strong>professional skepticism</strong> throughout the audit, and that responsibilities include:</p>\n<p>&bull; Identifying and assessing the <strong>ROMM</strong> of the financial statements.</p>\n<p>&bull; Obtaining an understanding of <strong>internal control</strong> relevant to the audit, to design appropriate procedures.</p>\n<p>&bull; Evaluating the appropriateness of: accounting policies used; reasonableness of accounting estimates; and related disclosures.</p>\n<p>&bull; Concluding on the appropriateness of management's use of the <strong>going-concern basis</strong>.</p>\n<p>&bull; Evaluating the overall <strong>presentation, structure, and content</strong> of the FS.</p>\n<p>&bull; Describing the auditor's responsibilities in a <strong>group audit engagement</strong>, where applicable, as per SA 600.</p>"}, {"title": "4(9) Part III. Auditor's Responsibilities \u2014 Communication with TCWG and KAM", "keywords": [{"label": "Communicate scope/timing/findings to TCWG", "icon": "megaphone"}, {"label": "Statement of compliance with independence requirements", "icon": "signature"}, {"label": "Determine KAM from matters communicated to TCWG", "icon": "spotlight"}, {"label": "Presentation of KAM \u2014 exceptions", "icon": "warning-triangle"}], "explanationHtml": "<p><strong>Part III</strong> must also:</p>\n<p>a. State that the auditor communicates with TCWG on the planned <strong>scope and timing</strong> of the audit, and significant <strong>audit findings</strong>, including significant deficiencies in internal control.</p>\n<p>b. State that the auditor provides TCWG with a statement of compliance with <strong>relevant ethical requirements</strong> regarding independence, and communicates relationships/safeguards.</p>\n<p>c. For audits with KAM (SA 701), state that from matters communicated to TCWG, the auditor determines those of <strong>most significance</strong> \u2014 the Key Audit Matters.</p>\n<p><strong>Presentation of KAM in the report:</strong> per SA 701, the auditor describes these matters unless:</p>\n<p>&bull; Law or regulation precludes public disclosure; or</p>\n<p>&bull; In extremely rare circumstances, the adverse consequences of communication could reasonably outweigh the public-interest benefits.</p>"}, {"title": "4(10). Location of the Description of Auditor's Responsibilities", "keywords": [{"label": "Within the body of the report", "icon": "open-book"}, {"label": "Within an appendix, with a reference", "icon": "folder"}, {"label": "Reference to a website description, where permitted", "icon": "compass"}], "explanationHtml": "<p>This description may be presented in one of three ways:</p>\n<p>a. Within the <strong>body</strong> of the audit report itself;</p>\n<p>b. Within an <strong>appendix</strong> to the report, with a reference to its location; or</p>\n<p>c. By a specific <strong>reference to a website</strong> of the appropriate authority, where law, regulation, or auditing standards permit.</p>"}, {"title": "4(11)-(14). Other Reporting Responsibilities, Signature, Place, and Date", "keywords": [{"label": "Other Legal and Regulatory Requirements heading", "icon": "scale"}, {"label": "Signature \u2014 personal name and firm name", "icon": "signature"}, {"label": "Partner's membership/firm registration/UDIN", "icon": "id-card"}, {"label": "Place of signature \u2014 the city", "icon": "flag"}, {"label": "Date not earlier than SAAE obtained", "icon": "shield-check"}], "explanationHtml": "<p><strong>(11) Other Reporting Responsibilities:</strong> presented under the heading <strong>\"Report on Other Legal and Regulatory Requirements.\"</strong></p>\n<p><strong>(12) Signature of the Auditor:</strong> signed by the auditor in their <strong>personal name</strong> as well as in the name of the <strong>audit firm</strong>. Where a partner signs, the signature must also state the partner's <strong>membership number</strong>, the firm's <strong>registration number</strong>, and the <strong>UDIN</strong>.</p>\n<p><strong>(13) Place of Signature:</strong> the location \u2014 i.e., the <strong>city</strong> \u2014 where the report is signed.</p>\n<p><strong>(14) Date of the Audit Report:</strong> cannot be dated earlier than the date on which the auditor has obtained <strong>SAAE</strong>.</p>"}, {"title": "5. Audit Reports Referring to Both SAs and International/Other Jurisdictional Standards", "keywords": [{"label": "No conflict in requirements leading to different opinion", "icon": "handshake"}, {"label": "Minimum elements required by SAs included", "icon": "clipboard-check"}, {"label": "Both sets of standards clearly identified", "icon": "tag"}], "explanationHtml": "<p>An auditor may be required to conduct an audit as per both the SAs (ICAI) and ISAs (or another jurisdiction's standards). The report may refer to the SAs in addition to the ISAs <strong>only if both</strong> conditions are met:</p>\n<p>a. No <strong>conflict</strong> between requirements that would lead the auditor to: (i) form a different opinion; or (ii) not include an Emphasis of Matter/Other Matter paragraph required by the SAs; and</p>\n<p>b. The report includes, at minimum, each element <strong>required by the SAs</strong> when also referring to the other jurisdiction's standards \u2014 identifying the SAs accordingly.</p>\n<p>When referring to both, the report must clearly identify <strong>both sets of standards</strong>, including the jurisdiction of origin of the other auditing standards.</p>"}, {"title": "6. Supplementary Information Presented with the Financial Statements", "keywords": [{"label": "Evaluate whether integral part of the FS", "icon": "puzzle"}, {"label": "Integral \u2014 covered by the opinion", "icon": "stamp"}, {"label": "Not integral \u2014 evaluate differentiation", "icon": "seesaw"}, {"label": "Request management to change presentation", "icon": "megaphone"}, {"label": "Identify unaudited information if refused", "icon": "warning-triangle"}, {"label": "Illustrative examples \u2014 reconciliation vs separate schedule", "icon": "scroll"}], "explanationHtml": "<p>If supplementary information not required by the FRF is presented with the audited FS, the auditor evaluates whether it should be considered an <strong>integral part</strong> of the audited FS:</p>\n<p>&bull; If it <strong>is</strong> integral, it must be covered by the auditor's opinion.</p>\n<p>&bull; If <strong>not</strong> integral, the auditor evaluates whether it is <strong>sufficiently differentiated</strong> from the audited FS.</p>\n<p>&bull; If not adequately differentiated, ask management to <strong>change how it is presented</strong>.</p>\n<p>&bull; If management refuses, the auditor must: <strong>identify</strong> the unaudited supplementary information in the report, and <strong>explain</strong> that it has not been audited.</p>\n<p><strong>Illustrative examples:</strong></p>\n<p>1. A note reconciling the FS to another FRF is treated as supplementary information that <strong>cannot</strong> be differentiated \u2014 the opinion covers it.</p>\n<p>2. An additional P&L schedule disclosing specific expenditure items, as an appendix, is treated as supplementary information that <strong>can</strong> be differentiated \u2014 it falls <strong>outside</strong> the scope of the opinion.</p>"}]}, {"id": "sa701", "title": "SA 701", "subtitle": "Communicating Key Audit Matters (KAM) in the Independent Auditor's Report", "cards": [{"title": "1. Applicability", "keywords": [{"label": "Audits of listed entities' general purpose FS", "icon": "spotlight"}, {"label": "When auditor decides to communicate KAM", "icon": "compass"}, {"label": "When required by law or regulation", "icon": "scale"}], "explanationHtml": "<p>Applies to audits of complete sets of general purpose financial statements of <strong>listed entities</strong>, and circumstances when the auditor decides to communicate Key Audit Matters (KAM), and when <strong>required by law or regulation</strong>.</p>"}, {"title": "2. Meaning of Key Audit Matters", "keywords": [{"label": "Matters of most significance in the audit", "icon": "trophy"}, {"label": "Selected from matters communicated with TCWG", "icon": "megaphone"}], "explanationHtml": "<p>Key Audit Matters are matters that, in the auditor's professional judgment, were of <strong>most significance</strong> in the audit of the financial statements of the current period.</p>\n<p>KAM are selected from matters <strong>communicated with TCWG</strong>.</p>"}, {"title": "3. Communicating KAM Is Not", "keywords": [{"label": "Substitute for FS disclosures", "icon": "brick-wall"}, {"label": "Substitute for a modified opinion (SA 705)", "icon": "warning-triangle"}, {"label": "Substitute for SA 570 reporting on going concern", "icon": "anchor"}, {"label": "Separate opinion on individual matters", "icon": "stamp"}], "explanationHtml": "<p>a. A substitute for <strong>disclosures</strong> in the financial statements, as per the FRF.</p>\n<p>b. A substitute for the auditor expressing a <strong>modified opinion</strong>, as per SA 705.</p>\n<p>c. A substitute for reporting as per <strong>SA 570</strong>, when a material uncertainty exists related to going concern; and</p>\n<p>d. A <strong>separate opinion</strong> on individual matters.</p>"}, {"title": "4. Factors Determining Key Audit Matters", "keywords": [{"label": "Areas of higher ROMM/significant risks (SA 315)", "icon": "raincloud"}, {"label": "Significant auditor judgments/estimates with high uncertainty", "icon": "crystal-ball"}, {"label": "Effect of significant events/transactions", "icon": "flag"}], "explanationHtml": "<p>a. Areas of higher assessed <strong>ROMM</strong>, or significant risks identified per SA 315.</p>\n<p>b. Significant auditor judgments relating to areas involving significant <strong>management judgment</strong>, including estimates with <strong>high estimation uncertainty</strong>.</p>\n<p>c. The effect on the audit of significant <strong>events or transactions</strong> that occurred during the period.</p>"}, {"title": "5. Examples of Key Audit Matters", "keywords": [{"label": "Impairment assessment", "icon": "thermometer"}, {"label": "Provision for losses and contingencies", "icon": "umbrella"}, {"label": "Valuation of financial instruments", "icon": "calculator"}, {"label": "Revenue recognition", "icon": "tag"}, {"label": "Taxation matters \u2014 jurisdictions/uncertain positions/deferred tax", "icon": "scale"}], "explanationHtml": "<p>Examples: assessment of <strong>impairment</strong>, <strong>provision for losses and contingencies</strong>, <strong>valuation of financial instruments</strong>, <strong>revenue recognition</strong>, <strong>taxation matters</strong> (multiple tax jurisdictions, uncertain tax position, deferred tax assets).</p>"}, {"title": "6. Can Matters Not Disclosed in the FS Be KAM?", "keywords": [{"label": "Other TCWG matters requiring significant attention", "icon": "megaphone"}, {"label": "Not required to be disclosed in FS", "icon": "ghost"}, {"label": "Example \u2014 new/changed IT system affecting strategy/risk", "icon": "gear"}], "explanationHtml": "<p>&bull; There may be other matters communicated with TCWG requiring significant auditor attention, which may be determined to be <strong>KAM</strong>.</p>\n<p>&bull; Such matters may include those relevant to the audit but <strong>not required to be disclosed</strong> in the financial statements.</p>\n<p>&bull; <strong>Example:</strong> implementation of a new IT system (or significant changes to one) may be an area of significant attention if it had a significant effect on the overall audit strategy, or relates to a <strong>significant risk</strong> (e.g. changes affecting revenue recognition).</p>"}, {"title": "7. Communicating Key Audit Matters", "keywords": [{"label": "Matters of most significance in current period audit", "icon": "trophy"}, {"label": "Addressed in context of FS as a whole", "icon": "puzzle"}, {"label": "No separate opinion on these matters", "icon": "brick-wall"}], "explanationHtml": "<p>The introductory language in this section shall state that:</p>\n<p>a. KAM are those matters that, in the auditor's professional judgment, were of <strong>most significance</strong> in the audit of the financial statements [of the current period]; and</p>\n<p>b. These matters were addressed in the context of the audit <strong>as a whole</strong>, and in forming the opinion thereon, and the auditor does <strong>not provide a separate opinion</strong> on these matters.</p>"}, {"title": "8. Placement of the KAM Section in the Auditor's Report", "keywords": [{"label": "After Basis for Opinion, before Management Responsibility", "icon": "link-chain"}, {"label": "After MURG section if going-concern uncertainty exists", "icon": "anchor"}, {"label": "EOM paragraph placed before or after KAM (SA 706)", "icon": "seesaw"}], "explanationHtml": "<p>&bull; Generally: after the <strong>\"Basis for Opinion\"</strong> paragraph, and <strong>before</strong> management's responsibility paragraph.</p>\n<p>&bull; If a <strong>\"Material Uncertainty Related to Going Concern\" (MURG)</strong> section is required per SA 570 (Revised), the KAM section is placed <strong>after</strong> that.</p>\n<p>&bull; As per SA 706: an <strong>Emphasis of Matter (EOM)</strong> paragraph may be placed either directly before or after the KAM section, per the auditor's judgment on relative significance. The heading may add context, e.g. \"Emphasis of Matter \u2014 Subsequent Event,\" to differentiate it from individual KAM.</p>"}, {"title": "9. KAM When the Opinion Is Modified (Qualified/Adverse)", "keywords": [{"label": "KAM is not a substitute for required FS disclosures", "icon": "brick-wall"}, {"label": "Basis for Qualified/Adverse Opinion \u2014 separate section", "icon": "flag"}, {"label": "Other KAM remains relevant to communicate", "icon": "trophy"}, {"label": "Adverse opinion \u2014 possibly no other KAM", "icon": "ghost"}], "explanationHtml": "<p>Communicating KAM is not a substitute for disclosures the applicable FRF requires management to make, or that are otherwise necessary for fair presentation.</p>\n<p>SA 705 addresses circumstances of material misstatement relating to disclosures.</p>\n<p>&bull; When expressing a qualified or adverse opinion, presenting the matter in the <strong>\"Basis for Qualified/Adverse Opinion\"</strong> section promotes understanding and identifies these circumstances.</p>\n<p>&bull; Separating this from other KAM gives it appropriate <strong>prominence</strong>.</p>\n<p>&bull; Other KAM would still be relevant to communicate to enhance users' understanding \u2014 the KAM requirements still apply.</p>\n<p>&bull; Since an <strong>adverse opinion</strong> means misstatements are material and pervasive, depending on significance, the auditor may determine <strong>no other matters are KAM</strong>.</p>\n<p>In such a case: <em>\"Key Audit Matters: Except for the matter described in the Basis for Adverse Opinion section, we have determined that there are no other key audit matters to communicate in our report.\"</em></p>"}]}, {"id": "sa705", "title": "SA 705", "subtitle": "Modifications to the Opinion in the Independent Auditor's Report", "cards": [{"title": "1. Objective", "keywords": [{"label": "FS as a whole not free from material misstatement", "icon": "warning-triangle"}, {"label": "Unable to obtain SAAE that FS are free from misstatement", "icon": "shield-check"}], "explanationHtml": "<p>To express clearly an appropriately <strong>modified opinion</strong> on the financial statements, necessary when:</p>\n<p>a. The auditor concludes, based on audit evidence obtained, that the FS as a whole are <strong>not free from material misstatement</strong>; or</p>\n<p>b. The auditor is <strong>unable to obtain SAAE</strong> to conclude that the FS as a whole are free from material misstatement.</p>"}, {"title": "2. Definition of 'Pervasive'", "keywords": [{"label": "Not confined to specific elements", "icon": "binoculars"}, {"label": "Substantial proportion if confined", "icon": "scale"}, {"label": "Fundamental to understanding disclosures", "icon": "spotlight"}], "explanationHtml": "<p>Used to describe effects, or possible effects, on the FS of misstatements undetected due to inability to obtain SAAE. Pervasive effects, in the auditor's judgment:</p>\n<p>i. Are <strong>not confined</strong> to specific elements, accounts, or items of the FS.</p>\n<p>ii. If so confined, represent or could represent a <strong>substantial proportion</strong> of the FS; or</p>\n<p>iii. In relation to disclosures, are <strong>fundamental</strong> to users' understanding of the FS.</p>"}, {"title": "3. Qualified (Q) Opinion", "keywords": [{"label": "Material but not pervasive misstatements", "icon": "warning-triangle"}, {"label": "Unable to obtain SAAE \u2014 possible effects material not pervasive", "icon": "shield-check"}, {"label": "'Except for the effects of' wording", "icon": "signature"}, {"label": "'Except for the possible effects of' \u2014 inability to obtain evidence", "icon": "ghost"}], "explanationHtml": "<p>Express a <strong>qualified opinion</strong> when:</p>\n<p>a. Having obtained SAAE, the auditor concludes misstatements are <strong>material but not pervasive</strong>; or</p>\n<p>b. Unable to obtain SAAE, but concludes possible effects of undetected misstatements could be <strong>material but not pervasive</strong>.</p>\n<p><strong>Special Considerations:</strong> when qualifying due to a material misstatement, state that except for the effects of the matter(s) described in the \"Basis for Qualified Opinion\" section:</p>\n<p>1. Fair presentation framework \u2014 the FS present fairly (true and fair view), in accordance with [FRF]; or</p>\n<p>2. Compliance framework \u2014 the FS have been prepared, in all material respects, in accordance with [FRF].</p>\n<p>When the modification arises from an <strong>inability to obtain SAAE</strong>, use the phrase <strong>\"except for the possible effects of the matter(s) ...\"</strong></p>"}, {"title": "4. Adverse (A) Opinion", "keywords": [{"label": "Material and pervasive misstatements", "icon": "mask"}, {"label": "'Do not present fairly' wording (fair presentation)", "icon": "brick-wall"}, {"label": "'Have not been prepared' wording (compliance)", "icon": "seesaw"}], "explanationHtml": "<p>Express an <strong>adverse opinion</strong> when, having obtained SAAE, the auditor concludes misstatements are both <strong>material and pervasive</strong>.</p>\n<p><strong>Special Considerations:</strong> state that, because of the significance of the matter(s) described in the \"Basis for Adverse Opinion\" section:</p>\n<p>1. Fair presentation framework \u2014 the FS <strong>do not present fairly</strong> (or give a true and fair view), in accordance with [FRF]; or</p>\n<p>2. Compliance framework \u2014 the FS <strong>have not been prepared</strong>, in all material respects, in accordance with [FRF].</p>"}, {"title": "5. Disclaimer of Opinion", "keywords": [{"label": "Unable to obtain SAAE \u2014 possible effects material and pervasive", "icon": "shield-check"}, {"label": "No KAM section unless required by law", "icon": "brick-wall"}, {"label": "Does not express an opinion statement", "icon": "mask"}, {"label": "Amend statement \u2014 engaged to audit, not 'has audited'", "icon": "signature"}], "explanationHtml": "<p>The auditor is unable to obtain SAAE, and concludes that the possible effects of undetected misstatements could be both <strong>material and pervasive</strong>.</p>\n<p><strong>Note:</strong> unless required by law/regulation, when disclaiming an opinion, the report shall <strong>not include a KAM section</strong> (SA 701).</p>\n<p><strong>Special Considerations:</strong></p>\n<p>1. State that the auditor <strong>does not express an opinion</strong> on the FS.</p>\n<p>2. State that, because of the significance of the matter(s) in the \"Basis for Disclaimer of Opinion\" section, the auditor was <strong>unable to obtain SAAE</strong> to provide a basis for an opinion; and</p>\n<p>3. Amend the SA 700 statement that FS have been audited, to state the auditor <strong>was engaged to audit</strong> the FS.</p>"}, {"title": "6. Basis for Modification of Opinion", "keywords": [{"label": "Amend heading to Basis for Qualified/Adverse/Disclaimer", "icon": "warning-triangle"}, {"label": "Description of the matter in the section", "icon": "scroll"}, {"label": "Table \u2014 specific amounts/narrative/non-disclosure/inability", "icon": "seesaw"}, {"label": "Disclaimer omits responsibilities reference and SAAE statement", "icon": "shield-check"}], "explanationHtml": "<p>When modifying the opinion, the auditor shall:</p>\n<p>a. Amend the heading <strong>\"Basis for Opinion\"</strong> to <strong>\"Basis for Qualified/Adverse/Disclaimer of Opinion\"</strong>, as appropriate; and</p>\n<p>b. Include, within this section, a <strong>description of the matter</strong> giving rise to the modification.</p>\n<p><strong>What to include, depending on what the material misstatement relates to:</strong></p>\n<p>1. <strong>Specific amounts</strong> (incl. quantitative disclosures) \u2014 description and quantification of the financial effects, unless impracticable (if not practicable, so state).</p>\n<p>2. <strong>Narrative disclosures</strong> \u2014 explanation of how the disclosures are misstated.</p>\n<p>3. <strong>Non-disclosure of information</strong> \u2014 discuss with TCWG; describe the nature of the omitted information; and, unless prohibited, include the omitted disclosures where practicable and SAAE has been obtained about it.</p>\n<p>4. <strong>Inability to obtain SAAE</strong> \u2014 reasons for that inability.</p>\n<p>When <strong>disclaiming</strong> an opinion, the report shall not include: reference to the section describing the auditor's responsibilities; and a statement on sufficiency/appropriateness of evidence.</p>\n<p><strong>Note:</strong> even with an adverse/disclaimer opinion, the auditor shall describe in the \"Basis for Opinion\" section the reasons for any <strong>other matters</strong> that would have required modification, and their effects.</p>"}, {"title": "7. Auditor's Responsibilities \u2014 When Disclaiming an Opinion", "keywords": [{"label": "Responsibility to conduct audit and issue report", "icon": "signature"}, {"label": "Unable to obtain SAAE \u2014 basis for disclaimer", "icon": "shield-check"}, {"label": "Independence and ethical responsibilities statement", "icon": "shield"}], "explanationHtml": "<p>When disclaiming an opinion due to inability to obtain SAAE, the auditor shall amend the SA 700 description to include only:</p>\n<p>a. A statement that the auditor's responsibility is to conduct an audit as per the SAs, and issue a report.</p>\n<p>b. A statement that, because of the matter(s) in the \"Basis for Disclaimer of Opinion\" section, the auditor was <strong>unable to obtain SAAE</strong> to provide a basis for an opinion; and</p>\n<p>c. A statement about auditor <strong>independence</strong> and other ethical responsibilities, required by SA 700.</p>"}, {"title": "8. Communication with TCWG", "keywords": [{"label": "Circumstances leading to expected modification", "icon": "megaphone"}, {"label": "Wording of the modification", "icon": "scroll"}], "explanationHtml": "<p>When expecting to modify the opinion, the auditor shall communicate with TCWG:</p>\n<p>&bull; The <strong>circumstances</strong> that led to the expected modification; and</p>\n<p>&bull; The <strong>wording</strong> of the modification.</p>"}, {"title": "9. Management-Imposed Limitation After Acceptance", "keywords": [{"label": "Request management to remove limitation", "icon": "megaphone"}, {"label": "Communicate with TCWG if refused", "icon": "brick-wall"}, {"label": "Alternative procedures to obtain SAAE", "icon": "shield-check"}, {"label": "Material not pervasive \u2014 qualified opinion", "icon": "warning-triangle"}, {"label": "Material and pervasive \u2014 withdraw or disclaim", "icon": "door"}], "explanationHtml": "<p>&bull; If likely to result in a qualified or disclaimer opinion, <strong>request management to remove</strong> the limitation.</p>\n<p>&bull; If management refuses, <strong>communicate with TCWG</strong>, and determine whether alternative procedures can obtain SAAE.</p>\n<p>&bull; If still unable to obtain SAAE, and possible effects would be <strong>material but not pervasive</strong> \u2192 express a <strong>qualified opinion</strong>.</p>\n<p>&bull; If possible effects would be <strong>material and pervasive</strong>: <strong>withdraw</strong> from the engagement, where practicable/possible under law; or, where withdrawal is not practicable, <strong>disclaim</strong> an opinion.</p>\n<p>&bull; Before withdrawal, communicate to TCWG any matters giving rise to the intended modification.</p>\n<p><strong>Note:</strong> if expressing an adverse or disclaimer opinion, the report shall not contain an unmodified opinion for any element of the FS.</p>"}, {"title": "10. SEBI Provisions on Auditor Resignation (Listed Entities)", "keywords": [{"label": "Resign within 45 days \u2014 LR report for the quarter", "icon": "calendar"}, {"label": "Resign after 45 days \u2014 report for quarter and next", "icon": "hourglass"}, {"label": "LR issued for first 3 quarters \u2014 full year report", "icon": "clipboard-check"}, {"label": "Example \u2014 resignation after 45 days of Q1", "icon": "calculator"}], "explanationHtml": "<p><strong>If resigning within 45 days from quarter-end:</strong> issue a <strong>Limited Review (LR) Report</strong> for such quarter, before resigning.</p>\n<p><strong>If more than 45 days from quarter-end:</strong> issue an Audit/LR Report for such quarter, <strong>and the next one</strong>, before resigning.</p>\n<p><strong>If an LR Report was issued for the first 3 quarters:</strong> issue an <strong>Audit Report for the full year</strong>, before resigning.</p>\n<p><strong>Example:</strong> auditor resigns on 18.08.24 (more than 45 days from Q1 end) \u2192 issue an LR Report for <strong>Q1 and Q2</strong>.</p>\n<p>ICAI: an auditor of an unlisted company shall not mention \"professional pre-occupation\" as a resignation reason; reasons must be clearly stated in the resignation letter.</p>"}, {"title": "11. Auditor's Inability to Obtain SAAE (Scope Limitation) May Arise From", "keywords": [{"label": "Circumstances beyond entity's control \u2014 destroyed/seized records", "icon": "brick-wall"}, {"label": "Nature/timing of auditor's work \u2014 equity method/appointment timing", "icon": "gear"}, {"label": "Limitations imposed by management \u2014 inventory/confirmations", "icon": "mask"}], "explanationHtml": "<p><strong>(a) Circumstances beyond the control of the entity:</strong></p>\n<p>&bull; The entity's accounting records have been <strong>destroyed</strong>.</p>\n<p>&bull; Records of a significant component <strong>seized indefinitely</strong> by government authorities.</p>\n<p><strong>(b) Circumstances relating to the nature or timing of the auditor's work:</strong></p>\n<p>&bull; The entity uses the equity method for an associate, and the auditor cannot obtain SAAE about the latter's financial information.</p>\n<p>&bull; Timing of appointment prevents observing the <strong>physical inventory count</strong>.</p>\n<p>&bull; Substantive procedures alone are insufficient, but the entity's controls are not effective.</p>\n<p><strong>(c) Limitations imposed by management:</strong></p>\n<p>&bull; Management prevents observing the physical inventory count.</p>\n<p>&bull; Management prevents requesting external confirmation of specific balances.</p>"}, {"title": "12. Special Points", "keywords": [{"label": "No disclosure of material uncertainty \u2014 adverse opinion", "icon": "raincloud"}, {"label": "Incomplete disclosure \u2014 qualified opinion", "icon": "warning-triangle"}, {"label": "Non-consolidation of subsidiary \u2014 adverse opinion", "icon": "puzzle"}, {"label": "Unable to obtain evidence on JV (90% net assets) \u2014 disclaimer", "icon": "ghost"}, {"label": "No agreement on material loan/advance \u2014 qualified opinion", "icon": "brick-wall"}], "explanationHtml": "<p>i. As per SA 570, if a material uncertainty exists and adequate disclosure is not made: <strong>no disclosure at all</strong> \u2192 Adverse Opinion; <strong>incomplete disclosure</strong> \u2192 Qualified Opinion.</p>\n<p>ii. <strong>Non-consolidation of a subsidiary</strong> (material and pervasive) \u2192 Adverse Opinion.</p>\n<p>iii. Unable to obtain evidence about a <strong>joint venture investment</strong> (90% of net assets) \u2192 Disclaimer of Opinion.</p>\n<p>iv. <strong>No agreement</strong> on a loan or advance (material) \u2192 Qualified Opinion.</p>"}]}, {"id": "sa706", "title": "SA 706", "subtitle": "Emphasis of Matter Paragraphs and Other Matter Paragraphs in the Independent Auditor's Report", "cards": [{"title": "1. Special Points Carried Over (Linking SA 705 and SA 706)", "keywords": [{"label": "Management prevents observing inventory count", "icon": "eye"}, {"label": "Management prevents confirmation requests", "icon": "stamp"}, {"label": "No disclosure of material uncertainty \u2014 adverse opinion", "icon": "raincloud"}, {"label": "Non-consolidation of subsidiary \u2014 adverse opinion", "icon": "puzzle"}, {"label": "Unable to obtain JV evidence (90% assets) \u2014 disclaimer", "icon": "ghost"}, {"label": "No agreement on material loan/advance \u2014 qualified opinion", "icon": "brick-wall"}], "explanationHtml": "<p>Circumstances carried over from SA 705:</p>\n<p>&bull; Management prevents observing the counting of physical inventory.</p>\n<p>&bull; Management prevents requesting external confirmation of specific account balances.</p>\n<p><strong>Special points on modification of opinion:</strong></p>\n<p>i. As per SA 570, if a material uncertainty (M.U.) exists and adequate disclosure is not there: <strong>no disclosure</strong> \u2192 Adverse Opinion; <strong>incomplete disclosure</strong> \u2192 Qualified Opinion.</p>\n<p>ii. <strong>Non-consolidation of a subsidiary</strong> (material and pervasive) \u2192 Adverse Opinion.</p>\n<p>iii. Unable to obtain evidence about a <strong>joint venture investment</strong> (90% of net assets) \u2192 Disclaimer of Opinion.</p>\n<p>iv. <strong>No agreement</strong> of a loan or advance (material) \u2192 Qualified Opinion.</p>"}, {"title": "2. Emphasis of Matter Paragraph", "keywords": [{"label": "Refers to matter appropriately presented/disclosed", "icon": "scroll"}, {"label": "Fundamental to users' understanding", "icon": "spotlight"}, {"label": "SA 210 unacceptable FRF prescribed by law", "icon": "flag"}, {"label": "Special purpose framework alert", "icon": "megaphone"}, {"label": "Subsequent events new/amended report (SA 560)", "icon": "calendar"}, {"label": "Examples \u2014 litigation/subsequent event/new standard/catastrophe", "icon": "binoculars"}], "explanationHtml": "<p>A paragraph included in the auditor's report, referring to a matter <strong>appropriately presented or disclosed</strong> in the FS, that is of such importance that it is <strong>fundamental to users' understanding</strong>.</p>\n<p>SAs with specific requirements to include an EOM paragraph in certain circumstances include:</p>\n<p>&bull; When a FRF prescribed by law/regulation would be <strong>unacceptable but for being prescribed</strong> by law/regulation (SA 210).</p>\n<p>&bull; To alert users the FS are prepared under a <strong>special purpose framework</strong>.</p>\n<p>&bull; When facts become known after the report date and the auditor provides a new/amended report (<strong>subsequent events</strong>, SA 560).</p>\n<p>Examples where an EOM paragraph may be considered necessary:</p>\n<p>&bull; An uncertainty relating to the future outcome of exceptional <strong>litigation</strong> or regulatory action.</p>\n<p>&bull; A significant <strong>subsequent event</strong> between the FS date and the report date.</p>\n<p>&bull; Early application of a new <strong>accounting standard</strong> with a material effect.</p>\n<p>&bull; A major <strong>catastrophe</strong> with a significant continuing effect on financial position.</p>"}, {"title": "3. When the Auditor Includes an Emphasis of Matter Paragraph", "keywords": [{"label": "Separate section headed Emphasis of Matter", "icon": "flag"}, {"label": "Clear reference to matter and disclosure location", "icon": "compass"}, {"label": "Indicate opinion is not modified", "icon": "thumb"}], "explanationHtml": "<p>The auditor shall:</p>\n<p>a. Include the paragraph within a <strong>separate section</strong> with an appropriate heading including the term \"Emphasis of Matter.\"</p>\n<p>b. Include a <strong>clear reference</strong> to the matter being emphasized, and where relevant disclosures can be found \u2014 referring only to information presented/disclosed in the FS; and</p>\n<p>c. Indicate that the auditor's opinion is <strong>not modified</strong> in respect of the matter emphasized.</p>\n<p><strong>Note:</strong> an EOM paragraph is <strong>not a substitute for a KAM</strong>; if a matter is determined to be a KAM, it shall be represented as a KAM.</p>"}, {"title": "4. Other Matter Paragraph", "keywords": [{"label": "Refers to matter other than FS disclosures", "icon": "scroll"}, {"label": "Relevant to understanding audit/responsibilities/report", "icon": "graduation-cap"}], "explanationHtml": "<p>A paragraph included in the auditor's report, referring to a matter <strong>other than</strong> those presented or disclosed in the FS, that is relevant to users' understanding of the <strong>audit, the auditor's responsibilities, or the auditor's report</strong>.</p>"}, {"title": "5. When to Include an EOM or Other Matter Paragraph", "keywords": [{"label": "Not prohibited by law or regulation", "icon": "scale"}, {"label": "Matter not already determined to be a KAM (SA 701)", "icon": "target"}], "explanationHtml": "<p>The auditor shall include an EOM or Other Matter paragraph, provided:</p>\n<p>a. It is <strong>not prohibited</strong> by law or regulation; and</p>\n<p>b. When SA 701 applies, the matter has <strong>not been determined to be a KAM</strong>.</p>"}, {"title": "6. An Emphasis of Matter Paragraph Is Not a Substitute For", "keywords": [{"label": "Modified opinion required by circumstances (SA 705)", "icon": "warning-triangle"}, {"label": "Disclosures required by the FRF for fair presentation", "icon": "scroll"}, {"label": "Reporting per SA 570 when material uncertainty exists", "icon": "anchor"}], "explanationHtml": "<p>a. A <strong>modified opinion</strong> as per SA 705, when required by the circumstances of the engagement.</p>\n<p>b. <strong>Disclosures</strong> in the FS that the FRF requires management to make, or that are otherwise necessary for fair presentation; or</p>\n<p>c. Reporting as per <strong>SA 570</strong> (Revised), when a material uncertainty exists.</p>"}, {"title": "7. Communication with TCWG", "keywords": [{"label": "Communicate expectation and wording of EOM/Other Matter", "icon": "megaphone"}], "explanationHtml": "<p>The auditor shall communicate with TCWG the <strong>expectation and wording</strong> of the Emphasis of Matter or Other Matter paragraph.</p>"}]}, {"id": "sa710", "title": "SA 710", "subtitle": "Comparative Information \u2014 Corresponding Figures and Comparative Financial Statements", "cards": [{"title": "1. Meaning of Comparative Information", "keywords": [{"label": "Amounts/disclosures for prior periods", "icon": "folder"}, {"label": "As per the applicable FRF", "icon": "clipboard-check"}], "explanationHtml": "<p><strong>Comparative information:</strong> amounts and disclosures included in the financial statements in respect of one or more prior periods, as per the applicable financial reporting framework (FRF).</p>"}, {"title": "2. Audit Procedures for Comparative Information \u2014 Basic Procedures", "keywords": [{"label": "Agrees with prior period amounts/disclosures", "icon": "mirror"}, {"label": "Accounting policies consistent with current period", "icon": "clipboard-check"}, {"label": "Changes properly accounted/presented/disclosed", "icon": "scroll"}], "explanationHtml": "<p>The auditor shall evaluate whether:</p>\n<p>a. Comparative information <strong>agrees</strong> with the amounts and other disclosures presented in the prior period; and</p>\n<p>b. The accounting policies reflected in the comparative information are <strong>consistent</strong> with those applied in the current period, or, if changed, whether the changes have been <strong>properly accounted for, presented, and disclosed</strong>.</p>"}, {"title": "3. Material Misstatement", "keywords": [{"label": "Additional procedures to determine if misstatement exists", "icon": "compass"}, {"label": "Follow relevant requirements of SA 560 if prior period audited", "icon": "link-chain"}], "explanationHtml": "<p>&bull; If the auditor becomes aware of a possible <strong>material misstatement</strong> in the comparative information while performing the current period audit, perform <strong>additional audit procedures</strong> necessary to obtain SAAE to determine whether it exists.</p>\n<p>&bull; If the auditor had audited the prior period's FS, also follow the relevant requirements of <strong>SA 560</strong>.</p>"}, {"title": "4. Written Representations", "keywords": [{"label": "WR for all periods referred to in the opinion (SA 580)", "icon": "signature"}, {"label": "Specific WR for prior period items in current P&L", "icon": "scroll"}], "explanationHtml": "<p>&bull; As per SA 580, request a <strong>written representation</strong> for all periods referred to in the auditor's opinion.</p>\n<p>&bull; Also obtain a <strong>specific written representation</strong> regarding any prior period item separately disclosed in the current year's Profit & Loss account.</p>"}, {"title": "5. Corresponding Figures \u2014 Meaning and Reporting", "keywords": [{"label": "Integral part of current period FS", "icon": "link-chain"}, {"label": "Level of detail dictated by relevance to current figures", "icon": "ruler"}, {"label": "Opinion normally does not refer to corresponding figures", "icon": "brick-wall"}, {"label": "Modify opinion if prior modification unresolved", "icon": "warning-triangle"}, {"label": "Modify opinion if prior misstatement unresolved", "icon": "flag"}], "explanationHtml": "<p><strong>Corresponding Figures:</strong> comparative information where prior period amounts/disclosures are included as an <strong>integral part</strong> of the current period's FS, intended to be read only in relation to the current period figures.</p>\n<p>The level of detail presented is dictated primarily by its <strong>relevance to the current period figures</strong>.</p>\n<p><strong>Reporting for Corresponding Figures:</strong> the opinion shall <strong>not refer</strong> to corresponding figures except:</p>\n<p>1. If the prior period report included a <strong>modified opinion</strong> and the matter is <strong>unresolved</strong>, modify the current period's opinion.</p>\n<p>2. If evidence shows a <strong>material misstatement</strong> exists in the prior period's FS (unmodified opinion previously issued), verify whether resolved and, if not, express a <strong>qualified or adverse opinion</strong> on the current period.</p>"}, {"title": "5a. Basis for Modification Paragraph \u2014 Corresponding Figures", "keywords": [{"label": "Refer to both current and corresponding figures", "icon": "link-chain"}, {"label": "Or explain effect on comparability of the figures", "icon": "seesaw"}], "explanationHtml": "<p>In the Basis for Modification paragraph, the auditor shall either:</p>\n<p>a. Refer to <strong>both</strong> the current period's figures and the corresponding figures in describing the matter, when the effects on the current period's figures are <strong>material</strong>; or</p>\n<p>b. In other cases, explain that the opinion is modified because of the effects on the <strong>comparability</strong> of the current period and corresponding figures.</p>"}, {"title": "5b. Reporting for Comparative Financial Statements", "keywords": [{"label": "Opinion refers to each period presented", "icon": "calendar"}, {"label": "Disclose reason for differing opinion in Other Matter", "icon": "megaphone"}, {"label": "Report material misstatement to management/predecessor", "icon": "footprint"}, {"label": "Report only current period if prior FS later amended", "icon": "door"}], "explanationHtml": "<p>&bull; The opinion shall refer to <strong>each period</strong> for which the financial statements are presented.</p>\n<p>&bull; If the auditor's opinion on the prior period differs from the opinion previously issued, disclose the <strong>substantive reason</strong> for the different opinion in an <strong>Other Matter paragraph</strong>.</p>\n<p>&bull; If a material misstatement is present in previously audited figures, <strong>report it to management</strong>, and request that the predecessor auditor be informed.</p>\n<p>&bull; If, thereafter, prior years' FS are <strong>amended</strong> with a new report by the predecessor auditor, the auditor shall report <strong>only on the current period</strong>.</p>"}, {"title": "5c. Reporting Treatment Common to Both", "keywords": [{"label": "Other Matter \u2014 predecessor auditor's opinion type/date", "icon": "footprint"}, {"label": "Other Matter \u2014 prior period unaudited", "icon": "warning-triangle"}, {"label": "Still responsible for opening balance SAAE", "icon": "shield-check"}], "explanationHtml": "<p>i. If the prior period FS were audited by a <strong>predecessor auditor</strong>, state in an Other Matter paragraph: that they were audited by a predecessor auditor; the <strong>type of opinion</strong> expressed; and the <strong>date</strong> of that audit report.</p>\n<p>ii. If the prior period FS were <strong>not audited</strong>, report the same in an Other Matter paragraph, stating that the corresponding/comparative figures are unaudited.</p>\n<p><strong>However</strong>, this disclosure does not relieve the auditor of responsibility for obtaining SAAE that <strong>opening balances</strong> do not contain misstatements that materially affect the current period's financial statements.</p>"}]}, {"id": "sa720", "title": "SA 720", "subtitle": "The Auditor's Responsibility in Relation to Other Information", "cards": [{"title": "1. Scope", "keywords": [{"label": "Other information in the Annual Report", "icon": "open-book"}, {"label": "Opinion does not cover other information", "icon": "brick-wall"}, {"label": "Read and consider for material inconsistencies", "icon": "magnify"}, {"label": "Applies whether received before or after the report", "icon": "hourglass"}, {"label": "Does not apply to preliminary announcements/prospectuses", "icon": "door"}], "explanationHtml": "<p>&bull; SA 720 deals with the auditor's responsibilities relating to <strong>other information</strong>, financial or non-financial, contained in the <strong>Annual Report</strong>.</p>\n<p>&bull; The auditor's opinion on the FS <strong>does not cover</strong> other information (Annual Report).</p>\n<p>&bull; The auditor is required to <strong>read and consider</strong> the other information, for materially inconsistent information that may indicate a material misstatement (MM) in either the FS or the Annual Report.</p>\n<p>&bull; This responsibility applies whether the other information is received <strong>prior to, or after</strong>, the auditor's report.</p>\n<p><strong>Note:</strong> this SA does not apply to <strong>preliminary announcements</strong> of financial information, or <strong>prospectuses</strong>.</p>"}, {"title": "2. Obtaining the Other Information", "keywords": [{"label": "Discuss with management which documents comprise the report", "icon": "megaphone"}, {"label": "Arrange timely access to the final version", "icon": "alarm-clock"}, {"label": "Request written representation if unavailable until after", "icon": "signature"}], "explanationHtml": "<p>The auditor shall:</p>\n<p>a. Determine, through discussion with management, which document(s) comprise the annual report, and the entity's planned <strong>manner and timing of issuance</strong>.</p>\n<p>b. Make arrangements to obtain, in a <strong>timely manner</strong>, if possible prior to the report date, the <strong>final version</strong> of the document(s).</p>\n<p>c. When the annual report is not available until after the report date, request a <strong>written representation</strong> that the final version will be provided when available, and prior to issuance, so the auditor can complete required procedures.</p>"}, {"title": "3. Reading and Considering the Other Information", "keywords": [{"label": "Consider inconsistency between other info and FS", "icon": "warning-triangle"}, {"label": "Consider inconsistency with auditor's knowledge from the audit", "icon": "graduation-cap"}, {"label": "Remain alert for material misstatement of other information", "icon": "spotlight"}], "explanationHtml": "<p>The auditor shall read the other information, considering whether there is a <strong>material inconsistency</strong> between:</p>\n<p>&bull; The other information and the <strong>financial statements</strong>; and</p>\n<p>&bull; The other information and the auditor's <strong>knowledge obtained in the audit</strong>, in context of evidence obtained and conclusions reached.</p>\n<p>While reading, the auditor shall <strong>remain alert</strong> for indications that the other information may be materially misstated.</p>"}, {"title": "4. Responding When a Material Inconsistency Appears to Exist", "keywords": [{"label": "Discuss the matter with management", "icon": "megaphone"}, {"label": "Conclude whether other info/FS is misstated", "icon": "magnify"}, {"label": "Or update the auditor's understanding of the entity", "icon": "compass"}], "explanationHtml": "<p>The auditor shall discuss the matter with management and, if necessary, perform other procedures to conclude whether:</p>\n<p>a. A <strong>material misstatement of the other information</strong> exists.</p>\n<p>b. A <strong>material misstatement of the financial statements</strong> exists; or</p>\n<p>c. The auditor's <strong>understanding of the entity and its environment</strong> needs to be updated.</p>"}, {"title": "5. When the Other Information Is Materially Misstated", "keywords": [{"label": "Request management to correct the information", "icon": "megaphone"}, {"label": "Agrees \u2014 determine correction has been made", "icon": "thumb"}, {"label": "Refuses \u2014 communicate with TCWG", "icon": "brick-wall"}, {"label": "Not corrected before report date \u2014 implications/withdrawal", "icon": "door"}, {"label": "Not corrected after report date \u2014 bring to users' attention", "icon": "spotlight"}], "explanationHtml": "<p>If a material misstatement of the other information exists, request management to <strong>correct</strong> it.</p>\n<p><strong>If management:</strong></p>\n<p>a. <strong>Agrees</strong> to correct \u2014 determine that the correction has been made; or</p>\n<p>b. <strong>Refuses</strong> \u2014 communicate the matter with TCWG, and request the correction be made.</p>\n<p><strong>If a misstatement exists in other information obtained prior to the report date</strong>, and is not corrected after communicating with TCWG, take appropriate action, including:</p>\n<p>a. Considering the implications for the auditor's report, and communicating with TCWG about how it will be addressed; or</p>\n<p>b. <strong>Withdrawing</strong> from the engagement, where possible under applicable law.</p>\n<p><strong>If a misstatement exists in other information obtained after the report date:</strong></p>\n<p>a. If corrected, perform necessary procedures; or</p>\n<p>b. If not corrected after communicating with TCWG, take appropriate action to seek to have the uncorrected misstatement <strong>brought to the attention of users</strong>, considering legal rights/obligations.</p>"}, {"title": "6. When the FS Are Materially Misstated, or Understanding Needs Updating", "keywords": [{"label": "Respond per other relevant SAs", "icon": "compass"}], "explanationHtml": "<p>Respond as per the <strong>other relevant SAs</strong>.</p>"}, {"title": "7. Reporting", "keywords": [{"label": "Separate Other Information section required", "icon": "flag"}, {"label": "Statement management is responsible for other information", "icon": "signature"}, {"label": "Identify information obtained before/expected after report date", "icon": "calendar"}, {"label": "Statement opinion does not cover other information", "icon": "brick-wall"}, {"label": "Nothing to report, or describe uncorrected misstatement", "icon": "scroll"}], "explanationHtml": "<p>The auditor's report shall include a separate section headed <strong>\"Other Information,\"</strong> when, at the report date:</p>\n<p>a. For a <strong>listed entity</strong>, the auditor has obtained or expects to obtain other information; or</p>\n<p>b. For an <strong>unlisted corporate entity</strong>, the auditor has obtained some or all of the other information.</p>\n<p>The Other Information section shall include:</p>\n<p>a. A statement that <strong>management is responsible</strong> for the other information.</p>\n<p>b. Identification of: (i) other information obtained <strong>prior to</strong> the report date; and (ii) for listed entities, other information, if any, expected to be obtained <strong>after</strong> the report date.</p>\n<p>c. A statement that the opinion <strong>does not cover</strong> the other information, and no assurance conclusion is expressed thereon.</p>\n<p>d. A description of the auditor's <strong>responsibilities</strong> relating to reading, considering, and reporting on other information.</p>\n<p>e. Where information was obtained prior to the report date, either: (i) a statement of <strong>nothing to report</strong>; or (ii) if an uncorrected material misstatement is concluded, a statement <strong>describing</strong> it.</p>"}, {"title": "8. Reporting Prescribed by Law or Regulation", "keywords": [{"label": "Identification of other information obtained before report date", "icon": "id-card"}, {"label": "Description of auditor's responsibilities", "icon": "scroll"}, {"label": "Explicit statement of the outcome of the auditor's work", "icon": "megaphone"}], "explanationHtml": "<p>If required by law/regulation to refer to other information using a <strong>specific layout or wording</strong>, the report shall refer to this SA only if it includes, at minimum:</p>\n<p>a. Identification of the other information obtained <strong>prior to</strong> the report date.</p>\n<p>b. A description of the auditor's <strong>responsibilities</strong> regarding other information; and</p>\n<p>c. An <strong>explicit statement</strong> addressing the outcome of the auditor's work for this purpose.</p>"}, {"title": "9. Examples of Amounts or Other Items Included in Other Information", "keywords": [{"label": "Key financial results \u2014 net income/EPS/dividends/sales", "icon": "calculator"}, {"label": "Selected operating data/segment information", "icon": "puzzle"}, {"label": "Special items \u2014 dispositions/litigation/impairments", "icon": "scale"}, {"label": "Liquidity and capital resource information", "icon": "anchor"}, {"label": "Financial measures/ratios", "icon": "thermometer"}, {"label": "Critical accounting estimates and related parties", "icon": "crystal-ball"}, {"label": "Off-balance sheet arrangements/guarantees/contingencies", "icon": "umbrella"}, {"label": "Regulatory changes/business environment/strategy", "icon": "compass"}], "explanationHtml": "<p><strong>Amounts:</strong></p>\n<p>&bull; Items in a summary of key financial results \u2014 net income, EPS, dividends, sales/operating revenues, purchases/operating expenses.</p>\n<p>&bull; Selected operating data \u2014 income by major operating area, or sales by geographic segment/product line.</p>\n<p>&bull; Special items \u2014 asset dispositions, litigation provisions, asset impairments, tax adjustments, environmental remediation, restructuring/reorganization expenses.</p>\n<p>&bull; Liquidity and capital resource information \u2014 cash/equivalents, marketable securities, dividends, debt, capital lease, minority interest.</p>\n<p>&bull; Capital expenditures by segment/division.</p>\n<p>&bull; Off-balance sheet arrangements and related financial effects.</p>\n<p>&bull; Guarantees, contractual obligations, legal/environmental claims, other contingencies.</p>\n<p>&bull; Financial measures/ratios \u2014 gross margin, return on capital/equity, current ratio, interest coverage, debt ratio.</p>\n<p><strong>Other items:</strong></p>\n<p>&bull; Explanations of critical accounting estimates and related assumptions.</p>\n<p>&bull; Identification of related parties and descriptions of transactions with them.</p>\n<p>&bull; Descriptions of off-balance sheet arrangement nature.</p>\n<p>&bull; Descriptions of guarantees, indemnifications, contractual obligations, litigation/environmental liability, and management's qualitative assessments of related exposures.</p>\n<p>&bull; Descriptions of changes in legal/regulatory requirements \u2014 e.g. new tax or environmental regulations.</p>\n<p>&bull; General descriptions of the business environment and outlook.</p>\n<p>&bull; Overview of strategy.</p>"}]}]</script>

// Types `text` into `el` one character at a time, with a brief pause right
// before the very last character (which is the "Z" in "AuditZ").
function typeGreeting(el, text, speed, pauseBeforeLast){
  speed = speed || 45;
  pauseBeforeLast = pauseBeforeLast === undefined ? 550 : pauseBeforeLast;
  el.textContent = '';
  el.classList.add('typing');
  let i = 0;
  function step(){
    if (i < text.length - 1){
      el.textContent += text[i];
      i++;
      setTimeout(step, speed);
    } else if (i === text.length - 1){
      setTimeout(()=>{
        el.textContent += text[i];
        i++;
        el.classList.remove('typing');
      }, pauseBeforeLast);
    }
  }
  if (text.length) step();
}

function isValidEmail(email){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}
function isValidPhone(phone){
  // Requires exactly 10 digits. Strips a leading "+91"/"91" country code (and
  // any spaces/dashes) first, so "9876543210", "+91 98765 43210", and
  // "91-9876543210" all validate the same underlying 10-digit number.
  let digits = phone.replace(/\D/g, '');
  if (digits.length === 12 && digits.startsWith('91')) digits = digits.slice(2);
  return /^[\d\s\-()+]+$/.test(phone) && digits.length === 10;
}

  if (email === ADMIN_EMAIL) return true;
  if (myProfile && myProfile.email === email) return !!myProfile.is_paid;
  const rec = adminProfiles.find(p=>p.email===email);
  return !!(rec && rec.is_paid);
}
function canAccessDeck(deck){

// or adds/removes/edits/reorders a keyword, the ENTIRE current cards array for
// that deck is written back to Supabase. Every visitor loads these overrides on
// login/page-load, so changes are visible to everyone immediately.
async function loadDeckContent(){
  const { data, error } = await sb.from('deck_content').select('*');
  if (error || !data) return;
  data.forEach(row=>{
    const deck = DECKS.find(d=>d.id===row.deck_id);
    if (deck && Array.isArray(row.cards)) deck.cards = row.cards;
  });
}
async function saveDeckContent(deckId){
  const deck = DECKS.find(d=>d.id===deckId);
  if (!deck) return;
  const { error } = await sb.from('deck_content').upsert({ deck_id: deckId, cards: deck.cards });
  if (error) console.error('saveDeckContent failed:', error.message);
}

// Renders the read-only explanation block for a card during study. Description
// editing lives entirely in "Manage cards" now (admin edits everything about a
// card — title, keywords, and description — from one place), so this is the
