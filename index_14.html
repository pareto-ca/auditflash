 SAs or when the auditor has chosen to do so; and</p>\n<p>ii. <strong>Substantive procedures</strong>, including tests of details and substantive analytical procedures.</p>"}, {"title": "3. Test of Controls", "keywords": [{"label": "Operating effectiveness of controls", "icon": "gear"}, {"label": "Expectation that controls operate effectively", "icon": "shield-check"}, {"label": "Substantive procedures alone insufficient", "icon": "warning-triangle"}], "explanationHtml": "<p>A <strong>test of controls</strong> is an audit procedure designed to evaluate the <strong>operating effectiveness</strong> of controls in preventing, or detecting and correcting (P/D/C), material misstatements at the assertion level.</p>\n<p>The auditor shall design and perform tests of controls (TOCs) to obtain sufficient appropriate audit evidence (SAAE) as to operating effectiveness when:</p>\n<p>a. The auditor's ROMM assessment includes an <strong>expectation that controls are operating effectively</strong> (i.e. the auditor intends to rely on them); or</p>\n<p>b. <strong>Substantive procedures alone cannot provide</strong> sufficient appropriate audit evidence at the assertion level.</p>"}, {"title": "4. Should We Test Controls Every Time We Do an Audit?", "keywords": [{"label": "Deficient control environment", "icon": "brick-wall"}, {"label": "Deficient monitoring of controls", "icon": "binoculars"}, {"label": "Deficient general IT controls", "icon": "gear"}, {"label": "Significant manual element", "icon": "backpack"}, {"label": "Personnel changes", "icon": "id-card"}, {"label": "Changing circumstances", "icon": "ghost"}], "explanationHtml": "<p>Factors that warrant a re-test of controls:</p>\n<p>&bull; A <strong>deficient control environment</strong>.</p>\n<p>&bull; <strong>Deficient monitoring</strong> of controls.</p>\n<p>&bull; <strong>Deficient general IT controls</strong>.</p>\n<p>&bull; A <strong>significant manual element</strong> to the relevant controls.</p>\n<p>&bull; <strong>Personnel changes</strong> that significantly affect the application of the control.</p>\n<p>&bull; <strong>Changing circumstances</strong> that indicate the need for changes in the control.</p>"}, {"title": "5. Using Evidence from Previous Audits for Tests of Controls", "keywords": [{"label": "Effectiveness of other IC elements", "icon": "shield"}, {"label": "Manual vs automated risk", "icon": "gear"}, {"label": "Effectiveness of general IT controls", "icon": "compass"}, {"label": "Deviations noted previously", "icon": "warning-triangle"}, {"label": "Changing circumstances", "icon": "ghost"}, {"label": "Test once in every third audit", "icon": "calendar"}], "explanationHtml": "<p>Matters the auditor considers in determining whether evidence from previous audits can be used:</p>\n<p>a. The effectiveness of other elements of internal control, including the <strong>control environment</strong>, monitoring of controls, and the RAP.</p>\n<p>b. Risks arising from characteristics of the control, including whether it is <strong>manual or automated</strong>.</p>\n<p>c. The effectiveness of <strong>general IT controls</strong>.</p>\n<p>d. The effectiveness of the control and its application, including <strong>deviations noted in previous audits</strong> and personnel changes affecting the control.</p>\n<p>e. Whether the lack of change in a control poses a risk due to <strong>changing circumstances</strong>; and</p>\n<p>f. The ROMM and extent of reliance on the control.</p>\n<p>If there have been changes affecting continuing relevance, the auditor shall <strong>test the controls in the current audit</strong>. If not, the auditor shall <strong>test the controls at least once in every third audit</strong>.</p>"}, {"title": "6. Controls Over Significant Risks \u2014 How Much Testing Should Be Done?", "keywords": [{"label": "Frequency of performance", "icon": "alarm-clock"}, {"label": "Length of reliance period", "icon": "hourglass"}, {"label": "Expected rate of deviation", "icon": "warning-triangle"}, {"label": "Relevance and reliability of evidence", "icon": "clipboard-check"}, {"label": "Evidence from other related controls", "icon": "link-chain"}], "explanationHtml": "<p>Matters the auditor considers in determining the extent of tests of controls:</p>\n<p>&bull; The <strong>frequency of performance</strong> of the control by the entity during the period.</p>\n<p>&bull; The <strong>length of time</strong> during the audit period the auditor is relying on the control's operating effectiveness.</p>\n<p>&bull; The <strong>expected rate of deviation</strong> from a control.</p>\n<p>&bull; The <strong>relevance and reliability</strong> of the audit evidence to be obtained regarding operating effectiveness.</p>\n<p>&bull; The extent to which evidence is obtained from <strong>tests of other related controls</strong>.</p>"}, {"title": "7. Using Audit Evidence Obtained During an Interim Period", "keywords": [{"label": "Evidence of changes since interim period", "icon": "calendar"}, {"label": "Additional evidence for remaining period", "icon": "hourglass"}], "explanationHtml": "<p>When the auditor obtains evidence about operating effectiveness of controls during an <strong>interim period</strong>, the auditor shall:</p>\n<p>a. Obtain evidence about <strong>significant changes</strong> to those controls subsequent to the interim period; and</p>\n<p>b. Determine the <strong>additional audit evidence</strong> to be obtained for the remaining period.</p>"}, {"title": "8. Substantive Procedures", "keywords": [{"label": "Tests of details", "icon": "magnify"}, {"label": "Substantive analytical procedures", "icon": "scale"}, {"label": "Compulsory for each material ABCD", "icon": "stamp"}, {"label": "Judgmental risk assessment", "icon": "crystal-ball"}, {"label": "Inherent limitations of IC", "icon": "warning-triangle"}], "explanationHtml": "<p>A <strong>substantive procedure</strong> is an audit procedure designed to detect material misstatement at the assertion level, comprising:</p>\n<p>i. <strong>Tests of details</strong> (of classes of transactions, account balances, and disclosures); and</p>\n<p>ii. <strong>Substantive analytical procedures</strong>.</p>\n<p><strong>Is a substantive procedure compulsory?</strong> Irrespective of the assessed ROMM, the auditor shall design and perform substantive procedures for each <strong>material</strong> class of transaction, account balance, and disclosure (ABCD).</p>\n<p>This reflects the facts that:</p>\n<p>i. The auditor's risk assessment is <strong>judgmental</strong>, and so may not identify all ROMM; and</p>\n<p>ii. There are <strong>inherent limitations to internal control</strong>, including management override.</p>"}]}, {"id": "sa402", "title": "SA 402 \u2013 Audit Considerations for an Entity Using a Service Organisation", "subtitle": "Type 1 vs Type 2 reports, and how the user auditor obtains and uses evidence about outsourced services.", "cards": [{"title": "1. What is a Service Organisation & Service Auditor?", "keywords": [{"label": "Service organisation", "icon": "gear"}, {"label": "User entity", "icon": "id-card"}, {"label": "Service auditor", "icon": "shield-check"}, {"label": "User auditor", "icon": "backpack"}], "explanationHtml": "<p>A <strong>service organisation</strong> is a third-party organisation (or segment of one) that provides services to user entities that are part of those entities' information systems relevant to financial reporting.</p>\n<p>A <strong>user entity</strong> is an entity that uses a service organisation and whose financial statements are being audited.</p>\n<p>A <strong>service auditor</strong> is an auditor who, at the request of the service organisation, provides an assurance report on the controls of a service organisation.</p>\n<p>A <strong>user auditor</strong> is an auditor who audits and reports on the financial statements of a user entity.</p>\n<p>Many entities outsource aspects of their business \u2014 from a specific task to replacing an entire business function (e.g. tax compliance) \u2014 to service organisations.</p>"}, {"title": "2. When are Services of a Service Organisation Relevant to the Audit?", "keywords": [{"label": "Part of user entity's information system", "icon": "puzzle"}, {"label": "Significant classes of transactions", "icon": "flag"}, {"label": "Procedures initiating/recording/processing", "icon": "gear"}, {"label": "Accounting records", "icon": "scroll"}, {"label": "Journal entries controls", "icon": "clipboard-check"}], "explanationHtml": "<p>Services provided by a service organisation are relevant to the audit when those services, and the controls over them, are <strong>part of the user entity's information system</strong>, including related business processes, relevant to financial reporting.</p>\n<p>A service organisation's services are part of the user entity's information system if they affect any of the following:</p>\n<p>a. The <strong>classes of transactions</strong> in the user entity's operations that are significant to its financial statements.</p>\n<p>b. The <strong>procedures</strong>, within both IT and manual systems, by which transactions are initiated, recorded, processed, corrected, transferred to the general ledger, and reported.</p>\n<p>c. The related <strong>accounting records</strong>, electronic or manual, supporting information, and specific accounts used to initiate, record, process, and report transactions.</p>\n<p>d. How the user entity's information system captures <strong>events and conditions</strong>, other than transactions, that are significant to the financial statements.</p>\n<p>e. The <strong>financial reporting process</strong> used to prepare the financial statements, including significant accounting estimates and disclosures.</p>\n<p>f. Controls surrounding <strong>journal entries</strong>, including non-standard entries for non-recurring or unusual transactions.</p>"}, {"title": "3. Objectives of the User Auditor under SA 402", "keywords": [{"label": "Understand nature and significance of services", "icon": "magnify"}, {"label": "Design and perform responsive procedures", "icon": "gear"}], "explanationHtml": "<p>The objectives of the user auditor, when the user entity uses the services of a service organisation, are:</p>\n<p>a. To obtain an <strong>understanding of the nature and significance</strong> of the services provided by the service organisation and their effect on the user entity's internal control relevant to the audit, sufficient to identify and assess the risks of material misstatement; and</p>\n<p>b. To <strong>design and perform audit procedures responsive</strong> to those risks.</p>"}, {"title": "4. Type 1 Report vs Type 2 Report", "keywords": [{"label": "Type 1 \u2014 design at a date", "icon": "calendar"}, {"label": "Type 2 \u2014 design & operating effectiveness", "icon": "shield-check"}, {"label": "Description by management", "icon": "scroll"}, {"label": "Opinion by service auditor", "icon": "stamp"}], "explanationHtml": "<p><strong>Type 1 report</strong> comprises:</p>\n<p>&bull; (i) A <strong>description</strong>, prepared by management of the service organisation, of its system, control objectives, and related controls <strong>designed and implemented as at a specified date</strong>; and</p>\n<p>&bull; (ii) A report by the <strong>service auditor</strong> conveying reasonable assurance, including their opinion on the description and the <strong>suitability of the design</strong> of the controls to achieve the specified control objectives.</p>\n<p><strong>Type 2 report</strong> comprises:</p>\n<p>&bull; (i) A <strong>description</strong>, prepared by management of the service organisation, of its system, control objectives, and related controls, their design and implementation as at a specified date or throughout a specified period, and in some cases their <strong>operating effectiveness</strong> throughout a specified period; and</p>\n<p>&bull; (ii) A report by the service auditor conveying reasonable assurance, including: (a) the service auditor's opinion on the description, design suitability, and <strong>operating effectiveness</strong> of the controls; and (b) a description of the <strong>service auditor's tests of controls and results</strong>.</p>"}, {"title": "5. Obtaining an Understanding of the Services", "keywords": [{"label": "Nature and significance of services", "icon": "magnify"}, {"label": "Nature and materiality of transactions", "icon": "ruler"}, {"label": "Degree of interaction", "icon": "handshake"}, {"label": "Nature of the relationship", "icon": "link-chain"}], "explanationHtml": "<p>When obtaining an understanding of the user entity in accordance with SA 315, the user auditor shall obtain an understanding of how the user entity uses the services of a service organisation, including:</p>\n<p>a. The <strong>nature of the services</strong> provided and their <strong>significance</strong> to the user entity, including the effect on internal control (information may be available from user manuals, the contract, or service auditor reports).</p>\n<p>b. The <strong>nature and materiality of the transactions</strong> or accounts affected \u2014 even where not material in amount, the nature of the transactions processed may be significant.</p>\n<p>c. The <strong>degree of interaction</strong> between the activities of the service organisation and the user entity \u2014 e.g. high interaction exists when the user entity authorises transactions and the service organisation processes and accounts for them.</p>\n<p>d. The <strong>nature of the relationship</strong> between the user entity and the service organisation, including relevant contractual terms.</p>\n<p>The user auditor shall also evaluate the design and implementation of relevant controls at the user entity, and determine whether a sufficient understanding has been obtained to assess risks of material misstatement.</p>"}, {"title": "6. Using a Type 1 or Type 2 Report", "keywords": [{"label": "Professional competence and independence", "icon": "graduation-cap"}, {"label": "Adequacy of standards used", "icon": "open-book"}, {"label": "Date/period appropriate", "icon": "calendar"}, {"label": "Complementary user entity controls", "icon": "puzzle"}], "explanationHtml": "<p>If the user auditor is unable to obtain a sufficient understanding from the user entity, further understanding may be obtained from: obtaining a Type 1/Type 2 report, if available; contacting the service organisation through the user entity; visiting the service organisation; or using another auditor to perform procedures on the user auditor's behalf.</p>\n<p>In determining the sufficiency and appropriateness of evidence provided by a Type 1 or Type 2 report, the user auditor shall be satisfied as to:</p>\n<p>a. The service auditor's <strong>professional competence</strong> (except where a member of ICAI) and <strong>independence</strong> from the service organisation; and</p>\n<p>b. The <strong>adequacy of the standards</strong> under which the report was issued.</p>\n<p>If planning to use the report as evidence of design and implementation of controls, the user auditor shall:</p>\n<p>&bull; Evaluate whether the description/design is at a <strong>date or period appropriate</strong> for the user auditor's purposes.</p>\n<p>&bull; Evaluate the <strong>sufficiency and appropriateness</strong> of the evidence provided.</p>\n<p>&bull; Determine whether <strong>complementary user entity controls</strong> identified by the service organisation are relevant, and if so obtain an understanding of whether the user entity has designed and implemented them.</p>"}, {"title": "7. Responding to Assessed Risks & Tests of Controls", "keywords": [{"label": "Evidence from user entity records", "icon": "clipboard-check"}, {"label": "Further procedures or use another auditor", "icon": "magnify"}, {"label": "Type 2 report if available", "icon": "shield-check"}, {"label": "Perform tests of controls", "icon": "gear"}], "explanationHtml": "<p><strong>Responding to Assessed Risks (SA 330)</strong> \u2014 the user auditor shall:</p>\n<p>a. Determine whether sufficient appropriate audit evidence concerning the relevant assertions is available from records held at the <strong>user entity</strong>; and, if not,</p>\n<p>b. Perform <strong>further audit procedures</strong> to obtain sufficient appropriate evidence, or use another auditor to perform those procedures at the service organisation on the user auditor's behalf.</p>\n<p><strong>Tests of Controls</strong> \u2014 when the user auditor's risk assessment includes an expectation that controls at the service organisation are operating effectively, evidence about their operating effectiveness shall be obtained from one or more of:</p>\n<p>&bull; Obtaining a <strong>Type 2 report</strong>, if available;</p>\n<p>&bull; Performing appropriate <strong>tests of controls</strong> at the service organisation; or</p>\n<p>&bull; Using another auditor to perform <strong>tests of controls</strong> at the service organisation on the user auditor's behalf.</p>"}, {"title": "8. Using a Type 2 Report as Evidence of Operating Effectiveness", "keywords": [{"label": "Date/period appropriate", "icon": "calendar"}, {"label": "Complementary user entity controls tested", "icon": "puzzle"}, {"label": "Adequacy of time period covered", "icon": "hourglass"}, {"label": "Relevance to assertions", "icon": "target"}], "explanationHtml": "<p>If the user auditor plans to use a Type 2 report as audit evidence that controls at the service organisation are operating effectively, the user auditor shall determine whether the report provides sufficient appropriate evidence by:</p>\n<p>a. Evaluating whether the description, design, and <strong>operating effectiveness</strong> of controls is at a date or for a period appropriate for the user auditor's purposes;</p>\n<p>b. Determining whether <strong>complementary user entity controls</strong> identified by the service organisation are relevant, and if so, obtaining an understanding of whether the user entity has designed, implemented, and \u2014 if so \u2014 <strong>tested their operating effectiveness</strong>;</p>\n<p>c. Evaluating the <strong>adequacy of the time period</strong> covered by the tests of controls and the time elapsed since their performance; and</p>\n<p>d. Evaluating whether the tests of controls performed by the service auditor, and their results as described in the report, are <strong>relevant to the assertions</strong> in the user entity's financial statements and provide sufficient appropriate evidence to support the user auditor's risk assessment.</p>"}, {"title": "9. Fraud/Non-Compliance at the Service Organisation & Reporting by the User Auditor", "keywords": [{"label": "Inquire of management", "icon": "megaphone"}, {"label": "Evaluate effect on NTE", "icon": "hourglass"}, {"label": "Modify opinion if evidence insufficient", "icon": "warning-triangle"}, {"label": "Not refer to service auditor unless required", "icon": "broken-chain"}], "explanationHtml": "<p><strong>Fraud, non-compliance, and uncorrected misstatements</strong> \u2014 the user auditor shall inquire of management of the user entity whether the service organisation has reported, or whether the user entity is otherwise aware of, any fraud, non-compliance with laws and regulations, or uncorrected misstatements affecting the user entity's financial statements. The user auditor shall evaluate how such matters affect the <strong>nature, timing, and extent (NTE)</strong> of further audit procedures, including the effect on conclusions and the user auditor's report.</p>\n<p><strong>Reporting by the User Auditor</strong>:</p>\n<p>&bull; The user auditor shall <strong>modify the opinion</strong> in the user auditor's report as per SA 705 if unable to obtain sufficient appropriate audit evidence regarding the services provided by the service organisation relevant to the audit.</p>\n<p>&bull; The user auditor shall <strong>not refer to the work of a service auditor</strong> in a report containing an unmodified opinion, unless required to do so by law or regulation \u2014 and if so required, the report shall indicate that the reference does not diminish the user auditor's responsibility for the opinion.</p>\n<p>&bull; If reference to the service auditor's work is relevant to understanding a <strong>modification</strong> to the user auditor's opinion, the report shall similarly indicate that the reference does not diminish the user auditor's responsibility for that opinion.</p>"}]}, {"id": "sa450", "title": "SA 450 \u2013 Evaluation of Misstatements Identified During the Audit", "subtitle": "Accumulating, communicating, and evaluating the materiality of uncorrected misstatements.", "cards": [{"title": "1. Objective", "keywords": [{"label": "Effect on the audit", "icon": "target"}, {"label": "Effect of uncorrected misstatements", "icon": "warning-triangle"}], "explanationHtml": "<p>The objective of the auditor is to evaluate:</p>\n<p>a. The <strong>effect of identified misstatements</strong> on the audit; and</p>\n<p>b. The <strong>effect of uncorrected misstatements</strong>, if any, on the financial statements.</p>"}, {"title": "2. Accumulation of Identified Misstatements", "keywords": [{"label": "Clearly trivial threshold", "icon": "ruler"}, {"label": "Trivial vs not material", "icon": "scale"}, {"label": "Factual misstatements", "icon": "clipboard-check"}, {"label": "Judgmental misstatements", "icon": "crystal-ball"}, {"label": "Projected misstatements", "icon": "magnify"}], "explanationHtml": "<p>The auditor shall accumulate misstatements identified during the audit, other than those that are <strong>clearly trivial</strong>.</p>\n<p>&bull; The auditor may designate an amount below which misstatements would be <strong>clearly trivial</strong> and need not be accumulated.</p>\n<p>&bull; \"<strong>Clearly trivial</strong>\" is not the same as \"not material\" \u2014 trivial matters are of a wholly different (smaller) order of magnitude or nature, and clearly inconsequential by any criteria of size, nature, or circumstances.</p>\n<p>&bull; Where there is <strong>uncertainty</strong> about whether an item is clearly trivial, it is considered <strong>not to be clearly trivial</strong>.</p>\n<p>Types of misstatements distinguished when evaluating and communicating:</p>\n<p>&bull; <strong>Factual misstatements</strong> \u2014 misstatements about which there is no doubt.</p>\n<p>&bull; <strong>Judgmental misstatements</strong> \u2014 differences in management's judgments on accounting estimates the auditor finds unreasonable, or accounting policy selection/application the auditor finds inappropriate.</p>\n<p>&bull; <strong>Projected misstatements</strong> \u2014 the auditor's best estimate of misstatements in populations, projecting sample misstatements to the entire population.</p>"}, {"title": "3. Consideration of Identified Misstatements as the Audit Progresses", "keywords": [{"label": "Other misstatements may exist", "icon": "ghost"}, {"label": "Aggregate approaching materiality", "icon": "warning-triangle"}, {"label": "Additional procedures after correction", "icon": "gear"}], "explanationHtml": "<p>The auditor shall determine whether the overall audit strategy and plan need to be revised if:</p>\n<p>a. The nature and circumstances of identified misstatements indicate <strong>other misstatements may exist</strong> that, aggregated, could be material; or</p>\n<p>b. The <strong>aggregate of misstatements accumulated approaches materiality</strong> as determined under SA 320.</p>\n<p>If, at the auditor's request, management has examined and corrected detected misstatements, the auditor shall perform <strong>additional audit procedures</strong> to determine whether misstatements remain.</p>"}, {"title": "4. Communication and Correction of Misstatements", "keywords": [{"label": "Communicate to management on timely basis", "icon": "megaphone"}, {"label": "Management refuses to correct", "icon": "broken-chain"}, {"label": "Possible indicator of bias", "icon": "mask"}], "explanationHtml": "<p>The auditor shall <strong>communicate all accumulated misstatements</strong> with the appropriate level of management on a timely basis, requesting correction.</p>\n<p>If management refuses, the auditor shall obtain an <strong>understanding of management's reasons</strong> for not correcting, and take this into account when evaluating whether the FS as a whole are free from material misstatement \u2014 this may be an <strong>indicator of management bias</strong>.</p>"}, {"title": "5. Uncorrected Misstatements", "keywords": [{"label": "Accumulated and not corrected", "icon": "folder"}, {"label": "Discuss impact with management", "icon": "handshake"}, {"label": "Reassess materiality per SA 320", "icon": "scale"}], "explanationHtml": "<p><strong>Uncorrected misstatements</strong> are misstatements the auditor has accumulated during the audit that have not been corrected.</p>\n<p>The auditor discusses the impact of uncorrected misstatements, and the auditor's response to them, with the appropriate level of management.</p>\n<p>Prior to evaluating the effect of uncorrected misstatements, the auditor shall <strong>reassess materiality</strong> as determined under SA 320, to confirm it remains appropriate given the entity's actual financial results.</p>"}, {"title": "6. Determining Whether Uncorrected Misstatements Are Material", "keywords": [{"label": "Size and nature of misstatements", "icon": "ruler"}, {"label": "Effect of prior period items", "icon": "calendar"}], "explanationHtml": "<p>The auditor shall determine whether uncorrected misstatements are material, individually or in aggregate, considering:</p>\n<p>i. The <strong>size and nature</strong> of the misstatements \u2014 both for particular ABCD and the FS as a whole \u2014 and the particular circumstances of their occurrence; and</p>\n<p>ii. The <strong>effect of uncorrected misstatements related to prior periods</strong> on the relevant ABCD and the FS as a whole.</p>"}, {"title": "7. Communication with TCWG", "keywords": [{"label": "Effect on the auditor's opinion", "icon": "stamp"}, {"label": "Identify material items individually", "icon": "flag"}, {"label": "Request correction", "icon": "megaphone"}], "explanationHtml": "<p>The auditor shall communicate with TCWG <strong>uncorrected misstatements</strong>, and the effect they, individually or in aggregate, may have on the <strong>opinion in the auditor's report</strong>, unless prohibited by law or regulation.</p>\n<p>The communication shall <strong>identify material uncorrected misstatements individually</strong>.</p>\n<p>The auditor shall request that uncorrected misstatements be <strong>corrected</strong>.</p>"}, {"title": "8. Written Representation", "keywords": [{"label": "Effects are immaterial individually and in aggregate", "icon": "thumb"}, {"label": "Summary attached to representation", "icon": "signature"}], "explanationHtml": "<p>The auditor shall request a <strong>written representation</strong> from management and, where appropriate, TCWG, as to whether they believe the <strong>effects of uncorrected misstatements are immaterial</strong>, individually and in the aggregate, to the FS as a whole.</p>\n<p>A <strong>summary</strong> of such items shall be included in or attached to the written representation.</p>"}, {"title": "9. Conclusion & Documentation", "keywords": [{"label": "Management refuses to adjust", "icon": "broken-chain"}, {"label": "Extended procedures inconclusive", "icon": "magnify"}, {"label": "Trivial threshold documented", "icon": "ruler"}, {"label": "Conclusion and basis documented", "icon": "scroll"}], "explanationHtml": "<p><strong>Conclusion</strong> \u2014 if management refuses to adjust the financial information, and extended audit procedures do not enable the auditor to conclude the aggregate of uncorrected misstatements is not material, the auditor should <strong>report accordingly</strong>.</p>\n<p><strong>Documentation</strong> shall include:</p>\n<p>a. The amount below which misstatements would be regarded as <strong>clearly trivial</strong>.</p>\n<p>b. <strong>All misstatements</strong> accumulated during the audit, and whether they have been corrected; and</p>\n<p>c. The auditor's <strong>conclusion</strong> as to whether uncorrected misstatements are material, individually or in aggregate, and the <strong>basis</strong> for that conclusion.</p>"}]}, {"id": "sa500", "title": "SA 500", "subtitle": "Audit Evidence", "cards": [{"title": "1. Objective", "keywords": [{"label": "Design and perform audit procedures", "icon": "clipboard-check"}, {"label": "Sufficient appropriate audit evidence (SAAE)", "icon": "shield-check"}, {"label": "Reasonable conclusions", "icon": "trophy"}, {"label": "Auditor's opinion", "icon": "signature"}], "explanationHtml": "<p>The objective of the auditor is to <strong>design and perform audit procedures</strong> to enable the auditor to obtain <strong>sufficient appropriate audit evidence (SAAE)</strong>, to draw <strong>reasonable conclusions</strong> on which to base the auditor's opinion.</p>"}, {"title": "2. Information to Be Used as Audit Evidence", "keywords": [{"label": "Relevance and reliability", "icon": "shield-check"}, {"label": "Management's expert", "icon": "graduation-cap"}, {"label": "Field other than accounting/auditing", "icon": "calculator"}], "explanationHtml": "<p>The auditor shall consider the <strong>relevance and reliability</strong> of information to be used as audit evidence.</p>\n<p><strong>Management's expert:</strong> an individual or organisation possessing expertise in a <strong>field other than accounting or auditing</strong>, whose work is used by the entity in preparing the financial statements.</p>"}, {"title": "3. Auditor's Responsibility When Relying on a Management Expert's Work", "keywords": [{"label": "Competence, capabilities, objectivity (CCO)", "icon": "scale"}, {"label": "SSAFI threats", "icon": "warning-triangle"}, {"label": "Safeguards", "icon": "shield"}, {"label": "Understanding of the expert's work", "icon": "open-book"}, {"label": "Appropriateness of the expert's work", "icon": "thumb"}], "explanationHtml": "<p><strong>(a) Evaluate the competence, capabilities, and objectivity (CCO)</strong> of the expert. Sources of information include:</p>\n<p>i. Personal experience with previous work of the expert.</p>\n<p>ii. Discussions with the expert, or with others familiar with the expert's work.</p>\n<p>iii. Knowledge of the expert's qualifications, membership of a professional body, license to practice, or other external recognition.</p>\n<p>iv. Published papers or books written by that expert.</p>\n<p>v. An auditor's expert, if any, assisting the auditor with information produced by the management's expert.</p>\n<p><strong>Evaluating objectivity \u2014 threats:</strong> self-interest, advocacy, familiarity, self-review, and intimidation threats (<strong>SSAFI</strong>).</p>\n<p>&bull;. Safeguards may reduce such threats, created by external structures (profession/legislation/regulation) or the expert's work environment (quality control policies).</p>\n<p>&bull;. Safeguards cannot eliminate all threats; the threat from being an employee of the entity is always present, so an employed expert cannot ordinarily be regarded as more objective than other employees.</p>\n<p>&bull;. Interests/relationships creating threats may include: financial interests, business and personal relationships, provision of other services.</p>\n<p><strong>(b) Obtain an understanding of the work of the expert</strong> \u2014 assumptions and methods used, and whether generally accepted in that field and appropriate for financial reporting.</p>\n<p><strong>(c) Evaluate the appropriateness of the expert's work</strong> as audit evidence for the relevant assertion, considering:</p>\n<p>&bull; Relevance and reasonableness of findings/conclusions, and consistency with other audit evidence.</p>\n<p>&bull; Relevance and reasonableness of significant assumptions and methods used.</p>\n<p>&bull; Relevance, completeness, and accuracy of significant source data used.</p>"}, {"title": "4. Matters Affecting NTE of Audit Procedures (Management's Expert)", "keywords": [{"label": "Nature and complexity of the matter", "icon": "puzzle"}, {"label": "ROMM in the matter", "icon": "raincloud"}, {"label": "Availability of alternative evidence sources", "icon": "compass"}, {"label": "Employed vs engaged expert", "icon": "seesaw"}, {"label": "Control/influence over the expert's work", "icon": "gear"}, {"label": "Auditor's knowledge of expert's field", "icon": "graduation-cap"}], "explanationHtml": "<p>Matters affecting the <strong>nature, timing, and extent (NTE)</strong> of audit procedures where a management's expert's work is used:</p>\n<p>a. The nature and complexity of the matter to which the expert relates.</p>\n<p>b. The risk of material misstatement (ROMM) in the matter.</p>\n<p>c. The availability of alternative sources of audit evidence.</p>\n<p>d. The nature, scope, and objectives of the expert's work.</p>\n<p>e. Whether the expert is <strong>employed</strong> by the entity, or <strong>engaged</strong> by it.</p>\n<p>f. The extent to which management can exercise control or influence over the expert's work.</p>\n<p>g. Whether the expert is subject to technical performance standards or other professional/industry requirements.</p>\n<p>h. The nature and extent of controls within the entity over the expert's work.</p>\n<p>i. The auditor's knowledge and experience of the expert's field of expertise.</p>\n<p>j. The auditor's previous experience of the work of that expert.</p>"}, {"title": "5. Methods of Obtaining Audit Evidence", "keywords": [{"label": "Observation", "icon": "eye"}, {"label": "Inspection", "icon": "magnify"}, {"label": "External confirmation", "icon": "stamp"}, {"label": "Recalculation", "icon": "calculator"}, {"label": "Reperformance", "icon": "gear"}, {"label": "Analytical procedures", "icon": "compass"}, {"label": "Inquiry", "icon": "microphone"}], "explanationHtml": "<p><strong>Observation:</strong> looking at a process or procedure being performed by others \u2014 e.g. inventory counting, or performance of control activities.</p>\n<p><strong>Inspection:</strong> examining records or documents (internal/external, paper/electronic), or physical examination of an asset.</p>\n<p><strong>External Confirmation:</strong> audit evidence obtained as a direct written response from a third party (the confirming party).</p>\n<p><strong>Recalculation:</strong> checking the mathematical accuracy of documents/records, manually or electronically.</p>\n<p><strong>Reperformance:</strong> the auditor's independent execution of procedures or controls originally performed as part of internal control.</p>\n<p><strong>Analytical Procedures:</strong> evaluations of financial information through study of plausible relationships among financial and non-financial data.</p>\n<p><strong>Inquiry:</strong></p>\n<p>&bull; Seeking information from knowledgeable persons, financial and non-financial, within or outside the entity; ranges from formal written to informal oral inquiries.</p>\n<p>&bull; Used extensively throughout the audit, in addition to other procedures; evaluating responses is an integral part of the process.</p>\n<p>&bull; Responses may provide new information or corroborative evidence, or may differ significantly from other information obtained (e.g. possibility of management override of controls).</p>\n<p>&bull; Responses may lead the auditor to modify or perform additional audit procedures.</p>\n<p>&bull; For inquiries about management's intent, corroboration may be limited \u2014 understanding management's past history, reasons for a course of action, and ability to pursue it, may help corroborate the evidence.</p>\n<p>&bull; Written representations from management/TCWG may be obtained to confirm responses to oral inquiries.</p>"}, {"title": "6. Factors Indicating Reliability of Audit Evidence", "keywords": [{"label": "Independent sources", "icon": "shield"}, {"label": "Effective related controls", "icon": "shield-check"}, {"label": "Directly obtained evidence", "icon": "link-chain"}, {"label": "Documentary form", "icon": "scroll"}, {"label": "Original documents", "icon": "id-card"}], "explanationHtml": "<p>Reliability of audit evidence is increased when obtained from <strong>independent sources</strong> outside the entity.</p>\n<p>Reliability of internally generated audit evidence is increased when the <strong>related controls are effective</strong>.</p>\n<p>Evidence obtained <strong>directly</strong> by the auditor (e.g. observation of a control) is more reliable than evidence obtained indirectly or by inference (e.g. inquiry about a control).</p>\n<p>Evidence in <strong>documentary form</strong> is more reliable than evidence obtained orally.</p>\n<p>Evidence from <strong>original documents</strong> is more reliable than from photocopies, facsimiles, or filmed/digitised/electronic reproductions.</p>"}, {"title": "7. Inconsistency or Doubts Over Reliability of Audit Evidence", "keywords": [{"label": "Evidence inconsistent between sources", "icon": "warning-triangle"}, {"label": "Modifications/additions to audit procedures", "icon": "gear"}, {"label": "Effect on other aspects of the audit", "icon": "binoculars"}], "explanationHtml": "<p>If audit evidence obtained from one source is <strong>inconsistent</strong> with that from another, or the auditor has doubts over the reliability of information to be used as audit evidence, the auditor shall:</p>\n<p>&bull; Determine the <strong>modifications or additions</strong> to audit procedures necessary to resolve the matter; and</p>\n<p>&bull; Consider the <strong>effect of the matter</strong>, if any, on other aspects of the audit.</p>"}]}, {"id": "sa501", "title": "SA 501", "subtitle": "Audit Evidence \u2014 Specific Considerations for Selected Items", "cards": [{"title": "1. Objective", "keywords": [{"label": "Existence and condition of inventory", "icon": "eye"}, {"label": "Completeness of litigation and claims", "icon": "scale"}, {"label": "Presentation/disclosure of segment information", "icon": "puzzle"}], "explanationHtml": "<p>The objective of the auditor is to obtain sufficient appropriate audit evidence regarding:</p>\n<p>a. The <strong>existence and condition</strong> of inventory;</p>\n<p>b. The <strong>completeness of litigation and claims</strong> involving the entity; and</p>\n<p>c. The <strong>presentation and disclosure</strong> of segment information, as per the applicable FRF.</p>"}, {"title": "2. Inventory \u2014 Audit Evidence Regarding Existence & Condition", "keywords": [{"label": "Attendance at physical inventory counting", "icon": "clipboard-check"}, {"label": "Evaluate counting instructions/procedures", "icon": "ruler"}, {"label": "Observe count procedures", "icon": "eye"}, {"label": "Test counts", "icon": "calculator"}, {"label": "Final inventory records", "icon": "folder"}], "explanationHtml": "<p>When inventory is material, the auditor shall obtain sufficient appropriate audit evidence regarding existence and condition by:</p>\n<p>a. <strong>Attendance at physical inventory counting</strong>, unless impracticable, to:</p>\n<p>&bull; (i) Evaluate management's instructions/procedures for recording and controlling the count results;</p>\n<p>&bull; (ii) Observe the performance of management's count procedures;</p>\n<p>&bull; (iii) Inspect the inventory; and</p>\n<p>&bull; (iv) Perform test counts; and</p>\n<p>b. Performing audit procedures over the entity's <strong>final inventory records</strong>, to determine whether they accurately reflect the actual count results.</p>\n<p>The auditor also obtains evidence about whether changes in inventory between the count date and the financial statement date are properly recorded, considering:</p>\n<p>&bull; Whether perpetual inventory records are properly adjusted;</p>\n<p>&bull; The reliability of the entity's perpetual inventory records; and</p>\n<p>&bull; The reasons for significant differences between the physical count and the perpetual records.</p>"}, {"title": "2.1 Auditor Unable to Attend the Inventory Count", "keywords": [{"label": "Observe alternative date count", "icon": "eye"}, {"label": "Assess changes between count and period-end", "icon": "calculator"}, {"label": "Verify treatment of discrepancies", "icon": "magnify"}, {"label": "Cut-off procedures", "icon": "clipboard-check"}, {"label": "Written representation on completeness", "icon": "signature"}], "explanationHtml": "<p>If unable to attend due to unforeseen circumstances, the auditor shall <strong>observe some physical counts on an alternative date</strong>.</p>\n<p>&bull; Perform procedures to assess whether changes in inventory between the count date and period-end are correctly recorded.</p>\n<p>&bull; Verify the treatment given for discrepancies noticed during the physical count.</p>\n<p>&bull; Ensure appropriate cut-off procedures were followed by management.</p>\n<p>&bull; Obtain management's written representation on: (a) completeness of information provided regarding inventory; and (b) adherence to laid-down procedures for the physical count.</p>"}, {"title": "2.2 If Attendance Is Impracticable", "keywords": [{"label": "Location/safety reasons", "icon": "flag"}, {"label": "Difficulty/time/cost not a valid basis", "icon": "brick-wall"}, {"label": "Alternative audit procedures", "icon": "clipboard-check"}, {"label": "Subsequent sale documentation", "icon": "scroll"}, {"label": "Modify opinion (SA 705)", "icon": "gear"}], "explanationHtml": "<p>May arise due to the location and nature of inventory \u2014 e.g. where the location poses a threat to the auditor's safety.</p>\n<p>As per SA 200, matters of <strong>difficulty, time, or cost</strong> are not a valid basis to omit a procedure or accept less persuasive evidence.</p>\n<p>The auditor should perform <strong>alternative audit procedures</strong> \u2014 e.g. inspecting documentation of the subsequent sale of specific items purchased prior to the count.</p>\n<p>If this is not possible, the auditor should <strong>modify the opinion</strong> as per SA 705.</p>"}, {"title": "2.3 Inventory in the Custody of a Third Party", "keywords": [{"label": "Confirmation from third party", "icon": "stamp"}, {"label": "Inspection/other procedures", "icon": "magnify"}, {"label": "Attend third party's count", "icon": "clipboard-check"}, {"label": "Other auditor's/service auditor's report", "icon": "scroll"}, {"label": "Inspect warehouse receipts", "icon": "folder"}, {"label": "Confirm pledged collateral", "icon": "key"}], "explanationHtml": "<p>When material, obtain sufficient appropriate audit evidence regarding existence and condition by performing one or both of:</p>\n<p>a. Requesting <strong>confirmation</strong> from the third party as to quantities and condition held on the entity's behalf.</p>\n<p>b. Performing <strong>inspection or other</strong> audit procedures appropriate in the circumstances.</p>\n<p><strong>If there is doubt over the integrity/objectivity of the third party</strong>, consider:</p>\n<p>&bull; Attending, or arranging another auditor to attend, the third party's physical count, if practicable;</p>\n<p>&bull; Obtaining another auditor's report, or a service auditor's report, on the adequacy of the third party's internal control;</p>\n<p>&bull; Inspecting documentation regarding inventory held by third parties \u2014 e.g. warehouse receipts;</p>\n<p>&bull; Requesting confirmation from other parties when inventory has been pledged as collateral.</p>\n<p><strong>Note:</strong> also inspect the record of goods sent, tracing it to challans, e-way bills, etc.</p>"}, {"title": "2.4 Matters Relevant in Planning Attendance", "keywords": [{"label": "Materiality and ROMM at locations", "icon": "flag"}, {"label": "Nature of inventory/internal control", "icon": "gear"}, {"label": "Adequate instructions issued", "icon": "clipboard-check"}, {"label": "Perpetual inventory system", "icon": "folder"}, {"label": "Stage of completion of WIP", "icon": "hourglass"}, {"label": "Timing of counting", "icon": "calculator"}, {"label": "Auditor's expert assistance", "icon": "graduation-cap"}], "explanationHtml": "<p>Matters relevant when planning attendance at physical inventory counting:</p>\n<p>&bull; Locations at which inventory is held, including materiality and ROMM at different locations.</p>\n<p>&bull; The nature of the inventory.</p>\n<p>&bull; The nature of internal control related to inventory.</p>\n<p>&bull; Whether adequate procedures are established, and proper instructions issued, for counting.</p>\n<p>&bull; Whether the entity maintains a perpetual inventory system.</p>\n<p>&bull; The ROMM related to inventory.</p>\n<p>&bull; The stages of completion of work in progress.</p>\n<p>&bull; The timing of physical inventory counting.</p>\n<p>&bull; Whether the assistance of an auditor's expert is needed.</p>"}, {"title": "3. Litigation and Claims", "keywords": [{"label": "Inquiry of management/in-house counsel", "icon": "microphone"}, {"label": "Review TCWG minutes and correspondence", "icon": "megaphone"}, {"label": "Review legal expense accounts", "icon": "scale"}], "explanationHtml": "<p>The auditor shall identify litigation and claims through:</p>\n<p>a. Inquiry of management and others within the entity, including <strong>in-house legal counsel</strong>.</p>\n<p>b. Reviewing minutes of meetings of TCWG, and correspondence between the entity and <strong>external legal counsel</strong>.</p>\n<p>c. Reviewing <strong>legal expense accounts</strong>.</p>\n<p><strong>Direct Communication with External Legal Counsel (ELC):</strong></p>\n<p>&bull; Where a ROMM is assessed regarding identified litigation/claims, or procedures indicate other material litigation/claims may exist, the auditor should seek direct communication with the entity's ELC.</p>\n<p>&bull; Done through a <strong>letter of inquiry</strong>, prepared by management and sent by the auditor, requesting the ELC to communicate directly with the auditor.</p>\n<p>&bull; If law/regulation/professional body prohibits direct communication, the auditor shall perform alternative audit procedures.</p>\n<p>&bull; If management refuses to permit, or ELC refuses to respond, and alternative procedures do not provide SAAE, the auditor should <strong>modify the opinion</strong> as per SA 705.</p>\n<p><strong>Written Representation:</strong> obtain a representation from management and TCWG that all litigation/claims whose effects should be considered:</p>\n<p>&bull; Have been disclosed to the auditor; and</p>\n<p>&bull; Have been appropriately accounted for and disclosed as per the applicable FRF.</p>"}, {"title": "4. Segment Information", "keywords": [{"label": "Understanding methods used by management", "icon": "compass"}, {"label": "Evaluate/test methods applied", "icon": "clipboard-check"}, {"label": "Analytical/other procedures", "icon": "calculator"}, {"label": "Inter-segment eliminations", "icon": "puzzle"}, {"label": "Comparison with budgets", "icon": "target"}, {"label": "Allocation of assets/costs", "icon": "flag"}, {"label": "Consistency with prior periods", "icon": "mirror"}], "explanationHtml": "<p>The auditor shall obtain sufficient appropriate audit evidence about presentation/disclosure of segment information as per the applicable FRF, by:</p>\n<p>a. Obtaining an understanding of the <strong>methods used by management</strong> in determining segment information, and:</p>\n<p>&bull; (i) Evaluating whether such methods are likely to result in disclosure as per the applicable FRF; and</p>\n<p>&bull; (ii) Where appropriate, testing the application of such methods; and</p>\n<p>b. Performing <strong>analytical or other</strong> audit procedures appropriate in the circumstances.</p>\n<p>Matters relevant in understanding the methods used:</p>\n<p>i. Sales, transfers, and charges between segments, and elimination of inter-segment amounts.</p>\n<p>ii. Comparisons with budgets and other expected results \u2014 e.g. operating profits as a percentage of sales.</p>\n<p>iii. The allocation of assets and costs among segments.</p>\n<p>iv. Consistency with prior periods, and adequacy of disclosures regarding inconsistencies.</p>"}]}, {"id": "sa505", "title": "SA 505", "subtitle": "External Confirmations", "cards": [{"title": "1. Meaning", "keywords": [{"label": "Direct written response from third party", "icon": "link-chain"}, {"label": "Confirming party", "icon": "stamp"}, {"label": "Exception \u2014 response indicates difference", "icon": "warning-triangle"}, {"label": "Investigate exceptions", "icon": "detective-hat"}], "explanationHtml": "<p><strong>External confirmation:</strong> audit evidence obtained as a <strong>direct written response</strong> to the auditor from a third party (the <strong>confirming party</strong>), in paper form, or by electronic or other medium.</p>\n<p><strong>Exception:</strong> a response indicating a difference between information requested to be confirmed (or contained in the entity's records) and information provided by the confirming party. The auditor shall <strong>investigate exceptions</strong> to determine whether they are indicative of misstatement.</p>"}, {"title": "2. External Confirmation Procedures", "keywords": [{"label": "Determine information to be confirmed", "icon": "stamp"}, {"label": "Select confirming party", "icon": "target"}, {"label": "Design confirmation requests", "icon": "ruler"}, {"label": "Send requests/follow-ups", "icon": "megaphone"}, {"label": "Layout/presentation", "icon": "spotlight"}, {"label": "Assertions being addressed", "icon": "flag"}, {"label": "Management authorisation", "icon": "signature"}, {"label": "Method of communication", "icon": "link-chain"}], "explanationHtml": "<p>When using external confirmation procedures, the auditor shall maintain control over the requests, including:</p>\n<p>a. Determining the information to be confirmed or requested.</p>\n<p>b. Selecting the appropriate confirming party.</p>\n<p>c. Designing requests, including proper addressing and return information for responses to be sent directly to the auditor.</p>\n<p>d. Sending requests, including follow-up requests, to the confirming party.</p>\n<p>Factors to consider when designing confirmation requests:</p>\n<p>&bull; The layout and presentation of the confirmation request.</p>\n<p>&bull; The assertions being addressed.</p>\n<p>&bull; Prior experience on the audit or similar engagements.</p>\n<p>&bull; The specific identified ROMM, including fraud risks.</p>\n<p>&bull; Management's authorisation/encouragement to confirming parties to respond.</p>\n<p>&bull; The method of communication (paper, electronic, or other medium).</p>\n<p>&bull; The ability of the confirming party to confirm or provide the requested information (e.g. individual invoice vs total balance).</p>"}, {"title": "3. Management's Refusal to Allow the Auditor to Send a Confirmation Request", "keywords": [{"label": "Inquire reasons for refusal", "icon": "microphone"}, {"label": "Evaluate implications on ROMM/fraud risk", "icon": "crystal-ball"}, {"label": "Alternative audit procedures", "icon": "clipboard-check"}, {"label": "Communicate with TCWG (SA 260)", "icon": "megaphone"}, {"label": "Determine implications per SA 705", "icon": "warning-triangle"}], "explanationHtml": "<p>If management refuses to allow a confirmation request, the auditor shall:</p>\n<p>a. Inquire as to management's reasons for the refusal, and seek evidence as to their validity/reasonableness.</p>\n<p>b. Evaluate the implications on the ROMM assessment, including fraud risk, and on the NTE of other procedures; and</p>\n<p>c. Perform <strong>alternative audit procedures</strong> to obtain relevant and reliable evidence.</p>\n<p>If the auditor concludes the refusal is unreasonable, or cannot obtain relevant/reliable evidence from alternative procedures, the auditor shall <strong>communicate with TCWG</strong> as per SA 260, and determine implications for the audit and opinion as per SA 705.</p>"}, {"title": "4. Positive Confirmation Requests (PCR)", "keywords": [{"label": "Reply required in all cases", "icon": "stamp"}, {"label": "Reliable audit evidence", "icon": "shield-check"}, {"label": "Risk of replying without verifying", "icon": "mirror"}, {"label": "Blank confirmation request", "icon": "mask"}, {"label": "Lower response rates", "icon": "raincloud"}], "explanationHtml": "<p>A positive confirmation request asks the confirming party to <strong>reply in all cases</strong>, either indicating agreement or providing the requested information.</p>\n<p>A response is expected to provide <strong>reliable</strong> audit evidence.</p>\n<p>There is a risk that the confirming party may reply <strong>without verifying</strong> that the information is correct.</p>\n<p>The auditor may reduce this risk by using a <strong>\"blank\" confirmation request</strong> \u2014 not stating the amount, asking the confirming party to fill it in.</p>\n<p>However, blank requests may result in <strong>lower response rates</strong>, as additional effort is required.</p>"}, {"title": "5. Negative Confirmation Request (NCR)", "keywords": [{"label": "Respond only if disagree", "icon": "flag"}, {"label": "Less persuasive evidence", "icon": "thumb"}, {"label": "ROMM assessed as low + controls tested", "icon": "shield-check"}, {"label": "Large population of homogeneous items", "icon": "puzzle"}, {"label": "Low exception rate expected", "icon": "warning-triangle"}, {"label": "No response \u2260 receipt or accuracy", "icon": "ghost"}], "explanationHtml": "<p>A negative confirmation request asks the confirming party to respond <strong>only if they disagree</strong> with the information provided. NCRs provide <strong>less persuasive</strong> audit evidence than positive confirmations.</p>\n<p>The auditor shall <strong>not use NCRs as the sole substantive procedure</strong> to address an assessed ROMM at the assertion level, unless all of the following are present:</p>\n<p>a. The ROMM has been assessed as low, and SAAE obtained regarding operating effectiveness of controls.</p>\n<p>b. The population comprises a large number of small, homogeneous account balances/transactions/conditions.</p>\n<p>c. A very low exception rate is expected; and</p>\n<p>d. The auditor is not aware of circumstances causing recipients to disregard such requests.</p>\n<p><strong>No response (negative confirmation):</strong></p>\n<p>&bull; A failure to respond does not indicate receipt by the confirming party, or verification of accuracy.</p>\n<p>&bull; A failure to respond provides significantly less persuasive evidence than a positive confirmation.</p>\n<p>&bull; Confirming parties may be more likely to respond disagreeing when the information is not in their favour, and less likely to respond otherwise.</p>"}, {"title": "6. Alternate Audit Procedures \u2014 Non-Responses", "keywords": [{"label": "Accounts receivable \u2014 subsequent cash receipts/shipping/sales", "icon": "calculator"}, {"label": "Accounts payable \u2014 subsequent disbursements/correspondence/GRNs", "icon": "folder"}], "explanationHtml": "<p>Examples of alternative audit procedures the auditor may perform when there is no response:</p>\n<p>a. <strong>Accounts receivable balances:</strong> examining specific subsequent cash receipts, shipping documentation, and sales near period-end.</p>\n<p>b. <strong>Accounts payable balances:</strong> examining subsequent cash disbursements, or correspondence from third parties, and other records such as goods received notes.</p>"}, {"title": "7. Reliability of Response", "keywords": [{"label": "Evaluate implications on ROMM/fraud", "icon": "crystal-ball"}, {"label": "NTE of other procedures", "icon": "clipboard-check"}, {"label": "Even external evidence may lack reliability", "icon": "shield-check"}, {"label": "Risk of interception/alteration/fraud", "icon": "mask"}, {"label": "Received indirectly", "icon": "ghost"}, {"label": "Not appearing to come from confirming party", "icon": "stamp"}], "explanationHtml": "<p>If a response to a confirmation request is <strong>not reliable</strong>, the auditor should evaluate the implications on the ROMM, including fraud risk, and on the NTE of other audit procedures.</p>\n<p>As per SA 500, even evidence from external sources may have circumstances affecting its reliability; all responses carry a risk of <strong>interception, alteration, or fraud</strong> \u2014 regardless of paper or electronic medium.</p>\n<p>Factors indicating doubts about the reliability of a response, that it:</p>\n<p>&bull; Was received by the auditor <strong>indirectly</strong>; or</p>\n<p>&bull; Appeared <strong>not to come originally</strong> from the intended confirming party.</p>\n<p>Unreliable responses may indicate a <strong>fraud risk factor</strong> requiring evaluation.</p>"}, {"title": "8. Areas Where External Confirmation Procedures May Be Used", "keywords": [{"label": "Bank balances/banking relationships", "icon": "key"}, {"label": "Accounts receivable balances/terms", "icon": "calculator"}, {"label": "Inventories with third parties", "icon": "anchor"}, {"label": "Property title deeds held by lawyers/financiers", "icon": "scroll"}, {"label": "Investments held by third parties", "icon": "trophy"}, {"label": "Amounts due to lenders", "icon": "handshake"}, {"label": "Accounts payable balances/terms", "icon": "folder"}], "explanationHtml": "<p>As discussed in SA 330, external confirmation procedures may be used for:</p>\n<p>&bull; Bank balances and other information relevant to banking relationships.</p>\n<p>&bull; Accounts receivable balances and terms.</p>\n<p>&bull; Inventories held by third parties at bonded warehouses for processing or on consignment.</p>\n<p>&bull; Property title deeds held by lawyers or financiers for safe custody, or as security.</p>\n<p>&bull; Investments held by third parties, or purchased from stockbrokers but not delivered at the balance sheet date.</p>\n<p>&bull; Amounts due to lenders, including terms of repayment and restrictive covenants.</p>\n<p>&bull; Accounts payable balances and terms.</p>"}, {"title": "9. How to Know If We Can Use External Confirmations", "keywords": [{"label": "Confirming party's knowledge of subject matter", "icon": "stamp"}, {"label": "Ability/willingness to respond", "icon": "handshake"}, {"label": "Objectivity of the confirming party", "icon": "scale"}], "explanationHtml": "<p>Factors assisting the auditor in determining whether external confirmations should be performed as substantive procedures:</p>\n<p>a. The confirming party's <strong>knowledge</strong> of the subject matter.</p>\n<p>b. The <strong>ability or willingness</strong> of the confirming party to respond \u2014 e.g. the confirming party:</p>\n<p>&bull; May not accept responsibility for responding;</p>\n<p>&bull; May consider responding too costly or time-consuming;</p>\n<p>&bull; May have concerns about potential legal liability from responding;</p>\n<p>&bull; May account for transactions in different currencies; or</p>\n<p>&bull; May operate where responding to confirmation requests is not a significant part of day-to-day operations.</p>\n<p>c. The <strong>objectivity</strong> of the confirming party \u2014 if a related party of the entity, responses may be less reliable.</p>"}]}, {"id": "sa510", "title": "SA 510", "subtitle": "Initial Audit Engagements \u2014 Opening Balances", "cards": [{"title": "1. Meaning of Initial Audit Engagement", "keywords": [{"label": "Prior period financial statements not audited", "icon": "door"}, {"label": "Prior period audited by predecessor auditor", "icon": "footprint"}], "explanationHtml": "<p>An engagement in which either:</p>\n<p>i. The financial statements for the prior period <strong>were not audited</strong>; or</p>\n<p>ii. The financial statements for the prior period <strong>were audited by a predecessor auditor</strong>.</p>"}, {"title": "2. Objective", "keywords": [{"label": "Opening balances contain material misstatements", "icon": "door"}, {"label": "Consistent application of accounting policies", "icon": "calculator"}, {"label": "Changes properly accounted/presented/disclosed", "icon": "scroll"}], "explanationHtml": "<p>To obtain sufficient appropriate audit evidence about whether:</p>\n<p>a. <strong>Opening balances</strong> contain misstatements that materially affect the current period's financial statements; and</p>\n<p>b. Appropriate accounting policies reflected in the opening balances have been <strong>consistently applied</strong> in the current period, or changes thereto are properly accounted for, presented, and disclosed as per the applicable FRF.</p>"}, {"title": "3. Meaning of Opening Balances", "keywords": [{"label": "Account balances at beginning of period", "icon": "calculator"}, {"label": "Based on prior period's closing balances", "icon": "link-chain"}, {"label": "Includes disclosures \u2014 contingencies/commitments", "icon": "scroll"}], "explanationHtml": "<p>Account balances that exist at the beginning of the period. Opening balances are based upon the <strong>closing balances of the prior period</strong>, and reflect the effects of prior period transactions/events and accounting policies applied.</p>\n<p>Opening balances also include <strong>disclosures</strong> that existed at the beginning of the period, such as contingencies and commitments.</p>"}, {"title": "4. Audit Procedures: Opening Balances", "keywords": [{"label": "Read most recent FS/predecessor's report", "icon": "open-book"}, {"label": "Closing balances correctly brought forward", "icon": "link-chain"}, {"label": "Application of appropriate accounting policies", "icon": "calculator"}, {"label": "Perusing prior year audited FS", "icon": "folder"}, {"label": "Evaluating current period evidence", "icon": "magnify"}, {"label": "Specific procedures on opening balances", "icon": "clipboard-check"}, {"label": "Additional procedures if misstatement found", "icon": "compass"}, {"label": "Communicate per SA 450", "icon": "megaphone"}], "explanationHtml": "<p>The auditor shall read the <strong>most recent financial statements (MRFS)</strong>, if any, and the predecessor auditor's report, if any, for information relevant to opening balances, including disclosures.</p>\n<p>The auditor shall obtain SAAE about whether opening balances contain material misstatements, by:</p>\n<p>a. Determining whether the prior period's <strong>closing balances</strong> have been correctly brought forward or, where appropriate, adjustments disclosed as prior period items in the current year's P&L.</p>\n<p>b. Determining whether opening balances reflect the application of <strong>appropriate accounting policies</strong>; and</p>\n<p>c. Performing one or more of:</p>\n<p>&bull; (i) Where prior year FS were audited, perusing copies of the audited FS;</p>\n<p>&bull; (ii) Evaluating whether current period audit procedures provide evidence relevant to opening balances; or</p>\n<p>&bull; (iii) Performing specific audit procedures to obtain evidence regarding opening balances.</p>\n<p>If evidence shows opening balances contain material misstatements, perform <strong>additional audit procedures</strong> to determine the effect on the current period's FS.</p>\n<p>If misstatements exist in the current period's FS, the auditor shall <strong>communicate</strong> them with management and TCWG, as per <strong>SA 450</strong>.</p>"}, {"title": "5. Opening Current Assets and Liabilities \u2014 Evidence from Current Audit Procedures", "keywords": [{"label": "Debtors/creditors \u2014 collection/payment during current period", "icon": "folder"}, {"label": "Inventories \u2014 additional procedures needed", "icon": "clipboard-check"}, {"label": "Non-current assets/liabilities \u2014 records and confirmation", "icon": "stamp"}], "explanationHtml": "<p><strong>1. Debtors/Creditors:</strong> collection (payment) of opening accounts receivable (payable) during the current period provides some evidence of their <strong>existence, rights and obligations, completeness, and valuation (ERCV)</strong> at the beginning of the period.</p>\n<p><strong>2. Inventories:</strong> current period audit procedures on the closing inventory balance provide little evidence regarding inventory at the beginning of the period. Additional procedures \u2014 one or more of:</p>\n<p>&bull; Observing a current physical inventory count, and reconciling it to the opening inventory quantities;</p>\n<p>&bull; Performing procedures on the valuation of opening inventory items;</p>\n<p>&bull; Performing procedures on gross profit and cut-off.</p>\n<p><strong>3. Non-Current Assets and Liabilities:</strong></p>\n<p>i. For PPE, investments, and long-term debt, the auditor examines the accounting records and other information underlying the opening balances.</p>\n<p>ii. In certain cases, evidence regarding opening balances may be obtained through <strong>confirmation with third parties</strong> \u2014 e.g. for long-term debt and investments.</p>"}, {"title": "6. Consistency of Accounting Policies", "keywords": [{"label": "Consistently applied in current FS", "icon": "mirror"}, {"label": "Changes properly accounted/disclosed", "icon": "calculator"}, {"label": "Qualified or adverse opinion (SA 705)", "icon": "warning-triangle"}], "explanationHtml": "<p>The auditor shall obtain SAAE that:</p>\n<p>&bull; Accounting policies have been <strong>consistently applied</strong> in the current period's financial statements; and</p>\n<p>&bull; Any changes have been properly accounted for, and adequately presented and disclosed, as per the applicable FRF.</p>\n<p>If not, the auditor shall express a <strong>qualified or adverse opinion</strong>, as per SA 705.</p>"}, {"title": "7. Conclusion and Reporting", "keywords": [{"label": "Unable to obtain SAAE \u2014 qualify/disclaim", "icon": "ghost"}, {"label": "Material misstatement not properly disclosed \u2014 qualified/adverse", "icon": "warning-triangle"}, {"label": "Modification in predecessor's report", "icon": "gear"}], "explanationHtml": "<p>&bull;. <strong>Unable to obtain SAAE:</strong> qualify or disclaim the opinion, as per SA 705.</p>\n<p>&bull;. <strong>Opening balance misstatement materially affects current period FS, and is not properly accounted for/disclosed:</strong> express a qualified or adverse opinion, as per SA 705.</p>\n<p>&bull;. <strong>Modification in the predecessor auditor's report:</strong> if relevant and material to the current period's FS, modify the current period's audit report.</p>\n<p><strong>Note:</strong> SA 510 connects forward to <strong>SA 710</strong> (Comparative Information).</p>"}]}, {"id": "sa520", "title": "SA 520", "subtitle": "Analytical Procedures", "cards": [{"title": "1. Meaning of Analytical Procedures", "keywords": [{"label": "Evaluations of financial information", "icon": "compass"}, {"label": "Plausible relationships", "icon": "puzzle"}, {"label": "Financial and non-financial data", "icon": "folder"}], "explanationHtml": "<p><strong>Analytical procedures:</strong> evaluations of financial information, through analysis of <strong>plausible relationships</strong>, among both <strong>financial and non-financial data</strong>.</p>"}, {"title": "2. Objectives of the Auditor", "keywords": [{"label": "Relevant/reliable evidence via substantive analytical procedures", "icon": "compass"}, {"label": "Overall conclusion near end of audit", "icon": "trophy"}], "explanationHtml": "<p>a. Obtaining relevant and reliable audit evidence when using <strong>substantive analytical procedures</strong>; and</p>\n<p>b. To design and perform analytical procedures <strong>near the end of the audit</strong>, assisting in forming an overall conclusion as to whether the financial statements are consistent with the auditor's understanding of the entity.</p>"}, {"title": "3. Substantive Analytical Procedures (SAP)", "keywords": [{"label": "Suitability for given assertions", "icon": "target"}, {"label": "Reliability of underlying data", "icon": "shield-check"}, {"label": "Develop an expectation", "icon": "crystal-ball"}, {"label": "Acceptable difference/investigation threshold", "icon": "warning-triangle"}], "explanationHtml": "<p>When designing and performing SAP, alone or combined with tests of details, the auditor shall:</p>\n<p>a. Determine the <strong>suitability</strong> of particular SAP for given assertions, taking account of the assessed ROMM and tests of details, if any.</p>\n<p>b. Evaluate the <strong>reliability of data</strong> from which the expectation of recorded amounts/ratios is developed \u2014 source, comparability, nature and relevance, and controls over its preparation.</p>\n<p>c. <strong>Develop an expectation</strong> of recorded amounts/ratios, and evaluate whether it is sufficiently precise to identify a material misstatement; and</p>\n<p>d. Determine the amount of <strong>difference from expected values</strong> that is acceptable without further investigation.</p>"}, {"title": "4. Analytical Procedures That Assist in Forming an Overall Conclusion", "keywords": [{"label": "Verify conclusions on individual components", "icon": "shield-check"}, {"label": "Draw reasonable conclusions", "icon": "trophy"}, {"label": "Identify previously unrecognised ROMM", "icon": "warning-triangle"}, {"label": "Revise ROMM and FAP (SA 315)", "icon": "gear"}], "explanationHtml": "<p>Designed and performed <strong>near the end of the audit</strong>, to assist in forming an overall conclusion as to whether the FS are consistent with the auditor's understanding of the entity.</p>\n<p>&bull; The intention is to verify conclusions formed during the audit of individual components or elements of the FS.</p>\n<p>&bull; This assists the auditor to draw reasonable conclusions on which to base the opinion.</p>\n<p>&bull; Results may identify a previously unrecognised ROMM \u2014 SA 315 then requires the auditor to <strong>revise the ROMM</strong>, and modify the further audit procedures (FAP), accordingly.</p>\n<p>&bull; Such procedures may be similar to risk assessment procedures.</p>"}, {"title": "5. Investigating Results of Analytical Procedures", "keywords": [{"label": "Fluctuations inconsistent with other information", "icon": "warning-triangle"}, {"label": "Inquiry of management", "icon": "microphone"}, {"label": "Other necessary audit procedures", "icon": "clipboard-check"}, {"label": "Management unable to explain/explanation inadequate", "icon": "raincloud"}], "explanationHtml": "<p>If fluctuations or relationships are inconsistent with other relevant information, or differ significantly from expected values, the auditor shall investigate by:</p>\n<p>a. <strong>Inquiring of management</strong>, and obtaining appropriate audit evidence relevant to management's responses \u2014 evaluated in light of the auditor's understanding of the entity and other evidence obtained.</p>\n<p>b. Performing <strong>other audit procedures</strong> necessary in the circumstances.</p>\n<p>The need for other procedures may arise when, for example:</p>\n<p>&bull; Management is unable to provide an explanation; or</p>\n<p>&bull; The explanation, together with the audit evidence obtained, is not considered adequate.</p>"}]}, {"id": "sa530", "title": "SA 530", "subtitle": "Audit Sampling", "cards": [{"title": "1. Objective", "keywords": [{"label": "Reasonable basis to draw conclusions about population", "icon": "trophy"}], "explanationHtml": "<p>To provide a <strong>reasonable basis</strong> for the auditor to draw conclusions about the population from which the sample is selected.</p>"}, {"title": "2. Audit Sampling (Sampling)", "keywords": [{"label": "Application to less than 100% of items", "icon": "target"}, {"label": "All sampling units have a chance of selection", "icon": "magnet"}, {"label": "Reasonable basis for conclusions on entire population", "icon": "trophy"}], "explanationHtml": "<p>The application of audit procedures to <strong>less than 100%</strong> of items within a population, such that all sampling units have a <strong>chance of selection</strong>, to provide the auditor with a reasonable basis on which to draw conclusions about the <strong>entire population</strong>.</p>"}, {"title": "3. Sampling Risk", "keywords": [{"label": "Conclusion from sample differs from conclusion on entire population", "icon": "seesaw"}], "explanationHtml": "<p>The risk that the auditor's conclusion based on a sample may be <strong>different</strong> from the conclusion if the entire population were subjected to the same audit procedure.</p>"}, {"title": "4. Types of Sampling Risks", "keywords": [{"label": "Type I \u2014 affects audit effectiveness", "icon": "shield-check"}, {"label": "Type II \u2014 affects audit efficiency", "icon": "gear"}, {"label": "Controls more effective / misstatement doesn't exist", "icon": "warning-triangle"}, {"label": "Controls less effective / misstatement exists", "icon": "mask"}], "explanationHtml": "<p>Sampling risk can lead to two types of erroneous conclusions:</p>\n<p>(i). <strong>Effectiveness risk</strong> \u2014 in tests of controls (TOCs), that controls are <strong>more effective</strong> than they actually are; or in tests of details (TODs), that a material misstatement <strong>does not exist</strong> when it does. The auditor is primarily concerned with this type, as it affects <strong>audit effectiveness</strong> and is more likely to lead to an inappropriate opinion.</p>\n<p>(ii). <strong>Efficiency risk</strong> \u2014 in TOCs, that controls are <strong>less effective</strong> than they actually are; or in TODs, that a material misstatement <strong>exists</strong> when it does not. This affects <strong>audit efficiency</strong>, as it usually leads to additional work to establish the initial conclusion was incorrect.</p>"}, {"title": "5. Statistical Sampling", "keywords": [{"label": "Random selection of items", "icon": "magnet"}, {"label": "Probability theory to evaluate results", "icon": "calculator"}, {"label": "Non-statistical sampling", "icon": "compass"}], "explanationHtml": "<p>An approach to sampling having the following characteristics:</p>\n<p>i. <strong>Random selection</strong> of sample items; and</p>\n<p>ii. Use of <strong>probability theory</strong> to evaluate sample results, including the measurement of sampling risk.</p>\n<p>A sampling approach without these characteristics is considered <strong>non-statistical sampling</strong>.</p>"}, {"title": "6. Tolerable Misstatement (TM)", "keywords": [{"label": "Monetary amount set by the auditor", "icon": "ruler"}, {"label": "Aggregate of immaterial misstatements", "icon": "warning-triangle"}, {"label": "Application of performance materiality", "icon": "scale"}, {"label": "Worked example \u2014 TM \u2264 PM", "icon": "calculator"}], "explanationHtml": "<p>The monetary amount set by the auditor, for which the auditor seeks an appropriate level of assurance that this amount is <strong>not exceeded</strong> by the actual misstatement in the population.</p>\n<p>While designing a sample, TM addresses the risk that the aggregate of <strong>individually immaterial misstatements</strong> may cause the FS to be materially misstated, and provides a margin for possible undetected misstatements.</p>\n<p>It is an application of <strong>performance materiality</strong> to a sampling procedure \u2014 may be the same amount, or lower than performance materiality.</p>\n<p><strong>Example:</strong> materiality = 5% of net profit (\u20b9100 Cr) \u2192 materiality = \u20b95 Cr; performance materiality (PM) = \u20b91 Cr (lower than overall materiality); tolerable misstatement can be equal to or lower than PM \u2014 say TM = \u20b950 lakh; the auditor uses \u20b950 lakh for the sampling purpose.</p>"}, {"title": "7. Sample Design, Size, and Selection of Items", "keywords": [{"label": "Purpose of the audit procedure", "icon": "target"}, {"label": "Characteristics of the population", "icon": "folder"}, {"label": "Sample size to reduce sampling risk", "icon": "raincloud"}, {"label": "Every sampling unit has a chance of selection", "icon": "magnet"}], "explanationHtml": "<p>i. When designing a sample, consider the <strong>purpose of the audit procedure</strong>, and the <strong>characteristics of the population</strong> from which the sample is drawn.</p>\n<p>ii. Determine a <strong>sample size</strong> sufficient to reduce sampling risk to an acceptably low level.</p>\n<p>iii. Select items such that <strong>each sampling unit</strong> in the population has a chance of selection.</p>"}, {"title": "8. Stratification and Value-Weighted Selection (For Understanding Only)", "keywords": [{"label": "Stratification \u2014 sub-populations by characteristic", "icon": "puzzle"}, {"label": "Reduce variability within stratum", "icon": "seesaw"}, {"label": "Stratify by monetary value", "icon": "ruler"}, {"label": "Projection of stratum results", "icon": "crystal-ball"}, {"label": "Value-weighted selection \u2014 monetary unit as sampling unit", "icon": "target"}], "explanationHtml": "<p><strong>Stratification:</strong> audit efficiency may improve by dividing a population into discrete sub-populations (strata) having identifying characteristics.</p>\n<p>&bull; Objective: reduce the <strong>variability of items</strong> within each stratum, allowing the sample size to be reduced without increasing sampling risk.</p>\n<p>&bull; <strong>How?</strong> In tests of details, population is often stratified by <strong>monetary value</strong>, directing greater effort to large-value items (more likely overstated). May also be stratified by a characteristic indicating higher ROMM \u2014 e.g. age of debtor balances when testing provision for doubtful accounts.</p>\n<p><strong>Projection:</strong> results of samples from each sub-population are projected to that respective stratum; projected misstatements of each stratum are combined to consider the possible effect on account balances/classes of transactions.</p>\n<p><strong>Value-Weighted Selection:</strong> in tests of details, it may be efficient to identify the sampling unit as the <strong>individual monetary units</strong> making up the population.</p>\n<p>&bull; By selecting specific monetary units, the auditor may examine the individual balances containing those units.</p>\n<p>&bull; Benefit: audit effort is directed to larger-value items (greater chance of selection), resulting in smaller sample sizes.</p>\n<p>&bull; May be used with the systematic method of selection, and is most efficient with random selection.</p>"}, {"title": "9. Performing Audit Procedures", "keywords": [{"label": "Appropriate procedures on each selected item", "icon": "clipboard-check"}, {"label": "Replacement item if not applicable", "icon": "link-chain"}, {"label": "Unable to apply \u2014 treat as deviation/misstatement", "icon": "warning-triangle"}], "explanationHtml": "<p>The auditor shall perform audit procedures, appropriate to the purpose, on each item selected.</p>\n<p>If a procedure is not applicable to the selected item, apply the procedure on a <strong>replacement item</strong>.</p>\n<p>If unable to apply the designed procedures, or suitable alternative procedures, to a selected item, the auditor shall treat that item as a <strong>deviation</strong> (tests of controls) or a <strong>misstatement</strong> (tests of details).</p>"}, {"title": "10. Nature and Cause of Deviations and Misstatements", "keywords": [{"label": "Investigate nature and cause", "icon": "detective-hat"}, {"label": "Effect on purpose and other audit areas", "icon":
