"compass"}, {"label": "Anomaly \u2014 high degree of certainty", "icon": "ghost"}, {"label": "Additional procedures for remainder of population", "icon": "clipboard-check"}], "explanationHtml": "<p>The auditor shall investigate the <strong>nature and cause</strong> of any deviations or misstatements identified, and evaluate their possible effect on the purpose of the procedure and other areas of the audit.</p>\n<p>In extremely rare circumstances, when a misstatement/deviation is considered an <strong>anomaly</strong>, the auditor shall obtain a <strong>high degree of certainty</strong> that it is not representative of the population.</p>\n<p>The auditor shall perform <strong>additional audit procedures</strong> to obtain SAAE that the misstatement/deviation does not affect the remainder of the population.</p>"}, {"title": "11. Projecting Misstatements", "keywords": [{"label": "Broad view of scale of misstatement", "icon": "binoculars"}, {"label": "Anomaly excluded from projection", "icon": "ghost"}, {"label": "Effect of uncorrected anomaly still considered", "icon": "warning-triangle"}, {"label": "TODs \u2014 project to population", "icon": "crystal-ball"}, {"label": "TOCs \u2014 no explicit projection needed", "icon": "gear"}], "explanationHtml": "<p>The auditor is required to <strong>project misstatements</strong> for the population, to obtain a broad view of the scale of misstatement \u2014 but this projection may not be sufficient to determine the amount to be recorded.</p>\n<p>When a misstatement is considered an anomaly, it is <strong>excluded</strong> when projecting misstatements to the population.</p>\n<p>However, the effect of such a misstatement, <strong>if uncorrected</strong>, needs to be considered in addition to the projected misstatement.</p>\n<p>For <strong>tests of details</strong>, the auditor shall project misstatements to the population; for <strong>tests of controls</strong>, no explicit projection of deviations is necessary, since the sample deviation rate is also the projected deviation rate for the population.</p>"}, {"title": "12. Evaluating Results of Audit Sampling", "keywords": [{"label": "Evaluate results of the sample", "icon": "trophy"}, {"label": "Reasonable basis for conclusions", "icon": "thumb"}, {"label": "Request management to investigate", "icon": "megaphone"}, {"label": "Tailor NTE of further procedures", "icon": "clipboard-check"}], "explanationHtml": "<p>The auditor shall evaluate:</p>\n<p>a. The <strong>results of the sample</strong>; and</p>\n<p>b. Whether audit sampling has provided a <strong>reasonable basis for conclusions</strong> about the population tested.</p>\n<p>If the auditor concludes that sampling has not provided a reasonable basis, the auditor may:</p>\n<p>i. Request management to <strong>investigate</strong> identified misstatements and the potential for further misstatements, and make necessary adjustments; or</p>\n<p>ii. <strong>Tailor the NTE</strong> of further audit procedures to best achieve the required assurance \u2014 e.g. for tests of controls, extend the sample size, test an alternative control, or modify related substantive procedures.</p>"}, {"title": "13. Sample Selection Methods (For Understanding Only)", "keywords": [{"label": "Random selection \u2014 simple/stratified", "icon": "magnet"}, {"label": "Systematic selection", "icon": "ruler"}, {"label": "Monetary unit sampling", "icon": "calculator"}, {"label": "Haphazard selection", "icon": "footprint"}, {"label": "Block selection", "icon": "brick-wall"}], "explanationHtml": "<p><strong>(a) Random Selection</strong> (applied through random number generators/tables):</p>\n<p>&bull; <strong>Simple Random Sampling:</strong> the whole population has an equal chance of selection.</p>\n<p>&bull; <strong>Stratified Sampling:</strong> dividing the population into separate groups (strata), taking proportionate samples from each; number of strata determined by the auditor's judgment.</p>\n<p>&bull; <strong>Example:</strong> trade receivables divided into groups \u2014 balances above \u20b910,00,000: 100% testing; \u20b97,75,001\u2013\u20b910,00,000: 50%; \u20b95,50,001\u2013\u20b97,75,000: 25%; \u20b92,25,001\u2013\u20b95,50,000: 10%; \u20b92,25,000 and below: 2%. A random sample is chosen from each stratum using random number tables \u2014 an extension of simple random sampling, weighting for a highly diversified population.</p>\n<p><strong>(b) Systematic Selection:</strong> the number of sampling units divided by the sample size gives a sampling interval; a starting point within the first interval is chosen, then every nth unit thereafter is selected.</p>\n<p>&bull; <strong>Example:</strong> 5,000 items, 100 samples needed \u2192 interval = 5000/100 = 50; select a starting point within the first 50, then each 50th unit thereafter.</p>\n<p>&bull; The starting point may be haphazard, but the sample is more likely to be truly random if determined via a computerised random number generator or tables.</p>\n<p><strong>(c) Monetary Unit Sampling:</strong> a type of value-weighted selection, where sample size, selection, and evaluation result in a conclusion in monetary amounts.</p>\n<p><strong>(d) Haphazard Selection:</strong> the auditor selects the sample without a structured technique, avoiding bias/predictability while ensuring every item has a chance of selection. Not appropriate for statistical sampling.</p>\n<p><strong>(e) Block Selection:</strong> selection of block(s) of contiguous items. Cannot ordinarily be used in audit sampling, because items in a sequence tend to have similar characteristics to each other but differ from items elsewhere in the population.</p>"}, {"title": "14. Factors Affecting Sample Size", "keywords": [{"label": "TOCs \u2014 reliance on controls/tolerable rate/expected rate", "icon": "shield-check"}, {"label": "TOCs \u2014 desired assurance/population size", "icon": "target"}, {"label": "TODs \u2014 ROMM/other substantive procedures", "icon": "clipboard-check"}, {"label": "TODs \u2014 desired assurance/tolerable misstatement", "icon": "warning-triangle"}, {"label": "TODs \u2014 expected misstatement/stratification", "icon": "puzzle"}], "explanationHtml": "<p><strong>Tests of Controls (TOCs) \u2014 relevant controls:</strong></p>\n<p>1. Increase in the extent to which risk assessment relies on controls \u2192 <strong>Increase</strong>.</p>\n<p>2. Increase in the tolerable rate of deviation \u2192 <strong>Decrease</strong>.</p>\n<p>3. Increase in the expected rate of deviation of the population \u2192 <strong>Increase</strong>.</p>\n<p>4. Increase in the desired level of assurance that the tolerable rate is not exceeded \u2192 <strong>Increase</strong>.</p>\n<p>5. Increase in the number of sampling units in the population \u2192 <strong>Negligible effect</strong>.</p>\n<p><strong>Tests of Details (TODs):</strong></p>\n<p>1. Increase in the assessed ROMM \u2192 <strong>Increase</strong>.</p>\n<p>2. Increase in the use of other substantive procedures on the same assertion \u2192 <strong>Decrease</strong>.</p>\n<p>3. Increase in the desired level of assurance that tolerable misstatement is not exceeded \u2192 <strong>Increase</strong>.</p>\n<p>4. Increase in tolerable misstatement \u2192 <strong>Decrease</strong>.</p>\n<p>5. Increase in the amount of misstatement expected in the population \u2192 <strong>Increase</strong>.</p>\n<p>6. Stratification of the population, when appropriate \u2192 <strong>Decrease</strong>.</p>"}, {"title": "15. Factors Determining the Extent of Checking on a Sampling Plan", "keywords": [{"label": "Size of organisation", "icon": "ruler"}, {"label": "State of internal control", "icon": "gear"}, {"label": "Adequacy/reliability of books and records", "icon": "shield-check"}, {"label": "Tolerable error range", "icon": "thermometer"}, {"label": "Degree of desired confidence", "icon": "thumb"}], "explanationHtml": "<p>i. Size of the organization.</p>\n<p>ii. State of internal control.</p>\n<p>iii. Adequacy and reliability of books and records.</p>\n<p>iv. Tolerable error range.</p>\n<p>v. Degree of desired confidence.</p>"}]}, {"id": "sa540", "title": "SA 540", "subtitle": "Auditing Accounting Estimates, Including Fair Value Accounting Estimates and Related Disclosures", "cards": [{"title": "1. Nature of Accounting Estimates", "keywords": [{"label": "Cannot be measured precisely", "icon": "crystal-ball"}, {"label": "Information varies widely", "icon": "folder"}, {"label": "Estimation uncertainty affects ROMM", "icon": "raincloud"}], "explanationHtml": "<p>Some financial statement items <strong>cannot be measured precisely</strong>, and can only be estimated \u2014 referred to in this SA as <strong>accounting estimates</strong>.</p>\n<p>Information available to management to make an accounting estimate varies widely, which affects the degree of <strong>estimation uncertainty</strong>. The degree of estimation uncertainty affects the <strong>ROMM</strong> of accounting estimates.</p>"}, {"title": "2. Accounting Estimates with Low Estimation Uncertainty", "keywords": [{"label": "Data readily available/observable", "icon": "eye"}, {"label": "Simple measurement method", "icon": "ruler"}, {"label": "Non-complex business activities", "icon": "gear"}, {"label": "Frequently made/routine estimates", "icon": "calendar"}, {"label": "Well-known model with observable inputs", "icon": "graduation-cap"}], "explanationHtml": "<p>Estimates giving rise to <strong>lower ROMM</strong>:</p>\n<p>&bull; Derived from data readily available \u2014 e.g. published interest rate data or exchange-traded security prices (\"observable\" data).</p>\n<p>&bull; Fair value estimates where the FRF's measurement method is simple and easily applied.</p>\n<p>&bull; Estimates arising in entities engaged in <strong>non-complex</strong> business activities.</p>\n<p>&bull; Estimates frequently made and updated, relating to <strong>routine</strong> transactions.</p>\n<p>&bull; Fair value estimates using a well-known/generally accepted model, with observable assumptions/inputs.</p>"}, {"title": "3. Accounting Estimates with High Estimation Uncertainty", "keywords": [{"label": "Highly specialised/unobservable model", "icon": "eye"}, {"label": "Outcome of litigation", "icon": "scale"}, {"label": "Non-publicly traded derivatives", "icon": "ghost"}, {"label": "Nature/method/subjectivity factors", "icon": "compass"}], "explanationHtml": "<p>Estimates based on <strong>significant assumptions</strong>:</p>\n<p>&bull; Fair value estimates using a highly specialised entity-developed model, or unobservable assumptions/inputs.</p>\n<p>&bull; Estimates relating to the outcome of <strong>litigation</strong>.</p>\n<p>&bull; Fair value estimates for derivative financial instruments <strong>not publicly traded</strong>.</p>\n<p>The degree of estimation uncertainty varies based on:</p>\n<p>&bull; The nature of the accounting estimate.</p>\n<p>&bull; The extent of a generally accepted method for making the estimate.</p>\n<p>&bull; The subjectivity of the assumptions used.</p>"}, {"title": "4. Examples of Situations Requiring Accounting Estimates", "keywords": [{"label": "Non-fair-value \u2014 doubtful debts/warranty/depreciation", "icon": "warning-triangle"}, {"label": "Non-fair-value \u2014 litigation settlements", "icon": "scale"}, {"label": "Fair-value \u2014 complex instruments/share-based payments", "icon": "trophy"}, {"label": "Fair-value \u2014 business combinations/non-monetary exchange", "icon": "handshake"}], "explanationHtml": "<p><strong>Non-fair-value estimates:</strong></p>\n<p>&bull; Allowance for doubtful accounts.</p>\n<p>&bull; Inventory obsolescence.</p>\n<p>&bull; Warranty obligations.</p>\n<p>&bull; Depreciation method or asset useful life.</p>\n<p>&bull; Provision against carrying amount of an investment, where recoverability is uncertain.</p>\n<p>&bull; Outcome of long-term contracts.</p>\n<p>&bull; Financial obligations/costs from litigation settlements and judgments.</p>\n<p><strong>Fair-value estimates:</strong></p>\n<p>&bull; Complex financial instruments not traded in an active/open market.</p>\n<p>&bull; Share-based payments.</p>\n<p>&bull; Property/equipment held for disposal.</p>\n<p>&bull; Assets/liabilities acquired in a business combination, including goodwill and intangibles.</p>\n<p>&bull; Non-monetary exchanges between independent parties \u2014 e.g. exchange of plant facilities in different business lines.</p>"}, {"title": "5. Risk Assessment Procedures \u2014 Identifying and Assessing ROMM", "keywords": [{"label": "Evaluate degree of estimation uncertainty", "icon": "raincloud"}, {"label": "Significant risk determination", "icon": "flag"}, {"label": "Understand FRF requirements", "icon": "open-book"}, {"label": "Understand management's estimation process", "icon": "compass"}, {"label": "Method/controls/expert/assumptions/change/uncertainty assessed", "icon": "gear"}], "explanationHtml": "<p>a. In identifying/assessing ROMM as per SA 315, evaluate the <strong>degree of estimation uncertainty</strong>.</p>\n<p>b. Determine whether an estimate with high estimation uncertainty gives rise to a <strong>significant risk</strong>.</p>\n<p><strong>How does the auditor minimise the ROMM?</strong></p>\n<p>&bull; Obtain an understanding of: requirements of the applicable FRF; how management identifies transactions/events/conditions needing estimates, by inquiry.</p>\n<p>Understand management's estimation-making process:</p>\n<p>i. The <strong>method</strong> used in making the estimate.</p>\n<p>ii. Relevant <strong>controls</strong>.</p>\n<p>iii. Whether management has used an <strong>expert</strong>.</p>\n<p>iv. The <strong>assumptions</strong> underlying the estimate.</p>\n<p>v. Whether there has been a <strong>change from the prior period</strong> in methods, and if so, why; and</p>\n<p>vi. Whether/how management has assessed the effect of <strong>estimation uncertainty</strong>.</p>"}, {"title": "6. Inquiries from Management", "keywords": [{"label": "New types of transactions", "icon": "tag"}, {"label": "Changed terms of transactions", "icon": "link-chain"}, {"label": "Changed accounting policies", "icon": "calculator"}, {"label": "Regulatory/other changes outside control", "icon": "megaphone"}, {"label": "New conditions/events", "icon": "flag"}, {"label": "Auditor identifies estimates management missed", "icon": "magnify"}, {"label": "Recognition and measurement criteria \u2014 SAAE", "icon": "clipboard-check"}], "explanationHtml": "<p>Inquiries about changes in circumstances may include whether:</p>\n<p>&bull; The entity has engaged in <strong>new types of transactions</strong> giving rise to estimates.</p>\n<p>&bull; The terms of transactions giving rise to estimates have <strong>changed</strong>.</p>\n<p>&bull; Accounting policies relating to estimates have <strong>changed</strong>, due to FRF requirements or otherwise.</p>\n<p>&bull; <strong>Regulatory or other changes</strong> outside management's control have occurred requiring revised/new estimates.</p>\n<p>&bull; <strong>New conditions or events</strong> have occurred giving rise to the need for new/revised estimates.</p>\n<p>The auditor may identify transactions/events/conditions needing estimates that management failed to identify \u2014 SA 315 treats this as a possible <strong>significant deficiency</strong> in the risk assessment process.</p>\n<p><strong>Recognition and measurement criteria:</strong> for estimates giving rise to significant risks, the auditor shall obtain SAAE as to whether the following are as per the applicable FRF:</p>\n<p>a. Management's decision to <strong>recognise or not recognise</strong> the estimate; and</p>\n<p>b. The selected <strong>measurement basis</strong>.</p>"}, {"title": "7. Auditor's Response to Assessed ROMM (SA 330)", "keywords": [{"label": "FRF requirements appropriately applied", "icon": "stamp"}, {"label": "Methods appropriate and consistent", "icon": "mirror"}, {"label": "Events up to report date", "icon": "calendar"}, {"label": "Test management's process and data", "icon": "magnify"}, {"label": "Test operating effectiveness of controls", "icon": "shield-check"}, {"label": "Develop a point estimate/range", "icon": "crystal-ball"}, {"label": "Auditor's own assumptions vs management's", "icon": "seesaw"}, {"label": "Narrow the range", "icon": "target"}], "explanationHtml": "<p>Based on the assessed ROMM, the auditor shall determine:</p>\n<p>a. Whether management appropriately applied the <strong>FRF requirements</strong> to the estimate; and</p>\n<p>b. Whether the <strong>methods</strong> are appropriate and consistently applied, and whether changes from the prior period are appropriate.</p>\n<p>In responding to assessed ROMM (per SA 330), undertake one or more of:</p>\n<p>a. Determine whether <strong>events up to the report date</strong> provide evidence regarding the estimate.</p>\n<p>b. <strong>Test how management made</strong> the estimate and the underlying data \u2014 evaluating whether: (i) the measurement method is appropriate; and (ii) assumptions are reasonable in light of FRF objectives.</p>\n<p>c. Test the <strong>operating effectiveness of controls</strong> over how the estimate was made, with appropriate substantive procedures.</p>\n<p>d. <strong>Develop a point estimate or range</strong> to evaluate management's point estimate.</p>\n<p>For this purpose:</p>\n<p>i. When using <strong>different assumptions/methods</strong> from management, understand management's assumptions/methods sufficiently to ensure relevant variables are considered, and evaluate significant differences.</p>\n<p>ii. When it is appropriate to use a range, <strong>narrow the range</strong> based on available evidence, until all outcomes within it are reasonable.</p>"}, {"title": "8. Estimation Uncertainty \u2014 Estimates with Significant Risk", "keywords": [{"label": "Alternative assumptions/outcomes considered", "icon": "compass"}, {"label": "Reasonableness of significant assumptions", "icon": "scale"}, {"label": "Management's intent and ability", "icon": "target"}, {"label": "Develop a range if inadequately addressed", "icon": "crystal-ball"}], "explanationHtml": "<p>For estimates giving rise to significant risks, in addition to other substantive procedures under SA 330, the auditor shall evaluate:</p>\n<p>i. How management has considered <strong>alternative assumptions or outcomes</strong>, and why rejected, or how estimation uncertainty was otherwise addressed.</p>\n<p>ii. Whether the <strong>significant assumptions</strong> used by management are reasonable.</p>\n<p>iii. Where relevant, management's <strong>intent</strong> to carry out specific courses of action, and its <strong>ability</strong> to do so.</p>\n<p>iv. If management has not adequately addressed estimation uncertainty, the auditor shall <strong>develop a range</strong> to evaluate the reasonableness of the estimate.</p>"}, {"title": "9. Understanding of Assumptions", "keywords": [{"label": "Nature of assumptions/significance", "icon": "tag"}, {"label": "Relevance and completeness", "icon": "clipboard-check"}, {"label": "Internal consistency", "icon": "mirror"}, {"label": "Matters within/outside management's control", "icon": "gear"}, {"label": "Documentation supporting assumptions", "icon": "scroll"}], "explanationHtml": "<p>Matters the auditor may consider in understanding the assumptions underlying estimates:</p>\n<p>&bull; The <strong>nature</strong> of the assumptions, including which are likely to be <strong>significant</strong>.</p>\n<p>&bull; How management assesses whether assumptions are <strong>relevant and complete</strong> (all relevant variables considered).</p>\n<p>&bull; How management determines assumptions are <strong>internally consistent</strong>.</p>\n<p>&bull; Whether assumptions relate to matters <strong>within management's control</strong> (e.g. maintenance programs affecting useful life) and how they conform to business plans/external environment; or matters <strong>outside its control</strong> (e.g. interest rates, mortality rates, judicial/regulatory actions, future cash flows).</p>\n<p>&bull; The nature and extent of <strong>documentation</strong>, if any, supporting the assumptions.</p>"}, {"title": "10. Factors Influencing the Degree of Estimation Uncertainty", "keywords": [{"label": "Extent of dependence on judgment", "icon": "thumb"}, {"label": "Sensitivity to assumption changes", "icon": "seesaw"}, {"label": "Recognised measurement techniques", "icon": "ruler"}, {"label": "Length of forecast period", "icon": "hourglass"}, {"label": "Availability of reliable external data", "icon": "shield-check"}, {"label": "Observable vs unobservable inputs", "icon": "eye"}], "explanationHtml": "<p><strong>Estimation Uncertainty (EU):</strong> the susceptibility of an accounting estimate and related disclosures to an inherent lack of precision in its measurement.</p>\n<p>The degree of EU may be influenced by:</p>\n<p>&bull; The extent to which the estimate depends on <strong>judgment</strong>.</p>\n<p>&bull; The <strong>sensitivity</strong> of the estimate to changes in assumptions.</p>\n<p>&bull; The existence of recognised <strong>measurement techniques</strong> that may mitigate the uncertainty.</p>\n<p>&bull; The <strong>length of the forecast period</strong>, and relevance of past data to forecast future events.</p>\n<p>&bull; The availability of <strong>reliable data</strong> from external sources.</p>\n<p>&bull; The extent to which the estimate is based on <strong>observable or unobservable</strong> inputs.</p>"}, {"title": "11. Review of Outcome of Accounting Estimates", "keywords": [{"label": "Review prior period estimates/re-estimation", "icon": "open-book"}, {"label": "Nature of the estimate considered", "icon": "tag"}, {"label": "Relevance to current period ROMM", "icon": "warning-triangle"}, {"label": "Not to question prior judgments", "icon": "shield"}, {"label": "Effectiveness of estimation process", "icon": "shield-check"}, {"label": "Professional skepticism on management bias", "icon": "spotlight"}], "explanationHtml": "<p>The auditor shall review the outcome of estimates included in the prior period FS, or their subsequent re-estimation, for the current period's purpose.</p>\n<p>The nature and extent of review considers:</p>\n<p>&bull; The nature of the accounting estimates; and</p>\n<p>&bull; Whether information from the review is relevant to identifying/assessing current period ROMM.</p>\n<p>The review is <strong>not intended to question</strong> judgments made in prior periods based on information available at that time.</p>\n<p>Differences between the outcome and the prior period estimate may, through risk assessment procedures on the reasons for such differences, provide:</p>\n<p>&bull; Information on the <strong>effectiveness</strong> of management's prior period estimation process.</p>\n<p>&bull; Audit evidence pertinent to the <strong>re-estimation</strong>, in the current period, of prior period estimates.</p>\n<p>&bull; Audit evidence of matters, such as estimation uncertainty, requiring disclosure.</p>\n<p>The review may help identify circumstances increasing susceptibility to <strong>management bias</strong>; professional skepticism assists in identifying such circumstances and determining the NTE of further procedures.</p>"}, {"title": "12. Disclosures in the Financial Statements", "keywords": [{"label": "SAAE about disclosures per FRF", "icon": "clipboard-check"}, {"label": "Significant risk estimates \u2014 adequacy of uncertainty disclosure", "icon": "warning-triangle"}, {"label": "Assumptions/method/basis/sources disclosed", "icon": "scroll"}, {"label": "Disclosure may be inadequate despite FRF compliance", "icon": "raincloud"}], "explanationHtml": "<p>The auditor shall obtain SAAE about whether disclosures in the FS are as per the applicable FRF. For estimates giving rise to significant risks, the auditor shall evaluate the adequacy of disclosure of their <strong>estimation uncertainty</strong>.</p>\n<p>a. Adequate disclosure of material matters may include:</p>\n<p>&bull; Assumptions used.</p>\n<p>&bull; The method of estimation used, including any applicable model.</p>\n<p>&bull; Any changes in the method from the prior period, and their effect.</p>\n<p>&bull; The basis for selection of the estimate.</p>\n<p>&bull; The sources and implications of estimation uncertainty.</p>\n<p>b. For a significant-risk estimate, even when disclosures are as per the FRF, the auditor may conclude that disclosure of estimation uncertainty is <strong>inadequate</strong> in light of the circumstances.</p>"}, {"title": "13. Written Representations (WR)", "keywords": [{"label": "Appropriateness of measurement processes", "icon": "gear"}, {"label": "Assumptions reflect intent and ability", "icon": "target"}, {"label": "Disclosure complete and appropriate", "icon": "clipboard-check"}, {"label": "No subsequent event requiring adjustment", "icon": "calendar"}], "explanationHtml": "<p>SA 580 discusses written representations. Depending on the nature, materiality, and extent of estimation uncertainty, WR about accounting estimates may include representations:</p>\n<p>&bull; About the <strong>appropriateness of measurement processes</strong>, including assumptions and models, used by management as per the applicable FRF, and consistency of application.</p>\n<p>&bull; That assumptions appropriately reflect management's <strong>intent and ability</strong> to carry out specific courses of action, where relevant.</p>\n<p>&bull; That disclosure related to accounting estimates is <strong>complete and appropriate</strong>, under the applicable FRF.</p>\n<p>&bull; That <strong>no subsequent event</strong> requires adjustment to the estimates and disclosures included in the FS.</p>"}]}, {"id": "sa550", "title": "SA 550", "subtitle": "Related Parties", "cards": [{"title": "1. Objectives of the Auditor", "keywords": [{"label": "Understand RP relationships/transactions", "icon": "link-chain"}, {"label": "Recognise fraud risk factors", "icon": "mask"}, {"label": "True and fair / not misleading conclusion", "icon": "scale"}, {"label": "SAAE on identification/accounting/disclosure", "icon": "calculator"}], "explanationHtml": "<p>a. Obtain an understanding of related party (RP) relationships and transactions, sufficient to:</p>\n<p>&bull; (i) Recognise <strong>fraud risk factors</strong>, arising from RP relationships and transactions; and</p>\n<p>&bull; (ii) Conclude whether the financial statements achieve <strong>true and fair presentation</strong> (fair presentation frameworks), or <strong>are not misleading</strong> (compliance frameworks).</p>\n<p>b. Obtain sufficient appropriate audit evidence (SAAE) about whether related party relationships and transactions have been <strong>identified, accounted for, and disclosed</strong> in the financial statements.</p>"}, {"title": "2. Meaning of Related Party", "keywords": [{"label": "As defined in the applicable FRF", "icon": "open-book"}, {"label": "Control/significant influence over the entity", "icon": "gear"}, {"label": "Common control/close family/key management", "icon": "handshake"}, {"label": "Exception \u2014 common control by a state", "icon": "warning-triangle"}, {"label": "Ind AS 24 disclosure requirement", "icon": "scroll"}], "explanationHtml": "<p>A related party is a party that is either:</p>\n<p>(i). A related party as <strong>defined in the applicable FRF</strong>; or</p>\n<p>(ii). Where the FRF establishes minimal or no requirements:</p>\n<p>&bull; (a) A person/entity with <strong>control or significant influence</strong> over the reporting entity;</p>\n<p>&bull; (b) Another entity over which the reporting entity has <strong>control or significant influence</strong>; or</p>\n<p>&bull; (c) Another entity under <strong>common control</strong> \u2014 common controlling ownership, close family owners, or common key management.</p>\n<p><strong>Exception:</strong> entities under common control by a <strong>state</strong> are not considered related, unless they engage in significant transactions or share resources significantly.</p>\n<p><strong>But as per Ind AS 24</strong>, an entity is required to disclose:</p>\n<p>1. The name of the government, and the nature of its relationship (control/joint control/significant influence).</p>\n<p>2. Sufficient detail to understand the effect of related party transactions:</p>\n<p>&bull; (i) Nature and amount of each individually significant transaction; and</p>\n<p>&bull; (ii) For collectively (not individually) significant transactions, a qualitative/quantitative indication of their extent.</p>"}, {"title": "3. Engagement Team Discussion", "keywords": [{"label": "Nature/extent of RP relationships and transactions", "icon": "binoculars"}, {"label": "Records/documents indicating RPs", "icon": "scroll"}, {"label": "Professional skepticism throughout the audit", "icon": "spotlight"}, {"label": "Conditions indicating non-disclosure by management", "icon": "ghost"}, {"label": "Importance attached to internal controls", "icon": "gear"}], "explanationHtml": "<p>Matters that may be addressed in the engagement team discussion:</p>\n<p>&bull; The <strong>nature and extent</strong> of the entity's relationships and transactions with related parties.</p>\n<p>&bull; Records or documents that may indicate the <strong>existence</strong> of RP relationships/transactions.</p>\n<p>&bull; Emphasis on maintaining <strong>professional skepticism</strong> throughout the audit for the potential of material misstatements from RP relationships/transactions.</p>\n<p>&bull; Circumstances/conditions indicating RP relationships/transactions <strong>not disclosed</strong> by management to the auditor.</p>\n<p>&bull; The importance management and TCWG attach to maintaining <strong>internal controls</strong> regarding identification, accounting for, and disclosure of RP relationships/transactions.</p>"}, {"title": "4. Understanding the Entity's RP Relationships and Transactions", "keywords": [{"label": "Identity of related parties/changes", "icon": "id-card"}, {"label": "Nature of relationships", "icon": "link-chain"}, {"label": "Type and purpose of transactions", "icon": "tag"}, {"label": "Controls to identify/account/disclose", "icon": "calculator"}, {"label": "Controls to authorise significant RP transactions", "icon": "stamp"}, {"label": "Controls for transactions outside normal course", "icon": "warning-triangle"}], "explanationHtml": "<p>The auditor shall inquire of management regarding:</p>\n<p>a. The <strong>identity</strong> of the entity's related parties, including changes from the prior period.</p>\n<p>b. The <strong>nature of the relationships</strong> between the entity and these related parties; and</p>\n<p>c. Whether the entity entered into <strong>transactions</strong> with these related parties, and if so, the type and purpose.</p>\n<p>The auditor shall also inquire of management and others, to understand controls established to:</p>\n<p>a. <strong>Identify, account for, and disclose</strong> RP relationships/transactions as per the applicable FRF.</p>\n<p>b. <strong>Authorise and approve significant transactions</strong> and arrangements with related parties; and</p>\n<p>c. <strong>Authorise and approve significant transactions</strong> outside the normal course of business.</p>"}, {"title": "5. Maintaining Alertness \u2014 Documents to Inspect", "keywords": [{"label": "Alert when inspecting records/documents", "icon": "spotlight"}, {"label": "Bank/legal/third-party confirmations", "icon": "stamp"}, {"label": "TCWG and shareholder meeting minutes", "icon": "megaphone"}, {"label": "Income tax returns/internal audit reports", "icon": "folder"}, {"label": "Regulatory filings/shareholder registers", "icon": "id-card"}, {"label": "Contracts outside ordinary course of business", "icon": "warning-triangle"}], "explanationHtml": "<p>The auditor shall remain <strong>alert</strong>, when inspecting records or documents, for arrangements or information indicating RP relationships/transactions not previously identified or disclosed by management.</p>\n<p>Documents to be inspected:</p>\n<p>a. <strong>Bank, legal, and third-party confirmations</strong> obtained as part of audit procedures.</p>\n<p>b. <strong>Minutes of meetings</strong> of shareholders and of TCWG; and</p>\n<p>c. Such other records/documents as the auditor considers necessary.</p>\n<p>Examples of other records/documents:</p>\n<p>&bull; Entity income tax returns.</p>\n<p>&bull; Internal auditors' reports.</p>\n<p>&bull; Information supplied to regulatory authorities.</p>\n<p>&bull; Documents associated with filings with a securities regulator (e.g. prospectuses).</p>\n<p>&bull; Shareholder registers, identifying principal shareholders.</p>\n<p>&bull; Records of investments and pension plans.</p>\n<p>&bull; Statements of conflicts of interest from management and TCWG.</p>\n<p>&bull; Contracts/agreements with key management or TCWG.</p>\n<p>&bull; Significant contracts re-negotiated during the period.</p>\n<p>&bull; Significant contracts/agreements <strong>not in the ordinary course</strong> of business.</p>\n<p>If significant transactions outside the normal course of business are identified, inquire of management about: the <strong>nature</strong> of the transactions; and whether <strong>related parties</strong> could be involved.</p>"}, {"title": "6. Fraud Risk Factor \u2014 Related Party with Dominant Influence", "keywords": [{"label": "Domination by single person/small group", "icon": "mask"}, {"label": "Without compensating controls", "icon": "brick-wall"}], "explanationHtml": "<p>The domination of management by a <strong>single person, or a small group of persons</strong>, without compensating controls, is a <strong>fraud risk factor</strong>.</p>"}, {"title": "7. Identification of Previously Unidentified/Undisclosed Related Parties", "keywords": [{"label": "Communicate promptly to engagement team", "icon": "megaphone"}, {"label": "Request management identify all transactions", "icon": "clipboard-check"}, {"label": "Inquire why internal control failed", "icon": "microphone"}, {"label": "Perform substantive procedures", "icon": "magnify"}, {"label": "Intentional non-disclosure \u2014 evaluate implications", "icon": "crystal-ball"}, {"label": "Examples \u2014 unincorporated partnerships/guarantees", "icon": "handshake"}], "explanationHtml": "<p>a. <strong>Promptly communicate</strong> the relevant information to other members of the engagement team.</p>\n<p>b. Where the FRF establishes related party requirements:</p>\n<p>&bull; Request management to identify <strong>all transactions</strong> with the newly identified related party.</p>\n<p>&bull; Inquire as to why the entity's <strong>internal control failed</strong> to identify/disclose the RP relationship/transaction.</p>\n<p>c. Perform appropriate <strong>substantive procedures</strong> relating to the newly identified RP relationships/transactions.</p>\n<p>d. If non-disclosure appears <strong>intentional</strong>, evaluate the implications for the audit.</p>\n<p>Examples of arrangements indicating undisclosed RP relationships/transactions:</p>\n<p>&bull; Participation in unincorporated partnerships with other parties.</p>\n<p>&bull; Agreements for services to certain parties, on terms outside the entity's normal course of business.</p>\n<p>&bull; Guarantees and guarantor relationships.</p>"}, {"title": "8. Significant RP Transactions Outside the Normal Course of Business", "keywords": [{"label": "Inspect underlying contract/agreement", "icon": "magnify"}, {"label": "Business rationale \u2014 fraud/concealment risk", "icon": "mask"}, {"label": "Terms consistent with management's explanation", "icon": "mirror"}, {"label": "Accounted for and disclosed per FRF", "icon": "calculator"}, {"label": "Authorised and approved", "icon": "stamp"}, {"label": "Examples \u2014 corporate restructurings/circular arrangements/offshore entities", "icon": "anchor"}], "explanationHtml": "<p>If significant RP transactions outside the normal course of business are identified:</p>\n<p>a. <strong>Inspect the underlying contract or agreement</strong>, and evaluate:</p>\n<p>&bull; Whether the business rationale (or lack thereof) suggests the transaction was entered into to engage in <strong>fraudulent financial reporting</strong>, or to conceal misappropriation of assets;</p>\n<p>&bull; Whether the terms are consistent with management's explanation; and</p>\n<p>&bull; Whether the transaction has been accounted for and disclosed as per the applicable FRF.</p>\n<p>b. Obtain audit evidence that the transaction has been appropriately <strong>authorised and approved</strong>.</p>\n<p><strong>Examples of transactions outside the entity's normal course of business:</strong></p>\n<p>&bull; Complex equity transactions, such as corporate restructurings or acquisitions.</p>\n<p>&bull; Leasing of premises, or rendering of management services, to another party if no consideration is exchanged.</p>\n<p>&bull; Sales transactions with unusually large discounts or returns.</p>\n<p>&bull; Transactions with circular arrangements \u2014 e.g. sales with a commitment to repurchase.</p>\n<p>&bull; Transactions with offshore entities in jurisdictions with weak corporate laws.</p>\n<p>&bull; Transactions under contracts whose terms are changed before expiry.</p>"}, {"title": "9. Obtain Written Representation That", "keywords": [{"label": "All RPs and transactions disclosed to auditor", "icon": "signature"}, {"label": "Properly accounted for and disclosed", "icon": "calculator"}], "explanationHtml": "<p>a. All related parties and related party transactions have been <strong>disclosed</strong> to the auditor; and</p>\n<p>b. All such transactions have been <strong>properly accounted for and disclosed</strong>.</p>"}, {"title": "10. Communication with TCWG", "keywords": [{"label": "Communicate significant matters on related parties", "icon": "megaphone"}], "explanationHtml": "<p>The auditor shall communicate <strong>significant matters</strong> arising during the audit, in connection with the entity's related parties.</p>"}, {"title": "11. Documentation", "keywords": [{"label": "Names of related parties", "icon": "id-card"}, {"label": "Nature of related party transactions", "icon": "link-chain"}], "explanationHtml": "<p>The auditor shall document the <strong>names of the related parties</strong>, and the <strong>nature of the related party transactions</strong>.</p>"}]}, {"id": "sa560", "title": "SA 560", "subtitle": "Subsequent Events", "cards": [{"title": "1. Meaning", "keywords": [{"label": "Events between FS date and audit report date", "icon": "calendar"}, {"label": "Facts known after the audit report date", "icon": "crystal-ball"}], "explanationHtml": "<p>&bull;. <strong>Events occurring between</strong> the date of the financial statements and the date of the auditor's report; and</p>\n<p>&bull;. <strong>Facts that become known</strong> to the auditor after the date of the auditor's report.</p>"}, {"title": "2. Events Between the FS Date and the Audit Report Date", "keywords": [{"label": "SAAE that events requiring adjustment/disclosure identified", "icon": "clipboard-check"}, {"label": "Understand management's procedures", "icon": "compass"}, {"label": "Inquire of management", "icon": "microphone"}, {"label": "Read minutes/subsequent interim FS", "icon": "open-book"}, {"label": "Written representation on adjustment/disclosure", "icon": "signature"}, {"label": "Specific inquiries \u2014 commitments/asset sales/estimates", "icon": "flag"}], "explanationHtml": "<p>a. Obtain SAAE that events requiring <strong>adjustment or disclosure</strong> in the FS have been identified.</p>\n<p>b. In determining the NTE of procedures, the auditor shall:</p>\n<p>&bull; Obtain an understanding of management's procedures for identifying subsequent events.</p>\n<p>&bull; Inquire of management as to the occurrence of subsequent events affecting the FS.</p>\n<p>&bull; Read minutes of management meetings held after the FS date.</p>\n<p>&bull; Read the latest available subsequent interim financial statements, if any.</p>\n<p>&bull; If events requiring adjustment/disclosure are identified, determine if they are appropriately adjusted/disclosed.</p>\n<p>Obtain a <strong>written representation</strong> from management that all events subsequent to the FS date requiring adjustment/disclosure have been adjusted or disclosed.</p>\n<p><strong>Specific Inquiries to Be Made of Management:</strong></p>\n<p>&bull; Whether new commitments, borrowings, or guarantees have been entered into.</p>\n<p>&bull; Whether sales or acquisitions of assets have occurred or are planned.</p>\n<p>&bull; Whether any assets have been appropriated by the government, or destroyed (e.g. fire or flood).</p>\n<p>&bull; Whether any events have occurred relevant to the recoverability of assets.</p>\n<p>&bull; Whether there have been increases in capital or issuance of debt instruments (new shares/debentures), or an agreement to merge or liquidate.</p>\n<p>&bull; Whether there have been developments regarding contingencies.</p>\n<p>&bull; Whether any unusual accounting adjustments have been made or contemplated.</p>\n<p>&bull; Whether any events question the appropriateness of accounting policies used \u2014 e.g. events questioning the going concern assumption.</p>\n<p>&bull; Whether any events are relevant to the measurement of estimates or provisions made.</p>"}, {"title": "3. Facts Known After the Report Date but Before the FS Are Issued", "keywords": [{"label": "No obligation to perform further procedures", "icon": "clipboard-check"}, {"label": "Discuss with management/TCWG", "icon": "megaphone"}, {"label": "Amend and extend procedures \u2014 dual dating/EOM", "icon": "calendar"}, {"label": "Table \u2014 AR not yet provided vs already provided", "icon": "seesaw"}], "explanationHtml": "<p>a. No obligation to perform any procedure regarding the FS after the auditor's report (AR) is issued.</p>\n<p>b. However, if a fact becomes known that had not been known before AR issuance, and which may have caused the AR to be amended, the auditor shall:</p>\n<p>&bull; Discuss the matter with management and TCWG;</p>\n<p>&bull; Determine if the FS need amendment; and</p>\n<p>&bull; Inquire how management intends to address the matter.</p>\n<p>c. If management amends the FS, the auditor shall:</p>\n<p>&bull; Carry out audit procedures on the amendment;</p>\n<p>&bull; Extend procedures to the date of the new audit report; and</p>\n<p>&bull; Provide a new audit report on the amended FS, dated not earlier than the approval date of the amended FS.</p>\n<p>d. If law/regulation/FRF permits restricting the amendment to the subsequent event, the auditor may restrict procedures to that amendment \u2014 using either:</p>\n<p>&bull; <strong>Dual Dating</strong> \u2014 an additional date conveying procedures are restricted to the amendment; or</p>\n<p>&bull; An <strong>Emphasis of Matter (EOM) / Other Matter (OM) paragraph</strong> conveying the same.</p>\n<p>e. <strong>If management does not amend the FS</strong> when required:</p>\n<p>&bull; If the AR has <strong>not yet</strong> been provided to the entity: modify the opinion as per SA 705, then provide the report.</p>\n<p>&bull; If the AR has <strong>already</strong> been provided: notify management/TCWG not to issue the FS to third parties; if issued anyway, take action to prevent reliance on the report (obtain legal advice).</p>"}, {"title": "4. Facts Known After the FS Are Issued", "keywords": [{"label": "No obligation to make further inquiry", "icon": "microphone"}, {"label": "Discuss with management/TCWG", "icon": "megaphone"}, {"label": "Amend FS and inform prior recipients", "icon": "signature"}, {"label": "Dual dating/EOM if restricted amendment", "icon": "calendar"}, {"label": "Extend procedures if unrestricted amendment", "icon": "clipboard-check"}, {"label": "Notify and prevent reliance if not amended", "icon": "warning-triangle"}], "explanationHtml": "<p>a. After FS issuance, no obligation to make any inquiry regarding the FS.</p>\n<p>b. However, if a fact becomes known that, had it been known at the AR date, may have caused amendment, the auditor shall:</p>\n<p>&bull; Discuss with management and TCWG;</p>\n<p>&bull; Determine if the FS need amendment; and</p>\n<p>&bull; Inquire how management intends to address the matter.</p>\n<p>c. If management amends the FS, the auditor shall:</p>\n<p>&bull; Carry out audit procedures necessary for the amendment;</p>\n<p>&bull; Review steps taken by management to inform everyone who received the previously issued FS and report;</p>\n<p>&bull; If a restricted amendment is allowed, use <strong>dual dating</strong> or an OM/EOM paragraph (SA 706);</p>\n<p>&bull; If not (unrestricted amendment), extend procedures to the date of the new report, dated no earlier than approval of the amended FS;</p>\n<p>&bull; Provide a new audit report on the amended FS, including an EOM/OM paragraph referring to a note discussing the reasons for amendment.</p>\n<p>d. If management does not amend the FS and does not inform users, the auditor shall notify management/TCWG that it will seek to prevent future reliance on the report.</p>\n<p>e. If, despite notification, no steps are taken, the auditor shall take action to prevent reliance on the report (obtain legal advice).</p>"}]}, {"id": "sa570", "title": "SA 570", "subtitle": "Going Concern", "cards": [{"title": "1. Scope", "keywords": [{"label": "Auditor's responsibilities re: going concern", "icon": "anchor"}, {"label": "Implications for the auditor's report", "icon": "crystal-ball"}, {"label": "SA 701 \u2014 material uncertainty is a KAM", "icon": "spotlight"}], "explanationHtml": "<p>This SA deals with:</p>\n<p>(I). The auditor's responsibilities in the audit of financial statements relating to going concern; and</p>\n<p>(II). The implications for the auditor's report.</p>\n<p><strong>SA 701</strong> explains that a material uncertainty related to events/conditions that may cast significant doubt on an entity's ability to continue as a going concern is, by its nature, a <strong>Key Audit Matter (KAM)</strong>.</p>"}, {"title": "2. Going Concern Basis of Accounting", "keywords": [{"label": "FS prepared assuming continued operations", "icon": "anchor"}, {"label": "Unless intends to liquidate/cease operations", "icon": "door"}, {"label": "Special purpose FS may not use GC basis", "icon": "folder"}, {"label": "Assets/liabilities realized in normal course", "icon": "scale"}], "explanationHtml": "<p>&bull; Financial statements are prepared on the assumption that the entity will <strong>continue its operations</strong> for the foreseeable future.</p>\n<p>&bull; General purpose FS are prepared using the going concern basis, <strong>unless</strong> management intends to liquidate the entity or cease operations, or has no realistic alternative but to do so.</p>\n<p>&bull; Special purpose FS may or may not be prepared on the going concern basis.</p>\n<p>&bull; When appropriate, assets and liabilities are recorded on the basis that the entity will be able to <strong>realize its assets and discharge its liabilities</strong> in the normal course of business.</p>"}, {"title": "3. Responsibility for Assessment of Going Concern", "keywords": [{"label": "Management's responsibility to assess", "icon": "target"}, {"label": "Judgment about uncertain future outcomes", "icon": "crystal-ball"}, {"label": "Size/complexity/external factors", "icon": "ruler"}, {"label": "Degree of uncertainty in outcome", "icon": "raincloud"}, {"label": "Judgment based on information at the time", "icon": "hourglass"}], "explanationHtml": "<p>a. It is <strong>management's responsibility</strong> to assess the entity's ability to continue as a going concern.</p>\n<p>b. This involves a <strong>judgment</strong>, at a particular point in time, about inherently uncertain future outcomes of events/conditions.</p>\n<p>c. Relevant factors to that judgment:</p>\n<p>&bull; The size and complexity of the entity, nature and condition of the business, and degree affected by external factors.</p>\n<p>&bull; The degree of uncertainty associated with the outcome of an event or condition.</p>\n<p>&bull; Any judgment about the future is based on information available at the time; subsequent events may produce outcomes inconsistent with judgments that were reasonable when made.</p>"}, {"title": "4. Auditor's Responsibilities", "keywords": [{"label": "Obtain SAAE and conclude on GC basis appropriateness", "icon": "clipboard-check"}, {"label": "Conclude whether material uncertainty exists", "icon": "raincloud"}, {"label": "Inherent limitations greater for future events", "icon": "binoculars"}, {"label": "Absence of reference is not a guarantee", "icon": "ghost"}], "explanationHtml": "<p>&bull; The auditor's responsibilities are to obtain SAAE, and conclude on the <strong>appropriateness of management's use of the going concern basis</strong>.</p>\n<p>&bull; To conclude whether a <strong>material uncertainty exists</strong> about the entity's ability to continue as a going concern.</p>\n<p>&bull; As per SA 200, the potential effects of inherent limitations on detecting material misstatements are <strong>greater for future events/conditions</strong> that may cause cessation of going concern \u2014 the auditor cannot predict such events.</p>\n<p>&bull; The absence of any reference to a material uncertainty in the auditor's report <strong>cannot be viewed as a guarantee</strong> as to the entity's ability to continue as a going concern.</p>"}, {"title": "5. Risk Assessment Procedures and Related Activities", "keywords": [{"label": "Consider events/conditions casting doubt (SA 315)", "icon": "warning-triangle"}, {"label": "Determine if management performed preliminary assessment", "icon": "magnify"}, {"label": "If performed \u2014 discuss and identify plans", "icon": "handshake"}, {"label": "If not performed \u2014 discuss basis and inquire", "icon": "microphone"}, {"label": "Remain alert throughout the audit", "icon": "spotlight"}], "explanationHtml": "<p>When performing risk assessment procedures (RAP) as per SA 315, the auditor shall consider whether events/conditions exist that may cast significant doubt on going concern.</p>\n<p>The auditor shall determine whether management has already performed a <strong>preliminary assessment</strong>:</p>\n<p>a. <strong>If performed</strong>, discuss the assessment with management, and determine whether management has identified events/conditions casting significant doubt and, if so, management's <strong>plans to address them</strong>; or</p>\n<p>b. <strong>If not performed</strong>, discuss with management the basis for the intended use of the GC basis, and inquire whether events/conditions exist that may cast significant doubt.</p>\n<p><strong>Note:</strong> the auditor shall remain <strong>alert throughout the audit</strong> for evidence of events/conditions casting significant doubt on going concern.</p>"}, {"title": "6. Evaluating Management's Assessment of Going Concern", "keywords": [{"label": "Evaluate management's assessment", "icon": "magnify"}, {"label": "Cover same period as management/FRF/law", "icon": "calendar"}, {"label": "Extend to at least 12 months if shorter", "icon": "hourglass"}, {"label": "Include all relevant information known to auditor", "icon": "folder"}], "explanationHtml": "<p>&bull; The auditor shall <strong>evaluate management's assessment</strong> of the entity's ability to continue as a going concern.</p>\n<p>&bull; The auditor shall cover the <strong>same period</strong> used by management, as required by the applicable FRF, or law/regulation if it specifies a longer period.</p>\n<p>&bull; If management's assessment covers <strong>less than 12 months</strong> from the FS date, the auditor shall request management to <strong>extend the period to at least 12 months</strong>.</p>\n<p>&bull; In evaluating management's assessment, consider whether it includes <strong>all relevant information</strong> of which the auditor is aware as a result of the audit.</p>"}, {"title": "7. Additional Audit Procedures When Events/Conditions Are Identified", "keywords": [{"label": "Request management's assessment if not made", "icon": "megaphone"}, {"label": "Evaluate feasibility of management's plans", "icon": "target"}, {"label": "Evaluate cash flow forecast reliability/support", "icon": "shield-check"}, {"label": "Consider additional facts/information", "icon": "folder"}, {"label": "Written representations on plans and feasibility", "icon": "signature"}, {"label": "Additional procedures \u2014 analyse forecasts/read minutes/legal counsel inquiry", "icon": "compass"}], "explanationHtml": "<p>a. Where management has not performed its assessment, <strong>request management to make its assessment</strong>.</p>\n<p>b. <strong>Evaluate management's plans</strong> for future actions \u2014 whether the outcome is likely to improve the situation, and whether the plans are feasible.</p>\n<p>c. Where a cash flow forecast is a significant factor:</p>\n<p>&bull; (i) Evaluate the reliability of the underlying data used to prepare the forecast; and</p>\n<p>&bull; (ii) Determine whether there is adequate support for the assumptions underlying the forecast.</p>\n<p>d. Consider whether any <strong>additional facts or information</strong> are available since management's assessment.</p>\n<p>e. Request <strong>written representations</strong> from management and TCWG regarding their plans for future action and their feasibility.</p>\n<p><strong>Additional procedures</strong> may include:</p>\n<p>&bull; Analysing and discussing cash flow, profit, and other relevant forecasts with management.</p>\n<p>&bull; Analysing and discussing the entity's latest interim financial statements.</p>\n<p>&bull; Reading debenture/loan agreement terms and determining whether any have been breached.</p>\n<p>&bull; Reading minutes of shareholder/TCWG/committee meetings, for reference to financing difficulties.</p>\n<p>&bull; Inquiring of the entity's legal counsel regarding litigation/claims and the reasonableness of management's assessment of outcomes/financial implications.</p>\n<p>&bull; Confirming existence, legality, and enforceability of financial support arrangements with related/third parties, and assessing their financial ability to provide additional funds.</p>\n<p>&bull; Evaluating the entity's plans to deal with unfilled customer orders.</p>\n<p>&bull; Performing subsequent events procedures to identify those mitigating or affecting going concern.</p>\n<p>&bull; Confirming the existence, terms, and adequacy of borrowing facilities.</p>\n<p>&bull; Obtaining and reviewing reports of regulatory actions.</p>\n<p>&bull; Determining the adequacy of support for planned disposals of assets.</p>"}, {"title": "8. Auditor's Conclusion", "keywords": [{"label": "Evaluate SAAE and conclude on GC basis appropriateness", "icon": "clipboard-check"}, {"label": "Conclude whether material uncertainty exists", "icon": "raincloud"}, {"label": "Magnitude of impact + likelihood of occurrence", "icon": "scale"}, {"label": "Fair presentation vs compliance framework", "icon": "ruler"}], "explanationHtml": "<p>&bull; The auditor shall evaluate whether SAAE has been obtained, and conclude on the <strong>appropriateness of management's use</strong> of the going concern basis in preparing the FS.</p>\n<p>&bull; Based on the evidence obtained, conclude whether a <strong>material uncertainty exists</strong>, related to events/conditions that may cast significant doubt on going concern.</p>\n<p>A <strong>material uncertainty</strong> exists when the <strong>magnitude of the impact</strong>, and the <strong>likelihood of occurrence</strong>, is such that appropriate disclosure is necessary for:</p>\n<p>a. In a fair presentation FRF, the <strong>fair presentation</strong> of the FS; or</p>\n<p>b. In a compliance framework, the FS <strong>not to be misleading</strong>.</p>"}, {"title": "9. Adequacy of Disclosures", "keywords": [{"label": "Material uncertainty exists \u2014 disclose events and plans", "icon": "scroll"}, {"label": "Disclose clearly that material uncertainty exists", "icon": "megaphone"}, {"label": "No material uncertainty \u2014 still evaluate disclosure adequacy", "icon": "magnify"}], "explanationHtml": "<p><strong>When events/conditions are identified and a material uncertainty exists</strong>, the auditor shall determine whether the FS:</p>\n<p>a. <strong>Adequately disclose</strong> the principal events/conditions casting significant doubt, and management's plans to deal with them; and</p>\n<p>b. Disclose <strong>clearly</strong> that there is a material uncertainty, and that the entity may be unable to realize its assets and discharge its liabilities in the normal course of business.</p>\n<p><strong>When events/conditions are identified but no material uncertainty exists</strong>, the auditor shall evaluate whether the FS provide <strong>adequate disclosures</strong> about these events/conditions.</p>"}, {"title": "10. Implications for Reporting", "keywords": [{"label": "GC basis inappropriate \u2014 adverse opinion", "icon": "warning-triangle"}, {"label": "Material uncertainty adequately disclosed \u2014 unmodified with separate section", "icon": "clipboard-check"}, {"label": "Material uncertainty not adequately disclosed \u2014 qualified/adverse (SA 705)", "icon": "brick-wall"}, {"label": "Management unwilling to assess/extend \u2014 consider implications", "icon": "handshake"}], "explanationHtml": "<p><strong>Use of the GC basis is inappropriate</strong> \u2192 Express an <strong>adverse opinion</strong>.</p>\n<p><strong>GC basis is appropriate, but a material uncertainty exists:</strong></p>\n<p>(a). <strong>Adequate disclosure is made</strong> in the FS: express an <strong>unmodified opinion</strong>, with a separate section headed \"Material Uncertainty Related to Going Concern\" to:</p>\n<p>&bull; (a) Draw attention to the note disclosing the matters; and</p>\n<p>&bull; (b) State that these events/conditions indicate a material uncertainty may cast significant doubt on going concern, and that the opinion is not modified in respect of the matter.</p>\n<p>(b). <strong>Adequate disclosure is not made:</strong></p>\n<p>&bull; Express a <strong>qualified or adverse opinion</strong>, as per SA 705; and</p>\n<p>&bull; In the \"Basis for Qualified (Adverse) Opinion\" section, state that a material uncertainty exists that may cast significant doubt on going concern, and that the FS do not adequately disclose this.</p>\n<p><strong>Management unwilling to make or extend its assessment:</strong> consider the implications for the auditor's report.</p>"}, {"title": "11. Communication with TCWG", "keywords": [{"label": "Whether events constitute material uncertainty", "icon": "raincloud"}, {"label": "Appropriateness of GC basis", "icon": "stamp"}, {"label": "Adequacy of related disclosures", "icon": "clipboard-check"}, {"label": "Implications for the auditor's report", "icon": "crystal-ball"}], "explanationHtml": "<p>The auditor should communicate with TCWG:</p>\n<p>a. Whether events/conditions constitute a <strong>material uncertainty</strong>.</p>\n<p>b. Whether management's use of the going concern basis is <strong>appropriate</strong>.</p>\n<p>c. The <strong>adequacy</strong> of related disclosures in the FS; and</p>\n<p>d. Where applicable, the <strong>implications for the auditor's report</strong>.</p>"}, {"title": "12. Significant Delay in Approval of Financial Statements", "keywords": [{"label": "Inquire reasons for delay", "icon": "microphone"}, {"label": "Perform additional procedures if GC-related", "icon": "clipboard-check"}, {"label": "Consider effect on material uncertainty conclusion", "icon": "raincloud"}], "explanationHtml": "<p>Inquire as to the reasons for the delay. If related to events/conditions relating to the going concern assessment, perform <strong>additional audit procedures</strong>, and consider the effect on the auditor's conclusion regarding the existence of a <strong>material uncertainty</strong>.</p>"}, {"title": "13. Events/Conditions That May Cast Significant Doubt on Going Concern", "keywords": [{"label": "Financial indicators \u2014 net liability/borrowings/losses", "icon": "raincloud"}, {"label": "Operating indicators \u2014 key management/market/competitor", "icon": "flag"}, {"label": "Other indicators \u2014 non-compliance/legal proceedings/law changes", "icon": "warning-triangle"}], "explanationHtml": "<p><strong>Financial:</strong></p>\n<p>&bull; Net liability or net current liability position.</p>\n<p>&bull; Fixed-term borrowings approaching maturity without realistic renewal/repayment prospects, or excessive reliance on short-term borrowings for long-term assets.</p>\n<p>&bull; Inability to pay creditors on due dates.</p>\n<p>&bull; Indications of withdrawal of financial support by creditors.</p>\n<p>&bull; Substantial operating losses, or significant deterioration in asset values.</p>\n<p>&bull; Arrears or discontinuance of dividends.</p>\n<p>&bull; Negative operating cash flows, per historical or prospective financial statements.</p>\n<p>&bull; Adverse key financial ratios.</p>\n<p>&bull; Change from credit to cash-on-delivery transactions with suppliers.</p>\n<p><strong>Operating:</strong></p>\n<p>&bull; Management intentions to liquidate the entity, or cease operations.</p>\n<p>&bull; Loss of key management without replacement.</p>\n<p>&bull; Loss of a major market, key customer(s), franchise, license, or principal supplier(s).</p>\n<p>&bull; Labor difficulties.</p>\n<p>&bull; Shortages of important supplies.</p>\n<p>&bull; Emergence of a highly successful competitor.</p>\n<p><strong>Other:</strong></p>\n<p>&bull; Non-compliance with capital, statutory, or regulatory requirements.</p>\n<p>&bull; Pending legal/regulatory proceedings that may result in claims the entity is unlikely to satisfy.</p>\n<p>&bull; Changes in law/regulation/government policy expected to adversely affect the entity.</p>\n<p>&bull; Uninsured or underinsured catastrophes, when they occur.</p>"}]}, {"id": "sa580", "title": "SA 580", "subtitle": "Written Representations", "cards": [{"title": "1. Meaning", "keywords": [{"label": "Written statement to confirm/support evidence", "icon": "stamp"}, {"label": "Excludes financial statements/books and records", "icon": "folder"}, {"label": "Necessary but not sufficient evidence alone", "icon": "puzzle"}, {"label": "Doesn't affect nature/extent of other evidence", "icon": "gear"}], "explanationHtml": "<p>A <strong>written statement</strong> by management to the auditor, to confirm certain matters, or to support other audit evidence.</p>\n<p>Written representations do <strong>not include</strong> the financial statements, the assertions therein, or supporting books and records.</p>\n<p>&bull; Written representations provide <strong>necessary</strong> audit evidence; they do not, on their own, provide <strong>sufficient appropriate</strong> audit evidence (SAAE) about any matter.</p>\n<p>&bull; Reliable written representations do <strong>not affect the nature or extent</strong> of other audit evidence the auditor obtains about fulfilment of management's responsibilities or specific assertions.</p>"}, {"title": "2. Objectives of the Auditor", "keywords": [{"label": "Obtain WR that management fulfilled responsibilities", "icon": "signature"}, {"label": "Support other evidence via written representations", "icon": "scroll"}, {"label": "Respond appropriately to representations provided", "icon": "ruler"}, {"label": "Respond appropriately if not provided", "icon": "raincloud"}], "explanationHtml": "<p>a. To obtain written representations from management that they believe they have <strong>fulfilled their responsibility</strong> for preparing the FS, and for the <strong>completeness of information</strong> provided to the auditor.</p>\n<p>b. To <strong>support other audit evidence</strong> relevant to the FS, or to specific assertions, by means of written representations, if determined necessary by the auditor or required by other SAs; and</p>\n<p>c. To respond appropriately to:</p>\n<p>&bull; Written representations provided by management; or</p>\n<p>&bull; If management does not provide the written representations requested.</p>"}, {"title": "3. Date and Period Covered by the Written Representation", "keywords": [{"label": "Date \u2014 as near as practicable to report date", "icon": "calendar"}, {"label": "Opinion/report cannot precede WR date", "icon": "signature"}, {"label": "May need updated WR for specific assertion", "icon": "target"}, {"label": "Period \u2014 all periods in the audit report", "icon": "hourglass"}, {"label": "New management still bound to cover all periods", "icon": "handshake"}], "explanationHtml": "<p><strong>Date:</strong></p>\n<p>&bull; Written representations are necessary audit evidence; the auditor's opinion cannot be expressed, and the report cannot be dated, <strong>before</strong> the date of the written representations.</p>\n<p>&bull; Since the auditor is concerned with events up to the audit report date that may require adjustment/disclosure, WR are dated as near as practicable to, but <strong>not after</strong>, the audit report date.</p>\n<p>&bull; Sometimes it may be appropriate to obtain a WR about a specific assertion during the audit \u2014 in such cases it may be necessary to request an <strong>updated</strong> WR.</p>\n<p><strong>Period:</strong></p>\n<p>&bull; WR are obtained for <strong>all periods</strong> referred to in the audit report, because management needs to reaffirm that prior period representations remain appropriate.</p>\n<p>&bull; The auditor and management may agree a form of WR that updates prior period representations, addressing any changes.</p>\n<p>&bull; Current management not present during all periods may assert they cannot provide some/all representations \u2014 this does <strong>not diminish</strong> their responsibility for the FS as a whole; the requirement to request WR covering all relevant periods still applies.</p>"}, {"title": "4. Doubt as to the Reliability of Written Representations", "keywords": [{"label": "DICE \u2014 competence/integrity/ethics/diligence concerns", "icon": "warning-triangle"}, {"label": "Perform procedures if inconsistent with other evidence", "icon": "compass"}, {"label": "Reassess if matter remains unresolved", "icon": "magnify"}, {"label": "Consider disclaimer of opinion (SA 705)", "icon": "ghost"}], "explanationHtml": "<p>&bull; If the auditor has concerns about the <strong>competence, integrity, ethical values, or diligence (DICE)</strong> of management, the auditor determines the effect on the reliability of representations (oral/written) and audit evidence generally.</p>\n<p>&bull; If written representations are <strong>inconsistent</strong> with other audit evidence, the auditor shall perform audit procedures to resolve the matter.</p>\n<p>&bull; If the matter remains <strong>unresolved</strong>, the auditor shall <strong>reassess</strong> the DICE of management, and determine the effect on reliability of representations and evidence generally.</p>\n<p>&bull; If the auditor concludes the WR are <strong>not reliable</strong>, take appropriate action, including determining the possible effect on the opinion \u2014 as per SA 705, i.e. consider a <strong>disclaimer of opinion</strong>.</p>"}, {"title": "5. Requested Written Representations Not Provided", "keywords": [{"label": "Discuss the matter with management", "icon": "megaphone"}, {"label": "Re-evaluate integrity of management", "icon": "magnify"}, {"label": "Consider disclaimer of opinion (SA 705)", "icon": "warning-triangle"}], "explanationHtml": "<p>If management does not provide one or more requested written representations, the auditor shall:</p>\n<p>a. <strong>Discuss the matter</strong> with management.</p>\n<p>b. <strong>Re-evaluate the integrity</strong> of management, and evaluate the effect on the reliability of representations (oral/written) and audit evidence generally; and</p>\n<p>c. Take <strong>appropriate actions</strong>, including determining the possible effect on the opinion, as per SA 705 \u2014 i.e. consider a <strong>disclaimer of opinion</strong>.</p>"}]}, {"id": "sa600", "title": "SA 600", "subtitle": "Using the Work of Other Auditors", "cards": [{"title": "1. Key Definitions", "keywords": [{"label": "Principal Auditor (PA)", "icon": "handshake"}, {"label": "Other Auditor", "icon": "id-card"}, {"label": "Component", "icon": "puzzle"}, {"label": "Note \u2014 excludes joint audit/predecessor auditor", "icon": "footprint"}], "explanationHtml": "<p><strong>Principal Auditor (PA):</strong> the auditor who uses work performed by other auditors, with responsibility for reporting on the financial information of an entity when that information includes financial information of one or more components audited by another auditor.</p>\n<p><strong>Other Auditor:</strong> an auditor, other than the PA, with responsibility for reporting on the financial information of a component included in the financial information audited by the PA.</p>\n<p><strong>Component:</strong> a division, branch, subsidiary, joint venture, associate, or other entity whose financial information is included in the financial information audited by the PA.</p>\n<p><strong>Note:</strong> SA 600 does not apply to a <strong>joint audit</strong>, nor does it apply to the auditor's relationship with a <strong>predecessor auditor</strong>.</p>"}, {"title": "2. Acceptance as Principal Auditor", "keywords": [{"label": "Materiality of own portion audited", "icon": "ruler"}, {"label": "Knowledge of components' business", "icon": "puzzle"}, {"label": "ROMM in components' financial information", "icon": "raincloud"}, {"label": "Significant participation via additional procedures", "icon": "compass"}], "explanationHtml": "<p>The auditor should consider the following before accepting the position as principal auditor:</p>\n<p>a. The <strong>materiality</strong> of the portion of the financial information which the principal auditor audits.</p>\n<p>b. The principal auditor's <strong>degree of knowledge</strong> regarding the business of the components.</p>\n<p>c. The <strong>ROMM</strong> in the financial information of the components audited by the other auditor.</p>\n<p>d. The performance of <strong>additional procedures</strong> regarding the components audited by the other auditor, resulting in the principal auditor having significant participation in such audit.</p>"}, {"title": "3. Principal Auditor's Procedures", "keywords": [{"label": "Right to visit component/examine records", "icon": "puzzle"}, {"label": "Evaluate competence if not ICAI member", "icon": "graduation-cap"}, {"label": "SAAE that other auditor's work is adequate", "icon": "handshake"}, {"label": "Advise and coordinate at planning stage", "icon": "calendar"}, {"label": "Discuss procedures/review written summary", "icon": "scroll"}, {"label": "NTE depends on knowledge of other auditor's competence", "icon": "binoculars"}], "explanationHtml": "<p>1. The right to <strong>visit the component</strong>, and examine the books of accounts and records, if necessary, in special circumstances.</p>\n<p>2. If planning to use the work of another auditor, <strong>evaluate their competence</strong> if they are not a member of ICAI.</p>\n<p>3. Perform procedures to obtain SAAE that the other auditor's work is <strong>adequate</strong> for the principal auditor's purpose:</p>\n<p>&bull; Advise the other auditor of the use to be made of their work, and coordinate at the <strong>planning stage</strong>.</p>\n<p>&bull; Inform the other auditor about: procedures for identifying inter-component transactions and the timetable for audit completion; areas requiring special consideration; significant accounting, auditing, and reporting requirements \u2014 and obtain a representation as to compliance.</p>\n<p>4. The principal auditor might <strong>discuss</strong> the procedures applied, or review a <strong>written summary</strong> of the other auditor's procedures (questionnaire/checklist), and may also plan to <strong>visit</strong> the other auditor.</p>\n<p>5. The <strong>NTE</strong> of procedures performed by the principal auditor depends on their knowledge of the other auditor's <strong>professional competence</strong>, which can be enhanced from a review of the other auditor's previous audit work.</p>"}, {"title": "4. Principal Auditor Should Consider Significant Findings of the Other Auditor", "keywords": [{"label": "Discuss audit findings with other auditor/management", "icon": "handshake"}, {"label": "Supplementary tests may be necessary", "icon": "clipboard-check"}, {"label": "Tests performed by either auditor", "icon": "seesaw"}], "explanationHtml": "<p>&bull; The principal auditor may <strong>discuss audit findings</strong>, or other matters affecting the financial information of the components, with the other auditor and the management of the component.</p>\n<p>&bull; The principal auditor may decide that <strong>supplementary tests</strong> of the records or financial statements of the component are necessary.</p>\n<p>&bull; Such tests, depending on the circumstances, may be performed by the <strong>principal auditor or the other auditor</strong>.</p>"}, {"title": "5. When the Other Auditor Is Not a Professionally Qualified Auditor", "keywords": [{"label": "Component situated in a foreign country", "icon": "puzzle"}, {"label": "Local laws permit non-qualified auditor", "icon": "scale"}], "explanationHtml": "<p>This applies where the component is situated in a <strong>foreign country</strong>, and applicable laws permit a person other than a professionally qualified auditor to audit the financial statements of such a component.</p>"}, {"title": "6. Documentation", "keywords": [{"label": "Document components audited by other auditors", "icon": "handshake"}, {"label": "Document procedures performed/conclusions reached", "icon": "scroll"}, {"label": "No need to document reasons for limiting procedures", "icon": "brick-wall"}, {"label": "Document handling of other auditor's modified report", "icon": "warning-triangle"}], "explanationHtml": "<p>&bull; Document, in working papers, the <strong>components</strong> whose financial information was audited by other auditors.</p>\n<p>&bull; Document the <strong>procedures performed</strong> and the <strong>conclusions reached</strong> \u2014 e.g. results of discussions with the other auditor, and review of a written summary of their procedures.</p>\n<p>&bull; <strong>Need not document</strong> the reasons for limiting procedures, where SAAE has been previously obtained that acceptable quality control policies/procedures are complied with in the other auditor's practice.</p>\n<p>&bull; Where the other auditor's report is <strong>other than unmodified</strong>, document how the principal auditor dealt with the qualifications/adverse remarks while framing their own report.</p>"}, {"title": "7. Role of Principal and Other Auditor (Coordination)", "keywords": [{"label": "Sufficient liaison between auditors", "icon": "link-chain"}, {"label": "PA \u2014 written communication/advise/questionnaire", "icon": "signature"}, {"label": "Other auditor \u2014 coordinate/comply/respond timely", "icon": "handshake"}], "explanationHtml": "<p>There should be <strong>sufficient liaison</strong> between the principal auditor and the other auditor.</p>\n<p><strong>Role of the Principal Auditor:</strong></p>\n<p>i. Issue <strong>written communication(s)</strong> to the other auditor.</p>\n<p>ii. Advise the other auditor of any matters coming to their attention that may have an important bearing on the other auditor's work.</p>\n<p>iii. May require the other auditor to answer a <strong>detailed questionnaire</strong> regarding matters on which information is required.</p>\n<p><strong>Role of the Other Auditor:</strong></p>\n<p>i. Should <strong>co-ordinate</strong> with the principal auditor \u2014 e.g. bringing significant findings requiring entity-level action to immediate attention, and adhering to the audit timetable.</p>\n<p>ii. Should ensure compliance with relevant <strong>statutory requirements</strong>.</p>\n<p>iii. Should respond to the questionnaire sent by the principal auditor on a <strong>timely basis</strong>.</p>"}, {"title": "8. Reporting Considerations", "keywords": [{"label": "Qualified/disclaimer \u2014 scope limitation", "icon": "warning-triangle"}, {"label": "Cannot use other auditor's work + no additional procedures", "icon": "handshake"}, {"label": "Consider modification if other auditor's report modified", "icon": "compass"}], "explanationHtml": "<p><strong>Qualified or Disclaimer of Opinion \u2014 Limitation on Scope:</strong></p>\n<p>When the principal auditor concludes that: the work of the other auditor <strong>cannot be used</strong>; and the principal auditor is <strong>unable to perform sufficient additional procedures</strong> regarding the component's financial information \u2014 the principal auditor should express a <strong>qualified opinion or a disclaimer of opinion</strong>, as there is a limitation on the scope of the audit.</p>\n<p><strong>If the Other Auditor Issues a Modified Report:</strong></p>\n<p>The principal auditor should consider whether the subject of the modification is of such <strong>nature and significance</strong>, in relation to the entity's financial information, that it requires a modification of the principal auditor's own report.</p>"}, {"title": "9. Division of Responsibility", "keywords": [{"label": "PA not responsible except suspicious circumstances", "icon": "detective-hat"}, {"label": "Report must state division of responsibility", "icon": "scale"}, {"label": "Inform other auditor of material discrepancies", "icon": "handshake"}], "explanationHtml": "<p>&bull; The principal auditor is <strong>not responsible</strong> for the work of the other auditors, except in <strong>suspicious circumstances</strong> about the reliability of their work.</p>\n<p>&bull; When reporting on the entity's financial statements as a whole, relying on other auditors' reports, the report should clearly state the <strong>division of responsibility</strong>, indicating the extent to which components were audited by other auditors.</p>\n<p>&bull; If the principal auditor notices any <strong>material discrepancies</strong>, they should inform the other auditor \u2014 this should be included in the audit report.</p>"}]}, {"id": "sa620", "title": "SA 620", "subtitle": "Using the Work of an Auditor's Expert", "cards": [{"title": "1. Objectives of the Auditor", "keywords": [{"label": "Determine whether to use auditor's expert", "icon": "target"}, {"label": "Determine whether the expert's work is adequate", "icon": "shield-check"}], "explanationHtml": "<p>a. To determine whether to use the work of an <strong>auditor's expert</strong>; and</p>\n<p>b. If using the work of an auditor's expert, determining whether that work is <strong>adequate</strong> for the auditor's purposes.</p>"}, {"title": "2. Areas Where an Auditor's Expert Can Assist", "keywords": [{"label": "Understanding entity/internal control (SA 315)", "icon": "compass"}, {"label": "Identifying/assessing ROMM (SA 315)", "icon": "raincloud"}, {"label": "Overall responses to assessed risks (SA 330)", "icon": "shield"}, {"label": "Designing/performing further audit procedures (SA 330)", "icon": "clipboard-check"}, {"label": "Evaluating sufficiency/appropriateness of evidence (SA 500)",
