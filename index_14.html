"label": "Significant matters", "icon": "flag"}, {"label": "identifying characteristics", "icon": "fingerprint"}, {"label": "Who performed", "icon": "id-card"}, {"label": "Who reviewed", "icon": "magnify"}], "explanationHtml": "<p>The auditor shall prepare audit documentation that is sufficient to enable an experienced auditor to understand:</p>\n<p>a. The nature, timing, and extent (<strong>NTE</strong>) of the audit procedures performed;</p>\n<p>b. The <strong>results</strong> of the audit procedures performed, and the audit evidence obtained; and</p>\n<p>c. <strong>Significant matters</strong> arising during the audit, the conclusions reached thereon, and significant professional judgments made in reaching those conclusions.</p>\n<p>In documenting the nature, timing, and extent of audit procedures performed, the auditor shall record:</p>\n<p>(i) The <strong>identifying characteristics</strong> of the specific items or matters tested;</p>\n<p>(ii) <strong>Who performed</strong> the audit work and the date such work was completed; and</p>\n<p>(iii) <strong>Who reviewed</strong> the audit work performed, and the date and extent of such review.</p>"}, {"title": "4. Factors Affecting the Form, Content, and Extent of Audit Documentation", "keywords": [{"label": "size", "icon": "ruler"}, {"label": "audit procedures", "icon": "gear"}, {"label": "RoMM", "icon": "warning-triangle"}, {"label": "significance", "icon": "flag"}, {"label": "exceptions", "icon": "broken-chain"}, {"label": "conclusion", "icon": "stamp"}, {"label": "methodology", "icon": "compass"}], "explanationHtml": "<p>1. The <strong>size</strong> and complexity of the entity.</p>\n<p>2. The nature of the <strong>audit procedures</strong> to be performed.</p>\n<p>3. The identified risks of material misstatement. (<strong>RoMM</strong>)</p>\n<p>4. The <strong>significance</strong> of the audit evidence obtained.</p>\n<p>5. The nature and extent of <strong>exceptions</strong> identified.</p>\n<p>6. The need to document a <strong>conclusion</strong> or the basis for a conclusion not readily determinable from the documentation of the work performed or audit evidence obtained.</p>\n<p>7. The audit <strong>methodology</strong> and tools used.</p>\n<p>8. The <strong>timely preparation</strong> of the audit documentation.</p>"}, {"title": "5. Documentation of Matters Arising After the Date of the Auditor's Report", "keywords": [{"label": "circumstances", "icon": "ghost"}, {"label": "additional audit procedures", "icon": "gear"}, {"label": "When and by whom", "icon": "calendar"}], "explanationHtml": "<p>If, in exceptional circumstances, the auditor performs new or additional audit procedures, or draws new conclusions, after the date of the auditor's report, the auditor shall document:</p>\n<p>1. The <strong>circumstances</strong>s encountered;</p>\n<p>2. The new or <strong>additional audit procedures</strong> performed, the audit evidence obtained, and the conclusions reached, and their effect on the auditor's report; and</p>\n<p>3. <strong>When and by whom</strong> the resulting changes to the audit documentation were made and reviewed.</p>"}, {"title": "6. Assembly of the Final Audit File", "keywords": [{"label": "specific reasons", "icon": "lightbulb"}, {"label": "When and by whom", "icon": "calendar"}], "explanationHtml": "<p>Where the auditor finds it necessary to modify existing audit documentation, or add new audit documentation, after the assembly of the final audit file has been completed, the auditor shall document:</p>\n<p>a. The <strong>specific reasons</strong> for making them; and</p>\n<p>b. <strong>When and by whom</strong> they were made and reviewed.</p>"}]}, {"id": "sa240", "title": "SA 240 \u2013 Auditor's Responsibilities Relating to Fraud", "subtitle": "Fraud triangle, risk factors, and the auditor's response, from planning to reporting.", "cards": [{"title": "1. Meaning of Fraud & Types of Misstatements", "keywords": [{"label": "Fraud", "icon": "mask"}, {"label": "Intentional act", "icon": "stamp"}, {"label": "Error vs Fraud", "icon": "scale"}, {"label": "Fraudulent financial reporting", "icon": "scroll"}, {"label": "Misappropriation of assets", "icon": "broken-chain"}], "explanationHtml": "<p><strong>Fraud</strong> is an intentional act by one or more individuals among management, TCWG, employees, or third parties, involving the use of deception to obtain an unjust or illegal advantage.</p>\n<p>The distinguishing factor between fraud and error is whether the underlying action is <strong>intentional</strong> or unintentional.</p>\n<p>Two types of intentional misstatements are relevant to the auditor:</p>\n<p>&bull; <strong>Fraudulent financial reporting</strong> \u2014 misstatements resulting from fraudulent financial reporting.</p>\n<p>&bull; <strong>Misappropriation of assets</strong> \u2014 misstatements resulting from misappropriation of assets.</p>\n<p>Both types involve three elements:</p>\n<p>&bull; An <strong>incentive or pressure</strong> to commit fraud.</p>\n<p>&bull; A <strong>perceived opportunity</strong> to do so.</p>\n<p>&bull; Some <strong>rationalization</strong> of the act.</p>"}, {"title": "2. Objectives of the Auditor under SA 240", "keywords": [{"label": "Identify and assess", "icon": "magnify"}, {"label": "Sufficient appropriate evidence", "icon": "clipboard-check"}, {"label": "Respond appropriately", "icon": "shield-check"}], "explanationHtml": "<p>The objectives of the auditor under SA 240 are:</p>\n<p>a. To <strong>identify and assess</strong> the risks of material misstatement in the financial statements due to fraud;</p>\n<p>b. To obtain <strong>sufficient appropriate audit evidence</strong> about the assessed risks of material misstatement due to fraud, through designing and implementing appropriate responses; and</p>\n<p>c. To <strong>respond appropriately</strong> to identified or suspected fraud.</p>"}, {"title": "3. The Fraud Triangle \u2014 Incentive, Opportunity, Rationalization", "keywords": [{"label": "Incentive or pressure", "icon": "raincloud"}, {"label": "Perceived opportunity", "icon": "door"}, {"label": "Rationalization", "icon": "crystal-ball"}], "explanationHtml": "<p>Fraud \u2014 whether fraudulent financial reporting or misappropriation of assets \u2014 involves three conditions:</p>\n<p>1. <strong>Incentive or pressure</strong> to commit fraud \u2014 e.g. management under pressure to achieve unrealistic earnings targets, or individuals living beyond their means.</p>\n<p>2. A <strong>perceived opportunity</strong> \u2014 e.g. an individual believes internal control can be overridden, because of a position of trust or knowledge of control deficiencies.</p>\n<p>3. A <strong>rationalization</strong> of the dishonest act \u2014 some individuals possess an attitude, character, or set of ethical values that allow them to knowingly commit a dishonest act; even otherwise honest individuals can commit fraud in an environment that imposes sufficient pressure.</p>"}, {"title": "4. How Fraudulent Financial Reporting May Be Caused", "keywords": [{"label": "Earnings management", "icon": "calculator"}, {"label": "Manipulation, falsification, alteration", "icon": "mask"}, {"label": "Misrepresentation or omission", "icon": "ghost"}, {"label": "Misapplication of accounting principles", "icon": "warning-triangle"}], "explanationHtml": "<p>Fraudulent financial reporting involves intentional misstatements, including omissions, to deceive financial statement users. It can be caused by management's efforts to manage earnings.</p>\n<p>Such <strong>earnings management</strong> may start with small actions or inappropriate adjustment of assumptions, and escalate under pressure to meet market expectations, maximize performance-based compensation, minimize tax, or inflate earnings to secure financing.</p>\n<p>Fraudulent financial reporting may be accomplished by:</p>\n<p>&bull; <strong>Manipulation, falsification</strong> (including forgery), or alteration of accounting records or supporting documentation.</p>\n<p>&bull; <strong>Misrepresentation in or intentional omission</strong> from the financial statements of events, transactions, or other significant information.</p>\n<p>&bull; Intentional <strong>misapplication of accounting principles</strong> relating to amounts, classification, manner of presentation, or disclosure.</p>"}, {"title": "5. Management Override of Controls \u2014 Techniques", "keywords": [{"label": "Fictitious journal entries", "icon": "scroll"}, {"label": "Adjusting assumptions", "icon": "gear"}, {"label": "Omitting or delaying recognition", "icon": "hourglass"}, {"label": "Concealing facts", "icon": "mirror"}, {"label": "Complex transactions", "icon": "puzzle"}, {"label": "Altering records", "icon": "broken-chain"}], "explanationHtml": "<p>Fraudulent financial reporting often involves management override of controls that otherwise appear to operate effectively. Fraud can be committed by management overriding controls using techniques such as:</p>\n<p>&bull; Recording <strong>fictitious journal entries</strong>, particularly close to period-end, to manipulate results.</p>\n<p>&bull; Inappropriately <strong>adjusting assumptions</strong> and changing judgments used to estimate account balances.</p>\n<p>&bull; <strong>Omitting, advancing, or delaying recognition</strong> of events and transactions that have occurred during the reporting period.</p>\n<p>&bull; <strong>Concealing, or not disclosing</strong>, facts that could affect recorded amounts.</p>\n<p>&bull; Engaging in <strong>complex transactions</strong> structured to misrepresent the financial position or performance.</p>\n<p>&bull; <strong>Altering records and terms</strong> related to significant and unusual transactions.</p>"}, {"title": "6. How Misappropriation of Assets May Be Accomplished", "keywords": [{"label": "Embezzling receipts", "icon": "magnet"}, {"label": "Stealing physical assets", "icon": "footprint"}, {"label": "Paying for goods not received", "icon": "ghost"}, {"label": "Using assets for personal use", "icon": "trophy"}], "explanationHtml": "<p><strong>Misappropriation of assets</strong> involves theft of an entity's assets \u2014 often by employees in small, immaterial amounts, but management can also disguise or conceal misappropriations that are harder to detect.</p>\n<p>It can be accomplished in a variety of ways, including:</p>\n<p>&bull; <strong>Embezzling receipts</strong> \u2014 e.g. misappropriating collections on receivables, or diverting written-off account receipts to personal accounts.</p>\n<p>&bull; <strong>Stealing physical assets or IP</strong> \u2014 e.g. stealing inventory for personal use or sale, or colluding with a competitor by disclosing technological data for payment.</p>\n<p>&bull; <strong>Causing the entity to pay for goods/services not received</strong> \u2014 e.g. payments to fictitious vendors, kickbacks, payments to fictitious employees.</p>\n<p>&bull; <strong>Using an entity's assets for personal use</strong> \u2014 e.g. using assets as collateral for a personal loan.</p>\n<p>Misappropriation is often accompanied by false or misleading records to conceal that assets are missing.</p>"}, {"title": "7. Whose Primary Responsibility is to Prevent and Detect Fraud?", "keywords": [{"label": "TCWG and management", "icon": "id-card"}, {"label": "Fraud prevention", "icon": "shield"}, {"label": "Fraud deterrence", "icon": "warning-triangle"}, {"label": "Culture of honesty", "icon": "handshake"}], "explanationHtml": "<p>The <strong>primary responsibility</strong> for the prevention and detection of fraud rests with both <strong>those charged with governance (TCWG) and management</strong> of the entity.</p>\n<p>Management, with the oversight of TCWG, should place strong emphasis on:</p>\n<p>&bull; <strong>Fraud prevention</strong> \u2014 which may reduce opportunities for fraud to take place; and</p>\n<p>&bull; <strong>Fraud deterrence</strong> \u2014 which could persuade individuals not to commit fraud because of the likelihood of detection and punishment.</p>\n<p>This involves a commitment to creating a <strong>culture of honesty and ethical behaviour</strong>, reinforced by active oversight by TCWG.</p>"}, {"title": "8. Responsibilities of the Auditor in Detecting Fraud", "keywords": [{"label": "Reasonable assurance", "icon": "umbrella"}, {"label": "Persuasive not conclusive", "icon": "scale"}, {"label": "Fraud risk higher than error", "icon": "warning-triangle"}, {"label": "Management fraud risk highest", "icon": "flag"}], "explanationHtml": "<p>The auditor is responsible for obtaining <strong>reasonable assurance</strong> that the financial statements as a whole are free from material misstatement \u2014 whether caused by fraud or error.</p>\n<p>Owing to inherent limitations of an audit, there is an unavoidable risk that some material misstatements may not be detected, even when the audit is properly planned and performed.</p>\n<p>Key points on detecting fraud:</p>\n<p>&bull; Audit evidence is <strong>persuasive rather than conclusive</strong>, and this effect is particularly significant for misstatements resulting from fraud.</p>\n<p>&bull; The risk of not detecting a material misstatement resulting from <strong>fraud is higher</strong> than the risk of not detecting one resulting from error \u2014 because fraud may involve sophisticated, carefully organized schemes, including forgery and collusion.</p>\n<p>&bull; The risk of not detecting fraud resulting from <strong>management fraud is greater</strong> than for employee fraud \u2014 management is frequently in a position to directly or indirectly manipulate records or override controls.</p>\n<p>&bull; The auditor must maintain <strong>professional skepticism</strong> throughout the audit, recognising that audit procedures effective for detecting error may not be effective for detecting fraud.</p>"}, {"title": "9. Meaning and Evaluation of Fraud Risk Factors", "keywords": [{"label": "Events or conditions", "icon": "calendar"}, {"label": "Cannot be ranked", "icon": "seesaw"}, {"label": "Professional judgment", "icon": "crystal-ball"}], "explanationHtml": "<p><strong>Fraud risk factors</strong> are events or conditions that indicate an incentive or pressure to commit fraud, or that provide an opportunity to commit fraud.</p>\n<p>Examples:</p>\n<p>&bull; The need to meet expectations of third parties for additional equity financing may create pressure to commit fraud.</p>\n<p>&bull; Significant bonuses tied to unrealistic profit targets may create an incentive to commit fraud.</p>\n<p>&bull; An ineffective control environment may create an opportunity to commit fraud.</p>\n<p>Key points on evaluation:</p>\n<p>&bull; Fraud risk factors <strong>may not necessarily indicate fraud</strong>, but have often been present where frauds have occurred.</p>\n<p>&bull; They <strong>cannot easily be ranked</strong> in order of importance, and their significance varies widely.</p>\n<p>&bull; Whether a factor is present, and how it should be weighed, requires the exercise of <strong>professional judgment</strong>.</p>"}, {"title": "10. Fraud Risk Factors \u2014 Fraudulent Financial Reporting", "keywords": [{"label": "Incentives/Pressures", "icon": "raincloud"}, {"label": "Opportunities", "icon": "door"}, {"label": "Attitudes/Rationalizations", "icon": "mirror"}], "explanationHtml": "<p>Risk factors relating to misstatements arising from <strong>fraudulent financial reporting</strong> fall into three categories:</p>\n<p><strong>(A) Incentives/Pressures</strong>, for example:</p>\n<p>&bull; Financial stability or profitability threatened by economic, industry, or entity conditions (competition, rapid growth, operating losses, negative cash flows).</p>\n<p>&bull; Excessive pressure to meet third-party expectations (analysts, creditors) or to obtain additional financing.</p>\n<p>&bull; Personal financial situation of management/TCWG threatened by the entity's performance (bonuses, stock options, personal guarantees).</p>\n<p><strong>(B) Opportunities</strong>, for example:</p>\n<p>&bull; Significant related-party transactions not in the ordinary course of business.</p>\n<p>&bull; Assets, liabilities, or estimates involving significant subjective judgment that is difficult to corroborate.</p>\n<p>&bull; Complex or unstable organizational structure; ineffective monitoring by management or TCWG; deficient internal controls.</p>\n<p><strong>(C) Attitudes/Rationalizations</strong>, for example:</p>\n<p>&bull; Ineffective communication or enforcement of the entity's ethical values.</p>\n<p>&bull; Known history of violations of securities laws; strained relationship between management and the auditor.</p>\n<p>&bull; Excessive interest by management in maintaining or increasing stock price or earnings trend.</p>"}, {"title": "11. Fraud Risk Factors \u2014 Misappropriation of Assets", "keywords": [{"label": "Incentives/Pressures", "icon": "raincloud"}, {"label": "Opportunities", "icon": "door"}, {"label": "Attitudes/Rationalizations", "icon": "mirror"}], "explanationHtml": "<p>Risk factors relating to misstatements arising from <strong>misappropriation of assets</strong> also fall into three categories:</p>\n<p><strong>(A) Incentives/Pressures</strong>, for example:</p>\n<p>&bull; Personal financial obligations creating pressure on employees with access to cash or other susceptible assets.</p>\n<p>&bull; Adverse relationships between the entity and employees with access to assets (e.g. known or anticipated layoffs).</p>\n<p><strong>(B) Opportunities</strong>, for example:</p>\n<p>&bull; Large amounts of cash on hand; inventory that is small, high-value, or in high demand; easily convertible assets.</p>\n<p>&bull; Inadequate segregation of duties, oversight, record-keeping, authorization controls, or physical safeguards over assets.</p>\n<p>&bull; Lack of complete/timely reconciliations, mandatory vacations, or adequate IT access controls.</p>\n<p><strong>(C) Attitudes/Rationalizations</strong>, for example:</p>\n<p>&bull; Disregard for the need to monitor or reduce risks of misappropriation.</p>\n<p>&bull; Displeasure or dissatisfaction with the entity, or changes in behaviour/lifestyle suggesting assets have been misappropriated.</p>\n<p>&bull; Tolerance of petty theft.</p>"}, {"title": "12. Maintaining Professional Skepticism", "keywords": [{"label": "Throughout the audit", "icon": "alarm-clock"}, {"label": "Records accepted as genuine", "icon": "clipboard-check"}, {"label": "Investigate inconsistencies", "icon": "detective-hat"}], "explanationHtml": "<p>The auditor shall maintain <strong>professional skepticism throughout the audit</strong>, recognizing the possibility of material misstatement due to fraud, notwithstanding past experience of the honesty and integrity of management and TCWG.</p>\n<p>Unless the auditor has reason to believe the contrary, records and documents <strong>may be accepted as genuine</strong>.</p>\n<p>If conditions identified during the audit cause the auditor to believe a document may not be authentic, or that terms have been modified but not disclosed, the auditor shall <strong>investigate further</strong>.</p>\n<p>Where responses to inquiries of management or TCWG are inconsistent, the auditor shall <strong>investigate the inconsistencies</strong>.</p>"}, {"title": "13. Discussion Among the Engagement Team & Risk Assessment Procedures", "keywords": [{"label": "How and where susceptible", "icon": "eye"}, {"label": "Inquiries of management", "icon": "megaphone"}, {"label": "Understanding TCWG oversight", "icon": "binoculars"}, {"label": "Analytical procedures", "icon": "magnify"}], "explanationHtml": "<p><strong>Discussion among the engagement team</strong> shall place particular emphasis on how and where the entity's financial statements may be susceptible to material misstatement due to fraud, including how fraud might occur \u2014 notwithstanding any belief that management and TCWG are honest.</p>\n<p>As part of <strong>risk assessment procedures</strong> and related activities, the auditor shall obtain information for use in identifying risks of material misstatement due to fraud, through:</p>\n<p>&bull; <strong>Inquiries of management</strong> and others within the entity.</p>\n<p>&bull; Obtaining an <strong>understanding of how TCWG exercise oversight</strong> of management's processes for identifying and responding to fraud risk, and of the related internal control.</p>\n<p>&bull; Evaluating unexpected relationships identified through <strong>analytical procedures</strong>, which may indicate risk of material misstatement due to fraud.</p>\n<p>The auditor shall also evaluate whether the information gathered indicates that one or more fraud risk factors are present.</p>"}, {"title": "14. Responses to Assessed Risks \u2014 FS Level, Assertion Level & Management Override", "keywords": [{"label": "Assign and supervise personnel", "icon": "id-card"}, {"label": "Evaluate accounting policies", "icon": "open-book"}, {"label": "Element of unpredictability", "icon": "ghost"}, {"label": "Nature/timing/extent responsive", "icon": "hourglass"}, {"label": "Journal entries testing", "icon": "clipboard-check"}], "explanationHtml": "<p><strong>(a) Overall responses at the Financial Statement level</strong> \u2014 the auditor shall:</p>\n<p>&bull; <strong>Assign and supervise personnel</strong> taking account of the knowledge, skill, and ability required, and the assessed fraud risk.</p>\n<p>&bull; <strong>Evaluate whether accounting policies</strong> selected and applied, particularly for subjective measurements, may indicate fraudulent financial reporting.</p>\n<p>&bull; Incorporate an <strong>element of unpredictability</strong> in the nature, timing, and extent of audit procedures selected.</p>\n<p><strong>(b) At the Assertion level</strong> \u2014 the auditor shall design and perform further audit procedures whose <strong>nature, timing and extent are responsive</strong> to the assessed risks of material misstatement due to fraud (e.g. more reliable/relevant evidence, additional corroboration).</p>\n<p><strong>(c) Responsive to Management Override of Controls</strong> \u2014 irrespective of the assessed risk, the auditor shall:</p>\n<p>&bull; Test the appropriateness of <strong>journal entries</strong> recorded in the general ledger and other adjustments.</p>\n<p>&bull; Review <strong>accounting estimates</strong> for biases.</p>\n<p>&bull; For significant transactions outside the normal course of business, evaluate whether the <strong>business rationale</strong> suggests they were entered into for fraudulent reporting or to conceal misappropriation.</p>"}, {"title": "15. Evaluation of Audit Evidence", "keywords": [{"label": "Unrecognized risk", "icon": "warning-triangle"}, {"label": "Not an isolated occurrence", "icon": "link-chain"}, {"label": "Re-evaluate risk assessment", "icon": "magnify"}, {"label": "Possible collusion", "icon": "handshake"}], "explanationHtml": "<p>The auditor shall evaluate whether analytical procedures performed near the end of the audit indicate a previously <strong>unrecognized risk</strong> of material misstatement due to fraud.</p>\n<p>When a misstatement is identified, the auditor shall evaluate whether it is indicative of fraud, recognizing that an instance of fraud is <strong>unlikely to be an isolated occurrence</strong>.</p>\n<p>If the auditor believes senior management may be involved, the auditor shall <strong>re-evaluate the assessment</strong> of fraud risk and its impact on the nature, timing, and extent of procedures, and consider whether circumstances indicate <strong>possible collusion</strong>.</p>\n<p>When the auditor confirms \u2014 or is unable to conclude whether \u2014 the financial statements are materially misstated as a result of fraud, the auditor shall evaluate the implications for the audit.</p>"}, {"title": "16. Auditor is Unable to Continue the Engagement", "keywords": [{"label": "Professional and legal responsibilities", "icon": "scale"}, {"label": "Withdraw where possible", "icon": "door"}, {"label": "Discuss withdrawal", "icon": "megaphone"}, {"label": "Report to appointing authority", "icon": "scroll"}], "explanationHtml": "<p>If, as a result of a misstatement resulting from fraud or suspected fraud, the auditor encounters exceptional circumstances bringing into question the auditor's ability to continue the audit, the auditor shall:</p>\n<p>a. Determine the <strong>professional and legal responsibilities</strong> applicable, including whether there is a requirement to report to the person(s) who made the audit appointment or, in some cases, to regulatory authorities;</p>\n<p>b. Consider whether it is appropriate to <strong>withdraw from the engagement</strong>, where withdrawal is legally permitted; and</p>\n<p>c. If the auditor withdraws:</p>\n<p>&bull; <strong>Discuss</strong> with the appropriate level of management/TCWG the withdrawal and the reasons for it; and</p>\n<p>&bull; Determine whether there is a professional or legal requirement to <strong>report</strong> the withdrawal and reasons to the appointing authority or regulators.</p>"}, {"title": "17. Management Representations Regarding Fraud", "keywords": [{"label": "Acknowledge responsibility for IC", "icon": "signature"}, {"label": "Disclosed risk assessment results", "icon": "clipboard-check"}, {"label": "Disclosed knowledge of fraud", "icon": "mask"}, {"label": "Disclosed allegations", "icon": "flag"}], "explanationHtml": "<p>The auditor shall obtain written representations from management and, where applicable, TCWG, that:</p>\n<p>a. They <strong>acknowledge their responsibility</strong> for the design, implementation, and maintenance of internal control to prevent and detect fraud;</p>\n<p>b. They have <strong>disclosed the results of management's assessment</strong> of the risk that the financial statements may be materially misstated as a result of fraud;</p>\n<p>c. They have <strong>disclosed their knowledge of fraud</strong> or suspected fraud affecting the entity involving management, employees with significant roles in internal control, or others; and</p>\n<p>d. They have <strong>disclosed their knowledge of any allegations of fraud</strong>, or suspected fraud, communicated by employees, former employees, analysts, regulators, or others.</p>"}, {"title": "18. Communications & Documentation", "keywords": [{"label": "Communicate to management", "icon": "megaphone"}, {"label": "Communicate to TCWG on timely basis", "icon": "alarm-clock"}, {"label": "Report to regulatory authorities", "icon": "shield-check"}, {"label": "Document discussions and responses", "icon": "scroll"}], "explanationHtml": "<p><strong>Communications to management</strong> \u2014 if the auditor has identified a fraud or information indicating fraud may exist, the auditor shall communicate these matters on a timely basis to the appropriate level of management.</p>\n<p><strong>Communications to TCWG</strong> \u2014 the auditor shall communicate to TCWG on a timely basis, matters related to fraud that are, in the auditor's judgment, relevant to their responsibilities; if fraud involving management is suspected, the auditor shall discuss the nature, timing, and extent of audit procedures necessary to complete the audit.</p>\n<p><strong>Communications to regulatory and enforcement authorities</strong> \u2014 the auditor shall determine whether there is a responsibility to report the occurrence or suspicion to a party outside the entity (e.g. statutory duty to report bank fraud to the RBI), even though this may override the duty of confidentiality.</p>\n<p><strong>Documentation</strong> requirements include:</p>\n<p>&bull; Significant decisions reached during the engagement team discussion, and the identified and assessed risks of material misstatement due to fraud (FS level and assertion level).</p>\n<p>&bull; The overall responses to assessed risks, and the linkage of procedures to those risks, plus results of procedures addressing management override of controls.</p>\n<p>&bull; Communications about fraud made to management, TCWG, regulators, and others.</p>\n<p>&bull; Reasons supporting a conclusion that the presumed risk of fraud in revenue recognition is not applicable in the circumstances of the engagement.</p>"}]}, {"id": "sa250", "title": "SA 250 \u2013 Consideration of Laws and Regulations", "subtitle": "Two categories of laws, the auditor's differing responsibilities, and reporting non-compliance.", "cards": [{"title": "1. Effect of Laws and Regulations on Financial Statements", "keywords": [{"label": "Direct effect", "icon": "target"}, {"label": "No direct effect", "icon": "puzzle"}, {"label": "Heavily regulated industries", "icon": "brick-wall"}], "explanationHtml": "<p>The effect of laws and regulations on financial statements varies considerably. Laws to which an entity is subject constitute its <strong>legal and regulatory framework</strong>.</p>\n<p>Two broad categories:</p>\n<p>&bull; Laws/regulations with a <strong>direct effect</strong> on the financial statements \u2014 they determine the reported amounts and disclosures (e.g. tax and labour laws).</p>\n<p>&bull; Laws/regulations with <strong>no direct effect</strong> \u2014 to be complied with by management, or setting the provisions under which the entity conducts business, but not directly affecting the financial statements.</p>\n<p>Some entities operate in <strong>heavily regulated industries</strong> (banks, chemical companies); others are subject mainly to general operating laws (e.g. occupational safety and health).</p>\n<p>Non-compliance with laws and regulations may result in <strong>fines, litigation, or other consequences</strong> that have a material effect on the financial statements.</p>"}, {"title": "2. Objectives of the Auditor under SA 250", "keywords": [{"label": "Sufficient appropriate evidence \u2014 direct effect laws", "icon": "clipboard-check"}, {"label": "Specified procedures \u2014 other laws", "icon": "gear"}, {"label": "Respond appropriately", "icon": "shield-check"}], "explanationHtml": "<p>The objectives of the auditor under SA 250 are:</p>\n<p>a. To obtain <strong>sufficient appropriate audit evidence</strong> regarding compliance with the provisions of those laws and regulations generally recognized to have a <strong>direct effect</strong> on material amounts and disclosures;</p>\n<p>b. To perform <strong>specified audit procedures</strong> to help identify instances of non-compliance with <strong>other laws and regulations</strong> that may have a material effect on the financial statements; and</p>\n<p>c. To <strong>respond appropriately</strong> to non-compliance or suspected non-compliance identified during the audit.</p>"}, {"title": "3. Responsibility of Management for Compliance with Laws & Regulations", "keywords": [{"label": "Oversight of TCWG", "icon": "binoculars"}, {"label": "Prevention and detection policies", "icon": "shield"}, {"label": "Internal audit / compliance function", "icon": "id-card"}], "explanationHtml": "<p>It is the responsibility of <strong>management, with the oversight of TCWG</strong>, to ensure that the entity's operations are conducted in accordance with laws and regulations, including those that determine reported amounts and disclosures.</p>\n<p>Examples of policies and procedures an entity may implement to assist in the <strong>prevention and detection of non-compliance</strong>:</p>\n<p>&bull; Monitoring legal requirements and ensuring operating procedures meet them.</p>\n<p>&bull; Instituting and operating appropriate systems of internal control.</p>\n<p>&bull; Developing, publicising, and following a <strong>code of conduct</strong>.</p>\n<p>&bull; Ensuring employees are properly trained and understand the code of conduct.</p>\n<p>&bull; Engaging legal advisors; maintaining a register of significant laws and regulations and a record of complaints.</p>\n<p>In larger entities, these may be supplemented by an <strong>internal audit function, an audit committee, or a compliance function</strong>.</p>"}, {"title": "4. Responsibility of the Auditor \u2014 Two Categories of Laws", "keywords": [{"label": "Not responsible for preventing non-compliance", "icon": "warning-triangle"}, {"label": "Direct effect laws", "icon": "target"}, {"label": "Fundamental to operating aspects", "icon": "gear"}], "explanationHtml": "<p>The auditor is <strong>not responsible for preventing non-compliance</strong> and cannot be expected to detect non-compliance with all laws and regulations.</p>\n<p>SA 250 distinguishes the auditor's responsibilities across two categories:</p>\n<p>&bull; <strong>(a)</strong> Laws/regulations generally recognized to have a <strong>direct effect</strong> on material amounts and disclosures (e.g. tax and labour laws) \u2014 the auditor's responsibility is to obtain sufficient appropriate audit evidence about compliance.</p>\n<p>&bull; <strong>(b)</strong> Other laws/regulations with <strong>no direct effect</strong> on amounts/disclosures, but compliance with which may be fundamental to the operating aspects of the business, its ability to continue, or to avoid material penalties (e.g. operating licenses, solvency requirements, environmental regulations) \u2014 the auditor's responsibility is <strong>limited to specified audit procedures</strong> to help identify non-compliance.</p>\n<p>Potential effects of inherent limitations are greater here because:</p>\n<p>&bull; Many laws relate to operating aspects not captured by the entity's financial reporting information systems.</p>\n<p>&bull; Non-compliance may involve conduct designed to conceal it \u2014 collusion, forgery, deliberate failure to record transactions, management override, or intentional misrepresentation.</p>\n<p>&bull; Whether an act constitutes non-compliance is ultimately a matter for <strong>legal determination by a court of law</strong>.</p>"}, {"title": "5. Auditor's Consideration of Compliance with Laws and Regulations", "keywords": [{"label": "General understanding of framework", "icon": "open-book"}, {"label": "Inquiring of management", "icon": "megaphone"}, {"label": "Inspecting correspondence with regulators", "icon": "envelope"}, {"label": "Written representations", "icon": "signature"}], "explanationHtml": "<p>As part of obtaining an understanding of the entity and its environment, the auditor shall obtain a <strong>general understanding</strong> of:</p>\n<p>&bull; The legal and regulatory framework applicable to the entity and its industry/sector; and</p>\n<p>&bull; How the entity is complying with that framework.</p>\n<p>For laws with a direct effect on amounts/disclosures, the auditor obtains sufficient appropriate audit evidence about compliance (e.g. relating to form/content of FS or industry-specific reporting).</p>\n<p>To help identify non-compliance with <strong>other laws</strong>, the auditor shall:</p>\n<p>a. <strong>Inquire of management</strong> and, where appropriate, TCWG, as to whether the entity is in compliance; and</p>\n<p>b. <strong>Inspect correspondence</strong>, if any, with the relevant licensing or regulatory authorities.</p>\n<p>The auditor shall remain alert throughout the audit, and request <strong>written representations</strong> that all known/suspected instances of non-compliance whose effects should be considered when preparing the FS have been disclosed.</p>"}, {"title": "6. Audit Procedures When Non-Compliance is Identified or Suspected", "keywords": [{"label": "Understanding nature and circumstances", "icon": "magnify"}, {"label": "Further information", "icon": "folder"}, {"label": "Discuss with management", "icon": "handshake"}, {"label": "Consider legal advice", "icon": "scale"}], "explanationHtml": "<p>If the auditor becomes aware of information concerning an instance of non-compliance or suspected non-compliance, the auditor shall obtain:</p>\n<p>a. An <strong>understanding of the nature</strong> of the act and the circumstances in which it has occurred; and</p>\n<p>b. <strong>Further information</strong> to evaluate the possible effect on the financial statements.</p>\n<p>If the auditor suspects non-compliance, the auditor shall <strong>discuss the matter with management</strong> and, where appropriate, TCWG.</p>\n<p>If management/TCWG do not provide sufficient supporting information, and the effect may be material, the auditor shall consider the need to obtain <strong>legal advice</strong>.</p>\n<p>If sufficient information about suspected non-compliance cannot be obtained, the auditor shall evaluate the effect of the lack of sufficient appropriate audit evidence on the auditor's opinion.</p>"}, {"title": "7. Reporting of Non-Compliance & Documentation", "keywords": [{"label": "Report to TCWG", "icon": "megaphone"}, {"label": "Qualified or adverse opinion", "icon": "warning-triangle"}, {"label": "Report to regulatory authorities", "icon": "shield-check"}, {"label": "Documentation", "icon": "scroll"}], "explanationHtml": "<p><strong>(A) Reporting to TCWG</strong> \u2014 unless clearly inconsequential, the auditor shall communicate matters involving identified/suspected non-compliance to TCWG. If intentional and material, communicate as soon as practicable; if management/TCWG are suspected of involvement, communicate to the next higher authority (e.g. audit committee), and consider legal advice.</p>\n<p><strong>(B) Reporting in the Auditor's Report</strong>:</p>\n<p>&bull; If non-compliance has a <strong>material effect</strong> not adequately reflected in the FS, express a <strong>qualified or adverse opinion</strong> as per SA 705.</p>\n<p>&bull; If precluded by management/TCWG from obtaining sufficient appropriate evidence, express a <strong>qualified opinion or disclaim</strong> an opinion due to scope limitation.</p>\n<p>&bull; If unable to determine whether non-compliance occurred due to circumstance-based limitations, evaluate the effect on the opinion as per SA 705.</p>\n<p><strong>(C) Reporting to Regulatory and Enforcement Authorities</strong> \u2014 the auditor shall determine whether there is a responsibility to report identified/suspected non-compliance to parties outside the entity.</p>\n<p><strong>Documentation</strong> \u2014 the auditor shall document identified/suspected non-compliance and the results of discussions with management and, where applicable, TCWG and other parties outside the entity.</p>"}]}, {"id": "sa260", "title": "SA 260 \u2013 Communication with Those Charged with Governance", "subtitle": "What to communicate, when, and how \u2014 plus independence disclosures for listed entities.", "cards": [{"title": "1. Who are \"Those Charged with Governance\"? & Significance of Communication", "keywords": [{"label": "Overseeing strategic direction", "icon": "compass"}, {"label": "Governance structures vary", "icon": "puzzle"}, {"label": "Two-way communication", "icon": "megaphone"}], "explanationHtml": "<p>\"<strong>Those charged with governance</strong>\" (TCWG) denote the person(s)/organization(s) responsible for <strong>overseeing the strategic direction</strong> of the entity and obligations related to its accountability, including overseeing the financial reporting process.</p>\n<p><strong>Governance structures vary</strong> by entity \u2014 some have a supervisory board separate from an executive board; in others, both functions rest with a single board, or with the owner-manager; in some cases, governance is the collective responsibility of a board of directors, partners, trustees, or a committee of management.</p>\n<p><strong>Significance of communication</strong> \u2014 an effective two-way communication assists:</p>\n<p>&bull; The auditor and TCWG in understanding matters related to the audit in context, and developing a constructive working relationship, while maintaining independence and objectivity.</p>\n<p>&bull; The auditor in obtaining information relevant to the audit from TCWG (e.g. understanding the entity, sources of evidence, specific transactions).</p>\n<p>&bull; TCWG in fulfilling their responsibility to oversee the financial reporting process, reducing the risks of material misstatement.</p>"}, {"title": "2. Objectives of the Auditor under SA 260", "keywords": [{"label": "Communicate responsibilities and scope/timing", "icon": "scroll"}, {"label": "Obtain information relevant to audit", "icon": "folder"}, {"label": "Provide timely observations", "icon": "alarm-clock"}, {"label": "Promote two-way communication", "icon": "megaphone"}], "explanationHtml": "<p>The objectives of the auditor under SA 260 are:</p>\n<p>a. To <strong>communicate clearly</strong> with TCWG the responsibilities of the auditor in relation to the financial statement audit, and an overview of the <strong>planned scope and timing</strong> of the audit;</p>\n<p>b. To <strong>obtain from TCWG information</strong> relevant to the audit;</p>\n<p>c. To provide TCWG with <strong>timely observations</strong> arising from the audit that are significant and relevant to their responsibility to oversee the financial reporting process; and</p>\n<p>d. To promote effective <strong>two-way communication</strong> between the auditor and TCWG.</p>\n<p>The auditor shall determine the appropriate person(s) within the entity's governance structure with whom to communicate.</p>"}, {"title": "3. Matters to be Communicated \u2014 Auditor's Responsibilities & Planned Scope/Timing", "keywords": [{"label": "Forming and expressing an opinion", "icon": "stamp"}, {"label": "Does not relieve management", "icon": "id-card"}, {"label": "Overview of significant risks", "icon": "warning-triangle"}, {"label": "Care re: predictability", "icon": "eye"}], "explanationHtml": "<p><strong>[a] Auditor's responsibilities in relation to the financial statement audit</strong> \u2014 the auditor shall communicate that:</p>\n<p>&bull; The auditor is responsible for <strong>forming and expressing an opinion</strong> on the FS prepared by management with the oversight of TCWG; and</p>\n<p>&bull; The audit <strong>does not relieve management or TCWG</strong> of their responsibilities.</p>\n<p>This is often included in the engagement letter; where TCWG did not agree the terms, providing a copy of the letter may be an appropriate way to communicate.</p>\n<p><strong>[b] Planned scope and timing of the audit</strong> \u2014 communication:</p>\n<p>&bull; Gives TCWG an <strong>overview of planned scope and timing</strong>, including <strong>significant risks</strong> identified by the auditor.</p>\n<p>&bull; Assists TCWG to understand the consequences of the auditor's work and discuss risk/materiality; assists the auditor to understand the entity better.</p>\n<p>&bull; <strong>Care is necessary</strong> not to compromise audit effectiveness \u2014 e.g. communicating detailed procedure timing may make them too predictable, particularly where TCWG are involved in managing the entity.</p>"}, {"title": "4. Matters to be Communicated \u2014 Significant Findings from the Audit", "keywords": [{"label": "Views on accounting practices", "icon": "open-book"}, {"label": "Significant difficulties", "icon": "warning-triangle"}, {"label": "Significant matters discussed with management", "icon": "handshake"}, {"label": "Circumstances affecting the report", "icon": "scroll"}], "explanationHtml": "<p><strong>[c] Significant findings from the audit</strong> \u2014 the auditor shall communicate:</p>\n<p>i. The auditor's <strong>views about significant qualitative aspects</strong> of the entity's accounting practices, including policies, estimates, and disclosures \u2014 explaining why an acceptable practice is not considered most appropriate, when applicable.</p>\n<p>ii. <strong>Significant difficulties</strong>, if any, encountered during the audit (e.g. delays by management, unreasonably brief time, restrictions imposed, unwillingness to extend going-concern assessment).</p>\n<p>iii. Unless all TCWG are involved in managing the entity: (1) <strong>Significant matters</strong> arising during the audit that were discussed with, or subject to correspondence with, management; and (2) <strong>Written representations</strong> the auditor is requesting.</p>\n<p>iv. <strong>Circumstances that affect the form and content</strong> of the auditor's report, if any.</p>\n<p>v. Any other significant matters relevant, in the auditor's professional judgment, to the oversight of the financial reporting process.</p>\n<p>Circumstances requiring communication include: expected modification of opinion (SA 705), a material uncertainty on going concern (SA 570), key audit matters (SA 701), an Emphasis of/Other Matter paragraph (SA 706), or uncorrected material misstatement of other information (SA 720).</p>"}, {"title": "5. Communication of Auditor's Independence (Listed Entities)", "keywords": [{"label": "Statement of compliance with ethical requirements", "icon": "signature"}, {"label": "All relationships bearing on independence", "icon": "link-chain"}, {"label": "Fees for audit and non-audit services", "icon": "calculator"}, {"label": "Safeguards applied", "icon": "shield"}], "explanationHtml": "<p>In the case of <strong>listed entities</strong>, the auditor shall communicate with TCWG:</p>\n<p>a. A <strong>statement that the engagement team</strong> and others in the firm, the firm, and network firms, have complied with relevant <strong>ethical requirements regarding independence</strong>; and</p>\n<p>b. (i) All <strong>relationships and other matters</strong> between the firm, network firms, and the entity that may reasonably be thought to bear on independence \u2014 including <strong>total fees</strong> charged for audit and non-audit services, allocated to categories appropriate to assess the effect on independence; and (ii) The related <strong>safeguards applied</strong> to eliminate identified threats or reduce them to an acceptable level.</p>"}, {"title": "6. The Communication Process, Adequacy & Documentation", "keywords": [{"label": "Form, timing and content", "icon": "gear"}, {"label": "Written for significant findings", "icon": "envelope"}, {"label": "On a timely basis", "icon": "alarm-clock"}, {"label": "Adequacy of two-way communication", "icon": "magnify"}, {"label": "Documentation", "icon": "scroll"}], "explanationHtml": "<p><strong>The Communication Process</strong> \u2014 the auditor shall communicate with TCWG the form, timing, and expected general content of communications.</p>\n<p>&bull; The auditor shall communicate <strong>in writing</strong> regarding significant findings from the audit if oral communication would not be adequate \u2014 written communications need not include all matters that arose during the audit.</p>\n<p>&bull; The auditor shall communicate <strong>in writing</strong> regarding auditor independence when required, in case of listed entities.</p>\n<p>&bull; The auditor shall communicate with TCWG <strong>on a timely basis</strong>.</p>\n<p><strong>Adequacy of the Communication Process</strong> \u2014 the auditor shall evaluate whether the two-way communication between the auditor and TCWG has been adequate for the purpose of the audit. If not, the auditor shall evaluate the effect, if any, on the assessment of risks of material misstatement and ability to obtain sufficient appropriate audit evidence, and take appropriate action.</p>\n<p><strong>Documentation</strong> \u2014 where matters were communicated orally, the auditor shall include them in the audit documentation, along with when and to whom they were communicated. Where communicated in writing, the auditor shall retain a copy as part of the audit documentation.</p>"}]}, {"id": "sa265", "title": "SA 265 \u2013 Communicating Deficiencies in Internal Control", "subtitle": "Identifying, evaluating, and communicating significant deficiencies to TCWG and management.", "cards": [{"title": "1. Auditor's Objective", "keywords": [{"label": "Deficiencies in IC", "icon": "gear"}, {"label": "Sufficient importance", "icon": "flag"}, {"label": "TCWG and management", "icon": "id-card"}], "explanationHtml": "<p>To communicate to <strong>TCWG and management</strong>, deficiencies in internal control that the auditor has identified, and which, in the auditor's professional judgment, are of <strong>sufficient importance</strong> to merit their respective attention.</p>"}, {"title": "2. Requirements", "keywords": [{"label": "Determine deficiencies", "icon": "magnify"}, {"label": "Significant deficiencies", "icon": "warning-triangle"}, {"label": "Communicate in writing to TCWG", "icon": "scroll"}, {"label": "Communicate to management", "icon": "megaphone"}], "explanationHtml": "<p>&bull; <strong>Determine</strong> whether, based on audit work performed, one or more deficiencies in internal control (IC) have been identified.</p>\n<p>&bull; If identified, determine whether, individually or in combination, they constitute <strong>significant deficiencies</strong>.</p>\n<p>&bull; <strong>Communicate in writing</strong>, significant deficiencies to <strong>TCWG</strong> on a timely basis.</p>\n<p>&bull; <strong>Communicate to management</strong> at an appropriate level, on a timely basis:</p>\n<p>a. In writing, significant deficiencies already communicated (or intended to be communicated) to TCWG, unless inappropriate to do so directly; and</p>\n<p>b. Other deficiencies not communicated by other parties that, in the auditor's judgment, merit management's attention.</p>"}, {"title": "3. Written Communication to TCWG", "keywords": [{"label": "Description and potential effects", "icon": "scroll"}, {"label": "Sufficient context", "icon": "folder"}, {"label": "Purpose of the audit", "icon": "target"}, {"label": "Scope limited to IC relevant to FS", "icon": "puzzle"}], "explanationHtml": "<p>The written communication of significant deficiencies shall include:</p>\n<p>a. A <strong>description of the deficiencies</strong> and an explanation of their potential effects; and</p>\n<p>b. <strong>Sufficient information</strong> to enable TCWG and management to understand the context of the communication.</p>\n<p>In particular, the auditor shall explain that:</p>\n<p>&bull; The <strong>purpose of the audit</strong> was to express an opinion on the financial statements.</p>\n<p>&bull; The audit included consideration of internal controls relevant to designing audit procedures, but <strong>not for the purpose of expressing an opinion on the effectiveness of IC</strong>.</p>\n<p>&bull; The matters reported are <strong>limited to deficiencies identified during the audit</strong> and concluded to be of sufficient importance to report.</p>"}, {"title": "4. How to Determine if There Are Significant Deficiencies in IC", "keywords": [{"label": "Ineffective risk assessment process", "icon": "warning-triangle"}, {"label": "Misstatements not prevented or detected", "icon": "broken-chain"}, {"label": "Prior period item disclosure", "icon": "calendar"}, {"label": "Inability to oversee FS preparation", "icon": "eye"}, {"label": "Ineffective response to significant risks", "icon": "shield"}, {"label": "Ineffective control environment", "icon": "brick-wall"}], "explanationHtml": "<p>Indicators of significant deficiencies in internal control include:</p>\n<p>&bull; Evidence of an <strong>ineffective risk assessment process (RAP)</strong> \u2014 e.g. management's failure to identify a ROMM the auditor would expect the RAP to have identified.</p>\n<p>&bull; <strong>Misstatements detected</strong> by the auditor's procedures that were <strong>not prevented, or detected and corrected</strong>, by the entity's internal control.</p>\n<p>&bull; Disclosure of a material misstatement due to error or fraud as a <strong>prior period item</strong> in the current year's P&L.</p>\n<p>&bull; Evidence of management's <strong>inability to oversee the preparation</strong> of the financial statements.</p>\n<p>&bull; Evidence of an <strong>ineffective response to identified significant risks</strong> (e.g. absence of controls over such a risk).</p>\n<p>&bull; Evidence of <strong>ineffective aspects of the control environment</strong>, such as: (a) management fraud not prevented by IC; (b) failure to remedy previously communicated deficiencies; (c) absence of a RAP where one would ordinarily be expected.</p>"}, {"title": "5. How to Decide if an Identified Deficiency Is Significant or Not", "keywords": [{"label": "Likelihood of future misstatement", "icon": "crystal-ball"}, {"label": "Interaction with other deficiencies", "icon": "link-chain"}, {"label": "Volume of activity exposed", "icon": "ruler"}, {"label": "FS amounts exposed", "icon": "target"}, {"label": "Susceptibility to loss or fraud", "icon": "mask"}, {"label": "Importance of the controls", "icon": "shield-check"}], "explanationHtml": "<p>Matters the auditor may consider in determining whether a deficiency (or combination) is significant:</p>\n<p>&bull; The <strong>likelihood</strong> of the deficiencies leading to material misstatements in the future.</p>\n<p>&bull; The <strong>interaction</strong> of the deficiency with other deficiencies in internal control.</p>\n<p>&bull; The <strong>volume of activity</strong> exposed to the deficiency, in the account balance or class of transactions.</p>\n<p>&bull; The <strong>financial statement amounts</strong> exposed to the deficiencies.</p>\n<p>&bull; The <strong>susceptibility to loss or fraud</strong> of the related asset or liability.</p>\n<p>&bull; The <strong>importance of the controls</strong> to financial reporting \u2014 e.g. general monitoring controls, controls over fraud prevention/detection, over significant accounting policies, related-party transactions, unusual transactions, or the period-end financial reporting process.</p>"}, {"title": "6. When to Communicate?", "keywords": [{"label": "Listed entities \u2014 before approval of FS", "icon": "calendar"}, {"label": "Other entities \u2014 before assembly of audit file", "icon": "folder"}], "explanationHtml": "<p>&bull; <strong>Listed entities:</strong> Before the date of approval of the financial statements.</p>\n<p>&bull; <strong>Other entities:</strong> Before the assembly of the audit file (i.e. the actual date of assembly).</p>"}, {"title": "7. Notes", "keywords": [{"label": "Repeat or reference prior communication", "icon": "scroll"}, {"label": "Oral communication before written", "icon": "megaphone"}], "explanationHtml": "<p>&bull; If a previously communicated significant deficiency remains, the current year's communication may <strong>repeat the description</strong> from the previous communication, or simply <strong>reference</strong> it.</p>\n<p>&bull; The auditor may communicate the matter <strong>orally before communicating it in writing</strong>.</p>"}]}, {"id": "sa299", "title": "SA 299 \u2013 Joint Audit of Financial Statements", "subtitle": "Planning, dividing work, joint & several responsibility, and reporting among joint auditors.", "cards": [{"title": "1. Meaning of Joint Audit & Objectives under SA 299", "keywords": [{"label": "Two or more auditors", "icon": "id-card"}, {"label": "Section 139(3)", "icon": "scale"}, {"label": "Uniform approach", "icon": "compass"}, {"label": "Individual and joint responsibility", "icon": "handshake"}], "explanationHtml": "<p>A <strong>joint audit</strong> is an audit of financial statements of an entity by <strong>two or more auditors</strong> appointed with the objective of issuing the audit report \u2014 such auditors are called <strong>joint auditors</strong>.</p>\n<p>Section <strong>139(3)</strong> of the Companies Act, 2013 provides that members of a company may resolve that the audit shall be conducted by more than one auditor.</p>\n<p>SA 299 lays down principles for the effective conduct of a joint audit, to achieve the overall objectives of the auditor under SA 200. It does not deal with the relationship between a principal auditor and a component auditor.</p>\n<p>Objectives of SA 299:</p>\n<p>a. To lay down <strong>broad principles</strong> for the joint auditors in conducting the joint audit.</p>\n<p>b. To provide a <strong>uniform approach</strong> to the process of joint audit.</p>\n<p>c. To identify the <strong>distinct areas of work</strong> and coverage thereof by each joint auditor.</p>\n<p>d. To identify <strong>individual responsibility and joint responsibility</strong> of the joint auditors in relation to the audit.</p>"}, {"title": "2. Audit Planning, Risk Assessment and Allocation of Work", "keywords": [{"label": "Joint audit plan", "icon": "compass"}, {"label": "Division of audit areas", "icon": "puzzle"}, {"label": "Risks of material misstatement", "icon": "warning-triangle"}, {"label": "Common engagement letter", "icon": "envelope"}], "explanationHtml": "<p>The engagement partner and key team members from each joint auditor shall be involved in <strong>planning the audit</strong>; the overall audit strategy shall be established jointly.</p>\n<p>Prior to commencement, the joint auditors shall discuss and develop a <strong>joint audit plan</strong>, which shall:</p>\n<p>a. <strong>Identify division of audit areas</strong> and common audit areas amongst the joint auditors \u2014 usually by identifiable units/specified areas, or by reference to assets/liabilities/income/expenditure where a functional division is not possible; certain important areas may not be divided and remain covered by all joint auditors.</p>\n<p>b. Ascertain the <strong>reporting objectives</strong> to plan timing and nature of communications required.</p>\n<p>c. Consider and communicate among all joint auditors the factors significant in directing the engagement team's efforts.</p>\n<p>d. Consider results of preliminary engagement activities and relevant knowledge from prior/similar engagements.</p>\n<p>e. Ascertain the nature, timing, and extent of resources necessary to perform the engagement.</p>\n<p><strong>Risks of material misstatement</strong> shall be assessed by each joint auditor and communicated to the others, and documented.</p>\n<p>The joint auditors shall obtain a <strong>common engagement letter</strong> and common management representation letter. The work allocation document shall be signed by all joint auditors and communicated to TCWG.</p>"}, {"title": "3. Responsibility and Co-ordination among Joint Auditors", "keywords": [{"label": "Shared responsibility for info/explanations", "icon": "folder"}, {"label": "Separate responsibility for divided work", "icon": "puzzle"}, {"label": "Communicate matters in writing", "icon": "scroll"}, {"label": "Individual NTE determination", "icon": "hourglass"}], "explanationHtml": "<p>Obtaining and evaluating information and explanations from management is a <strong>shared responsibility</strong> of all joint auditors, unless they agree on a specific pattern of distribution.</p>\n<p>For work <strong>divided among the joint auditors</strong>, each joint auditor is responsible <strong>only for the work allocated</strong> to them, including proper execution of the audit procedures \u2014 whether or not they have prepared a separate report on the work performed.</p>\n<p>Where a joint auditor comes across matters relevant to another joint auditor's area, which deserve attention or require disclosure/discussion/judgment by others, that joint auditor shall <strong>communicate the same to all other joint auditors in writing</strong> prior to completion of the audit.</p>\n<p>Each joint auditor is individually responsible to determine the <strong>nature, timing, and extent (NTE)</strong> of audit procedures for the areas of work allocated to them, and to study and evaluate the prevailing system of internal control relating to that work.</p>"}, {"title": "4. Joint & Several Responsibility \u2014 What's Covered", "keywords": [{"label": "Undivided audit work", "icon": "gear"}, {"label": "Common area decisions", "icon": "stamp"}, {"label": "Matters with agreement", "icon": "handshake"}, {"label": "Compliance with statutes and FRF", "icon": "scale"}, {"label": "Audit report compliance", "icon": "clipboard-check"}], "explanationHtml": "<p>All the joint auditors shall be <strong>jointly and severally responsible</strong> for:</p>\n<p>&bull; The audit work which is <strong>not divided</strong> among the joint auditors and is carried out by all joint auditors.</p>\n<p>&bull; <strong>Decisions</strong> taken by all joint auditors under audit planning in respect of <strong>common audit areas</strong> concerning the nature, timing, and extent of procedures to be performed by each.</p>\n<p>&bull; Matters which are <strong>brought to the notice</strong> of the joint auditors by any one of them, and on which there is <strong>agreement</strong> among the joint auditors.</p>\n<p>&bull; Examining that the financial statements <strong>comply with the relevant statutes</strong>.</p>\n<p>&bull; <strong>Presentation and disclosure</strong> of the financial statements as required by the applicable financial reporting framework.</p>\n<p>&bull; Ensuring that the <strong>audit report complies</strong> with the requirements of the relevant statutes, applicable SAs, and other pronouncements of ICAI.</p>\n<p>For decisions on common areas concerning nature/timing/extent, joint auditors are responsible only for the <strong>appropriateness</strong> of the decisions agreed among them \u2014 <strong>proper execution</strong> remains the individual responsibility of the joint auditor concerned.</p>"}, {"title": "5. Audit Conclusion, Reporting & Communication with TCWG", "keywords": [{"label": "Common audit report", "icon": "scroll"}, {"label": "Separate report on disagreement", "icon": "broken-chain"}, {"label": "Other Matter paragraph reference", "icon": "flag"}, {"label": "Entitled to assume", "icon": "thumb"}, {"label": "Communicate before finalizing", "icon": "megaphone"}], "explanationHtml": "<p>The joint auditors are required to issue a <strong>common audit report</strong>; however, where they are in disagreement on the opinion or any matters to be covered, they shall express their opinion in a <strong>separate audit report</strong>.</p>\n<p>A joint auditor is <strong>not bound by the majority view</strong> of the other joint auditors, and shall express the opinion formed by them in a separate report in case of disagreement. Such separate reports shall cross-reference each other under the heading <strong>\"Other Matter Paragraph\"</strong> as per SA 706.</p>\n<p><strong>Each joint auditor is entitled to assume</strong> that:</p>\n<p>&bull; The other joint auditors have carried out their part of the audit work in accordance with the SAs \u2014 it is not necessary to review the work performed by other joint auditors or perform tests to ascertain this.</p>\n<p>&bull; The other joint auditors have brought to their notice any departure from the applicable financial reporting framework or significant observations relevant to their responsibilities.</p>\n<p>Where a division/branch's FS are audited by one joint auditor, the others may proceed on the basis that such FS comply with legal/regulatory requirements and present a true and fair view.</p>\n<p><strong>Before finalizing</strong> the audit report, the joint auditors shall discuss and communicate with each other their respective conclusions that would form the report's content.</p>\n<p><strong>Communication with TCWG</strong> \u2014 when joint auditors expect to modify the opinion, or include an Emphasis of Matter/Other Matter paragraph, they shall communicate with TCWG the circumstances/expectation and the proposed wording, to ensure compliance with SA 705/SA 706.</p>"}]}, {"id": "sa315", "title": "SA 315 \u2013 Identifying and Assessing ROMM", "subtitle": "Assertions, internal control, risk assessment procedures, and significant/IT risks.", "cards": [{"title": "1. Objective of the Auditor", "keywords": [{"label": "ROMM at FS and assertion level", "icon": "warning-triangle"}, {"label": "Understanding entity and environment", "icon": "compass"}, {"label": "Basis for responses", "icon": "gear"}], "explanationHtml": "<p>To identify and assess the <strong>risk of material misstatement (ROMM)</strong>, whether due to fraud or error, at the <strong>financial statement and assertion levels</strong>, through understanding the entity and its environment, including its internal control \u2014 thereby providing a <strong>basis for designing and implementing responses</strong> to the assessed ROMM.</p>"}, {"title": "2. Assertions", "keywords": [{"label": "OCACC \u2014 transactions and events", "icon": "clipboard-check"}, {"label": "ERCV \u2014 account balances", "icon": "scale"}, {"label": "OCCA \u2014 presentation and disclosure", "icon": "scroll"}], "explanationHtml": "<p>Assertions are representations by management, embodied in the financial statements, used by the auditor to consider the different types of potential misstatements that may occur.</p>\n<p><strong>Assertions about Classes of Transactions and Events (OCACC):</strong></p>\n<p>&bull; <strong>Occurrence</strong> \u2014 transactions and events recorded have occurred and pertain to the entity.</p>\n<p>&bull; <strong>Completeness</strong> \u2014 all transactions/events that should have been recorded have been recorded.</p>\n<p>&bull; <strong>Accuracy</strong> \u2014 amounts and data have been recorded appropriately.</p>\n<p>&bull; <strong>Cut-off</strong> \u2014 transactions/events recorded in the correct accounting period.</p>\n<p>&bull; <strong>Classification</strong> \u2014 transactions/events recorded in the proper accounts.</p>\n<p><strong>Assertions about Account Balances at the Period End (ERCV):</strong></p>\n<p>&bull; <strong>Existence</strong> \u2014 assets, liabilities, and equity interests exist.</p>\n<p>&bull; <strong>Rights and obligations</strong> \u2014 the entity holds/controls rights to assets; liabilities are its obligations.</p>\n<p>&bull; <strong>Completeness</strong> \u2014 all balances that should have been recorded have been recorded.</p>\n<p>&bull; <strong>Valuation and allocation</strong> \u2014 included at appropriate amounts, with any adjustments appropriately recorded.</p>\n<p><strong>Assertions about Presentation and Disclosure (OCCA):</strong></p>\n<p>&bull; <strong>Occurrence and rights and obligations</strong> \u2014 disclosed events/transactions have occurred and pertain to the entity.</p>\n<p>&bull; <strong>Completeness</strong> \u2014 all disclosures that should have been included have been included.</p>\n<p>&bull; <strong>Classification and understandability</strong> \u2014 information appropriately presented and clearly expressed.</p>\n<p>&bull; <strong>Accuracy and valuation</strong> \u2014 disclosed fairly and at appropriate amounts.</p>"}, {"title": "3. Internal Control (IC)", "keywords": [{"label": "Designed, implemented, maintained", "icon": "gear"}, {"label": "Reliability of financial reporting", "icon": "shield-check"}, {"label": "Effectiveness/efficiency of operations", "icon": "target"}, {"label": "Safeguarding of assets", "icon": "shield"}, {"label": "Compliance with laws", "icon": "scale"}], "explanationHtml": "<p>A process <strong>designed, implemented, and maintained (DIM)</strong> by TCWG, management, and other personnel, to provide reasonable assurance about achievement of the entity's objectives regarding:</p>\n<p>&bull; <strong>Reliability of financial reporting</strong>,</p>\n<p>&bull; <strong>Effectiveness and efficiency of operations</strong>,</p>\n<p>&bull; <strong>Safeguarding of assets</strong>, and</p>\n<p>&bull; <strong>Compliance</strong> with applicable laws and regulations.</p>"}, {"title": "4. Risk Assessment Procedures (RAP)", "keywords": [{"label": "Inquiries of management", "icon": "megaphone"}, {"label": "Analytical procedures", "icon": "magnify"}, {"label": "Observation and inspection", "icon": "eye"}], "explanationHtml": "<p><strong>Risk assessment procedures</strong> are audit procedures performed to obtain an understanding of the entity and its environment, including internal control, to identify and assess the ROMM at the financial statement and assertion levels.</p>\n<p>Risk assessment procedures shall include:</p>\n<p>a. <strong>Inquiries of management</strong> and others within the entity likely to have information assisting in identifying ROMM due to fraud or error.</p>\n<p>b. <strong>Analytical procedures</strong>.</p>\n<p>c. <strong>Observation and inspection</strong>.</p>"}, {"title": "5. Understanding to Be Obtained (Knowledge of Business)", "keywords": [{"label": "Industry, regulatory, external factors", "icon": "compass"}, {"label": "Nature of the entity", "icon": "id-card"}, {"label": "Accounting policies selected", "icon": "open-book"}, {"label": "Objectives, strategies and business risks", "icon": "target"}, {"label": "Measurement and review of performance", "icon": "ruler"}], "explanationHtml": "<p>The auditor shall obtain an understanding of:</p>\n<p>a. The relevant <strong>industry, regulatory, and other external factors</strong>, including the applicable FRF.</p>\n<p>b. The <strong>nature of the entity</strong> \u2014 its operations; ownership and governance structures; types of investments made/planned, including special-purpose entities; and how it is structured and financed.</p>\n<p>c. The entity's <strong>selection and application of accounting policies</strong>, including reasons for changes.</p>\n<p>d. The entity's <strong>objectives and strategies</strong>, and related business risks that may result in ROMM.</p>\n<p>e. The <strong>measurement and review</strong> of the entity's financial performance.</p>"}, {"title": "6. Auditor's Process of Assessing the ROMM", "keywords": [{"label": "Identify risks", "icon": "magnify"}, {"label": "Assess \u2014 pervasive or specific", "icon": "scale"}, {"label": "Relate to WCGW and controls", "icon": "puzzle"}, {"label": "Likelihood and magnitude", "icon": "crystal-ball"}], "explanationHtml": "<p>a. <strong>Identify</strong> risks throughout the process of understanding the entity and its environment, including relevant controls, considering classes of transactions, account balances, and disclosures (ABCD).</p>\n<p>b. <strong>Assess</strong> identified risks, evaluating whether they relate more pervasively to the financial statements as a whole, potentially affecting many assertions.</p>\n<p>c. <strong>Relate</strong> identified risks to <strong>what can go wrong (WCGW)</strong> at the assertion level, considering relevant controls the auditor intends to test.</p>\n<p>d. Consider the <strong>likelihood</strong> of misstatement, including multiple misstatements, and whether the potential misstatement is of a <strong>magnitude</strong> that could be material.</p>"}, {"title": "7. IT Risks", "keywords": [{"label": "Inaccurate data processing", "icon": "gear"}, {"label": "Unauthorised access to data", "icon": "door"}, {"label": "Breakdown of segregation of duties", "icon": "broken-chain"}, {"label": "Unauthorised changes to data/systems", "icon": "warning-triangle"}, {"label": "Failure to make necessary changes", "icon": "hourglass"}, {"label": "Loss of or inability to access data", "icon": "ghost"}], "explanationHtml": "<p>Specific IT-related risks affecting an entity's internal control include:</p>\n<p>&bull; Reliance on systems/programs <strong>inaccurately processing data</strong>, or processing inaccurate data, or both.</p>\n<p>&bull; <strong>Unauthorised access</strong> to data that may result in destruction of data or improper changes.</p>\n<p>&bull; IT personnel gaining access privileges beyond assigned duties, <strong>breaking down segregation of duties</strong>.</p>\n<p>&bull; <strong>Unauthorised changes</strong> to data in master files, or to systems/programs.</p>\n<p>&bull; <strong>Failure to make necessary changes</strong> to systems or programs.</p>\n<p>&bull; Inappropriate manual intervention.</p>\n<p>&bull; Potential <strong>loss of data</strong>, or inability to access data as required.</p>"}, {"title": "8. Significant Risks", "keywords": [{"label": "Special audit consideration", "icon": "spotlight"}, {"label": "Risk of fraud", "icon": "mask"}, {"label": "Recent significant developments", "icon": "flag"}, {"label": "Complexity of transactions", "icon": "puzzle"}, {"label": "Related party transactions", "icon": "handshake"}, {"label": "Subjectivity in measurement", "icon": "crystal-ball"}, {"label": "Unusual transactions", "icon": "warning-triangle"}], "explanationHtml": "<p>A <strong>significant risk</strong> is an identified and assessed ROMM that, in the auditor's judgment, requires <strong>special audit consideration</strong>.</p>\n<p>Factors the auditor considers in determining whether a risk is significant:</p>\n<p>a. Whether the risk is a <strong>risk of fraud</strong>.</p>\n<p>b. Whether related to <strong>recent significant economic, accounting, or other developments</strong> (e.g. regulatory changes) requiring specific attention.</p>\n<p>c. The <strong>complexity of transactions</strong>.</p>\n<p>d. Whether it involves significant <strong>related-party transactions</strong>.</p>\n<p>e. The degree of <strong>subjectivity</strong> in measurement, especially with a wide range of measurement uncertainty.</p>\n<p>f. Whether it involves significant transactions <strong>outside the normal course of business</strong>, or that otherwise appear unusual.</p>"}]}, {"id": "sa320", "title": "SA 320 \u2013 Materiality in Planning and Performing an Audit", "subtitle": "Performance materiality, revision during the audit, and choosing a benchmark.", "cards": [{"title": "1. Performance Materiality (PM)", "keywords": [{"label": "Less than FS materiality", "icon": "ruler"}, {"label": "Reduce probability of aggregate misstatement", "icon": "shield"}, {"label": "Applicable to particular ABCD", "icon": "puzzle"}], "explanationHtml": "<p><strong>Performance materiality</strong> is the amount(s) set by the auditor, at <strong>less than the materiality for the FS as a whole</strong>, to reduce to an appropriately low level the probability that the aggregate of uncorrected and undetected misstatements exceeds materiality for the FS as a whole.</p>\n<p>If applicable, performance materiality also refers to the amount(s) set by the auditor at less than the materiality level(s) for a <strong>particular class of transaction, account balance, or disclosure (ABCD)</strong>.</p>"}, {"title": "2. Determining Materiality and PM When Planning the Audit", "keywords": [{"label": "Materiality for FS as a whole", "icon": "target"}, {"label": "Materiality for particular ABCD", "icon": "puzzle"}, {"label": "PM for ROMM assessment and NTE", "icon": "hourglass"}], "explanationHtml": "<p>When establishing the overall audit strategy, the auditor shall determine <strong>materiality for the FS as a whole</strong>.</p>\n<p>&bull; If there are particular ABCD where lesser misstatements could reasonably be expected to influence users' economic decisions, the auditor shall also determine the <strong>materiality level(s) for those particular ABCD</strong>.</p>\n<p>&bull; The auditor shall determine <strong>performance materiality</strong> for purposes of assessing the ROMM, and determining the <strong>nature, timing, and extent (NTE)</strong> of further audit procedures (FAP).</p>"}, {"title": "3. Revision of Materiality", "keywords": [{"label": "Change in circumstances", "icon": "ghost"}, {"label": "New information", "icon": "folder"}, {"label": "Change in understanding of the entity", "icon": "compass"}, {"label": "Revise performance materiality", "icon": "gear"}], "explanationHtml": "<p>The auditor shall <strong>revise materiality</strong> for the FS as a whole (and, if applicable, particular ABCD levels) on becoming aware of information during the audit that would have led to a different amount being determined initially. This may result from:</p>\n<p>a. A <strong>change in circumstances</strong> during the audit (e.g. a decision to dispose of a major part of the business);</p>\n<p>b. <strong>New information</strong>; or</p>\n<p>c. A <strong>change in the auditor's understanding</strong> of the entity and its operations, from performing further procedures.</p>\n<p>If a lower materiality is concluded to be appropriate, the auditor shall determine whether it is necessary to <strong>revise performance materiality</strong>, and whether the NTE of further audit procedures remain appropriate.</p>"}, {"title": "4. Benchmark", "keywords": [{"label": "Elements of the financial statements", "icon": "scroll"}, {"label": "Focus of users", "icon": "eye"}, {"label": "Nature, ownership, life cycle", "icon": "id-card"}, {"label": "Volatility of the benchmark", "icon": "raincloud"}, {"label": "PBT vs Gross Profit/Revenue", "icon": "calculator"}], "explanationHtml": "<p>Determining materiality involves professional judgment; a percentage is often applied to a chosen <strong>benchmark</strong> as a starting point.</p>\n<p>Factors affecting identification of an appropriate benchmark:</p>\n<p>&bull; The <strong>elements of the financial statements</strong> (assets, liabilities, equity, revenue, expenses).</p>\n<p>&bull; Whether there are items on which <strong>users' attention tends to focus</strong> (e.g. profit, revenue, or net assets).</p>\n<p>&bull; The <strong>nature of the entity</strong>, where it is in its life cycle, and its industry/economic environment.</p>\n<p>&bull; The entity's <strong>ownership structure and financing</strong> (e.g. debt-financed entities \u2014 users may emphasize assets over earnings).</p>\n<p>&bull; The relative <strong>volatility</strong> of the benchmark.</p>\n<p>A percentage applied to <strong>profit before tax (PBT)</strong> from continuing operations will normally be higher than the percentage applied to total revenue.</p>\n<p>Examples of benchmarks: profit before tax, total revenue, gross profit, total expenses, total equity, or net asset value.</p>\n<p><strong>Type of Entity \u2192 Benchmark:</strong></p>\n<p>&bull; Profit-oriented entities \u2192 PBT from continuing operations</p>\n<p>&bull; If PBT volatile \u2192 Gross Profit or Total Revenues</p>\n<p>&bull; Public utility programs/projects \u2192 Total cost or net cost (expenses less receipts)</p>\n<p>&bull; Custody of assets \u2192 Assets</p>"}]}, {"id": "sa330", "title": "SA 330 \u2013 The Auditor's Responses to Assessed Risks", "subtitle": "Tests of controls vs substantive procedures, and how much testing is enough.", "cards": [{"title": "1. Further Audit Procedures \u2014 Response to Assessed ROMM at Assertion Level", "keywords": [{"label": "Reasons for the risk assessment", "icon": "magnify"}, {"label": "Inherent risk", "icon": "raincloud"}, {"label": "Control risk \u2014 reliance on controls", "icon": "shield"}, {"label": "More persuasive evidence", "icon": "clipboard-check"}], "explanationHtml": "<p>In designing further audit procedures, the auditor shall:</p>\n<p>a. Consider the <strong>reasons for the assessment</strong> given to ROMM at the assertion level for each class of transaction, account balance, and disclosure (ABCD), including: (i) the likelihood of misstatement due to characteristics of the ABCD (<strong>inherent risk</strong>); and (ii) whether the assessment takes account of relevant controls (<strong>control risk</strong>), requiring evidence on whether the controls are operating effectively; and</p>\n<p>b. Obtain <strong>more persuasive audit evidence</strong> the higher the auditor's assessment of risk.</p>"}, {"title": "2. Further Audit Procedures Comprise Of", "keywords": [{"label": "Tests of controls", "icon": "shield-check"}, {"label": "Substantive procedures", "icon": "clipboard-check"}], "explanationHtml": "<p>i. <strong>Tests of controls</strong>, when required by the
