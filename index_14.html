// Bolds and reddens (a) anything the admin wrote inside <angle brackets> and
// (b) any occurrence of the card's own keyword terms, inside the rendered
// (non-edit) description. Runs on live DOM text nodes only, so it never
// touches real markup the admin already applied (bold/italic/color/lists).
function highlightExplainKeywords(deck, ci){
  const container = document.querySelector('.explain');
  if (!container) return;
  const labels = (deck.cards[ci].keywords || []).map(k=>k.label).filter(Boolean)
    .slice().sort((a,b)=>b.length-a.length)
    .map(l=>l.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
  const alternatives = ['<([^<>]{1,80})>'];
  if (labels.length) alternatives.push(`(?<![\\w])(?:${labels.join('|')})(?![\\w])`);
  const re = new RegExp(alternatives.join('|'), 'gi');

  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null);
  const textNodes = [];
  let node;
  while ((node = walker.nextNode())) textNodes.push(node);

  textNodes.forEach(textNode=>{
    const text = textNode.nodeValue;
    re.lastIndex = 0;
    if (!re.test(text)) return;
    re.lastIndex = 0;
    const frag = document.createDocumentFragment();
    let lastIndex = 0, m;
    while ((m = re.exec(text))){
      if (m.index > lastIndex) frag.appendChild(document.createTextNode(text.slice(lastIndex, m.index)));
      const inner = m[1] !== undefined ? m[1] : m[0];
      const b = document.createElement('b');
      b.className = 'kw-highlight';
      b.textContent = inner;
      frag.appendChild(b);
      lastIndex = m.index + m[0].length;
      if (m[0].length === 0) re.lastIndex++;
    }
    if (lastIndex < text.length) frag.appendChild(document.createTextNode(text.slice(lastIndex)));
    textNode.parentNode.replaceChild(frag, textNode);
  });
}

// Tracks the current text selection inside the edit canvas, since clicking a
// toolbar button (especially the native color-picker input) can otherwise steal
// focus and lose the user's selection before the format command runs.
let savedEditRange = null;
function trackEditSelection(canvas){
  const sel = window.getSelection();
  if (sel && sel.rangeCount > 0){
    const range = sel.getRangeAt(0);
    if (canvas.contains(range.commonAncestorContainer)) savedEditRange = range.cloneRange();
  }
}
function restoreEditSelection(){
  if (!savedEditRange) return;
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(savedEditRange);
}

// Turns the current selection into an ordered list styled with the given HTML
// `type` ("a" for a/b/c…, "i" for i/ii/iii…). If the selection is already
// inside an <ol>, that list is simply re-typed rather than toggled off, so
// clicking between "1. List" / "a. List" / "i. List" switches styles in place.
function applyOrderedListType(canvas, type){
  function closestOl(node){
    while (node && node !== canvas){
      if (node.nodeName === 'OL') return node;
      node = node.parentNode;
    }
    return null;
  }
  const sel = window.getSelection();
  let ol = sel.anchorNode ? closestOl(sel.anchorNode) : null;
  if (!ol){
    document.execCommand('insertOrderedList', false, null);
    const sel2 = window.getSelection();
    ol = sel2.anchorNode ? closestOl(sel2.anchorNode) : null;
  }
  if (ol) ol.setAttribute('type', type);
}

  app.innerHTML = `

      <p class="eyebrow">${isSignup ? 'Create your account' : 'Welcome back'}</p>

        ${isSignup ? `<input type="tel" id="auth-phone" placeholder="10-digit phone number" autocomplete="tel" class="auth-input" value="${esc(authDraft.phone)}" required>` : ''}
        <input type="email" id="auth-email" placeholder="Email address" autocomplete="email" class="auth-input" value="${esc(authDraft.email)}" required>
        <input type="password" id="auth-password" placeholder="Password" autocomplete="${isSignup ? 'new-password' : 'current-password'}" class="auth-input" value="${esc(authDraft.password)}" required>
        ${isSignup ? '<input type="password" id="auth-confirm" placeholder="Confirm password" autocomplete="new-password" class="auth-input" required>' : ''}
        ${authError ? `<p class="auth-error">${esc(authError)}</p>` : ''}
        <button type="submit" class="btn-primary" id="auth-submit-btn">${isSignup ? 'Create account' : 'Log in'}</button>
      </form>
      <p class="auth-toggle">
        ${isSignup ? 'Already have an account?' : "Don't have an account yet?"}
        <button type="button" id="auth-toggle-btn">${isSignup ? 'Log in' : 'Sign up'}</button>
      </p>
    </div>
  `;
  document.getElementById('auth-toggle-btn').addEventListener('click', ()=>{
    authMode = isSignup ? 'login' : 'signup';
    authError = '';
    authDraft = { name: '', phone: '', email: '', password: '' };
    renderAuth();
  });
  document.getElementById('auth-form').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const nameInput = document.getElementById('auth-name');
    const name = nameInput ? nameInput.value.trim() : '';
    const phoneInput = document.getElementById('auth-phone');
    const phone = phoneInput ? phoneInput.value.trim() : '';
    const email = document.getElementById('auth-email').value.trim().toLowerCase();
    const password = document.getElementById('auth-password').value;
    const submitBtn = document.getElementById('auth-submit-btn');
    authDraft = { name, phone, email, password };

    if (isSignup && !name){ authError = 'Enter your name.'; renderAuth(); return; }
    if (isSignup && !isValidPhone(phone)){ authError = 'Enter a valid 10-digit phone number.'; renderAuth(); return; }
    if (!isValidEmail(email)){ authError = 'Enter a valid email address.'; renderAuth(); return; }
    if (password.length < 6){ authError = 'Password must be at least 6 characters.'; renderAuth(); return; }

    if (isSignup){
      const confirm = document.getElementById('auth-confirm').value;
      if (password !== confirm){ authError = 'Passwords do not match.'; renderAuth(); return; }
      submitBtn.textContent = 'Creating account…';
      const { data, error } = await sb.auth.signUp({ email, password, options: { data: { name, phone } } });
      if (error){ authError = error.message; renderAuth(); return; }
      if (!data.session){
        // Email confirmation is still switched on for this project — the
        // account was created, but Supabase needs the user to confirm via
        // email before a session can start.
        authError = 'Account created, but this project still requires email confirmation. Ask the site owner to disable "Confirm email" under Authentication → Providers → Email in Supabase, or check your inbox for a confirmation link.';
        authMode = 'login';
        renderAuth();
        return;
      }
      await onAuthSuccess(data.session);
    } else {
      submitBtn.textContent = 'Logging in…';
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error){ authError = error.message; renderAuth(); return; }
      await onAuthSuccess(data.session);
    }
  });
}

// Called once we have a live Supabase session (after signup, login, or on
// page load when a session is already stored). Populates the in-memory

  authError = '';
  authDraft = { name: '', phone: '', email: '', password: '' };
  greetingAnimated = false;
  await fetchMyProfile();
  await loadAdminProfiles();
  await loadDeckContent();
  await fetchCardMeta();
  await loadSrConfig();
  render();
}

  currentUserId = null;

let cardMeta = {};
function getMetaKey(di, ci){ return `${DECKS[di].id}_${ci}`; }
// Merges the user's own tags with the admin's default importance for this card
// (card.adminImportance, set from "Manage cards"). The user's own choice always
// wins once they've made one; until then, the admin's default is what shows
// and counts everywhere (study screens, the matrix, "unreviewed" filtering).
// `importanceIsDefault` tells the UI whether what's showing is the admin's
// default (so it can hint "tap to change") or the user's own pick.
function getCardMeta(di, ci){
  const own = cardMeta[getMetaKey(di,ci)] || {};
  const card = DECKS[di] && DECKS[di].cards[ci];
  const adminDefault = card ? card.adminImportance : undefined;
  const importance = own.importance || adminDefault || undefined;
  return {
    importance,
    confidence: own.confidence,
    importanceIsDefault: !own.importance && !!adminDefault,
    srDueDate: own.srDueDate || undefined,       // ISO 'YYYY-MM-DD' — next spaced-repetition due date, or undefined if never scheduled (immediately eligible)
    srRevisionCount: own.srRevisionCount || 0,     // how many spaced-repetition revisions completed so far
  };
}
function setCardMeta(di, ci, updates){
  const k = getMetaKey(di,ci);
  cardMeta[k] = {...(cardMeta[k]||{}), ...updates};
  persistCardMeta(di, ci, cardMeta[k]); // fire-and-forget background sync
}
async function persistCardMeta(di, ci, meta){
  if (!currentUserId) return;
  const { error } = await sb.from('card_meta').upsert({
    user_id: currentUserId,
    deck_id: DECKS[di].id,
    card_index: ci,
    importance: meta.importance || null,
    confidence: meta.confidence || null,
    sr_due_date: meta.srDueDate || null,
    sr_revision_count: meta.srRevisionCount || 0,
  });
  if (error) console.error('persistCardMeta failed:', error.message);
}
async function fetchCardMeta(){
  cardMeta = {};
  if (!currentUserId) return;
  const { data, error } = await sb.from('card_meta').select('*').eq('user_id', currentUserId);
  if (error || !data) return;
  data.forEach(row=>{
    const deck = DECKS.find(d=>d.id===row.deck_id);
    if (!deck) return;
    const di = DECKS.indexOf(deck);
    cardMeta[getMetaKey(di, row.card_index)] = {
      importance: row.importance || undefined,
      confidence: row.confidence || undefined,
      srDueDate: row.sr_due_date || undefined,
      srRevisionCount: row.sr_revision_count || 0,
    };
  });
}

// ── Spaced repetition ────────────────────────────────────────────────────────
// Revision schedule: for a response given in the revision just completed, how
// many days until the *next* revision is due. Index 0 = after the 1st
// revision, index 1 = after the 2nd, etc. Admin-editable; shared by everyone
// via a single row in `spaced_repetition_config`. Falls back to this default
// (matching the numbers the admin was given) until that row loads, and if it
// never loads (e.g. the table doesn't exist yet in Supabase).
let srConfig = {
  weak:   [1, 2, 4, 7, 14, 30, 45],
  mid:    [2, 4, 7, 14, 30, 60, 90],
  strong: [3, 7, 14, 30, 60, 100, 150],
};
async function loadSrConfig(){
  const { data, error } = await sb.from('spaced_repetition_config').select('*').eq('id','default').maybeSingle();
  if (!error && data && data.schedule && data.schedule.weak && data.schedule.mid && data.schedule.strong){
    srConfig = data.schedule;
  }
}
async function saveSrConfig(){
  const { error } = await sb.from('spaced_repetition_config').upsert({ id: 'default', schedule: srConfig });
  if (error) console.error('saveSrConfig failed:', error.message);
}

function todayISO(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addDaysISO(iso, days){
  const d = new Date(iso + 'T00:00:00Z');
  d.setUTCDate(d.getUTCDate() + days);
  return d.toISOString().slice(0,10);
}

// After completing a spaced-repetition revision with response `conf`, advance
// that card's schedule: bump its revision count and set its next due date
// using the admin-configured table (capped at the table's last column if the
// card has gone through more revisions than the table defines).
function advanceSrSchedule(di, ci, conf){
  const meta = getCardMeta(di, ci);
  const newCount = (meta.srRevisionCount || 0) + 1;
  const table = srConfig[conf] || srConfig.weak;
  const days = table[Math.min(newCount, table.length) - 1];
  setCardMeta(di, ci, { srRevisionCount: newCount, srDueDate: addDaysISO(todayISO(), days) });
}

// All cards at a given importance level that are due for spaced-repetition
// review right now — either never scheduled yet, due today, or overdue
// (skipped a day or more — those stay in the queue rather than being lost).
function getSrDueCards(impKey){
  const today = todayISO();
  const cards = [];
  let dueTodayCount = 0, overdueCount = 0;
  DECKS.forEach((deck, di) => {
    if (!canAccessDeck(deck)) return;
    deck.cards.forEach((_, ci) => {
      const m = getCardMeta(di, ci);
      if (m.importance !== impKey) return;
      if (!m.srDueDate || m.srDueDate <= today){
        cards.push({ deckIndex: di, cardIndex: ci, srDueDate: m.srDueDate || null });
        if (m.srDueDate && m.srDueDate < today) overdueCount++; else dueTodayCount++;
      }
    });
  });
  // Most-overdue first (undated/never-scheduled cards sort first as "").
  cards.sort((a,b) => (a.srDueDate||'').localeCompare(b.srDueDate||''));
  return { cards, dueTodayCount, overdueCount };
}

// Starts (or continues into) a spaced-repetition review queue for one star
// level. 3-star (important) always goes first; once that queue is cleared,
// the "congratulations" screen offers to continue into 2-star (mid). 1-star
// (low) is intentionally never included.
function beginSrStar(impKey){
  const { cards } = getSrDueCards(impKey);
  if (!cards.length){
    if (impKey === 'important'){
      const mid = getSrDueCards('mid');
      if (mid.cards.length){ beginSrStar('mid'); return; }
    }
    showSrNothingDueModal();
    return;
  }
  state.filterActive = true;
  state.filterCards = cards.map(c => ({ deckIndex: c.deckIndex, cardIndex: c.cardIndex }));
  state.filterCursor = 0;
  state.filterMode = 'quick';
  state.filterStage = 'answer';
  state.filterCell = null;
  state.srSession = { star: impKey };
  render();
}

// Shown instead of the generic renderFilterComplete() when the filtered
// session just finished was a spaced-repetition queue.
function renderSrComplete(){
  const star = state.srSession.star;
  const isThreeStar = star === 'important';
  const count = state.filterCards.length;
  const midDue = isThreeStar ? getSrDueCards('mid') : null;

  let message;
  if (isThreeStar && midDue.cards.length){
    message = `You've finished today's ⭐⭐⭐ revision — ${count} card${count===1?'':'s'} done. Ready to keep going with ⭐⭐ topics?`;
  } else if (isThreeStar){
    message = `You've finished today's ⭐⭐⭐ revision — ${count} card${count===1?'':'s'} done. No ⭐⭐ topics are due right now.`;
  } else {
    message = `You've finished today's ⭐⭐ revision — ${count} card${count===1?'':'s'} done. That's everything due right now.`;
  }
  const showContinue = isThreeStar && midDue.cards.length > 0;

  app.innerHTML = `
    <button class="back-link" id="f-home-btn">&larr; All decks</button>
    <p class="eyebrow" style="text-align:center;">Spaced repetition</p>
    <div class="end-panel">
      <h2 class="end-score" style="font-size:2rem;">🎉 Congratulations!</h2>
      <p class="end-label">${message}</p>
      <div class="btn-row">
        ${showContinue ? `<button class="btn-primary" id="sr-continue-btn">Continue to ⭐⭐ revision (${midDue.cards.length})</button>` : ''}
        <button class="${showContinue ? 'btn-secondary' : 'btn-primary'}" id="f-home-btn2">Back to dashboard</button>
      </div>
    </div>`;
  const goBack = ()=>{ state.filterActive=false; state.filterCards=[]; state.filterCursor=0; state.srSession=null; render(); };
  document.getElementById('f-home-btn').addEventListener('click', goBack);
  document.getElementById('f-home-btn2').addEventListener('click', goBack);
  const contBtn = document.getElementById('sr-continue-btn');
  if (contBtn) contBtn.addEventListener('click', ()=> beginSrStar('mid'));
}

// All cards missing importance or confidence
function getUnreviewedCards(){
  const cards = [];
  DECKS.forEach((deck, di) => {
    if (!canAccessDeck(deck)) return;
    deck.cards.forEach((_, ci) => {
      const m = getCardMeta(di, ci);
      if (!m.importance || !m.confidence) cards.push({deckIndex:di, cardIndex:ci});
    });
  });
  return cards;
}

// ── Study matrix ─────────────────────────────────────────────────────────────
const IMP_KEYS = ['important','mid','low'];
const IMP_LABELS = {important:'⭐⭐⭐', mid:'⭐⭐', low:'⭐'};
const CONF_KEYS = ['weak','mid','strong'];
const CONF_LABELS = {weak:'Weak', mid:'Mid', strong:'Strong'};

function buildMatrix(){
  const matrix = {};
  IMP_KEYS.forEach(i => CONF_KEYS.forEach(c => matrix[`${i}_${c}`] = []));
  let total = 0, excluded = 0;
  DECKS.forEach((deck, di) => {
    if (!canAccessDeck(deck)) return;
    deck.cards.forEach((_, ci) => {
      total++;
      const m = getCardMeta(di, ci);
      if (m.importance && m.confidence) matrix[`${m.importance}_${m.confidence}`].push({deckIndex:di, cardIndex:ci});
      else excluded++;
    });
  });
  return {matrix, total, excluded};
}

function matrixHtml(){
  const {matrix, excluded, total} = buildMatrix();
  const rows = IMP_KEYS.map(ik => `
    <tr>
      <td class="matrix-row-label">${IMP_LABELS[ik]}</td>
      ${CONF_KEYS.map(ck => {
        const n = matrix[`${ik}_${ck}`].length;
        return `<td class="matrix-cell-wrap"><div class="matrix-cell ${n>0?'has-cards':'empty'}"
          ${n>0?`data-imp="${ik}" data-conf="${ck}" role="button" tabindex="0"`:''}
          title="${n>0?n+' card'+(n===1?'':'s')+' — click to review':'No cards yet'}">${n>0?n:'—'}</div></td>`;
      }).join('')}
    </tr>`).join('');
  return `
    <div class="matrix-wrap">
      <div class="matrix-head">Study matrix</div>
      <table class="matrix-table">
        <tr>
          <td></td>${CONF_KEYS.map(k=>`<th class="matrix-th">${CONF_LABELS[k]}</th>`).join('')}
        </tr>
        ${rows}
      </table>
      ${excluded > 0 ? `<button class="matrix-note-link" id="open-unreviewed-btn">📌 Summary excludes <strong>${excluded}</strong> card${excluded===1?'':'s'} not yet reviewed or not tagged — <u>review them now</u></button>` : ''}
    </div>`;
}

  const deck = DECKS[di];

  const stage = state.filterStage;
  const mode = state.filterMode;
  const cols = gridCols(card.keywords.length);

  const kwFlip = `<div class="kw-grid" style="grid-template-columns:repeat(${cols},1fr)">${card.keywords.map((kw,i)=>`
    <div class="kw-box" data-idx="${i}"><div class="kw-box-inner">

    </div></div>`).join('')}</div>`;
  const kwStatic = `<div class="kw-grid" style="grid-template-columns:repeat(${cols},1fr)">${card.keywords.map(kw=>`
    <div class="kw-box"><div class="kw-box-inner"><div class="kw-face front">${iconHtml(kw.icon)}<span class="kw-text">${esc(kw.label)}</span></div></div></div>`).join('')}</div>`;

  let body='', footer='';
  if (stage==='question'){
    body = kwFlip;
    footer = `<button class="btn-primary" id="f-reveal-btn">Reveal answers</button>`;
  } else if (stage==='answer'){
    body = mode==='quick' ? kwStatic : kwFlip;
    footer = `<button class="btn-primary" id="f-continue-btn">Continue to explanation</button>`;
  } else {
    body = explainBlockHtml(deck, ci);
    const isLast = state.filterCursor === state.filterCards.length-1;
    footer = `<button class="btn-primary" id="f-next-btn">${isLast?'Finish review':'Next card'}</button>`;
  }

  const fc = state.filterCell;
  const bannerText = state.srSession
    ? `⏱ Spaced repetition &middot; ${IMP_LABELS[state.srSession.star]} — Card ${state.filterCursor+1} of ${state.filterCards.length}`
    : fc
    ? `${IMP_LABELS[fc.impKey]} × ${CONF_LABELS[fc.confKey]} — Card ${state.filterCursor+1} of ${state.filterCards.length}`
    : `📌 Unreviewed — Card ${state.filterCursor+1} of ${state.filterCards.length}`;
  app.innerHTML = `
    <button class="back-link" id="f-home-btn">&larr; All decks</button>
    <span class="filter-tag">${bannerText}</span>
    ${stageStepsHtml(stage, mode)}
    <div class="card">
      <div class="card-title">${esc(card.title)}<span style="display:block;font-size:.78rem;font-weight:400;opacity:.75;margin-top:.15rem;">${esc(deck.title)}</span></div>
      ${importanceRowHtml(di, ci)}
      ${mode === 'quick' ? confTagRowHtml(di, ci) : ''}
      <div class="card-body">${body}<div class="btn-row">${footer}</div></div>
    </div>`;

  document.getElementById('f-home-btn').addEventListener('click', ()=>{
    state.filterActive=false; state.filterCards=[]; state.filterCursor=0; state.srSession=null; render();
  });
  wireImportanceRow(di, ci);
  if (mode === 'quick') wireConfTagRow(di, ci);
  if (stage === 'explain') wireExplainBlock(deck, ci, renderFilteredCard);
  document.querySelectorAll('.stage-step[data-stage]').forEach(btn=>btn.addEventListener('click',()=>{
    stopEditing(); state.filterStage=btn.dataset.stage; renderFilteredCard();
  }));

  function advanceFilter(){
    stopEditing();
    openConfidenceModal(di, ci, (conf)=>{
      if (state.srSession) advanceSrSchedule(di, ci, conf);
      state.filterCursor++;
      state.filterStage = 'question';
      renderFilteredCard();
    });
  }
  function advanceFilterQuick(){
    stopEditing();
    if (state.srSession){
      const conf = getCardMeta(di, ci).confidence || 'weak';
      advanceSrSchedule(di, ci, conf);
    }
    state.filterCursor++;
    state.filterStage = 'answer';
    renderFilteredCard();
  }

  if (stage==='question'){
    document.getElementById('f-reveal-btn').addEventListener('click', ()=>{
      state.filterStage='answer';
      document.querySelector('.stage-steps').outerHTML = stageStepsHtml('answer', mode);
      document.querySelectorAll('.stage-step[data-stage]').forEach(btn=>btn.addEventListener('click',()=>{
        state.filterStage=btn.dataset.stage; renderFilteredCard();
      }));
      const boxes=document.querySelectorAll('.kw-box');
      boxes.forEach((b,i)=>setTimeout(()=>b.classList.add('flipped'),i*90));
      const fe=document.querySelector('.btn-row');
      setTimeout(()=>{
        fe.innerHTML=`<button class="btn-primary" id="f-continue-btn">Continue to explanation</button>`;
        document.getElementById('f-continue-btn').addEventListener('click',()=>{state.filterStage='explain';renderFilteredCard();});
      }, boxes.length*90+150);
    });
  } else if (stage==='answer'){
    if (mode!=='quick') document.querySelectorAll('.kw-box').forEach(b=>b.classList.add('flipped'));
    document.getElementById('f-continue-btn').addEventListener('click',()=>{state.filterStage='explain';renderFilteredCard();});
  } else {
    document.getElementById('f-next-btn').addEventListener('click', ()=>{
      if (mode === 'recall') advanceFilter();
      else advanceFilterQuick(); // confidence already set inline, no popup
    });
  }
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function iconHtml(icon){
  if (icon && icon.startsWith('data:')){
    return `<img class="kw-icon" src="${icon}" alt="">`;
  }
  if (icon && icon.startsWith('ms:')){
    const name = icon.slice(3);
    return `<span class="kw-icon kw-icon-ms material-symbols-outlined" translate="no">${esc(name)}</span>`;
  }
  const inner = ICONS[icon];
  if (inner){
    return `<svg class="kw-icon" viewBox="0 0 24 24" fill="#fff">${inner}</svg>`;
  }
  return `<span class="kw-icon"></span>`;
}
function deckTotal(deck){ return deck.cards.reduce((n,c)=>n+c.keywords.length,0); }
function gridCols(n){ if(n<=3) return n; if(n===4) return 2; return 3; }

function startDeck(i){
  const deck = DECKS[i];
  if (!deck || !canAccessDeck(deck)) return; // safety net — locked decks can't be opened
  stopEditing();
  state.deckIndex = i; state.mode = null; state.cardIndex = 0; state.stage = 'question';
  state.perCard = []; state.sessionSubmitted = false;
  render();
}

function chooseMode(mode){
  stopEditing();
  state.mode = mode;
  state.cardIndex = 0;
  state.stage = mode === 'quick' ? 'answer' : 'question';
  state.perCard = []; state.sessionSubmitted = false;
  render();
}

function resetDeckProgress(){
  state.cardIndex = 0;
  state.stage = state.mode === 'quick' ? 'answer' : 'question';
  state.perCard = [];
  state.sessionSubmitted = false;
}

function adminPanelHtml(){
  if (!isAdmin()) return '';
  const others = adminProfiles.filter(p => p.email !== ADMIN_EMAIL).sort((a,b)=>a.email.localeCompare(b.email));
  const rows = others.length
    ? others.map(p=>{
        const paid = !!p.is_paid;
        return `<div class="admin-user-row">
          <span class="admin-user-email">${esc(p.email)}</span>
          <span class="admin-user-badge ${paid?'paid':'free'}">${paid?'Paid':'Free'}</span>
          <button class="btn-secondary admin-toggle-btn" data-id="${esc(p.id)}" data-next="${paid?'0':'1'}">${paid?'Revoke paid access':'Grant paid access'}</button>
        </div>`;

    : `<p class="matrix-note" style="margin:0;">No other accounts have signed up yet.</p>`;

    <div class="admin-user-list">${rows}</div>

}

      return `<div class="deck-row${locked?' locked':''}">
        <div class="deck-row-text">
          <h3>${esc(d.title)}${locked?'<span class="lock-badge">🔒 Paid</span>':''}</h3>
          <p>${esc(d.subtitle)}</p>
          <div class="deck-row-meta">${d.cards.length} card${d.cards.length===1?'':'s'} &middot; ${total} keywords</div>
        </div>
        <div style="display:flex; gap:.5rem; flex-wrap:wrap;">
          ${isAdmin() ? `<button class="btn-secondary manage-btn" data-manage-i="${i}">✎ Manage cards</button>` : ''}

  app.querySelectorAll('.manage-btn[data-manage-i]').forEach(btn=>{

      manageOpenDescCi = null;
      state.manageDeckIndex = parseInt(btn.dataset.manageI, 10);
      render();
    });

  document.getElementById('logout-btn').addEventListener('click', logout);
  wireSrSection();

  if (greetingEl){

      greetingEl.textContent = greetingFullText;
    } else {
      greetingAnimated = true;
      typeGreeting(greetingEl, greetingFullText);
    }

  // Wire admin user-rights toggles
  app.querySelectorAll('.admin-toggle-btn').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const id = btn.dataset.id;
      const nextPaid = btn.dataset.next === '1';
      btn.disabled = true;
      btn.textContent = 'Saving…';
      const { error } = await sb.from('profiles').update({ is_paid: nextPaid }).eq('id', id);
      if (error){ console.error('toggle paid failed:', error.message); }
      await loadAdminProfiles();
      renderDeckList();

  // Wire matrix cell clicks
  app.querySelectorAll('.matrix-cell.has-cards').forEach(cell=>{
    cell.addEventListener('click', ()=> openCellDrilldown(cell.dataset.imp, cell.dataset.conf));
    cell.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' ') openCellDrilldown(cell.dataset.imp, cell.dataset.conf); });
  });
  // Wire unreviewed-cards note
  const unreviewedBtn = app.querySelector('#open-unreviewed-btn');
  if (unreviewedBtn){
    unreviewedBtn.addEventListener('click', ()=>{
      const cards = getUnreviewedCards();
      if (!cards.length) return;
      state.filterActive = true;
      state.filterCards = cards;
      state.filterCursor = 0;
      state.filterMode = 'quick';
      state.filterStage = 'answer';
      state.filterCell = null;
      render();
    });
  }
}

function renderManageCards(deck){

        </div>

          <span class="imp-label">Default importance for all students:</span>
          ${[['important','⭐⭐⭐'],['mid','⭐⭐'],['low','⭐']].map(([k,l])=>
            `<button type="button" class="imp-btn${card.adminImportance===k?' active':''}" data-act="admin-imp" data-ci="${ci}" data-imp="${k}">${l}</button>`
          ).join('')}
          ${card.adminImportance ? `<button type="button" class="mc-order-btn mc-danger-btn" data-act="admin-imp-clear" data-ci="${ci}" title="Remove default — students will tag their own">✕ Clear</button>` : ''}
          <span class="mc-imp-hint">Shows for students who haven't tagged this card themselves — their own tag always wins once they set one.</span>
        </div>
        <div class="mc-kw-list">

              <button type="button" class="mc-icon-btn" data-act="kw-icon" data-ci="${ci}" data-ki="${ki}" title="Change icon">${iconHtml(kw.icon)}</button>
              <input type="text" class="auth-input mc-kw-label-input" data-act="kw-label" data-ci="${ci}" data-ki="${ki}" value="${esc(kw.label)}" placeholder="Keyword">
              <button type="button" class="mc-order-btn" data-act="kw-up" data-ci="${ci}" data-ki="${ki}" ${ki===0?'disabled':''} title="Move up">↑</button>
              <button type="button" class="mc-order-btn" data-act="kw-down" data-ci="${ci}" data-ki="${ki}" ${ki===card.keywords.length-1?'disabled':''} title="Move down">↓</button>
              <button type="button" class="mc-order-btn mc-danger-btn" data-act="kw-delete" data-ci="${ci}" data-ki="${ki}" title="Remove keyword">✕</button>
            </div>`).join('') : '<p class="matrix-note" style="margin:0;">No keywords yet — add one below.</p>'}
        </div>
        <button type="button" class="btn-secondary mc-add-kw-btn" data-act="kw-add" data-ci="${ci}">+ Add keyword</button>

        <div class="mc-desc-section">
          <button type="button" class="btn-secondary" data-act="desc-toggle" data-ci="${ci}">
            ${manageOpenDescCi === ci ? '▾ Hide description' : '✎ Edit description'}
          </button>
          ${manageOpenDescCi === ci ? `
            <div class="mc-desc-editor">
              <div class="edit-toolbar">
                <button type="button" class="edit-tool-btn" data-cmd="bold" title="Bold"><b>B</b></button>
                <button type="button" class="edit-tool-btn" data-cmd="italic" title="Italic"><i>I</i></button>
                <span class="edit-tool-sep"></span>
                <button type="button" class="edit-tool-btn" data-cmd="insertUnorderedList" title="Bullet list">&bull; List</button>
                <button type="button" class="edit-tool-btn" data-cmd="insertOrderedList" title="Numbered list (1, 2, 3…)">1. List</button>

                <input type="color" id="mc-desc-color-picker" class="edit-color-picker-input" title="Custom color" value="#161B3D">

  document.getElementById('home-btn').addEventListener('click', goHome);

  async function persistAndRerender(){
    await saveDeckContent(deck.id);

  }
  function flashSaved(ci){

    if (!el) return;
    el.style.display = 'inline';
    setTimeout(()=>{ el.style.display = 'none'; }, 1400);

  });

  app.querySelectorAll('[data-act="card-up"]').forEach(btn=>btn.addEventListener('click', async ()=>{
    const ci = parseInt(btn.dataset.ci,10);
    [deck.cards[ci-1], deck.cards[ci]] = [deck.cards[ci], deck.cards[ci-1]];
    await persistAndRerender();
  }));
  app.querySelectorAll('[data-act="card-down"]').forEach(btn=>btn.addEventListener('click', async ()=>{
    const ci = parseInt(btn.dataset.ci,10);
    [deck.cards[ci+1], deck.cards[ci]] = [deck.cards[ci], deck.cards[ci+1]];
    await persistAndRerender();
  }));
  app.querySelectorAll('[data-act="card-delete"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if (btn.dataset.armed === '1'){
        const ci = parseInt(btn.dataset.ci,10);
        deck.cards.splice(ci,1);
        persistAndRerender();
      } else {
        btn.dataset.armed = '1';
        btn.textContent = 'Click again to confirm';
      }
    });
  });
  app.querySelectorAll('[data-act="card-title"]').forEach(inp=>{
    inp.addEventListener('change', async ()=>{
      const ci = parseInt(inp.dataset.ci,10);

      await saveDeckContent(deck.id);
      flashSaved(ci);
    });
  });

  // Admin default importance — stored on the card itself (card.adminImportance)
  // so it ships with the same deck_content sync every other card edit uses.
  // getCardMeta() only falls back to this when a given student hasn't tagged
  // the card themselves, so this never overrides a student's own choice.
  app.querySelectorAll('[data-act="admin-imp"]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const ci = parseInt(btn.dataset.ci,10);
      deck.cards[ci].adminImportance = btn.dataset.imp;
      await persistAndRerender();
    });
  });
  app.querySelectorAll('[data-act="admin-imp-clear"]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const ci = parseInt(btn.dataset.ci,10);
      delete deck.cards[ci].adminImportance;
      await persistAndRerender();
    });
  });

  app.querySelectorAll('[data-act="kw-add"]').forEach(btn=>btn.addEventListener('click', async ()=>{
    const ci = parseInt(btn.dataset.ci,10);
    deck.cards[ci].keywords.push({ label:'New term', icon:'' });
    await persistAndRerender();
  }));
  app.querySelectorAll('[data-act="kw-up"]').forEach(btn=>btn.addEventListener('click', async ()=>{
    const ci = parseInt(btn.dataset.ci,10), ki = parseInt(btn.dataset.ki,10);
    const kws = deck.cards[ci].keywords;
    [kws[ki-1], kws[ki]] = [kws[ki], kws[ki-1]];
    await persistAndRerender();
  }));
  app.querySelectorAll('[data-act="kw-down"]').forEach(btn=>btn.addEventListener('click', async ()=>{
    const ci = parseInt(btn.dataset.ci,10), ki = parseInt(btn.dataset.ki,10);
    const kws = deck.cards[ci].keywords;
    [kws[ki+1], kws[ki]] = [kws[ki], kws[ki+1]];
    await persistAndRerender();
  }));
  app.querySelectorAll('[data-act="kw-delete"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if (btn.dataset.armed === '1'){
        const ci = parseInt(btn.dataset.ci,10), ki = parseInt(btn.dataset.ki,10);
        deck.cards[ci].keywords.splice(ki,1);
        persistAndRerender();
      } else {
        btn.dataset.armed = '1';
        btn.textContent = '✕?';
        btn.title = 'Click again to confirm removal';
      }
    });
  });
  app.querySelectorAll('[data-act="kw-label"]').forEach(inp=>{
    inp.addEventListener('change', async ()=>{
      const ci = parseInt(inp.dataset.ci,10), ki = parseInt(inp.dataset.ki,10);
      deck.cards[ci].keywords[ki].label = inp.value.trim() || 'Term';
      await saveDeckContent(deck.id);
      flashSaved(ci);
    });
  });
  app.querySelectorAll('[data-act="kw-icon"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const ci = parseInt(btn.dataset.ci,10), ki = parseInt(btn.dataset.ki,10);
      openIconPicker((value)=>{
        deck.cards[ci].keywords[ki].icon = value;
        persistAndRerender();
      });
    });
  });

  // Description editor (toggle / toolbar / save / cancel) — only one card's
  // editor is open at a time (manageOpenDescCi), so re-rendering the whole
  // screen on toggle is cheap and keeps state simple.
  app.querySelectorAll('[data-act="desc-toggle"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const ci = parseInt(btn.dataset.ci,10);
      manageOpenDescCi = (manageOpenDescCi === ci) ? null : ci;
      savedEditRange = null;
      render();
    });
  });
  app.querySelectorAll('[data-act="desc-cancel"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      manageOpenDescCi = null;
      savedEditRange = null;
      render();
    });
  });
  app.querySelectorAll('[data-act="desc-save"]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const ci = parseInt(btn.dataset.ci,10);
      const canvas = document.getElementById('mc-desc-canvas');
      if (!canvas) return;
      btn.textContent = 'Saving…';
      btn.disabled = true;
      deck.cards[ci].explanationHtml = canvas.innerHTML;
      await saveDeckContent(deck.id);
      manageOpenDescCi = null;
      savedEditRange = null;
      render();
    });
  });

  const descCanvas = document.getElementById('mc-desc-canvas');
  if (descCanvas){
    descCanvas.addEventListener('keyup', ()=>trackEditSelection(descCanvas));
    descCanvas.addEventListener('mouseup', ()=>trackEditSelection(descCanvas));
    descCanvas.addEventListener('focus', ()=>trackEditSelection(descCanvas));

    app.querySelectorAll('.edit-tool-btn[data-cmd]').forEach(btn=>{
      // Prevent the button from stealing focus away from the canvas, so the
      // user's text selection survives long enough for execCommand to apply.
      btn.addEventListener('mousedown', e=>e.preventDefault());
      btn.addEventListener('click', ()=>{
        descCanvas.focus();
        restoreEditSelection();
        document.execCommand(btn.dataset.cmd, false, null);
        trackEditSelection(descCanvas);
      });
    });

    // Lettered (a, b, c…) and Roman-numeral (i, ii, iii…) list buttons. There is
    // no execCommand for list "type", so this turns the selection into an
    // ordered list first (if it isn't one already), then sets the native HTML
    // `type` attribute on that <ol> — which every browser renders correctly.
    app.querySelectorAll('.edit-tool-btn[data-list-type]').forEach(btn=>{
      btn.addEventListener('mousedown', e=>e.preventDefault());
      btn.addEventListener('click', ()=>{
        descCanvas.focus();
        restoreEditSelection();
        applyOrderedListType(descCanvas, btn.dataset.listType);
        trackEditSelection(descCanvas);
      });
    });

    app.querySelectorAll('.edit-color-swatch').forEach(btn=>{
      btn.addEventListener('mousedown', e=>e.preventDefault());
      btn.addEventListener('click', ()=>{
        descCanvas.focus();
        restoreEditSelection();
        document.execCommand('foreColor', false, btn.dataset.color);
        trackEditSelection(descCanvas);
      });
    });

    const colorPicker = document.getElementById('mc-desc-color-picker');
    if (colorPicker){
      colorPicker.addEventListener('input', ()=>{
        descCanvas.focus();
        restoreEditSelection();
        document.execCommand('foreColor', false, colorPicker.value);
        trackEditSelection(descCanvas);
      });
    }
  }
}

// Search-as-you-type icon picker modal. Offers both the original small inline-SVG
// library (for backward compatibility) and the large Material Symbols library.
function openIconPicker(onPick){
  const legacyEntries = Object.keys(ICONS).map(name => ({ value:name, label:name.replace(/_/g,' '), kind:'svg' }));
  const materialEntries = MATERIAL_ICON_NAMES.map(name => ({ value:'ms:'+name, label:name.replace(/_/g,' '), kind:'material' }));
  const allEntries = legacyEntries.concat(materialEntries);

  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.setAttribute('role','dialog'); ov.setAttribute('aria-modal','true');
  ov.innerHTML = `
    <div class="modal icon-picker-modal">
      <h3>Choose an icon</h3>
      <p class="sub">Search by name — ${allEntries.length}+ icons available.</p>
      <input type="text" class="auth-input icon-picker-search" id="icon-picker-search" placeholder="Search icons… e.g. calculator, receipt, shield">
      <p class="icon-picker-count" id="icon-picker-count"></p>
      <div class="icon-picker-grid" id="icon-picker-grid"></div>
      <div class="btn-row" style="margin-top:1rem;">
        <button class="btn-secondary" id="icon-picker-close">Close</button>
      </div>
    </div>`;
  document.body.appendChild(ov);

  const grid = ov.querySelector('#icon-picker-grid');
  const countEl = ov.querySelector('#icon-picker-count');
  const searchInput = ov.querySelector('#icon-picker-search');

  function renderGrid(filter){
    const q = filter.trim().toLowerCase();
    const matches = q ? allEntries.filter(e=>e.label.includes(q)) : allEntries;
    const shown = matches.slice(0, 150);
    countEl.textContent = q
      ? `${matches.length} match${matches.length===1?'':'es'}`
      : `Showing first ${shown.length} of ${allEntries.length} — type to search`;
    if (!shown.length){
      grid.innerHTML = `<p class="icon-picker-empty">No icons match "${esc(filter)}". Try a different word.</p>`;
      return;
    }
    grid.innerHTML = shown.map(e=>{
      const preview = e.kind === 'svg'
        ? `<svg width="26" height="26" viewBox="0 0 24 24" fill="#2C46B0">${ICONS[e.value]}</svg>`
        : `<span class="material-symbols-outlined" translate="no">${esc(e.value.slice(3))}</span>`;
      return `<button type="button" class="icon-picker-item" data-value="${esc(e.value)}" title="${esc(e.label)}">
        ${preview}
        <span class="icon-picker-label">${esc(e.label)}</span>
      </button>`;
    }).join('');
    grid.querySelectorAll('.icon-picker-item').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        onPick(btn.dataset.value);
        document.body.removeChild(ov);
      });
    });
  }
  renderGrid('');
  searchInput.addEventListener('input', ()=> renderGrid(searchInput.value));
  ov.querySelector('#icon-picker-close').addEventListener('click', ()=> document.body.removeChild(ov));
}

function stageStepsHtml(stage, mode, showIndex){
  // The "Index" tab only exists in the main Quick review flow (not the
  // filtered/matrix review flow, which reuses this same helper) — it's a
  // standing navigation destination (jump to any card), not a sequential
  // step, so it's always clickable regardless of where the user currently is.
  const steps = mode === 'quick'
    ? (showIndex ? [['answer','Review'],['explain','Explain'],['index','Index']] : [['answer','Review'],['explain','Explain']])
    : [['question','Guess'],['answer','Reveal'],['explain','Explain']];
  const order = {};
  steps.forEach(([key],i)=>order[key]=i);
  return `<div class="stage-steps">${steps.map(([key,label])=>{
    let cls = '';
    let clickable = false;
    if (key === stage) cls = 'current';
    else if (key === 'index') { cls = 'done'; clickable = true; }
    else if (order[key] < order[stage]) { cls = 'done'; clickable = true; }
    const tag = clickable ? 'button' : 'span';
    return `<${tag} class="stage-step ${cls}" ${clickable ? `data-stage="${key}"` : ''}>${label}</${tag}>`;
  }).join('')}</div>`;
}

function renderIndexView(deck){
  const mode = state.mode;
  const reviewedCount = state.perCard.filter(Boolean).length;
  const progressRight = reviewedCount > 0 ? `<span>${reviewedCount} of ${deck.cards.length} rated</span>` : '';
  const rows = deck.cards.map((c,i)=>{
    const p = state.perCard[i];
    const conf = p ? p.confidence : null;
    const label = conf ? `<b style="color:${conf==='strong'?'#2E7D32':conf==='mid'?'#E65100':'#C62828'}">${CONF_LABELS[conf]}</b>` : `<span style="color:#B7BEE0">—</span>`;
    const current = i === state.cardIndex ? ' current' : '';
    return `<button class="index-row${current}" data-idx="${i}"><span>${i+1}. ${esc(c.title)}</span>${label}</button>`;
  }).join('');

  app.innerHTML = `
    <button class="back-link" id="home-btn">&larr; All decks</button>
    <div class="deck-progress">
      <span>Card ${state.cardIndex+1} of ${deck.cards.length}</span>
      ${progressRight}
    </div>
    ${stageStepsHtml('index', mode, true)}
    <div class="end-panel">
      <h2 class="end-score" style="font-size:2rem;">Index</h2>
      <p class="end-label">Tap any card to jump straight to it.</p>
      <div class="end-breakdown" style="margin-top:.5rem; max-height:420px;">${rows}</div>
    </div>
  `;

  document.getElementById('home-btn').addEventListener('click', goHome);
  document.querySelectorAll('.stage-step[data-stage]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ stopEditing(); state.stage = btn.dataset.stage; render(); });
  });
  document.querySelectorAll('.index-row').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      stopEditing();
      state.cardIndex = parseInt(btn.dataset.idx, 10);
      // Land on the keyword/reveal slide first (consistent with the
      // Previous-card behavior), not straight on the explanation.
      state.stage = 'answer';
      render();
    });
  });
}

function renderCard(deck){
  if (state.mode === 'quick' && state.stage === 'index'){
    renderIndexView(deck);
    return;
  }
  const card = deck.cards[state.cardIndex];
  const stage = state.stage;
  const mode = state.mode;
  const cols = gridCols(card.keywords.length);

  const kwGridFlip = `<div class="kw-grid" style="grid-template-columns:repeat(${cols},1fr)">${card.keywords.map((kw,i)=>`
    <div class="kw-box" data-idx="${i}">
      <div class="kw-box-inner">
        <div class="kw-face front">
          ${iconHtml(kw.icon)}
          <span class="kw-placeholder">?</span>
        </div>
        <div class="kw-face back">
          ${iconHtml(kw.icon)}
          <span class="kw-text">${esc(kw.label)}</span>
        </div>
      </div>
    </div>`).join('')}</div>`;

  const kwGridStatic = `<div class="kw-grid" style="grid-template-columns:repeat(${cols},1fr)">${card.keywords.map(kw=>`
    <div class="kw-box">
      <div class="kw-box-inner">
        <div class="kw-face front">
          ${iconHtml(kw.icon)}
          <span class="kw-text">${esc(kw.label)}</span>
        </div>
      </div>
    </div>`).join('')}</div>`;

  let body = '';
  let footer = '';

  if (stage === 'question'){
    body = kwGridFlip;
    footer = `<button class="btn-primary" id="reveal-btn">Reveal answers</button>`;
  } else if (stage === 'answer'){
    body = mode === 'quick' ? kwGridStatic : kwGridFlip;
    const label = mode === 'quick' ? 'Continue to explanation' : 'Continue';
    footer = `<button class="btn-primary" id="continue-btn">${label}</button>`;
  } else {
    body = explainBlockHtml(deck, state.cardIndex);
    const isLast = state.cardIndex === deck.cards.length - 1;
    const isFirst = state.cardIndex === 0;
    footer = `
      ${!isFirst ? '<button class="btn-secondary" id="prev-card-btn">&larr; Previous card</button>' : ''}
      <button class="btn-primary" id="next-btn">${isLast ? 'See results' : 'Next card'}</button>
      <button class="btn-secondary" id="submit-session-btn">Submit session</button>
    `;
  }

  const reviewedCount = state.perCard.filter(Boolean).length;
  const progressRight = reviewedCount > 0 ? `<span>${reviewedCount} of ${deck.cards.length} rated</span>` : '';

  app.innerHTML = `
    <button class="back-link" id="home-btn">&larr; All decks</button>
    <div class="deck-progress">
      <span>Card ${state.cardIndex+1} of ${deck.cards.length}</span>
      ${progressRight}
    </div>
    ${stageStepsHtml(stage, mode, true)}
    <div class="card">
      <div class="card-title">${esc(card.title)}</div>
      ${importanceRowHtml(state.deckIndex, state.cardIndex)}
      ${mode === 'quick' ? confTagRowHtml(state.deckIndex, state.cardIndex) : ''}
      <div class="card-body">${body}
        <div class="btn-row">${footer}</div>
      </div>
    </div>
  `;

  document.getElementById('home-btn').addEventListener('click', goHome);
  wireImportanceRow(state.deckIndex, state.cardIndex);
  if (mode === 'quick') wireConfTagRow(state.deckIndex, state.cardIndex);
  if (stage === 'explain') wireExplainBlock(deck, state.cardIndex, ()=>renderCard(deck));
  document.querySelectorAll('.stage-step[data-stage]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ stopEditing(); state.stage = btn.dataset.stage; render(); });
  });

  const alreadyScored = mode !== 'quick' && state.perCard[state.cardIndex] !== undefined;

  function askConfidenceThenExplain(){
    openConfidenceModal(state.deckIndex, state.cardIndex, (conf)=>{
      state.perCard[state.cardIndex] = {confidence: conf};
      state.stage = 'explain';
      render();
    });
  }

  if (stage === 'question'){
    document.getElementById('reveal-btn').addEventListener('click', ()=>{
      state.stage = 'answer';
      document.querySelector('.stage-steps').outerHTML = stageStepsHtml(state.stage, mode, true);
      document.querySelectorAll('.stage-step[data-stage]').forEach(btn=>{
        btn.addEventListener('click', ()=>{ state.stage = btn.dataset.stage; render(); });
      });
      const boxes = document.querySelectorAll('.kw-box');
      boxes.forEach((box,i)=> setTimeout(()=> box.classList.add('flipped'), i*90));
      const footerEl = document.querySelector('.btn-row');
      setTimeout(()=>{
        footerEl.innerHTML = `<button class="btn-primary" id="continue-btn">Continue</button>`;
        document.getElementById('continue-btn').addEventListener('click', ()=>{
          if (alreadyScored){ state.stage = 'explain'; render(); }
          else { askConfidenceThenExplain(); }
        });
      }, boxes.length*90 + 150);
    });
  } else if (stage === 'answer'){
    if (mode === 'quick'){
      document.getElementById('continue-btn').addEventListener('click', ()=>{ state.stage='explain'; render(); });
    } else {
      document.querySelectorAll('.kw-box').forEach(b=>b.classList.add('flipped'));
      document.getElementById('continue-btn').addEventListener('click', ()=>{
        if (alreadyScored){ state.stage = 'explain'; render(); }
        else { askConfidenceThenExplain(); }
      });
    }
  } else {
    document.getElementById('next-btn').addEventListener('click', ()=>{
      stopEditing();
      // In quick mode, capture whatever confidence was set inline (no popup)
      if (mode === 'quick'){
        const conf = getCardMeta(state.deckIndex, state.cardIndex).confidence;
        state.perCard[state.cardIndex] = conf ? {confidence: conf} : undefined;
      }
      state.cardIndex += 1;
      state.stage = mode === 'quick' ? 'answer' : 'question';
      render();
    });

    const prevBtn = document.getElementById('prev-card-btn');
    if (prevBtn){
      prevBtn.addEventListener('click', ()=>{
        stopEditing();
        state.cardIndex -= 1;
        // Show the keyword/reveal slide first (not the explanation) — matches
        // the forward flow. Since this card was already visited, its
        // confidence rating (if any) is already stored, so the "Continue"
        // button on this stage will skip straight to the explanation instead
        // of re-asking the confidence question (see `alreadyScored` below).
        state.stage = 'answer';
        render();
      });
    }

    document.getElementById('submit-session-btn').addEventListener('click', ()=>{
      stopEditing();
      // Capture whatever's set for the current card before showing the report,
      // same as the "Next card" handler does, so this card counts too.
      if (mode === 'quick'){
        const conf = getCardMeta(state.deckIndex, state.cardIndex).confidence;
        state.perCard[state.cardIndex] = conf ? {confidence: conf} : undefined;
      }
      state.sessionSubmitted = true;
      render();
    });
  }
}

function renderEnd(deck){
  const mode = state.mode;
  const isEarlySubmit = state.sessionSubmitted && state.cardIndex < deck.cards.length;
  const rated = state.perCard.filter(Boolean);
  const counts = {weak:0, mid:0, strong:0};
  rated.forEach(p => p && counts[p.confidence]++);
  const confDots = {weak:'conf-dot-weak', mid:'conf-dot-mid', strong:'conf-dot-strong'};
  const confPills = CONF_KEYS.map(k=>`<div class="conf-pill conf-pill-${k}"><span class="conf-dot ${confDots[k]}"></span>${counts[k]} ${CONF_LABELS[k]}</div>`).join('');

  const reviewedCount = state.perCard.filter(Boolean).length;
  const headline = isEarlySubmit ? 'Session submitted' : (mode==='quick'?'All reviewed!':'Deck done!');
  const subLabel = isEarlySubmit
    ? `You reviewed ${reviewedCount} of ${deck.cards.length} cards in this session:`
    : 'Confidence ratings for this session:';

  const panelInner = `
    <h2 class="end-score" style="font-size:2rem;">${headline}</h2>
    <p class="end-label">${subLabel}</p>
    <div class="conf-breakdown">${confPills}</div>
    <div class="end-breakdown" style="margin-top:1.2rem;">
      ${deck.cards.map((c,i)=>{
        const p = state.perCard[i];
        const conf = p ? p.confidence : null;
        const label = conf ? `<b style="color:${conf==='strong'?'#2E7D32':conf==='mid'?'#E65100':'#C62828'}">${CONF_LABELS[conf]}</b>` : `<span style="color:#B7BEE0">—</span>`;
        return `<div class="end-breakdown-row"><span>${esc(c.title)}</span>${label}</div>`;
      }).join('')}
    </div>
    <div class="btn-row">
      ${isEarlySubmit ? '<button class="btn-primary" id="continue-review-btn">Continue reviewing</button>' : ''}
      <button class="${isEarlySubmit ? 'btn-secondary' : 'btn-primary'}" id="restart-btn">${mode==='quick'?'Review again':'Restart this deck'}</button>
      <button class="btn-secondary" id="other-deck-btn">Choose another deck</button>
    </div>`;

  app.innerHTML = `
    <button class="back-link" id="home-btn">&larr; All decks</button>
    <p class="eyebrow" style="text-align:center;">${isEarlySubmit ? 'Session summary' : 'Deck complete'}</p>
    <div class="end-panel">${panelInner}</div>
  `;
  document.getElementById('home-btn').addEventListener('click', goHome);
  document.getElementById('restart-btn').addEventListener('click', ()=>{ resetDeckProgress(); render(); });
  document.getElementById('other-deck-btn').addEventListener('click', goHome);
  const continueBtn = document.getElementById('continue-review-btn');
  if (continueBtn){
    continueBtn.addEventListener('click', ()=>{
      state.sessionSubmitted = false;
      render();
    });
  }
}

(async function init(){
  await loadDeckContent();
  const { data } = await sb.auth.getSession();
  if (data && data.session){
    await onAuthSuccess(data.session);
  } else {
    render();
  }
})();
</script>
